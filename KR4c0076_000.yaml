body:
  text: 李義山文集箋注别集類一唐提要臣等謹案李義山文集箋注十卷國朝徐樹榖箋徐炯注樹榖字藝初康熙乙丑進士官至山東道監察御史炯字章仲康熙壬戌進士官至直𨽻巡道皆崑山人考舊唐書李商隱傳稱有表狀集四十卷新唐書藝文志稱李商隱樊南甲集二十卷乙集二十卷玉溪生詩三卷文賦一卷宋史藝文志稱李商隱文集八卷四六甲乙集四十卷别集二十卷詩集三卷今惟詩集三卷傳文集皆佚國初吳江朱鶴齡始裒輯諸書編為五卷而闕其狀之一體康熙庚午炯典試福建得其本于林佶採托文苑英華所載諸狀補之又補入重陽亭銘一篇是為今本鶴齡原本雖略為詮釋而多所踈漏蓋猶未竟之稿樹榖因博考史籍證驗時事以為之箋炯復徴其典故訓詁以為之注其中上崔華州書一篇樹榖斷其非商隱作近時桐鄉馮浩注本則辨此書為開成二年春初作崔華州乃崔龜從非崔戎故賈相國乃賈餗非賈耽崔宣州乃崔鄲非崔羣引據唐書紀傳證樹榖之誤疑又重陽亭銘一篇炯據全蜀藝文志採入馮浩注本則辨其碑末結銜又鄉貫皆可疑知為舊碑漫漶楊慎偽補足之援慎偽補樊敏栁敏二碑證炯之誤信又據成都文類採入為河東公上西川相國京兆公書一篇及逸句九條皆足補正此本之踈漏然上京兆公書乃案牘之文本無可取逸句尤無關宏旨故仍以此本著于録焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
