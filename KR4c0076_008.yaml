body:
  text: 李義山文集箋注卷八監察御史徐樹穀箋山東提學僉事徐炯注祝文祭桂州城隍神祝文何孟春餘冬序録城隉之祀莫詳其始先儒謂既有社不應復有城隍唐李陽氷縉雲城隍記謂祝典無吳越有爾然成都城隍祠太和中李德裕所建張說有祭城隍文杜牧有祭黃州城隍文則不獨吳越為然又蕪湖城隍建於吳赤烏二年髙齊慕容燕梁武陵王祝城隍神皆書於史又不獨唐而巳宋以來其祀遍天下或賜廟額或頒封爵或遷就傅㑹各指一人為神之姓名如鎮江慶元寧國太平華亭蕪湖等郡邑皆以為紀信隆興贑袁江吉建昌臨江南康皆以為灌嬰是也陸游云唐以來郡縣皆祭城隍令世尤謹守令謁見儀在他神祠上社稷雖尊特以令式從事至祈禳報賽獨城隍而巳維大中元年嵗次丁卯八月甲午朔二十七日庚申桂州管內都防禦觀察處置等使正議大夫使持節桂州諸軍事守桂州刺史兼御史中丞上柱國賜紫金魚袋鄭某舊書輿服志髙祖給四品五品隨身魚飾以銀天授初改作龜袋三品已上飾以金四品以銀五品以銅神龍初內外官五品已上依舊佩魚袋郡王嗣王特許佩金魚袋謹遣直官攝功曺參軍文林郎守陽朔縣令莊敬質謹以㫖酒庶羞之奠祭於城隍之神濬洫崇墉左思魏都賦崇墉濬洫嬰堞帶涘所以固吾圉左傳鄭莊公曰寡人之使吾子處此不惟許國之為亦聊以固吾圉也春祈秋報詩序噫嘻春夏祈穀於上帝也豐年秋冬報也所以輔農功周語無有求利於官以干農功今露白電收蟲壞水涸禮記孟秋之月凉風至白露降仲秋之月雷始收聲蟄蟲壞戶殺氣浸盛陽氣日衰水始涸念時𤾉而時雨書曰肅時雨若曰乂時暘若將乃積而乃倉詩乃積乃倉敢以吉辰式陳常典神其保兹正直左傳內史過曰神聰明正直而一者也歆彼馨香左傳季梁曰所謂馨香無讒慝也聿念前修勿虧明鑒昔房豹變樂陵之井味北史房豹字仲幹河清中遷樂陵太守郡瀕海水味多鹹苦豹命鑿一井遂得甘泉遐邇以為政化所致任延易九真之土風後漢循吏傳任延字長孫南陽宛人詔徴為九真太守初平帝時漢中錫光為交址太守化聲侔于延嶺南華風始於二守焉豈獨人謀抑由冥助今猶古也神實聽之為安平公兖州祭城隍文年月日致祭於城隍之神四民攸居是分都邑五兵未息周禮司兵掌五兵五盾漢吾丘夀王傳古者作五兵注謂矛㦸弓劍戈爰假金湯漢蒯通傳金城湯池不可攻也惟神受命上𤣥守職兹土擁長雲之壘鮑昭蕪城傳崒若斷岸矗似長雲提却月之營魏志馬超攻冀城楊阜使弟嶽於城上作偃月營南史帝遣白直隊主丁旿於河北為郤月陳主張威靈莊子孰主張是彈壓氛祲見為鹽州狀某方宣朝㫖來總藩條帷一作帳中之列一作位既安幕內之籌敢失並見前神其守同石堡新書地理志鄯州鄯城縣南隔澗七里有天威軍軍故石堡城護等玉關見代安平公表長令崒若岸焉無使復于隍也易城復于隍為懷州李使君祭城隍神文年月日致祭於城隍之神某謬蒙朝奬叨領藩條熊軾初臨虎符適至並見表敢資靈於水土冀同固於金湯况彼潞人實逆天理因承平之地以作巢窠驅庸一作康樂之民周禮小行人職曰共康樂和親安平為一書以為蟊賊左傳晉侯使吕相絶秦曰帥我蟊賊以來搖蕩我邉疆一至於此其能久乎惟神廣扇威靈劃開聲勢俾犯境者望飛烏而自遁左傳叔向告晉候曰城上有烏齊帥其遁此滔天者書象恭滔天聽唳鶴以虛聲晉載記苻堅淝水之敗其走者聞風聲鶴唳皆以為晉兵崇墉載嚴巨塹無壅今來古往尸子往古來今曰雷永無川竭之因周語伯陽甫曰山崩川竭亡國之徴也萬歲千秋阮籍詩千秋萬歲後莫有土崩之勢史記秦始皇紀土崩瓦解神其聽之無易我言為舍人絳郡公鄭州禱雨文年月日鄭州刺史李某謹請茅山道士馮角禱請於水府真官木華海賦水府之內極深之庭晉樂府神靈亦道同真官今來下伏以旱魃為虐詩旱魃為焚虐如惔如應龍不興山海經為應龍之狀乃得大雨困杲日於詩人詩杲杲日出苦密雲於易象易密雲不雨生物斯瘁民食攸艱書暨稷播奏庶艱食鮮食某叨此分憂俯慙無政爰求真侣䖍禱隂靈減哺表勤魏武帝樂府周公吐哺天下歸心褰帷引咎見為滎陽公表伏乞下通滎播水經注左傳襄公十一年諸侯伐鄭西濟於濟禭京相璠曰鄭地言濟水滎澤中北流至垣雍西與出河之濟㑹南去新鄭百里斯蓋滎播河濟往復徑通矣上達天潢史記天官書西宫咸池曰天五潢合為膏澤之原用息藴隆之患詩藴隆蟲蟲其於效信或敢逡巡漢司馬相如傳逡巡避席㬥露託詞後漢獨行傳諒輔廣漢新都入仕郡為五官掾時夏大旱輔乃自暴庭中須臾澍雨世稱其至誠焦勞結慮見上表泉間侯氣見上文樹杪占風晉管輅傳輅曰今夕當大雨樹上已有少女微風若少女反風其應至矣惟望玉女之披衣㠪采安成記萍鄉西城津有玉女岡天當雨輒先漏五色氣於石間俗呼為玉女披衣敢駭商羊之鼓舞家語齊有一足之鳥飛集殿前舒翅而跳孔子曰此鳥名曰商羊且謡曰天將大雨商羊鼓舞果大霖雨竊希𤣥感晉吕光傳光曰吾聞李廣利精誠𤣥感聽察丹誠隋書觀德王雄讓表云特鑒丹誠賽舜廟文太平寰宇記桂州臨桂縣虞山下有皇潭言舜南巡遊此因名今訛曰黃潭亦曰舜廟在焉桂林舊志虞山在臨桂縣東北五里一名舜山左臨灕水後臨黃潭其下有洞宋張栻名之曰韶音洞南有平原舜祠在焉明一統志舜山層巖臨江有舜祠唐韓雲卿為記刻于崕石宋張栻重修年月日昭賽虞舜之祠伏以帝狩南荒一作方禮記舜崩於蒼梧之野蓋三妃未之從也注南巡而崩史記舜踐帝位三十九年南巡狩崩於蒼梧之野葬於江南九疑是為零陵神留下土詩禹敷下土方翠華不返司馬相如上林賦建翠華之旗積怨望於他年大麓不迷書納于大麓烈風雷雨弗迷烜威靈於終古屈原九歌長無絶兮終古比憂嘉種詩誕降嘉種少冒愆陽左傳冬無愆陽夏無伏隂抗簡陳詞離騷跪敷袵以陳辭兮潔樽引咎左傳臧孫命北面重席新樽潔之果蒙慿離掣電跨㢲揚風易離為電㢲為風布沾渥於九臯詩既優既渥既沾既足又鶴鳴于九臯起焦枯於一瞬淮南子十日並出草木焦枯敢布瑶席屈原九歌瑶席兮王瑱輒事蘭羞九歌蕙肴蒸兮蘭藉帝其罷奏南琴見為滎陽公表停吹西琯舜時西王母獻白玉琯故謂之西琯詳見前使東皇太乙九歌東皇太乙注太乙神名祠在楚東以配東帝故云東皇兼預於靈遊漢郊祀歌九重開靈之斿俾山鬼江婓九歌山鬼注家語木石之怪䕫罔兩豈謂此耶吳都賦江妃于是往來婓即妃字無藏於沴氣後漢五行志說云氣之相傷謂之沴庶將善政以奉明輝賽越王神文漢兩粵傳秦二世時南海尉任囂病且死召龍川令趙他行南海尉事囂死他即聚兵自守秦已滅他即擊并桂林象郡自立為南粵武王年月日賽於越王之神惟靈輝一作耀焯殊姿抑揚竒表見端午啓秦魚既爛公羊傳梁亡自亡也魚爛而亡史記秦本紀魚爛不可復全則聊帝南荒漢兩粵傳髙后時南粵王趙他自尊號為南武帝按尉他稱帝在髙后時此以為秦漢之際小誤漢鹿有歸漢蒯通傳秦失其鹿天下共逐之則稱臣北闕漢髙帝紀七年蕭何治未央宫立東闕北闕十一年立南海尉它為南粵王使陸賈即授璽綬它稽首稱臣覽英雄之載籍史記伯夷傳夫學者載籍極博信王霸之朋遊言念遺祠猶存屬一作鹿誤邑尚興甘雨以救公田詩以祈甘雨又雨我公田敢陳沼澗之毛左傳澗溪沼沚之毛可薦於鬼神用報京坁之積詩曽孫之庾如坁如京神其永司兹土長庇吾人福佑柔良揚雄長揚賦受神人之福佑驅除疫一作疾癘史記適足以資賢者為驅除難耳馬融廣成頌召方相驅癘疫吳朱桓傳往遇疫癘榖食荒貴今來古往潘嶽西征賦古往今來邈矣悠哉常教威著越城元和郡縣志故越城在桂州全義縣西南五十里漢髙后時遣周竈擊南越趙他踞險為城竈不能踰嶺即此按全義今為興安縣在桂林府東北一百五十里萬嵗千秋勿使魂歸真定漢兩粵傳南粵王趙他真定人也文帝元年為他親冡在真定置守邑嵗時奉祀神乎不昧來鑒斯言為中丞滎陽公桂州賽城隍神文惟大中元年嵗次丁卯六月甲午朔十四日丁未都防禦觀察處置等使桂州刺史兼御史中丞鄭某謹遣登仕郎守功曺參軍陸佚一作秩以庶羞之奠祭於城隍之神夫大邑聚人通都設屏將英集作比按此字當衍雄走集左傳險其走集注走集邉竟之壘辟辟音壁必假髙深不惟倚仗風雲兼用翕張神鬼某初蒙朝奬來佩藩符既禦冦於西原易不利為冦利禦冦亦觀風於南國禮記太史陳詩以觀民風始維畫鷁將下伏熊並見前屬楚雨蔽空湘雲塞望晦我中軍之鼓左傳殖綽郭最皆襟甲面縳坐于中軍之鼓下齊語有國子之鼓有髙子之鼓有中軍之鼓濕豫下瀨之師漢武帝紀元鼎五年甲為下瀨將軍下蒼梧臣瓚曰瀨湍也吳越謂之瀨中國謂之磧伍子胥書有下瀨船遂以誠祈果䝉神應速如激矢見為張周封啓勢等却河見為滎陽公表及兹報薦之期敢怠馨香之禮神其干霄作峻蜀都賦干青霄而秀出習坎為防易習坎王公設險以守其國合𤇺櫓以保民漢賈誼傳注文頴曰邉方備胡冦作髙土櫓櫓上作桔臯桔臯頭兜零以薪草置其中有冦即火燃舉之以相告曰𤇺陸機洛陽記洛陽城周公所制城上百步有一樓櫓外有溝渠劉熙釋名櫓露也露上無覆屋也𨗳川塗而流惡周禮大川之上必有涂焉左傳韓獻子曰有汾澮以流其惡使言言堅壘一作壁詩崇墉言言侔地道以無疆易安貞之吉應地無疆活活深溝詩河水洋洋北流活活如井德之不改易改邑不改井勿違丘禱見論語以作神羞書無作神羞尚享賽靈川縣城隍神文新書地理志桂州靈川縣龍朔二年析始安置在今桂林府北五十里年月日賽於靈川縣城隍之神髙壘深溝左傳臾駢曰秦不能支請深壘固軍以待之用資固護蕪城賦觀基扄之固護興雲泄雨張衡南都賦朝雲不興而潢潦獨臻魏都賦蓄為屯雲泄為行雨諒俟威靈惟神能感至誠將成大稔左傳不可以五稔注稔熟也逐清泠之耕父不使揚光東京賦囚耕父于清泠南都賦耕父揚光於清泠之淵注有神耕父處豐山常游清泠之淵見山海經回沮澤之蟠龍皆令灑潤蜀都賦濳龍蟠於沮澤應鳴鼓而興雨式陳微報願鑒惟馨賽荔浦縣城隍神文新書地理志桂州有荔浦縣在今平樂府西七十五里年月日賽於荔浦縣城隍之神嗟我疲民每虞艱食寒耕熱耨始望於秋成爾雅秋為收成鑠石流金淮南子大熱鑠石流金火弗為益其烈幾傷於嵗事禮記王制曰休老勞農成嵗事逺資靈顧式布層隂江淹詩日落長沙渚層隂萬里生無煩管輅之占不待欒巴之噀神仙傳欒巴為尚書正朝大㑹巴獨後到又飲酒西南噀之曰臣本縣成都市失火臣故因酒為雨以滅火詔即驛問果如巴言竊陳薄奠用答豐年神其據有髙深主張生植同功田祖詩田祖有神秉畀炎火比義一作議非雨師廣雅雨師屏醫無假怒於潛龍易潛龍勿用勿縱威於虐魃守兹縣邑富我京坁賽永福縣城隍神文新書地理志桂州永福縣武德四年析始安置在今桂林府永寧州東南八十里年月日賽於永福縣城隍之神夫考室立家詩序斯干宣王考室也左傳師服曰天子建國諸侯立家先立戶竈禮記王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戶曰竈又庶士庶人立一祀或立户或立竈聚人開邑首起城池易何以聚人曰財固有明靈降而鑒治惟神克揚嘉霔廣育黎民聊為一作薦茨梁詩曽孫之稼如茨如梁少申肴醖神其節宣四氣扶佑三時勿使畢星但稱於好雨書星有好風星有好雨注好風者箕星好雨者畢星無令田祖獨擅於有神永歆蘋藻之誠長挾金湯之勢賽城隍神文年月日賽於城隍之神惟神據雉堞以為雄𨗳溝池而作潤果成飄注以救惔焚敢吝斯牲詩靡愛斯牲用報嘉種神其永通靈感長懋𤣥功晉劉𢎞等傳論曰輔相𤣥功𨗳楚子之餘波左傳晉公子對楚子曰其波及晉國者君之餘也霑晉國之膏雨左傳季武子曰小國之仰大國也如百穀之仰膏雨焉苟能不昧報亦隨之賽北源神文北源者湘灕二水之源也漢地理志零陵縣陽海山湘水所出北至酃入江水經注湘水出始安陽海山湘灕同源分為二水南為灕水北則湘川元和郡縣志湘水出全義縣東南八十里陽朔山下按陽朔即陽海也在今興安縣東南九十里全義直桂之北故號為北源年月日賽於北源之神惟神雖臨南服實號北源湘浦降神近驚於騷客九歌湘夫人帝子降兮北渚滮池浸稻逺協於詩人詩滮池北流浸彼稻田果能槖籥風頭老子天地之間其猶槖籥乎索綯雨腳詩宵爾索綯不資畎澮書禹曰濬吠澮巨川將致倉箱見為汝南公表聊申信於澗毛庶通靈於水府神其抑揚蘭佩麾掉桂旗拍川后之肩郭璞遊仙詩左挹浮丘䄂右拍洪崖肩曺植洛神賦川后靜波川后河伯也攬波神之𬒮神當作臣莊子豫東海之波臣也共來於此饗報留思賽曾山蘇山神文廣西通志蘇山在平樂府賀縣北髙數百文宋皇祐間知縣狄遵誨討冦於縣北十里山下夢蘇武神因禱焉師捷請于朝即建廟祀武因名前有一石壁水從上滴下遇旱則禱雨於此又縣西十里有甑山舊通志瑞雲山在賀縣西十里髙千餘丈舊名幽山唐李刺史郃更名曰丹甑宋守鄧壁以此山多雲氣改今名上有泉注於池名曰仙池今按唐時已有蘇山則必非因皇祐建廟而得名曾山疑即甑山以甑為曽蓋傳寫之誤甑山有仙池蘇山有石壁水皆禱雨之所故文引湫泉仙室以為喻年月日賽於曽山蘇山之神惟神守在出雲禮記天降時雨山川出雲職惟通氣易山澤通氣果從望嵗左傳國人望君如望嵗焉載潤嘉生漢郊祀志故神降之嘉生應劭曰嘉穀也將申昭報之儀敢闕馨香之獻神其遐瞻惟嶽廣納逰塵免揚少女之風勤咏曽孫之稼無令渥澤盡歸涇水之湫泉漢郊祀志湫淵祠朝那蘇林曰湫淵在安定朝那縣方四十里停水不流師古曰此水今在涇州界清徹可愛不容穢濁或喧汚輒興雲雨土俗亢旱每于此求之太平廣記靈應傳云涇州之東二十里有故薜舉城城之陽有美女湫廣邪數里其水湛然碧莫有測其深淺者鄉人立祠於旁曰九娘子神嵗之水旱祓禱皆得啓請勿使威靈不一作下誤及歷山之仙室未詳王融序紀言事于仙室按水經注灤水出歷城縣故城西南泉源上奮水涌若輪俗謂之娥英水以泉源有舜妃娥英廟故也城南對山山上有舜祠山下有大穴謂之舜井書舜耕歷山亦云在此或曰仙室二字誤御覽引列仙傳云歷陽有彭祖仙窟請雨輒得我辭有激神倘聽焉賽白石神文靈川縣志白石湫在縣南三十五里李商隱詩龍移白石湫即此亦曰白石潭白石漈灕江自白石而下深潭廣浸與湘江埓潭上有白石鎮明一統志白石湫在府城北七里年月日賽於白石之神惟神載烜明靈克標懿號軒珠耀彩茌子黃帝遊于赤水之北登於崑崙之丘而南望還歸遺其𤣥珠于赤水尚非瑶疑作璿水之源荆璞流輝並見啓即是玉山之路山海經玉山是西王母所居注山多玉石昨者俯憂旱嵗俾禱遺祠果能愛我大田貺余膏澤不俟于公之折獄漢書東海有孝婦養姑甚謹姑欲嫁之終不肯其後姑自經死姑女告吏孝婦自誣服于公以為此婦以孝聞必不殺也太守竟論殺孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守强斷之咎黨在是乎太守因表其墓天立大雨無煩洛令之曝身水經注長沙耆舊傳云祝良字右卿為洛陽令嵗時亢旱天子祈雨不得良乃曝身階庭告誠引罪自晨至午紫雲沓起甘雨登降人為歌曰天久不雨蒸人失所天王自出祝令特苦精符感應滂沱下雨敢命子男爰修蘋藻神其仰濟一作流天澤俯佑嵗功無萌可轉之心詩我心匪石不可轉也以負惟馨之禮周書黍稷非馨明德惟馨尚饗賽龍蟠山神文明一統志龍蟠山在興安縣東十五里山下有石洞洞門數重逰者東燭而入水中有魚四足而有角人不敢傷恐致風雨年月日賽於龍蟠山之神惟神降治山川流一作濟非恩縣道龍蟠鳯蓋克懋於靈司蟻穴鸛巢詩鸛鳴于垤蟻穴見代僕射表式揚於利澤至誠有達昭報無虧神其一作威叱咤飛亷漢書韓信曰項王喑啞叱咤干入皆廢吕氏春秋風師曰飛亷鞭驅屏翳三齊略記始皇作石橋欲過海看日出處有神人驅石下海石去不速神輒鞭之屏翳見上文尚一作向令吾土屢有豐年詩綏萬邦屢豐年不無行潦之羞以謝油雲之㑹左傳潢汙行潦之水可薦於鬼神可羞於王公封禪文自我天覆雲之油油甘露時雨厥壞可游賽陽朔縣名山文元和郡縣志陽朔縣北至桂州一百四十里開皇十年置取陽朔山為名山今在縣北門外本名陽海山亦名零陵山相近有龍頭山白鶴山西人山威南山畫山蓋皆陽朔之支峯也年月日賽於陽朔縣名山之神惟神受命上𤣥奠兹南服雲臺日觀華山記嶽東北有雲臺峰其山雨峰崢嶸四面懸絶上冠景雲下通地脈嶷然獨秀有若雲臺下有穴昔冇人入此穴出東方山行云經黃河底上聞流水聲日觀注見前逺讓於髙標蜀都賦陽烏回翼乎髙標蓬島崑丘史記蓬萊方丈瀛洲此三神山諸仙人及不死藥在焉水經注三成為崑崙丘崑崙說曰崑崙之山三級下曰樊桐一名板松二曰𤣥圃一名閬風上曰增城一名天庭是謂天帝之居遐通於爽氣世說王子猷作桓車騎參軍王以手板柱頓云西山朝來致有爽氣峻若藏刀之嶺崇如倚劔之門水經注淶水又南徑藏刀山下層巖壁立直長干霄逺望崖側有若積刀鐶鐶相比咸悉西首劔門見前啓是宜銓管隂司拘囚異物為神仙之下府開龍虎之殊一作神非庭漢郊祀志望祀蓬萊之屬幾至殊庭焉師古曰蓬萊中仙人庭也屬嵗不寧旱既太甚驅誠叠嶂託意通波洛神賦託微波而通辭果聞雷出地中易雷出地奮豫電流一作濟非巖下既兹霑足並見啓敢薦香集作馨芬願終如響之靈易其受命也如響無怠一作大孔明之鑒詩祀事孔明尚饗賽海陽神文海陽即陽海太平寰宇記陽海山在郡北一百七十里屬興安縣其山自零陵縣西南迤邐岡巒連亘不絶明一統志海陽山在興安縣南九十里舊名陽海山湘灕二水所自出山下有巖幽深行數百文至水泉處潤不盈尺其深叵測年月日賽於海陽之神頃傷多稼將困驕陽未聞一作逄玉女之披衣見上文空見土龍之矯首魏應璩與廣川長岑文瑜書土龍矯首於𤣥寺注淮南子土龍以祈雨式祈嘉霔果降明輝神其享彼蘭羞挹兹桂酒屈原九歌奠桂酒兮椒漿輔成於多黍多稌詩豐年多黍多稌助施一作調於好風好雨見上文庶厲業官以酬𤣥澤賽堯山廟文輿地紀勝引寰宇記堯山在靜江府城東北四十里圖經云堯山在水東明一統志按史傳堯封履不到蒼梧以西與舜山相對人慕堯舜之風因名堯祠宋張栻重修有記刻於石又龍池在堯山鄉民禱雨屢應嵗久湮塞宋經略張維重浚以石甃之年月日賽於堯山之廟伏以帝巡遐徼天作髙山詩天作髙山太王荒之既比敬於軒臺見為尚書狀亦分功於農井見祭吕商州文是留遺廟以慰斯民昨者時雨忽愆秋陽稍亢永言嘉霔實自𤣥恩大驅蟠澤之龍見上文盡發濳泉之蜧一作介非淮南子黑蜧黑蛇也濳於神泉能致雲雨倉箱興詠將慶於農夫詩農夫之慶灌􅒓呈功不愆於豎集作壯子史記龎㳙曰遂成豎子之名敢兹昭報奠降明靈賽古欖神文古欖蓋橄欖樹之最大者王存九域志靜江府理定縣有橄欖山嶺表録異云橄欖樹身聳拔皆髙數丈其子深秋方熟有野生者子繁樹峻不可梯緣但刻其根下方寸許納鹽於其中一夕子皆自落按趙璘因話録南人長林中大樹謂之有神豈以古㰖歷年既久神所憑依故賽之邪年月日賽於古欖之神惟神爰因碩果易碩果不食遂啓靈祠瓜美邵平且傳舊志漢蕭何傳邵平秦東陵侯秦破為布衣種瓜長安城束瓜美故世謂東陵瓜自邵平始也李標朱仲亦茂前經潘嶽閒居賦房陵朱仲之李善曰王逸荔枝賦云房陵縹李傳𤣥李賦乃有河沂黃建房陵縹青一樹三色異味殊名任昉述異記房陵定山有朱仲李園三十六所李尤果賦三十六園朱李是也昨者瘴暑為災油雲不起式存心禱慮作神羞神能感氣蜧泉傳祥鸛垤使宋生抒賦始悅於雄風髙氏讀書忽驚於㬥雨並見前化太甚旱為大有年春秋宣公十有六年冬大有年將見助於歡康敢忘懷於昭賽祭蘭麻神文廣西舊通志蘭麻山在桂林府永福縣西南四十里唐桂帥遇旱禱此其流為下漏水又冇木皮江繞山入大江年月日賽於蘭麻之神頃者杲日揚威融風扇㬥吕氏春秋東北曰融風禾乃盡偃書天大雷電以風禾盡偃人何以堪晉桓溫傳樹猶如此人何以堪神能倐忽應時屈原九歌倏而來兮忽而逝逡巡布潤見上文雲旗直集九歌乘回風兮載雲旗不資秦地之決渠漢溝洫志趙中大夫白公奏穿渠引涇水注渭溉田名曰白渠民歌曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨雨陳斜飛更甚成都之救火見上文永懷靈祐敢薦嘉肴神其與蕙同芳宋玉九辨以為君獨服此蕙兮羌無以異於衆芳為蓬扶直荀子蓬生麻中不扶自直勿一作苟虛嘉號以纍豐年祭全義縣伏波神文新書地理志桂州全義縣本臨源武德四年祈始安置大歷三年更名後漢馬援傳援字文淵扶風茂陵人建武十七年璽書拜援伏波將軍南擊交趾二十四年遣援征五溪蠻明年三月進營壺頭援中病而卒桂林府志伏波山在城中府治東北明一統志伏波山又名伏波巖突起千尺與獨秀山相望下有伏波廟祀漢馬援宋封忠顯佑順靈濟王按壺頭山在今湖廣辰州府沅陵縣東去全義尚千里伏波所不到俗慕賢者之名故取以名其山因立廟以祀之云年月日觀察處置使兼御史中丞鄭某謹遣全義縣令韋必復以酒牢之奠昭賽於漢伏波將軍新息侯馬公越城舊疆漢將遺廟一派湘水萬重楚山比潁川袁氏之臺悲同異日水經注汝水枝津世謂之大㶏水東南徑召陵縣故城南又東徑公路臺臺臨水方百步袁術所築也又東歷汝隂縣故城西北東入潁水方汝水周公之渡感極當時水經注汝水自成安縣故城北又東為周公渡藉承休之徽號而有周公之嘉稱也漢恩澤侯表武帝元鼎四年封姬嘉為周子南君再傳以罪棄市其弟延年紹封初元五年更封為周承休候嗚呼昔也投隙建功後漢公孫述傳論曰不能因隙立功以㑹時變因時立志馬援傳援嘗謂賔客曰丈夫為志窮當益堅老當益壯隗將軍坐談西伯棄去無歸後漢隗囂傳季父崔更始立而莽兵連敗謀起兵應漢咸謂囂素有名遂共推為上將軍論曰若囂命㑹符運敵非天力雖坐談西伯豈多嗤乎馬援傳囂遣長子恂入質援因將家屬隨恂入洛陽梁伯孫自降王姬雖來不起馬援傳援嘗有疾梁松來侯之獨拜牀下援不答諸子問曰梁伯孫帝壻大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎以若畫之睂宇馬援傳援為人美須髮睂目如畫開聚米之山川馬援傳帝自西征囂至漆援因說囂有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然扶風里中詎守錢而為虜馬援傳轉游隴漢間因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊按援扶風茂陵人德陽殿下寧相馬以推工馬援傳援善别名馬於交址得駱越銅鼓乃鑄為馬式還上之馬髙三尺五寸圍四尺四寸有詔置於宣德殿下按藝文類聚引東觀漢記云詔置馬德陽殿下義山本此不可謂誤悵望關西趨馳隴右馬援傳來歙奏言隴西侵殘非馬援莫能定十一年夏璽耆拜援隴西太守使大中大夫來歙持節送援西歸隴右事嫂冠戴馬援傳敬事寡嫂不冠不入廬誡姪書成馬援傳兄子嚴敦並嘉譏議而通輕俠客援在交趾還書誡之龍伯髙之故人出言有所馬援傳誡兄子書曰龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曺效之公孫述之刺客相待何輕馬援傳囂使援奉書洛陽引見於宣德殿援曰臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是鳶泊啓行馬援傳援謂官屬曰當吾在浪泊西里間仰視飛鳶跕跕墮水中蠻溪請往馬援傳武威將軍劉尚擊武陵五溪蠻夷深入軍沒援因復請行銅留鑄柱廣州記馬援討平交址於嶠南立銅柱以表漢之極界革誓裹尸男兒已立邉功壯士猶羞病死馬援傳援謂孟冀曰男兒要當死於邉野以馬革裹尸還葬耳何能卧床上在兒女子手中邪冀曰諒為烈士當如此矣灕湘之滸祠宇依然水經注灕水與湘水出一山而分源也湘灕之間陸地廣百餘步謂之始安嶠節越城嶠也栁開湘灕二水說二水本一水也自海陽山西北流至縣東五里分水嶺上始分為南北二水蓋昔人以二水相離故命之曰相曰離後人又加水云豈獨文宣之陵不生刺草水經注魯縣泗水南有夫子冢皇覽曰弟子各以四方竒木來植故多諸異樹不生棘木刺草更若武候之壠仍有深松蜀諸葛亮傳亮遺命葬漢中定軍山因山為墳冢足容棺景耀六年魏鎮西將軍鍾㑹征蜀至漢川令軍士不得於亮墓所左右芻牧樵採水經注沔陽故城南臨漢水對定軍山諸葛亮之死也遺令葬於其山因即地勢不起墳壟唯深松茂柏攢蔚川阜莫如墓塋所在向我來思停車展敬一樽有奠一作典誤五馬忘歸及申望嵗之祈又辱有秋之澤書若農服田力稽乃亦有秋雲興柱礎淮南子山雲蒸柱礎潤電繞牆藩見為李貽孫啓何煩玉女之投壺方聞天笑神異經束王公與玉女投壺梟而脫誤不接者天為之笑開口流光今電是也不待樵人之取箭已見風回孔靈符㑹稽記射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞常採薪得一箭頃有神人至問何所欲曰常苦若耶溪載薪為難願旦南風暮北風後果然敢忘黍稷之馨用報京坁之賜屬以時非行縣不獲躬詣靈壇應璩書躬自暴露拜起靈壇詞託煙波意傳天壤既謝三時之澤兼論千載之交勿負至誠以孤𤣥契檄為濮陽公檄劉稹文集作書是足下前以肺肝布諸簡素仰承復命猶事枝辭易中心疑者其辭枝夫豈告者之不忠抑乃聽之而未審擇福莫若重擇禍莫若輕一去不回者良時一失不復者機事噫嘻執事誰與為謀延首北風阮籍正欲賦佇延首以極視心焉如灼是以再陳禍福用釋危疑言不避煩理在易了丁寧懇欵至於再三者誠以某與先太師相國俱沐天光並為藩后陸機詩發跡翼藩后昔云與國今則親鄰而大年不登見代安平公表同盟未至見為尚書狀飯貝才畢禭衣莫陳並見表乃眷後生遽乖先訓遷延朝命宋玉登徒子好色賦因遷延而辭避迷失臣職不思先縠之忠左傳晉人討泌之敗與清之師歸罪於先縠而殺之盡滅其族按先縠違命喪師不可謂忠疑當作先軫左傳僖三十三年狄伐晉及箕先軫免胄入狄師死焉狄人歸其元面如生將覆欒書之族左傳晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋此僕𨽻之所共惜一作惋兒女之所同悲況某擁節臨戎援一作拔非旗誓衆後漢隗囂傳論曰囂援旗糾族封疆甚邇音㫖猶存忍欲賣之以為己功間之以開戎役將祛未寤欲罷不能願思苦口之言漢張良傳良曰忠言逆耳利於行毒藥苦口利於病以定束身之計晉王坦之傳垣之以為悵束身自歸而法外加罪昔先太尉相公常蹈亂邦不從逆命翻身歸國全家受封居韓之西為國之屏棄代之際人情帖然北史尉元傳東南清晏逺近帖然召箋舊書劉悟傳憲宗下誅李師道師道遣悟拒戰悟諸將謀曰天子所誅者司空一人而已悟與公等皆為所驅迫何如轉危亡為富貴于是擒師道以獻擢拜悟義成軍節度使封彭城郡王卒贈太尉太師相公一作國以早副軍牙久從征斾事君之節巳著居喪之禮又彰故乃一作前奬其象賢見為懷州表仍以舊服箋悟遺表請以其子從誎繼纘戎事敬宗寶歷二年充昭義節度等使納職貢賦五十餘年於我唐為忠臣於劉氏為孝子人之不幸天亦難忱書天難諶命靡常才加壯室之年禮記三十曰壯有室奄有壞梁之歎禮記孔子歌曰泰山其頽乎梁木其壞乎哲人其萎乎蓋寢疾七日而殁箋從諫進位檢校司徒㑹昌元年卒大將郭誼等匿喪用其姪稹權領軍務主上深固義烈是降優恩蓋將顯足下之門為列藩之式不欲劉氏有自立之帥上黨為辜恩一作姑息之軍李陵答蘇武書陵雖辜恩漢亦負德俾之還朝以聽復一作故命其義甚著其恩莫階昨者祕不發喪已踰一月安而拒詔又歷數旬祕喪則於孝子未聞拒詔則於忠臣已失失忠於國失孝於家望此用人由兹保族是亦坐薪言泰漢賈誼傳疏曰抱火厝之積薪之下而寢其上火未反燃因謂之安巢幕云安見上尚書啓智士之所寒心史記刺客傳鞠武曰以秦王之暴而積怒於燕足為寒心索隱凡人寒甚則心戰恐懼亦戰今以懼譬寒言可為心戰謀夫之所齚舌漢田蚡傳韓安國謂蚡曰魏其必愧杜門齰舌自殺注師古曰齰齧也音仕客反按齚說文本作齰重文省作齚矧於僕者得不動心竊計足下之懷執事之論當以趙氏傳子魏氏襲候舊書田承嗣傳王武俊稱趙王又新書藩鎮傳論曰成德更二姓傳五世至王承元入朝明年王庭奏反傳六世有州四魏博傳五世至田𢎞正入朝十年復亂更四姓傳十世有州七欲以逡巡希恩顧望謀立耳夫事殊者趣異勢别者跡睽故度其始而議其終搴其華而尋其實願為足下一一而陳之趙魏二候於其先也親則父子於其人也職則副戎賞罰得以相參恩威得以相抗朝廷推而與之今足下之於太師也地則相近職非副戎賞罰未嘗相參恩威未嘗相抗祕喪則於義爽拒詔則於事乖比趙魏二候信事殊而勢别矣此施之於太師趙魏則為繼代象賢之美施之於足下足下則為自立擅命之尤得失之間其理甚白又計足下未必不恃太師之好賢下士重義輕財吳國之錢往往而有漢吳王濞傳吳有豫章郡銅山即招致天下亡命者盜鑄錢梁園之客比比而來漢梁孝王傳孝王築東苑方三百餘里廣睢陽城七十里招延四方豪傑自山東遊士莫不至將倚以為牆藩託以為羽翼使之謀取使以數求細而思之此又非計山髙則羝當作祈羊自至泉深則沈玉自來管子山髙而不崩則祈羊至矣淵深而不涸則沈玉極矣已立然後人歸身正然後士附語有之曰政亂則勇者不為鬭德薄則賢者不為謀故吳濞有姦而鄒陽去漢鄒陽傳云陽與嚴忌枚乘俱事吳吳王隂有邪謀陽奏書諫吳王不納其言于是鄒陽枚乘嚴忌皆去之梁從孝王游燕惠無德而樂生奔戰國䇿惠王即位用齊人反間疑樂毅而使騎劫代之將樂毅奔趙趙封以為望諸君晉寵大夫卒成分國之禍漢劉向傳昔晉有六卿世執朝柄終後六卿分晉衛多君子左傳吳公子札適衛曰衛多君子未有患也孰救渡河之烖左傳狄人伐衛衛懿公夜與國人出狄入衛遂從之又敗諸河此之前車得不深鏡晏子春秋諺曰前車覆後車戒代憲四祖文明繼興當時燕趙中山淮陽齊魯箋新書藩鎮傳論曰趙魏燕齊同日而起梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是連結者幾姓南史魯悉逹傳王琳連結于齊旅拒者幾候後漢馬援傳援曰㸃羌欲旅距咸逆天用人背惠忘德據指掌之地後漢岑彭傳辛臣諫田戎曰洛陽地如掌耳謂可逃刑左傳有罪不逃刑倚親戚之私左傳親戚為戮謂能取信一旦地空家破首裂支分暗者不能為謀明者固以先去悔而莫及末如之何先太尉與李洧尚書箋舊書李納傳納從叔父洧以徐州歸順納以彭城險厄又怒洧背宗乃悉兵圍之旋加洧檢校戶部尚書納卒子師道遞相襲職詳上文齊之密戚齊謂李師道楊太保與蘇肇給事箋舊書吳元濟傳元濟少陽長子也先是少陽判官蘇兆楊元卿及其將侯惟清常同為少陽畫朝覲計及元濟自領軍素不便兆縊殺之朝廷贈蘇兆以右僕射楊元卿先奏事在京師得盡言經略淮西事於宰相李吉甫楊元卿傳元卿每與少陽言詢以大義乃為凶黨所搆賴節度判官蘇肇保持故免元卿潜奉朝廷元濟繼立元卿即日離蔡元卿妻陳氏并四男並為元濟所殺同圬一射垜蘇肇以保持元卿亦同日遇害蔡之懿親蔡謂吳元濟並據要地方州領精甲鋭卒及其王師戾集作涖非止我武維揚則割地驅人以降送欵輸忠以入非不顧密戚非不念懿親非不思恩非不懷惠直以逆順是逼死生實難能與其同休不能與其共戚故也況足下大未侔齊蔡久未及李吳將以其人動於不義僕固恐夙沙之國縳主之卒重生見為李貽孫啓彭寵之家不義之侯更出後漢彭寵傳寵發兵反建武五年春寵獨齎在便室蒼頭子密等斬寵詣闕封不義侯又計足下當恃太行九折之險部內數州之饒見為河南表兵士尚强倉儲且足謂得支久謀而使安危哉此心自棄何速昔李抱真相國用彼州之人破朱滔於燕國困田悅於魏郊連兵轉戰綿嵗經時而潞人夫死不敢哭子死不敢悲何者李相國奉討逆之命為勤王之師義著而誠順故也箋舊書李抱真傳德宗即位兼潞州長史昭義軍節度度支營田澤潞磁邢洺觀察使建中三年田悅以魏博反抱真與河東節度使馬燧屢敗悅兵時悅窘蹙朱滔王武俊皆反連兵救悅抱真外抗羣賊內輯軍士時朱滔悉幽薊軍應泚抱真以大義說武俊合從擊滔大破滔於經城以功加檢校司空卒贈太保及盧從史釋喪就位賣降冀功將乘討伐之時欲肆凶邪之性計未就而人神已怒事未立而兵衆已離以萬夫之長困一卒之手驅檻北闕棄尸南荒而潞之人猶老者捫胸漢書注師古曰捫摸也音門少者扼腕史記刺客傳樊於期偏袒扼腕而進索隱曰掌後曰腕男者奮厲必先以左手扼右腕也扼與扼同謂朝廷不即顯戮深為失刑其故何哉以從史不義不昵左傳公曰不義不昵厚將崩去安就危衆黜其謀下不為用故也箋舊書盧從史傳德宗中嵗從史得授昭義軍節度使丁父憂朝㫖未議起復屬王士真卒從史竊獻誅承宗計以希上意用是起授及詔下討賊隂與承宗通謀且誣奏諸軍與賊通上深患之護軍吐突承璀俟其來博幕下伏壯士縛之內車中馳以赴闕貶歡州司馬子繼宗等四人並貶嶺外二帥去就非因傳聞鳩杖之人後漢禮儀志八十九十禮有加賜玉杖端以鳩為飾鳩者不噎之鳥也欲老人不噎鮐背之叟詩黃耉台背箋台之言鮐也大老則背有駘文釋文台湯來反徐又音臺爾雅云夀也鮐易來反魚名一音夷疏釋詁云鮐背耉老夀人也舍人曰老人氣衰皮膚消瘠背若鮐魚也知其本末尚能言之則太行之險固不為渤疑作悖者之守數州之衆固不為邪者之徒此又其不足恃也由此言之則以何名四字一作則何以敗名譽隳家聲司馬遷書李陵既生降頽其家聲何事捨君命何道求死士何計得一作固人心此僕者所以對案忘餐推枕不寢為足下惜為足下危而不知其所以然也況太師比者養牛添卒畜馬訓兵旁招武幹之材中舉將軍之令然而聽於逺近頗有是非雖朝廷推赤心後漢光武紀降者更相語曰蕭王推赤心置人腹中安得不投死乎𢎞大度漢髙帝紀常有大度然而不逞者已有乖異集作異圖之說橫議者屢興悖惡之歎人之多言亦可畏也誰為來者宜其弭之今足下背季父引進之恩失大朝文誥之令周語祭公謀父曰有文告之辭則是實先太師之浮議彰昭義軍之有謀為人姪則致叔父於不忠為人孫則敗乃祖於無後亦何以對燕趙之士見齊魯之人耶又計足下旬日之前造次為慮今兹追改懼有後艱此左右者不明而咨詢之未盡也近者李尚書祐董常侍重質之輩並親為賊將拒我官軍納質於匪人易比之匪人效用於戎首禮記子思曰毋為戎首久乃來復易七日來復尚䝉殊恩潘嶽馬汧督誄明明天子旌以殊恩皆受郡符咸領旗鼓箋舊書李祐本蔡州牙將事吳元濟自王師討淮西祐為行營將為李訴所擒竟以祐破蔡擒元濟以功授神武將軍太和初遷檢校戶部尚書滄州刺史滄德景節度使董重質本淮西牙將吳少誠之子壻也元濟悉發左右及守城之卒委重質拒裴度李訴既擒元濟重質單騎歸訴尋授鹽州刺史又遷左右神䇿及諸道劍南西川行營節度使檢校左散騎常侍不能悉數厥徒實繁書實繁冇徒豈有足下藉兩代之餘資委數萬之舊旅俯首聽命舉宗效誠則朝廷又豈以一日之稽遲片辭之疑異而致足下於不測沮足下於後至故事具存可以明驗幸請自求多福無辱前人護龍旐以歸洛師禮記飾棺君龍帷書朝至于洛師注洛師猶言京師秉象笏而朝魏闕禮記笏天子以珠玉諸侯以象大夫以魚鬚文竹士竹本象飾可也必當勳庸繼代富貴通身無為鄰道所資使作他人之福儻尚淹歸欵未整來軒戎臣鼓勇以爭先天子赫斯而降怒金玦一受左傳晉候使太子申生伐東山臯落氏衣之偏衣珮之金玦牙璋四馳周禮牙璋以起軍旅魏衛壓其東南晉趙出其西北見為河南表拔距投石者數逾萬計史記王翦傳翦使人問軍中戲乎對曰方投石超距集解徐廣曰超一作拔索隱超距猶跳躍也漢甘延夀傳少為羽林投石拔距絶於等倫應劭曰投石以石投人也拔距即下超踰羽林亭樓是也張晏曰范蠡兵法飛石重十二斤為機發行三百步延夀有力能以手投之拔距超距也科頭㦸手者動以千羣見為滎陽公表兼驅扼虎之材官漢李陵傳陵叩頭自請曰臣所將屯邉者皆荆楚勇士竒材劍客也力扼虎射命中師古曰扼謂捉持之也髙帝紀發巴蜀材官應劭曰材官有材力者張晏曰材官騎士習射御騎馳戰陳常以八月太守都尉令長丞㑹都試課殿最水處則習船邉郡將萬騎行障塞光武時省仍率射鵰之都督北齊書斛律光雲表射鵰正中其頸邢子髙曰射鵰手也號落鵰都督感義則日月能駐淮南子魯陽公與韓戰戰酣日暮援戈而麾之日為之反三舍拗憤則砂石可吞西都賦乃拗怒而少息漢霍去病傳㑹日且入而大風起沙礫擊面龍魚河圖蚩尤食沙使兵用火焚左傳衆仲對曰夫兵猶火也弗戢將自焚也城將水灌史記趙世家知伯率韓魏攻晉陽嵗餘引汾水灌其城城不浸者三版魏趣邢郡箋新書藩鎮傳從諫妻弟裴問守邢州有募兵五百號夜飛將自歸成德軍趙出洺州箋藩鎮傳王釗守洺州送欵魏博軍分二大都之間是古平原之地車甲盡輸於此境􅀈糧反聚於他人恃河北而河北無儲謂三鎮從命見李貽孫啓倚山東而山東不守箋藩鎮傳天子慮稹起山東兵命𢎞敬犄角塞其道以數州之殘殍抗百道之竒兵謂八鎮之師見李貽孫啓比纍卵而未危說苑晉靈公造九重臺孫息聞之求見曰臣能纍十二博棊加九雞子其上公曰子作之孫息以棊子置下加九雞子其上公曰危哉寄孤根於何所見代彭陽公表則老夫不佞亦有志焉願驅敢死之徒以從諸侯之末謂王元逵何𢎞敬劉沔下飛狐之口見為舍人啓入天井之關見代僕射表巨浪難防長飈易扇此際必當驚地底之鼓角駭樓上之梯衝後漢書公孫瓚與子續書曰袁氏之攻狀若鬼神鼓角鳴於地中梯衝舞吾城上喪貝躋陵易震來厲億喪貝躋于九陵飛走之期既絶見為李貽孫啓投戈一作戎非散地揚雄解嘲叔孫通解甲投戈作君臣之儀漢英布傳兵法諸侯自戰其地為散地師古曰謂在其本地戀土懷安故易逸散散去聲灰釘之望斯窮魏略王凌自知罪重試索棺釘以觀太傅意太傅給之遂自殺徐陵書分請灰釘甘從斧鑊自然麾下平生漢李廣傳得賞賜輒分其戲下戲讀曰麾盡忘舊愛帳中親信魏志許禇傳徐他等謀為逆禇至下舍心動即還侍他等不之知入帳見禇大驚愕禇即擊殺他等太祖益親信即起他謀辱先祖之神靈為明時之哂笑靜言其漸良以驚魂今故再遣使車重申丹素惟鑒前代之成敗訪歷事之賔僚思反道敗德之難書蠢兹冇苗反道敗德念順令畏威之易時以吉日蹈兹坦途勿餒劉氏之魂左傳子文曰若敖氏之鬼不其餒而勿汙潞人之俗封帛增欷含毫益酸陸機文賦或含毫而邈然延望還章用以上表成敗之舉慎惟圖之不宣河陽三城節度使王茂元頓首針太倉針漢髙帝紀七年蕭何治未央宫立太倉唐六典司農寺有太倉今掌九穀廩藏之事唐㑹要太倉出納貞元五年俾司農少卿一人專領玉海李商隱有太倉針注云太和七年十月險哉太倉險若太行見為懷州表彼懸車束馬史記齊世家桓公西伐大夏涉流沙束馬懸車登太行至卑耳山為陟髙岡詩陟彼髙岡此禍胎怨府杴乘諫吳王書福生有基禍生冇怨府胎左傳叔孫昭子曰吾不為起自斗量漢歷律志量者籥合升斗斛也無小無大不可不防澄波萬頃不廢汪汪見為桞圭啓火烈人畏左傳子産謂子太叔曰唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難不廢剛腸嵇康絶交書剛腸疾惡曷若寬猛處於中央左傳仲尼曰寬以濟猛猛以濟寬政是以和泉榖之地漢王陵傳陳平曰問錢榖責治粟內史勿言容易東方朔答客難談何容易貪夫徇財賈誼鵬鳥賦貪夫徇財兮烈士徇名有死無二北史傅伏傳伏曰事君有死無二御黠馬銜家語善御馬者正銜勒不得不利下或諛吾過人之聰是人甘言將欲相聾左傳幣重而言甘誘我也史記商君傳趙良曰苦言藥也甘言疾也下或誇我秋毫必睹列子目將眇者先睹秋毫慎子離朱之明察秋毫之末是人甘言將欲相瞽長如欲戰莫捨强弩蜀志强弩之末勢不能穿魯縞長如護禽護富作獲用趙簡子使王良與嬖奚乘事見孟子莫忘縳虎後漢吕布傳曺操笑曰縳虎不得不急衆人之言有訛有真如彼五味有甘有辛口自嘗取無信他人天生五色有白有黑目自别取無為人惑而況乎九門崇崇禮記季春之月命國儺九門磔攘注天子九門者路應雉庫臯國近郊逺郊闔門也近在牆東天視天聽惟明惟聰問籥合斗斛何以用銅取寒暑㬥露不改其容亦象君子介然居中溪律歷志凡律度量衡用銅者名自名也所以同天下齊風俗也銅之為物至精不為燥濕寒暑變其節不為風雨㬥露改其形介然有常似於士君子之行是以用銅也終日戰栗猶懼或失古逸詩唐堯戒曰戰戰栗栗于日謹一日人莫躓於山而躓垤銜用何利煆之以清虎用何縳挼之以明弩用何射發之以誠俾後來居上無由以生有餘不足無由以爭心為準槩何憂乎不直不平漢歷律志以井水準其概孟康曰概欲其直故以水平之井水清清則平也各敬爾職一乃心力書爾尚一乃心力其克有勳倉中水外人馬勿食陶母反魚以之歎息世說陶公少時作魚梁吏常以坩䱹餉母母封䱹付使反書責侃曰汝為吏以官物見餉非惟不益乃增吾憂也豈無他粟豈無他芻薏苡似珠不可不虞後漢馬援傳初拔在交阷常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大軍還載之一車後有上書譛之者以為前所載還皆明珠文犀倉中役夫左傳江芊怒曰呼役夫千徑萬塗桀黠為炭眭盱為爐鵬鳥賦天地為爐兮造化為工隂陽為炭兮萬物為銅西京賦睢盱跋扈魯靈光殿賦洪荒朴略厥狀㫿旴善曰字林睢仰目也盱張目也眭與睢通應事成象無有定一作成模緣私指使曲禮六十曰耆指使慎勿以呼賔朋姻婭詩瑣瑣姻婭則無膴仕或來宴話倉中酒醴慎勿以貰漢髙帝紀常從王媪武負貰酒師古曰貰賖也海翁無機鷗故不飛海翁易慮鷗乃飛去莊子海上有人好鷗鳥者旦而之海上從鷗鳥遊鷗鳥至者數百其父曰吾聞鷗從汝遊試取來吾從玩之曰諾明旦之海上鷗鳥舞而不下是以聖人從微至著漢董仲舒傳莫不以以暗至明積微至者不遺忠恕借借貸貸此門先塞須防蒼蠅變白作黑詩營營青蠅止于棘箋蠅之為蟲汙白使黑汙黑使白喻佞人變亂善惡也嗚呼孰慮孰圖詩旻天疾威弗慮弗圖昔在漢家倉令淳于致令少女上訴無辜陷身至是不亦悲乎史記太倉公者齊太倉長臨菑人也姓淳于氏名意文帝四年意以刑罪當𫝊西之長安其少女緹縈隨父西上書願入身為官婢以贖父刑罪書聞上悲其意此嵗中亦除肉刑法敢告君子身可殺道不可渝李義山文集箋注卷八
