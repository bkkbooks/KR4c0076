body:
  text: 李義山文集箋注卷七監察御史徐樹穀箋山東提學僉事徐炯注祭文下祭處士房叔父文詳祭裴氏姊文房字上應有十二二字某爰在童䝉易匪我求童䝉最承教誘違訣雖久音㫖長存晉中興書東海王越敕子毗曰諷味遺言不如親承音㫖近者以檀山舊塋忽罹風水水經注索水出京縣西南嵩渚山北流徑京縣故城西城北有壇山岡按京縣故城在今河南開封府滎陽縣東南二十里壇山即檀山其山四絶孤峙山上有塢聚俗謂之檀山聚新書劉禹錫傳葬滎陽檀山原山今在縣西有劉禹錫墓也義山懷州河內人距滎陽二百里而近故先塋在焉郭璞葬經內篇氣乘風則散界水則止古人聚之使不散行之使有止故謂之風水夀堂圯壞陸機挽歌夀堂延鬼魅注夀堂祭祀處冡樹凋傾雖崩則不修聞諸前哲一作聖禮記孔子既得合葬於防孔子先反門人後雨甚至曰防墓崩孔子泫然出涕曰吾聞之古不修墓但墜而罔治御覽輿地志曰琵琶圻有古墓半在水中甓有隱起字云筮云吉龜云凶八百年墜水中那俟他人况真德貽一作昭誤芳鴻儒著美文心雕龍磊落鴻儒豈可令趙岐之表墊彼𤣥扃見為濮陽公文郭泰之碑淪於夜壑見代李𤣥文載惟瑊頊二子名藐爾孤冲誠呌號之不停顧營辦之無素南史劉歊傳歊已先知手自營辦詳上表某等輒考諸蓍筮晉左貴嬪傳楊皇后誄曰乃考龜筮龜筮襲吉别卜丘封使羲叟以令日吉時奉移神寢奢無僭縟儉免虧疏是期永閟尊靈長安幽穸文心雕龍武帝誄云尊靈永蟄詳上表眠牛有慶自及于諸孤晉書陶侃微時丁艱將葬家中忽失牛遇老父謂曰前岡見一牛眠地若葬位極人臣白馬垂祥豈均於猶子博物志公卿送夏侯嬰葬至東都門外馬不行按地悲嗚得石槨葬之追懷莫及感切徒深更思平昔之時兼預生徒之列陸公賜杖念榮益以何成晉中興書謝安嘗詣陸納納兄子俶遂陳盛饌安去納杖俶四十云汝既不能光益叔父奈何穢吾素業殷氏著文愧獻酬而早屈晉殷浩傳浩與叔父融俱好老易融與浩口談則辭屈著篇則融勝浩引進之恩方極禍凶之感徒一作俄鍾誰言一紀之餘又奉再遷之兆孝經卜其宅兆而安厝之哀深永往情極初聞矧宗緒衰微簪纓殆歇晉謝尚傳尚議曰婚姻將以繼百世崇宗緒詳上啓五服之內禮記喪多而服五上附下附列也注大功以上附於親小功以下附於疏五服之上下附也一身有官將使澤底名家翻同單系李肇國史補四姓滎陽鄭岡頭盧澤底李士門崔皆為鼎甲山東舊族不及寒門新書柳冲傳過江則為僑姓王謝袁蕭為大東南則為吳姓朱張顧陸為大山東則為邵姓王崔盧李鄭為大關中亦號邵姓韋裴柳薛楊杜首之晉劉毅傳疏曰上品無寒門下品無世族靜思肯構之文敢怠成書之託見上啓瑊等既幽明無纍年志漸成後漢第五倫傳疏曰年盛志美則當授以詩書諭其一作以婚宦列子語有之曰人不婚宦情欲失半使蒸嘗有奉名教無虧靈其鑒此微忱助夫至願敢以求於必大庶免歎於忽諸左傳臧文仲聞六與蓼滅曰皋陶庭堅不祀忽諸迫以哀憂兼之瘵恙見上啓曽非遐逺不獲躬親瀝血裁詞南史袁昂傳啓曰披心瀝血敢乞言之叩心寫懇後漢張奐傳奏記曰凡人之情寃則呼天窮則叩心長風吹浪敢忘昔日之規南史宗慤小時叔父少文問其所志答曰願乘長風破萬里浪南巷齊名永絶今生之望世說阮仲容步兵居道南諸阮居道北北阮皆富南阮貧冀因薄奠魏志武帝紀遣使以太牢祀橋𤣥注公祝文曰裁致薄奠公其尚饗少降明輝延慕酸傷不能堪處苦痛至深永痛至深為馮一作鄭從事妻李氏祭從父文有美吾門實繫公族見上狀絳霄結蔭皇極流輝郭璞遊仙詩振髮帶翠霞解褐披絳霄詳上文自嚴君以交辟延榮易家人有嚴君焉仲父以立朝衍慶叔父雖禮疏五服而義協一家馬援於兒姪之間一情無異後漢馬援傳兄子嚴敦嚴字威卿父余援常與計議委以家事南史王僧䖍曰昔馬援子姪之間一情不異王華在兄弟之列數從猶親南史王琨傳琨華從父弟也琨伯父廞得罪晉世諸子並從誅唯華得免華宋世貴盛以門衰提攜琨恩若同生為之延譽吉人辭寡見易君子無爭見論語屬者以獻賦不遇投筆從戎漢書司馬相如獻上林子虛賦王筠詩獻賦甘泉宫詳上表鏡水稽山聊屈觀書之望輿地志山陰南湖縈帶郊郭白水碧巖互相映發若鏡若圖故王逸少云山陰路上行如在鏡中遊㑹稽記漢順帝永和五年㑹稽太守馬臻創立鏡湖在㑹稽山陰兩縣界左傳晉侯使韓宣子來聘觀書於太史氏揚雄遺劉歆書得觀書於石室甬東浙右始開傳集作侍非劒之名吳語越王使人告吳王曰寡人其達王於甬句東注句音鉤甬句東今句章東海口外洲也史記吳世家越王句踐遷夫差於甬東集解賈逵曰甬東越東鄙甬江東也孔稚圭北山移文馳妙譽於浙右詳上表經途幾千任昉哭范僕射詩與子别幾辰經塗不盈旬去國數載爰因職貢來奉闕庭漢兩粵傳長為藩臣奉貢職庾信表不獲躬親闕庭傳車方馳朝露溘至禍生朽索釁起揚鞭書凛乎若朽索之馭六馬江總詩揚鞭向柳市詳上丈始驚香而不禁俄折臂而無望原注因墜馬死故云云魏志朱建平善相馬曰此馬今日死馬惡衣香齧帝膝帝怒殺之晉羊祜傳祜墮馬折臂嗚呼存亡恆集作定理修夭常期所悲者方次中塗所痛者非因美疢稅鞅告痛謝朓詩無由稅歸鞅肩輿數晨既針艾之莫徴南史袁粲傳火艾針藥莫不畢具詳上啓果含去聲禭而斯及穀梁傳衣衾曰禭貝玉曰含况乎合室逺在海涯一女方羈二子未丱人生甚痛天道奚言江淹恨賦人生至此天道寧論詳上啓今以家國載遙干戈未息尚稽歸祔禮記魯人之祔也合之注祔謂合葬也乃議從權謂旅殯也定鼎城東帝王世紀春秋成王定鼎於郟鄏其南門名定鼎門蓋九鼎所從入也永通門外隋地理志大業元年移都改曰豫州東面三門南曰永通南瞻嵩嶺戴延之西征記嵩髙中嶽也東謂太室西謂少室相去十七里嵩其總名也北望邙山張載七哀詩北邙何壘壘髙陵有四五注北邙山名也式崇寓殯之封且作藏神之室必也慶延異日時屬通年先溫序之思歸見代僕射表俟臧孫之有後見為裴懿文二十一姪女早䝉慈撫久歎違離今又從夫山東食貧洛水詩三嵗食貧將療無及驚悲有加敢因祭酹集作酒醊之馨聊冀精靈之降見上文嗚呼叔父永鑒卑誠祭韓氏老姑文原注故安定韓尚書太夫人猗歟我家世奉𤣥德讓弟受封後漢丁鴻傳綝卒鴻當襲封讓國於弟盛不報既葬乃挂衰絰於冡廬而逃去勤王賜國左傳子犯曰求諸侯莫如勤王名芳彞鼎禮記衛孔悝鼎銘悝拜稽首曰對揚以辟之勤大命施於蒸彞鼎勳盈史冊季孟國髙秦晉欒郤按季孟國髙謂在國髙之間秦晉欒郤謂與欒郤為匹左傳秦晉匹也論語以季孟之間待之恭惟柔範載禀淵塞詩仲氏任只其心塞淵晉袁塞宏傳贊曰公衡冲達秉志淵既作女師宋玉神女賦顧女師善曰古者皆有女師教以婦德漢外戚傳班婕妤誦詩及窈窕德象女師之篇乃為嬪則謝朓哀䇿思媚諸姑貽我嬪則潁水波清梁園月明西京雜記梁孝王遊於忘憂之館集諸遊士使各為賦公孫乘為月賦詳上表言旋百兩且拜雙旌託一作計侯令弟謝靈運詩末路值令弟配國名卿見上文入從述職出輔專征禮記王制諸侯賜弓矢然後征晉虞預傳疏曰淮夷作難召伯專征螽斯不妬詩序螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也鳯凰和鳴左傳懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛其鳴鏘鏘此時同慶東郡一作都分榮魏地形志東郡秦置治滑臺城使者責梁漢文三王傳梁王怨爰盎使人刺殺盎天子遣使冠蓋相望於道覆按梁事使者責二千石急梁相軒丘豹及內史安國皆泣諫王王乃令羊勝公孫詭皆自殺出之公子專魏史記信陵君傳魏安釐王二十年秦昭王已破趙長平軍又進兵圍邯鄲公子姊為趙惠王弟平原君夫人數遺魏王及公子書請救於魏使者冠蓋相屬魏王畏秦終不聽公子用侯生計殺晉鄙將晉鄙軍擊秦秦兵解去帝念元昆人思仲氏杖節赴敵晉宣帝紀諸葛亮復來挑戰帝將出兵以應之辛毗杖節立軍門帝乃止斬芻盡瘁後漢第五倫傳倫攝㑹稽太守雖為二千石躬自斬芻養馬無以家為或從王事易或從王事無成有終詳上表禮優內子左傳趙姬以叔隗為內子而已下之禮記卿之配曰內子大夫之配曰孺人曰命婦詩美夫人詩序鵲巢夫人之德也冕紘瑱紞魯語敬姜曰王后親織𤣥紞公侯之夫人加之以紘綖左傳臧哀伯諫曰衡紞紘綖昭其度也注衡維持冠者紞冠之垂者紘纓從上而下者山蕨澗蘋詩序草蟲大夫妻能以禮自防也其詩曰陟彼南山言采其蕨采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣其詩曰于以采蘋南澗之濵子元罕見漢朱博傳博字子元夜寢早起妻希見其面冀缺如賔左傳初臼季使過冀見冀缺耨其妻饁之敬相待如賔緑衣有感翟茀仍新詩序緑衣衛莊姜傷已也妾上僭夫人失位而作是詩也碩人閔莊姜也其詩曰翟茀以朝遽歎逝一作夜川遄聞晝哭禮記穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣原阡舊署漢游俠傳京兆民曹氏葬茂陵民謂其道為京兆阡原涉慕之乃買地開道立表署曰南陽阡人不肯從謂之原氏阡孟鄰斯卜列女傳孟母舍近墓孟子之少也嬉戲為墓間之事踊躍築埋孟母曰此非所以居處子也乃去舍市旁其子嬉戲為賈又曰此非所以居處子也乃舍學宫之旁其子遊戲乃設俎豆揖讓進退曰此可以居處子矣長遂成大儒詳上表閒居獻夀潘嶽閒居賦序太夫人在堂有羸老之疾尚何能違膝下色養而屑屑從斗筲之役乎乃作閒居之賦曰稱萬夀以獻觴或一懼而一喜作賦之官東征賦注曹大家集曰子榖為陳留長大家隨至官作東征賦弓裘望襲菽水承歡禮記孔子曰啜菽飲水盡其歡斯謂之孝詳上表福善餘慶好謙舊祉書天道福善禍淫詳上文復自良人集於之子爰從上蔡去臨易水地理志蔡州汝南郡領上蔡縣詳上啓空報登壇見為懷州表未聞曵履見上河東公啓鼂父先歸莫之能比漢鼂錯𫝊錯所更令三十章諸侯讓譁錯父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死趙母上言蓋不得已史記趙奢傳趙王以括為將代亷頗其母上書言於王曰括不可使將趙括既代亷頗秦軍射殺趙括寒暄結患燥濕為疵徒虛百祿靡效三醫詩百祿是荷詳上啓嗚呼夀夭所賦彭殤不移莊子莫夀乎殤子而彭祖為夭誰能了悟孰不憂悲何兹達識乃克先知同易簀以就正禮記曽子寢疾病曽元曽申坐於足童子曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變曽子曰吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒如買棺而指期南史張融卒遺令曰吾平生所善自當凌雲一哭三千買棺無置新龕苟有所纍安能及斯道逺轘轅左傳使侯出諸轘轅初學記轘轅關在洛陽程遙河洛建旐臨塗移舟就壑見上文日慘林嶺疑是林巒風凄灌薄積靄茫茫行煙漠漠謝朓詩生煙紛漠漠某等誠深通舊情協先親始自童子至於成人年將二紀恩冠六姻隋書鄭善果母謂善果曰今此秩俸當須散贍六姻念升堂之如昨吳志周瑜字公瑾堅子䇿與瑜同年獨相友善瑜推道南大宅以舍䇿升堂拜母有無通共慟幽夜之無晨陸機挽歌大暮安可晨注張奐遺令曰地底冥冥長無曉期歌停行路舂輟比鄰曲禮鄰有喪舂不相里有殯不巷歌史記商君傳趙良曰五羖大夫死童子不歌謡舂者不相杵漢孫寶傳寶祭竈請比鄰雖寓辭之有所終含酸而莫伸江淹恨賦亦復含酸茹歎壺清愧酎直救反漢書注酎三重釀醇酒也俎薄羞芹惟餘彤管有美清塵詩靜女其變貽我彤管傳古者后夫人必有女史彤管之法史不記過其罪殺之事無大小記以成法詳上文狀表嗚呼尚饗為李郎中祭舅竇端州文新書地理志嶺南道端州髙要郡領縣二髙要平興始虞命集作燕非夏暴於𤣥穹功垂刊木書禹敷土隨山刊木德協湮洪漢溝洫志夏書曰禹堙洪水堙與湮同洎帝相之難作誕少康於竇中由屯獲吉因生受封左傳伍員曰昔有過澆殺斟尋滅夏后相后緡方妊逃出自竇歸於有仍生少康焉新書宰相世系表竇氏出自姒姓夏后氏帝相失國其妃有仍氏女方妊逃出自竇奔歸有仍氏生子曰少康少康二子曰杼曰龍留居有仍遂為竇氏降及後代傳勳繼庸周禮司勳掌六鄉賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多西京則嬰為外戚漢竇嬰傳嬰字王孫孝文皇帝后兄子也父世觀津人上察宗室諸竇無如嬰賢師古曰諸竇總謂帝外家也東漢則融居上公後漢竇融傳融字周公扶風平陵人也隴蜀平數月拜為冀州牧十餘日又遷大司空愍陽城之不享陽城疑是安成漢外戚傳竇皇后親早卒葬觀津薄太后乃詔有司追封竇后父為安成君母為安成夫人始移籍於扶風宰相世系表龍六十九世孫鳴犢為晉大夫竇氏遂居平陽鳴犢六世孫誦二子世扈世生嬰漢丞相魏其侯也扈二子經充充避秦之難徙居清河漢贈安成侯葬觀津二子長君廣國廣國字少君章武景侯二子定誼誼生賞襲章武侯宣帝時以二千石徙扶風平陵二子夀雍雍二子敷秀秀子林徙居武威融其孫也源逺更清基髙自集作足峻有卓明靈靄然休問見上狀陋巷不憂坦途方進月逺標儀南史齊王儉傳風儀與秋月齊明音徽與春雲等潤霞髙映論北山移文使我髙霞孤映玉寧韞櫝見論語錐安處囊見上狀宜伸尚屈見上文將集猶翔見論語潛師大易謙尊以光易謙尊而光卑而不可踰誓安老氏債少易償老子是以聖人執左契而不責於人吕注右契所以取左契所以與則左契者常以與人而不為物主者也爰紆銅墨漢百官公卿表秩比六百石以上皆銅印墨綬是宰濠梁莊子莊子與惠子遊於濠梁之上宓琴時奏見為濮陽公狀潘樹逾芳見為賀拔員外啓入贊朝儀漢叔孫通傳臣願徵魯諸生與臣弟子共起朝儀言揚事舉禮記或以事舉或以言揚圭璧蠻夷謂執玉來朝也辨冕文武左傳劉定公謂趙孟曰吾子辨冕以臨諸侯吐辭含韻知今博古晉石崇傳使者曰君侯博古通今察逺照邇進抑退揚從規合矩禮記古之君子必佩玉右徵角左宫羽趨以采齊行以肆夏周還中規折還中矩進則抑之退則揚之然後玉鏘鳴也復陶啓位左傳楚子次於乾溪雨雪王皮冠秦復陶注秦所遺羽衣也疏冒雪服之知是毛羽之衣可以禦雨雪也箋復陶啓位頗難解或舉以問余余沉思數日而始得之復陶羽衣也楚靈王所服後世則道流服之殆取輕舉之意封禪書武帝使欒大衣羽衣受印是也竇端州蓋始嘗為老莊之學隱居著道士服後乃出山入仕如王希夷吳筠之輩三洞道科言道士有五其一曰山居道士許由巢父之比也魏徵少亦出家為道士及唐之中葉人主益崇道教即志在用世者不妨寄跡黃冠昌黎集有送張道士序亦其類也觀上文大易老氏等語則羽衣為竇之初服無疑矣不欲斥言其道流故廋辭隱語不曰羽衣而曰復陶耳殿省承榮後漢宦者傳漢興置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省按省音所景切星上聲禁署也漢避元后父王禁諱改禁中為省中唐制有尚書門下中書祕書殿中內侍六省孔門之束帶無忝見論語叔孫之綿蕝難更漢書叔孫通起朝儀以所徵三十人及上左右為學者與其弟子百餘人為綿蕞野外習之如淳曰謂以茅翦樹地為纂位尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並音子悅反按竇蓋釋褐縣令入為鴻臚故云然舊書職官志鴻臚寺領典客司儀二署君子信讒詩君子信讒如或酬之小人道長易小人道長君子道消也未暇閉關難期稅鞅顔延之詩劉伶善閉關詳上文暫持符竹逺出羅網見上表誰識卑飛吳越春秋扶同曰鷙鳥將搏必卑飛戢翼因成利往易利有攸往銅梁改秩蜀都賦外負銅梁於宕渠向曰銅梁山名元和郡縣志銅梁山在墊江縣南九里按墊江今四川重慶府之合州是也錦里經時華陽國志成都西城故錦官城也錦江織錦濯其中則鮮明他江則不好故命曰錦里人去而琴臺壞棟寰宇記益部耆舊傳云相如宅在少城中笮橋下百步許有琴臺在焉成都記琴臺院以相如琴臺得名而非其舊舊臺在城外浣花溪之海安寺南今為金花寺元魏伐蜀下營於此掘塹得大甏二十餘口蓋所以響琴也隋蜀王秀更增五臺并舊為六文移而石室摧基華陽國志文翁為蜀郡守造講堂石室一名玉堂安帝永初間烈火為灾惟石室獨存太守髙朕於玉堂東復造一石室為周公禮殿水經注文翁立講堂作石室於南城後守更增二石室劉𢎞之重銘葛廟蜀志諸葛亮傳注蜀記晉永興中鎮南將軍劉𢎞至隆中觀亮故宅立碣表識寰宇記諸葛武侯廟在先主廟西方輿勝覽在成都府西北二里少城內桓溫平蜀夷少城獨存孔明廟王商之更立嚴祠益部耆舊傳王商字文表廣漢人劉璋以商為蜀郡太守與嚴君平李𢎞立祠作銘寰宇記嚴君平宅在益州西一里耆舊傳云卜肆之井猶存隴首云歸柳惲詩隴首秋雲飛端溪遽逐唐端州今廣東肇慶府治是也明一統志大江在府城西南又名西江即端溪也深廣澄演下流入海角豈觸藩易羝羊觸藩羸其角臀終困木易臀困於株木海闊天盡山深霧毒許靖他鄉有名無祿見為鹽州狀馬超正色宜歌反哭蜀志馬超字孟起右扶風茂陵人父騰靈帝末與邊章韓遂等俱起事於西川超領騰部曲軍敗超走保諸戌曹公追至安定復奔漢中依張魯聞先主圍劉璋於成都密疏請降章武元年遷驃騎將軍領凉州牧進封漦鄉侯二年卒臨沒上疏曰臣門宗二百餘口為孟德所誅略盡惟有從弟岱當為微宗血食之繼深託陛下餘無復言何為善之無憑而降灾之甚速書皇天降灾詳上文某欽惟教義夙所依因在昔家世勤王實殷髙旌大斾結駟飛輪李康運命論子思遊厯諸侯莫不結駟而造門詳上文慶豈遺于自出榮實垂集作萃於外姻見上啓狀一紀以來艱凶遄及嗟宅相以無取懼堂構之不集王隱晉書魏舒字陽元任城人幼孤為外氏寧家所養寧氏起宅相者曰當出貴甥舒曰當為外氏成比宅相後纍官侍中司徒詳上啓詎言渭水之乖離詩我送舅氏曰至渭陽竟絶西川之出入見為舍人啓嗚呼哀哉違京背闕古陌荒阡松門積靄隴首停集作行煙謝靈運詩牽葉入松門詳上文祖庭是日乞墅何年禮記子遊曰飯于牖下小斂于户內大斂于阼殯於客位祖於庭葬於墓所以即逺也廣韻乞與人物也音丘既切詳上文淚有血而皆裂一作皆墮按眥當作皆裂宜仍舊詳上表憤無膺而可填江淹恨賦置酒欲飲悲來填膺況玕剖郡符璟持使節玕璟竇端州二子名也王褒聖主得賢臣頌剖符錫壤以光祖考塞逺城迥河窮路絶顧後瞻前形孤影孑典引次於聖心瞻前顧後張翰詩單形依孤影長號出次重拜臨穴任眆為苑始興表長號北陵詩臨其穴惴惴其栗酒醴清濃肴羞羅列詩為酒為醴以洽百禮庶有鑒于斯文冀不同於虛設漢賈捐之傳遙設虛祭想魂乎萬里之外嗚呼尚饗重祭外舅司徒公文箋新書王茂元卒贈司徒諡曰威詳上河東公啓嗚呼哀哉人之生也變而往邪人之逝也變而來邪冥寞之間謝惠連祭古冡文既不知其名字逺近故假為之號曰冥漠君杳忽之內虛變而有氣氣變而有形形變而有生莊子離乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春夏秋冬四時行也今將還一作歸生於形歸形於氣漠然其不識浩然其無端一作歸則雖有憂喜悲歡而亦勿能措一作用於其間矣苟或以變而之有變而之無若朝昏之相交若春夏之相易則四時見代尚動於情豈百生莫追遂可無恨倘或去此亦孰貴於最靈哉書人惟萬物之靈嗚呼公之世胄勳華職官揚厯並已託於寄奠備在前文今所以重具酒牢載形翰墨蓋意有所未盡痛有所難忘以公之平生恩知曩昔顧盻屬纊之夕不得聞啓手之言祖庭之時不得在執紼之列終哀且痛其可集作何非道邪嗚呼七十之年人誰不及三公之位人誰不登何數月之間不及從心之嵗聞天有慟方登論道之司謂贈司徙時泰命屯顔延之應詔詩途泰命屯恩充報屈才長運否為善何益彼蒼難知昔澤怪既明告一作吉非敖釋桓公之病莊子桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒為病數日不出齊士有皇子告敖者曰澤有委蛇見之者殆乎霸桓公辴然而笑曰此寡人之所見者也於是正衣冠而坐不終日而不知病之去也陰德未報夏侯知丙吉不亡漢丙吉傳封吉為博陽侯臨當封吉疾病夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫後病果愈何昔有其傳今無其證豈人言之不當將天道之或欺雖北海懸定薨期見為裴懿文長沙前覺灾至見代李𤣥文偃如巨室見祭楊郎中文去若歸人見代彭陽公表處順不憂莊子適來夫子時也適去夫子順也安時而處順哀樂不能入也得正之喜見祭韓氏姑文在公之德斯盛在物之痛何言矧乎再軫慮居屢垂理命理讀曰治見上表簡子將戰之誓惟止桐棺左傳趙簡子誓曰若其有罪絞縊以戮桐棺三寸不設屬辟素車朴馬無入於兆下卿之罰也晏嬰送死之文寧思石槨禮記有若曰晏子遣車一乘及墓而反國君七箇遣車七乘大夫五箇遣車五乘晏子焉知禮又昔者夫子居於宋見桓司馬自為石槨三年而不成夫子曰若是其靡也死不如速朽之愈也素車朴馬疏巾弊帷吳志吕岱傳遺令殯以素棺疏巾布褠禮記仲尼曰吾聞之也敝帷不棄詳上文成一代之清規揚百年一作古之休問晉王湛等傳論曰素德清規足傳於汗簡詳上狀所謂有始有卒髙明令終詩髙朗令終嗚呼往在涇川謂為涇原節度使始受殊遇綢繆之迹盧諶贈劉琨詩序綢繆之㫖有同骨肉豈無他人詩豈無他人不如我同父樽空花朝燈盡夜室忘名器於貴賤去形迹於尊卑語皇王致理之文集作源見上表考聖哲行藏之㫖見論語每有論次必䝉褒稱及移秩農卿分憂舊許左傳晉荀瑩至西郊東侵舊許箋新書王茂元傳鄭注敗悉出家資餉兩軍得不誅封濮陽郡侯召為將作監領陳許節度使羈牽少暇陪奉多違跡疏意通期奢道密紵衣縞帶雅况或比於僑吳見滎陽公狀荆叉布裙髙義每符於梁孟後漢梁鴻傳鴻字伯鸞扶風平陵人也聘同縣孟氏及嫁始以裝飾入門七日而鴻不答妻乃請曰竊聞夫子髙義今而見擇敢不請罪乃更為椎髻荆叉布裙操作而前鴻大喜字之曰德耀名孟光今則已矣安可贖乎集作兮詩如可贖兮人百其身嗚呼哀哉千里歸塗東門故第數尺素帛一爐香煙耿賔從之云歸范雲贈張徐州稷詩賔從皆珠玳儼盤筵而不御後漢王渙傳渙喪西歸道經𢎞農民庶皆設槃案於路小君多患諸孤善喪登堂輒啼下馬先哭喪大記始卒主人啼兄弟哭含懷舊極撫事新傷植玉求歸已輕於舊日搜神記羊公雍伯雒陽縣人性篤孝父母終葬無終山遂居焉山髙八十里上無水公汲水作義漿於阪頭行者皆飲之三年有人就飲以石子一斗與之使至髙平好地有石處種之玉當生其中羊公未娶又云汝後當得好婦語畢不見種其石數嵗有徐氏右北平著姓女公乃試求徐氏徐氏戲云以白璧一雙來當聽為婚公於所種石中得五雙白璧以贄徐氏徐氏大驚遂以女娶公天子異之拜為大夫於種玉處四角作大石柱各一丈中央一頃地曰玉田泣一作立非珠報惠寧盡於兹辰吳都賦淵客慷慨而泣珠博物志南海外有鮫人水居如魚不廢績織其眼泣則能出珠出人間賣綃臨去從主人索器泣而出珠以與主人况邢氏吾姨詩東宫之妹邢侯之姨蕭門仲妹愛深猶女思切仁兄後漢趙一傳一報曰實望仁兄昭其懸達撫嫠緯以增摧左傳嫠不恤其緯而憂宗周之隕為將及焉闔孀閨而永慟淮南子寡婦曰孀草荄土梗說文荄草根也莊子魏文侯曰吾所學者真土梗耳旁助酸辛髙鳥深魚遙添怨咽嗚呼精神何往形氣安歸苟寸能有所未伸勳庸有所未極則其强氣宜有異聞玉骨化於終山集作鍾山淮南子鍾山之玉炊以爐炭三日三夜而色澤不變得天地之精也楸柏實於裘氏禮記衛有太史曰柳莊寢疾公曰君疾革雖當祭必告再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納之棺曰世世萬子孫無變也驚愚駭俗佇有聞焉嗚呼姜氏懷安之規既聞之矣左傳晉公子重耳及齊齊桓公妻之姜曰行也懷與安實敗名畢萬名數之慶可稱也哉集作夫見為成魏州表篋有遺經匣藏傳劒積兹餘慶必有揚名愚方遁跡丘園易賁于丘園游心墳素潘嶽閒居賦傲墳素之長圃前耕後餉用左傳冀缺事并食易衣禮記易衣而出并日而食不忮不求道誠有在自媒自衒見為張周封啓病或未能枚乘七發太子曰僕病未能也雖吕範以久貧吳志吕範字子衡汝南細陽人也邑人劉氏女美範求之女母欲勿與劉氏曰觀吕子衡寧當久貧者邪遂與之婚幸冶長之無罪見論語昔公愛女今愚病妻內動肝肺外揮血淚得仲尼三尺之啄論意無窮莊子仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已曰丘願有啄三尺盡文通五色之毫書情莫既見為山南啓嗚呼哀哉公其鑒之為李兵曹祭兄亳州刺史文毫州望領縣八譙酇城父鹿邑真源臨渙永城䝉城伏惟靈天枝挺秀帝系傳芳材髙把梓見為賀拔員外啓價集作位重圭璋禮記圭璋特達德也蘭芷斯茂先以馨香南史王僧孺傳任昉贈詩曰敬之重之如蘭如芷曹植七啓酷烈馨香干鏌將用不挫鋒鋩吳越春秋干將者吳人造劒二枚一曰干將二曰莫邪庾信神道碑鎮北鋒鋩始備千牛俄仕諸衛通典千牛刀名後魏有千牛備身掌執御刀因以名職顯慶五年置左右千牛府後改為衛置大將軍一人將軍各一人以副之逸意方起絶足猶繫孔融書燕君市駿馬之骨非欲以聘道里乃當以招絶足也爰佐羣僕亦掾神京謝朓哀䇿背神京之𢎞敞邑惟二宅見為懷州表曹實五兵初學記魏有吏部左民客曹五兵度支凡五曹尚書地峻流急官閒政清嵩少曉霽見為馮從事妻文伊洛秋明侣能吟之謝客鍾嶸詩品謝客為元嘉之雄顔延年為輔客兒靈運小名也伴作賦之賈生漢藝文志賈誼賦七篇遂擢堯㕑帝王世紀堯時㕑中自生肉脯薄如翣搖則風生使食物寒而不臭名曰翣脯曽一作仍調湯膳位列大朝名參內殿王粲詩晝日處大朝日暮薄言歸吳志吕蒙傳䝉疾發權時在公安迎置內殿朱紱輝華銀龜蒨粲見為濮陽公表漢有宗正委之親賢漢書劉德字路叔為宗正與立宣帝地節中以親親行謹厚封為陽武侯二彼惟月人寧我先書卿士惟月外夷求聘天子憂邊皇華始賦紫綬俄懸詩序皇皇者華君遣使臣也詳上啓雄其出塞之任假以中臺之權漢胸奴傳凡五將軍兵十餘萬騎出塞各二千餘里詳上表不拜無慙於蘇武漢蘇武傳武引佩刀自刺武氣絶半日復息單于愈益欲降之乃幽武置大窖中絶不飲食天雨雪武卧齧雪與旃毛并咽之數日不死去節寧類於王焉漢胸奴傳漢使王烏等窺胸奴胸奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習胡俗去其節黥面入廬單于受之王烏此作王焉按藝文類聚引漢使王焉等窺胸奴足證今本漢書之誤銜䰅誓死後漢獨行傳溫序為隗囂别將苟宇所拘劫序受劒銜䰅於口顧左右曰既為賊所殺無令䰅汙土遂伏劒而死齧雪獲全帝仗使者吾無愧旃既返中華止同屬國李陵答蘇武書聞子之歸贈不過二百萬位不過典屬國蒼蠅難祛一作備非曹植詩蒼蠅間白黑讒巧令親疏貝錦方織見祭吕商州文好丹非素江淹雜體詩序至於世之諸賢各滯所迷莫不論甘而忌辛好丹而非素點白為集作成黑遭時不知非豫有戚既失志於綘灌見為綘郡公文遂不容於欒郤左傳宣公十五年晉三郤害伯宗譖而殺之初伯宗每朝其妻必戒之曰子好直言必及於難又成公八年晉趙莊姬為趙嬰之亡故譖之於晉侯曰原屏將為亂欒郤為徵六月晉討趙同趙括竟陵山水舊書地理志復州竟陵郡上本沔陽郡治竟陵貞觀七年徙治沔陽天寶元年更名寶應二年復故鍾離控扼地理志濠州鍾離郡上濠字初作豪元和三年改從濠名貴隼旟時瞻熊軾見上表人以功遷吾由謗得其明若神漢黃霸傳霸為㯋川太守吏民不知所出咸稱神明其惠如春曹植七啓民望如草我惠如春先除黠吏漢尹翁歸傳拜東海太守輒披籍縣縣收取黠吏豪民案致其罪且活疲民王融䇿秀才文豈布政未優將疲民難業汙萊盡闢詩田卒汙萊邑室重新草祥木瑞後漢何敞傳京師及四方果有奇異鳥獸草木言事者以為祥瑞獸去鳥馴後漢魯恭傳恭為中牟令螟不入界河南尹袁安使掾肥親覘之恭與親坐桑下有雉過止其旁旁有童兒親曰何不捕之兒曰雉方將雛親歎其三異獸去見為裴懿文方侯徵還俄嬰美疢積微而桓侯竟晚見為裴懿文達命而徐公待盡晉魏舒傳識者以此稱其達命南史徐廣傳武帝受禪恭帝遜位廣又涕泗交流謝晦謂曰徐公將無小過廣言墳墓在晉陵丹徒又生長京口息道𤣥忝宰此邑乞隨之官歸終桑梓年過八十猶嵗誦五經一遍元嘉二年卒恍恍空驚司馬相如長門賦神恍恍而外淫善曰王逸楚辭注恍失意也遲遲未信誰知泉路之髙低見上表孰測夜臺之逺近阮瑀七哀詩冥冥九泉室漫漫長夜臺永惟良配亦實女師庶姜尤效君子是宜異室無怨同穴有期詩庶姜孽孽穀則異室死則同穴詳上文河魴著詠皎日裁詩詩豈其食魚必河之魴又謂子不信有如皎日嗚呼哀哉龜筮協從日時斯卜將去荒郊陶潛挽歌送我出逺郊言辭華屋曹植詩生存華屋處零落歸山丘草樹縈帶孫子兵法草樹䝉蘢川原回復白髮孤弟臨棺慟哭失慈撫於終身宛聲容之在目心摧則冰炭交集郭象莊子注喜懼交集於胸中固已結冰炭於五臟矣血下而綆縻相續見祭吕商州文萬古永訣百身何贖酒滿未御肴乾未臨已矣伯氏來慰哀心祭小姪女寄寄文正月二十五日伯伯以果子弄物招送寄寄體魄歸大塋之旁哀哉爾生四年方復本族既復數月奄然歸無于鞠育而未深一作申詩父兮生我母兮鞠我拊我畜我長我育我結悲傷而何集作則非極來也何故去也何緣念當稚戲之辰孰測生死之位時吾赴調京下移家關中事故紛綸光陰遷貿寄瘞爾骨五年於兹白草枯荄潘嶽悼亡詩枯荄帶墳隅荒塗古陌左思詩荒塗橫古今朝飢誰飽夜渴誰憐爾之栖栖吾有罪矣今吾仲姊即裴氏姊反葬有期遂遷爾靈來復先域平原卜穴刋石書銘喪服小記復與書銘自天子達於士其辭一也明知過禮之文何忍深情所屬自爾沒後姪輩數人竹馬玉環杜氏幽求子年五嵗有鳩車之樂七嵗有竹馬之樂明皇雜録天后常召諸皇孫坐於殿上觀其嬉戲因出西國所貢玉環叉杯盤縱令爭取以觀其志繡襜文褓韻書襜褕蔽膝也史記趙世家程嬰公孫杵臼謀取他人嬰兒負之衣以文葆匿山中堂前階下日裏風中弄藥爭花紛吾左右獨爾精誠不知所之况吾別娶已來嗣緒未立猶子之義倍切他人念往撫存五情空熱文子昔中黃子曰色有五章人有五情嗚呼滎水之上書導沇水東流為濟入於河溢為滎漢地理志河東郡垣縣禹貢王屋山在東沇水所出東南至武德入河軼出滎陽北地中檀山之側見祭處士叔父文汝乃曽乃祖松檟森行任昉求立太宰碑表松檟成行伯姑仲姑冡墳相接汝來往於此勿怖勿驚華綵衣裳甘香飲食汝來受此無少無多汝伯祭汝汝父哭汝哀哀寄寄汝知之邪祭徐姊夫文嗚呼以君之文學以君之治政一作術幼以自立老而不倦亦可以為君子人矣君子人歟而不即清途南史荀伯子好為雜語遨遊閭里故以此失清途不階貴仕見代安平公遺表此其命也夫何慊焉始者仲姊有行詩女子有行逺父母兄弟獲託貴族魏陳思王植傳華宗貴族半産以資於外姓晉袁喬傳與裒書曰將軍之於國外姓之太上皇也闔門寄一作冀託於仁人後漢賈復傳闔門養威重將以衰微倚為藩援陸機辨亡論夫蜀蓋藩援之與國也不圖薄佑天奪初心左傳虢公敗戎於桑田晉卜偃曰是天奪之鑒而益其疾也仲姊凋殂諸甥不育以親以懿左傳富辰曰兄弟雖有小忿不廢懿親翻為路人再號再呼莫訴蒼昊尚以君子存伉儷之重敦行李之私世說孫子荆除婦服作詩以示王武子王曰未知文生於情情生於文覽之凄然增伉儷之重詳上狀二十年已來雖事暌一作賒而意通跡遙而誠密神當賜集作自鑒愚豈敢忘逮愚不天左傳楚子圍鄭鄭伯肉袒牽羊以迎曰孤不天不能事君再丁凶釁泣血偷息庾信紇干𢎞碑㷀㷀𦙍子泣血徙步奔波千里晉庾亮傳疏曰偷存視息餘生幾何君方赤紱銀章易困于赤紱詳上表浙東從務舊書地理志浙江西道節度使治潤州管潤蘇常杭湖睦等州東道節度使治越州管越衢婺溫台明等州或為觀察使道途悠邈時序徂遷訝弔緘之不來忽訃書之一作而俱至感舊懷分情如之何埋玉焚芝固未可喻見代李𤣥文嗚呼今來古往人誰不亡於今之亡其酷斯甚藐然一女才已數齡乞後旁宗又未能立賢弟扶服東路揚雄解嘲扶服入槖按扶服通作匍匐詩云凡民有喪匍匐救之遇疾洛師見檄文徘徊十旬淹不得進浮泛水陸厥途四千建旐云歸曠然無主王隱晉書傅咸遭繼母憂上書曰咸身無兄弟到官之日喪祭無主尼姑居宗老之地南史蕭琛傳上每呼琛為宗老黠集作騶奴總家相之權漢貨殖傳桀黠奴人之所惡獲及故阡信為餘慶其所以為附身附棺之具禮記子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣又豈礙平生之曠達邪晉裴頠傳崇有論云奉身散其亷操謂之曠達日月次遷卜筮斯協幽明之異始於今辰愚方纒哀憂瘵恙縻寢謝靈運詩寢瘵謝人徒善曰爾雅瘵病也不及一攀冡一作宰是樹一慟荒阡春秋公羊傳宰上之木拱矣注宰冡也謝淡成之交申永訣之禮禮記君子之交淡若水莊子君子淡以親小人甘以絶矧余仲姊君其與歸撫心骨以皆驚抆血淚而何算江淹别賦使人意奪神駭心折骨驚嗚呼巳哉其何言邪襚衣非華奠物殊薄靈其鑒此慰我哀心嗚呼尚饗祭徐氏姊文嗚呼追訣慈念一十八年罪積行違上下無禱天怒猥集不誅其身再丁憫凶藐無怙恃一作峙岵非詩無父何怙無母何恃號潰荼裂心摧骨崩曹植誄號慟崩摧獲見諸甥來奉遷合舊物半同於泥滓新阡方列於松楸斷手折足厥痛非擬終天殁地此誠莫伸寃痛蒼天孤苦蒼天始某兄弟初遭家難內無强近外乏因依李密陳情表外無朞功强近之親詳上狀祗奉慈顔潘嶽閒居賦夀觴舉慈顔和被䝉訓勉及除常制方志人曹以頑陋之姿辱師友之義獲因文筆晉封孚傳文筆多傳于世實忝科名三千一作遷有司兩被公選再命藝閣叨跡時賢仲季二人亦志儒墨於顯揚而雖未在進修集作修進非而不隳易君子進德修業欲及時也永惟幽靈盍亦垂鑒今者苴麻假息禮記苴杖竹也削杖桐也又斬衰括髮以麻注為母括髮以麻後漢謝夷吾傳遊魂假息糞土偷存不即殞傷蓋亦有以伏以奉承大族載屬衰門南史謝瞻言於武帝曰特乞降黜以保衰門三弟未婚一妹處室息𦙍猶闕家徒索然陸機歎逝賦十年之內索然已盡將恐蒸嘗有曠闕之憂丘隴絶芟除之主鮑昭蕪城賦井徑滅兮丘隴殘蒸嘗見下序延駐晷刻不敢自私又以祖曽之前未一完兆骨肉之內猶有旅魂將自來兹克用通便以顯之義雖不敢望無忝之訓庶幾或存詩無忝爾所生詳上文靈其聞之必將加憫然有以沒齒懷恨後漢清河孝王慶傳常泣向左右以為沒齒之恨粉身難忘者法苑珠林釋法先誓粉身骨用生淨土以靈之懿茂而不登遐夀不生賢人使別女致哀猶子為後哀哀天地云胡不仁默默神祗其何可訴今嵩奐二子既為我甥誓當撫之以慰幽抱男勸其學使得祿仕女求其偶必擇賢良縱乖宅相之徵庶泯忽諸之歎夀堂宿啓潛舟既移那期永訣之悲復見重開集作閔非之兆以祥忌云近哀憂載迷禮記父母之喪既虞卒哭疏食飲水不食菜果期而小祥食菜果再期而大祥有醯醬中月而禫禫而飲醴酒並詳上文不獲臨壙達誠爾雅藏葬謂之壙撫柩致奠禮記在棺曰柩東望景亳左傳商湯有景亳之命椎心仆身李陵答蘇武書此陵所以仰天椎心而泣血也具襚擇蔬灑以淚血日慘風逺呌號無聲伏惟明靈一賜臨鑒孤苦蒼天不孝蒼天祭裴氏姊文嗚呼哀哉靈有行於元和之年返葬於㑹昌之嵗光陰迭代三十餘秋得不以既葬一作算闕廟見之儀禮記孔子曰三月而廟見稱來婦也枚卜一作改卜舉歸宗之禮㑹稽典録徐平兩婦歸宗敬奉情過乎厚南史謝𢎞微傳歸宗兩姑晨夕瞻奉盡其誠敬不幸不祐天實為之易天命不祐詩天實為之謂之何哉椎心泣血孰知所訴恭惟先德實紹𤣥風晉向秀傳為莊子隱解發明奇趣振起𤣥風良時不來百里為政愛女二九古詩芳年踐二九思託賢豪誰為行媒禮記男女非有行媒不相知名來薦之子雖琴瑟而著詠詩窈窕淑女琴瑟友之終天壤以興悲晉列女傳謝道韞初適凝之還甚不樂叔父安曰王郎逸少子不惡汝何恨答曰一門叔父則有阿大中郎羣從兄弟復有封胡羯末不意天壤之中乃有王郎謂之何哉繼以沉恙禱祠無冀奄忽凋違時先君子以交辟員來南轅已轄接舊陰於桃李寄暫殯之松楸韓詩外傳春樹桃李夏得陰其下秋食其實詳上文此際兄弟尚皆乳抱空驚啼於不見未識㑹於沉寃浙水東西半紀漂泊某年方就傅禮記十年出就外傅家難旋臻躬奉板輿以引丹旐潘嶽閖居賦太夫人乃御版輿升輕軒詳上文四海無可歸之地九族無可倚之親書以親九族既祔故丘便同逋駭生人窮困集作異非聞見所無及衣裳外除㫖甘是急任昉行狀逮衣裳外除心哀內疚禮記親喪外除又父子皆異宫昧爽而朝慈以㫖甘乃占數東甸傭書販畚一作舂非吳志闞澤字德潤㑹稽人家世農夫至澤好學無以資常為人傭書以供紙筆晉載記王猛微時賣畚日就月將詩日就月將漸立門構清白之訓後漢楊震傳故舊長者或欲令為開産業震不肯曰使世稱為清白吏子孫以此遺之不亦厚乎幸無辱焉既登太常之第新書選舉志肅代以後兵興天下多故官員益濫而銓法無可道者至德宗時試太常寺復忝天官之選選舉志每問經十條對䇿三道皆通為上第吏部官之免跡縣政刋書祕丘晉束晢傳𤣥居釋曰學既積而身困夫何為乎祕丘榮養之志才通南史劉之遴傳武帝謂曰卿母年德並髙故令卿衣錦還鄉盡榮養之理啓動之期有漸而天神降罰左傳司馬侯曰楚王方侈天或者欲逞其志以厚其毒而降之罰未可知也艱棘再丁詩棘人欒欒兮弱弟幼妹未笄未冠禮記男子二十冠而字女子許嫁笄而字𦙍緒猶闕魏志蔣濟傳注魏書述曹氏𦙍緒亦如之家徒屢空載惟家長之寄偷存晷刻之命號天呌地五內崩摧李陵詩行行且自割無令五內傷然亦以靈寓殯獲嘉向經三紀漢地理志河內郡獲嘉縣注故汲之新中鄉武帝行過更名也詳上表歸祔之禮闕然未修是冀苟全得終前限諸葛亮表苟全性命於亂世屬劉孽叛換逼近懷城謂劉稹之變懼罹焚發之灾魏文帝典論喪亂以來漢氏諸陵無不發掘乃至燒取玉柙金鏤體骨并盡永抱幽明之纍遂以前月初吉詩二月初吉載離寒暑攝縗告靈北史崔光傳光獨攝衰振杖號步東郊訪諸耆舊孤魂何託旅櫬奚依陸機挽歌歎息重櫬側社預左傳注櫬棺也詳上表狀垂興欲墮之悲幾有將平之恨江淹恨賦琴瑟滅兮丘隴平詳上文斷手解體何痛如之灑血荒墟飛走同感王子年拾遺記田疇往劉虞墓設雞酒之禮慟哭之音動於林野翔鳥為之凄鳴走獸為之吟伏伏惟朝夕二奠禮記朝奠日出夕奠逮日不敢久離遂遣羲叟一人主張啓奉曾子問自啓至于反哭抱頭拊背戒以信誠附身附棺庶無遺闕檀山滎水實惟我家靈其永歸無或栖寓鳴呼哀哉靈沈綿之際殂背之時某初解扶牀樂府焦仲卿妻詩新婦初來時小姑始扶牀猶能記面長成之後豈忘遷移頃者以先妣年髙兼之多恙每欲咨畫即動作咸涕泣既繁寢膳稍減雖云通禮亦所難言荏苒於斯非敢怠忽今則南望顯考東望嚴君伯姊在前猶女在後克當寓鄖鄖疑是邸歸養幽都雖殁者之宅兆永安而存者之追攀莫及王粲七哀詩朋友相追攀又以十二房舊域風水為灾胡子彭兒藐焉孤小雖古無修墓著在典經而忘禮約情亦許通變今則巳於左坎一作次是別卜鄰原鄰一作鮮是詩度其鮮原傳小山別大山曰鮮箋鮮善也重具棺衾再立封樹通年難遇同一作周非月異辰兼小姪寄兒亦來自濟邑騃魂稚魄依託尊靈逺想先域之旁纍纍相望重溝疊陌萬古千秋臨穴既乖飲痛何極唯安陽祖妣未祔仍世遺憂昨本卜孟春便謀啓合㑹雍店東下店疑是兵逼近行營𤇺火朝然鼓鼙夜動雖徒步舉櫬古有其人見祭徐姊夫文用之於今或為簡率潞冦朝弭則此禮夕行首夏已來陶朁詩首夏猶清和亦有通吉𤣥女經天地開通造葬大吉儻天鑒孤藐神聽至誠獲以全兹免負遺託即五服之內更無流寓之魂一門之中悉共歸全之地今交親饋遺朝暮饘糊收合盈餘節省費耗所望克終逺事豈敢溫飽微生苟言斯不誠亦神明誅責老舊僕使才餘兩人靈之組繡餘工翰墨遺跡潘嶽悼亡詩翰墨有餘跡並收藏篋笥任昉詩詠歌盈篋笥用寄哀傷嗚呼哀哉蕣夭當年詩有女同車顔如舜華傳舜木槿也疏樊光曰木槿華朝生暮落與草同氣故在草中骨還舊土禮記延陵季子曰骨肉復歸於土命也若魂氣則無不之也箕帚尋移於繼室吳語勾踐請盟一介嫡女執箕帚以晐姓於王宫左傳惠公元妃孟子孟子卒繼室以聲子注諸侯始娶則同姓之國以姪娣媵元妃死則次妃攝治內事猶不得稱夫人故謂之繼室兄弟空哭於歸魂沈炯有歸魂賦終天銜寃心骨分裂潘嶽哀永逝文今奈何兮一舉邈終天而子不反詳上文胞胎氣類法苑珠林在母胞胎日三自歸寧有舊新呌號不聞精靈何去寓詞寄奠血滴緘封靈其歸來省此哀殞傷痛蒼天孤苦蒼天伏惟尚饗為外姑隴西郡君祭張氏女文箋爾雅云妻之母為外姑隴西郡君王茂元妻之封號也吾配汝先世二十餘年七女五男撫之如一往在南海令子云亡藐爾兩姑未勝多難提挈而至王制斑白者不提挈踰涇涉河南海至此厯敘已從茂元仕宦所至詳上表十年之間母子俱盡念汝差長慰吾最深女德婦容禮記教以婦德婦言婦容婦功光映姻表北史楊津傳宗族姻表罕相參候秭歸為牧漢地理志南郡領秭歸縣官閒俸優實獲我心因選良對笄旒纚纚環珮鏘鏘螽斯鳯皇兩有深慶汝夫一作天文章播於朋友身否命屯久而不第郎寧合浦詩歸寧父母漢地理志合浦郡武帝元鼎六年開屬交州萬里乖離汝寄京師食貧終嵗頃吾南返又往朝那漢地理志安定郡有朝那縣謂遷涇原汝實從夫適來岐下道途雖邇面集猶妨金馬碧雞華陽國志蜻蛉縣碧雞金馬光影條忽民多見之有山神漢宣帝遣蜀郡王褒祭之欲致雞馬長懸魂夢及登農揆去赴天朝汝罷蒲津同州朝邑縣黃河東岸有蒲津關聿來胥㑹朝堂夜閣曲榻溫爐稚子雛孫滿吾懷抱汝時不佑忽爾孀殘撫視寃傷載慟心骨見上文旋移許下念汝支離卜室築居言遷潁上新書潁川汝陰郡領潁上縣潞童作孽謂劉稹之變使節啓行﨑嶇關山漢陸賈傳﨑嶇山海間暴露戎旅漢宣帝紀詔曰暴露軍旅汝失所怙謂茂元征劉稹卒於軍吾猶未亡左傳未亡人注婦人既寡自稱未亡人念汝弟昆莫任堂構見上啓牽哀挽痛偷此殘生日往月來旋更嵗序易日往則月來寒往則署來詳上文吾衰汝少吾病汝强誰謂一朝汝先吾逝五男未冠二女未笄哀憤之深難全一作念非禮道章兒盧七謂張氏女二子也取以依吾汝夫先丘逺在江渚羣從之內晉王凌傳羣從一門並相與服事官名且稀劉四頃年固難返葬始議權厝遂得嘉占白馬呈祥眠牛薦吉見祭處士文里名三趙地爾九城五代史王建世家宗夀得王氏十八喪葬之長安南三趙村九城謂帝城也爾與邇通三趙在長安之南故曰地爾九城按九城本淮南子風水無虞巒岡信美葬於所始郭璞葬經故葬者葬其所始古為達生謝靈運詩達生幸可託將命來雲自我為祖爾雅子之子為孫孫之子為曽孫曽孫之子為𤣥孫𤣥孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫今汝之柩斯焉是歸嗚呼言自淮陽已臨洛宅書洛誥既定宅素棺丹旐蔡雍陳太丘碑時服素棺槨財周櫬託宿城隅謝朓詩徘徊憐暮景惟有洛城隅盤具杯醪儼然已備吾將臨汝用雪沈寃介婦諸孫禮記介婦請於冡婦憂吾衰齒後漢韋彪傳犬馬衰齒俯令推測云有相妨俗忌巫言吾非甚信牽衣擁路漢樂府兒女牽衣啼固不可違一作遲誤女使僕奴寄辭而往張協雜詩寄辭翰墨林肝腸兼潰血淚無行嗚呼曩昔容華生平淑婉漠然不見永矣何歸將籍掛諸天初學記道有諸天內音經立世論欲界諸天亦後如是遙歸真路徐陵孝義寺碑咸歸至真將福興靜域南史庾說傳舉室咸聞空中唱上行先生巳生彌陀靜域矣須赴上生法苑珠林雜寶藏經云夫尋答言我是汝夫以作塔寺功德因緣得生天上將為釁纍所招遂淪幽界將是療治不至枉喪韶年千感一作惑非裝懷萬疑疊慮觸途氣結曹植詩念我平生居氣結不能言舉目心摧天實為之復將何訴嗚呼汝弟言護靈轜潘嶽哀永逝文俄龍轜兮門側說文轜喪車也自始及今必誠必信棺衾華好封隧幽深永從汝夫以安𤣥路寃摧債結殆一作文不勝書嗚呼有靈領吾此意李義山文集箋注卷七
