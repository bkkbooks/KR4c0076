body:
  text: 李義山文集箋注别集類一唐提要臣等謹案李義山文集箋注十巻國朝徐樹榖箋徐炯注樹榖字藝初康熙乙丑進士官至山東道監察御史炯字章仲康熙壬戌進士官至直𨽻巡道皆崑山人考舊唐書李商隠傳稱有表狀集四十巻新唐書藝文志稱李商隠樊南甲集二十巻乙集二十巻玉溪生詩三巻文賦一巻宋史藝文志稱李商隠文集八巻四六甲乙集四十巻别集二十巻詩集三巻今惟詩集三巻傳文集皆佚國初吴江朱鶴齡始裒輯諸書編為五巻而闕其狀之一體康熙庚午炯典試福建得其本于林佶採摭文苑英華所載諸狀補之又補入重陽亭銘一篇是為今本鶴齡原本雖畧為詮釋而多所踈漏盖猶未竟之稿樹榖因博考史籍證驗時事以為之箋炯復徴其典故訓詁以為之注其中上崔華州書一篇樹榖斷其非商隠作近時桐鄉馮浩注本則辨此書為開成二年春初作崔華州乃崔龜從非崔戎故賈相國乃賈餗非賈耽崔宣州乃崔鄲非崔羣引據唐書紀傳證樹榖之誤疑又重陽亭銘一篇炯據全蜀藝文志採入馮浩注本則辨其碑末結銜又鄉貫皆可疑知為舊碑漫漶楊慎偽補足之援慎偽補樊敏栁敏二碑證炯之誤信又據成都文類採入為河東公上西川相國京兆公書一篇及逸句九條皆足補正此本之踈漏然上京兆公書乃案牘之文本無可取逸句尤無闗宏㫖故仍以此本著于錄焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ee5bfe7cd204cd82bc882bce353e83f416acb6a3387969b1ab5e2c831d77b202
