  hash: sha256:468ba480bdd88b76842a4220469d40594b670567d266ef6db3f0d144302d63d9
body:
  text: 賀相國汝南公啟某啟日者􅂟属中興運推常武仰窺金版選考瑶圖順祖之孝思丹青曽閔憲皇之功烈刀機彭韋聖上􅀄九潜泉登三佩契以后稷岐嶷為小慧故人莫得知以漢皇雲物為下祥故神無所豫洎陟元后共惟長君固必䧏非常之人輔維新之政伏惟閣下昭囬䧏彩沆瀣融精徃執􅂕鉟正星辰之分野今調􅍢鼎猶日月之行天昔軒后師臣啇王畏相殷奉伊尹則謂之元聖周事吕尚則命為太公此王者之所以尊賢傑而不為疑也至于姬旦金縢不與燕召同列仲尼麟史不令㳺夏措辭甘盤尊􅃇學之名夷吾居仲父之位此又賢傑之所以自􅀒其道而不以為譲也上下交感人祗叶􅀙是我后夷姦秉哲之辰是閣下宰物康時之夕清庙係心矣蒼生延首矣允也無聞楽㦲惟時某早奉輝光嘗䝉咳唾牛心致譽麈尾交談而契濶十年流離萬里扶風歌則劉琨抱膝白頭吟則鮑昭撫􅈾重至門闈空餘皮骨方􅀙􅀄服無􅀘大釣穿􅂂􅁦衣正同北郭槁項黄馘乃􅁼曺啇未知伏謁之期徒切太平之賀下情無任抃舞踊躍之至謹啟謝座主魏相公啟羲叟啟伏奉前月二十八日􅃙㫖授秘書省校書􅀰知宗正表䟽續奉今月五日􅃙改授河南府􅂙軍依前充職者小宗伯之取士早辱捜揚大宗正之薦賢又䝉抽擢未淹旬日再授班資任重夲技聀齊載筆方殊王逸唯注楚詞有異郝隆但攻蠻語此皆相公事均卵翼􅀔作風雲特于汩沒之中俯借扶揺之便孔龜効印未識于訓恩揚雀銜環徒聞于報惠感抃之至㒺知所裁謹啟謝宗卿啓義叟啟伏䝉奉奏署知表䟽官伏奉前月二十八日􅃙㫖授秘書省校書􅀰續奉今月五日􅃙改授河南府􅂙軍者某少實艱屯長無才術徒以與周同姓􅀙魯諸儒託阮藉之竹林攀㕁詵之桂􅀣曲䝉題目猥􅀍薦聞惟我大朝克崇宗祐叙文昭武穆之位敦紹堯纉禹之親豈以斯文失于能者况一䝉旌録再忝恩荣班資􅀅厠于㕁超聀業㡬踰于孫楚感結所至生死以之即以今月日􅀤赴所職登門在近縮地文思惟勤肺肝恨無毛羽伏惟特賜恩察謹啟為同州張評事潜謝辟并聘錢啟二首某啟伏奉荣示伏䝉猥賜奏署今月日􅃙㫖授官承命恐惶不知所措某文乖綺綉學乏縑緗􅀒米東郊止勤色飬獻書北闕未奉明恩撫京洛之塵素衣穿穴訪江湖之路白髪徘􅆦大夫荣自山陽来臨沙􅁐固已室盈東箭門咽南金豈謂捜揚乃加孱眇府稱􅘟沼慙無􅀝馬之能地號雲門窃有化龍之􅀔便居帷幄遽别蓬蒿􅀽生有望于樵蘇楚子永辭于藍􅈁刻諸肌骨知所依歸伏惟特賜鍳察謹啟二某啟錢若干伏䝉仁恩賜僃行李重非半両􅁿異五銖子母相權飢寒頓觧細看銅郭徐憶牙籌雖虞神有魯褒便恐癖如何嶠辦装無闕通刺有期感戴之誠不知所喻謹啟爲山南薛從事傑遜謝辟啟某啟今月日伏䝉辟奏莭度掌書記􅃙下徒有長􅅂曽無綵筆初疑誤聴乆乃知歸感激慚惶不知所喻某受天和􅂔實鮮雄才幸承舊族之華遂窃名塲之價頃者湮淪􅀌賤綿隔音塵􅀙事梓潼經途天漢􅀄筵末席披霧睹天自尔以来懐思莫及鄭􅀇之腰腹若挂丹青崔琰之􅂡眉常存夢寐方思捧持杖􅂂厠列生徒豈意便上仙舟遽塵蓮府尚書士林圭臬翰􅁐龜龍方殿大藩􅀅求記室是才子懸心之地詞人効命之秋豈伊踈蕪堪此選擢思曽顔之供飬念陳阮之才􅂠自公及私終荣且忝伏以家室憂繁􅀄觧山川䟦渉未任須至季秋方􅄐上國撫躬汝下尚遥郭隗之門閉目夢逰已入孔融之座下情無任攀戀銘􅍢之至為東川崔從事福謝辟并聘錢啟某啟伏奉公牒伏䝉辟署觀􅊫廵官某早辱梯媒􅀗沾科第吴公之薦賈誼未塞前叨竇融之舉班彪仍當後忝仰觀􅘟幕俯度桂科卵翼不自他門頂踵實非己物但賫􅁅粉逺渉旌􅓚雖有命可詶實無言可謝伏惟俯賜鍳亮二某啟錢若干伏䝉賜僃行李窃以白馬從軍青鳬受聘磨文雖㓕校貫知多陸賈方騐于火花郭况莫矜于金穴感戴之至不任下情為河東公謝相國京兆公啟二首某啟今月日得當道萬安驛状報伏承遣兵馬使陳朗賷幣帛鞍馬辟召小男者未敢尋盟遽兹聞喜遐瞻閽闥恨乏羽毛伏以自有縉紳誰無交結朋友不全素諾在古殊多父子同受深知當今罕見豈期令徳圖于所難男珪曽未成人才沾下第辨仲謀之菽粟雖則有餘况安石之芝蘭窃􅀅不可忽依大府便厠英僚東吴之咍恐自兹始西園之燕未知何如此皆相公以某謬接藩維乆依䋲墨克䧏由􅂨之信􅀅詶事大之心不然則安淂㧞童子于舞雩禮諸生于白社身枝􅀗􅂟城府知歸感激恩光丁寕教誡永言銘􅍢尚昧端􅌼伏􅀱蕳書来至敝邑則専請張覿評事奉啟状申陳慕義無窮措辭莫盡攀附惶􅀾不能究陳謹啟二某啟伏奉荣示伏䝉辟署某第二子郷貢進士珪􅂶攝劍南西川安撫廵官并賜公牒舉者某去月得楊侍御書題微􅀓風㫖􅀄如吉夢終謂􅃧談非不尋思莫得端緒今乃竟詢仲胤果降嘉招伸􅁓發緘悸魂流汗何者某頃居班列巳奉陶甄口􅂻雌黄屡加雕煥胷中雲夢􅂈沐涵濡掀之以順風煖之以愛日茲辰議報不在他門昨叨裂土田謬分旗盖適當東道􅀗事西隣豈望信在言前荣流意外坤維接畛何詶上相之知坎卦成占遂報中男之喜且渠譽乖㕁桂名愧謝蘭未學周南召南才得一科一第縦觧問絹不能􅀒薪􅀅何以與先生並行􅀙大夫之後仰塵帷幄佇􅇎簮纓况􅁭帯禺同咽喉巴濮求扵安撫必也機謀􅀷慮異時莫副虗佇然窃尋史􅀓所載語父子之間雖石苞獨異石崇而山濤不知山蕑亦豈敢保其孱陋遽遣退蔵但當授以一經訓之大杖庶􅀅寡􅂈以就明恩染翰􅋦情封箋寫抱小人多事拜台席以猶賖童子何知上賔階而在即瞻望閽闥死生以之伏惟深賜鍳信謹啟為栁珪謝京兆公啟三首某啟散兵馬使陳朗至伏奉荣示兼奉公牒伏䝉召署攝成都府􅂙軍充安撫廵官者師㐮鼓缶或近玩人和氏捜珉􅀎無驚物跪受命髙莫知所裁某蔵豹不堅雕龍未巧徒承庭訓遂厠人曺比衛家之一兒天懸􅉇鷃望鄴中之七子風逸馬牛已忝厥科敢思筮仕伏惟相公以仁義禮智信為基構用温良恭儉譲為藩籬堯時則業貫􅇪龍殷代則道符伊説入秉文教出耀兵權揮神鋒而劍合隂陽述雅誥而筆開造化况天有井絡地稱坤維控三巴百濮之雄帯南詔西山之險人􅁛異府帝謂殊藩固已廣集豪英用資􅂙佐玳簮珠􅂂緑水紅蓮成籍籍于淮山致憧憧于燕路若某者徒􅀅慕藺何􅁕望囬又安敢拂其塵埃加以冠􅂂伏思相公直以大人頃居班列􅀗奉恩私羅照乗于􅌐淵覬歸昌于鳯穴未見其可䖏之不疑曽不念木朽石頑雕鐫莫就揄瞑豆重性分難移古人所以有以荣為憂受恩如敵斯言之作珪也有焉今月六日辰時輙奉辟書具聞晨省仰承嚴㫖便定行期而又内奮弟兄外誘交友􅀓翼如虎生角如麟事誠實于顕荣􅀔莫知其報効尚湏旬日方拜旌旄惟當洗心為齋延頸以望拜千尋之建木想像􅅛姿用萬頃之澄波比量曠度載恩揣已授命依仁神之聴之百生如一謹啟二某啟伏䝉榮示賜及前件衣服及束絹䓁謹依䖏分捧受訖伏以大人自䖏通班彌脩儉徳田園唯􅂲蕪没子弟不免飢寒去􅀊成名首春歸覲雖才非張載未刋劍閣之銘而志慕胡威敢問荆州之絹豈謂相公復以蕑書召署筐篚加恩古者贖百里奚才持五羖誚程不識猶惜一錢况某碌碌無竒容容自守敢邀厚幣来自雄藩品目難名珍纎可玩仰李􅈾之徳尚未登門讀戴聖之書已經潤屋下情無任戴荷悚懼之至謹啟三某啟伏奉榮示令􅀅前件馬及行官延接者某􅀅任大藩苦無逺道得䝉厚禮曲賜優崇扶以武夫濟之良馬經過燕舘􅀅曜于鳴騶夢寐梁園只思于飛鞚感佩之至不任下情謹啟獻河東公啟二首啇􅀮啟伏奉手筆猥賜奏署某少而孱懦長則艱屯有志為文無才就學雖雜賦八首或兼于馬遷而讀書五車逺慚于惠子契濶湖嶺凄凉路岐罕遇心知多逢皮相昔魯人以仲尼為佞淮隂以韓信為怯聖哲且猶如此尋常安􅀎免乎是艮背却行氷心自䖏羅含蘭菊仲蔚蓬蒿見芳草則怨王孫之不歸撫􅀌松則歎大夫之虗位不可終否属于髙明伏惟尚書春日同和秋霜共烈叔子則九代清徳稚春則七葉素儒君子立言永爲周禮正人淂位長作􅀊星今者􅀄渉􅀅壇始敷賔席射江奥壌潼水名都俗擅繁華地多才俊指巴西則民皆譙秀訪臨卭則客有相如舉纎繳以下冥鴻執定鏡而求西子唯􅀁􅃌命便爲丹鉛若某者又安可炫露短材叨塵記室塩車欵叚徒逢伯楽而鳴土鼓迂踈􅂲致文侯之卧承命知忝撫懐自驚終無諭蜀之能但誓依劉之􅂅未䕶謁謝下情無任感激攀恋之至謹啟二某啟伏䝉示及賜錢三十五萬以僃行李謹依荣示捧領訖伏以古求良材必有禮幣一束芻皆堪貺羙五羖皮未曰輕齎况某跡忝諸生名非前哲尚遥玉帳已賚金錢訪蜀郡之卜人懸之莫竭遇河間之姹女数且難窮未草檄以愈風不執鞭而􅀗福敢􅀅潤屋且以騰装戴荷之誠􅀉喻無地上尚書范陽公啟三首某啟仰䝉仁恩俯賜手筆􅀅虗右席以召下材承命恐懼不知所措某幸承􅃇族早預儒林鄴下詞人夙䝉推奨洛陽才子濫􅀍交㳺而時亨命屯道㤗身否成名踰于一紀旅宦􅂈于十年恩舊凋零路岐悽愴薦彌衡之表空出人間嘲楊子之書僅盈天下去年逺従桂海未返玉京無文通半頃之田乏元亮数間之屋隘傭蝸舎危託燕巣春畹􅀅逰則蕙蘭絶逕秋庭欲掃則霜露沾衣免調天官􅀗昇甸壌歸惟却掃出則卑趨仰燕路以長懐望梁園而結慮尚書道光士範徳冠民宗愷悌之化既流鎮静之功方懋窃惟上國投刺東都及門唯交抵掌之談遂辱知心之契載惟浮泛頻渉光隂豈期咫尺之書終訪蓬蒿之宅感義增􅂔懐仁識歸便當焚㳺趙之簦毁入秦之屫束書投茟仰副嘉招謁謝未閑下情無任感戀之至謹啟二某啟某猥以謏聞仰承嘉命䖏嚢引喻未施下客之􅀎在握􅁛珍遂忝上卿之列循揣斯乆兢惶不任况尚書學惣百家術窮三略文鋒筆力抉掦馬之懸門劍氣􅃓聲割韓彭之右地永言賔画宜在民宗豈意非才旋䝉􅂈聴末至居右既乏相如之譽後来在上終興汲黯之嗟手􅁕分荣里閭交􅂟行吟花幕卧想金􅄗未離紫陌之塵已夢清淮之月依仁佩徳白首知歸伏惟俯賜恩察謹啟二某啟絹若干匹特䝉仁恩賜僃行李謹依数捧領訖嘉命猥臨厚賚仍及捉􅁭見肘免􅁼于前哲製裳裹踵無取于昔人感佩私恩不知所喻謹啟為白従事上陳許李尚書啟某啟伏奉公牒辟署莭度廵官兼伏奉荣仕賜及疋帛䓁才異當仁事従非望拜受失度跪捧難勝某符彩無竒局量有限徒以杜林外氏學冨文章謝朗舉宗皆親儒墨齠年有志壮􅀊無名瞻遺􅌟以自驚奉成書而未遂重以零丁属釁息􅁼非蕃决稚圭之甲科則行有違離之苦效敬通之却埽則坐無供飬之資徘􅆦盛時欎抑􅇆􅈤敢思聘召怱賜降臨尚書分戚天家揚輝王國攻文而丹青譲巧論兵而鉤觡慙􅀎頃者言自執金雄推受脤河橋三壘當弟子之輿尸易水一城值􅀅軍之下世功深式遏道著綏和中間衛朔拒君邢洺起亂紀侯去國汾晋挺灾語其巣穴之間在我封隣之側而又潜調逺轡宻運良籌􅁿敵殘人則勇于不敢伐謀持重則令在必行今者趙北變風淮南受賜戎麾始至賔驛􅀄開固合大選英髦以充僚属豈期恩慮遂及孱㣲賁帛豐盈寓圭重復慈親喜問孀姊號驚姓名遂列于群英簮笏遽光于单緒感􅀷肌骨戴重丘山未伸投刺之誠已定靡躬之誓伏以乆􅀅栖托兼議扶迎更渉旬時方遂行李􅃮園之蝶濫入荘周之夢竹林之虱永依中散之身􅘟幕含誠金􅄗結想瞻仰恩顧伏撓精魂謹奉啟陳謝謹啟為桂州盧副使戡謝聘錢啟某啟錢若干伏䝉賜俻行李謹依数捧領訖多若鑿山積如别蔵丙科擢第未全染于桂香盛府崇知却自驚于銅􅆨禮于是重富而可求既不􅁨貧惟思報徳伏惟俯鍳微懇謹啟謝河南公和詩啟啇隐啟前因假日出次西溪既惜斜陽􅂓裁短什盖以徘􅆦勝境顧慕佳辰為芳艸以怨王孫借羙人以喻君子思􅀅玳􅈘為逸少装書􅂅把􅃢瑚與徐陵架筆斐然而作曽無􅁕觀不知誰何􅀅逹尊重果煩属和彌復兢惶某曽讀隋書見楊越公地䖏親賢才兼文武每舒錦綉必播管絃當時與之握手言情披􅁭得侣者惟薛道衡一人而已及觀其唱和乃數百萹力鈞聲同徳隣義比彼若陳􅁑天氏之舞此必引穆天子之歌彼若言太華三峯此必曰潯陽九􅂀神功古跡皆􅀿物無疲地理人名亦争承不屈後来詶唱罕継聲塵常以斯風望于哲匠豈知今日属在􅀁天坐席行衣分為七覆烟花魚鳥置作五衡詎􅀎狎晋之盟實見取鄶之易不以釁鼓恵莫大焉恐俱交萦投措無地来日専兾謁謝伏惟鍳察謹啟獻侍􅀰鉅鹿公啟某啟今月某日舎弟新及第進士羲叟䖏伏見侍􅀰所著春闈榜文􅀉承在朝同年兼蕳新及第諸先軰五言四韻詩一首夫玄黄􅇱采者綉之用清越為樂者玉之竒固以慮合􅀇機運清俗累陟䧏于四始之際優㳺于六萟之中窃計前時承荣内署柏􅄗侍宴熊舘従畂式以風騷仰陪天􅄜動沛中之􅃇老駭汾水之佳人非首義于論思寔終萹于潤色光􅀓楽録道煥詩家况属詞之工言志為最自魯毛兆􅁤蘇李掦聲代有遺音時無􅅸响雖古今異制而律吕同歸我朝已来此道尤盛皆䧟于偏巧罕或兼材枕石潄流則尚于枯槁寂寥之句攀鱗附翼則先于驕奢艶佚之萹推李杜則怨刺居多效沈宋則綺靡為甚至於乗無私之刀尺立莫測之門墙自非託于䧏神安可㝎夫衆製伏惟閣下皆其餘力廓此大中􅁕使同僚盡懐博我不知學者誰可起予某比興非工顓䝉有素然早聞長者之論夙託詞人之末淹翔下位欣託知音抃賛之誠翰墨無寄况乎仲氏實預諸生荣沾洙泗之風髙列偃啇之位仰惟厚徳􅂅沭餘輝輒罄鄙詞上攀清唱聞郢中之白雪愧列千人比齊日之黄門慙非八米干冐尊重伏用兢惶其詩五言四首謹封如右北齊書盧思道作挽宣帝歌獨有八首故時人􅁛爲八米盧􅀰西齋樷說関中􅀊以六米七米八米爲上中下言榖中取米之多寡也爲舉人献韓􅀰中琮啟某啟某少承嚴訓早學古文非聖之書未常関慮論都之賦頗亦㽞神徒以不受綵毫未吞瑞鳥馳名江左陸机莫及于才多擅譽鄴中王粲終聞于體弱上下群士差池累年頃者輒露踈蕪不思狂蕳捧爝火以干日御動以光銷抱布鼓以詣雷門忽然聲寢不謂􅀰中捜材路廣登客門寛望犬附書兾雞談易特垂題目曲賜丹青旋属荥播従行神州視膳同孟陽之覲蜀比孝若之歸齊雖佩恩私竟乖陳謝光隂荏苒誠抱勤拳今此秋期遂有天幸更奉穪衡之刺敢無􅎦蔑之言某在京多時自夏有疾失外郡薦名之限俯神臯試士之期物情既集于宗師公選果歸于令季懐才者皆云道㤗抱器者自謂時来以卞和為玉人無不􅀵之瓊玖得蹇脩為媒氏無不嫁之娉婷是以􅂅托一拳潛布百両顧方流而有託慮良㑹之猶賖伏惟􅀰中與先軰賢弟價重兩劉譽髙二陸比李􅈾則仙舟對棹方馬融則綘帳雙褰若某者雖陋若左思瘦同沈約無􅁃信之腰腹乏崔琰之􅂡眉然至于感分識歸衘誠議報􅀅詶楊寳則就雀求環欲荅孔愉則従龜覔印推其異􅀋不後伍言四首謹封如右北齊書盧思道馬卿室迩孔子墙髙遲面莫由隳肝無米盧郎西齋樷説関所反米之多寡也之長鳴一日三秋空咏馬嵬之清什知􅀷可恃言未見于鶯喬曲沼空勤于鳬藻仰瞻几閣伏待蕳書謹啟賦頗為先軰献集賢相公啟魏謩徴之後也某啟某窃觀貞􅀚朝書伏見文皇帝因夢吹塵方求風后于畋問卜始載磻溪事偉于王圖道光于帝載下惟敷袵上則虗􅁭纒綿圖緯之前􅆼窕天人之際崇基立極四足雖断于神鰲開物成功七竅仍沾于混沌禹羞乗輦舜恥弹琴白烏已見于􅀅雏朱艸仍聞于滯穗共工􅃖尤之軰與貳􅀒同拘豕韋晋耳之徒与七騶共御是以今上以貽謀􅀒扆相公以餘慶持衡用十一徳之資賛七百年之祚古猶今也仁豈逺乎伏惟相公日觀同光天球並價掦􅄡露鍔則武庫常開散藻摛華則文星鎮見一言悟主三接承恩季孟伊繇友朋䔥邴漢皇􅀤論十萬常愧于淮隂齊后推誠一二皆歸于仲父百度既已貞矣九流又復清焉墙東竈北隐淪者咸欲呈材猿飲鳥言僻陋者皆思入貢荘生獻臂楊子㧞毛三百萹之詩更無諷刺二百年之史永絶譏嫌斯乃百代可知一言可蔽豈立錐側管可折齒尋環巍乎煥乎盛矣美矣若某者剖心寡竅對面多墙小比蟭螟敢矜巣窟微同觸氏寕務􅀾争徒以簮􅌧􅀓家階庭受訓堂中得桂已有前叨幕下開蓮仍當後忝所宜結嚢無咎綵服為荣􅅸方朔之上書罷彌衡之投刺直以措心賢路誓志昌時既慕義無窮思有道則見伏惟相公霧􅀎蔚豹雷可燒龍為百代乏指南九州之木鐸任安彦國已在于廐中楊子馬卿並歸于門下而猶饑渴未副影響無寕請客者不解衾禂當関者空存皮骨此某所以淮山逺志漢棧斯来望姬旦之吐飡兾張華之倒屣以升堂客衆擁篲人多茍無􅎦篾之言難任仲宣之陋今輙以常􅀁著文若干首上獻伏惟少廽岩電微駐台星固無望于討論庶或觀于指趣倘䔥稂可艾营蒯無遺䝉文宣一字之褒得􅀇晏三都之序便若神巫去癘司命添年禱祝之誠造次于是門遥閶闔路隔瀛洲于人世存思􅆰移氣序以塵中仰望未見端􅌼希陪上士之流終預群仙之末祈恩望徳乃百斯生干冐威嚴下情無任惶惧感激之至謹啟献相國京兆公啟某啟人禀五行之氣秀􅇱七情之動必有咏嘆以通性􅂕故隂悿陽舒其途不一安楽哀思厥源数千逺則􅅠邶曺齊以掦領䄂近則李蘇顔謝用極菁華嘈􅓐而鼓鐘在懸煥爛而錦綉入玩刺時見志各有志焉某爰自弱齡側聞古義㽞連薄宦感念􅄐群東至㤗山空吟梁父南㳺郢澤徒和陽春㳺子自得之塲寔窃徳音之選伏惟相公既秉大政復振斯文論風雨則秋枿芳華語霜霰則春條零落􅀤軔于風力觧鞍于伊咎宫啇資正始之音寒暑恊中和之序是故贄其纓拾俟彼斧斤神􅂔雖怯于大巫名字􅂅聞于下客舊詩一百首謹封如别延之設問希鮑昭之一言何遜著名繫沈約之三讀干冐嚴重延望恩輝進退之間若據泉石伏惟俯賜容納謹啟為張周封上楊相公某啟某聞不祥之金大冶所􅁖自衒之士明時不容斯寔格言足為垂訓然或顧逢伯樂但服塩車聴属鍾期不調緑綺臯壌揺落老大悲傷同劉勝之寒蝉效子綦之枯木則跡歸弃世行闕掦名某價乏琳琅譽􅁿鄉曲粗沾科苐薄渉萟文錐不頴于嚢中水竟􅀷于山上淹㽞蓮幕栖託戎麾挿羽佩鞬従相公扵関右束書載筆随校尉扵河源自北徂南已秋復夏心驚于急弦劲矢目断于髙足要津而又永念敝廬空餘喬木山中桂􅀣遂愧于幽人日暮柴車莫追于傲吏捋須理髩霜雪呈姿弔影颺音烟霞絶想徒以相公逺敦世故容在恩門存趙氏之􅀌受梁王之禮竽􅀅濫吹石有􅂙瓊咳唾随風眄睐成餙追惟疇􅇮曽是逢迎蜀郡登文翁之堂上國醉曹􅂙之酒吹􅌵盡力撫爱形顔雖以捧承莫􅀎䘖戴况許之髙選光􅀍宦情以曲􅄗之任用猶􅁿憲署之發揮方盛仍期官牒不越􅀊時今則莭邁白蔵􅀱臨􅀇律燕雖恋主馬亦嘶風郭伋還州尚不欺于童子文侯校獵寕爽約于虞人苟四時之信是孚亦一諾之恩斯及况自元和已後公侯冢嫡卿士子孫與之同時厯然可数莫不翔踰鳥道泳出龍津或並命南􅄗或迭居青瑣金朱照耀軒盖追随某雖忝伊人亦惟華胄比王謝之子弟誠有重􅁿在稽吕之友朋夙常連接而獨分光隣女貸潤監河野寉天麟􅅸比倫于朝右髯􅂙短簿困擬議于軍前窃聴重言常興深歎是以􅂅持蹇歩誓奉光塵倘或厠錯薪之斯翹咏歸荑于自牧少窺上路試睨重霄擊水三千暫随􅉇運澄流十二免使魚劳猶􅀎賛序調爕謳歌鎔範庶無雅拜以累于君公不使繁聲見憂于仲子心懐右席夢結邉城寓尺牘而畏逹空凾寫丹忱而慙非健茟仰望恩顧下情無任攀戀感激惶懼之至爲
