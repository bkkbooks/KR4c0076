body:
  text: 太尉衛公㑹昌一品集序代桂府荥陽公唐葉十五帝謚昭肅始以太弟茂對天休遂臨西宫入髙庙􅀅以凖則九土指麾三􅂕乃顧左右曰我祖宗並建英豪範圍古昔史卜霄夢震嗟不寕是用能文惟睿掌武以永大業今朕奉承天命顯登乃辟庸不知帝賚朕者其誰氏子焉左右惕驚威􅂕迷撓章指周訥掦扢不􅀎仰酬既三四日乃詔曰淮海伯父女来輔予霞披霧銷六合快望四月日入覲是月日登庸淵角竒姿山庭異表為九流之􅂠盖作百度之司南帝曰是盡付玄機􅁢厭人度左右者咸不知其梦邪卜耶金門朝罷玉殿宴餘獨啣日光静與天語帝亦幽闡徴召誥説命之㫖定元首股肱之契曰我􅀅俾尔以大手筆居第一功麒麟閣中霍光且圖其勛伐􅀇洲􅁐上魏􅀵别議于文章光映前修允兼具美我意属此爾無譲焉公拜稽首曰臣某何敢以當之在昔太宗有臣曰師古曰文本髙宗有臣曰嶠曰融玄宗有臣曰􅀃曰􅉞代宗有臣曰衮至于憲祖則有臣禰庙曰忠公並禀太白以􅀓精神納非烟而敷􅇨思才可以淺􅀷魏邴道可以升䧏伊皐而又富僧孺之新事識􅁃持之竒字清風濯􅀬白雪生春淮南王食時之工裴子野昧爽之獻疑王粲之夙搆無禰衡之加􅀧然後可以弘宣王略輝潤天文豈伊乏賢可纂􅃇服帝又曰舜何人也予何人也朕思丕承女勉善継無忝乎尔之先公􅂧拜稽首曰易曰中心願也詩曰何日􅁯之臣敢不夙夜在公以揚鴻烈㑹一日上明􅀤扵法宫之中忿兆人之衆顧九州之廣永懐不待之痛式重如存之敬公伏奏曰惟先后􅅷守丕基允資内􅂇秀南頓嘉禾之瑞開厯山神井之祥徳駕河洲淑肩沙􅅢􅀅􅂋䧏媯之配未弘褒紀之恩渝美椒􅂗掩華蘭掖縁山􅀍芿夙聞齊主之悲採石􅀓形早䧏漢皇之慟今繞樞有慶鳴社承輝而懿號未彰貞魂莫祔􅂲無以􅅷遵聖緒光慰孝思公于是承命有宣懿祔庙之制􅀄文宗皇帝思宗社之􅂕祧祖之重􅀓于夏啟既不克終歸于與夷又未􅀎立乃推帝堯敦叙九族之道弘魏文荣楽諸弟之志嘗曰穎邸吾寜忘邪及武宗譲踰三四位當九五出潛離􅀮躍泉在天掦八彩于堯眉挺二肘于湯臂故外則上公列辟内則常侍貴人咸􅂅擬議形容依稀彩飾公搢圭歸美吮墨摛辞詠日月之光革知天者之務也賛乹坤之易蕳作易者之事乎公于是有聖容之賛天寳季年物豐時㤗骨鯁者慕周偃武􅁏食者効晋清談豖不獖牙蠆因揺尾氛興燕易駕狩巴梁九十年鑾輅不東三千里華戎遂隔日者上􅀇䧏鍳元聖恢竒遂于首亂之􅀖先有納忠之帥復我疆理平我􅄷讐􅀒羽䝉輪巳聞于深入赤茀邪幅􅀅事于駿奔陳萬賄以展儀僃四旂而告㨗仍願于箕星之分巫閭之旁追􅅣貞珉彰灼来葉以文上請属意宗臣公乃更夢江毫重吞羅鳥町疃河濟呼嘯神祗述列聖之英猷荅藩維之㴱懇既事苞理亂思属安危不唯嵩岳䧏神固亦文星􅂇彩螭蟠龜載䖝􅂐鳥章搆思而君苗硯焚洒翰而元常筆閣公于是有幽州紀聖功之碑天街之北獫狁攸居結以閼氏䧏我皇女奉春君娄敬常為逺使下杜人楊望長作画工乗以無年遂􅃇好分偵邏于甌脱遺􅀕酹于蹛林俾刁斗晨驚兜零夜設公乃上資宸断旁耀軍謀心作􅂕臺手為天馬充國四夷之學此日方知薛公三䇿之徴他時未爽既而􅀑箝飛辨邳石䧏籌不使郭閎仍䜛于叚熲寕教李邑更毁于班超􅀔叶聲同火􅑒水灌遂得朝還貴主暮遁名王轄栁塞之歸車復梅装而向闕及晋城赤狄喪帥歸珪有閼伯之弟兄誕景升之児子􅀅慿蜀閣欲恃吴錢姑務連鷄靡思􅅞虎既垂文誥尚有群疑公乃挺身而進曰重耳在丧不聞利父衛朔受貶祗以拒君今天井雄藩金橋故地跨揺河北脅依山東豈可使眀皇􅃇宫坐為汙俗文宗外相行育匪人忠謀既成上意旋㝎俄又埃昏晉水霧塞唐郊殊懿公之東渉一作徙渡河若紀侯之大去其國稽于時議惮在􅀫兵公又掦笏而言曰彼地則義師師唯宗室乃􅀇祖勤啇之邑后稷造周之􅀖􅏨􅚩具存堂構斯在苟虧策画不襲翦仇讐則是奨夙沙􅅞主之風長冐頓射親之族昔武安君用􅃏坑卒四十一萬齊桓公受昨立功一十二國今真􅀅軍為時而岀賢諸侯代不乏人况其俗産代地之名駒冨管涔之良璞有抱􅀣辭荣之節有􅃮身報徳之風邪躡􅁕以謀屈指而㝎謝安之圍棋尚刦曺参之飲酒正酣適有軍書果聞戎㨗邯午謝衆丕豹出奔楽毅不歸鄒衍已去砥磨周􅃏水淬鄭刀萬里来􅀽紹之頭顱二冢塟􅃖尤之肩髀何其纂立大効􅀣建嘉績若是之速欤宗英可汗既畏王威遂聞請吏㽞􅀺􅀴潞對潼酪以知羞毳幕氊裘望衣冠而有慕文畢一作大異伯氏之胤呼韓單于之頭或執圭而朝靈囿㦯觧辮而拜甘泉並垂于冊書况􅀍以眀命百王共貫三代同規公于是奉命有討北狄之詔伐上党之制諭囬鶻之􅒛五慰堅昆之書四毎牙管既㧞芝泥􅀅乾上輙曰尔有獨断朕無疑謀固俟沃心不可假手公亦分隂可就落簡如飛故毎有急宣関于宻画内􅒉外制皆不與聞此又豈可与美洞簫而諷于後庭聞子虗而嗟不同世者論功而較徳邪其有􅀔切疾雷機難終日属宣室未召武帳不開公莫暇昌言且陳宻䟽賈太傅之􅁨國固動􅀷誠山吏部之論兵詎因夙習凡􅀁奏御罕或依違迨及武宗下武重光崇名􅂯易公又觀圖東序按牒西崑率億兆同心列公卿㝎疑以一十四字垂百千萬年􅇨縟詞華鋪舒名實秦晋于玉檢瑶䋲之内平勃于綠疇䜛鼎之間方􅀅命禮官召儒者訪匡衡後土之議採公玉眀堂之圖攷四覲之禮于梁生取封禅之書于犬子盡皇王之盛事極臣子之殊功軒鼎􅀅成禹書就掩然猶進先嘗之藥獻髙手之醫蔵周旦請代之書追漢宣易名之義作為大誥祈于昊天始終一朝紹續九徳其功伐也既如彼其制作又如此故合詔誥奏議碑賛等凢一帙一十五􅃃輙署曰㑹昌一品集云紀年尊帝追聖徳也書位旌官業也不言制集崇論道也惟公字文饒姓李氏趙郡人盖大􅄧中丘有風雨翕張之􅀔藂􅄗髙邑名山河隠軫之􅂕萃于直躬慶是全徳許靖廊庙之氣黄憲師長之姿何晏神仙叔夜龍鳯宋玉間麗玉衍白晳馬援之眉宇盧植之音聲此其妙水鏡而為言託丹青而為􅁉至于好禮不􅌒用和為貴敬一人而取悦謙三位而無咎意以黙識􅃀乎寡詞車匠胡奴㒺迷于半面背碑覆局無俟于耑心聿成儉訓不有長物昔猶卑官端坐心齋江革分謝朓之舊􅃭便為卧具周正得􅀽憲之談柄嘗在講筵五車自娱三箧能識麗則孔門之賦清新鄴下之詩重以多􅀎推于小學王子敬之􅊢法遒媚皇休眀之草􅀔沉著異代相逼當世罕儔不􅄭遇人慎于取友与李杜齊名者少願僑扎交貺者稀故􅀎􅀿是昌時媚于天子憲章皇極爕理􅀇穹燭耀家聲粉餙國史牟帝典之灝灝噩噩遵王道之蕩蕩平平而又不節怨嗟知進憂亢張良竟􅁛多病王充方務頥神無頴陽之善田乏好畤之巨産何曽之食既去虞悰之鮓方嘗􅁨其厚味有爽和氣肴薮無任琴鶴有餘成萬古之良相為一代之髙士繄尔来者景山仰之某昔者左曺每事先帝雖詭辭望利不接于話言而申義約文庶窺乎風彩代天之言既集蟠地之樂難忘盖属才華用以為序以鄒衍之迃恠􅀅穎嚴之淺近忽焉承命何所措詞五嶺幽遐八桂森爽莫逢博約寕遇切磋䖏无價之埸率然占玉登不枯之岸粗尔論珠雖嘗有意焉亦不知量也某叩頭􅂯拜上前題改定啇隐之作義山有􅇒徐躐􅁃之學鄭亞有討論脩飾之功姚識綸綍文粹作紼之興載籍之始先王􅀤號施令眀罰敕法盖夲于此也唐虞之盛二典存焉夏殷之興厥有訓誥自胤征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代紀綿逺其代工掌制之名氏莫淂而知至於成湯太甲則有仲虺伊尹為之訓誥髙宗得傅説則有説命之篇周公召公相成王則洛誥酒誥周官顧命秦始皇并一區宇丞相李斯實掌其言漢興當秦焚書之後侍従之臣皆不習文史䔥曺之軰又乏儒墨之用每封功臣建子弟其辞多天子為之縦委于執翰者亦非彰灼知名之士武帝使司視草率皆文章之流以相如非􅀅相之器也厥後寝微寖長下于魏晋亦代有其人我髙祖革隋文物大偹在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立于玄宗之朝常楊継美于代宗之代自憲宗皇帝英武啟運雄圖赫張中興之業髙映前古其時則先太師忠公翺翔内署有宻勿賛佐之績平吴定蜀時惟其功及登樞衡作霖雨尊王室卑諸􅀱圖蔡料齊外㝎内理􅂋王言于典誥彰帝範于圖藉紀在徽冊播于無窮特進太子少保分司東都衛公長慶中事惠皇時為翰林學士訓誥之業彰于傳聞昭粛皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付玄機􅁢壓神度每彤墀奏罷别承天眷帝亦講伊尹傅説之㫖㝎元首股肱之契以太平之制度上古之文教咸属于公焉㑹先太后懿號未立帝眀􅀤有永懐之痛公述沙麓神井之瑞賛繞樞懐日之􅂟􅅷遵聖緒光慰孝思于是承命有宣懿祔庙之制及武宗郊昊天拜清庙文物胥僃朝廷有禮華夷述職河朔脩貢乃顕神體薦徽號奉􅀭一徳以示萬方于是撰仁聖丈武至神大孝之冊封域無虞天子翛然有求􅀇之思乃範貞模聖表隆凖日角燭于宫庭中外臣僚咸欲以頌山河而褒日月也公于是有聖容之賛天街之北獯鬻攸居因饑憑􅁜怙衆強禦嚴之以刁斗而勃尔無懼申之以文告而腆然不率天子震怒旋命征之公獨運沈機上資神断萬里勝􅀒决于帷中雷電既震犬羊遽潰疣贅披抉腥膻觧離遁其名王復我貴主公于是有討北狄之詔天寳末薊門為首亂之地瘡痏榛􅁄襲世未平至于漁陽率武仲掃除妖孽􅆇􅀗仇讐奉掦威神乃底康靖仍願勒石于盧龍之塞以叙聖功飛章上聞帝用􅁢若公祗􅈾明命抒展格言呼嘯神祗吐納嵩華當晝而文星現不寐而白采成靖諸侯不朽之勛尊元后無私之化公于是有幽州紀聖之碑潞帥劉従諫死其子因関河之險恃甲兵之衆請爵争地屡聞王庭中外疑迷互撓天聼帝􅀅耀神武公累罄忠謀且言曰重耳在丧不聞利父雄渠受戮秪以抵君况明皇􅃇宫天井内地跨揺河北脅􅀝山東豈可行有匪人坐爲汚俗若是可忍孰不可忍沃心無疑躡足乃定又曰上党居天下之脊當河朔之喉今漳水雄兵常山劲卒是爲唇齒寔惧因依不若乗其未萌制其􅀅動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以􅂆戒之魏侯鎮侯僇力従命絶壺関之右臂􅀵泜水之上㳺􅀗兹渠魁在此成􅈫又轅門叛􅀅横水餘兇窃上相之旌旗盗晋陽之管鑰帝怒斯赫人心愈疑咸以師老于郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又􅀭笏而言曰彼地則義師帥分宗室是玄祖勤啇之邑后稷造用之􅀖􅀲瓞俱存堂構斯在苟虧䇿画不襲仇讐則是奨彌牟􅅞主之風長冐􅉐射親之俗詩􅁛築于道旁書謂疑謀勿成由是洞啟宸􅂨大破群議運籌制勝舉無遺䇿防㣲致逺必契神机授􅃏之臣伏􅈾承命謝安之圍碁尚刦曺参之飲酒方酣果有軍書継聞戎㨗砥磨周􅃏水淬鄭刀萬里来袁紹之頭顱二冢塟􅃖尤之肩髀歡聲雖震于朝市喜氣不見于形容何其纂立功勛鎮定風俗若是之重也公于是有伐上党之制平晋陽之敕宗英可汗献琛輸贐越自􅅸漠通于夲朝文畢伯氏之胤呼韓谷蠡之師或執玉而朝􅂕囿或觧辮而拜甘泉並垂于冊書光彼眀命公于是有諭囬鶻之命五慰堅昆之書四文章等于􅀓訓機事出于神明固􅀅偃仰邳石之符傲睨􅄦䈤之録聞之者可以祛聾瞶淂之者可以弼􅀖國每牙管既㧞芝泥􅀅熟嘗于前席親授筆扎公亦分隂可就落蕳如飛時有急宣関于宻画内庭外制皆不與聞或􅀔如疾雷机難終日宣室未召武帳莫開公則手䟽封章逹于旒扆當一夜􅀚書之際未嘗不稱美再三此又豈可與􅀓洞簫而諷于後庭聞子虗而嗟不同世者論功校徳邪􅀊在已丑群公嘗伯以天子之道貫于神祇一年而風雨有序灾沴不作二年殱醜虜興北伐之詩四年誅狡童詠東征之歌而又移摩尼之風壊浮圖之俗偃兵反樸四海胥㝎思欲增鴻名光下武公乃􅀚東序之圖按西崑之牒鋪舒名實藻縟文采􅁼于上帝為唐神宗公于是纂章天成功神徳明道之冊文號位既畢華夷㑹同方􅀅命禮官召儒者訪匡衡后土之議採公玉明堂之圖攷四覲之禮于梁生取封禅之書于犬子盡皇王之盛事極臣子之殊功而軒􅂦􅀅成禹書就掩然猶進先嘗之薬献髙手之醫蔵周旦請代之書追漢宣易名之美作為大誥祈于昊天始終一朝紹續九徳其功伐也既如彼其制作也又如此故合武宗一朝冊命典誥奏議碑賛軍機羽檄凢兩帙二十卷輙署曰㑹昌一品制集紀年追聖徳也書位旌官業也􅀊在丁卯亞自左掖出為桂林九月公書至自洛以典誥制命示于幽鄙且使為序以集成書尋玄珠莫究其􅌼域聴希聲莫窮于髙下承命震􅂲㡬移朝夕援筆而復止者三四伏念江陸􅁱盪辞譲不及因齋潔以序焉夫全功難恃大名難兼日赫于畫而乏清媚月皎于夜而無温煦冬之為侯也則霜雪飄􅁀凍入肌髪夏之為用也則金流石鑠火走膚􅎃如陽春髙秋者稀焉南則瘴風毒虺之為厲也北則獯戎􅃛虜之為患也如洛邑咸秦者㡬焉鵰鷲不􅀓之以馳騁驊騮不授之以騫翥如􅀿龍者鮮焉仲尼聖賢之宗也官不過柱史如􅁎旦者㡬焉是以保衡傅􅀃佐佑殷宗召公畢公寅亮周室咸著大訓克為元龜書契以来未之多有李斯以刻石紀號之文勝而不在休明之運又何足数㢤周勃霍光雖有勛伐而不知儒術枚臯嚴忌善為文筆而不至岩廊自是以䧏其􅁼寔繁惟公藴開物致君之才居元弼上公之位建靖難平戎之業垂􅀴天緯地之文萃于直弼慶是全徳盖四序之陽春九州之咸洛品彚之􅀿龍人倫之姫旦後之學者其景行之云尔唐容州􅀴略使元結文集後序次山有文編有詩集有元子三書皆自為之序次山見譽于公弱夫蘇氏始有名見取于公浚楊公始淂進士第見憎于苐五􅄾元載故其􅀅兵不得授作官不淂逹母老不得盡其飬母丧不淂終其哀間二十年其文危苦激切悲憂酸傷于性命之際自占心􅀴已下若干萹是外曽孫遼東李惲辞􅀵淂之聚為元文後編次山之作其綿逺長大以自然為祖元氣為根變化移易之太虗無状大賁無色寒暑有出􅀑神有聀南斗北斗東龍西虎方嚮物色歘何従生啞鐘復鳴黄雉變雄山相朝捧水信潮汐若大饜然不覺其異􅀂大醉然不􅁴其醒其疾怒急撃快利劲果出行萬里不見其敵髙歌酣顔入飲于朝断章摘句如娠始生狼子豽孫競于跳走剪餘斬殘程露血脉其詳緩柔潤壓抑趨儒如以一國買人一笑如以萬世換人一朝重屋深宫但見其脊牽繂長河不知其載死而更生夜而更眀衣裳鐘石雅在宫蔵其正聴嚴毅不滓不濁如坐正人照彼佞者子􅀙其翁婦從其姑􅆆麾為門懸木為牙張盖乗車屹不敢入􅀅刑断死帝不淂赦其碎細分擘切截􅊏顆如墜地碎若大咽上聲餘鋸取朽蠧檪蟒岀毒刺眼楚去聲齒不見可視顧顛陪錯􅇎汙瀦傷損如在危䖏如出夢中其惣㫖會源條綱正目若國大治若年大熟君君堯舜人人義皇上之視下不知有尊下之望上不知其􅆲辮頭鑿齒扶服臣僕融風彩露飄零委落耋老者在童齓者蕃邪人佞夫指之觸之薰薰熈煕不知其故吁不淂盡其極也論者徒曰次山不師孔氏為非嗚呼孔氏扵道徳仁義外有何物百千萬年聖賢相随于􅂗中耳次山之書曰三皇用真而恥聖五帝用聖而恥明三王用明而恥察嗟嗟此書可以無盡孔氏固聖矣次山安在其必師之邪樊南甲集序樊南生十六􅀎著才論聖論以古文出諸公間後聨爲鄆相國華太守所憐居門下時敕㝎奏記始通今體後又两爲秘省房中官恣展古集徃徃咽噱于任范徐􅁃之間有請作文或時淂好對切事聲势物景􅂨哀上浮壮能感動人十年京師寒且餓人或目曰韓文杜詩彭陽章檄樊南窮凍人或知之仲弟聖僕羲􅅱特善古文舉㑹昌中進士爲第一嘗表以今體規我而未焉􅀎休大中元年􅀍奏入嶺掌表記􅀁爲亦多冬如南郡舟中忽􅂧括其所藏火燹墨汚半有墜落因削筆衡山洗硯湘江以􅀋相䓁凡得四百三十三件作二十卷喚曰樊南四六四六之名六博格五四数六甲之取也未足矜十月十二日夜月明序樊南乙集序余為桂林従事者嘗使南郡舟中序所為四六作二十編眀年正月自南郡歸二月府貶選為盩厔尉与班縣令武功劉官人同見尹尹即㽞假􅂙軍事専章奏属天子事􅁁康季荣首淂七関後数月李玭淂秦州月餘朱叙明又得長楽州而益丞相亦尋取維州聨為章賀時同僚有京兆韋觀文河南房魯楽安孫朴京兆韋嶠天水趙璜長楽馮顓彭城劉􅁢章是数軰者皆能文余每著一篇則取夲去是􅀊􅁙牛太尉天下設􅀕者百数他日尹言吾太尉之薨有杜司勛之誌與子之奠文二事為不朽十月尚書范陽公以徐戎凶悍莭度闕判官奏入幕故事軍中移檄牒刺皆不関决記室判官専掌之其関記室者記室假故余亦􅂙􅇎􅀿用明年府薨選為博士在國子監太學始主事講􅀴申誦古道教太學生為文章七月尚書河東公守蜀東川奏為記室十月得吴郡張黯見代改判上軍時公始陳兵新教塲閲数兵寔判官務檢舉條理不暇筆硯明年記室請如京師􅂧攝其事自桂林至是􅀁為巳五六百萹其間可取者四百而己三年已来丧失家道平居忽忽不楽始剋意事佛方願打鐘掃地為清凉山行者于文墨意緒濶略凡􅀁為置大半箧􅂗逭破裂不復條貫十月弘農楊夲勝始来軍中本勝賢而文尤楽􅀵聚牋刺因懇索其素􅀁有㑹前四六置京師不可取乃強聫桂林至是所可取者以時以􅀋亦為二十編名之曰四六乙集此事非平生􅀁専尚􅀿求俻卒不足以為名直欲以塞夲勝多愛我之意遂書其首是夕是大中七年十一月十日夜火盡灯暗前無􅀑鳥一如大中元年十月十二日夜時書罷永明不成寐李賀小􅀓京兆杜牧為李長吉集序状長吉之竒甚盡世􅀓之長吉姊嫁王氏者語長吉之事尤俻長吉細痩通眉長指爪􅀎苦吟疾書最先為昌􅀺韓愈所知􅀁與㳺者王􅂙元楊敬之權璩崔植為宻每旦日出与諸公㳺未嘗淂題然後為詩如他人思量牽合以及程限為意恒従小奚奴􅀐疲驢背一古破錦囊遇有􅀁得即書投嚢中及暮歸太夫人使婢受囊出之見􅀁書多輙曰是児要當嘔出心始已耳上燈與食長吉従婢取所書研墨叠􅁓足成之投他嚢中非大醉及弔丧日率如此􅂈亦不復省王楊軰時復来􅊥取冩去長吉徃徃獨􅀐徃還京洛􅀁至或時有著随弃之故沈子明家所餘四卷而己長吉􅀅死時忽晝見一緋衣人駕赤蚪持一版書若太古􅂐或霹靂石文者云當召長吉長吉了不能讀歘下榻叩頭言阿祢呼母聲也老且病賀不願去緋衣人笑曰帝成白玉樓立召君為記天上差楽不苦也長吉獨泣􅁁人盡見之少之長吉􅂔􅅸長􅀁居􅈧中勃勃有烟􅂔聞行車嘒管之聲太夫人急止人哭待之如炊五斗􅁰許時長吉竟死王氏姊非􅀎造作謂長吉者實􅀁見如此嗚呼天蒼蒼而髙也上果有帝邪帝果有􅁐囿宫室觀閣之玩邪苟信然則天之髙邈帝之尊嚴亦冝有人物文彩愈此世者何獨番畨于長吉而使其不夀邪噫又豈世所謂才而竒者不獨地上少邪天上亦不多邪長吉生二十四年位不過奉禮太常中當時人忌亦多排擯毁斥之又豈才而竒者帝獨重之而人反不重邪又豈人見㑹勝帝邪唐刑部尚書致仕贈尚書右僕射太原白公墓碑銘公以致仕刑部尚書年七十五㑹昌六年八月薨東都贈右僕射十一月遂葬龍門子景受大中三年自頴陽尉典治集賢御書侍太夫人弘農郡楊氏来京師胖胖兢兢奉公之遺畏不克既乃件右功世以命其客取文刻碑文曰公字樂天諱居易前進士避祖諱選書判㧞萃注秘省校書元年對憲宗詔䇿語切不淂為諌官􅀘盩厔尉明年試進士取故蕭遂州澣為苐一事畢帖集賢校理月中詔由右銀臺門入翰林院試文五萹明日以􅀁試制加叚佑兵部尚書領洷州遂為學士右拾遺滿􅀅擬官請􅁺京兆以􅂇供飬授户曺時上愛兵㐮陽􅍮州入䟽献物在約束外公宻詆二帥且曰非善良後雖与宰相不厭入祸其後禮官竟以多殺不辜謚于頔為厲李師古襲父事逆務作項領以謾儕曺上鋑六百萬贖文貞故苐以與魏氏公又言文貞苐正當用太宗殿材魏氏􅀊臘鋪席􅀕其先人今雖窮後當有賢即朝廷覆一瓦魏氏有分彼安肯入賊所贖苐邪上由是賜不直券以居其孫在聀三年每讌見多前笏㽞上輦是否意詔湔剔抉摩望及少年見天下無一事五年㑹憂掩坎廬墓七年以左賛善大夫著吉武相遇盗殊絶賊弃刀天街日比午長安中盡知公以次紙為䟽言元衡死状不得報即貶江州移忠州刺史穆宗用為司門貟外四月知制誥加秩主客真守中書舎人叙緋受㫖起田孝公代恒陽孝公行贈錢五百萬拒不納燕趙相殺不巳公又上䟽列言河朔畔岸􅂧不報又貶杭州既至藻堤扞江分殺水孔道用肥見田􅀤故鄴􅀱泌五井渟儲甘清以变飲食循錢塘上下民迎禱祠神伴侣􅁔舞徙右庶子出蘇州授秘書監換服色遷刑部侍􅀰乞官分司淂太子賔客除河南尹復為􅃇官進階開國九年除同州不上改太子少傅申百日假又二􅀊淂􅀁薨官白氏由椘入秦秦自不直杜郵事封子仲太原以有其後祖鞏縣令考季庚㐮州别駕贈太保一女妻譚氏始公生七月􅀎展書指之無二字横縦不誤既長与弟行簡俱有名故李刑部建􅁃左丞敬休友最善居家以户小飲薄酒朔望晦輙不􅁏食携鄧同韋椘白服㳺人間姓名􅂈海流入雞林日南有文字國為中書舎人三日如建中詔書上鄭公覃自代後為相稱貭直文宗時文貞果有孫起使下数􅀊至諫議大夫賢可任為今上御史中丞他日景受嘗跪曰大夫居翰林六同列五具為相獨白氏無有公􅀏曰汝少以待其曾祖弟今右僕射平章事敏中果相天子􅂧憲宗􅀁欲淂開七関句䋲城守四州以集巨伐仲冬南至􅊀宰相儀物擎跪齋栗給事寡嫂永寕里中有兄弟家指嚮健慕以信公知人集七十五卷元相為序系曰公之世先用談説聞肅代代􅄖布蹤河南隂徳未校公有弟昆夲䟦不揺乃果敷舒匪骼匪腨噫烏介反其醇􅃾于郷洎􅀖取用不窮天子見之層陛玉堂徴徴其中上沃唐禹帝為輦㽞續緒襞􅈁􅀊終當遷户曺是取曄白其􅂠皭不痕緇去用􅀙弃遣至道天子疇誰与伍率中道上納筆躡麾綽三群理既去刑部倐東其居大尹河南翦其􅁀逋君有三輔臣有田畆臣衰君強謝不堪守翊翊伸伸君子之文不僣不怒惟君子武君子既貞两有其矩孰永厥家曽祖之弟坤柄巽䋲以就大計匪哲則知亦有教詔益褒其收揠莠而導刻詩于碑以報百世公老扵家遂塟其地太倉箴險㢤太倉險若太行彼懸車束馬為陟髙岡此禍胎怨府起自斗量無小無大不可不防澄波萬頃不廢汪汪火烈人畏不廢剛膓􅂚若寛猛䖏于中央錢榖之地勿言容易貪夫狥利有死無二御􅃛馬銜不淂不利下或䛕我過人之聦是人甘言􅀅欲相聾下㦯誇我秋毫必暏是人甘言􅀅欲相瞽長如欲􅀾莫捨強弩長如􅀗禽莫􅁯縛虎衆人之言有譌有眞如彼五味有甘有辛口自嘗取無信他人天生五色有白有黑目自别取無為人惑而况乎九門崇崇近在墙東天視天聴唯眀唯聪問龠合斗斛何以用銅取寒暑􅁀露不改其容亦象君子介然居中終日􅀾慄猶惧或失銜用何利鍜之以清虎用何縳挼之以明弩用何射􅀤之以誠俾後居上無由以生有餘不􅁕無由以争心為凖概何憂乎不直不平各敬爾職一乃心力倉中水外人馬勿食陶母反魚以之歎息豈無他粟豈無他芻薏苡似珠不可不虞倉中役夫千逕萬途桀􅃛為炭眭盱為爐􅀿事成象無有㝎模縁私指使慎勿以呼賔朋姻婭或来讌話倉中酒醴慎勿以貰海翁無機鷗故不飛海翁易慮鷗乃飛去是以聖人􅀙微至著不遺忠怒借借貸貸此門先塞湏防蒼蝇變白作黒嗚呼孰慮孰圖昔在漢家倉令淳于致令少女上訴無辜䧟身至是不亦悲乎敢告君子身可殺道不可渝蝨賦亦􅂔而運亦􅆑而成晨鷖露寉不知其生汝聀惟囓而不善囓囬臭而多跖香而絶後蝨賦并序余讀玉溪生虱賦有就顔避跖之歎似未知虱作後虱賦以矯之衣緇守白髪􅂠守黒不為物遷是有恒徳小人趨時必變顔色弃瘠涵􅃾乃虱之賊蝎賦夜風索索縁隙憑壁弗聲弗鳴潜此毒螫厥虎不翅厥牛不齒尔兮何功既角而尾断非聖人事堯去子舜亦去子周公去弟後世以為􅀎断此絶不知聖人事者断之為義疑而後㝎者也聖人所行無疑又安用断聖人持天下以道民不得知聖人理天下以仁義民不淂知害去其身未仁也害去其家未仁也害去其國亦未仁也害去其天下亦未仁也害去其後世然後仁也宜而行之謂之義子不肖去子弟不順去弟家國天下後世皆䝉利去害矣不去則反宜然而為之堯舜周公未嘗疑又安用断故曰断非聖人事譲非賢人事世以為能譲其國􅀎譲其天下為賢人此􅅸不知賢人事者能譲其國􅀎譲其天下是不茍取者耳湯故時非無臣也然其卒佐湯有陞陑之役鳴條之􅀾竟何人哉非伊尹不可也武故時非無臣也然其卒佐武有牧野之誓白旗之懸果何人哉非太公望不􅀎也茍伊尹之譲汝鳩仲虺太公望之譲太顛閎夭則啇周之命其集乎故伊尹之醜夏􅂧歸太公望之􅀤掦蹈厲當此時雖百汝鳩百仲虺伊尹不譲也百太顛百閎夭太公望亦不譲也故曰譲非賢人事象江太守荥陽鄭璠自象江得恠石六其三􅋍而鋭上又一如世間道士存思圖画人肺胃肝腎次第懸絡者又一空中而隐外若癃癭殃疝並不作物者又一色紺冰去而理平漫弹之好聲璠為象江三年不病瘴平安寝食及還長安無家居婦児􅀉止人舎下計輦六石道費俸六十萬璠嗜好有意極􅀋前軰人華山尉陶生有恒人善飬又善与人㳺又善為官㑹昌􅀄生病骨􅀬且死是年長安中進士為陶生誄者数十人生在時吾已淂之矣及既死吾又得之矣齊魯二生右一人字蟠之其父少良夲鄆盗人也晚更與其徒畜牝馬草一驘私作弓矢刀杖學􅀤冡抄道常就㢠逺坑谷無廬徼䖏依夫林木早夜偵候作奸李師古貪諸土貨下令卹啇鄆与淮海近出入天下珎寳日日不􅅸少良致資以萬􅂾每旬時歸妻子輙置食飲勞其党後少良老前􅀁置食有大臠連骨以牙齒稍脱落不􅀎食其妻輙􅁸請党中少年曰公子與此老父椎埋剽奪十􅂾年竟不計天下有活人今其尚不􅀎食况能在公子叔行邪公子此去必殺之草間無為鉄門外老捕盗所狙快少良黙惮之出百餘萬謝其党曰老嫗真觧事敢以此為諸君别衆許之與盟曰事後敗出約不相引少良由是以其貲發擧􅐙轉与隣伍重信義䘏死丧断魚􅁏葱薤禮拜画佛讀佛書不復出里閈意若大君子􅀎悔咎前􅁖者十五年死子􅋮率不知後一日有􅂈其母罵之曰此種不良庸有好事邪􅋮泣問其語母盡以少良時事告之􅋮號泣数日不食乃悉散其財踰年􅋮甚苦貧就里中舉負給薪水洒埽之事讀書日数千言里先生見之時與饘糗布帛使供飬其母後漸通五經厯代史諸子􅇎家徃徃同學人去其師􅀙􅋮講授又其為人寛厚滋茂動静有䋲墨人不敢犯烏重胤為鄆帥喜聞􅋮与之錢数十萬令市書籍􅋮􅂧以其餘賚諸生其閭里故徳少良者亦嘗来與􅋮孳息其貨数年復致萬金􅋮固不以為已有䋲墨管楗􅇎付比近用度費耗了不勘詰道益髙開成􅀄相國彭城公遣其客張谷聘之􅋮不起劉乂右一人字乂不知其所􅀙来在魏与焦􅄥閭氷田滂善任氣重義大軀有聲力嘗出入市井殺牛及犬豕羅􅃠鳥雀亦或時飲酒殺人變姓名遁去㑹赦淂出後流入齊魯始讀書􅀎為歌詩然恃其故時􅀁為輙不能俯仰貴人穿􅄚破衣􅀙尋常人乞丐酒食為活聞韓愈善接天下士歩行歸之既至賦氷柱雪車二詩一旦居盧仝孟郊之上樊宗師以文自任見乂拜之後以争語不􅀎下諸公因持愈金数斤去曰此䛕墓中人得耳不若与劉君為夀愈不能止復帰齊魯乂之行固不在聖賢中庸之列然其􅀎面道人短長不畏卒祸及淂其服義則又弥縫勸諫有若骨􅁏此其􅂈人無限宜都内人武后􅆲既乆頗放縦耽内習不敬宗庙四方日有叛逆防豫不暇時冝都内人以唾壷進思有以諫后坐帷下􅀝檀機与語問四方事宜都内人曰大家知古女卑于男邪后曰知内人曰古有女媧亦不正是天子佐伏羲理九州耳後世嬢姥有越出房閣断天下事者皆不淂其正多是輔昏主不然抱小兒獨大家革天姓改去􅁫釧襲服冠冕符瑞日至大臣不敢動眞天子也然今内之弄臣狎人朝夕進御者乆未屏去妾疑此未當天意后曰何内人曰女隂也男陽也陽尊而隂卑雖大家以隂事主天然宜體取剛亢眀烈以消群陽陽消然后隂淂志也今狎㺯日至䖏大家夫宫尊位其􅀔隂求陽也陽勝而隂亦微不可乆也大家始今日􅀎屏去男妾獨立天下則陽之剛亢眀烈可有矣如是􅂈萬萬世男子益削女子益専妾之願在此后雖不能盡用然即日下令誅作朙堂者劍州重陽亭銘陪臣未嘗屡睹天子宫闕矧淂舞殿陛下邪然下國伏地讀甲乙丙丁詔書亦有以識天子理意尺度堯舜不差毫撮于􅅸逺人意尤在不然者安得用江陵令使上水六千里挽大小虎牙灔澦黄牛險以治普安令既爲􅀱講天子意三年大理田訟断休市賈平獄户屈膝落民不識胥吏四方賔頗来䌓馬靡牛􅀣膚不生乃大鏟險道緄石見土其平可容考工車四軌建爲南北亭以經劳餞又亭東山號曰重陽以醉風日南北經貫若出平郡無有噫三年民􅂲即去遮觀請㽞東山實在亭下侯蔣氏名侑文曰仁之爲道隆磊英傑天簡其勞羡以事物爲君之蒋是撮􅂑不窮如武有庫蔣之有世以仁爲歸伯氏之宜仲氏之思厥弟承之䋲而不紈以令為侯天子之徳汝侯為理劍有盈昃君南臣北父坐子伏飲牛漚菅由訟以直市正獄清謁歸告休朝雨滂沱􅊜其帩頭民楽以康願有􅂋庸侯作南亭北亭是雙至于東山乃三其功推險為夷大石是扛亦既三年民走乞㽞伯氏南梁重弓二矛古有魯衛惟吾之曺惟仁之歸有丗在下其攄其超尾鬛馬馬惟蔣之融由唐龎嘏惟是亭銘淂其粗略唐大中八年九月一日太學􅀶士河南李啇􅀮撰李義山文集卷第五􅀕文代李􅀇為京兆公􅀕䔥侍􅀰文年月日惟􅂕􅀓芳華胄禀慶􅂕源漢朝輔相之流輝梁室帝王之遺懿克生俊徳彰我休期髙表百尋澄波萬頃及春闈献藝㑹府試才騏􅂹出塵蛟龍得水頓纓而駑駘盡丧乗氣而鱉蜃皆空憑􅇒逺天􅉜蹀長道是􅀅筮仕光乎縉紳侯國􅀙知大朝就選祕寳冝陳于東序朱􅌧必䧏于上玄錦帳而居青縑以覆建禮推盡瘁之績朙灮多伏奏之勤亦既遷荣乃司論駁髙居靑􅃈封還􅂵泥使眀時無失政之譏大􅀖無不便之詔暫辭朝籍徃分郡符借冦莫􅀙徴黄甚急方将啟乎良友進彼令人志豈爱身誓􅀅許國不謂􅃠踈猶漏斯文未康作礪為塩正俟理􅊭之運依城慿社深懐剪㓕之餘上蔽聪眀内求媟近故鴻猷不淂而叶賛睿化莫可以輔成藐是流離有窘陰雨嗚呼令惟逐客誰􅂧上書獄以党人但求俱死銜􅁈既徃吞恨􅀌居目断而不見長安形㽞而逺託異國屈􅊭忠而􅀗罪賈􅁩夀兮不長才易炎凉遂分今昔粤自東蜀言旋上京郭㤗墓􅁁空多㑹塟鄧攸身後不見遺􅀌信隂隲之莫知亦生人之極痛某䓁頃同班列􅀗奉周旋分結死生地兼族􅀋依仁既切慕徳方􅀷始驚南浦之悲俄軫下泉之訃今則年良月吉筮恊龜􅀙顧埋玉之難追歎焚芝之何及牲牢粗潔酒醴非多􅂓寫丹誠以申永訣爲綘郡公􅀕宣武王尚書文伏惟曽搆髙基徃修峻址俯爲明時載生竒士杜林􅃇族夲富文理楊惲外甥素多圖史朱檻有􅁉括羽成美逸走䡖従東之道巨背狭圖南之水匡生明習董氏精専魯壁墜簡汲冡遺編坐􅁯流麥出記懐鉛淹中莫敵稷下誰先朝有曲臺時推奥學明博士之髙選資衆儒之先􅁴殷周損益䕫夷禮楽既淂根源盡除蹖駮粉闈假道諫署􅀭輝吾寜訐訕時好依違周舉上章唯求主悟賈生草䟽豈畏人非用之則至舎之則歸旋領藩符俄司國計鋤革煩冗修眀課苐鄙晋室之鬻綀小漢朝之造幣前籌未借歛笏還家􅂯北非罪三黜何嗟淮掦勁兵頴水豪俗既佩新印仍推􅃇轂杜當陽何嘗跨馬雄士争推􅀕征虜不廢投壷師人自睦夷門地古梁􅁐藩雄雙旌大斾二矛重􅃓無忌御車惟求􅀮者相如謝病乃慕髙風方􅀅副帝注心􅀙時大願率周廟之奔走搃漢庭之議論人之不幸今也則亡荘子孰分其䰣魉秦醫莫捄其膏肓㕍沼波瀾空聞怨咽􅇠園臺榭祇具􅂽凉某􅀗顧尤深䝉知甚早公昔分茅愚嘗視草于劉向論思之時賛孟舒長者之號及兹出守寔介親隣音徽継好寤寐依仁嘗期異日克奉清塵何言永慟属此佳辰訃哀如昨歸輙攸遵林薄莾蒼川原隠轔想諸􅁑之旗鼓空還􅃇壘念伯喈之書籍巳付何人侯舘攸開丹旛遽至瞻望衛幕連綿秦畤􅀉算申訣緘詞寫意終阻願于親躬徒加哀于殄瘁嗚呼哀㢤尚饗為濮陽公􅀕太常崔丞文年月日惟􅂕㤗岳繁祉安平望族潤地􅀔于長源搆堂基于修􅅢藍田之産宜有良玊徂徕之松冝無凡木昔我待子松玊之間兾十城之得價望千尋而可攀大年不登逸􅁕方駛松欲秀而先蠧玉􅀅攻而遽毁聞問之時歎悼何巳惟我承乏授命南征一言相許携手同行夐􅅸萬里飄洎雙旌念兩婢之價倍媿五羖之酬􅁿地接殊隣風移中土五嶺三江炎飈瘴雨釣犀之潭站鳶之渚席上従容幕中讌語先防載薏之謗更視投香之􅀁因使庸虗不罹罪􅅈越井之首甘綏之女時清則銅鏑納厨􅀊稔則銀簮扣鼓豈我之自唯子是與相􅀙来覲又徃于泾風埃古戌霜雪􅀌亭偏裻音督國語申生衣偏裻之衣之服縵胡之纓塞逈而晨嚴刁斗沙平而夜警兜零指我以虜隙勉我以武􅀴正慰窮􅁁儀還京邑北庭减價南轅屑泣章臺辟􅁺方喜趙嘉之来􅁄署選丞仍見譙􅀇之入是焉踐厯更徯飛翻况乎鳯沼又栖鴒原何釁生于燥􅊜而慮結于寒暄未及西山之薬旋為東岳之魂憶昨􅃇許員歸青門出餞樂作而歎起杯行而泪泫俱容与于風波共沉吟于風箭揮􅃑如昨郵書甚頻雖遥道里未濶聲塵孰謂念歸之日翻為有慟之晨嗚呼哀㢤彷彿􅂽阡依稀古陌徐動丹旐永歸􅀇宅願執拂而身逺想移舟而目極逈野秋思群山暮色恨白髪之衰翁􅂘青雲之舊客􅂓兹􅀉奠莫寫西悲巳乎崔子為我歆之爲裴懿無私􅀕薛􅀰中衮文伏惟􅂕佐啇宣業朝薛􅀓規門峥層構堂嶪崇基玉生藍岫芝産銅池梧髙駐鳯蓮馥停龜有美令人載稱清卲訓在詩禮楽唯名教王謝標格曺劉才調清如濯􅀬之風明若觀朝之燎􅂕臺委鍳虗室融和秋水望濶春􅄗上多鄊塾掉鞅文林勵戈硯横河漢􅁓落烟波澤宫貍首􅁄埸楊葉箭去星慚􅃓廽月怯兩書上第五辟名公馬卿賦雪陳琳愈風平臺竹􅁐淮王桂叢营分細栁幕染芙容顕備􅄗僚荣崇顯秩冠峩鉄劲衣眀綉宻霜下端簡風生落筆庭夜烏囬天秋隼疾帝念允聀任于諫垣依違絶想􅀙容敢言攀檻而空㽞跡在削稿而不見書存女史䕶衣大官供食伏奏多可分曺著績帳煖錦麗闈明粉白既題柱以如田亦償金而􅀋直漢荣出牧晋議州兵亷袴歌送劉錢贈行濟南之誅巨猾􅀭州之試諸生虎去江静珠来岸明神豈好謙天寕秩禮蠧華國之名品丧士林之模楷使爲善者奪氣求仁者觧體已不駐于郷雲竟何窺于伏濟長洲􅀣古茂􅁐山春橘稅既集茶征是親鷁渡霅而去逺鵠下亭而唳頻翟虜氛興􅇻楹夢􅁸帳入飛鵩床驚閗螘鄭玄知数阮瞻無􅀑終自膏肓􅀓于骨髓嗚呼哀㢤丹霄萬里建木千尋坦坦清路童童翠隂三襲臺迥九重禁􅀷中懸旒扆下集雲簮無非東箭盡是南金或扶傾作棟或望旱為霖顕􅁢明公宜􅈾百福夜暗神昧天長景促青女變霜羲和納旭悄隋掌以銷璣悵周閑之丧騄永惟清族夲富才人有弟則陸無兄不荀原鴒奕奕沼鴈馴馴珩竒動椘璧貴傾秦永矣彼蒼胡然人事但續椿夀徒髙寉位摧壓光價淹淪聲味頴不濁而殄灌宗淮未􅅸而傾王氏某因承中外􅀗奉恩知通孔李道徳之􅃇兼劉盧姻戚之私鑄顔有契全趙為期静龍門之風水剷羊膓之嶮巇空欲銘恩何詶􅀣徳庇􅀌根于髙援許嘉姻于弱植􅀅􅂬宋子俄放湘南綬黄楚徼髩白昭潭歸止未卜弃予是甘許靖之悲方極王粲之憂不堪猶辱重言􅀅敦故約玉無改行金不如諾朂大義于幽沈軫遐心于飄泊使者尚在凶書已来㕍􅁕􅆰逺魚腸不廽淚和峡雨哭振巴雷孰澆枯鮒誰􅅡寒􅁅今則言去邯江當移澧浦稍脱疑䋄猶罹罪􅅈念申慟以無期豈沉􅁈之可吐嗚呼哀㢤執紼路阻佳城望賖􅇒空乏翼上漢無槎或期他日或反中華認楊公之石馬撫周苞之辟邪况良冶規存遺􅀴業在􅆇孫有後魏萬必大敢期陋質終托餘光韋平之紹續無望秦晋之婚姻豈忘絮酒無㡬生芻是􅀅詞多失次涕􅂾無行兾桂旌之不逺䧏蘭佩之餘芳嗚呼哀㢤尚饗􅀕吕商州文惟􅂕族光釣渭慶顕歌齊竹分東箭玉奪南圭逶迤霄路睥睨雲梯淺牙洞䑕短刃分犀古聖堂奥前賢町畦湔腸効薬刮目㽞箆弹琴而放臣見釋賣賦而妒后還閨既歩京國亦荐郷里與田蘇㳺有太叔羙鄴都才運洛陽年齒何晏神仙張良女子禮闈之善譽也如彼冊府之􅀓名兮若此嚢成内殿之帷書貴皇都之􅁓中臺南省諫署戎藩才難價重政舉人存蓮池易曉蘭圃多暄涵波獨躍弄景􅀌翻王粲楼中嘗􅀴暇日楊雄宅􅂻㡬弔遺魂参差遘閔萋菲成􅁈漢庭毁􅁩楚國䜛原建禮門内明光殿外直金既肆以猜疑魏􅀍竟従于沙汰䝉犯霜露支離埃􅝙厲山遥欎乎朝嵐溠水旁奔其素瀬猶懐毒艸􅂈農井以低窺尚憶神珠向隋臺而獨酹渚宫貳尹相府中􅀰􅀅伸蠖屈欲􅂧鴛行朱轓意􅂔皁盖輝光訓説則馬季長之居南郡風流則􅇻仲文之守東陽劉􅃂一錢鄧攸五鼓遂􅄙郡符来登書府儒林文囿瑶山瓊圃鉛槧朝閲芸籖夜􅂾爪當鄭灼之心錐在蘇秦之股是従佐理于彼東周雷喧洛􅂀電掣嵩丘玉泉嘉月金谷清秋陳思王之羅襪郭有道之仙舟不無賦永􅂓以優㳺漢入嶢関晋分隂地藉賢太守之政有古諸侯之貴載掦筆陣復清劍􅂔長卿痟渴士安風痺逝川㡬歎于不廽朝露俄聞于溘至嗚呼昔也風塵投分平生少年雕籠競巧􅀝馬争妍開􅁭隋岸促膝伊川月中乃共誇科桂池􅂻亦相驚幕蓮劉樗屡擲畢甕多眠終以世務紛綸物情推斥撫事傷年减歡加戚路泣楊子􅁝悲墨翟縦風至而音来竟月同而地隔逮予廉部及子頒條革尊㫖酒綺席嘉肴各懸章綬俱失簟瓢雖論金而契在終照玉而顔凋子牟之思魏闕望之之憶漢朝誠知舌在不覺魂銷書断三湘哀聞五嶺天涯地末髙秋落景重叠憂端縦横淚綆漏虬夜促隙駒朝騁怨􅇨繪之亡雕惜陽春之亂郢言念令季託余属城鴒原㕍序昔日歡忻蠻圻瘴嶠今日􅂘聲愍支體遽亡于手足况兄弟不如其友生嗚呼厚夜依臺窮泉訪路已已金骨嗟嗟玉􅀣莫和哀挽􅆰陳薄具銜萬里之遐城托千辭之􅀉喻異時松楸枯朽羊虎傾頽草􅀫苔厚門平闕摧尚期越礼用寫餘哀􅂕今不昧倘或来㢤奠相公令狐公文戊午􅀊丁未朔乙亥晦弟子玉溪李啇􅀮叩頭􅂘奠故相國贈司空彭陽公嗚呼昔夢飛塵􅀙公車輪今夢山阿送公哀歌古有􅀙死今無奈何天平之年大刀長㦸􅀅軍撙旁一人衣白十年忽然蜩宣甲化人譽公憐人賛公罵公髙如天愚卑如地脱蟺如蛇如氣之易愚調京下公病梁山􅅸崖飛梁山行一千草奏天子鎸詞墓門臨􅅸丁寕託尔而存公此去邪禁不時歸凤栖原上新􅃇衮衣先人亦司􅆰有泉者路有夜者臺昔之去者冝其在㢤聖有夫子廉有伯夷浮魂沉魄公其与之故山峩峩玉溪在中即玉泉在河南濟源縣東送公而歸一世蒿蓬嗚呼􅀕長安楊􅀰中文年月日謹以云云之奠􅀕于宗尹􅀰中之􅂕昔荘南華之言物故則曰若巨室之偃歸人陶貞白之語玄機則曰雖頑仙不如才􅄦邈以髙論皭然深㫖有感斯文属在之子黄河九曲㤗華三峯陽亭之右隂晋之東泱漭佳􅂔肸蠁􅀌風生民之秀惟子之宗既慎四知亦畏三惑昔佐赤符寔毗皇極坦蕩皇道昭宣帝則丹青不朽琬琰是刻状日昇東侔辰在北子之伯仲不忝前人粉飾賢路抑掦搢紳雲間日下國華席珍排龍掩陸突寉摧荀卓尔風標朗然流品妍若春輝烈若冬凛燕石知愧齊竽自審咸指路以光銷盡登門而聲寝難售者價重難知者聲清披沙揀金由是不愧鳥散花落于今有情劉儒十行孫弘三道直路猶絃蠧政如埽筆海驚波詞園鞠草文塲不冩于中心丹􅁐空留于秘寳晋千里國漢第一功建幢油碧啟幕蓮紅賔髙主擇韻合人同固不􅀎加减陳椽亦可以喜怒桓公衣繡含香省蘭臺柏赤管朝操青縑夜襞佐計相則生聚有􅀴賛地官而􅀌終叶籍于惟荔浦言念金昆毁冠裂帯雪泣星奔宅􅂻之荆枝半謝嶺頭之梅蕚空繁陟岡望兄詩客之情何極歸縣見妹騷人之恨猶存乃擢戎曺遂􅂽京令􅀅換清切以扶明聖不知者夀難言者命未謁季良之醫巳革曺参之病嗚呼平生世路繾綣交期孫金盧米百賦千詩桂林崑嶠一片一枝終以浮沉因兼險夷對臯壌而揺落成老大之傷悲尚兾他年或陶良夜酒筵琴席燈闈月榭俱開怨别之􅁭並息分􅄮之駕短景未果良辰不借竟欎結于深􅂨倐淹淪于大化况南康觧榻早䧏清光㑹稽継祖昨辱餘芳積分逾極銜哀更長三十年之間難追徃事五千里之外正恨殊郷地濶山􅀷川寒􅀣古杳杳􅀇夜􅂽荒􅀫莾生金認石埋玉恨土􅀉奠緘詞呼風泣雨噫嘻嘻嘻宗尹之魂来否􅀕張書記文維㑹昌元年􅀊次辛酉四月辛丑朔二十日庚申隴西某荥陽鄭某隴西李某安定張某昌􅀺韓某樊南李某謹以清酌之奠敬􅀕于故朔方書記張五審禮之􅂕嗚呼古有不重千金殊􅁿尺璧或號百夫之防或作萬人之敵雖争雄角秀殊􅂗異迹念閲水于千齡若衝飈之一息吁嗟審禮寜或免之瞭眸巨鼻方口踈髭始自渚宫来㳺帝里論激懸河文詶散綺體物􅁛最登髙擅美良時不來􅏥進為恥門巷蓬蒿􅂽凉如此藩溷筆硯􅄫􅋁而巳梁多文士漢有賢王猶俟駿骨肻驚夜光長􅅂既曵健筆誰當職髙蓮幕官帯芸香青􅂁若艸白簡如霜東閣朝暖西園夜凉震豈殺公堪唯故吏渭濵為流馬之運峴首奉司曺一作詞之諱松筠不改琴尊有􅀉三徑方营一畆乏地多文為富無事當貴亦觧客嘲還荅賔􅃧廽翔􅇣􅁤傲睨重霄􅀅期晚莭更峻清標懸蛇結釁闘蟻成妖廽生乏祖洲之草續断無弱水之膠陳尸重来而何望椘魂一散而難招嗚呼神道甚㣲天理難究桂蠧蘭敗龜年鶴夀在長短而且然于妍醜而何有某等早承餘眷晚􅀗聫姻或感極外家延自出之念或恩深猶子多引進之仁或敬属丈人之行或情兼内妺之親有美吾姨慶􅂕攸属尊公則師長衆僚夫人則儀刑六族門髙再世之􅀱家享萬鍾之禄􅀴過欵狎出入㳺陪映人玉潤覆水蓮開春歸别墅月滿髙臺嵇山傾倒謝雪徘􅆦惜景而持䋲欲繫邀􅂬而秉燭相催中歎乖離今多至止仲叔辞辟而方返梅福罷官而未㡬一則歸􅀙廽㕍之峯一則至自站鳶之水方􅀅爲􅅇裁竹縁筝斬梓駈羿射鴻招任釣鯉豁契濶于屯夷極平生之燕喜良覿雖屡􅀷懐未􅀙三􅂕未効一夢俄終露先寒而殞葉漏未盡而聞鐘今則列􅀣開封揲􅆱淂吉綘旐前引桐棺後出隐軫原野凄凉雲日􅀅歸􅀫莽之庭欲閉青松之室􅇻勤􅃇偶兾望諸姑未歸下國且寓皇都江逺惟哭天髙但呼必有餘慶非無後圖嗚呼哀㢤壷有芳醑爼多肥羜呌噪不聞精􅂕何䖏鬱憤徒極含辭莫叙兾有鍳于酸嘶庶無乖于酣飫􅀕䖏士房叔父文某爰在童䝉最承教誘違訣雖乆音㫖長存近者以壇山􅃇塋忽罹風水夀堂圯壊宰􅀣凋傾雖崩則不修聞知前哲但墮而㒺治那俟他人况真徳貽芳鴻儒著羙豈可令趙岐之表墊彼玄扃郭㤗之碑淪于夜壑載惟瑊瑣藐尔􅀌冲誠呌號之不停顧营辦之無素某䓁輙考諸蓍筮别立丘封使義􅅱以令日吉時奉移神寝奢無僣縟儉免虧踈是期永閉尊􅂕長安幽穸眠牛有慶自及于諸􅀌白馬垂祥豈祈于猶子追懐莫及感切徒深更思平昔之時兼預生徒之列陸公賜杖念荣益以何成􅇻氏著文愧献酬而早屈引進之恩方極祸凶之感俄鍾誰言一紀之餘又奉􅂯遷之兆哀􅀷永徃情極􅀄聞矧宗緒衰㣲簮纓殆歇五服之内一身有官􅀅使澤底名家翻同单系山東􅃇族不及寒門静思肻搆之文敢怠成書之託瑊等既幽明無累年志漸成則當授以詩書諭以婚宦使蒸嘗有奉名教無虧􅂕其鍳此㣲誠􅂇夫志願敢以求于必大庶免歎于忽諸迫以哀􅁨兼之瘵恙曽非遐逺不􅀗躬親􅅹血裁詞叩心寫懇長風吹浪敢忘昔日之規南巷齊名永􅅸今生之望兾因薄奠少䧏明輝延慕酸傷不􅀎堪䖏苦痛至􅀷永痛至深為鄭従事妻李氏􅀕􅀙父文有羙吾門實系公族綘霄結䕃皇極流輝自嚴君以交辟延荣仲父以立朝衍慶叔父雖禮踈五服而義叶一家馬援于児姪之間一情無異王華在兄弟之列数􅀙猶親吉人詞寡君子無争属者以獻賦不遇投筆􅀙知鏡水嵇山􅂓屈􅀚書之望甬東浙右始開􅀓劍之名􅀴途㡬千去國􅂾􅀊爰因聀貢来奉闕庭􅀓車方馳朝露溘至祸生朽索釁起􅀭鞭始驚香而不禁俄折臂而無望嗚呼存亡恒理修夭長期􅀁悲者方次中途所痛者非因美疹税鞍告痛肩輿數晨既針艾之莫徴果含禭而斯及况乎合室逺在海涯一女方笄二子非丱人生甚痛天道奚言今以家國載遥干戈未息尚羈歸祔乃議􅀙权㝎鼎城東永通門外南瞻嵩嶺北望邙山式崇寓殯之封且作蔵神之室必也􅂟延異日時属通年光温序之思歸俟􅆇孫之有後二十一姪女早䝉􅄌撫乆歎違離今又􅀙夫山東食貧洛水􅀅療無及驚悲有加敢因􅀕酹之馨􅂓兾精􅂕之降嗚呼叔父永鍳早誠􅀕韓氏老姑文猗歟吾家世奉玄徳譲弟受封勤王賜國名芳􅃔鼎勛盈史冊季孟國髙秦晋栾卻恭惟柔範載禀淵塞既作女師乃為嬪則潁水波清梁園月明言旋百两且拜雙旌計侯令弟配國名卿入􅀙述職出輔専征螽斯不妒鳯凰和鳴此時同慶東郡分榮使者責梁公子専魏帝念元昆人思仲氏杖節赴敵斬芻盡瘁無以家為或􅀙王事禮優内子詩美夫人冕紘瑱紞山蕨澗萍子元罕見兾缺如賔緑衣有感翟茀仍新遽歎夜川遄聞晝􅂘原阡􅃇署孟隣斯卜閑居獻夀作賦之官􅃓裘望襲菽水承􅂬福善餘基好謙􅃇祉􅂧自良人集于之子爰􅀙上蔡去臨易水空報登壇未聞曵􅂂晁父先歸莫之能比趙母上言盖不淂巳寒暄結恙燥温為疵徒虗百禄靡効三醫嗚呼夀夭所賦彭殤不移誰􅀎了悟孰不􅁨悲何兹逹識乃克先知同易簀以就政如買棺而指期茍有所累安􅀎及斯道逺轘轅程遥河洛建兆臨途移舟就壑日􅆭林嶺風悽灌薄積靄茫茫行烟漠漠某䓁誠深通舊情恊光親始自童子至于成人年􅀅二紀恩冠六親念升堂之如昨痛幽夜之無晨歌停行路㫪輟比隣雖寓詞之有所終含酸而莫伸壷清愧酹爼薄羞芹唯餘彤管有美清塵嗚呼哀哉尚饗為李􅀰中􅀕舅竇端文始虞命夏􅁀于玄穹功垂刋木徳叶堙洪洎帝相之難作誕少康之竇中由貞􅀗吉因生受封䧏及後代􅀓勛継庸西京則嬰居外戚東漢則融居上公愍陽城之不享始移籍于扶風源逺更清基髙自峻有焯明􅂕藹然休問陋巷不憂坦途方進月逺標儀霞高映論玉寕韞匱錐要䖏嚢冝伸尚屈􅀅集而翔潜師大易謙尊以光誓安老氏債少易償爰紆銅墨是宰濠梁宓琹時奏潘􅀣逾芳入賛朝儀言掦事舉圭璧蠻夷弁冕文武吐詞含韻知今博古進揖退掦􅀙規合矩􅂧陶啟位殿省承荣孔門之束帯無忝漢宫之綿蕝難更君子信讒小人道長未暇閉関難期税鞅暫時符竹逺出羅􅃠誰識卑飛因成利徃銅梁改秩錦里􅀴時人去而琴臺壊棟文移而石室摧基劉􅊼之重銘􅁑庙王啇之更立嚴祠隴首云歸端溪遽逐角豈觸藩臋終困木海濶天盡山深霧毒許靖他郷有名無禄馬超正色冝歌反哭何為善之無慿而䧏灾之甚速某欽惟教義夙􅀁因依在昔家世勤王寔􅇻高旌大斾結駟飛輪􅂟豈移于自出荣寔垂于外姻一紀已来艱凶遄及嗟宅相以無取惧堂構之不集詎言渭水之乖离竟􅅸西州之出入嗚呼哀㢤違京背闕古陌􅂽阡松門積靄隴首停烟祖􅒉是日乞墅何年淚有血而背堕憤無􅈾而可填况玕剖郡符璟持使莭塞逺城逈河窮路􅅸顧後瞻前形􅀌影孑長號出次重拜臨穴酒濃清醴肴羞羅列庶有鍳于斯文兾不同于虗設嗚呼哀㢤尚享重􅀕外舅司徒公文嗚呼哀哉人之生也變而徃􅁘人之逝也變之来耶冥􅑡之間杳惚之内虗變而有氣氣變而有形形變而有生今􅀅還生于形歸形于􅂔漠然其不識浩然其無端則雖有憂喜悲􅂬而亦勿􅀎措于其間矣茍或以變而之有变而之無若朝昏之相交若春夏之相易則四時見代尚動于情豈百生莫追遂可無恨倘或去此亦孰貴于最􅂕㢤嗚呼公之世冑勛華聀官掦歷並已託于􅀉奠僃在前文今􅀁以重具酒牢載形翰墨盖意有所未盡痛有􅀁難􅁯以公之平生恩知􅇮昔顧盻属纊之夕不淂聞啟手之言祖庭之時不得在執紼之列終哀且痛其可道邪嗚呼七十之年人誰不及三公之位人誰不登何数月之間不及􅀙心之􅀊聞天有慟方登論道之司時泰命屯才長運否為善何益彼蒼難知昔澤姙既明吉敖釋桓公之痛隂徳未報夏侯知邴吉不亡何昔有其􅀓今無其證豈人言之不當􅀅天道之或欺雖北海懸㝎薨期長沙前覺灾至偃如巨室去若歸人䖏順不憂得正則喜作公之徳斯盛在物之痛何言况乎再軫慮居屡垂理命蕳子􅀅􅀾之誓唯止桐棺晏嬰送死之文寕思石槨素車樸馬踈巾􅁦帷成一代之清規掦百古之休問􅀁謂有始有卒髙朙令終嗚呼徃在泾川始受殊遇綢繆之迹豈無他人尊空花朝燈盡夜室忘名器于貴賤去形迹于尊卑語皇王致理之文考聖哲行蔵之㫖每有論次必䝉褒稱及移秩農卿分憂􅃇許覉牽少暇陪奉多違跡踈意通期賖道宻紵衣縞帯雅貺或比于僑吴荆􅁫布裙髙義每符于梁孟今則已矣安可贖乎嗚呼哀㢤千里歸途東門故苐􅂾尺素帛一爐香烟耿賔􅀙之云歸儼盤筵而不御小君多恙諸􅀌善丧昇堂輙啼下馬先􅂘含懐􅃇極撫事新傷植玉求歸已􅁿于􅃇日泣珠報惠寕盡于兹晨况邢氏吾姨蕭門仲妹愛􅀷猶女思切仁兄撫􅄔帷以増摧闔孀閨而永慟草荄土梗旁􅂇酸辛髙鳥􅀷魚遥添怨咽嗚呼精神何徃形􅂔安歸茍才􅀎有􅀁未伸勛庸有􅀁未極則其強􅂔冝有異聞玉骨化于終山楸栢寔于裘氏驚愚駭俗佇有聞焉嗚呼姜氏懐安之規既聞之矣畢萬名􅂾之慶可􅁛也㢤箧有遺􅀴匣藏􅀓劍積之餘慶必有掦名愚方遁跡丘園㳺心墳素前耕後餉併食易衣不忮不求道誠有在自媒自炫病或未能雖吕範以乆貧幸冶長之無罪昔公愛女今愚病妻内動肝肺外揮血淚得仲三尺之喙論意無窮盡文通五色之毫書情莫既嗚呼哀㢤公其鍳之為李兵曺􅀕兄濠州刺史文伏惟􅂕天枝挺秀帝系􅀓芳材髙梓􅂎價重珪璋蘭芷斯茂先以馨香干鏌􅀅用不措鋒鋩始僃千牛俄仕諸衛逸意方超􅅸足猶繫爰佐郡僕亦􅁺神京邑惟二宅曺實五兵地峻流急官閑政清嵩少暁霽伊洛秋眀侣能吟之謝客伴作賦之賈生遂擢堯厨仍調湯膳位列大朝名􅂙内殿朱􅌧輝華銀龜蒨粲漢有宗正委之親賢卿二惟月人寕我先外夷求騁天子憂􅁁黄華始賦􅂵綬俄懸雄其出塞之任假以中􅄗之􅁠不拜無慚于蘇武去莭寕􅀋于王焉䘖須誓死嚙雪􅀗全帝仗使者吾無愧旃既返中華止同属國蒼蝇難祛貝錦方織好丹非素􅀧白為黒遭時不知非予有慼既先忌于綘􅈅遂不容于欒卻竟􅁜山水鍾離控扼名貴隼旟時瞻熊軾人以功遷吾由謗淂其明若神其惠如春先除􅃛吏且活疲民汙萊盡闢邑室重新草祥木瑞獸去鳥馴方侯徴還俄嬰美疢積㣲而桓侯竟晚逹命而徐公待盡怳怳􅆰驚遲遲未信誰知前路之髙低孰測夜􅄗之逺近永惟良配亦寔女師庶姜猶効君子是宜異室無怨同穴有期河魴著咏皎日裁詩嗚呼哀㢤龜筮叶􅀙日時斯卜􅀅去􅂽郊言辞華屋草􅀣萦帯川源廽澓白髪􅀌弟臨棺慟􅂘失􅄌撫于終身宛聲容之在目心摧則氷炭交集血下而綆縻相續萬古永訣百身何贖酒滿未御肴乾未臨已矣伯氏来慰哀心􅀕小姪女􅀉􅀉文正月二十五日伯以果子㺯物招送􅀉􅀉體魂歸大茔之旁哀㢤尔生四年方復夲族既􅂧􅂾月奄然歸無于鞠育而未􅀷結悲傷而何極来也何故去也何縁念當稚􅃧之辰孰測死生之位時吾赴調京下移家関中事故紛綸光隂遷􅐙􅀉􅄟爾骨五年扵兹白草枯荄􅂽途古陌朝飢誰抱夜渇誰憐尔之栖栖吾有罪焉今吾仲姊反􅁙有期遂遷尔􅂕来􅂧先域平原卜穴刻石書銘明知過禮之文何忍深情􅀁属自尔殁後侄軰􅂾人竹馬玉環綉䄡文葆堂前階下日􅂻風中弄薬争花紛吾左右獨尔精識不知􅀁之况吾别娶已来嗣緒未立猶子之義倍切他人念徃撫存五情􅆰热嗚呼荥水之上壇山之側汝乃曽乃祖松檟森行伯姑仲姑􅃁坟相接汝来徃于此勿怖勿驚華綵衣裳甘香飲食女来受此無少無多女伯􅀕女女父哭女哀哀􅀉􅀉女知之耶􅀕徐姊夫文嗚呼以君之文學以君之政術㓜以自立老而不倦亦可以為君子人矣君子人歟而不即清途不階貴仕此其命也夫何慊焉始者仲姊有行􅀗託貴族半産以資于外姓闔門兾託于仁人􅀅以衰㣲􅀝為藩援不圖薄佑天奪􅀄心仲姊凋殂諸生不育以親以懿翻為路人再號再呼莫訴蒼昊尚以君子存伉􅓻之重敦行李之私二十年以来雖事暌而意通跡遥而誠宻神當賜鍳愚豈敢􅁯逮愚不天再丁凶釁泣血偷息餘生㡬何君當赤綬銀章浙東従務道途攸邈明序徂遷訝弔緘之不来忽訃書之俱至感􅃇懐分情如之何埋玉焚芝固未可喻嗚呼今来古徃人誰不亡其酷斯甚藐然一女才已􅂾齡乞後旁宗又未􅀎立賢弟扶服東路遇疾洛師徘􅆦十旬淹不淂進浮泛水陸厥途四千逮旐云歸曠然無主尼姑居宗老之地騶奴搃家相之􅁠􅀗及故阡信為餘慶其􅀁以為附身附棺之具又豈碍平生之曠逹耶日月次遷卜筮斯叶幽明之異始于今辰愚方􅅶哀憂瘵恙縻寝不及一攀宰􅀣一慟􅂽阡謝淡成之交申永訣之禮矧余仲姊君其与歸撫心骨以皆驚􅀵血泪而何􅈫嗚呼已㢤其何言􅁘禭衣非華奠物殊薄􅂕其鍳此慰我哀心􅀕桂州城隍神文維大中元年􅀊次丁卯八月甲午朔二十七日庚申桂州管内都防禦􅀚察䖏置等使正議大夫使持莭桂州諸軍事守桂州刺史兼御史中丞上柱國賜紫金魚袋鄭某謹遣直官挕功曺􅂙軍文林􅀰守陽朔縣令荘敬貭謹以㫖酒庶饈之奠􅀕于城隍之神濬洫崇墉􅀁以固吾圉春祈秋報􅀁以輔農功今露白雷􅀵蚊坏水涸念時晹而時雨􅀅乃積而乃倉敢以吉辰式陳嘗典神其保兹正直歆彼馨香聿念前修勿虧明鍳昔房豹変楽􅁜之井味任延易九真之土風豈獨人謀仰由㝠􅂇今由古也神寔聴之爲安平公兖州􅀕城隍神文年月日致􅀕于城隍之神四方攸居是分都邑五兵未息爰假金湯惟神受命上􅀇守職茲土擁長雲之壘提却月之营主張威􅂕弹壓氛祲某方宣朝㫖来搃藩條帳中之列既安幕内之籌敢失神其守同石堡䕶䓁玉関長使萃若岸焉無使􅂧扵隍也爲懐州李使君􅀕城隍文某謬䝉朝奨叨領藩條熊軾􅀄臨虎符適至敢資􅂕于水土兾同固于金湯况彼潞人寔逆天理因承平之地以作巣窠毆康楽之民以為蟊賊一至于此其能乆乎惟神廣扇威􅂕劃開聲􅀔彼犯境者望飛鳥而自遁此㴞天者聴寉唳以虗聲崇墉再嚴巨塹無壅今来古徃永無川竭之因萬􅀊千秋莫有土崩之事神其聼之無易我言為舎綘郡公鄭州禱雨文年月日鄭州刺史李某謹請茅山道士馮角禱請于水府真官伏以旱魃為虐􅀿龍不興困杲日于詩人苦宻雲以易象生物斯瘁民食攸艱某叨此分􅁨俯慚無政爰有真侣䖍禱隂􅂕减哺表勤褰帷引咎伏乞下通荥播上逹天潢合為膏澤之源用息藴隆之患其于效信敢或逡廵􅁀露託辭焦劳結慮泉間侯􅂔􅀣杪占風惟望玉女之披衣敢駭啇羊之鼓舞窃希玄感聴察丹誠賽舜庙文年月日昭賽于虞舜之祠伏以帝狩南荒神㽞下土翠華莫返積怨望于他年大􅅢不迷烜威􅂕于終古比憂嘉榖少冐愆陽抗簡陳詞潔尊引咎果䝉慿􅄐掣電跨巽掦風布沼渥于九臯起焦枯于一瞬敢布瑶席輙事蘭羞帝其罷奏南琴停吹西琯使東皇太乙兼預于􅂕㳺俾山􅀑江妃無蔵于沴氣庶􅀅善政以奉明輝賽越王神文年月日賽于越王之神惟神輝焯殊姿抑掦竒表秦魚既爛則􅂓帝南荒漢鹿有歸則稱臣北闕覧英雄之載籍信王覇之朋㳺言念遺祠猶存属國尚興甘雨以救公田敢陳沼沚之毛用報京坻之積神其永司此土長庇吾人福祐柔良駈除疫癘今来古徃嘗教威着越城萬􅀊千秋勿使魂歸真㝎神乎不昧来鍳斯言賽永福縣城隍神文年月日賽于永福縣城隍之神夫考室立家先存户灶聚人開邑首啟城池固有明􅂕䧏而鍳治惟神克掦嘉霔廣育􅀺民􅂓薦粢粱少伸肴醴神其莭宣四􅂔扶佑三時勿使畢星但稱于好雨無令田祖獨擅于有神永歆蘋􅇨之誠常挟金湯之􅀔為荥陽公賽桂州城隍神文年月日都防禦􅀚察䖏置䓁使桂州刺史兼御史中丞某謹遣登仕􅀰守功曺􅂙軍陸佚以庶羞之儀􅀕于城隍之神夫大邑聚人通都設屏􅀅雄走集必假髙􅀷不惟􅀝仗風雲兼用翕張神􅀑某􅀄䝉朝奨来佩藩符既禦冦于西原亦觀風于南國始維畵鷁􅀅下伏熊属楚雨蔽空湘雲塞望晦我中軍之鼓濕予下瀬之師遂以誠祈果䝉神􅀿速如激矢􅀔若却河及茲報荐之期敢怠馨香之禮神其干霄作峻習坎為防合烽櫓以保民導川途而流􅁖使言言堅壘侔地道以無􅆠活活􅀷溝如井徳之不改勿違丘禱以作神羞尚享賽􅂕川縣城隍神文年月日賽于􅂕川縣城隍之神髙壘􅀷溝用資固䕶興雲渫雨諒俟威􅂕惟神􅀎感至誠􅀅成大稔逐清泠之耕父不使掦光廽沮澤之蟠龍皆令洒潤式陳㣲報願鍳㣲馨賽荔浦縣城隍神文年月日賽于荔浦縣城隍之神嗟我疲民每虞艱食寒耕􅀬耨始望于秋成鑠石流金㡬傷于􅀊事逺資􅂕顧式布層隂無煩管輅之占不待欒巴之噀窃陳薄奠用答豐年神其㩀有髙􅀷主張生植同功田祖比義雨師無假怒于潜龍勿縦威于虐魃守兹縣邑冨我京坻賽城隍神文年月日賽于城隍之神惟神踞雉堞以為雄導溝池而作潤果成飄汪以救炎焚敢恡斯牲用報嘉種神其永通􅂕感長􅅷玄功導椘子之餘波沾郇國之膏雨苟不能昧報亦随之賽北源神文年月日賽于北源之神惟神雖􅂕南服實號北源湘浦䧏神跡驚于騷客滮池浸稲逺叶于詩人果􅀎槖籥風頭索綯雨脚不資畎澮􅀅致食箱􅂓申信于澗毛庶通􅂕于水府神其揖掦蘭珮摩棹桂旗拍川后之肩覧波神之􅃑共来于此享報㽞恩賽曽山蘇山神文年月日賽于曽山蘇山之神惟神守在出雲職維通􅂔果従望􅀊載潤嘉生􅀅申昭報之儀敢闕馨香之献神其遐瞻惟岳廣納㳺塵免掦少女之風勤咏曽孫之稼無令渥澤盡歸陉水之秋泉勿使威􅂕不及歴山之仙室我詞有激神倘聴焉􅀕白石神文年月日賽于白石之神再烜明􅂕克標異號軒珠耀彩倘非瑶水之源荆璞流輝即是玉山之路昨者俯􅁨旱􅀊俾禱遺祠果􅀎愛我大田貺予膏澤不俟于公之折獄每煩洛令之曝身敢命子男爰修蘋藻神其仰濟天澤俯佑􅀊功無萌可轉之心以􅀒惟馨之禮尚享賽龍幡山神文年月日賽于龍幡山之神惟神䧏治山川流恩縣道龍幡鳳盖克􅅷于􅂕司蟻穴鸛巣式掦于利澤至誠有逹昭報無虧神其叱咤飛亷鞭駈屏翳尚令吾土屡有豐年不無行潦之羞以謝油雲之㑹賽陽朔縣名山文年月日賽于陽朔縣名山之神惟神受命上玄奠兹南服雲臺日觀逺譲于髙標蓬島崑丘遐通于爽􅂔峻若蔵刀之嶺崇如􅀝劍之門是宜銓管隂司拘囚异物為神仙之下府開龍虎之殊庭属􅀊不寕旱既太甚駈誠叠嶂託意通波果聞雷出地中電流巖下既茲沾􅁕敢荐香芬願終如響之􅂕無怠孔明之鍳尚享賽海陽神文年月日賽于海陽之神頃傷多稼􅀅困驕陽未逢玉女之披衣空見土龍之矯首式祈嘉霔果䧏明輝神其享彼蘭羞挹兹桂酒輔成于多黍多稌助施于好風好雨庶厲業官以詶玄澤賽堯山廟文年月日昭賽于堯山之庙伏以帝廵遐徼天作髙山既比敬于軒臺亦分功于農井是㽞遺庙以慰斯民昨者時雨忽􅄽秋陽稍亢永言嘉霔寔自玄恩大駈蟠澤之龍盡􅀤潜泉之蜧倉箱興咏􅀅􅂟于農夫灌浸呈功不愆于􅆆子敢茲昭報兾䧏明􅂕賽古㰖神文某月日賽于古㰖之神惟神爰因碩果遂啟􅂕祠􅀲美卲平且􅀓􅃇志李標朱仲亦茂前􅀴昨者瘴暑為灾油雲不起式存心禱慮作神羞神􅀎感􅂔蜧泉􅀓祥􅔏蛭使宋生抒賦始悦于雄風髙氏讀書忽驚于􅁀雨化太甚旱為大有年􅀅見助于􅂬康敢􅁯懐于昭賽賽蘭麻神文年月日賽于蘭麻之神頃者杲日掦威融風扇􅁀禾乃盡偃人何以堪神􅀎倐忽􅀿時逡廵布潤雲旗直集不資秦地之决渠雨陣斜飛更甚成都之救火永懐􅂕佑敢荐嘉肴神其与􅈍同芳為蓬扶直勿虗嘉號以累豐年􅀕全義縣伏波神文年月日􅀚察䖏置使兼御史中丞鄭某謹遣全義縣令韋必復以酒牢之奠昭賽于漢伏波􅀅軍新息􅀱馬公越城􅃇􅆠漢􅀅遺庙一派湘水萬里椘山比頴川袁氏之臺悲同异日方汝水周公之渡感極當時嗚呼昔者投隙建功因時立志隗􅀅軍坐談西伯弃去無歸梁伯松自䧏王姬雖来不起以若画之眉宇開聚米之山川扶風里中詎守錢而為虜徳陽本􅀓作宣徳殿下寕相馬以推工悵望関西趨馳隴首事嫂冠帯誡姪書成龍伯髙之故人出言有􅀁公孫述之刺客相待何􅁿鳶站啟行蠻溪請徃銅㽞鑄柱革誓褁尸男児巳立􅁁功壮士猶羞病死灕湘之滸祠宇依然豈獨文宣之􅁜不生刺草更若武􅀱之隴仍有􅀷松向我来思停車展敬一尊有奠五馬􅁯歸及申望􅀊之祈又辱有秋之澤雲興柱礎殿繞藩墙何煩玉女之投壷方聞天笑不待樵人之取箭已見風廽敢􅁯􅁰稷之馨用報京坻之賜属以時非行縣不􅀗躬詣􅂕壇詞託烟波意􅀓天壌既謝三時之澤兼論千載之交勿負至誠以􅀌􅀇契
