front:
  text: 汝南公華州謝加階状右臣伏奉今月日制書加賜臣階朝散大夫者荣従日下恩自天中臣聞周室設官實重大夫之號漢臣異禮則加朝散之名若臣者辨乏談天文非擲地貪叨􅂠顯綿􅍓光隂當陛下御極之􅀄分陛下􅁨人之􅀉金章紫綬已塵求瘼之荣崇級清階更窃昇髙之望循揣斯乆怔忪莫寕唯當勤奉詔條所希粗贖官謗誠㴱感励情切違離犬戀主而空深蚊􅀒山而何力無任感恩望闕結戀屏营之至
