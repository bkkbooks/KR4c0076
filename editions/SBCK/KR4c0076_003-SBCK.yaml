body:
  text: 為濮陽公謝罰俸状右臣伏凖御史臺牒奉恩㫖以臣不先􅁴察妖賊賀蘭進興䓁宜罰两月俸者伏以霧市微妖潢池小冦有乖先覺上黷宸聪昔漢以捕盗不嚴猶加黜削晋以􅀤奸無状亦峻科條豈若皇帝陛下恩極好生徳唯宥􅂈與其漏網止以罰金臣與僚属䓁無任戴恩省罪屏营之至為荣陽公謝除盧副使䓁官状右臣得進奏官某状報臣􅀁奏盧某䓁二人奉某月日􅃙㫖賜授前件官充聀者臣謬當亷印合啟幕庭撫夐􅇁以興懐懼羖皮之廢禮盧戡與臣同年登苐少日論交學冨文雄􅂔􅀌志􅇣玉清越而為楽女舒脱以求媒實懐難進之規不起後時之歎任繕㓜壮孝悌潔静精微得君子之時中友鄊人之善者匪因請託實自諳知皇帝陛下俯照遠藩咸知命秩南􅄗帖聀延閣分班使戡有紆朱之􅃂繕無衣白之児已􅀴聖鍳可謂國華兾􅀵規畫之功共奉澄清之􅀉臣不任感恩得賢之至為安平公謝端午賜物状右今月日中使某至奉宣恩㫖賜臣手詔一通兼前件端午紫衣銀器百索并大􅀅衣者乹文昭融睿賜稠叠恩生望外荣積愳中臣以當時宣布給散訖伏以正陽令月端午佳辰渥澤合止于勛賢賜賚冝先干戚属臣逺臨東魯乆去上京豈望仁時同躋夀域八行眀詔伏讀不啻千金一襲䡖衣跪捧若無三伏况又綵􅈁出仙蚕之繭貞金疑姹女之魂持可戒盈帯堪延􅈫豈微臣獨忝在列校不遺華楚成行永􅂅千春而奉聖綿長共保常期五日以沾恩臣與大􅀅䓁無任感激懇悃之至為滎陽公謝端午賜物状右中使某至奉宣恩㫖賜臣端午􅂵衣一副百索一軸銀器二事大􅀅衣三副并賜臣手詔一通者伏以五神定位祝融司長飬之功六律鈞和􅅋賔有酬酢之義故莭推戴禮日著漢儀彼艾人逺具于􅀊時角􅁰近標于風土乃耆􅃇􅀓聞之末亦君親慶賜之原伏惟皇帝陛下克恊樂章允符時訓恩沾近戚惠浹元僚臣守介蠻圻程遥鳯闕敢希瘴嶠時䧏乹文䡖縞染衣貞金備器海綃掩麗渠盌蔵珍拜受若驚跪捧如失尝衣國僑之紵􅀍服多慙乆擕顔氏之瓢捧持未慣當晝而不假交扇向夕而唯宜飲氷况又􅀅以綵􅁝萦諸画軸用禳故􅉋兼續􅁱齡爰自微臣頗流諸校鞠躬􅀍􅃂全踰錫帯之荣覩物􅀓輝實動請纓之思唯當仰承帝力粗舉藩條誓相率扵明時庶同登扵夀域臣与大􅀅䓁無任望恩抃舞屏营之至爲中丞荥陽公赴桂州長樂驛謝􅃙設状右今月日中使奉宣進止一作㫖就長樂驛賜臣及􅀅吏䓁設饌者􅀅承閫􅀉尚忝朝恩絡繹八珎芳芬九醖臣階縁薄伎塵辱􅁱􅂗楊執㦸之讀書雖無非聖董太中之對䇿何􅀘清時忽委亷車乍離閨籍誠欣列土實耿辞天然猶食􅃌告祥朶頥有慶爰于近驛式䧏貴臣酒自堯尊饌分禹膳下沾􅀅校旁耀路岐况臣平生本實􅀌賤懐書奉役乆無黔突之謀入國展儀且懵殽蒸之禮飽期滿腹醉更憂心終虞􅀒乗之灾無報雲天之施臣與􅀅吏䓁無任望闕感恩結戀屏营之至爲荥陽公謝賜冬衣状右中使至奉宣恩㫖賜臣冬衣一副大􅀅衣四副兼賜臣手詔一通者八行帝語窅䧏于重霄一襲天衣俯廽于窮莭臣當時凖詔給散訖臣叨䝉重寄􅆘控遐陬地雖五鎮之衝􅂔得四時之正每􅀇冥􅀿律顓頊司辰當二日之鑿氷則殊􅃎野及兩楹之飛雪無異朔山重以賨布少温蠻綿乏煖方求麗宻以禦嚴凝豈望司服頒衣貴臣􅀓詔綾裁飛鵠絮裛仙蚕白分椒壁之光􅂵奪蘭芽之色已均下􅀅仍逺連营晏子狐裘故弊何彰于國儉王恭鶴􅌁風流不自于君恩􅀍服有輝􅀒載無力謹當上宣殊渥下拊多寒均大􅀍之琅玡變無􅃭于蜀郡粗令康㤗以塞貪叨臣與大􅀅䓁無任望闕感恩抃舞屏营之至為濮陽公泾原謝冬衣状右月日中使至奉宣聖㫖賜臣及大􅀅兼諸鎮防秋兵馬䓁前件勅書手詔并冬衣者臣並已凖詔㫖宣示給散訖恩及觧衣荣加䧏繭戴山未重􅀒日非暄臣謬領藩垣適當戎狄唯憑庙􅄸􅀄振軍威􅅸漠獵廽幸無警急髙峯火過但報平安直以地􅀔多隂川形稍背三伏常聞于屏箑九秋尋訝于垂繒代馬暫嘶隴山無葉燕鴻未過泾水先氷是以每䧏王臣仍迂御筆緘封垂露􅃂賜禦冬非玉女裁成即仙人織岀徒驚在笥莫匪因針始顧孱微深懼不勝冠帯旋䝉􅀍服便如􅀎執干戈遍逮軍前歷沾麾下逹喜炁而陳根復秀動􅂬聲而蟄户旋開華楚成行曵娄塞路其山南宣歙三道大􅀅䓁雖乆居炎燠不慣嚴凝亦既更衣皆忘易地賈餘勇而側思盡敵感鴻私而咸􅂅殺身各限征行不􅀗陳謝臣與大􅀅等無任瞻天戀闕感恩屏营之至為中丞荥陽公謝借飛龍馬送至府界状右中使至奉宣恩㫖以臣赴任特借飛龍馬一疋并鞭轡䓁送至京兆府界者臣謬奉恩荣出叨亷問豈期蹇歩深軫皇恩特命内臣俾騰上駟梁懸蜀鐙几覆吴鞍每多曵練之疑不假着鞭之力倐踰秦甸􅀅復周閑照地廽光瞻天送影長亭欲别未期東道而来雙闕倘嘶願附北風之恩無任感恩戀闕雪涕屏营之至為安平公華州進賀皇躬痊復物状右臣聞藩方􅃇徳臣子懐私􅀅稱慶于天朝必展儀于土貢伏惟皇帝陛下道包乹象徳惣坤􅂕肇自元正載康福􅂂九庙不􅁯于継至两宫無􅆣于問安鼓舞萬􅂕波􅀓四國騐推測則咸知周卜聼祝詞而皆若華封臣坐㩀伏熊行駈画隼值一人之有􅂟當春日之載陽心但葵傾跡猶匏繫伏蒲之覲謁未果獻芹之誠懇空深况又地邇宸居俗熏儉徳更無玉帛以率梯航前件石器䓁瑞匪土硎珍慙献磬並取諸地産皆勒以工名茯苓茯神䓁品載仙經竒標薬錄通􅂕却疾不惟色若凝脂延壽安神豈是心如枯木干冐陳進無任兢惶云云爲濮陽公陳許舉人自代状某官崔蠡右臣伏凖年月日􅃙内外文武官上任後三日舉一人自代者臣伏見前件官欒卻􅃇族鄒魯名儒鏡納無私山髙不譲而又循墙戒切銘座規􅀷蘭省辞荣竹符出守漢悲来莫晋有去思晦而轉明浼而尤白既還綸閣復掌禮闈人驚吞鳯之才士切登龍之譽及司版籍以副地官比按西􅆧􅀌忠靡失居然國器實映朝倫今􅃆水無氷兵武昌非險用為亷問尚欎庙謨臣􅀁部乃秦韓􅀾伐之郷周鄭交圻之邑軍踰千乗地控三州若以代臣必為名􅀅敢希睿擇曲遂愚􅂨俾寛窃位之􅏺兾受進賢之賞干冐陳薦無任兢越謹錄奏聞伏聴勅㫖為懐州刺史舉人自代状某官郭右臣伏凖建中元年正月五日􅃙内外文武官到任三日舉一人自代者臣伏見前件官汾陽啟胄沙麓遺芳佩觿之辰平居不戲加冠以後出言成章本以詩書綽有機断奉殷郭之良躅銜馬鄧之明規臣與其祖禰以来藩宣相接雲䑓髙義同承鐘鼎之餘麟閣􅃇圖共署河山之誓交深志見年齊道均今河内名􅀖覃恩懐巨郡南藩鳯闕平分晋鄭之交北控羊腸方有干戈之役推譲雖循于故薦聞實切于誠伏乞聖恩特乆臣志無任感恩推賢之至謹録奉聞伏聴􅃙㫖為尚書渤海公舉人自代状某官周墀右臣伏凖某年月日􅃙内外文武官上任後舉一人自代者伏以京邑為四方之極咸秦乃天下之樞必命英髦以居尹正臣謬蒙抽擢素乏才􅀎􅀅何以風彩章臺羽儀華省况又方营咸鄗肇建園􅁜茍推擇之不先則顛覆而斯在前件官荘栗以􅁉簡嚴而寛玉無寒温松有霜雪頃居内署實事文皇引􅅂而外朝莫知視草而中言㒺漏自分符近甸亷問雄藩不狥物以沽名善推誠而立断渾若全器宜乎在庭倘召以急宣􅀍之眷渥必能明張條目峻立堤防粛千里之封畿惣五都之貨殖軒臺禹穴無􅉻充奉之儀漢􅁐秦􅁜盡絶椎埋之党特乞俯廽宸断用授當仁免今日之叨恩兾他時之上賞干冐陳薦兢越伏􅀷某官崔龜従伏以内史故事例帯銀青尹正􅃇儀平揖令僕必資髦碩方僃次遷臣特以鯫儒猥丁昌運位崇八座官紹三王况駕有上仙車當晏出務煩厩置役重津途倘上爵之不思則敗官而斯疚前件官荆岑挺檟赤堇揚鋒禀松筠四序之荣抱金石一成之調由中及外自誠而明昨者故彰利遷朝臺受律隐之清莭無愧干投香江革歸資唯聞于单舸梁書必􅀎集同􅁤之會奉因山之儀使桴鼓稀鳴建瓴流化伏乞特廽鳯詔以命龜􅀙成聖朝棫樸之詩减曹國㣲鵜之刺干黷旒扆伏用兢惶爲荥陽公舉王克明䓁充縣令主簿状伏以臣所部控聫谿洞􅂙錯蠻髦水接重河山當五嶺縦有天官注擬多縁地理幽遐或不出上京已􅀤徒劳之歎或暫来属邑即聞歸去之辭既經乆而不謀亦柔良而曷􅀉臣謬􅈾亷部慮在曠官倘甸朔以無言則賦輿而必闕前件官或膏梁遺胄或英俊下僚雖遇遐陬乆􅀙試吏假之銅墨有意于鳴琴委以簿書不羞其栖􅁄既聞續用合有甄昇一則復逺俗之凋殘一則􅁿微臣之􅁨責苟事因請託跡渉貪殘􅀅有􅀒于斯人豈敢逃于舉主伏希卑聼咸賜即真干冐宸嚴無任兢越某官裴俅右臣伏凖某年月日􅃙内外文武官上任後舉一人自代者伏見前件官􅘌鄊茂族洛下名生䖏家國以必聞善兄弟而無瘉而又南翬耀彩東箭含筠身先校萟之塲首出􅀚光之籍􅀙外府而􅁢稱賢佐立中臺而克號清􅀰洎時急昌言官登大諫楊阜常規于法服陳群盡削其封章實于不咈之朝􅀎守勿欺之㫖臣所部俗分蠻徼地控越城籍威略以靖封疆隅資簡惠而安疲瘵􅂅廽殊渥以授當仁豈微敬仲之才兼有伯㳺之長俯􅀙劳譲方免曠官特兾宸嚴曲垂矜許干冐陳譲惶越無任為塩州刺史奏舉李孚判官状某官李孚右件臣克生公族早􅂂宦途器實幹時辨􅀎専對加之夙明韜略乆逐旌㫋頃為知已屈􅀙吏議許休文之流浪萬里非賖王仲宣之播遷三年未遇險而不懟困且􅀎通雖何恤于無家良可悲其􅅸籍去􅀊以維新之命大治鴻私亦既旋還各􅀙叙用開成五年十一月十二日吏曹已注右威衛倉曺􅂙軍授官未謝又䝉挟名除替􅀄云牽復仍迫屡空京口劉生方思鵝炙洛陽蘇子已􅁦貂裘方今崇唐堯敦厚之恩推魏文光荣一作荣楽之􅈲豈令弃良才扵散地化王孫爲旅人臣素乏器能叨􅈾任使控緑池之要地守清澤之堅城􅀅以宣布􅂕威弹壓氛祲茍咨謀失所佐理非材衆唯衂此軍聲兼且傷于朝􅀉臣深自計孚實當仁况又得于諸宗且兼通于故典諸葛均有因依之分龎士元多鍳裁之恩是敢輙黷宸階乞荣賔席使得盡其風力佐彼􅁁陲錐䖏平原之嚢必􅀅頴脱劒拭華隂之土粗雪幽沉伏請依資賜授一官充臣防禦判官干冐冕旒無任兢越爲濮陽公陳許奏韓琮䓁四人充判官状韓琮右件官早中殊科素推雅度弦柔以直濟伏而清頃佐憲􅄗且丁家難當丧而齒未嘗見既琴祥而琴不成聲逮此變除未䝉抽擢臣頃居鎮守琮已列賔僚謀之既􅆇剛亦不吐􅂅稽中選荣借外藩伏請依資賜授憲官充臣莭度判官叚環右件官言思無邪學就有道屡為従事常佐正人加以富有文詞精干草􅀠雋而且簡襝通亦不流臣所部稍逺京都每繁章奏敢兹上請乞以自随伏請依資賜授憲官充臣莭度掌書記裴蘧右件官魯國名儒􅘌郷右族松寒更翠馬老不迷臣昔忝鑿門辟為記室属辞而夙搆無異論兵而故校多歸画以前籌見其餘地前任大理評事已三十三個月比于流軰已是􅆡淹伏請特授憲官充臣􅀚察支使夏侯曈右件官藏器于身為人由巳齊荘難犯劲挺不揺臣任切循良務繁稽勾畄思仙尉以重賔階伏請依資改授一官充臣莭度廵官以前件状如前臣四朝受任三鎮叨荣慕碣石之築宫廣延儒雅効西河之擁篲樂得賢才韓琮䓁並無所因依不由請托乆諳才地堪列幕庭伏希殊私盡允誠請謀録奏聞伏聴勅㫖為安平公兖州奏杜勝䓁四人充判官状杜勝右件官流􅂟相門䇿名詞􅁐當仁罕譲見義敢為符彩極髙涯涘難挹臣前任已奏為判官臨事而毎見公方與語而必相弘益今臣既分團練任切訓齊􅀅奉廟謨實在賔彦伏請賜守夲官充臣團練判官趙晳右件官洛下名生山東茂族仁實甚冨天爵極髙妙選文塲亟仕侯國珪璋特逹蘭社芬馨今臣亷問大藩澄清列部藉其謩畵共賛朝􅀴伏請賜守本官充臣􅀚察判官李藩右件官文囿馳聲賔階擅美口含言瑞身出禮門前任已奏為判官馭下而和易不流臨事而貞方有執今臣移􅂙國用務切軍須實假平均以同計画伏請賜本官充臣􅀚察支使盧泾右件官􅀓渉典經該覈流畧自魯壁所壊汲冢之藏三箧􅀎知五車盡究加之文彩兼以器能前者為属臣僚常在州推獄明断而不容吏黠哀矜而莫有人􅁈今者團練之司稽廵事切每思奨勅非敢用情伏請依資賜授法官充臣都團練廵官以前件状如状伏以長人者必以吏分劳逸開幕者亦用士為重􅁿若不􅀣人何以報國况臣素無勛効謬窃􅃂荣至于賢才敢恡筐篚前件官並推賔彦堪賛藩條伏希殊私盡允誠請謹録奏聞伏聴勅㫖為荥陽公進賀正銀状伏以運當聖日莭在正春近則入金門而排玉堂歡于上夀逺則梯重山而浮漲海務以献琛臣受國恩深守藩地阻明珠大貝南異于百蠻翠羽犀皮北殊于三楚前件銀出非大冶貨在中金取以元正式陳方賄望闕憶銀􅄗之峻尚隔仙僚瞻天仰銀漢之流莫階霄路馳心献祝因物逹誠干冐宸嚴無任兢越為荥陽赴桂州在道進賀端午銀状右臣伏以握丕圖而御物必相見于􅄐推小正以辨時則盛徳在夏故著為令莭稽以舊章通􅁱任土之宜仰續後天之夀臣方乗􅀓置未至藩維前件銀已及中􅂗實􅀙前政拜章献祝雖令尹以告新納賮展儀欲長府之仍􅃇謹以前觀察使楊漢公封印進上千春属􅂟億載儲休繫以藩條闕覲丹墀之下徴諸貨志且愧白金為中干冐宸嚴無任兢越為安平公赴兖海在道進賀端午馬状右臣伏以浴蘭令莭采艾嘉辰百辟合祝于堯年萬方宜脩于禹貢臣方夙駕之部馳􅀓出関欲献琛而未識土宜􅂅祝夀而已悲日逺前件馬伏􅌴斯乆着鞭亦多粗覺柔馴未常奔􅇣雖非龍孫􅂹子邈一舉以􅅸塵願陪月駟雲螭􅂟千嘶于扈蹕干冐宸扆無任兢惕之至為荥陽公進賀冬銀等二字一作艮乳白身状右臣伏以黄鐘􅀿侯白琯舒和近訪晋儀禮同元日遐􅀚魯史事重朔朝伏惟皇帝陛下與天同休如日之盛􅀅融漢道兼舉周正臣方駕亷車闕稱夀酒心懸土炭空循太史之書身逺江湖徒積子牟之戀苟無納贐􅂚􅂟􅂂長前件銀䓁禀和于天地之爐擢瑞于神仙之府豈為方賄且自地征對三品之金庶陪白璧撰一丸之薬請映玄霜私白身䓁雖長在遐鄊而生知望闕比􅀙訓事示堪備􅃌呼兾因物以逹誠窃先時而効祝七百年之卜􅂅過成周八千􅀊為春敢徴蒙􅅱干冐陳進兢越無任為荥陽公奏請不叙錄􅀅士状使當道􅀅士及􅃹内昭賀䓁州軍事􅀅士共二千一百十六人凖去年五月五日制馭叙勛階使司去今年四月二十五日具􅀅士姓名及甲授年月日申省訖右臣當道􅀅士等逺當戎􅀉式控遐陬乗觧愠之和寕親矢石望拱辰之列實隔烟波近者朝廷奄靖北方惟荒東道當隂山之􅂘盧靡効纎埃及天井之摧凶不横寸草徒以皇帝陛下非烟結彩瀼露流光向明􅂊及于鳯樓布澤逺沾于蠻徼固合同承國􅂟共禀朝荣伏以當管近無豐年亦經小水海上有分屯之卒邕南有未返之師歉冗食于居人困裹粮于戎士臣􅀄叨亷問方切拊循雖拾級昇階各思受􅃂而濡毫執簡無以為資仰慮後期敢忘積懼伏見比者諸道物有力未足者聖恩弘貸許且權未叙錄窃縁徃例冐此上陳伏兾天慈曲垂矜許臣與􅀅士等無任感激冐昧􅀾越之至為楊賛善奏請東都洒掃状右臣爲先臣贈太保某茔在河南縣界臣自終丧紀便忝朝倫三年賛道于宫庭千里逺􅄐于坆墓窃惟令式合許芟除追逺興情敢希情于陸曄報恩未死寕自誓于羲之伏乞聖慈特允丹懇爲閑廐使奏判官韓励改名状右前件官名與再􅀙叔故媯州参軍自勵向下一字同伏以韓自勵頃因宦㳺殁于幽朔羈􅀌未返親党莫知近始言歸因之合族雖爲子之道則慎更名于已􅀌而諸父之来固難舉諱于其側伏請改名融謹錄奏聞伏聴􅃙㫖為濮陽公檄劉稹文足下前以肺肝布諸簡素仰承復命猶奉技詞夫豈告者之不忠抑乃聼之而未審擇福莫若重擇禍莫若􅁿一去不廽者良時一失不復者機事噫嘻執事誰与為謀延首北風心焉如灼是以􅂯陳禍福用釋危疑言不避煩理在易了丁寕懇欵至于再三者誠以某與先太師相國俱沐天光共為藩后昔為與國今則親隣而大年不登同盟未至飯貝才畢禭衣莫陳乃睠後生遽乖先訓遷延朝命迷失臣聀不思先􅂖之忠􅀅覆欒書之族此僕􅀠之所共惋児女之􅀁同悲况某擁莭臨戎援旗誓衆封疆甚邇音㫖猶存忍欲賣之以為巳功間之以開戎役􅀅祛未寤欲罷不􅀎􅂅思苦口之言以定束身之計昔先太尉相公常蹈􅅍􅀖不􅀙逆命翻身歸國全家受封居韓之西為國之屏弃代之際人情帖然太師相公早副軍牙乆􅀙征斾事君之莭已著居丧之禮又彰故乃奨其象賢仍以􅃇服納聀貢賦十五餘年于我唐為忠臣于劉氏為孝子人之不幸天亦難忱才加壮室之年奄有壊梁之歎主上􅀷閔義烈是䧏􅄖恩盖􅀅顕􅁕下之門為列藩之式不欲劉氏有自立之帥上党為辜恩之軍俾之還朝以聴後命其義甚著其恩莫加昨者秘不􅀤丧已踰一月安而拒詔又歴数旬秘丧則于孝子未聞拒詔則于忠臣已失失忠于國失孝于家望此用人由兹保族是亦坐薪言㤗巣幕云安智士之所寒心謀夫之所齚舌矧于僕者得不動心窃計足下之懐執事之事論當以趙氏􅀓子魏氏襲侯欲以逡廵希恩顧望謀立耳夫事殊者趣異􅀔别者跡睽胡不度其始而議其終搴其􅂠而尋其實􅂅為足下一一而陳之趙魏二侯于其先也親則父子于其人也職則副戎賞罰得以相􅂙恩威得以相抗義􅂋事順故朝廷推而與之今􅁕下之于太師也地則猶子職非副戎賞罰未嘗相􅂙恩威未嘗相抗稽丧則于義爽拒詔則于事乖比趙魏二侯信事殊而􅀔别矣此施之于趙魏則為継代象賢之美施之于足下則為自立擅命之尤得失之間其理甚白又計􅁕下未必不恃太師之好賢下士重義䡖財吳國之錢徃徃而有梁園之客比比而来􅀅依為墙藩託為羽翼使之謀取使以数求細而思之此又非計山髙則祈羊自至泉􅀷則沈玉自来見􅃹子已立然後人歸身正然後士附語有之曰政􅅍則勇者不為閗徳薄則賢者不為謀故吴濞有奸而鄒陽去燕惠無徳而樂生奔晉􅃂大夫卒成分國之禍衛多君子孰救渡河之灾此之前車得不深鏡代憲四祖文明継興當時兾趙中山淮陽齊魯結連者㡬姓旅拒者㡬侯咸逆天用人背恩忘徳據指掌之地謂可逃刑􅀝親戚之私謂􅀎取信一旦地空家破首裂支分暗者不􅀎為謀明者固已先去悔而莫及末如之何先太尉與李洧尚書齊之宻戚楊太保與蘇肇給事蔡之懿親並㩀要地方州領精甲鋭卒及其王師戾止我武維揚則割地駈人以䧏送欵輸忠以入非不顧宻戚非不念懿親非不思恩非不懐惠直以順逆事迫死生實難􅀎与同其休不能與共其戚故也况足下大未侔齊蔡乆未及李吴􅀅以其人動于不義僕固􅂲夙沙之國縳主之卒重生彭􅃂之家不義之侯更出又計足下當恃太行九折之險部内数州之饒兵士尚强倉儲具􅁕謂得支久謀而使安危哉此心自弃何速昔李抱真相國用彼州之人破朱㴞子燕國困田悦于魏郊連兵轉戰綿􅀊經時而潞人夫死不敢􅂘子死不敢悲何者李相國奉討逆之命為勤王之師義着而誠順故也及盧従史釋丧就位賣隣兾功􅀅乗討伐之時欲肆􅇯邪之性計未就而神人巳怒事未立而兵衆巳離以萬夫之長困一卒之手驅轞北闕弃尸南荒而潞之人猶老者捫胸少者扼腕謂朝廷不即顕僇􅀷為失刑其故何哉以􅀙史不義不暱去安就危衆黜其謀下不為用故也二帥去就非因􅀓聞鳩杖之人鮐背之叟知其本末尚􅀎言之則太行之險固不為悖者之守数州之衆固不為邪者之徒此又其不􅁕恃也由此言之則何以名􅈥家聲何事捨君命何道求士死何計得人心僕所以對案忘飡推枕不寐為􅁕下惜為足下危而不知其所以然也况太師比者飬牛添卒畜馬訓兵旁招武幹之材中舉􅀅軍之令然而聴于逺近頗有是非雖朝廷推赤心弘大度然不逞者巳有乖異之説横議者屡興勃戀之疑人之多言亦可畏也誰為来者冝其弭之令足下背季父引進之恩失大朝文誥之令則是實先太師之浮議彰昭義軍之有謀為人姪則置叔父于不忠為人孫則敗乃祖于無後亦何以對燕趙之士見齊魯之人􅁘又計􅁕下旬日之前造次為慮今之追改具有後艱此左右者不明而咨詢之未盡也近者李尚書右董常侍重質之軰並親為賊􅀅拒我官軍納質于匪人効用于戎首乆乃来復尚䝉殊恩皆授郡符咸領旗鼓不能悉数厥徒實繁豈有足下藉两代之餘資委数萬之􅃇旅俛首聴命舉宗効誠則朝廷又豈以一日之稽遲片詞之疑異而致􅁕下于不測阻足下之後圖故事具存可以明騐幸請自求多福無辱前人䕶龍旐以歸洛師秉象笏以朝魏闕必當勛庸継代富貴通身無為隣道所資使作他人之福倘尚淹歸欵未整来軒戎臣鼓勇以争先天子赫斯而䧏怒金玦一受牙璋四馳魏衛壓其東南晋趙出其西北超距投石者数逾萬計科頭㦸手者動以千群兼駈挽虎之材官仍率射鵰之都督感義則日月􅀎駐舒憤則沙石可吞使兵用火焚城􅀅水灌魏趣邢郡趙出洺州介二大都之間是古平原之地車甲盡輸于此境糗粮反聚于他人恃河北而河北無儲􅀝山東而山東不守以兩州之殘莩抗百道之竒兵比累卵而未危􅀉􅀌拫于何所則老夫不佞亦有志焉願駈敢死之徒以從諸侯之末下飛狐之口入天井之関巨浪難防長飈易扇此際必當驚地底之鼓角駭樓上之梯衝丧貝躋􅁜飛走之期既絶投戈散地􅁅釘之望斯窮自然麾下平生盡忘􅃇愛帳中親戚即起他謀辱先祖之神􅂕為明時之哂􅀏静言其漸良以驚魂今故再遣素車重申丹素惟鍳前代之成敗訪厯事之賔僚思反道敗徳之難念順令畏威之易時以吉日蹈茲坦途勿餒劉氏之魂勿汙潞人之俗封帛増欷含毫抑酸延望還章用以上表成敗之舉惟慎圖之不宣河陽三城莭度使王茂元頓首李義山文集卷第三
