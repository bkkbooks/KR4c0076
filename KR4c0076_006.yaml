body:
  text: 李義山文集箋註巻六監察御史徐樹榖箋山東提學僉事徐炯註祭文上代李𤣥為崔京兆祭蕭侍郎文箋舊書文宗紀太和九年六月李宗閔貶明州刺史時京兆尹楊虞卿坐妖言人歸第人皆以為寃誣宗閔於上前極言論列上怒面數宗閔之罪叱出之故坐貶七月貶虞卿為郎䖍州司馬吏部侍郎李漢為邠州刺史刑部侍蕭澣為遂州刺史八月又貶宗閔為潮州司户其黨楊虞卿李漢蕭澣皆再貶本集哭遂州蕭侍郎詩云遺音和蜀魄易簀對巴猿葢澣至遂州未㡬而卒也本傳商隱博學強記下筆不能自休尤善為誄奠之辭年月日集有狀字惟靈傳芳華胄隋房彦謙傳傳芳萬古稟慶靈源沈約碑靈源與積石爭流漢朝輔相之流輝謂蕭何之裔梁室帝王之遺懿哭蕭侍郎詩亦有公先真帝子句克生俊徳彰我休期髙表百尋庾信碑直幹百尋澄波萬頃見為柳珪啟及春闈獻藝見為安平公表㑹府試才周禮註外朝令司徒府中有百官朝㑹之殿云天子與丞相舊決大事焉是外朝之存者與後漢律厯志羣臣㑹司徒府議注蔡邕集載三月九日百官㑹府公殿下騏驥出塵説苑騏驥雖疾不遇伯樂不致千里蛟龍得水呉志周瑜曰劉備非久為人用者恐蛟龍得雲雨終非池中物也頓纓而駑駘盡喪乗風而鼈蜃皆空憑陵逺天左傳鄭王子伯駢告于晉曰憑陵我城郭躞蹀長道卓文君白頭吟今日斗酒㑹明旦溝水頭躞蹀御溝上溝水東西流是將筮仕光一作先乎縉紳侯國從知大朝就選並見前秘寳宜陳於東序典引御東序之秘寳朱紱必降於上𤣥易朱紱方來錦帳而居青縑以覆蔡質漢官典職尚書郎給青縑白綾被或以錦被建禮推盡瘁之績明光多伏奏之勤漢官儀尚書直宿建禮門奏事明光殿省中以丹朱漆地故曰丹墀尚書伏其下奏事亦既遷榮乃司論駁髙居青瑣封還集作折紫泥並見表使明時無失政之譏大邦無不便之詔後漢袁紹傳每得詔書有不便於已暫辭朝籍往分郡符舊書文宗紀太和七年三月丁巳以給事中蕭澣為鄭州刺史借寇莫從後漢寇恂傳車駕南征恂從至潁川而竟不拜郡百姓遮道曰願從陛下復借寇君一年注恂前為潁川太守故曰復借也徵黃甚急見為濮陽公表方將啟乎良友進彼令人詩我無令人志豈愛身哲將許集作匡國見代彭陽公表不謂疎網猶漏見為滎陽公表斯文一作民未康作礪為鹽書若金用汝作礪詳為綘郡公啟正俟理平之運依城憑社晏子春秋景公問宴子治國何患對曰社鼠者不可燻不可灌君之左右出賣寒熱入則比周此之謂社鼠也晉謝鯤傳王敦將為逆謂鯤曰劉隗奸邪將為社稷吾欲除君側之惡何如對曰隗誠始禍然城狐社鼠也沈約奏彈王源文狐鼠微物亦蠧大猷善曰應璩詩城狐不可掘社鼠不可熏深懷翦滅之虞左傳齊侯曰余姑翦滅此而朝食上蔽聰明内求媟近晉郭璞傳疏曰不冝令䙝近紫闥南史張𢎞筞傳嗣主在宫本無令譽媟近左右故鴻猷不得而協贊劉敬叔異苑晉隆安中鳯凰集劉穆之庭韋藪謂曰子必協贊鴻猷睿化莫可以輔成後漢王常傳常大悟曰誠思出身為用輔成大功藐是流離有窘隂雨詩終其永懷又窘隂雨嗚呼令惟逐客誰復上書史記李斯傳秦宗室大臣請一切逐客李斯議亦在逐中斯乃上書獄以黨人但求俱死後漢黨錮傳張儉鄉人朱並上書告儉與同鄉檀彬等二十四人别相署號圖危社稷刻石立墠共為部黨而儉為之魁靈帝詔刋章捕儉等大長秋曹節因此諷有司捕前黨故司空虞放等百餘人皆死獄中銜寃遽往隋煬三子傳下書曰銜寃誓衆吞恨孤居鮑昭蕪城賦天道如何吞恨者多目斷而不見長安見為汝南公表形留而逺託異國李陵答蘇武書逺託異國昔人所悲屈平忠而獲罪史記屈原信而見疑忠而被謗賈誼夀之不長漢賈誼傳賈誼為長沙王太傅三年有鵩飛入賈生舍止於坐隅楚人命鴞曰鵩賈生既以適居長沙長沙卑濕自以為夀不得長傷悼之乃為賦以自廣纔易炎凉沈約詩寒暑遞炎凉遂分今昔粤自東蜀見獻河東公啟言旋上京郭泰墓邊空多㑹𦵏後漢書郭泰卒四方之士千餘人皆來㑹𦵏同志者乃其刻石立碑鄧攸身後不見遺孤晉書石勒過泗水鄧攸曰吾弟早亡理不可絶止應自棄吾兒繫之於樹而去時人語曰天道無知使鄧伯道無兒攸死弟子綏服喪三年信陰騭之莫知書惟天隂騭下民亦生人之極痛某等頃同班列晉王祥傳祥曰公王相去一階而巳班列大同獲奉周旋左傳季文子使太史克對曰行父奉以周旋分結死生地兼族類左傳史佚之志曰非我族類其心必異依仁既切慕徳方深始驚南浦之悲江淹别賦送君南浦傷如之何俄軫下泉之訃王粲七哀詩悟彼下泉人喟然傷心肝今則年良月吉論衡塟厯曰塟避九空地臽及日之剛柔月之奇耦日吉無害剛柔相得奇耦相應乃為吉良筮協龜從書龜筮協從顧埋玉之難追晉書庚亮卒何充歎曰埋玉樹於土中使人情何能已已歎焚芝之集作而何及淮南子巫山之上順風縱火紫芝與蕭艾俱死陸機歎逝賦信松茂而柏悦嗟芝焚而蕙歎牲牢麤潔酒醴非多聊寫丹忱以伸永訣潘岳誅存亡永訣逝者不追為絳郡公祭宣武王尚書文伏惟曽構髙基往修峻址俯為明時載生竒士漢江充傳充為人魁岸容貌甚壯帝望見而異之曰燕趙同多奇士杜林舅族本富文理見為白從事啟楊惲外甥集作門是素多圖史漢楊惲傳惲母司焉遷女也惲始讀外祖太史公記頗為春秋以材能稱朱檻有裕朱檻當作朱藍藝文類聚譙子曰夫交之道猶素之白也染之以朱則赤染之以藍則青王充論衡彼姝者子何以與之其傳曰譬猶練絲染之藍則青染之朱則赤按今毛傳無此文葢魯齊韓三家語也括羽成美家語孔子曰括而羽之鏃而礪之其入之不亦深乎王僧孺為蕭監利求入學啟樸斲成於丹雘篠簜資於括羽逸足輕從東之道見為中丞狀巨背狹圖南之水見為安平公表匡生明習漢匡衡傳學者多上書薦衡經明又蕭望之奏衡經學精明董氏精專見為舉人啟魯壁墜簡汲冢遺編見為安平公狀坐忘流麥後漢逸民傳髙鳯字文通妻常之田曝麥於庭而鳯誦經不覺潦水流麥出記懐鉛西京雜記揚雄懐鉛提槧從計吏訪四方語作方言淹中莫敵漢藝文志禮古經者出於魯淹中蘇林曰里名也史記正義七録云古儀禮出魯淹中其書周宗伯所掌五禮威儀之事稷下誰先曹植書田巴毀五帝罪三王呰五伯於稷下善曰魯連子云齊之辯者曰田巴辯於徂丘而議於稷下七畧云齊有稷城門也朝有曲臺見代彭陽公表時推奥學明博士之髙選魏志劉馥傳疏曰宜髙選博士取行為人表經任人師者掌教國子資衆儒之先覺見孟子殷周損益見論語夔夷禮樂書帝曰有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗又帝曰夔命汝典樂既得根源晉藝術傳論曰迂誕難可根源盡除踳駁孝經序踳駁尤甚粉闈假道一作途漢官儀省中皆胡粉塗壁故曰粉署諫署揚輝後漢李膺傳荀爽書曰虹蜺揚輝吾寧訐訕見論語時好依違南史鄭鮮之傳時或談論人比依違不敢難周舉上章惟求主悟後漢周舉傳舉上書言當世得失辭甚切正尚書郭䖍應賀等見之歎息共上疏稱舉忠直欲帝置之御坐以為規誡賈生草疏豈畏人非漢賈誼傳誼數上疏陳政事多所欲匡諫天子議任公卿之位絳灌東陽侯馮敬之屬盡欲害之乃毁誼用之則至捨之則歸旋領藩符俄司國計鋤革煩冗脩明課第漢陳萬年傳元帝擢咸為御史中丞總領州郡奏事課第諸刺史鄙晉室之鬻綀晉王𨗳傳時帑蔵空竭庫中惟有練數千端鬻之不售𨗳乃與朝賢俱制綀布單衣練遂踴貴説文綀布屬所呼切隋姚察傳門生送南布花綀桂海虞衡志綀子出兩江州洞似苧織有花曰花綀小漢朝之造幣漢武帝紀元狩四年造白金及皮幣以足用前籌未借斂笏還家盧思道勞生論斂笏升階詳狀濮陽公再北非罪史記刺客傳曹沫者魯人以勇力事魯莊公為魯將與齊戰三戰三北齊桓公與魯㑹於柯曹沫執匕首刼桓公桓公乃許盡還魯之侵地管晏傳管仲曰吾嘗三戰三比鮑叔不以吾為怯知吾有老母也此云再北葢避下三字三黜何嗟見論語淮陽勁兵漢灌夫傳武帝即位以為淮陽天下郊勁兵處故徙夫淮陽太守潁水豪族見為濮陽公表既佩新印仍推舊轂漢馮唐傳唐對曰臣聞上古王者遣將也跪而推轂杜當陽何嘗跨馬雄士集作武爭推晉杜預傳孫晧既平振旅凱入以功進爵當陽縣侯預身不跨馬射不穿札而每任大事輒居將率之列祭征虜不廢投壺師人自睦後漢祭遵傳遵字弟孫建武二年拜征虜將軍取士皆用儒術對酒設樂必雅歌投壺夷門地古梁苑藩雄見為柳珪啟雙旌大斾左傳城濮之戰晉中軍風於澤亡大斾之左旃雙旌見為懐州表二矛重弓詩二矛重弓箋備其折壊也無忌御車惟求隱者史記魏公子無忌為人仁而下士致食客三千人魏有隱士曰侯贏年七十家貧為大梁夷門監者公子從車騎虛左自迎侯生侯生上坐不讓公子執轡愈恭相如謝病乃慕髙風謂病免游梁詳見為某先輩啟方將副帝注心晉庾冰傳由是朝野注心咸曰賢相從時大願率周廟之奔走書武成曰祀於周廟邦甸侯衞駿奔走執豆籩總漢庭之議論人之不喜今也則亡莊子孰分其魍魎莊子衆魍魎問于景景曰予蜩甲也蛇蜕也似之而非也秦醫莫救其膏肓見代安平公表鴈沼波瀾空聞悲咽兔園臺榭見為柳珪啟秖見荒凉庾信碑宅帷荒凉某獲顧尤深䝉知甚早公昔分茅孔安國書傳王者封五色土為社建諸侯則各割其方色土與之燾以黄土苴以白茅茅取其潔黄取王者覆四方歸以立社愚嘗集作當視草於劉向論思之時並見為汝南公表贊孟舒長者之號漢田叔傳叔頓首曰故雲中守孟舒長者也及兹出守實介親鄰音徽繼好王儉褚彦回碑音徽與春雲等潤寤寐依仁常期異日克奉清塵見為懐州表何言永慟屬此嘉辰訃哀如昨歸轍攸遵林薄莽蒼莊子適莽蒼之野者三日聚糧蒼上聲川原隱轔揚雄甘泉賦振殷轔而軍裝善曰殷轔言盛多也殷音隱想諸葛之旗鼓空還舊壘晉漢春秋楊儀等引軍而出宣王追焉姜維令儀去反旗鳴鼓若將向宣王者宣王不敢逼儀結陣而蜀諸葛亮傳及軍退宣王按行其營壘處所曰天下竒才也念伯喈之書集作經籍巳付何人見為某先軰啟候館攸開見為舍人啟丹幡遽至丹幡丹旐也見祭裵氏文瞻望衞幕詩瞻望弗及佇立以泣記布幕衞也縿幕魯也連緜秦一作泰非畤東方朔非有先生論嗟乎余國之不亡也緜緜連連漢郊祀志秦襄公作西畤祠白帝宣公作宻畤祠青帝靈公作上畤祠黄帝下畤祠炎帝高祖曰是待吾而具五也乃立黑帝祠名曰北畤寄奠申訣緘詞寫意終阻願於躬親徒加哀於殄瘁詩人之云亡邦國殄瘁嗚呼哀哉尚饗為濮陽公祭太常崔丞文年月日惟靈泰社繁祉泰社謂泰山社首漢郊祀志周成王封泰山禪於社首應邵曰山名在博縣晉灼曰在鉅平南十二里左傳東郭偃對崔武子曰今君出自丁臣出自桓姓譜齊太公生丁公伋伋生叔乙讓國君崔因氏安平望族姓譜東萊侯生二子伯基仲牟伯基居清河東武城仲牟居博陵安平潤地勢於長源易地勢坤構堂基於修麓詩自堂徂基藍田之産冝有良玉三秦記藍田出美玉徂來之林冝無凡木詩徂徠之松水經注汶水西南流逕徂徠山西山多松柏詩所詩徂徠之松也鄒山記曰徂徠山在梁甫奉高博三縣界猶有美松亦曰尤崍之山也昔我待子松玉之間冀十城之得價史記藺相如傳秦王欲以十五城易趙王和氏璧望千尋而可攀藝文類聚神境記曰滎陽郡南有石室室後孤松千丈表宏詩森森千丈松磊砢非一節大年不登見代安平公表逸足方駛傅毅舞賦良駿逸足蜀志楊洪為蜀郡太守舉門下書佐何祗後為廣漢太守洪常在蜀郡洪曰君馬何駛曰故吏馬不敢駛但明府未著鞭耳松欲秀而先蠧玉將攻而遽毁聞問之時歎悼何巳惟我承乏見為懐州表受命南征吳志薛綜傳子瑩獻詩曰珝忝千里受命南征一言相許漢伍被傳王曰男子之斫死者一言耳師古曰言男子感氣相許一言不顧其死攜手同行語見詩夐絶萬里飄泊雙旌見為懐州表念兩婢之價倍媿五羖之酬輕世説祖光禄常自為母炊㸑作食王平北以兩婢餉之因取為中郎人有戲之者曰奴價倍婢祖云百里奚亦何必輕於五羖之皮邪注祖納温嶠薦為光祿大夫王乂别傳乂為平北將軍地接殊鄰揚雄長楊賦遐方疎俗殊鄰絶黨之域風移中土吳大鴻臚張儼黙記魏氏誇中土五嶺三江初學記沈懐逺南越志曰廣信江始安江鬱林江亦為三江在越也五嶺見為濮陽公表炎風瘴雨見陳情表釣犀之潭太平御覽鄧德明南康記曰贑潭在郡下昔有長者於此潭以釣為事恒作漁父歌其聲慷慨忽綸動須㬰一物形似水牛眼光如鏡或言水犀浮躍逐綸角帶金鏁釣客因引得鏁出水數十丈鏁斷餘數尺是珍寶明一統志金鎖潭在廣州府清逺縣東三十里相傳秦時崑崙貢犀牛帶金鎖走入潭中晉時有羅公者釣潭中收綸得金索曵之有犀牛出掣斷其索得一尺許按贑潭不隸桂管當以在清逺者為是跕鳶之渚後漢馬援傳謂官属曰當五在浪泊西里間仰見飛鳶跕跕墮水中注跕跕墮貌音都牒泰牒二反席上從容幕中宴語並見前先防載苡之謗後漢書馬援在交趾常餌苡薏實以勝瘴氣軍還載之一車及卒後有上書譛之者以為前所載還皆明珠文犀更示投香之所見為尚書狀今南海縣西北二十八里有沈香浦亦曰投香浦因使庸虚徐陵與王僧智書還顧庸虛未應偕此不罹罪罟詩罪罟不收越井之首當作酋見陳情表甘疑作南綏之女舊書地理志廣州南海郡領四會縣注武徳二年以四會化䝉二縣置南綏州時清則銅一作筒鏑納㕑博物志交州夷名狸子狸子弓長數尺箭長尺餘以焦銅為鏑塗毒藥於鏑鋒中人即死歲稔則銀簮叩鼓後漢馬援傳於交阯得駱越銅鼔注裵氏廣州記曰狸獠鑄銅為鼓鼓惟高大為貴面濶丈餘初成懸於庭剋晨置酒招致同類來者盈門豪富子女以金銀為大釵執以叩鼔叩竟留遺主人也豈我之自惟子是與相從來覲又往於涇箋新書王茂先傳鄭注用事遷涇原節度使風埃古戍霜雪孤亭木華海賦爾其水府之内極深之庭則有崇島巨鼇峌􅒈孤亭偏裻集作䘮非之服晉語申生衣偏裻之衣縵胡之纓莊子趙太子悝謂莊周曰吾生所見劍士皆縵胡之纓塞迥而晨嚴刁斗漢李廣傳不擊刁斗自衞孟康曰刁斗以銅作鐎受一斗晝炊飯食夜擊持行故名曰刁斗今在滎陽庫中也蘇林曰形如鋗無緣師古曰鐎音譙温器鋗即銚也今俗或呼銅銚按刀如字俗掉尾作刁音貂謬也沙平而夜警兜零見為中丞賽神文指吾以虜隙勉吾以武經左傳隨武子曰兼弱攻昧武之善經也正慰窮邉出師頌窮域極邉俄集作忽還京邑北庭減價新書地理志北庭大都䕶府属隴右道南轅一作園雪泣左傳令尹南轅返斾章臺辟掾方喜趙嘉之來後漢書趙岐京兆長陵人初名嘉辟司空掾復為皮氏長㑹河東太守劉祐去郡而中常侍左琯兄滕代之岐耻疾宦宫即自西歸京兆尹延篤復以為功曹棘署選丞北史邢劭傳奏曰槐宫棘寺顯麗於中仍見譙𤣥之入後漢獨行傳譙𤣥字君黄巴郡閬中人永始二年詔舉敦樸遜讓有行義者各一人舉𤣥詣公車對䇿高第拜議郎是焉踐歴更俟飛翻王粲贈蔡子篤詩苟非鴻雕孰能飛翻况乎鳯沼又接鴒原晉書荀朂從中書監遷尚書令人賀之乃發恚曰奪我鳯凰池卿諸人賀我邪謝莊謝中書令表璧門天邃鳯沼神深詩眷令在原兄弟急難杜甫詩鴒原荒宿草鳯沼接亨衢何釁成乎燥濕而厲結於寒暄左傳子罕曰吾儕小人皆有闔廬以辟燥濕寒暑徐陵書亟積寒暄未及西山之藥見上河東公啟旋為東嶽之魂日知録嘗考史記漢書未有泰山考鬼之説自哀平之際䜟緯之書出然後有如遁甲開山圖所云泰山在左亢父在右亢父知生梁父知死博物志所云泰山一曰天孫言為天帝之孫主召人魂魄知生命之長短者其見於史者則後漢書方術傳許峻自云嘗篤病三年不愈乃謁泰山請命烏桓傳死者魂靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸泰山也三國志管畧傳謂其弟辰曰但恐至泰山治鬼不得治生人如何而古辭怨歌行云齊度㳺四方各繫泰山錄人間樂未央忽然歸東嶽陳思王驅車篇云魂神所繫属逝者感斯征劉楨贈五官中郎將詩云常恐㳺岱宗不復見故人應璩百一詩云年命在桑榆東嶽與我期然則鬼論之興其在東京之世乎憶昔舊許員歸員與云同左傳楚靈王曰昔吾皇祖伯父昆吾舊許是宅青門出餞三輔黄圖長安城東出南頭第一門曰覇城門民間或曰青門漢疏廣傳公卿大夫故人邑子設祖道供帳東都門外樂作而歎起左傳享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也杯行而涙泫王粲公宴詩但愬杯行遲但容與集作悔吝非於風波屈原九章船容與而不進兮淹回水而疑滯銑曰容與徐動貌謝靈運詩辛勤風波事共沉吟於羽箭後漢隗囂傳牛邯沉吟十餘日乃謝士衆釋名箭旁曰羽如鳥羽也鳥須羽而飛箭須羽而前也揮袂如昨晉夏侯湛傳抵疑曰揮袂出風雲郵書甚頻後漢張衡傳奏記曰使人未返復獲郵書雖遥道里後漢宼恂傳長安道里居中應接近便未闊聲塵見謝河東公啟孰謂念歸之日翻為有慟之晨嗚呼哀哉髣髴荒阡依稀古陌沈約詩荒阡亦交互風俗通南北曰阡東西曰陌徐動丹旐見為絳郡公文永歸𤣥宅魏志文帝紀注鄄城侯植為誄曰背三光之昭晰兮歸𤣥宅之冥冥願執紼而身逺禮記助䘮必執紼想移舟而莫極莊子藏舟於壑謂之固矣夜半有力者負之而走昧者不知也迥夜秋思羣山暮色恨白髪之衰翁哭青雲之舊客史記伯夷傳非附青雲之士惡能施於後世聊兹寄興莫冩西悲詩我東曰歸我心西悲已乎崔子為吾歆之為裵懿無私祭薛郎中衮文無字疑衍文新書世系表裵懿太子舍人之按薛衮乃懿之姻戚玩文意薛乃出守蘇湖間而卒者時懿謫嶺外未得躬親其窆故有或期他日式返中華云云伏惟靈佐商宣業左傳薛之皇祖奚仲夏居薛以為夏車正奚仲遷於邳仲虺居薛以為湯左相朝薛傳規左傳公曰寡人若朝於薛不敢與諸任齒門崢層構堂嶫崇基玉生藍田見為濮陽公文芝產銅池漢宣帝紀金芝九莖產於函徳殿銅池中梧高佇鳯韓詩外傳鳯止黄帝東園集梧樹食竹實没身不去蓮馥停龜史記龜策傳神龜巢蓮上有美令人見代李𤣥文再稱清劭見為濮陽公表訓在詩禮漢書韋賢書兼通禮尚書以詩教授號稱鄒魯大儒本始三年為丞相封扶陽侯叙傳扶陽濟濟聞詩聞禮樂惟名教世説王平子胡母彦國諸人皆以任誕為達或有裸體者樂廣笑曰名教中自有樂地何為乃爾也王謝標格曹劉才調曹植劉楨也劉勰文心雕龍揚班之倫曹劉以下清如濯熱之風詩誰能執熱逝不以濯明若觀朝之燎詩庭燎之光傳庭燎大燭箋於庭設火燭使諸侯早來朝靈臺委鑒莊子不可納於靈臺注靈臺者心也虛室融和莊子虛室生白注人能虛心遊世則純白備於内秋水望闊莊子秋水時至百川灌河兩涘渚涯之間不辨牛馬春臺上多老子衆人熙熙如登春臺鄉塾掉鞅禮記古之教者家有塾左傳樂伯掉鞅而還文林勵戈見為李貽孫啟硯横河漢論衡漢作書者多司馬子長揚子雲河漢也其餘涇渭也紙落煙波潘岳楊荆州誄翰動若飛紙落如雲杜甫飲中八仙歌揮毫落紙如雲煙澤宫貍首禮記天子將祭必先習射於澤官澤者所以擇士也又諸侯以貍首為節棘場楊葉新書舒元興傳元和中舉進士入列棘圍席坐廡下李肇國史補得第謂之前進士其都會謂之舉塲戰國策養由基去楊葉百步射之百發其中箭去星慙賀凱詩帶星飛夏箭弓懸月怯庾信馬射賦弓如明月對堋兩書上第新書選舉志凡進士試時務策五道帖一大經經策全通為甲第策通四帖過四以上為乙第五辟名公選舉志沈既濟疏六品以下或僚佐之属聼州府辟用馬卿賦雪謝惠連雪賦授簡於司馬大夫曰抽子秘思騁子妍辭侔色揣稱為寡人賦之陳琳愈風見為濮陽公表平臺竹苑漢書梁孝王廣睢陽城治複道自宫連属於平臺三十餘里枚乘兔園賊修竹檀欒夾池水水經注城東二十里有平臺梁王與鄒枚相如之徒極逰於其上睢水東南流歴於竹圃水次綠竹䕃渚菁菁實望世人言梁王竹園也淮山桂藂見為張周封啟營分細栁見為賀拔員外啟幕染芙蓉見為同州啟顯備臺僚榮徙集作從是憲秩冠峨鐵勁通典侍御史一名柱後史謂冠以鐵為柱衣明繡宻漢雋不疑傳暴勝之為直指使者衣繡衣持斧督課郡國威振州郡霜下簡端通典御史為風霜之任故曰霜臺御史故事按事彈奏白簡為重黄簡為輕風生落筆崔瑗御史咸簡上霜凝筆端風起庭夜烏廻見為懐州表天秋隼疾見為綘郡公啟帝念充職任於諫垣元稹詩諫垣陳好惡依違絶想從容敢言謝承後漢書夏勤從容論議攀檻而空留跡在見為濮陽公表削藁而不見書存漢孔光傳光典樞機十餘年時有所言輒削草藁女史䕶衣漢官儀尚書郎入直臺廨中給女侍史二人皆選端正指使從直女侍史執香爐燒薰以從入臺中給使䕶衣服大官供食通典尚書諸曹郎太官供食物湯官供餅餌及五熟果實之類五百一美食下天子一等伏奏多可通典尚書郎奏事則與黄門侍郎對揖黄門侍郎稱已聞乃出漢汲黯傳黯前奏事上不冠望見黯避帳使人可其奏分曹著績初學記西漢置尚書郎四人光武分尚書為六曹毎一尚書則領六郎凡三十六郎焉帳煖錦麗見為絳郡公啟闈明粉白見為絳郡公文即題柱以如田後漢書田鳯為尚書儀容端正每奏事靈帝目送之因題柱曰堂堂乎張京兆田郎亦償金而類直漢直不疑傳不疑為郎事文帝其同舍有告歸誤將持其同舍郎金去已而同舍郎覺亡金意不疑不疑謝有之買金償後告歸者至而歸金亡金郎大慚以此稱為長者漢榮出牧後漢光武紀初斷州牧自還奏事晉議州兵左傳晉於是乎作州兵亷袴歌送見為滎陽公狀劉錢贈行後漢循吏傳劉寵拜㑹稽太守徵為將作大匠有五六老叟人齎百錢以送寵曰明府下車以來狗不夜吠民不見吏寵為人選一大錢受之濟南之誅巨猾漢郅都傳濟南瞷氏宗人三百餘家豪猾二千石莫能制於是景帝拜都為濟南守至則誅瞷氏首惡餘皆股慄揚州之試諸生漢何武傳武為揚州刺史行部必先即學官見諸生試其誦論問以得失虎去江静後漢書宋均遷九江郡多虎暴數為人患均到虎相與東浮渡江珠來岸明後漢循吏傳孟嘗遷合浦太守海出珠寳先時守宰並多貪穢珠遂漸徙於交趾郡界嘗到官去珠復還神豈好謙易鬼神害盈而福謙人道惡盈而好謙天寕秩禮書天秩有禮蠧華國之明品見為滎陽公狀䘮士林之模楷吳志魯肅傳交游士林後漢書天下模楷李元禮使為善者奪氣求仁者解體左傳諸侯聞之其誰不解體已不駐乎卿雲見下序竟何窺於伏濟山海經王屋之山㶌水出焉西北流注於泰澤注㶌沇聲相近即沇水也水經注沇水潛行地下至共山南復出於東丘今原城東北有東丘城孔安國曰泉源為沇流去為濟長洲樹古茂苑山春漢枚乗傳修治上林不如長洲之苑服䖍曰吳苑孟康曰似江水洲為苑也韋昭曰長洲在吳東吳都賦佩長洲之茂苑橘税既集任昉述異記越多橘柚園越人歲出橘税葉夢得書傳橘性極畏寒今吳中橘亦惟洞庭東西兩山最盛地必面南為属級次第便受日茶征是親新書食貨志貞元九年諸道鹽鐵使張滂奏出茶州縣若山及商人要路以三等定估十税其一歲得錢四十萬緡舊書德宗紀茶之有税自此始鷁度霅而未逺鷁與鴨同鷁水鳥似鷺而大高飛能風兩春秋僖公十有六年六鷁退飛過宋都榖梁傳鳥將進遇風退飛相接而過宋都按上文言長洲茂苑則薛衮嘗官於吳郡霅水在吳興界中與吳郡無涉霅當作雲字之訛也鵠下亭而唳頻晉陸機傳華亭寉唳豈可復聞乎翟虜氛興左傳楚氛甚惡注氛氣也言楚有襲晉之氣新書回鶻傳武宗時回鶻奉太和公主至漠南入雲朔剽横水殺掠甚衆轉側天徳振武間按翟虜氛興疑指此殷楹夢起禮記夫子曰丘也殷人也予疇昔之夜夢坐奠於兩楹之間夫明王不興天下其孰能宗予予殆將死也帳入飛鵩西京雜記賈誼在長沙鵩鳥集其承塵俗以鵩鳥至人家主人死誼作鵩鳥賦按釋名承塵施於上以承塵土葢即此所謂帳也牀驚鬭蟻世説殷仲堪父病虛悸聞牀下蟻動謂是牛鬪鄭𤣥知數後漢鄭𤣥傳𤣥夢孔子告之曰起起今年歲在辰來年歲在巳既寤以䜟合之知命當終有頃寢疾其年六月卒年七十四阮瞻無鬼幽冥錄阮瞻素秉無鬼論有一鬼通姓名作客詣之變為鬼形須㬰便滅阮年餘病死終自膏肓見代安平公表傅於骨髓史記扁鵲傳扁鵲過齊望見桓侯而趋走曰疾之居腠理也湯熨之所及也在血脈鍼石之所及也其在腸胃酒醪之所及也其在骨髓雖司命無如之何令在骨髓臣是以無請也桓侯遂死嗚呼哀哉丹霄萬里賈謐詩青青塞雲上拂丹霄北堂書鈔雜字解詁云霄摩天赤氣也建木千尋見為栁珪啟坦坦清路曈曈一作幢幢翠隂三襲臺迥三襲未詳魏書李騫釋情賦云對九重之清切望八襲之峥嶸盖襲即重也九重禁深見為成魏州表中懸旒扆謂冕旒黼扆下集華簪錢起詩羞將白髪對華簪無非東箭見為滎陽公狀盡是南金見為同州啟或扶傾作棟後漢隗囂傳扶傾救危或望旱為霖見上時相啟顯允明公詩顯允方叔宜膺百福詩干祿百福夜暗神昧史照通鑑疏引諺云福至心靈禍來神昧天長景促見為滎陽公狀青女變霜淮南子秋三月青女乃出以降霜雪高誘曰青女青腰玉女注霜雪也羲和納旭廣雅日御曰羲和詩旭日始旦悄隨掌以銷璣劉琨答盧諶詩序夜光之珠何得専翫於隨掌慨周閑之䘮騄穆天子傳天子命駕八駿之乘右服華留而左騄耳周閑見為中丞狀永惟清族本富才人有弟則陸世説蔡司徒在洛見陸機兄弟住参佐廨中三間瓦屋士龍住東頭士衡住西頭無兄不荀後漢荀淑傳淑有子八人儉緄靖燾汪爽肅瞻並有名稱時人謂之八龍原鴒奕奕沼鴈馴馴並見前珩奇動楚晉語楚王孫圉聘於晉趙簡子問曰楚之白珩猶在乎璧貴傾秦見為濮陽公文永矣彼蒼詩彼蒼者天胡然天事詩胡然而天也但續椿夀見為滎陽公狀徒高鶴位左傳狄人伐衛衞懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰摧壓光價隋盧思道傳孤鴈賦云剪拂吹噓長其光價掩淪聲味中論六塵色聲香味觸法潁不濁而殄灌宗見為濮陽公表淮未絶而傾王氏晉王𨗳傳初𨗳渡淮使郭璞筮之曰吉無不利淮水絶王氏滅某因承集作申因非中外後漢列女傳文姬詩曰又復無中外獲奉恩私通孔李道徳之舊見為同州啟兼盧劉姻戚之私劉琨答盧諶詩郁穆舊恩嬿婉新婚善曰臧榮緒晉書琨妻即諶之從母諶贈琨詩申以婚姻著以累世向曰婚姻謂諶妹嫁琨弟鑄顔有契見為舉人啟全趙為期見為張周封啟静龍門之風水見為同州啟剷羊腸之嶮巇見為河南表空欲銘恩何酬樹徳韓子孔子曰善為吏者樹德庇孤根于高援文選有謝靈運田南樹園激流植援詩銑曰引流水種木為援如牆院也許嘉姻于弱植左傳子産如陳曰其君弱植將歡宋子詩豈其取妻必宋之子俄放湘南文選序楚人屈原遂放湘南綬黄楚徼初學記四百三百二百石皆黄綬一采純黄圭長丈五尺六十首䰅一作鬢白昭潭後漢岑彭傳敕彭書曰每一發兵頭䰅為白水經注湘水北過臨湘縣西又北逕昭山西山下有旋泉深不可測故言昭潭無底也亦謂之湘州潭歸止未卜詩既曰歸止曷又懐止棄予是甘詩將安將樂棄予如遺許靖之悲方極見為監州狀王粲之憂不堪王粲登樓賦登兹樓以四望兮聊暇日以銷憂猶辱重言見為張周封啟將敦故約玉無改行周語先民有言曰改玉改行金不如諾見為張周封啟朂大義於幽沉軫遐心於漂泊並見前使者尚在凶書巳來北史李順傳吉凶書記皆合典則鴈足空逺漢蘓武傅天子射上林中得鴈足有繫帛書言武等在某澤中魚腸不回古詩客從逺方來遺吾雙鯉魚呼童烹鯉魚中有尺素書涙和峽雨説苑鮑叔死管子舉上袵而哭之泣下如雨哭振巴雷世説顧長康哭桓宣武聲如震雷破山涙如傾河注海孰澆枯鮒見為張周封啟誰熱寒灰見代僕射表今則言去郴江水經注黄水出郴縣西黄岑山北流注於耒水謂之郴口新書地理志郴州桂陽郡治郴縣元和郡縣志郴水流經州東一里輿地紀勝郴水在郴縣南四十里源出黄岑山至郴口合耒水當移澧浦屈原九歌遺余佩兮澧浦按裵祭薛在郴州時又量移澧州而欲去也稍脱疑網猶罹罪罟念申慟以無期豈沈寃之可吐嗚呼哀哉執紼路阻見為濮陽公文佳城望賒滕公石椁銘語凌空乏翼古詩諒無晨風翼焉能凌風飛上漢無槎見為濮陽公表或期他日式返中華認楊一作羊非公之石馬西京雜記陳縞見張丞相墓前石馬水經注譙城南有曹嵩家東西列對兩石馬隂箋按後漢書楊震傳順帝即位下詔以禮改葬於華潼亭逺近畢至先葬十餘日有大鳥高丈餘集震䘮前悲鳴涙下霑地葬畢乃飛去於是時人立石鳥象於其墓所注引謝承書曰其鳥五色高丈餘翼長二丈三尺人莫知其名也此文石馬當作石鳥盖冡前石馬所在多有隨舉一人皆可何必楊公故知馬為烏字之誤楊或作羊亦謬撫周苞之辟邪漢西域傳烏弋山離國有桃抜師子犀牛孟康曰桃抜一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪後漢靈帝紀注今鄧州南陽縣北有宗資碑旁有兩石獸鐫其膞一曰天禄一曰辟邪東按後漢書宦官封侯無所謂周苞者據水經注滍水逕犨縣故城北出於魚齒山下水南有漢中常侍長樂太僕吉侯苞冡冡前有碑基西枕岡域開四門門有兩石獸墳傾墓毁碑獸淪移人有掘出一獸猶全不破甚高壯頭去地減一丈許作制甚工左膊上刻作辟邪字其碑云六帝四后是諮是􅓪盖仕自安帝没於桓后也義山盖用此事今水經注本訛缺最多吉恐是周字之誤或集誤以吉為周亦未可知史無其人莫可考矣况良冶規存見為絳郡公啟遺經業在見為河東公啟臧孫有後左傳桓公二年取郜大鼎於宋臧哀伯諫周内史聞之曰臧孫達其有後於魯乎君違不忘諫之以徳魏萬必大見為成魏州表敢期陋質終託餘光漢王莽傳誠上沐陛下餘光韋平之紹續無望見為李貽孫啟秦晉之婚姻豈忘左傳晉侯之入也秦穆公屬賈君焉注穆姬申生姊秦穆夫人絮酒無幾謝承後漢書徐穉諸公所辟雖不就有死䘮負笈赴弔嘗於家豫炙雞一隻以一兩緜絮漬酒中暴乾以裹雞徑到所起塜𡑞外以水漬緜使有酒氣斗米飯白茅為藉以雞置前灑酒畢留謁則去不見䘮主生芻是將後漢徐穉傳郭林宗有母憂穉往弔之置生芻一束於廬前而去辭多失次北史高允傳景穆曰天威嚴重允迷亂失次耳涙數無行庾信傳垂涙有千行冀桂旌之不逺屈原九歌辛夷車兮結桂旗降蘭佩之餘芳離騷紉秋蘭以為佩嗚呼哀哉尚饗祭吕商州文新書地理志闗内道商州上洛郡領縣六上洛豐陽洛南商洛上津乾元詳文意似代鄭亞故有三湘五嶺之語惟靈族光釣渭見賀相國啟慶顯歌齊左傳吳公子札請觀於周樂為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎竹分東箭見為滎陽公狀玉奪南珪委蛇霄路詩退食自公委蛇委蛇睥睨雲梯漢田蚡傳辟睨兩宫間師古曰辟睨傍視也辟本作䁹與睥同謝靈運詩共登青雲梯淺牙洞䑕牙弩牙也漢書千鈞之弩不為鼷鼠發機短刅分犀王襃頌水斷蛟龍陸剸犀革古聖堂奥後漢班固傳窮先聖之壺奥前賢町畦莊子彼且為無町畦亦與之為無町畦湔腸効藥史記庶子曰俞附療病湔洗腸胃刮膜留箆涅槃經有盲人請良醫醫即以金箆刮其眼膜彈琴而放臣見釋左傳晉侯觀於軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使税之問其族對曰伶人也使與之琴操南音公使歸求成買賦而妬后還閨長門賦序武帝陳皇后得幸頗妬别居長門宫愁悶悲思聞司馬相如工為文奉黄金百斤為相如文君取酒相如為文以悟主上皇后復得幸既步京國曹植王仲宣誄我公實嘉表揚京國亦薦鄉里晉沈充傳頗以雄豪聞於鄉里與田蘇游左傳韓獻子告老公族穆子有廢疾將立之辭曰請立起也與田蘇游而曰好仁有太叔美左傳北宫文子言於衞侯曰子太叔美秀而文鄴都才運見為栁珪啟洛陽年齒見為東川啟何宴神仙世説何晏七歲明惠若神魏武帝奇愛之張良女子漢張良傳贊曰聞張良之智勇以為其貌魁梧奇偉反若婦人女子禮闈之擅譽也如彼册府之傳名兮若此並見表囊成内殿之帷漢東方朔傳孝文皇帝集上書皂囊為殿帷書貴皇都之紙晉書左思三都賦成一時競傳洛陽為之紙貴曹植詩肅承明詔應會皇都中臺南省並見表諌署戎藩才難價重政舉人存蓮池易曉見為同州啟蘭圃多暄抬遺記崑崙山第九層有芝田蘭圃涵波獨躍弄影孤翻王粲樓中常經暇日見為裵懿文揚雄宅裏幾弔遺魂左思詠史詩宛宛楊子宅門無卿相輿漢書揚雄傳又怪屈原文過相如至不容作離騷自投江而死乃作書徃往摭離騷文而反之自岷山投諸江流以弔屈原名曰反離騷參差覯閔詩覯閔既多受侮不少萋斐成寃詩萋兮斐兮成是貝錦漢庭毁誼楚國讒原建禮門内明光殿外三秦記挂宫中有明光殿皆金玉珠璣為簾箔金戺玉階晝夜光明餘並見前直金既肆於猜疑見為斐懿文魏被竟從於沙汰見為安平公表䝉犯霜露左傳子太叔曰跋涉山川䝉犯霜露支離埃壒莊子支離其形者猶足以養其身終其天年乂况支離其德者乎魏都賦越埃壒而資始翰曰埃壒塵昏之氣厲山遥鬱于朝嵐帝王世紀神農本起烈山故曰烈山氏一曰厲山氏春秋僖公十有五年齊師曹師伐厲注厲楚與國義陽隨縣北有厲鄉太平御覽荆州圖記曰永陽縣西北二百三十里厲鄉山東有石穴昔神農生於厲鄉禮所謂烈山氏也春秋時為厲國穴高三十丈長二百丈謂之神農穴韻府嵐山氣也溠水傍奔其素瀨左傳除道梁溠營軍臨隨瀨溠水在義陽厥縣西東南入溳水任昉行狀素交輝説文瀨水流沙上也猶懐毒草過農井以低窺淮南子神農嘗百草之滋味一日而七十毒荆州記随郡重山有一穴傳云神農所生地有九井神農既育九井自穿尚憶神珠向隨臺而獨酹寰宇記隋侯臺在隋縣北八里隋侯所築放彈之所説文酹醊祭也按厲山至此謂吕自省郎謫官隨州渚宫貳尹左傳王在渚宫明一統志在江陵故城東南梁元帝即位渚宫即此按渚宫貳尹謂自隨遷江陵府少尹也相府中郎南史朱修之傳文帝謂曰卿曽祖昔為王導丞相中郎卿今又為王𢎞中郎可謂不忝爾祖矣將申蠖屈易尺蠖之屈以求伸也欲復鴛行杜甫詩五更三㸃入鵷行朱轓意氣早葢輝光白頭吟男兒重意氣何用錢刀為朱轓皁葢並見為懐州表訓説則馬季長之居南郡後漢馬融傳融字季長桓帝時為南郡太守常欲訓左氏春秋及見賈逵鄭衆注但著三傳異同説風流則殷仲文之守東陽庾信枯樹賦殷仲文風流儒雅海内知名代異時移出為東陽太守劉寵一錢見為裵懿文鄧攸五鼓晉鄧攸傳攸為呉郡守俸禄無所受惟飲吳水而巳後稱疾去職數千人留牽攸船不得進攸乃小停夜中發去吳人歌曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去遂解郡符來登書府孔安國尚書序藏之書府以待能者儒林文囿漢成帝紀詔曰儒林之官四海淵源文選序歴觀文囿泛覽辭林瑶山瓊圃鉛槧朝閱見為絳郡公文芸籖夜數見為安平公表𤓰當鄭灼之心梁書鄭灼字茂昭勵志好學多苦心熱若𤓰時輒偃卧以𤓰鎮心起便讀誦錐在蘇秦之股戰國䇿蘇秦讀書欲睡引錐自刺其股流血至踵是從佐理於彼東周雷喧洛派電掣嵩丘潘岳壊舊賦前瞻太室傍眺嵩丘良曰太室嵩丘皆中嶽名玉泉嘉月玉泉未詳按玉泉當在河南縣界懐慶府志濟源縣瀧水北有玉泉唐盧仝嘗汲此泉烹茶亦名玉川井則在河北恐非又明一統志宜陽縣東南有噴玉泉地亦回逺新書王綝傳武后幸玉泉祠疑即其地金谷清秋石崇金谷詩序余有别廬在河南縣界金谷澗中或高或下有清泉茂林衆果竹柏藥草之屬莫不畢備水經注榖水又東左㑹金谷水水出大白原東南流歴金谷又東南逕晉衞尉石崇之故居也明一統志金谷園在河南府城西十三里陳思王之羅韤洛神賦凌波㣲步羅韈生塵郭有道之仙舟見為山南啟不無賦詠聊以優游漢入嶢闗漢高帝紀沛公攻武闗入秦趙高遣將將兵距嶢闗應劭曰嶢音堯嶢山之闗李竒曰在上洛北藍田南武闗之西晉分隂地左傳蠻子赤奔晉隂地楚司馬昄使謂隂地之命大夫士蔑曰將通於少習以聼命注隂地河南山北自上雒以東至陸渾少習武闗也將大開武闗道以伐晉水經注丹水自商縣東南流歴少習出武闗京相璠曰楚通上洛阸道也文潁曰武闗在淅縣西一百七十里𢎞農界藉賢太守之政有古諸侯之貴謂吕自東都遷商州刺史載揚筆陣太平御覽王右軍題衞夫人筆陣圖後曰紙者陣也筆者刀矟也墨者鍪甲也硯者城池也本領者將軍也心意者副將也復清劍氣任昉宣徳皇后令劍氣凌雲而屈迹於萬夫之下長卿消渴見為絳郡公啟士安風痺晉書皇甫謐字士安年二十始受書得風痺疾猶手不輟巻逝川幾歎于不廻鮑昭詩東海迸逝川西山道落暉朝露俄聞于溘至江淹恨賦朝露溘至握手何言注李陵謂蘇武曰人生如朝露何久自苦如此嗚呼昔也風塵投分平生少年雕龍競巧見為栁珪啟倚馬爭妍見代彭陽公表開襟隨岸王粲登樓賦向北風而開襟左傳楚武王伐墮注隨國今義陽隨縣庾信賦隨岸蛇生而珠死促膝伊川杜甫詩夜如何其初促膝左傳辛有適伊川注周地伊水也月中乃共誇科桂虞喜安天論俗傳月中有仙人桂樹今視其初生見仙人之足漸以成形桂樹復生酉陽雜俎月中有桂高五百丈下有一人常斫之樹創隨合人姓吳名剛西河人學仙有過謫令伐樹詳謝宗卿啟池裏亦相矜幕蓮見為同州啟劉樗屢擲晉書劉毅於東堂聚樗蒱大擲桓𤣥曰劉毅家無擔石之儲樗蒱一擲百萬畢甕多眠晉書畢卓為吏部郎比舍郎酒熟卓夜至其甕間盜飲之醉卧其下為掌酒者所縛終以世務紛綸後漢井丹傳京師為之語曰五經紛綸井大春物情推斥見為滎陽公狀撫事傷年南史齊武帝諸子傳嶷上表曰撫事未往載傷心目減歡加戚路泣楊朱淮南子楊朱見岐路而哭之為其可以南可以北絲悲墨翟淮南子墨子見練絲而泣之為其可以黄可以黑也縱風至而音來竟月同而地隔見為山南啟逮予㢘部及子頒條華樽旨酒綺席嘉肴陸倕石闕銘焚其綺席善曰六韜紂時婦人以文綺為席衣以綾䊵者三千人詩雖無嘉殽式食庶幾各懸章綬俱失簟瓢雖論金而契在易二人同心其利斷金終照玉而顔凋陸機詩玉顔侔瓊㽔子牟之思魏闕望之之憶漢朝並見表誠知舌在史記張儀傳楚相亡璧門下意張儀掠笞數百其妻曰子毋讀書㳺説安得此辱乎張儀謂其妻曰視吾舌尚在否妻笑曰舌在也曰足矣不覺魂消江淹别賦黯然銷魂者惟别而已矣書斷三湘梁書天監中寳誌道人為符書云起自汝蔡訖於三湘後侯景果起於懸瓠汝水之南而敗於巴陵三湘之浦元和郡縣志侯景浦在巴陵縣東北十二里本名三湘浦岳州府志三湘浦在臨湘縣南四十五里城陵磯下以湘水合瀟水曰瀟湘合蒸水曰蒸湘合沅水曰沅湘故曰三湘也哀聞五嶺見前表天涯地末古詩各在天一涯高秋落景重疊憂端杜甫詩憂端齊終南縱横涙綆王粲詩涕下如綆縻漏虯夜促孫綽漏刻銘靈虯吐注隂蟲承㵼隙駒朝騁見代僕射表怨藻繢之無睢見為舉人啟惜陽春之亂郢見謝河東公啟言念令季託余屬城陸機吳趋行属城咸有士鴒原鴈序昔日懽情蠻圻瘴嶠今日一作朝哭聲愍支體遽亡於手足見上尚書啟况弟兄不如其集作于友生詩雖有兄弟不如友生嗚呼厚夜依臺左傳從先君於窀穸注窀厚也穸夜也窮泉訪路見為王侍御表已已金骨十洲記東海之西岸有扶桑人食其椹體骨皆作金色高飛翔空嗟嗟玉樹見代李𤣥文莫和哀挽隋煬三子傳虞世基哀冊文曰聼哀挽之凄楚空陳薄一作奠具銜萬里之遐誠託千辭之寄喻異時松楸枯朽謝朓哀策文映輿錢於松楸鋄馬亡反注馬冠也羊虎傾頽水經注成陽縣有仲山甫冡羊虎傾低破碎畧盡在靈臺之東北又汝水别瀆東逕蔡岡北岡上有平陽侯相蔡昭冡羊虎傾低殆存而巳姚旅露書今人墓前有石羊石虎按石羊天禄也似鹿非鹿名曰桃拔石虎辟邪也似虎非虎而能食虎輯栁編謂石麟辟邪乃帝王陵寢所用故改用羊虎然漢宗資非帝王墓前巳用天鹿辟邪矣草宿苔厚禮記朋友之墓有宿草而不哭焉門平闕摧門謂墓門闕謂碑闕詩墓門有梅水經注汝水東南流逕𢎞農太守張伯雅墓塋四周疊石為垣表二石闕夾對石獸於闕下又蔡昭冡有石闕闕前有二碑碑字淪碎不可復識宋樂府三更書石闕憶子夜啼碑又石闕生口中銜碑不得語尚期越禮顔延之五君詠越禮自驚衆用冩餘哀晉袁石䖍傳况在餘哀豈得辭事按此言他日過墓時雖久而猶哀違宿草不哭之義故云越禮也靈今不昧儻或來哉奠相公令狐公文箋舊書開成元年檢校左僕射興元尹充山南西道節度使二年十一月卒於鎮年七十二冊贈司空諡曰文戊午歲丁未朔乙亥晦弟子玉谿李商隠新書藝文志有玉谿生詩三巻叩頭哭奠故相國贈司空彭陽公嗚呼昔夢飛塵見為某先軰啟從公車輪今夢山阿括地志桓公冡在臨淄縣牛山上管仲冡在牛山之阿陶潛挽歌死去何所道託體同山阿送公哀歌古有從死今無奈何詩序黄鳥者哀三良也國人刺穆公以人從死而作是詩也天平之年舊書地理志天平軍節度使治鄆州管鄆齊曹棣四州節箋舊書令狐楚傳太和三年進位鄆州刺史天平軍度鄆曹濮觀察等使新書本傳楚徙天平宣武皆表署廵官大刀長㦸漢書楊惲傳惲怒持大刀鼂錯傳兩陣相近平地淺草可前可後此長㦸之地也將軍樽旁一人衣白日知錄人主左右亦有曰衣南史恩倖傳宋孝武選白衣左右百八十人魏書恩倖傳趙修給事東宫為白衣左右茹皓充高祖白衣左右唐李泌在肅宗時不受官帝每與泌出軍人環指之曰衣黄者聖人也衣白者山人也則天子前不禁白十年忽然本集九日詩十年泉下無削息蜩宣甲化見為絳郡公文人譽公憐人譖公罵公高如天愚卑如地脱蟺如蛇見為絳郡公文如氣之易愚調京下南史陳後主紀恐京下為過公病梁山謂卒於興元鎮新書地理志興元府漢中郡南鄭縣有中梁山絶崖飛梁山行一千草奏天子䥴辭墓門臨絶丁寜託爾而存見遺表公此去邪禁不時歸鳯樓原上新舊衮衣原註公先人亦贈司空有泉者路有夜者臺並見前昔之去者宜其在哉聖有夫子亷有伯夷見孟子浮魂沉魄公其與之故山巍巍玉谿在中送公而歸一世蒿蓬見為同州啟嗚呼哀哉祭長安楊郎中文箋舊書楊虞卿傳虞卿虢州𢎞農人從兄汝士汝士弟魯士字宗尹本名殷士長慶元年進士擢第其年詔翰林覆試殷士與鄭朗等俱覆落因改名魯士後登制科位不達而卒初汝士中第有時名遂歴清貫其後諸子皆至正卿鬱為昌族所居靖恭里知温兄弟並列門㦸咸通中昆仲子孫在朝行方鎮尚十餘人年月日謹以云云之奠祭于宗尹郎中之靈昔莊南華之言物故則曰若巨室之偃歸人舊書𤣥宗紀莊子號曰南華真人所著書改為真經劉熙釋名漢巳來謂死為物故言諸物皆朽故也莊子莊子妻死方箕踞鼓盆而歌曰人且偃然寢於巨室而我噭噭然随而哭之自以為不通乎命故止也陶貞白之語𤣥機則曰雖頑仙不如才鬼南史陶𢎞景字通明十歲得葛洪神仙傳便有養生之志終身不娶止於句容之句曲山自號華陽陶隐居大同三年卒諡貞白先生晏殊類要引法書要録陶隐居與梁武帝啟云毎以為作才鬼亦當勝於頑仙邈矣高論蔡邕袁揚碑邈矣高蹤孰能克兹皭然深㫖史記屈原傳皭然泥而不滓者也有感斯文王羲之蘭亭記亦將有感于斯文屬在之子黄河九曲藝文類聚物理論曰河色黄赤衆川之流葢濁之也百里一小曲千里一大曲九曲以達於海泰華三峰見謝河東公啟陽集作潼是亭之右後漢楊震傳改塟於華隂潼亭注墓在潼闗西大道之北其碑尚存隂晉之東漢地理志京兆尹華隂縣故隂晉秦惠文王五年更名寜秦高帝八年更名華隂太華山在南泱漭佳氣謝朓詩晨光復泱漭肹蠁孤風司馬相如賦肹蠁布寫注盛作也生民之秀惟子之宗既愳四知亦畏三惑後漢楊震傳王宻夜懐金十斤以遺震曰暮夜無知者震曰天知地知子知我知震子秉常曰吾有三不惑酒色財也昔佐赤符後漢光武紀同舍生彊華奉赤伏符至曰劉秀發兵捕不道實毗皇極詩天子是毗書洪範曰五皇極坦蕩王道昭宣帝則楊修箋逺近觀者徒謂能宣昭懿徳詩不識不知順帝之則丹青不朽琬琰是刻並見啟狀日昇東詩如日之升侔辰在北子之伯仲不忝前人粉飾賢路吳周瑜傳諸葛瑾步騭連名上疏曰故將軍周瑜子𦙍昔䝉粉飾受封為將抑揚薦紳雲間日下國華席珍排龍掩陸突鶴摧荀並見前卓爾風標漢景十三王傳夫惟大雅卓爾不羣沈約碑風標秀舉朗然流品王儉碑外康流品妍若春輝烈如冬凛見為河東公啟燕石知媿齊竽自審見為張周封啟咸指路以光銷論衡火滅光銷而獨在盡登門而聲寢見為舉人啟難售者價重難知者聲清披沙揀金白帖披沙揀金往往見寶由是不愧鳥散花落謝朓詩鳥散餘花落於今有情劉儒十行後漢劉儒傳儒字叔林桓帝博求直言儒上封事十條辭甚忠切孫𢎞三道漢公孫𢎞傳元光五年復徵賢良文學菑川國復推上𢎞太常奏𢎞第居下䇿奏天子擢𢎞對為第一直路猶弦後漢五行志順帝末京都童謡曰直如弦死道邉蠧政如埽史記韓非子作五蠧索隐曰五蠧蠧政之事有五也禮記埽而更之筆海驚波詞園鞠草新書藝文志王義方筆海十巻張仲素詞圃十巻詩踧踧周道鞠為茂草文場不寫於中心冊苑空留於秘寶見代李𤣥文晉千里國晉劉頌傳疏曰古者封國大者不過土方百里今雖一國周環近將千里漢第一功漢書蕭何傳君位為相國功第一建幢油碧晉輿服志青油幢諸王三公有勲徳者特加之啟幕蓮紅見為同州啟賓高主擇左傳周諺有之曰山有木工則度之賓有禮主則擇之韻合人同袁宏三國名臣叙贊景山恢誕韻與道合固不能加減陳掾未詳按典畧魏太祖嘗使阮瑀作書與韓遂時太祖適近出瑀墮從因於馬上具草書成呈之太祖擥筆欲有所定而竟不能損増非陳琳事也此恐是一時之誤亦可以喜怒桓公衣繡含香省蘭臺柏赤管朝操青縑夜襞並見前佐計相則生聚有經漢書張蒼居相府主郡國上計者號計相左傳伍員曰越十年生聚十年教訓贊地官而集作則孤終協籍見為賀拔員外啟于惟荔浦新書地理志桂州始安郡領荔浦縣言念金昆謂其兄汝士詩言念君子南史王銓傳玉友金昆毁冠裂集作褫是帶後漢逸民傳漢室中㣲士皆毁冠裂冕去之雪泣星奔庾信詩雪泣悲去魯呉志陸杭傳疏曰星奔電邁俄然行至箋舊書魯士兄汝士字慕巢元和四年進士擢第又登博學宏辭科累辟使府長慶元年為右補闕坐弟殷士貢舉覆落貶關江令入為户部員外再遷職方郎中太和三年以本官知制誥九年為户部侍郎位至吏部尚書卒新書冨州開江郡龍平縣武徳四年析置博勞歸化安樂開江四縣尋以蒼梧豪静開江𨽻梧州宅裏之荆枝半謝見為汝南公表嶺頭之梅萼空繁白帖大庾嶺上梅南枝落北枝開陟岡望兄詞客之情何極詩陟彼岡兮贍望兄兮歸縣見姊騷人之恨猶存水經注江水東過秭歸南袁崧曰屈原有賢姊聞原放逐亦來歸喻令自寛全鄉人冀其見從因名曰姊歸即離騷所謂女嬃嬋媛以詈余也漢地理志南郡有种歸縣注孟康曰种音姊乃擢戎曹遂荒京令將換清切見為李貽孫啟以扶明聖不知者夀史記蔡澤曰富貴吾所自有所不知者夀也難言者命見論語未謁季良集作梁之醫見為賀拔員外啟已革曹參之病曹當作曽禮記曽子寢疾病曽元曰夫子之病革矣革紀力反詳見祭韓氏姑丈嗚呼平生世路廣絶交論世路嶮巇一至於此繾綣交期左傳繾綣從公孫金盧米並見前百賦千詩漢藝文志枚皋賦百二十篇杜甫贈李白詩敏捷詩千首桂林崑嶠一片一枝見謝宗卿啟終以浮沉漢袁盎傳盎病免家居與閭里浮湛相隨行師古曰湛讀曰沉因兼險夷盧諶贈劉琨詩序委身之日夷險以之銑曰夷平也對皋壤之揺落成老大之傷悲見為張周封啟尚冀他年或陶良夜見為同州啟酒筵琴席燈闈月榭稽康絶交書時與親舊叙闊陳説平生濁酒一杯彈琴一曲志願畢矣謝莊月賦去燭房即月殿芳酒登鳴琴薦庾信哀江南賦月榭風臺池平樹古俱開怨一作愁别之襟並息分岐之駕並見前短景未果集作短願來果非見為裴懿文良辰不借左思詩逍遥撰良辰竟鬱結于深衷顔延之五君詠深衷自此見倐淹淪于大化况南康解榻見為崔從事啟早降清光會稽繼組漢書嚴助會稽吳人上問所欲對曰願為會稽太守於是拜為太守朱買臣字翁子吳人也會邑子嚴助貴幸薦買臣上拜會稽太守上謂買臣曰冨貴不歸故鄉如衣繡夜行今子何如買臣衣故衣懐其印綬步歸郡邸昨辱餘芳晉儒林傳論曰餘芳遺烈煥乎可紀情集作積分逾極銜哀更長晉王敦傳詔曰銜哀從役朕甚愍之三十年之間難追往事五千里之外正恨殊鄉地闊山深川寒樹古杳杳𤣥夜見代彭陽公表荒荒集作茫茫宿莽離騷夕檻中洲之宿莽生金認石王隐晉書永嘉初陳國項縣賈逵石碑之中生金人鑿取賣賣已復生此江東之瑞埋玉恨土見代李𤣥文寄奠緘辭呼風泣雨後漢方術傳趙炳長嘯呼風亂流而濟曹植誄延首歎息雨泣交頤噫嘻噫嘻詩噫嘻成王宗尹之魂來告祭張書記文維會昌元年歲次辛酉四月辛丑朔二十日庚申隴西公滎陽鄭某隴西李某安定張某昌黎韓某樊南李某謹以清酌之奠敬祭於故朔方書記張五審禮之靈嗚呼古有不重千金古樂府不惜黄金散盡只畏白日蹉跎殊輕尺璧帝王世紀禹不重徑尺之璧而愛日之寸隂或號百夫之防詩維此仲行百夫之防或作萬人之敵蜀張飛傳魏謀臣程昱等咸稱羽飛萬人之敵也雖爭雄角秀殊塗異跡念閲水于千齡陸機歎逝賦川閲水以成川水滔滔而日度世閱人而為世人冉冉而行暮若衝飇之一息陳琳武軍賦若衝風之飛秋葉吁嗟審禮寕或免之瞭眸巨鼻論衡孟子相人以眸子焉心清則眸子瞭瞭者目文瞭也漢陳遵傳長頭大鼻方口疎髭御覽引瀨鄉記李母碑曰老子方口説文髭口上鬚也始自渚宫見祭吕商州文來㳺帝里漢高帝紀高祖沛豐邑中陽里人也陸倕石闕銘或以光從帝里論邀懸河晉書王衍曰郭象清言如懸河久而不竭文酬散綺陸機詩高談一何綺謝朓詩餘霞散成綺體物稱最登高擅美見為李貽孫啟良時不來李陵詩良時不再至躁進何一作為耻門巷蓬蒿見為同州啟荒凉如此孔稚珪北山移文石逕荒凉徒延佇藩溷筆硯臧榮緒晉書左思欲作三都賦構思十稔門庭藩溷皆著紙筆遇得一句即疏之寂寥而巳梁多文士漢有賢王見為張周封啟猶市駿骨戰國䇿涓人為君求千里馬馬巳死買其骨五百金肻驚夜光鄒陽書明月之珠夜光之璧以暗投人於道路衆莫不按劍相盼者長𥚑既曳見為山南啟健筆誰當徐陵讓表雖復陳琳健筆未盡愚懐職高蓮幕官帯芸香青袍如草白簡如霜東閣朝煖西園夜凉並見前震豈殺公晉書魏舒為司徒周震累為諸府辟書下公輒䘮號震為殺公掾莫有辟者舒辟之無患諶惟故吏盧諶贈劉琨詩序故吏從事中郎盧諶死罪死罪渭濱迴流馬之運蜀諸葛亮傳亮悉大臮由斜谷出以流馬運與司馬宣王對於渭南峴首奉辭曹之諱禮記太史典禮執簡記奉諱惡晉羊祜傳祜死人為諱名改戸曹為辭曹松筠不改琴尊有寄三徑方營並見前一畆乏地禮記儒有一畆之宫環堵之室文多為冨無事當貴戰國策顔斶辭去曰無罪以當貴亦解客嘲還答賓戲並見前迴翔逸軌晉王沈等傳論曰齊逸軌而長騖傲睨重霄江淹擬郭璞詩傲晲採木芝將期晩節更峻清標懸蛇結釁風俗通應彬為汲令賜主簿杜宣酒壁上懸弩照于杯影如蛇晉樂廣傳廣為河南尹嘗有親客久濶不復來廣問其故答曰前在坐䝉賜酒方欲飲見杯中有蛇意甚惡之既飲而疾於時河南聼事壁上有角漆畫作蛇廣意杯中蛇即角影也復置酒於前處謂客曰酒中復有所見不答曰所見如初廣乃告其所以豁然意解沈疴頓愈鬭蟻成妖見為裵懿文廻生乏祖洲之草十洲記祖洲在東海中地方五百里上有不死草生瓊田中人巳死者以草覆之皆活續斷無弱水之膠十洲記仙家煮鳯喙麟角作膠名為續弦膠能連属弓弩斷絃漢西域傳安息長老傳聞條支有弱水西王母亦未嘗見師古曰𤣥中記云昆崙之弱水鴻毛不能起也仙傳拾遺武帝幸華林苑射虎兕弩絃斷以靈膠續之武士數人對引不脱陳尸重來而何望古詩下有陳死人杳杳即長暮裴啟語林張湛好於齋前種松樹養鴝鵒時人謂張屋下陳尸楚魂一散而難招宋玉招魂序招魂者宋玉之所作也宋玉憐哀屈原忠而斥棄愁懣山澤魂魄放佚厥命將落故作招魂嗚呼神道甚㣲天理難究桂蠧蘭敗漢南越王傳獻桂蠧一器師古曰此蟲食桂故味辛而漬之以宻食之也文子藂蘭欲發秋風敗之龜年鶴夀郭璞遊仙傳借問蜉蝣輩寜知龜鶴年善曰養生要論曰龜鶴夀有千百之數道家之言鶴曲頸而息龜潛匿而噎此其所以為夀也在長短而且然左傳邾子曰命在養民死之長短時也于妍醜而何有世説補范蔚宗在獄詩云好醜共一丘何足異枉直某等早承餘眷晩獲聨姻梁劉峻傳自此聨姻帝室或感極外家漢丙吉傳遺詔所養武帝曽孫名病已在掖庭外家者延自出之念見為韓同年啟或恩深猶子禮記兄弟之子猶子也多引進之仁後漢延篤傳欲令引進之或敬屬丈人之行漢匈奴傳鞮侯單于自言漢天子我丈人行師古曰丈人尊老之稱行音胡浪反或情兼内妹之親晉宣五王傳澹妻郭氏賈后内妹也有美吾姨左傳息媯將歸過蔡蔡侯曰吾姨也止而見之靈慶攸屬後漢光武紀賛曰靈慶既啟尊公則師長庶僚晉陳夀傳丁儀丁廙有盛名於魏夀謂其子曰可覔千斛米見與當為尊公作佳傳夫人則儀刑六族禮記天子之妃曰后諸侯曰夫人門高再世之侯家享萬鍾之祿並見表經過欵狎阮藉詠懐詩趙李相經過南史阮顗傳與鄧琬欵狎出入遊陪映人玉潤世論衞叔寳是樂彦輔壻裵叔道常稱之曰婦翁氷清女壻玉潤覆水蓮開梁簡文帝採蓮賦卧蓮葉而覆水亂高房而出藂春歸别墅月滿高臺嵇山傾倒世説嵇康風姿特秀山公曰嵇叔夜之為人也其醉也傀俄若玉山之將頽謝雪徘徊宋符瑞志大明五年正月戊午元日花雪降殿庭時右衞將軍謝莊下殿雪集衣白上以為瑞於是公卿俱作花雪詩惜景而持繩欲繫李尤詩安得長繩繫白日邀歡而秉燭相催古詩晝短苦夜長何不秉燭遊中歎乖離今冬至止仲叔辭辟而方返後漢書太原閔仲叔徵博士不至客居安邑老病家貧日買猪肝一片安邑令敕吏常給仲叔曰豈可以口腹累安邑遂去梅福罷官而未幾見為濮陽公狀一則歸從回雁之峯方輿勝覽衡陽有回雁峯至此不南去在今衡州城南一則至自跕鳶之水見為濮陽公文方將為笛裁竹張騭文士傳蔡邕告吳人曰吾昔嘗經會稽高遷亭見屋椽竹東間可以為笛取而用之果有異聲緣箏斬梓曹植與吳質書伐雲夢之竹以為笛斬泗濱之梓以為箏驅羿射鴻疑作烏淮南子堯時十日並出草木焦枯堯命羿仰射十日中其九烏皆死墮羽翼招任釣鯉見為舉人啟按羿無射鴻事盖此只取其善射如任公子之釣亦未嘗有釣鯉事也豁契闊于屯夷傅亮表臣契闊屯夷旋觀終始極平生之宴喜詩魯侯燕喜潘岳西征賦陸賈之優游宴喜良覿雖屢杜甫詩逍遥展良覿深懐未從三靈莫效見為成魏州表一夢俄終露先寒而隕葉漏未盡而聞鐘見代僕射表今則列樹開封易葬之中野不封不樹揲蓍得吉絳旐前引見祭裵氏文桐棺後出墨子禹葬㑹稽衣裘三領桐棺三寸隐轔原野見為絳郡公文凄凉雲日一作月誤謝靈運詩雲日相輝映將歸宿莽之庭欲閉青松之室並見前殷勤舊一作賢偶冀望諸孤左傳公曰以是藐諸孤辱在大夫未歸下國左傳狐突適下國注下國曲沃新城吳語天若不知有皋則何以使下國勝注下國吳自謂也且寓皇都江逺惟哭天高但呼史記屈原傳勞苦倦極未嘗不呼天也必有餘慶見為先輩啟非無後圖左傳鬭伯比曰以為後圖嗚呼哀哉壺有芳醪俎多肥羜詩既有肥羜以速諸父叫噪不聞精靈何處鬱憤徒極含辭莫叙冀有鑒於酸嘶庶無乖於酣飫詩飲酒之飫杜預左傳注飫厭也李義山文集箋註巻六
