  - {type: variant, offset: 0, length: 311, content: 欽定四庫全書李義山文集箋註巻七監察御史徐樹穀箋山東提學僉事徐炯註祭文下祭處士房叔父文詳祭裴氏姊文房字上應有十二二字某爰在童䝉易匪我求童䝉最承教誘違訣雖久音㫖長存晉中興書東海王越敕子毘曰諷味遺言不如親承音㫖近者以檀山舊塋忽罹風水水經注索水出京縣西南嵩渚山北流逕京縣故城西城北有壇山岡按京縣故城在今河南開封府滎陽縣東南二十里壇山即檀山其山四絶孤峙山上有塢聚俗謂之檀山聚新書劉禹錫傳葬滎陽檀山原山今在縣西有劉禹錫墓也義山懐州河内人距滎陽二百里而近故先塋在焉郭璞葬經内篇氣乘風則散界水則止古人聚之使不散行之使有止故謂之風水夀堂圯壞陸機挽歌夀堂延鬼魅注夀堂祭祀處冡樹凋傾雖崩則不修聞諸前哲一作聖禮記孔子既得合葬於防孔子先反門人後雨甚, SBCK: ''}
