  - {type: variant, offset: 10660, length: 0, content: '', SBCK: 城之得價望千尋而可攀大年不登逸􅁕方駛松欲秀而先蠧玉􅀅攻而遽毁聞問之時歎悼何巳惟我承乏授命南征一言相許携手同行夐􅅸萬里飄洎雙旌念兩婢之價倍媿五羖之酬􅁿地接殊隣風移中土五嶺三江炎飈瘴雨釣犀之潭站鳶之渚席上従容幕中讌語先防載薏之謗更視投香之􅀁因使庸虗不罹罪􅅈越井之首甘綏之女時清則銅鏑納厨􅀊稔則銀簮扣鼓豈我之自唯子是與相􅀙来覲又徃于泾風埃古戌霜雪􅀌亭偏裻音督國語申生衣偏裻之衣之服縵胡之纓塞逈而晨嚴刁斗沙平而夜警兜零指我以虜隙勉我以武􅀴正慰窮􅁁儀還京邑北庭减價南轅屑泣章臺辟􅁺方喜趙嘉之来􅁄署選丞仍見譙􅀇之入是焉踐厯更徯飛翻况乎鳯沼又栖鴒原何釁生于燥􅊜而慮結于寒暄未及西山之薬旋為東岳之魂憶昨􅃇許員歸青門出餞樂作而歎起杯行而泪泫俱容与于風波共沉吟于風箭揮􅃑如昨郵書甚頻雖遥道里未濶聲塵孰謂念歸之日翻為有慟之晨嗚呼哀㢤彷彿􅂽阡依稀古陌徐動丹旐永歸􅀇宅願執拂而身逺想移舟而目極逈野秋思群山暮色恨白髪之衰翁􅂘青雲之舊客􅂓兹􅀉奠莫寫西悲巳乎崔子為我歆之爲裴懿無私􅀕薛􅀰中衮文伏惟􅂕佐啇宣業朝薛􅀓規門峥層構堂嶪崇基玉生藍岫芝産銅池梧髙駐鳯蓮馥停龜有美令人載稱清卲訓在詩禮楽唯名教王謝標格曺劉才調清如濯􅀬之風明若觀朝之燎􅂕臺委鍳虗室融和秋水望濶春􅄗上多鄊塾掉鞅文林勵戈硯横河漢􅁓落烟波澤宫貍首􅁄埸楊葉箭去星慚􅃓廽月怯兩書上第五辟名公馬卿賦雪陳琳愈風平臺竹􅁐淮王桂叢营分細栁幕染芙容顕備􅄗僚荣崇顯秩冠峩鉄劲衣眀綉宻霜下端簡風生落筆庭夜烏囬天秋隼疾帝念允聀任于諫垣依違絶想􅀙容敢言攀檻而空㽞跡在削稿而不見書存女史䕶衣大官供食伏奏多可分曺著績帳煖錦麗闈明粉白既題柱以如田亦償金而􅀋直漢荣出牧晋議州兵亷袴歌送劉錢贈行濟南之誅巨猾􅀭州之試諸生虎去江静珠来岸明神豈好謙天寕秩禮蠧華國之名品丧士林之模楷使爲善者奪氣求仁者觧體已不駐于郷雲竟何窺于伏濟長洲􅀣古茂􅁐山春橘稅既集茶征是親鷁渡霅而去逺鵠下亭而唳頻翟虜氛興􅇻楹夢􅁸帳入飛鵩床驚閗螘鄭玄知数阮瞻無􅀑終自膏肓􅀓于骨髓嗚呼哀㢤丹霄萬里建木千尋坦坦清路童童翠隂三襲臺迥九重禁􅀷中懸旒扆下集雲簮無非東箭盡是南金或扶傾作棟或望旱為霖顕􅁢明公宜􅈾百福夜暗神昧天長景促青女變霜羲和納旭悄隋掌以銷璣悵周閑之丧騄永惟清族夲富才人有弟則陸無兄不荀原鴒奕奕沼鴈馴馴珩竒動椘璧貴傾秦永矣彼蒼胡然人事但續椿夀徒髙寉位摧壓光價淹淪聲味頴不濁而殄灌宗淮未􅅸而傾王氏某因承中外􅀗奉恩知通孔李道徳之􅃇兼劉盧姻戚之私鑄顔有契全趙為期静龍門之風水剷羊膓之嶮巇空欲銘恩何詶􅀣徳庇􅀌根于髙援許嘉姻于弱植􅀅􅂬宋子俄放湘南綬黄楚徼髩白昭潭歸止未卜弃予是甘許靖之悲方極王粲之憂不堪猶辱重言􅀅敦故約玉無改行金不如諾朂大義于幽沈軫遐心于飄泊使者尚在凶書已来㕍􅁕􅆰逺魚腸不廽淚和峡雨哭振巴雷孰澆枯鮒誰􅅡寒􅁅今則言去邯江當移澧浦稍脱疑䋄猶罹罪􅅈念申慟以無期豈沉􅁈之可吐嗚呼哀㢤執紼路阻佳城望賖􅇒空乏翼上漢無槎或期他日或反中華認楊公之石馬撫周苞之辟邪况良冶規存遺􅀴業在􅆇孫有後魏萬必大敢期陋質終托餘光韋平之紹續無望秦晋之婚姻豈忘絮酒無㡬生芻是􅀅詞多失次涕􅂾無行兾桂旌之不逺䧏蘭佩之餘芳嗚呼哀㢤尚饗􅀕吕商州文惟􅂕族光釣渭慶顕歌齊竹分東箭玉奪南圭逶迤霄路睥睨雲梯淺牙洞䑕短刃分犀古聖堂奥前賢町畦湔腸効薬刮目㽞箆弹琴而放臣見釋賣賦而妒后還閨既歩京國亦荐郷里與田蘇㳺有太叔羙鄴都才運洛陽年齒何晏神仙張良女子禮闈之善譽也如彼冊府之􅀓名兮若此嚢成内殿之帷書貴皇都之􅁓中臺南省諫署戎藩才難價重政舉人存蓮池易曉蘭圃多暄涵波獨躍弄景􅀌翻王粲楼中嘗􅀴暇日楊雄宅􅂻㡬弔遺魂参差遘閔萋菲成􅁈漢庭毁􅁩楚國䜛原建禮門内明光殿外直金既肆以猜疑魏􅀍竟従于沙汰䝉犯霜露支離埃􅝙厲山遥欎乎朝嵐溠水旁奔其素瀬猶懐毒艸􅂈農井以低窺尚憶神珠向隋臺而獨酹渚宫貳尹相府中􅀰􅀅伸蠖屈欲􅂧鴛行朱轓意􅂔皁盖輝光訓説則馬季長之居南郡風流則􅇻仲文之守東陽劉􅃂一錢鄧攸五鼓遂􅄙郡符来登書府儒林文囿瑶山瓊圃鉛槧朝閲芸籖夜􅂾爪當鄭灼之心錐在蘇秦之股是従佐理于彼東周雷喧洛􅂀電掣嵩丘玉泉嘉月金谷清秋陳思王之羅襪郭有道之仙舟不無賦永􅂓以優㳺漢入嶢関晋分隂地藉賢太守之政有古諸侯之貴載掦筆陣復清劍􅂔長卿痟渴士安風痺逝川㡬歎于不廽朝露俄聞于溘至嗚呼昔也風塵投分平生少年雕籠競巧􅀝馬争妍開􅁭隋岸促膝伊川月中乃共誇科桂池􅂻亦相驚幕蓮劉樗屡擲畢甕多眠終以世務紛綸物情推斥撫事傷年减歡加戚路泣楊子􅁝悲墨翟縦風至而音来竟月同而地隔逮予廉部及子頒條革尊㫖酒綺席嘉肴各懸章綬俱失簟瓢雖論金而契在終照玉而顔凋子牟之思魏闕望之之憶漢朝誠知舌在不覺魂銷書断三湘哀聞五嶺天涯地末髙秋落景重叠憂端縦横淚綆漏虬夜促隙駒朝騁怨􅇨繪之亡雕惜陽春之亂郢言念令季託余属城鴒原㕍序昔日歡忻蠻圻瘴嶠今日􅂘聲愍支體遽亡于手足况兄弟不如其友生嗚呼厚夜依臺窮泉訪路已已金骨嗟嗟玉􅀣莫和哀挽􅆰陳薄具銜萬里之遐城托千辭之􅀉喻異時松楸枯朽羊虎傾頽草􅀫苔厚門平闕摧尚期越礼用寫餘哀􅂕今不昧倘或来㢤奠相公令狐公文戊午􅀊丁未朔乙亥晦弟子玉溪李啇􅀮叩頭􅂘奠故相國贈司空彭陽公嗚呼昔夢飛塵􅀙公車輪今夢山阿送公哀歌古有􅀙死今無奈何天平之年大刀長㦸􅀅軍撙旁一人衣白十年忽然蜩宣甲化人譽公憐人賛公罵公髙如天愚卑如地脱蟺如蛇如氣之易愚調京下公病梁山􅅸崖飛梁山行一千草奏天子鎸詞墓門臨􅅸丁寕託尔而存公此去邪禁不時歸凤栖原上新􅃇衮衣先人亦司􅆰有泉者路有夜者臺昔之去者冝其在㢤聖有夫子廉有伯夷浮魂沉魄公其与之故山峩峩玉溪在中即玉泉在河南濟源縣東送公而歸一世蒿蓬嗚呼􅀕長安楊􅀰中文年月日謹以云云之奠􅀕于宗尹􅀰中之􅂕昔荘南華之言物故則曰若巨室之偃歸人陶貞白之語玄機則曰雖頑仙不如才􅄦邈以髙論皭然深㫖有感斯文属在之子黄河九曲㤗華三峯陽亭之右隂晋之東泱漭佳􅂔肸蠁􅀌風生民之秀惟子之宗既慎四知亦畏三惑昔佐赤符寔毗皇極坦蕩皇道昭宣帝則丹青不朽琬琰是刻状日昇東侔辰在北子之伯仲不忝前人粉飾賢路抑掦搢紳雲間日下國華席珍排龍掩陸突寉摧荀卓尔風標朗然流品妍若春輝烈若冬凛燕石知愧齊竽自審咸指路以光銷盡登門而聲寝難售者價重難知者聲清披沙揀金由是不愧鳥散花落于今有情劉儒十行孫弘三道直路猶絃蠧政如埽筆海驚波詞園鞠草文塲不冩于中心丹􅁐空留于秘寳晋千里國漢第一功建幢油碧啟幕蓮紅賔髙主擇韻合人同固不􅀎加减陳椽亦可以喜怒桓公衣繡含香省蘭臺柏赤管朝操青縑夜襞佐計相則生聚有􅀴賛地官而􅀌終叶籍于惟荔浦言念金昆毁冠裂帯雪泣星奔宅􅂻之荆枝半謝嶺頭之梅蕚空繁陟岡望兄詩客之情何極歸縣見妹騷人之恨猶存乃擢戎曺遂􅂽京令􅀅換清切以扶明聖不知者夀難言者命未謁季良之醫巳革曺参之病嗚呼平生世路繾綣交期孫金盧米百賦千詩桂林崑嶠一片一枝終以浮沉因兼險夷對臯壌而揺落成老大之傷悲尚兾他年或陶良夜酒筵琴席燈闈月榭俱開怨别之􅁭並息分􅄮之駕短景未果良辰不借竟欎結于深􅂨倐淹淪于大化况南康觧榻早䧏清光㑹稽継祖昨辱餘芳積分逾極銜哀更長三十年之間難追徃事五千里之外正恨殊郷地濶山􅀷川寒􅀣古杳杳􅀇夜􅂽荒􅀫莾生金認石埋玉恨土􅀉奠緘詞呼風泣雨噫嘻嘻嘻宗尹之魂来否􅀕張書記文維㑹昌元年􅀊次辛酉四月辛丑朔二十日庚申隴西某荥陽鄭某隴西李某安定張某昌􅀺韓某樊南李某謹以清酌之奠敬􅀕于故朔方書記張五審禮之􅂕嗚呼古有不重千金殊􅁿尺璧或號百夫之防或作萬人之敵雖争雄角秀殊􅂗異迹念閲水于千齡若衝飈之一息吁嗟審禮寜或免之瞭眸巨鼻方口踈髭始自渚宫来㳺帝里論激懸河文詶散綺體物􅁛最登髙擅美良時不來􅏥進為恥門巷蓬蒿􅂽凉如此藩溷筆硯􅄫􅋁而巳梁多文士漢有賢王猶俟駿骨肻驚夜光長􅅂既曵健筆誰當職髙蓮幕官帯芸香青􅂁若艸白簡如霜東閣朝暖西園夜凉震豈殺公堪唯故吏渭濵為流馬之運峴首奉司曺一作詞之諱松筠不改琴尊有􅀉三徑方营一畆乏地多文為富無事當貴亦觧客嘲還荅賔􅃧廽翔􅇣􅁤傲睨重霄􅀅期晚莭更峻清標懸蛇結釁闘蟻成妖廽生乏祖洲之草續断無弱水之膠陳尸重来而何望椘魂一散而難招嗚呼神道甚㣲天理難究桂蠧蘭敗龜年鶴夀在長短而且然于妍醜而何有某等早承餘眷晚􅀗聫姻或感極外家延自出之念或恩深猶子多引進之仁或敬属丈人之行或情兼内妺之親有美吾姨慶􅂕攸属尊公則師長衆僚夫人則儀刑六族門髙再世之􅀱家享萬鍾之禄􅀴過欵狎出入㳺陪映人玉潤覆水蓮開春歸别墅月滿髙臺嵇山傾倒謝雪徘􅆦惜景而持䋲欲繫邀􅂬而秉燭相催中歎乖離今多至止仲叔辞辟而方返梅福罷官而未㡬一則歸􅀙廽㕍之峯一則至自站鳶之水方􅀅爲􅅇裁竹縁筝斬梓駈羿射鴻招任釣鯉豁契濶于屯夷極平生之燕喜良覿雖屡􅀷懐未􅀙三􅂕未効一夢俄終露先寒而殞葉漏未盡而聞鐘今則列􅀣開封揲􅆱淂吉綘旐前引桐棺後出隐軫原野凄凉雲日􅀅歸􅀫莽之庭欲閉青松之室􅇻勤􅃇偶兾望諸姑未歸下國且寓皇都江逺惟哭天髙但呼必有餘慶非無後圖嗚呼哀㢤壷有芳醑爼多肥羜呌噪不聞精􅂕何䖏鬱憤徒極含辭莫叙兾有鍳于酸嘶庶無乖于酣飫􅀕䖏士房叔父文某爰在童䝉最承教誘違訣雖乆音㫖長存近者以壇山􅃇塋忽罹風水夀堂圯壊宰􅀣凋傾雖崩則不修聞知前哲但墮而㒺治那俟他人况真徳貽芳鴻儒著羙豈可令趙岐之表墊彼玄扃郭㤗之碑淪于夜壑載惟瑊瑣藐尔􅀌冲誠呌號之不停顧营辦之無素某䓁輙考諸蓍筮别立丘封使義􅅱以令日吉時奉移神寝奢無僣縟儉免虧踈是期永閉尊􅂕長安幽穸眠牛有慶自及于諸􅀌白馬垂祥豈祈于猶子追懐莫及感切徒深更思平昔之時兼預生徒之列陸公賜杖念荣益以何成􅇻氏著文愧献酬而早屈引進之恩方極祸凶之感俄鍾誰言一紀之餘又奉􅂯遷之兆哀􅀷永徃情極􅀄聞矧宗緒衰㣲簮纓殆歇五服之内一身有官􅀅使澤底名家翻同单系山東􅃇族不及寒門静思肻搆之文敢怠成書之託瑊等既幽明無累年志漸成則當授以詩書諭以婚宦使蒸嘗有奉名教無虧􅂕其鍳此㣲誠􅂇夫志願敢以求于必大庶免歎于忽諸迫以哀􅁨兼之瘵恙曽非遐逺不􅀗躬親􅅹血裁詞叩心寫懇長風吹浪敢忘昔日之規南巷齊名永􅅸今生之望兾因薄奠少䧏明輝延慕酸傷不􅀎堪䖏苦痛至􅀷永痛至深為鄭従事妻李氏􅀕􅀙父文有羙吾門實系公族綘霄結䕃皇極流輝自嚴君以交辟延荣仲父以立朝衍慶叔父雖禮踈五服而義叶一家馬援于児姪之間一情無異王華在兄弟之列数􅀙猶親吉人詞寡君子無争属者以獻賦不遇投筆􅀙知鏡水嵇山􅂓屈􅀚書之望甬東浙右始開􅀓劍之名􅀴途㡬千去國􅂾􅀊爰因聀貢来奉闕庭􅀓車方馳朝露溘至祸生朽索釁起􅀭鞭始驚香而不禁俄折臂而無望嗚呼存亡恒理修夭長期􅀁悲者方次中途所痛者非因美疹税鞍告痛肩輿數晨既針艾之莫徴果含禭而斯及况乎合室逺在海涯一女方笄二子非丱人生甚痛天道奚言今以家國載遥干戈未息尚羈歸祔乃議􅀙权㝎鼎城東永通門外南瞻嵩嶺北望邙山式崇寓殯之封且作蔵神之室必也􅂟延異日時属通年光温序之思歸俟􅆇孫之有後二十一姪女早䝉􅄌撫乆歎違離今又􅀙夫山東食貧洛水􅀅療無及驚悲有加敢因􅀕酹之馨􅂓兾精􅂕之降嗚呼叔父永鍳早誠􅀕韓氏老姑文猗歟吾家世奉玄徳譲弟受封勤王賜國名芳􅃔鼎勛盈史冊季孟國髙秦晋栾卻恭惟柔範載禀淵塞既作女師乃為嬪則潁水波清梁園月明言旋百两且拜雙旌計侯令弟配國名卿入􅀙述職出輔専征螽斯不妒鳯凰和鳴此時同慶東郡分榮使者責梁公子専魏帝念元昆人思仲氏杖節赴敵斬芻盡瘁無以家為或􅀙王事禮優内子詩美夫人冕紘瑱紞山蕨澗萍子元罕見兾缺如賔緑衣有感翟茀仍新遽歎夜川遄聞晝􅂘原阡􅃇署孟隣斯卜閑居獻夀作賦之官􅃓裘望襲菽水承􅂬福善餘基好謙􅃇祉􅂧自良人集于之子爰􅀙上蔡去臨易水空報登壇未聞曵􅂂晁父先歸莫之能比趙母上言盖不淂巳寒暄結恙燥温為疵徒虗百禄靡効三醫嗚呼夀夭所賦彭殤不移誰􅀎了悟孰不􅁨悲何兹逹識乃克先知同易簀以就政如買棺而指期茍有所累安􅀎及斯道逺轘轅程遥河洛建兆臨途移舟就壑日􅆭林嶺風悽灌薄積靄茫茫行烟漠漠某䓁誠深通舊情恊光親始自童子至于成人年􅀅二紀恩冠六親念升堂之如昨痛幽夜之無晨歌停行路㫪輟比隣雖寓詞之有所終含酸而莫伸壷清愧酹爼薄羞芹唯餘彤管有美清塵嗚呼哀哉尚饗為李􅀰中􅀕舅竇端文始虞命夏􅁀于玄穹功垂刋木徳叶堙洪洎帝相之難作誕少康之竇中由貞􅀗吉因生受封䧏及後代􅀓勛継庸西京則嬰居外戚東漢則融居上公愍陽城之不享始移籍于扶風源逺更清基髙自峻有焯明􅂕藹然休問陋巷不憂坦途方進月逺標儀霞高映論玉寕韞匱錐要䖏嚢冝伸尚屈􅀅集而翔潜師大易謙尊以光誓安老氏債少易償爰紆銅墨是宰濠梁宓琹時奏潘􅀣逾芳入賛朝儀言掦事舉圭璧蠻夷弁冕文武吐詞含韻知今博古進揖退掦􅀙規合矩􅂧陶啟位殿省承荣孔門之束帯無忝漢宫之綿蕝難更君子信讒小人道長未暇閉関難期税鞅暫時符竹逺出羅􅃠誰識卑飛因成利徃銅梁改秩錦里􅀴時人去而琴臺壊棟文移而石室摧基劉􅊼之重銘􅁑庙王啇之更立嚴祠隴首云歸端溪遽逐角豈觸藩臋終困木海濶天盡山深霧毒許靖他郷有名無禄馬超正色冝歌反哭何為善之無慿而䧏灾之甚速某欽惟教義夙􅀁因依在昔家世勤王寔􅇻高旌大斾結駟飛輪􅂟豈移于自出荣寔垂于外姻一紀已来艱凶遄及嗟宅相以無取惧堂構之不集詎言渭水之乖离竟􅅸西州之出入嗚呼哀㢤違京背闕古陌􅂽阡松門積靄隴首停烟祖􅒉是日乞墅何年淚有血而背堕憤無􅈾而可填况玕剖郡符璟持使莭塞逺城逈河窮路􅅸顧後瞻前形􅀌影孑長號出次重拜臨穴酒濃清醴肴羞羅列庶有鍳于斯文兾不同于虗設嗚呼哀㢤尚享重􅀕外舅司徒公文嗚呼哀哉人之生也變而徃􅁘人之逝也變之来耶冥􅑡之間杳惚之内虗變而有氣氣變而有形形變而有生今􅀅還生于形歸形于􅂔漠然其不識浩然其無端則雖有憂喜悲􅂬而亦勿􅀎措于其間矣茍或以變而之有变而之無若朝昏之相交若春夏之相易則四時見代尚動于情豈百生莫追遂可無恨倘或去此亦孰貴于最􅂕㢤嗚呼公之世冑勛華聀官掦歷並已託于􅀉奠僃在前文今􅀁以重具酒牢載形翰墨盖意有所未盡痛有􅀁難􅁯以公之平生恩知􅇮昔顧盻属纊之夕不淂聞啟手之言祖庭之時不得在執紼之列終哀且痛其可道邪嗚呼七十之年人誰不及三公之位人誰不登何数月之間不及􅀙心之􅀊聞天有慟方登論道之司時泰命屯才長運否為善何益彼蒼難知昔澤姙既明吉敖釋桓公之痛隂徳未報夏侯知邴吉不亡何昔有其􅀓今無其證豈人言之不當􅀅天道之或欺雖北海懸㝎薨期長沙前覺灾至偃如巨室去若歸人䖏順不憂得正則喜作公之徳斯盛在物之痛何言况乎再軫慮居屡垂理命蕳子􅀅􅀾之誓唯止桐棺晏嬰送死之文寕思石槨素車樸馬踈巾􅁦帷成一代之清規掦百古之休問􅀁謂有始有卒髙朙令終嗚呼徃在泾川始受殊遇綢繆之迹豈無他人尊空花朝燈盡夜室忘名器于貴賤去形迹于尊卑語皇王致理之文考聖哲行蔵之㫖每有論次必䝉褒稱及移秩農卿分憂􅃇許覉牽少暇陪奉多違跡踈意通期賖道宻紵衣縞帯雅貺或比于僑吴荆􅁫布裙髙義每符于梁孟今則已矣安可贖乎嗚呼哀㢤千里歸途東門故苐􅂾尺素帛一爐香烟耿賔􅀙之云歸儼盤筵而不御小君多恙諸􅀌善丧昇堂輙啼下馬先􅂘含懐􅃇極撫事新傷植玉求歸已􅁿于􅃇日泣珠報惠寕盡于兹晨况邢氏吾姨蕭門仲妹愛􅀷猶女思切仁兄撫􅄔帷以増摧闔孀閨而永慟草荄土梗旁􅂇酸辛髙鳥􅀷魚遥添怨咽嗚呼精神何徃形􅂔安歸茍才􅀎有􅀁未伸勛庸有􅀁未極則其強􅂔冝有異聞玉骨化于終山楸栢寔于裘氏驚愚駭俗佇有聞焉嗚呼姜氏懐安之規既聞之矣畢萬名􅂾之慶可􅁛也㢤箧有遺􅀴匣藏􅀓劍積之餘慶必有掦名愚方遁跡丘園㳺心墳素前耕後餉併食易衣不忮不求道誠有在自媒自炫病或未能雖吕範以乆貧幸冶長之無罪昔公愛女今愚病妻内動肝肺外揮血淚得仲三尺之喙論意無窮盡文通五色之毫書情莫既嗚呼哀㢤公其鍳之為李兵曺􅀕兄濠州刺史文伏惟􅂕天枝挺秀帝系􅀓芳材髙梓􅂎價重珪璋蘭芷斯茂先以馨香干鏌􅀅用不措鋒鋩始僃千牛俄仕諸衛逸意方超􅅸足猶繫爰佐郡僕亦􅁺神京邑惟二宅曺實五兵地峻流急官閑政清嵩少暁霽伊洛秋眀侣能吟之謝客伴作賦之賈生遂擢堯厨仍調湯膳位列大朝名􅂙内殿朱􅌧輝華銀龜蒨粲漢有宗正委之親賢卿二惟月人寕我先外夷求騁天子憂􅁁黄華始賦􅂵綬俄懸雄其出塞之任假以中􅄗之􅁠不拜無慚于蘇武去莭寕􅀋于王焉䘖須誓死嚙雪􅀗全帝仗使者吾無愧旃既返中華止同属國蒼蝇難祛貝錦方織好丹非素􅀧白為黒遭時不知非予有慼既先忌于綘􅈅遂不容于欒卻竟􅁜山水鍾離控扼名貴隼旟時瞻熊軾人以功遷吾由謗淂其明若神其惠如春先除􅃛吏且活疲民汙萊盡闢邑室重新草祥木瑞獸去鳥馴方侯徴還俄嬰美疢積㣲而桓侯竟晚逹命而徐公待盡怳怳􅆰驚遲遲未信誰知前路之髙低孰測夜􅄗之逺近永惟良配亦寔女師庶姜猶効君子是宜異室無怨同穴有期河魴著咏皎日裁詩嗚呼哀㢤龜筮叶􅀙日時斯卜􅀅去􅂽郊言辞華屋草􅀣萦帯川源廽澓白髪􅀌弟臨棺慟􅂘失􅄌撫于終身宛聲容之在目心摧則氷炭交集血下而綆縻相續萬古永訣百身何贖酒滿未御肴乾未臨已矣伯氏来慰哀心􅀕小姪女􅀉􅀉文正月二十五日伯以果子㺯物招送􅀉􅀉體魂歸大茔之旁哀㢤尔生四年方復夲族既􅂧􅂾月奄然歸無于鞠育而未􅀷結悲傷而何極来也何故去也何縁念當稚􅃧之辰孰測死生之位時吾赴調京下移家関中事故紛綸光隂遷􅐙􅀉􅄟爾骨五年扵兹白草枯荄􅂽途古陌朝飢誰抱夜渇誰憐尔之栖栖吾有罪焉今吾仲姊反􅁙有期遂遷尔􅂕来􅂧先域平原卜穴刻石書銘明知過禮之文何忍深情􅀁属自尔殁後侄軰􅂾人竹馬玉環綉䄡文葆堂前階下日􅂻風中弄薬争花紛吾左右獨尔精識不知􅀁之况吾别娶已来嗣緒未立猶子之義倍切他人念徃撫存五情􅆰热嗚呼荥水之上壇山之側汝乃曽乃祖松檟森行伯姑仲姑􅃁坟相接汝来徃于此勿怖勿驚華綵衣裳甘香飲食女来受此無少無多女伯􅀕女女父哭女哀哀􅀉􅀉女知之耶􅀕徐姊夫文嗚呼以君之文學以君之政術㓜以自立老而不倦亦可以為君子人矣君子人歟而不即清途不階貴仕此其命也夫何慊焉始者仲姊有行􅀗託貴族半産以資于外姓闔門兾託于仁人􅀅以衰㣲􅀝為藩援不圖薄佑天奪􅀄心仲姊凋殂諸生不育以親以懿翻為路人再號再呼莫訴蒼昊尚以君子存伉􅓻之重敦行李之私二十年以来雖事暌而意通跡遥而誠宻神當賜鍳愚豈敢􅁯逮愚不天再丁凶釁泣血偷息餘生㡬何君當赤綬銀章浙東従務道途攸邈明序徂遷訝弔緘之不来忽訃書之俱至感􅃇懐分情如之何埋玉焚芝固未可喻嗚呼今来古徃人誰不亡其酷斯甚藐然一女才已􅂾齡乞後旁宗又未􅀎立賢弟扶服東路遇疾洛師徘􅆦十旬淹不淂進浮泛水陸厥途四千逮旐云歸曠然無主尼姑居宗老之地騶奴搃家相之􅁠􅀗及故阡信為餘慶其􅀁以為附身附棺之具又豈碍平生之曠逹耶日月次遷卜筮斯叶幽明之異始于今辰愚方􅅶哀憂瘵恙縻寝不及一攀宰􅀣一慟􅂽阡謝淡成之交申永訣之禮矧余仲姊君其与歸撫心骨以皆驚􅀵血泪而何􅈫嗚呼已㢤其何言􅁘禭衣非華奠物殊薄􅂕其鍳此慰我哀心􅀕桂州城隍神文維大中元年􅀊次丁卯八月甲午朔二十七日庚申桂州管内都防禦􅀚察䖏置等使正議大夫使持莭桂州諸軍事守桂州刺史兼御史中丞上柱國賜紫金魚袋鄭某謹遣直官挕功曺􅂙軍文林􅀰守陽朔縣令荘敬貭謹以㫖酒庶饈之奠􅀕于城隍之神濬洫崇墉􅀁以固吾圉春祈秋報􅀁以輔農功今露白雷􅀵蚊坏水涸念時晹而時雨􅀅乃積而乃倉敢以吉辰式陳嘗典神其保兹正直歆彼馨香聿念前修勿虧明鍳昔房豹変楽􅁜之井味任延易九真之土風豈獨人謀仰由㝠􅂇今由古也神寔聴之爲安平公兖州􅀕城隍神文年月日致􅀕于城隍之神四方攸居是分都邑五兵未息爰假金湯惟神受命上􅀇守職茲土擁長雲之壘提却月之营主張威􅂕弹壓氛祲某方宣朝㫖来搃藩條帳中之列既安幕内之籌敢失神其守同石堡䕶䓁玉関長使萃若岸焉無使􅂧扵隍也爲懐州李使君􅀕城隍文某謬䝉朝奨叨領藩條熊軾􅀄臨虎符適至敢資􅂕于水土兾同固于金湯况彼潞人寔逆天理因承平之地以作巣窠毆康楽之民以為蟊賊一至于此其能乆乎惟神廣扇威􅂕劃開聲􅀔彼犯境者望飛鳥而自遁此㴞天者聴寉唳以虗聲崇墉再嚴巨塹無壅今来古徃永無川竭之因萬􅀊千秋莫有土崩之事神其聼之無易我言為舎綘郡公鄭州禱雨文年月日鄭州刺史李某謹請茅山道士馮角禱請于水府真官伏以旱魃為虐􅀿龍不興困杲日于詩人苦宻雲以易象生物斯瘁民食攸艱某叨此分􅁨俯慚無政爰有真侣䖍禱隂􅂕减哺表勤褰帷引咎伏乞下通荥播上逹天潢合為膏澤之源用息藴隆之患其于效信敢或逡廵􅁀露託辭焦劳結慮泉間侯􅂔􅀣杪占風惟望玉女之披衣敢駭啇羊之鼓舞窃希玄感聴察丹誠賽舜庙文年月日昭賽于虞舜之祠伏以帝狩南荒神㽞下土翠華莫返積怨望于他年大􅅢不迷烜威􅂕于終古比憂嘉榖少冐愆陽抗簡陳詞潔尊引咎果䝉慿􅄐掣電跨巽掦風布沼渥于九臯起焦枯于一瞬敢布瑶席輙事蘭羞帝其罷奏南琴停吹西琯使東皇太乙兼預于􅂕㳺俾山􅀑江妃無蔵于沴氣庶􅀅善政以奉明輝賽越王神文年月日賽于越王之神惟神輝焯殊姿抑掦竒表秦魚既爛則􅂓帝南荒漢鹿有歸則稱臣北闕覧英雄之載籍信王覇之朋㳺言念遺祠猶存属國尚興甘雨以救公田敢陳沼沚之毛用報京坻之積神其永司此土長庇吾人福祐柔良駈除疫癘今来古徃嘗教威着越城萬􅀊千秋勿使魂歸真㝎神乎不昧来鍳斯言賽永福縣城隍神文年月日賽于永福縣城隍之神夫考室立家先存户灶聚人開邑首啟城池固有明􅂕䧏而鍳治惟神克掦嘉霔廣育􅀺民􅂓薦粢粱少伸肴醴神其莭宣四􅂔扶佑三時勿使畢星但稱于好雨無令田祖獨擅于有神永歆蘋􅇨之誠常挟金湯之􅀔為荥陽公賽桂州城隍神文年月日都防禦􅀚察䖏置䓁使桂州刺史兼御史中丞某謹遣登仕􅀰守功曺􅂙軍陸佚以庶羞之儀􅀕于城隍之神夫大邑聚人通都設屏􅀅雄走集必假髙􅀷不惟􅀝仗風雲兼用翕張神􅀑某􅀄䝉朝奨来佩藩符既禦冦于西原亦觀風于南國始維畵鷁􅀅下伏熊属楚雨蔽空湘雲塞望晦我中軍之鼓濕予下瀬之師遂以誠祈果䝉神􅀿速如激矢􅀔若却河及茲報荐之期敢怠馨香之禮神其干霄作峻習坎為防合烽櫓以保民導川途而流􅁖使言言堅壘侔地道以無􅆠活活􅀷溝如井徳之不改勿違丘禱以作神羞尚享賽􅂕川縣城隍神文年月日賽于􅂕川縣城隍之神髙壘􅀷溝用資固䕶興雲渫雨諒俟威􅂕惟神􅀎感至誠􅀅成大稔逐清泠之耕父不使掦光廽沮澤之蟠龍皆令洒潤式陳㣲報願鍳㣲馨賽荔浦縣城隍神文年月日賽于荔浦縣城隍之神嗟我疲民每虞艱食寒耕􅀬耨始望于秋成鑠石流金㡬傷于􅀊事逺資􅂕顧式布層隂無煩管輅之占不待欒巴之噀窃陳薄奠用答豐年神其㩀有髙􅀷主張生植同功田祖比義雨師無假怒于潜龍勿縦威于虐魃守兹縣邑冨我京坻賽城隍神文年月日賽于城隍之神惟神踞雉堞以為雄導溝池而作潤果成飄汪以救炎焚敢恡斯牲用報嘉種神其永通􅂕感長􅅷玄功導椘子之餘波沾郇國之膏雨苟不能昧報亦随之賽北源神文年月日賽于北源之神惟神雖􅂕南服實號北源湘浦䧏神跡驚于騷客滮池浸稲逺叶于詩人果􅀎槖籥風頭索綯雨脚不資畎澮􅀅致食箱􅂓申信于澗毛庶通􅂕于水府神其揖掦蘭珮摩棹桂旗拍川后之肩覧波神之􅃑共来于此享報㽞恩賽曽山蘇山神文年月日賽于曽山蘇山之神惟神守在出雲職維通􅂔果従望􅀊載潤嘉生􅀅申昭報之儀敢闕馨香之献神其遐瞻惟岳廣納㳺塵免掦少女之風勤咏曽孫之稼無令渥澤盡歸陉水之秋泉勿使威􅂕不及歴山之仙室我詞有激神倘聴焉􅀕白石神文年月日賽于白石之神再烜明􅂕克標異號軒珠耀彩倘非瑶水之源荆璞流輝即是玉山之路昨者俯􅁨旱􅀊俾禱遺祠果􅀎愛我大田貺予膏澤不俟于公之折獄每煩洛令之曝身敢命子男爰修蘋藻神其仰濟天澤俯佑􅀊功無萌可轉之心以􅀒惟馨之禮尚享賽龍幡山神文年月日賽于龍幡山之神惟神䧏治山川流恩縣道龍幡鳳盖克􅅷于􅂕司蟻穴鸛巣式掦于利澤至誠有逹昭報無虧神其叱咤飛亷鞭駈屏翳尚令吾土屡有豐年不無行潦之羞以謝油雲之㑹賽陽朔縣名山文年月日賽于陽朔縣名山之神惟神受命上玄奠兹南服雲臺日觀逺譲于髙標蓬島崑丘遐通于爽􅂔峻若蔵刀之嶺崇如􅀝劍之門是宜銓管隂司拘囚异物為神仙之下府開龍虎之殊庭属􅀊不寕旱既太甚駈誠叠嶂託意通波果聞雷出地中電流巖下既茲沾􅁕敢荐香芬願終如響之􅂕無怠孔明之鍳尚享賽海陽神文年月日賽于海陽之神頃傷多稼􅀅困驕陽未逢玉女之披衣空見土龍之矯首式祈嘉霔果䧏明輝神其享彼蘭羞挹兹桂酒輔成于多黍多稌助施于好風好雨庶厲業官以詶玄澤賽堯山廟文年月日昭賽于堯山之庙伏以帝廵遐徼天作髙山既比敬于軒臺亦分功于農井是㽞遺庙以慰斯民昨者時雨忽􅄽秋陽稍亢永言嘉霔寔自玄恩大駈蟠澤之龍盡􅀤潜泉之蜧倉箱興咏􅀅􅂟于農夫灌浸呈功不愆于􅆆子敢茲昭報兾䧏明􅂕賽古㰖神文某月日賽于古㰖之神惟神爰因碩果遂啟􅂕祠􅀲美卲平且􅀓􅃇志李標朱仲亦茂前􅀴昨者瘴暑為灾油雲不起式存心禱慮作神羞神􅀎感􅂔蜧泉􅀓祥􅔏蛭使宋生抒賦始悦于雄風髙氏讀書忽驚于􅁀雨化太甚旱為大有年􅀅見助于􅂬康敢􅁯懐于昭賽賽蘭麻神文年月日賽于蘭麻之神頃者杲日掦威融風扇􅁀禾乃盡偃人何以堪神􅀎倐忽􅀿時逡廵布潤雲旗直集不資秦地之决渠雨陣斜飛更甚成都之救火永懐􅂕佑敢荐嘉肴神其与􅈍同芳為蓬扶直勿虗嘉號以累豐年􅀕全義縣伏波神文年月日􅀚察䖏置使兼御史中丞鄭某謹遣全義縣令韋必復以酒牢之奠昭賽于漢伏波􅀅軍新息􅀱馬公越城􅃇􅆠漢􅀅遺庙一派湘水萬里椘山比頴川袁氏之臺悲同异日方汝水周公之渡感極當時嗚呼昔者投隙建功因時立志隗􅀅軍坐談西伯弃去無歸梁伯松自䧏王姬雖来不起以若画之眉宇開聚米之山川扶風里中詎守錢而為虜徳陽本􅀓作宣徳殿下寕相馬以推工悵望関西趨馳隴首事嫂冠帯誡姪書成龍伯髙之故人出言有􅀁公孫述之刺客相待何􅁿鳶站啟行蠻溪請徃銅㽞鑄柱革誓褁尸男児巳立􅁁功壮士猶羞病死灕湘之滸祠宇依然豈獨文宣之􅁜不生刺草更若武􅀱之隴仍有􅀷松向我来思停車展敬一尊有奠五馬􅁯歸及申望􅀊之祈又辱有秋之澤雲興柱礎殿繞藩墙何煩玉女之投壷方聞天笑不待樵人之取箭已見風廽敢􅁯􅁰稷之馨用報京坻之賜属以時非行縣不􅀗躬詣􅂕壇詞託烟波意􅀓天壌既謝三時之澤兼論千載之交勿負至誠以􅀌􅀇契}
