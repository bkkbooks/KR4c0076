  - {type: variant, offset: 18, length: 4, content: 東提學僉, SBCK: 行者于文墨意緒濶略凡􅀁為置大半箧􅂗逭破裂不復條貫十月弘農楊夲勝始来軍中本勝賢而文尤楽􅀵聚牋刺因懇索其素􅀁有㑹前四六置京師不可取乃強聫桂林至是所可取者以時以􅀋亦為二十編名之曰四六乙集此}
  - {type: variant, offset: 23, length: 3, content: 徐炯註, SBCK: 非平生􅀁専尚􅀿求俻卒不足以為名直欲以塞夲勝多愛我之意遂}
