  - {type: variant, offset: 6526, length: 750, content: 下人以此為水候又黄牛山下有灘名曰黄牛灘南岸重嶺叠起最外髙崖間有色如人負刀牽牛人黒牛黄成就分明既人迹所絶莫得究焉此巖既髙加江湍紆迴雖途逕信宿猶望見此物故行者謡曰朝發黄牛暮宿黄牛闕新書劍州普安郡領普安縣令既為侯講天子意三年大理田訟斷休市價平獄戸屈膝落民不識胥吏四方賓頗來繫馬靡牛闕樹膚不生乃大鏟險道緄石見土其平可容考工車四軌周禮涂度以軌又經涂九軌環涂七軌野涂五軌建為南北亭以經勞餞又亭東山號曰重陽以醉風日南北經貫若出平郡無有噫原闕二字三年民恐即去遮觀原闕二字請留當謂遮觀原闕察使請留二字東山實在亭下侯蔣氏名侑文曰仁之為道隆磊英傑天簡其勞羨以事物為君之原闕二字蔣是闕撮取不窮如武有庫見為某先輩啓蔣之有世以仁為歸伯氏之宜仲氏之思厥弟承之繩而不䊵韻㑹䊵急也以令為侯天子之德汝侯為理劍有盈昃易日中則昃月盈則食君南臣北父坐子伏飲牛漚菅魏志管寧鄰有牛犯寧禾者寧牽著涼處飲食主乃大慙白帖引傳曰拘鄫人之漚菅者曰何故使吾水滋濁由訟以直市正獄清漢曹參傳慎毋擾獄巾謁歸告休白帖杜欽言於王鳯曰今有司以為予告得歸賜告不得夫三最予告也或病滿賜告詔恩也詳為舍人啟朝雨滂沱詩崇朝其雨滂沱見表濕其帩頭漢制考後漢向栩好被髪著絳綃頭綃當作幧民樂以康願有顯庸侯作南亭北亭是雙至於東山乃三其功摧險為夷大石是扛亦既三年民走乞留伯氏南梁新書汝州臨汝郡梁縣注本承休又有梁縣在西南四十五里貞觀二年省梁更承休曰梁重弓二矛見為綘郡公文古有魯衛論語魯衛之政兄弟也惟我之曹惟仁之歸有世在下其攄其超尾馬鬛馬應璩慜驥賦鬰神足而不攄張協七命天驪之駿逸態超越神異經西南大宛宛邱有良馬其大二丈鬛至膝尾委地蹄如汗腕可握日行千里惟蔣之融成公綏詩翼翼萬禩明明顯融由唐龎嘏龎音茫厚也左傳民生敦龎鄭氏詩箋受福曰嘏惟是亭銘得其麤且毛萇詩傳且辭也唐大中八年九月一日太學博士河南李商隠撰賦, SBCK: 渝}
