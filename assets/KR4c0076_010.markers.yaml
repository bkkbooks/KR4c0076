  - {type: variant, offset: 8601, length: 1562, content: 箋蠍賦刺處士也葛洪云蠍前謂之螫後謂之蠆蓋前即其角後即其尾也凡物受大者不得取小故虎無翅牛無齒而蠍既有角以螫人於前又有尾以毒人於後果何功而得此揚子法言或問酷吏曰虎哉虎哉角而翼者也詩集井泥篇云猛虎與雙翅更以角副之其即此角而尾之謂與雜著紀事象江太守滎陽鄭璠自象江得怪石六其三聳而鋭上又一如世間道士存思圖見為先輩啓畫人肺胃肝腎次第懸絡者又一空中而隠外若癭癃殃疝病不作物者又一色紺氷去聲而理平漫彈之好聲璠為象江三年不病瘴平安寢食及還長安無家居婦兒寄止人舍下計輦六石道費俸六十萬璠嗜好有意極類前輩人華山尉陶生有恒人善養又善與人遊又善為官㑹昌初生病骨熱且死是年長安中進士為陶生誄者數十人生在時吾已得之矣及既死吾又得之齊魯二生程驤右一人字蟠之其父少良本鄆盜人也晩更與其徒畜牝馬草驘一私作弓矢刀仗學發冡抄道常就迴逺坑谷無廬徼處依大林木蚤夜偵候作姦李師古貪諸土貨下令䘏商鄆與淮海競一作近出入天下珍寳日日不絶少良致資以萬數每旬時歸妻子輒置食飲勞其黨後少良老前所置食有大臠連骨以牙齒稍脫落不能食其妻輒起請黨中少年曰公子與此老父椎埋剽奪十數年竟不計天下有活人今其尚不能食况能在公子叔行耶公子此去必殺之草間毌為鐵門外老捕盜所狙快少良默憚之出百餘萬謝其黨曰老嫗真解事敢以此為諸君别衆許之與盟曰事後敗出約不相引少良由是以其資發舉貿轉與鄰伍重信義䘏死喪斷魚肉葱薤禮拜畫佛讀佛書不復出里閈竟若大君子能悔咎前惡者十五年死子驤率不知後一日有過其母罵之曰此種不良庸有好事耶驤泣問其語母盡以少良時一作之事告之驤號哭數日不食乃悉散其財踰年驤甚苦貧就里中舉負給薪水灑掃之事讀書日數千言里先生賢之時與饘糗布帛使供養其母後漸通五經歴代史諸子雜家往往同學人去其師從驤講授又其為人寛厚滋茂動靜有繩墨人不敢犯烏重𦙍為鄆師舊書烏重𦙍潞州牙將卒贈太尉重𦙍出自行間雖古之名將無以加焉喜聞驤與之錢數十萬令市書籍驤復以其餘賚諸生其里閭故德少良者亦常來與驤孳息其貨數年復致萬金驤固不以為已有繩契管楗雜付比近用度費耗了不勘詰道益商開成初相國彭城公遣其客張谷聘之驤不起劉义右一人字义不知其所來在魏與焦濛閭氷田滂善任氣重義大軀有膂力常出入市井殺牛擊犬豕羅網鳥雀亦或時因酒殺人變姓名遁去㑹赦得出後流入齊魯始讀書能為歌詩然恃其故時所為輒不能俯仰貴人穿屐破衣從尋常人乞丐酒食為活聞韓愈善接一作友天下士步行歸之既至賦氷柱雪一作雲車二詩一旦居盧仝孟郊之上樊宗師以文自任見义拜之新書盧仝居東都愈為河南令愛其詩厚禮之仝自號玉川子孟郊字東野湖州武康人愈一見為忘年交郊為詩有理致最為愈所稱樊澤河中人子宗師字紹述韓愈稱其論議平正有經據常薦其材云後以爭語不能下諸公因持愈金數斤去曰此諛墓中人所得耳不若與劉君為夀愈不能止復歸齊魯义之行固不在聖賢中庸之列然其能面道人短長不畏卒禍及得其服義則又彌縫勸諌有若骨肉此其過人無限宜都内人新書地理志峽州夷陵郡領宜都縣武后簒既久頗放縱耽内習不敬宗廟四方日有叛逆防豫不暇時宜都内人以唾壺進思有以諌者后坐帷下倚檀机與語問四方事宜都内人曰大家知古女卑於男邪后曰知内人曰古有女媧史記三皇紀注按三皇紀者不同譙周以燧人為皇宋均以祝融為皇而鄭𤣥依春秋緯以女媧為皇承伏羲皇甫謐亦同亦不正是天子佐伏羲理九州耳後世孃姥有越出房閤斷天下事者皆不得其正多是輔昬主不然抱小兒獨大家革天姓改去釵釧襲服冠冕符瑞日至大臣不敢動真天子也然今者内之弄臣狎人朝夕進御者久未屏去妾疑此未當天意后曰何内人曰女隂也男陽也陽尊而隂卑雖大家以隂事主天然宜體取剛亢明烈以消羣陽陽消然後隂得志也今狎弄日至處大家夫宫尊位其勢隂求陽也陽勝而隂亦微不可久也大家始今日能屏去男妾獨立天下則陽之剛亢明烈可有矣如是過萬萬歲男子益削女子益專妾之願在此后雖不能盡用然即日下令誅作明堂者通鑑武后命更造明堂天堂仍以懷義充使懷義内不自安言多不順后隂使人毆殺之析微斷, SBCK: 断}
