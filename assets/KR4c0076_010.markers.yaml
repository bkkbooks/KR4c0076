  - {type: line-break, offset: 0, content: '', id: KR4c0076_WYG_010-1a01}
  - {type: variant, offset: 0, length: 1, content: 欽, SBCK: 太尉衛公㑹昌一品集序代桂府荥陽公唐葉十五帝謚昭肅始以太弟茂對天休遂臨西宫入髙庙􅀅以凖則九土指麾三􅂕乃顧左右曰我祖宗並建英豪範圍古昔史卜霄夢震嗟不寕是用能文惟睿掌武以永大業今朕奉承天命顯登乃辟庸不知帝賚朕者其誰氏子焉左右惕驚威􅂕迷撓章指周訥掦扢不􅀎仰酬既三四日乃詔曰淮海伯父女来輔予霞披霧銷六合快望四月日入覲是月日登庸淵角竒姿山庭異表為九流之􅂠盖作百度之司南帝曰是盡付玄機􅁢厭人度左右者咸不知其梦邪卜耶金門朝罷玉殿宴餘獨啣日光静與天語帝亦幽闡徴召誥説命之㫖}
  - {type: page-break, offset: 0, content: '', id: KR4c0076_SBCK_004-7a}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 元首股肱之契曰我􅀅俾尔以大手筆居第一功麒麟閣中霍光且圖其勛伐􅀇洲􅁐上魏􅀵别議于文章光映前修允兼具美我意属此爾無譲焉公拜稽首曰臣某何敢以當之在昔太宗有臣曰師古曰文本髙宗有臣曰嶠曰融玄宗有臣曰􅀃曰􅉞代宗有臣曰衮至于憲祖則有臣禰庙曰忠公並禀太白以􅀓精神納非烟而敷􅇨思才可以淺􅀷魏邴道可以升䧏伊皐而又富僧孺之新事識􅁃持之竒字清風濯􅀬白雪生春淮南王食時之工裴子野昧爽之獻疑王粲之夙搆無禰衡之加􅀧然後可以弘宣王略輝潤天文豈伊乏賢可纂􅃇服帝又曰舜何人也予何人也朕思丕承女勉善継無忝乎尔之先公􅂧拜稽首曰易曰中心願也詩曰何日􅁯之臣敢不夙夜在公以揚鴻烈㑹一日上明􅀤扵法宫之中忿兆人之衆顧九州之廣永懐不待之痛式重如存之敬公伏奏曰惟先后􅅷守丕基允資内􅂇秀南頓嘉禾之瑞開厯山神井之祥徳駕河洲淑肩沙􅅢􅀅􅂋䧏媯之配未弘褒紀之恩渝美椒􅂗掩華蘭掖縁山􅀍芿夙聞齊主之悲採石􅀓形早䧏漢皇之慟今繞樞有慶鳴社承輝而懿號未彰貞魂莫祔􅂲無以􅅷遵聖緒光慰孝思公于是承命有宣懿祔庙之制􅀄文宗皇帝思宗社之􅂕祧祖之重􅀓于夏啟既不克終歸于與夷又未􅀎立乃推帝堯敦叙九族之道弘魏文荣楽諸弟之志嘗曰穎邸吾寜忘邪及武宗譲踰三}
  - {type: page-break, offset: 2, content: '', id: KR4c0076_SBCK_004-7b}
  - {type: page-break, offset: 2, content: '', id: KR4c0076_SBCK_004-8a}
  - {type: variant, offset: 3, length: 1, content: 庫, SBCK: 位當九五出潛離􅀮躍泉在天掦八彩于堯眉挺二肘于湯臂故外則上公列辟内則常侍貴人咸􅂅擬議形容依稀彩飾公搢圭歸美吮墨摛辞詠日月之光革知天者之務也賛乹坤之易蕳作易者之事乎公于是有聖容之賛天寳季年物豐時㤗骨鯁者慕周偃武􅁏食者効晋清談豖不獖牙蠆因揺尾氛興燕易駕狩巴梁九十年鑾輅不東三千里華戎遂隔日者上􅀇䧏鍳元聖恢竒遂于首亂之􅀖先有納忠之帥復我疆理平我􅄷讐􅀒羽䝉輪巳聞于深入赤茀邪幅􅀅事于駿奔陳萬賄以展儀僃四旂而告㨗仍願于箕星之分巫閭之旁追􅅣貞珉彰灼来葉以文上請属意宗臣公乃更夢江毫重吞羅鳥町疃河濟呼嘯神祗述列聖之英猷荅藩維之㴱懇既事苞理亂思属安危不唯嵩岳䧏神固亦文星􅂇彩螭蟠龜載䖝􅂐鳥章搆思而君苗硯焚洒翰而元常筆閣公于是有幽州紀聖功之碑天街之北獫狁攸居結以閼氏䧏我皇女奉春君娄敬常為逺使下杜人楊望長作画工乗以無年遂􅃇好分偵邏于甌脱遺􅀕酹于蹛林俾刁斗晨驚兜零夜設公乃上資宸断旁耀軍謀心作􅂕臺手為天馬充國四夷之學此日方知薛公三䇿之徴他時未爽既而􅀑箝飛辨邳石䧏籌不使郭閎仍䜛于叚熲寕教李邑更毁于班超􅀔叶聲同火􅑒水灌遂得朝還貴主暮遁名王轄栁塞之歸車復梅装而向闕及晋城赤狄喪帥歸珪有閼伯之弟兄誕景升之児子􅀅慿蜀閣欲恃吴錢姑務連鷄靡思􅅞虎既垂文誥尚有群疑公乃挺身而進曰重耳在丧不聞利父衛朔受貶祗以拒君今天井雄藩金橋故地跨揺河北脅依山東豈可使眀皇􅃇宫坐為汙俗文宗外相行育匪人忠謀既成上意旋㝎俄又埃昏晉水霧塞唐郊殊懿公之東渉一作徙渡河若紀侯之大去其國稽于時議惮在􅀫兵公又掦笏而言曰彼地則義師師唯宗室乃􅀇祖勤啇之邑后稷造周之􅀖􅏨􅚩具存堂構斯在苟虧策画不襲翦仇讐則是奨夙沙􅅞主之風長冐頓射親之族昔武安君用􅃏坑卒四十一萬齊桓公受昨立功一十二國今真􅀅軍為時而岀賢諸侯代不乏人况其俗産代地之名駒冨管涔之良璞有抱􅀣辭荣之節有􅃮身報徳之風邪躡􅁕以謀屈指而㝎謝安之圍棋尚刦曺参之飲酒正酣適有軍書果聞戎㨗邯午謝衆丕豹出奔楽毅不歸鄒衍已去砥磨周􅃏水淬鄭刀萬里来􅀽紹之頭顱二冢塟􅃖尤之肩髀何其纂立大効􅀣建嘉績若是之速欤宗英可汗既畏王威遂聞請吏㽞􅀺􅀴潞對潼酪以知羞毳幕氊裘望衣冠而有慕文畢一作大異伯氏之胤呼韓單于之頭或執圭而朝靈囿㦯觧辮而拜甘泉並垂于冊書况􅀍以眀命百王共貫三代同規公于是奉命有討北狄之詔伐上党之制諭囬鶻之􅒛五慰堅昆之書四毎牙管既㧞芝泥􅀅乾上輙曰尔有獨断朕無疑謀固俟沃心不可假手公亦分隂可就落簡如飛故毎有急宣関于宻画内􅒉外制皆不與聞此又豈可与美洞簫而諷于後庭聞子虗而嗟不同世者論功而較徳邪其有􅀔切疾雷機難終日属宣室未召武帳不開公莫暇昌言且陳宻䟽賈太傅之􅁨國固動􅀷誠山吏部之論兵詎因夙習凡􅀁奏御罕或依違迨及武宗下武重光崇名􅂯易公又觀圖東序按牒西崑率億兆同心列公卿㝎疑以一十四字垂百千萬年􅇨縟詞華鋪舒名實秦晋于玉檢瑶䋲之内平勃于綠疇䜛鼎之間方􅀅命禮官召儒者訪匡衡後土之議採公玉眀堂之圖攷四覲之禮于梁生取封禅之書于犬子盡皇王之盛事極臣子之殊功軒鼎􅀅成禹書就掩然猶進先嘗之藥獻髙手之醫蔵周旦請代之書追漢宣易名之義作為大誥祈于昊天始終一朝紹續九徳其功伐也既如彼其制作又如此故合詔誥奏議碑賛等凢一帙一十五􅃃輙署曰㑹昌一品集云紀年尊帝追聖徳也書位旌官業也不言制集崇論道也惟公字文饒姓李氏趙郡人盖大􅄧中丘有風雨翕張之􅀔藂􅄗髙邑名山河隠軫之􅂕萃于直躬慶是}
