  - {type: variant, offset: 10651, length: 0, content: '', SBCK: 象江太守荥陽鄭璠自象江得恠石六其三􅋍而鋭上又一如世間道士存思圖画人肺胃肝腎次第懸絡者又一空中而隐外若癃癭殃疝並不作物者又一色紺冰去而理平漫弹之好聲璠為象江三年不病瘴平安寝食及還長安無家居婦児􅀉止人舎下計輦六石道費俸六十萬璠嗜好有意極􅀋前軰人華山尉陶生有恒人善飬又善与人㳺又善為官㑹昌􅀄生病骨􅀬且死是年長安中進士為陶生誄者数十人生在時吾已淂之矣及既死吾又得之矣齊魯二生右一人字蟠之其父少良夲鄆盗人也晚更與其徒畜牝馬草一驘私作弓矢刀杖學􅀤冡抄道常就㢠逺坑谷無廬徼䖏依夫林木早夜偵候作奸李師古貪諸土貨下令卹啇鄆与淮海近出入天下珎寳日日不􅅸少良致資以萬􅂾每旬時歸妻子輙置食飲勞其党後少良老前􅀁置食有大臠連骨以牙齒稍脱落不􅀎食其妻輙􅁸請党中少年曰公子與此老父椎埋剽奪十􅂾年竟不計天下有活人今其尚不􅀎食况能在公子叔行邪公子此去必殺之草間無為鉄門外老捕盗所狙快少良黙惮之出百餘萬謝其党曰老嫗真觧事敢以此為諸君别衆許之與盟曰事後敗出約不相引少良由是以其貲發擧􅐙轉与隣伍重信義䘏死丧断魚􅁏葱薤禮拜画佛讀佛書不復出里閈意若大君子􅀎悔咎前􅁖者十五年死子􅋮率不知後一日有􅂈其母罵之曰此種不良庸有好事邪􅋮泣問其語母盡以少良時事告之􅋮號泣数日不食乃悉散其財踰年􅋮甚苦貧就里中舉負給薪水洒埽之事讀書日数千言里先生見之時與饘糗布帛使供飬其母後漸通五經厯代史諸子􅇎家徃徃同學人去其師􅀙􅋮講授又其為人寛厚滋茂動静有䋲墨人不敢犯烏重胤為鄆帥喜聞􅋮与之錢数十萬令市書籍􅋮􅂧以其餘賚諸生其閭里故徳少良者亦嘗来與􅋮孳息其貨数年復致萬金􅋮固不以為已有䋲墨管楗􅇎付比近用度費耗了不勘詰道益髙開成􅀄相國彭城公遣其客張谷聘之􅋮不起劉乂右一人字乂不知其所􅀙来在魏与焦􅄥閭氷田滂善任氣重義大軀有聲力嘗出入市井殺牛及犬豕羅􅃠鳥雀亦或時飲酒殺人變姓名遁去㑹赦淂出後流入齊魯始讀書􅀎為歌詩然恃其故時􅀁為輙不能俯仰貴人穿􅄚破衣􅀙尋常人乞丐酒食為活聞韓愈善接天下士歩行歸之既至賦氷柱雪車二詩一旦居盧仝孟郊之上樊宗師以文自任見乂拜之後以争語不􅀎下諸公因持愈金数斤去曰此䛕墓中人得耳不若与劉君為夀愈不能止復帰齊魯乂之行固不在聖賢中庸之列然其􅀎面道人短長不畏卒祸及淂其服義則又弥縫勸諫有若骨􅁏此其􅂈人無限宜都内人武后􅆲既乆頗放縦耽内習不敬宗庙四方日有叛逆防豫不暇時冝都内人以唾壷進思有以諫后坐帷下􅀝檀機与語問四方事宜都内人曰大家知古女卑于男邪后曰知内人曰古有女媧亦不正是天子佐伏羲理九州耳後世嬢姥有越出房閣断天下事者皆不淂其正多是輔昏主不然抱小兒獨大家革天姓改去􅁫釧襲服冠冕符瑞日至大臣不敢動眞天子也然今内之弄臣狎人朝夕進御者乆未屏去妾疑此未當天意后曰何内人曰女隂也男陽也陽尊而隂卑雖大家以隂事主天然宜體取剛亢眀烈以消群陽陽消然后隂淂志也今狎㺯日至䖏大家夫宫尊位其􅀔隂求陽也陽勝而隂亦微不可乆也大家始今日􅀎屏去男妾獨立天下則陽之剛亢眀烈可有矣如是􅂈萬萬世男子益削女子益専妾之願在此后雖不能盡用然即日下令誅作朙堂者劍州重陽亭銘陪臣未嘗屡睹天子宫闕矧淂舞殿陛下邪然下國伏地讀甲乙丙丁詔書亦有以識天子理意尺度堯舜不差毫撮于􅅸逺人意尤在不然者安得用江陵令使上水六千里挽大小虎牙灔澦黄牛險以治普安令既爲􅀱講天子意三年大理田訟断休市賈平獄户屈膝落民不識胥吏四方賔頗来䌓馬靡牛􅀣膚不生乃大鏟險道緄石見土其平可容考工車四軌建爲南北亭以經劳餞又亭東山號曰重陽以醉風日南北經貫若出平郡無有噫三年民􅂲即去遮觀請㽞東山實在亭下侯蔣氏名侑文曰仁之爲道隆磊英傑天簡其勞羡以事物爲君之蒋是撮􅂑不窮如武有庫蔣之有世以仁爲歸伯氏之宜仲氏之思厥弟承之䋲而不紈以令為侯天子之徳汝侯為理劍有盈昃君南臣北父坐子伏飲牛漚菅由訟以直市正獄清謁歸告休朝雨滂沱􅊜其帩頭民楽以康願有􅂋庸侯作南亭北亭是雙至于東山乃三其功推險為夷大石是扛亦既三年民走乞㽞伯氏南梁重弓二矛古有魯衛惟吾之曺惟仁之歸有丗在下其攄其超尾鬛馬馬惟蔣之融由唐龎嘏惟是亭銘淂其粗略唐大中八年九月一日太學􅀶士河南李啇􅀮撰}
