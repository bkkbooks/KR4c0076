  - {type: variant, offset: 3, length: 0, content: '', SBCK: 有􅇒徐躐􅁃之學鄭亞有討論脩飾之功姚識綸綍文粹作紼之興載籍之始先王􅀤號施令眀罰敕法盖夲于此也唐虞之盛二典存焉夏殷之興厥有訓誥自胤征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代紀綿逺其代工掌制之名氏莫淂而知至於成湯太甲則有仲虺伊尹為之訓誥髙宗得傅説則有説命之篇周公召公相成王則洛誥酒誥周官顧命秦始皇并一區宇丞相李斯實掌其言漢興當秦焚書之後侍従之臣皆不習文史䔥曺之軰又乏儒墨之用每封功臣建子弟其辞多天子為之縦委于執翰者亦非彰灼知名之士武帝使司視草率皆文章之流以相如非􅀅相之器也厥後寝微寖長下于魏晋亦代有其人我髙祖革隋文物大偹在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立于玄宗之朝常楊継美于代宗之代自憲宗皇帝英武啟運雄圖赫張中興之業髙映前古其時則先太師忠公翺翔内署有宻勿賛佐之績平吴定蜀時惟其功及登樞衡作霖雨尊王室卑諸􅀱圖蔡料齊外㝎内理􅂋王言于典誥彰帝範于圖藉紀在徽冊播于無窮特進太子少保分司東都衛公長慶中事惠皇時為翰林學士訓誥之業彰于傳聞昭粛皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付玄機􅁢壓神度每彤墀奏罷别承天眷帝亦講伊尹傅説之㫖㝎元首股肱之契以太平之制度上古之文教咸属于公焉㑹先太后懿號未立帝眀􅀤有永懐之痛公述沙麓神井之瑞賛繞樞懐日之􅂟􅅷遵聖緒光慰孝思于是承命有宣懿祔庙之制及武宗郊昊天拜清庙文物胥僃朝廷有禮華夷述職河朔脩貢乃顕神體薦徽號奉􅀭一徳以示萬方于是撰仁聖丈武至神大孝之冊封域無虞天子翛然有求􅀇之思乃範貞模聖表隆凖日角燭于宫庭中外臣僚咸欲以頌山河而褒日月也公于是有聖容之賛天街之北獯鬻攸居因饑憑􅁜怙衆強禦嚴之以刁斗而勃尔無懼申之以文告而腆然不率天子震怒旋命征之公獨運沈機上資神断萬里勝􅀒决于帷中雷電既震犬羊遽潰疣贅披抉腥膻觧離遁其名王復我貴主公于是有討北狄之詔天寳末薊門為首亂之地瘡痏榛􅁄襲世未平至于漁陽率武仲掃除妖孽􅆇􅀗仇讐奉掦威神乃底康靖仍願勒石于盧龍之塞以叙聖功飛章上聞帝用􅁢若公祗􅈾明命抒展格言呼嘯神祗吐納嵩華當晝而文星現不寐而白采成靖諸侯不朽之勛尊元后無私之化公于是有幽州紀聖之碑潞帥劉従諫死其子因関河之險恃甲兵之衆請爵争地屡聞王庭中外疑迷互撓天聼帝􅀅耀神武公累罄忠謀且言曰重耳在丧不聞利父雄渠受戮秪以抵君况明皇􅃇宫天井内地跨揺河北脅􅀝山東豈可行有匪人坐爲汚俗若是可忍孰不可忍沃心無疑躡足乃定又曰上党居天下之脊當河朔之喉今漳水雄兵常山劲卒是爲唇齒寔惧因依不若乗其未萌制其􅀅動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以􅂆戒之魏侯鎮侯僇力従命絶壺関之右臂􅀵泜水之上㳺􅀗兹渠魁在此成􅈫又轅門叛􅀅横水餘兇窃上相之旌旗盗晋陽之管鑰帝怒斯赫人心愈疑咸以師老于郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又􅀭笏而言曰彼地則義師帥分宗室是玄祖勤啇之邑后稷造用之􅀖􅀲瓞俱存堂構斯在苟虧䇿画不襲仇讐則是奨彌牟􅅞主之風長冐􅉐射親之俗詩􅁛築于道旁書謂疑謀勿成由是洞啟宸􅂨大破群議運籌制勝舉無遺䇿防㣲致逺必契神机授􅃏之臣伏􅈾承命謝安之圍碁尚刦曺参之飲酒方酣果有軍書継聞戎㨗砥磨周􅃏水淬鄭刀萬里来袁紹之頭顱二冢塟􅃖尤之肩髀歡聲雖震于朝市喜氣不見于形容何其纂立功勛鎮定風俗若是之重也公于是有伐上党之制平晋陽之敕宗英可汗献琛輸贐越自􅅸漠通于夲朝文畢伯氏之胤呼韓谷蠡之師或執玉而朝􅂕囿或觧辮而拜甘泉並垂于冊書光彼眀命公于是有諭囬鶻之命五慰堅昆之書四文章等于􅀓訓機事出于神明固􅀅偃仰邳石之符傲睨􅄦䈤之録聞之者可以祛聾瞶淂之者可以弼􅀖國每牙管既㧞芝泥􅀅熟嘗于前席親授筆扎公亦分隂可就落蕳如飛時有急宣関于宻画内庭外制皆不與聞或􅀔如疾雷机難終日宣室未召武帳莫開公則手䟽封章逹于旒扆當一夜􅀚書之際未嘗不稱美再三此又豈可與􅀓洞簫而諷于後庭聞子虗而嗟不同世者論功校徳邪􅀊在已丑群公嘗伯以天子之道貫于神祇一年而風雨有序灾沴不作二年殱醜虜興北伐之詩四年誅狡童詠東征之歌而又移摩尼之風壊浮圖之俗偃兵反樸四海胥㝎思欲增鴻名光下武公乃􅀚東序之圖按西崑之牒鋪舒名實藻縟文采􅁼于上帝為唐神宗公于是纂章天成功神徳明道之冊文號位既畢華夷㑹同方􅀅命禮官召儒者訪匡衡后土之議採公玉明堂之圖攷四覲之禮于梁生取封禅之書于犬子盡皇王之盛事極臣子之殊功而軒􅂦􅀅成禹書就掩然猶進先嘗之薬献髙手之醫蔵周旦請代之書追漢宣易名之美作為大誥祈于昊天始終一朝紹續九徳其功伐也既如彼其制作也又如此故合武宗一朝冊命典誥奏議碑賛軍機羽檄凢兩帙二十卷輙署曰㑹昌一品制集紀年追聖徳也書位旌官業也􅀊在丁卯亞自左掖出為桂林九月公書至自洛以典誥制命示于幽鄙且使為序以集成書尋玄珠莫究其􅌼域聴希聲莫窮于髙下承命震􅂲㡬移朝夕援筆而復止者三四伏念江陸􅁱盪辞譲不及因齋潔以序焉夫全功難恃大名難兼日赫于畫而乏清媚月皎于夜而無温煦冬之為侯也則霜雪飄􅁀凍入肌髪夏之為用也則金流石鑠火走膚􅎃如陽春髙秋者稀焉南則瘴風毒虺之為厲也北則獯戎􅃛虜之為患也如洛邑咸秦者㡬焉鵰鷲不􅀓之以馳騁驊騮不授之以騫翥如􅀿龍者鮮焉仲尼聖賢之宗也官不過柱史如􅁎旦者㡬焉是以保衡傅􅀃佐佑殷宗召公畢公寅亮周室咸著大訓克為元龜書契以来未之多有李斯以刻石紀號之文勝而不在休明之運又何足数㢤周勃霍光雖有勛伐而不知儒術枚臯嚴忌善為文筆而不至岩廊自是以䧏其􅁼寔繁惟公藴開物致君之才居元弼上公之位建靖難平戎之業垂􅀴天緯地之文萃于直弼慶是全徳盖四序之陽春九州之咸洛品彚之􅀿龍人倫之姫旦後之學者其景行之云尔唐容州􅀴略使元結}
