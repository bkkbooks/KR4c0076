  - {type: variant, offset: 8493, length: 101, content: 漢書董仲舒對䇿曰夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也注師古曰謂牛無上齒則有角其餘無角者則有上齒傅讀曰附附著也言鳥不四足按厥虎不翅謂虎有四足則無翼也厥牛不齒謂牛有兩角則無上齒也爾, SBCK: 尔}
