  - {type: variant, offset: 5, length: 3, content: 箋註巻, SBCK: 後序次山有文編有詩集有元子三書皆自為之序次山見譽于公弱夫蘇氏始有名見取于公浚楊公始淂進士第見憎于苐五􅄾元載故其􅀅兵不得授作官不淂逹母老不得盡其飬母丧不淂終其哀間二}
