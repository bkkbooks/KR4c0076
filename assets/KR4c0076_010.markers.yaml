  - {type: variant, offset: 5, length: 1, content: 書, SBCK: 徳許靖廊庙之氣黄憲師長之姿何晏神仙叔夜龍鳯宋玉間麗玉衍白晳馬援之眉宇盧植之音聲此其妙水鏡而為言託丹青而為􅁉至于好禮不􅌒用和為貴敬一人而取悦謙三位而無咎意以黙識􅃀乎寡詞車匠胡奴㒺迷于半面背碑覆局無俟于耑心聿成儉訓不有長物昔猶卑官端坐心齋江革分謝朓之舊􅃭便為卧具周正得􅀽憲之談柄嘗在講筵五車自娱三箧能識麗則孔門之賦清新鄴下之詩重以多􅀎推于小學王子敬之􅊢法遒媚皇休眀之草􅀔沉著異代相逼當世罕儔不􅄭遇人慎于取友与}
