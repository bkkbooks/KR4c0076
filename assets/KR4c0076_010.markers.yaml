  - {type: variant, offset: 9, length: 0, content: '', SBCK: 年其文危苦激切悲憂酸傷于性命之際自占心􅀴已下若干萹是外曽孫遼東李惲辞􅀵淂之聚為元文後編次山之作其綿逺長大以自然為祖元氣為根變化移易之太虗無状大賁無色寒暑有出􅀑神有聀南斗北斗東龍西虎方嚮物色歘何従生啞鐘復鳴黄雉變雄山相朝捧水信潮汐若大饜然不覺其異􅀂大醉然不􅁴其醒其疾怒急撃快利劲果出行萬里不見其敵髙歌酣顔入飲于朝断章摘句如娠始生狼子豽孫競于跳走剪餘斬殘程露血脉其詳緩柔潤壓抑趨儒如以一國買人一笑如以萬世換人一朝重屋深宫但見其脊牽繂長河不知其載死而更生夜而更眀衣裳鐘石雅在宫蔵其正聴嚴毅不滓不濁如坐正人照彼佞者子􅀙其翁婦從其姑􅆆麾為門懸木為牙張盖乗車屹不敢入􅀅刑断死帝不淂赦其碎細分擘切截􅊏顆如墜地碎若大咽上聲餘鋸取朽蠧檪蟒岀毒刺眼楚去聲齒不見可視顧顛陪錯􅇎汙瀦傷損如在危䖏如出夢中其惣㫖會源條綱正目若國大治若年大熟君君堯舜人人義皇上之視下不知有尊下之望上不知其􅆲辮頭鑿齒扶服臣僕融風彩露飄零委落耋老者在童齓者蕃邪人佞夫指之觸之薰薰熈煕不知其故吁不淂盡其極也論者徒曰次山不師孔氏為非嗚呼孔氏扵道徳仁義外有何物百千萬年聖賢相随于􅂗中耳次山之書曰三皇用真而恥聖五帝用聖而恥明三王用明而恥察嗟嗟此書可以無盡孔氏固聖矣次山安在其必師之邪樊南甲集序樊南生十六􅀎著才論聖論以古文出諸公間後聨爲鄆相國華太守所憐居門下時敕㝎奏記始通今體後又两爲秘省房中官恣展古集徃徃咽噱于任范徐􅁃之間有請作文或時淂好對切事聲势物景􅂨哀上浮壮能感動人十年京師寒且餓人或目曰韓文杜詩彭陽章檄樊南窮凍人或知之仲弟聖僕羲􅅱特善古文舉㑹昌中進士爲第一嘗表以今體規我而未焉􅀎休大中元年􅀍奏入嶺掌表記􅀁爲亦多冬如南郡舟中忽􅂧括其所藏火燹墨汚半有墜落因削筆衡山洗硯湘江以􅀋相䓁凡得四百三十三件作二十卷喚曰樊南四六四六之名六博格五四数六甲之取也未足矜十月十二日夜月明序樊南乙集序余為桂林従事者嘗使南郡舟中序所為四六作二十編眀年正月自南郡歸二月府貶選為盩厔尉与班縣令武功劉官人同見尹尹即㽞假􅂙軍事専章奏属天子事􅁁康季荣首淂七関後数月李玭淂秦州月餘朱叙明又得長楽州而益丞相亦尋取維州聨為章賀時同僚有京兆韋觀文河南房魯楽安孫朴京兆韋嶠天水趙璜長楽馮顓彭城劉􅁢章是数軰者皆能文余每著一篇則取夲去是􅀊􅁙牛太尉天下設􅀕者百数他日尹言吾太尉之薨有杜司勛之誌與子之奠文二事為不朽十月尚書范陽公以徐戎凶悍莭度闕判官奏入幕故事軍中移檄牒刺皆不関决記室判官専掌之其関記室者記室假故余亦􅂙􅇎􅀿用明年府薨選為博士在國子}
