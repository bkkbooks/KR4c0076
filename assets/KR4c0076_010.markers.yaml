  - {type: variant, offset: 10, length: 7, content: 察御史徐樹穀箋, SBCK: 太學始主事講􅀴申誦古道教太學生為文章七月尚書河東公守蜀東川奏為記室十月得吴郡張黯見代改判上軍時公始陳兵新教塲閲数兵寔判官務檢舉條理不暇筆硯明年記室請如京師􅂧攝其事自桂林至是􅀁為巳五六百萹其間可取者四百而己三年已来丧失家道平居忽忽不楽始剋意事佛方願打鐘掃地為清凉}
