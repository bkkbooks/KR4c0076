  - {type: variant, offset: 188, length: 289, content: 合也崔羣傳穆宗時羣以故相為宣州刺史歙池等州都團練觀察使後徴拜兵部尚書太和六年八月卒此書作於七年乃云今崔宣州三不合也自耽羣而外又别無賈為相國崔為宣州者此書必非商隠作編文者誤采入集耳中丞閤下愚生二十五年矣五年讀經書七年弄筆硯始聞長老言學道必求古為文必有師法常悒悒不快退自思曰夫所謂道豈古所謂周公孔子者獨能邪蓋愚與周孔俱身之耳以是有行道不繫今古直揮筆為文不愛攘取經史諱忌時世百經萬書異品殊流又豈能意分出其下哉凡為進士者五年始為故賈相國所憎明年病不試又明年復為今崔宣州所不取居五年間未曽衣袖文章謁人求知必待其恐不得識其面恐不得讀其書然後乃出嗚呼愚之道可謂强矣可謂窮矣寜濟其魂魄安養其氣志, SBCK: ''}
