  - {type: variant, offset: 478, length: 2572, content: 其强拂其窮惟閤下可望輒盡以舊所為發露左右恐其意猶未宣洩故復有是説某再拜别令狐綯拾遺書舊書綯字子直開成初為左拾遺二年丁父喪服闋授本官尋改左補闕子直足下行日已定昨幸得少展寫足下去後憮然不怡今早垂致葛衣書辭委曲惻惻無已自昔非有故舊援拔卒然於稠人中相望見其表得所以類君子者一日相從百年見腑肝爾來足下仕益達僕困不動固不能有常合而有常離足下觀人與物共此天地耳錯行雜居蟄蟄哉不幸天能恣物之生而不能與物慨然量其欲牙齒者恨不得翅羽角者又恨不得牙齒此意人與物略同耳有所趨故不能無爭有所爭故不能不於同中而有各異耳足下觀此世其同異如何哉兒冠出門父翁不知其狂直女筓上車夫人不保其貞汙此於親親不能無異勢也親者尚爾則不親者惡望其無隙哉故近世交道㡬喪欲盡足下與僕於天獨何稟當此世生而不同此世每一㑹面一分散至於慨然相執手嚬然相蹙泫然相泣者豈於此世有他事哉惜此世之人率不能如吾之所樂而又甚懼吾之徒孑立寡處而與此世者蹄尾紛然蛆吾之白擯置譏誹襲出不意使後日有希吾者且懲吾困而不能堅其守乃捨吾而之他耳足下知與此世者居常紿於其黨何語哉必曰吾惡市道史記㢘頗傳客曰夫天下以市道交君有勢我則從君君無勢則去嗚呼此輩真手搔鼻皻而喉噦人之灼㾗為癩者市道何肯如此輩邪今一大賈坐滯貨中人人徃須之甲得若干曰其贏若干丙曰吾索之乙得若干曰其贏若干戊曰吾索之既與之則欲其蕃不願其亡失口舌拜父母出妻子伏臘相見有贄男女嫁娶有問不幸喪死有致饋𦵏有臨送弔哭是何長者大人哉他日甲乙俱入之不欺則又愈得其所欲矣廻環出入如此是終身欲其蕃不願其亡失口舌拜父母益嚴出妻子益敬伏臘相見贄益原男女嫁娶問益豐不幸喪死饋贈臨送弔哭情益悲是又何長者大人哉唯是於信誓有大欺漫然後罵而絶之擊而逐之訖身而勿與通也故一市人率少於大賈而不信者此豈可與此世交者等耶今日赤肝腦相憐明日衆相唾辱皆自其時之與勢耳時之不在勢之移去雖百仁義我百忠信我我尚不顧矣豈不顧已而又唾之足下果謂市道何如哉今人娶婦入門母姑必祝之曰善相宜則一作前祝曰蕃息後日生女子貯之幽房密寝四鄰不得識兄弟以時見欲其好不顧性命即一日可嫁去是宜擇何如男子者屬之邪今山東大姓家非能違摘天性而不如此至其羔鶩在門有不問賢不肖健病而但論財貨恣求取為事當其為女子時誰不恨及為母婦則亦然彼父子男女天性豈有大於此者耶今尚如此况他舍外人燕生越養而相望相救抵苑不相販賣哉紬而繹之真令人不愛此世而欲狂走逺颺耳果不知足下與僕之守是耶非耶首陽之二百當作人史記伯夷傳武王巳平殷亂伯夷叔齊義不食周粟隠於首陽山餓而死豈蘄盟津之八百蘄當作靳左傳宋公靳之注戲而相媿曰蘄史記周本紀是時諸侯不期而㑹盟津者八百吾又何悔焉千百年下生人之權不在富貴而在直筆者得有此人足下與僕當有所用意其他復何云云但當誓不羞市道而又不為忘其素恨之母婦耳商隠再拜與陶進士書陶進士不知其名豈即紀事所謂華山尉耶去一月多故不常在故屢辱吾子之至皆不覩昨又垂示東岡記等數篇不惟其辭彩奥大不冝為冗慢無勢者所窺見且又厚紙謹字如貢大諸侯卿士及前達有文章積學者何其禮甚厚而所與之甚下耶始僕小時得劉氏六説讀之新書藝文志經解類有劉迅六説五巻劉迅傳迅續詩書春秋禮樂五説書成不以示人李邯鄲書目迅作六説以繼六經標作書之誼而著其目惟易闕而不叙嘗得其語曰是非繫於褒貶不繫於賞罰禮樂繫於有道不繫於有司密記之蓋常於春秋法度聖人綱紀久羡懷藏不敢薄賤聨綴比次手書口詠非惟求以為已而巳亦所以為後來隨行者之所師稟巳而被鄉曲所薦入來京師久亦思前輩達者固已有是人矣有則吾將依之繫鞵出門寂莫往返其間數年卒無所得私秘之而比有相親者曰子之書宜貢於某氏某氏可以為子之依歸矣即走往貢之出其書乃復有置之而不暇讀者又有黙而視之不暇朗讀者又有始朗讀而中有失字壞句不見本義者進不敢問退不能解黙黙已巳不復咨歎故自太和七年後雖尚應舉除吉凶書及人憑倩作牋啟銘表之外不復作文文尚不復作況復能學人行巻耶時獨令狐補闕最相厚歲歲為冩出舊文納貢院既得引試㑹故人夏口主舉人時素重令狐賢明一日見之於朝揖曰八郎之交誰最善綯直進曰李商隠者三道而退亦不為薦託之辭故夏口與及第新書本傳開成二年髙鍇知貢舉令狐綯雅善鍇奬譽甚力故擢進士第舊書髙鍇傳太和七年遷中書舍人九年十月以本官權知禮部貢舉開成元年為禮部侍郎凡掌貢部三年每歲登第者四十人選擢雖多頗得實才抑豪華擢孤進至今稱之尋轉吏部侍郎其年九月出為鄂州刺史御史大夫鄂岳觀察使書稱夏口以此也然此時實於文章懈退不復細意經營述作乃命合為夏口門人之一數耳爾後兩應科目者謂舉博學宏辭及南塲試判又以應舉時與一裴生者善復與其挽拽不得已而入耳前年乃為吏部上之中書歸自驚笑又復懊恨周李二學士以大法加我夫所謂博學宏辭者豈容易哉天地之灾變盡解矣人事之興廢盡究矣皇王之道盡識矣聖賢之文盡知矣而又下及蟲豸草木鬼神精魅一物已上莫不開㑹此其可以當博學宏辭者邪恐猶未也設他日或朝廷或持權衡大臣宰相問一事誥一物小若毛甲而時脱有盡不能知者則號博學宏辭者當有罪矣私自恐懼憂若囚械後幸有中書長者曰此人不堪抹去之乃大快樂曰此後不能知東西左右亦不畏矣去年入南塲作判比於江淮選人正得不憂長名放耳新書選舉志髙宗緫章二年司列少常伯裴行儉始設長名牓引銓注法按此書所言則義山兩應科目皆在尉𢎞農之前舊書云既為𢎞農尉㑹昌二年又以書判㧞萃誤也尋復啟與曹主求尉於虢舊書本傳釋褐祕書省校書郎調補𢎞農尉實以太夫人年髙樂近地有山水者而又其家窮弟妹細累喜得賤薪菜處相養活耳始至官以活獄不合人意輒退去將遂脱衣置笏永夷農牧㑹今太守憐之催去復任新書本傳以活獄忤觀察使孫簡將罷去㑹姚合代簡諭使還官逕使不為升斗汲汲疲瘁低儽耳然至於文字章句愈帖息不敢驚張嘗自呪願得時人曰此物不識字此物不知書是吾生獲忠肅之謚也而吾子反殷勤如此者豈不知耶豈有意耶不知則可有意則巳虚矣然所以拳拳而不能忘者正以往年愛華山之為山而有三得始得其卑者朝髙者復得其揭然無附著而又得其近而能遠思欲窮搜極討灑豁襟抱始以往來番番不遂其願間者得李生於華郵為我指引巗谷列視生植僅得其半又得謝生於雲臺觀暮留止宿旦相與去愈復記熟後又復得吾子於邑中至其所不至者於華之山無恨矣三人力耶今李生巳得第而又為老貴人從事雲臺生亦顯然有聞於諸公間吾子之文粲然成就如是我不負華之山而華之山亦將不負吾子之三人矣以是思得聚㑹話既往探歴之勝至於切磋善惡分擘進趨僕此世固不待學奴婢下人指誓神佛而後已耳吾子何所用意耶明日東去既不得面寓書惘惘九月三日𢎞農尉李某頓首傳, SBCK: 寐}
