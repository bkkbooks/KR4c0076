  - {type: variant, offset: 10659, length: 0, content: '', SBCK: 第五􅀕文代李􅀇為京兆公􅀕䔥侍􅀰文年月日惟􅂕􅀓芳華胄禀慶􅂕源漢朝輔相之流輝梁室帝王之遺懿克生俊徳彰我休期髙表百尋澄波萬頃及春闈献藝㑹府試才騏􅂹出塵蛟龍得水頓纓而駑駘盡丧乗氣而鱉蜃皆空憑􅇒逺天􅉜蹀長道是􅀅筮仕光乎縉紳侯國􅀙知大朝就選祕寳冝陳于東序朱􅌧必䧏于上玄錦帳而居青縑以覆建禮推盡瘁之績朙灮多伏奏之勤亦既遷荣乃司論駁髙居靑􅃈封還􅂵泥使眀時無失政之譏大􅀖無不便之詔暫辭朝籍徃分郡符借冦莫􅀙徴黄甚急方将啟乎良友進彼令人志豈爱身誓􅀅許國不謂􅃠踈猶漏斯文未康作礪為塩正俟理􅊭之運依城慿社深懐剪㓕之餘上蔽聪眀内求媟近故鴻猷不淂而叶賛睿化莫可以輔成藐是流離有窘陰雨嗚呼令惟逐客誰􅂧上書獄以党人但求俱死銜􅁈既徃吞恨􅀌居目断而不見長安形㽞而逺託異國屈􅊭忠而􅀗罪賈􅁩夀兮不長才易炎凉遂分今昔粤自東蜀言旋上京郭㤗墓􅁁空多㑹塟鄧攸身後不見遺􅀌信隂隲之莫知亦生人之極痛某䓁頃同班列􅀗奉周旋分結死生地兼族􅀋依仁既切慕徳方􅀷始驚南浦之悲俄軫下泉之訃今則年良月吉筮恊龜􅀙顧埋玉之難追歎焚芝之何及牲牢粗潔酒醴非多􅂓寫丹誠以申永訣爲綘郡公􅀕宣武王尚書文伏惟曽搆髙基徃修峻址俯爲明時載生竒士杜林􅃇族夲富文理楊惲外甥素多圖史朱檻有􅁉括羽成美逸走䡖従東之道巨背狭圖南之水匡生明習董氏精専魯壁墜簡汲冡遺編坐􅁯流麥出記懐鉛淹中莫敵稷下誰先朝有曲臺時推奥學明博士之髙選資衆儒之先􅁴殷周損益䕫夷禮楽既淂根源盡除蹖駮粉闈假道諫署􅀭輝吾寜訐訕時好依違周舉上章唯求主悟賈生草䟽豈畏人非用之則至舎之則歸旋領藩符俄司國計鋤革煩冗修眀課苐鄙晋室之鬻綀小漢朝之造幣前籌未借歛笏還家􅂯北非罪三黜何嗟淮掦勁兵頴水豪俗既佩新印仍推􅃇轂杜當陽何嘗跨馬雄士争推􅀕征虜不廢投壷師人自睦夷門地古梁􅁐藩雄雙旌大斾二矛重􅃓無忌御車惟求􅀮者相如謝病乃慕髙風方􅀅副帝注心􅀙時大願率周廟之奔走搃漢庭之議論人之不幸今也則亡荘子孰分其䰣魉秦醫莫捄其膏肓㕍沼波瀾空聞怨咽􅇠園臺榭祇具􅂽凉某􅀗顧尤深䝉知甚早公昔分茅愚嘗視草于劉向論思之時賛孟舒長者之號及兹出守寔介親隣音徽継好寤寐依仁嘗期異日克奉清塵何言永慟属此佳辰訃哀如昨歸輙攸遵林薄莾蒼川原隠轔想諸􅁑之旗鼓空還􅃇壘念伯喈之書籍巳付何人侯舘攸開丹旛遽至瞻望衛幕連綿秦畤􅀉算申訣緘詞寫意終阻願于親躬徒加哀于殄瘁嗚呼哀㢤尚饗為濮陽公􅀕太常崔丞文年月日惟􅂕㤗岳繁祉安平望族潤地􅀔于長源搆堂基于修􅅢藍田之産宜有良玊徂徕之松冝無凡木昔我待子松玊之間兾}
