  - {type: variant, offset: 1, length: 0, content: '', SBCK: 杜齊名者少願僑扎交貺者稀故􅀎􅀿是昌時媚于天子憲章皇極爕理􅀇穹燭耀家聲粉餙國史牟帝典之灝灝噩噩遵王道之蕩蕩平平而又不節怨嗟知進憂亢張良竟􅁛多病王充方務頥神無頴陽之善田乏好畤之巨産何曽之食既去虞悰之鮓方嘗􅁨其厚味有爽和氣肴薮無任琴鶴有餘成萬古之良相為一代之髙士繄尔来者景山仰之某昔者左曺每事先帝雖詭辭望利不接于話言而申義約文庶窺乎風彩代天之言既集蟠地之樂難忘盖属才華用以為序以鄒衍之迃恠􅀅穎嚴之淺近忽焉承命何所措詞五嶺幽遐八桂森爽莫逢博約寕遇切磋䖏无價之埸率然占玉登不枯之岸粗尔論珠雖嘗有意焉亦不知量也某叩頭􅂯拜上前題改定啇隐之作}
