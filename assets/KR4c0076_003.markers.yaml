  - {type: variant, offset: 18121, length: 0, content: '', SBCK: 為濮陽公檄劉稹文足下前以肺肝布諸簡素仰承復命猶奉技詞夫豈告者之不忠抑乃聼之而未審擇福莫若重擇禍莫若􅁿一去不廽者良時一失不復者機事噫嘻執事誰与為謀延首北風心焉如灼是以􅂯陳禍福用釋危疑言不避煩理在易了丁寕懇欵至于再三者誠以某與先太師相國俱沐天光共為藩后昔為與國今則親隣而大年不登同盟未至飯貝才畢禭衣莫陳乃睠後生遽乖先訓遷延朝命迷失臣聀不思先􅂖之忠􅀅覆欒書之族此僕􅀠之所共惋児女之􅀁同悲况某擁莭臨戎援旗誓衆封疆甚邇音㫖猶存忍欲賣之以為巳功間之以開戎役􅀅祛未寤欲罷不􅀎􅂅思苦口之言以定束身之計昔先太尉相公常蹈􅅍􅀖不􅀙逆命翻身歸國全家受封居韓之西為國之屏弃代之際人情帖然太師相公早副軍牙乆􅀙征斾事君之莭已著居丧之禮又彰故乃奨其象賢仍以􅃇服納聀貢賦十五餘年于我唐為忠臣于劉氏為孝子人之不幸天亦難忱才加壮室之年奄有壊梁之歎主上􅀷閔義烈是䧏􅄖恩盖􅀅顕􅁕下之門為列藩之式不欲劉氏有自立之帥上党為辜恩之軍俾之還朝以聴後命其義甚著其恩莫加昨者秘不􅀤丧已踰一月安而拒詔又歴数旬秘丧則于孝子未聞拒詔則于忠臣已失失忠于國失孝于家望此用人由兹保族是亦坐薪言㤗巣幕云安智士之所寒心謀夫之所齚舌矧于僕者得不動心窃計足下之懐執事之事論當以趙氏􅀓子魏氏襲侯欲以逡廵希恩顧望謀立耳夫事殊者趣異􅀔别者跡睽胡不度其始而議其終搴其􅂠而尋其實􅂅為足下一一而陳之趙魏二侯于其先也親則父子于其人也職則副戎賞罰得以相􅂙恩威得以相抗義􅂋事順故朝廷推而與之今􅁕下之于太師也地則猶子職非副戎賞罰未嘗相􅂙恩威未嘗相抗稽丧則于義爽拒詔則于事乖比趙魏二侯信事殊而􅀔别矣此施之于趙魏則為継代象賢之美施之于足下則為自立擅命之尤得失之間其理甚白又計􅁕下未必不恃太師之好賢下士重義䡖財吳國之錢徃徃而有梁園之客比比而来􅀅依為墙藩託為羽翼使之謀取使以数求細而思之此又非計山髙則祈羊自至泉􅀷則沈玉自来見􅃹子已立然後人歸身正然後士附語有之曰政􅅍則勇者不為閗徳薄則賢者不為謀故吴濞有奸而鄒陽去燕惠無徳而樂生奔晉􅃂大夫卒成分國之禍衛多君子孰救渡河之灾此之前車得不深鏡代憲四祖文明継興當時兾趙中山淮陽齊魯結連者㡬姓旅拒者㡬侯咸逆天用人背恩忘徳據指掌之地謂可逃刑􅀝親戚之私謂􅀎取信一旦地空家破首裂支分暗者不􅀎為謀明者固已先去悔而莫及末如之何先太尉與李洧尚書齊之宻戚楊太保與蘇肇給事蔡之懿親並㩀要地方州領精甲鋭卒及其王師戾止我武維揚則割地駈人以䧏送欵輸忠以入非不顧宻戚非不念懿親非不思恩非不懐惠直以順逆事迫死生實難􅀎与同其休不能與共其戚故也况足下大未侔齊蔡乆未及李吴􅀅以其人動于不義僕固􅂲夙沙之國縳主之卒重生彭􅃂之家不義之侯更出又計足下當恃太行九折之險部内数州之饒兵士尚强倉儲具􅁕謂得支久謀而使安危哉此心自弃何速昔李抱真相國用彼州之人破朱㴞子燕國困田悦于魏郊連兵轉戰綿􅀊經時而潞人夫死不敢􅂘子死不敢悲何者李相國奉討逆之命為勤王之師義着而誠順故也及盧従史釋丧就位賣隣兾功􅀅乗討伐之時欲肆􅇯邪之性計未就而神人巳怒事未立而兵衆巳離以萬夫之長困一卒之手驅轞北闕弃尸南荒而潞之人猶老者捫胸少者扼腕謂朝廷不即顕僇􅀷為失刑其故何哉以􅀙史不義不暱去安就危衆黜其謀下不為用故也二帥去就非因􅀓聞鳩杖之人鮐背之叟知其本末尚􅀎言之則太行之險固不為悖者之守数州之衆固不為邪者之徒此又其不􅁕恃也由此言之則何以名􅈥家聲何事捨君命何道求士死何計得人心僕所以對案忘飡推枕不寐為􅁕下惜為足下危而不知其所以然也况太師比者飬牛添卒畜馬訓兵旁招武幹之材中舉􅀅軍之令然而聴于逺近頗有是非雖朝廷推赤心弘大度然不逞者巳有乖異之説横議者屡興勃戀之疑人之多言亦可畏也誰為来者冝其弭之令足下背季父引進之恩失大朝文誥之令則是實先太師之浮議彰昭義軍之有謀為人姪則置叔父于不忠為人孫則敗乃祖于無後亦何以對燕趙之士見齊魯之人􅁘又計􅁕下旬日之前造次為慮今之追改具有後艱此左右者不明而咨詢之未盡也近者李尚書右董常侍重質之軰並親為賊􅀅拒我官軍納質于匪人効用于戎首乆乃来復尚䝉殊恩皆授郡符咸領旗鼓不能悉数厥徒實繁豈有足下藉两代之餘資委数萬之􅃇旅俛首聴命舉宗効誠則朝廷又豈以一日之稽遲片詞之疑異而致􅁕下于不測阻足下之後圖故事具存可以明騐幸請自求多福無辱前人䕶龍旐以歸洛師秉象笏以朝魏闕必當勛庸継代富貴通身無為隣道所資使作他人之福倘尚淹歸欵未整来軒戎臣鼓勇以争先天子赫斯而䧏怒金玦一受牙璋四馳魏衛壓其東南晋趙出其西北超距投石者数逾萬計科頭㦸手者動以千群兼駈挽虎之材官仍率射鵰之都督感義則日月􅀎駐舒憤則沙石可吞使兵用火焚城􅀅水灌魏趣邢郡趙出洺州介二大都之間是古平原之地車甲盡輸于此境糗粮反聚于他人恃河北而河北無儲􅀝山東而山東不守以兩州之殘莩抗百道之竒兵比累卵而未危􅀉􅀌拫于何所則老夫不佞亦有志焉願駈敢死之徒以從諸侯之末下飛狐之口入天井之関巨浪難防長飈易扇此際必當驚地底之鼓角駭樓上之梯衝丧貝躋􅁜飛走之期既絶投戈散地􅁅釘之望斯窮自然麾下平生盡忘􅃇愛帳中親戚即起他謀辱先祖之神􅂕為明時之哂􅀏静言其漸良以驚魂今故再遣素車重申丹素惟鍳前代之成敗訪厯事之賔僚思反道敗徳之難念順令畏威之易時以吉日蹈茲坦途勿餒劉氏之魂勿汙潞人之俗封帛増欷含毫抑酸延望還章用以上表成敗之舉惟慎圖之不宣河陽三城莭度使王茂元頓首}
