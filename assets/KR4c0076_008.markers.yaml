  - {type: variant, offset: 12240, length: 1533, content: 咨詢之未盡也近者李尚書祐董常侍重質之輩並親為賊將拒我官軍納質於匪人易比之匪人效用於戎首禮記子思曰毋為戎首久乃來復易七日來復尚䝉殊恩潘岳馬汧督誄明明天子旌以殊恩皆受郡符咸領旗鼓箋舊書李祐本蔡州牙將事吳元濟自王師討淮西祐為行營將為李愬所擒竟以祐破蔡擒元濟以功授神武将軍太和初遷檢校戸部尚書滄州刺史滄徳景節度使董重質本淮西牙将吳少誠之子壻也元濟悉發左右及守城之卒委重質拒裴度李愬既擒元濟重質單騎歸愬尋授鹽州刺史又遷左右神䇿及諸道劍南西川行營節度使檢校左散騎常侍不能悉數厥徒實繁書實繁冇徒豈有足下藉兩代之餘資委數萬之舊旅俛首聴命舉宗效誠則朝廷又豈以一日之稽遲片辭之疑異而致足下於不測沮足下於後至故事具存可以明驗幸請自求多福無辱前人䕶龍旐以歸洛師禮記飾棺君龍帷書朝至于洛師注洛師猶言京師秉象笏而朝魏闕禮記笏天子以珠玉諸侯以象大夫以魚鬚文竹士竹本象飾可也必當勲庸繼代富貴通身無為鄰道所資使作他人之福儻尚淹歸欵未整來軒戎臣鼓勇以爭先天子赫斯而降怒金玦一受左傳晉候使太子申生伐東山臯落氏衣之偏衣珮之金玦牙璋四馳周禮牙璋以起軍旅魏衛壓其東南晉趙出其西北見為河南表拔距投石者數逾萬計史記王翦傳翦使人問軍中戯乎對曰方投石超距集解徐廣曰超一作㧞索隠超距猶跳躍也漢甘延夀傳少為羽林投石抜距絶於等倫應劭曰投石以石投人也抜距即下超踰羽林亭樓是也張晏曰范蠡兵法飛石重十二斤為機發行三百步延夀有力能以手投之㧞距超距也科頭㦸手者動以千羣見為滎陽公表兼驅扼虎之材官漢李陵傳陵叩頭自請曰臣所将屯邉者皆荆楚勇士竒材劍客也力扼虎射命中師古曰扼謂捉持之也髙帝紀發巴蜀材官應劭曰材官有材力者張晏曰材官騎士習射御騎馳戰陳常以八月太守都尉令長丞㑹都試課殿最水處則習船邉郡將萬騎行障塞光武時省仍率射鵰之都督北齊書斛律光雲表射鵰正中其頸邢子髙曰射鵰手也號落鵰都督感義則日月能駐淮南子魯陽公與韓戰戰酣日暮援戈而麾之日為之反三舍拗憤則砂石可吞西都賦乃拗怒而少息漢霍去病傳㑹日且入而大風起沙礫擊面龍魚河圖蚩尤食沙使兵用火焚左傳衆仲對曰夫兵猶火也弗戢將自焚也城將水灌史記趙世家知伯率韓魏攻晉陽嵗餘引汾水灌其城城不浸者三版魏趣邢郡箋新書藩鎮傳從諫妻弟裴問守邢州有募兵五百號夜飛將自歸成徳軍趙出洺州箋藩鎮傳王釗守洺州送欵魏博軍分二大都之間是古平原之地車甲盡輸於此境􅀈糧反聚於他人恃河北而河北無儲謂三鎮從命見李貽孫啓倚山東而山東不守箋藩鎮傳天子慮稹起山東兵命𢎞敬犄角塞其道以數州之殘殍抗百道之竒兵謂八鎮之師見李貽孫啓比累卵而未危説苑晉靈公造九重臺孫息聞之求見曰臣能累十二博棊加九雞子其上公曰子作之孫息以棊子置下加九雞子其上公曰危哉寄孤根於何所見代彭陽公表則老夫不佞亦有志焉願驅敢死之徒以從諸侯之末謂王元逵何𢎞敬劉沔下飛狐之口見為舍人啓入天井之闗見代僕射表巨浪難防長飈易扇此際必當驚地底之鼓角駭樓上之梯衝後漢書公孫瓚與子續書曰袁氏之攻状若鬼神鼓角鳴於地中梯衝舞吾城上喪貝躋陵易震來厲億喪貝躋于九陵飛走之期既絶見為李貽孫啓投戈一作戎非㪚地揚雄解嘲叔孫通解甲投戈作君臣之儀漢英布傳兵法諸侯自戰其地為㪚地師古曰謂在其本地戀土懐安故易逸散散去聲灰釘之望斯窮魏略王凌自知罪重試索棺釘以觀太傅意太傅給之遂自殺徐陵書分請灰釘甘從斧鑊自然麾下平生漢李廣傳得賞賜輒分其戲下戯讀曰麾盡忘舊愛帳中親信魏志許禇傳徐他等謀為逆禇至下舍心動即還侍他等不之知入帳見禇大驚愕禇即擊殺他等太祖益親信即起他謀辱先祖之神靈為明時之哂笑靜言其漸良以驚魂今故再遣使車重申丹素惟鑒前代之成敗訪歴事之賔僚思反道敗徳之難書蠢兹冇苗反道敗徳念順令畏威之易時以吉日蹈兹坦途勿餒劉氏之魂左傳子文曰若敖氏之鬼不其餒而勿汙潞人之俗封帛增欷含毫益酸陸機文賦或含毫而邈然延望還章用以上表成敗之舉慎惟圖, SBCK: 視}
