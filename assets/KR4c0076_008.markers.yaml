  - {type: variant, offset: 4370, length: 840, content: 之間其猶槖籥乎索綯雨脚詩宵爾索綯不資畎澮書禹曰濬吠澮巨川將致倉箱見為汝南公表聊申信於澗毛庶通靈於水府神其抑揚蘭佩麾掉桂旗拍川后之肩郭璞遊仙詩左挹浮丘䄂右拍洪崖肩曺植洛神賦川后靜波川后河伯也攬波神之𬒮神當作臣荘子予東海之波臣也共來於此饗報留思賽曾山蘓山神文廣西通志蘓山在平樂府賀縣北髙數百文宋皇祐間知縣狄遵誨討冦於縣北十里山下夢蘓武神因禱焉師㨗請于朝即建廟祀武因名前有一石壁水從上滴下遇旱則禱雨於此又縣西十里有甑山舊通志瑞雲山在賀縣西十里髙千餘丈舊名幽山唐李刺史郃更名曰丹甑宋守鄧壁以此山多雲氣改今名上有泉注於池名曰仙池今按唐時已有蘓山則必非因皇祐建廟而得名曾山疑即甑山以甑為曽蓋傳寫之誤甑山有仙池蘓山有石壁水皆禱雨之所故文引湫泉仙室以為喻年月日賽於曽山蘓山之神惟神守在出雲禮記天降時雨山川出雲職惟通氣易山澤通氣果從望嵗左傳國人望君如望嵗焉載潤嘉生漢郊祀志故神降之嘉生應劭曰嘉穀也將申昭報之儀敢闕馨香之獻神其遐瞻惟岳廣納逰塵免揚少女之風勤咏曽孫之稼無令渥澤盡歸涇水之湫泉漢郊祀志湫淵祠朝那蘓林曰湫淵在安定朝那縣方四十里停水不流師古曰此水今在涇州界清澈可愛不容穢濁或諠汚輒興雲雨土俗亢旱每于此求之太平廣記靈應傳云涇州之東二十里有故薜舉城城之陽有美女湫廣衺數里其水湛然碧莫有測其深淺者郷人立祠於旁曰九娘子神嵗之水旱祓禱皆得啟請勿使威靈不一作下誤及歴山之仙室未詳王融序紀言事于仙室按水經注灤水出歴城縣故城西南泉源上奮水涌若輪俗謂之娥英水以泉源有舜妃娥英廟故也城南對山山上有舜祠山下有大穴謂之舜井書舜耕歴山亦云在此或曰仙室二字誤御覽引列仙傳云歴陽有彭祖仙窟請雨輒得我辭有激神倘聴焉賽白石神文靈川縣志白石湫在縣南三十五里李商隠詩龍移白石湫即此亦曰白石潭白石漈灕江自白石而下深潭廣浸與湘江埓潭上有白石鎮明一統志白石湫在府城北七里年月日賽於白石之神惟神載烜明靈克標懿號軒珠耀彩茌子黄帝遊于赤水之北登於崑崙之丘而南望還歸遺其𤣥珠于赤水尚非瑶疑作璿水之源荆璞流輝並見啓即是玉山之路山海經玉山是西王母所, SBCK: 耳錯形􅇎}
