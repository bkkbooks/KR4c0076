  - {type: variant, offset: 5211, length: 4446, content: 注山多玉石昨者俯憂旱嵗俾禱遺祠果能愛我大田貺余膏澤不俟于公之折獄漢書東海有孝婦養姑甚謹姑欲嫁之終不肯其後姑自經死姑女告吏孝婦自誣服于公以為此婦以孝聞必不殺也太守竟論殺孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守强㫁之咎黨在是乎太守因表其墓天立大雨無煩洛令之曝身水經注長沙耆舊傳云祝良字右卿為洛陽令嵗時亢旱天子祈雨不得良乃曝身階庭告誠引罪自晨至午紫雲沓起甘雨登降人為歌曰天久不雨烝人失所天王自出祝令特苦精符感應滂沱下雨敢命子男爰修蘋藻神其仰濟一作流天澤俯佑嵗功無萌可轉之心詩我心匪石不可轉也以負惟馨之禮周書黍稷非馨明徳惟馨尚饗賽龍蟠山神文明一統志龍蟠山在興安縣東十五里山下有石洞洞門數重逰者東燭而入水中有魚四足而有角人不敢傷恐致風雨年月日賽於龍蟠山之神惟神降治山川流一作濟非恩縣道龍蟠鳯蓋克懋於靈司蟻穴鸛巢詩鸛鳴于垤蟻穴見代僕射表式揚於利澤至誠有達昭報無虧神其一作威叱咤飛亷漢書韓信曰項王喑啞叱咤干入皆廢吕氏春秋風師曰飛亷鞭驅屏翳三齊畧記始皇作石橋欲過海㸔日出處有神人驅石下海石去不速神輒鞭之屏翳見上文尚一作向令吾土屢有豐年詩綏萬邦屢豐年不無行潦之羞以謝油雲之㑹左傳潢汙行潦之水可薦於鬼神可羞於王公封禪文自我天覆雲之油油甘露時雨厥壞可游賽陽朔縣名山文元和郡縣志陽朔縣北至桂州一百四十里開皇十年置取陽朔山為名山今在縣北門外本名陽海山亦名零陵山相近有龍頭山白鶴山西人山威南山畵山蓋皆陽朔之支峯也年月日賽於陽朔縣名山之神惟神受命上𤣥奠兹南服雲臺日觀華山記嶽東北有雲臺峰其山雨峰崢嶸四面懸絶上冠景雲下通地脈嶷然獨秀有若雲臺下有穴昔冇人入此穴出東方山行云經黄河底上聞流水聲日觀注見前逺讓於髙標蜀都賦陽烏廻翼乎髙標蓬㠀崑丘史記蓬萊方丈瀛洲此三神山諸仙人及不死藥在焉水經注三成為崑崙丘崑崙説曰崑崙之山三級下曰樊桐一名板松二曰𤣥圃一名閬風上曰増城一名天庭是謂天帝之居遐通於爽氣世説王子猷作桓車騎参軍王以手板柱頓云西山朝來致有爽氣峻若藏刀之嶺崇如倚劔之門水經注淶水又南逕藏刀山下層巖壁立直長干霄逺望崖側有若積刀鐶鐶相比咸悉西首劔門見前啓是宜銓管隂司拘囚異物為神仙之下府開龍虎之殊一作神非庭漢郊祀志望祀蓬萊之屬㡬至殊庭焉師古曰蓬萊中仙人庭也屬嵗不寜旱既太甚驅誠叠嶂託意通波洛神賦託㣲波而通辭果聞雷出地中易雷出地奮豫電流一作濟非巖下既兹霑足並見啓敢薦香集作馨芬願終如響之靈易其受命也如響無怠一作大孔明之鑒詩祀事孔明尚饗賽海陽神文海陽即陽海太平寰宇記陽海山在郡北一百七十里屬興安縣其山自零陵縣西南迤邐岡巒連亘不絶明一統志海陽山在興安縣南九十里舊名陽海山湘灕二水所自出山下有巖幽深行數百文至水泉處潤不盈尺其深叵測年月日賽於海陽之神頃傷多稼將困驕陽未聞一作逄玉女之披衣見上文空見土龍之矯首魏應璩與廣川長岑文瑜書土龍矯首於𤣥寺注淮南子土龍以祈雨式祈嘉霔果降明輝神其享彼蘭羞挹兹桂酒屈原九歌奠桂酒兮椒漿輔成於多黍多稌詩豐年多黍多稌助施一作調於好風好雨見上文庶厲業官以酬𤣥澤賽堯山廟文輿地紀勝引寰宇記堯山在靜江府城東北四十里圖經云堯山在水東明一統志按史傳堯封履不到蒼梧以西與舜山相對人慕堯舜之風因名堯祠宋張栻重修有記刻於石又龍池在堯山鄉民禱雨屢應嵗久湮塞宋經略張維重浚以石甃之年月日賽於堯山之廟伏以帝巡遐徼天作髙山詩天作髙山太王荒之既比敬於軒臺見為尚書状亦分功於農井見祭吕商州文是留遺廟以慰斯民昨者時雨忽愆秋陽稍亢永言嘉霔實自𤣥恩大驅蟠澤之龍見上文盡發濳泉之蜧一作介非淮南子黑蜧黒蛇也濳於神泉能致雲雨倉箱興詠將慶於農夫詩農夫之慶灌􅒓呈功不愆於豎集作壯子史記龎㳙曰遂成豎子之名敢兹昭報奠降明靈賽古欖神文古欖蓋橄欖樹之最大者王存九域志靜江府理定縣有橄欖山嶺表録異云橄欖樹身聳拔皆髙數丈其子深秋方熟有野生者子繁樹峻不可梯緣但刻其根下方寸許納鹽於其中一夕子皆自落按趙璘因話録南人長林中大樹謂之有神豈以古㰖歴年既久神所憑依故賽之邪年月日賽於古欖之神惟神爰因碩果易碩果不食遂啓靈祠𤓰美邵平且傳舊志漢蕭何傳邵平秦東陵侯秦破為布衣種𤓰長安城束𤓰美故世謂東陵𤓰自邵平始也李標朱仲亦茂前經潘岳閒居賦房陵朱仲之李善曰王逸荔枝賦云房陵縹李傳𤣥李賦乃有河沂黄建房陵縹青一樹三色異味殊名任昉述異記房陵定山有朱仲李園三十六所李尤果賦三十六園朱李是也昨者瘴暑為災油雲不起式存心禱慮作神羞神能感氣蜧泉傳祥鸛垤使宋生抒賦始悦於雄風髙氏讀書忽驚於㬥雨並見前化太甚旱為大有年春秋宣公十有六年冬大有年將見助於歡康敢忘懷於昭賽祭蘭麻神文廣西舊通志蘭麻山在桂林府永福縣西南四十里唐桂帥遇旱禱此其流為下漏水又冇木皮江遶山入大江年月日賽於蘭麻之神頃者杲日揚威融風扇㬥吕氏春秋東北曰融風禾乃盡偃書天大雷電以風禾盡偃人何以堪晉桓温傳樹猶如此人何以堪神能倐忽應時屈原九歌儵而來兮忽而逝逡巡布潤見上文雲旗直集九歌乘迴風兮載雲旗不資秦地之決渠漢溝洫志趙中大夫白公奏穿渠引涇水注渭溉田名曰白渠民歌曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨雨陣斜飛更甚成都之救火見上文永懷靈祐敢薦嘉肴神其與蕙同芳宋玉九辨以為君獨服此蕙兮羌無以異於衆芳為蓬扶直荀子蓬生麻中不扶自直勿一作苟虛嘉號以累豐年祭全義縣伏波神文新書地理志桂州全義縣本臨源武徳四年祈始安置大歴三年更名後漢馬援傳援字文淵扶風茂陵人建武十七年璽書拜援伏波將軍南擊交趾二十四年遣援征五溪蠻明年三月進營壺頭援中病而卒桂林府志伏波山在城中府治東北明一統志伏波山又名伏波巖突起千尺與獨秀山相望下有伏波廟祀漢馬援宋封忠顯佑順靈濟王按壺頭山在今湖廣辰州府沅陵縣東去全義尚千里伏波所不到俗慕賢者之名故取以名其山因立廟以祀之云年月日觀察處置使兼御史中丞鄭某謹遣全義縣令韋必復以酒牢之奠昭賽於漢伏波將軍新息侯馬公越城舊疆漢將遺廟一派湘水萬重楚山比潁川袁氏之臺悲同異日水經注汝水枝津世謂之大㶏水東南逕召陵縣故城南又東逕公路臺臺臨水方百步袁術所築也又東歴汝隂縣故城西北東入潁水方汝水周公之渡感極當時水經注汝水自成安縣故城北又東為周公渡藉承休之徽號而有周公之嘉稱也漢恩澤侯表武帝元鼎四年封姬嘉為周子南君再傳以罪棄市其弟延年紹封初元五年更封為周承休候嗚呼昔也投隙建功後漢公孫述傳論曰不能因隙立功以㑹時變因時立志馬援傳援嘗謂賔客曰丈夫為志窮當益堅老當益壯隗將軍坐談西伯棄去無歸後漢隗囂傳季父崔更始立而莽兵連敗謀起兵應漢咸謂囂素有名遂共推為上将軍論曰若囂命㑹符運敵非天力雖坐談西伯豈多嗤乎馬援傳囂遣長子恂入質援因將家屬隨恂入洛陽梁伯孫自降王姬雖來不起馬援傳援嘗有疾梁松來侯之獨拜牀下援不荅諸子問曰梁伯孫帝壻大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎以若畵之睂宇馬援傳援為人美須髪睂目如畫開聚米之山川馬援傳帝自西征囂至漆援因説囂有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑徃來分析曲折昭然扶風里中詎守錢而為虜馬援傳轉游隴漢間因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊按援扶風茂陵人徳陽殿下寜相馬以推工馬援傳援善别名馬於交阯得駱越銅鼔乃鑄為馬式還上之馬髙三尺五寸圍四尺四寸有詔置於宣徳殿下按藝文類聚引東觀漢記云詔置馬徳陽殿下義山本此不可謂誤悵望闗西趨馳隴右馬援傳來歙奏言隴西侵殘非馬援莫能定十一年夏璽耆拜援隴西太守使大中大夫來歙持節送援西歸隴右事嫂冠戴馬援傳敬事寡嫂不冠不入廬誡姪書成馬援傳兄子嚴敦並嘉譏議而通輕俠客援在交趾還書誡之龍伯髙之故人出言有所馬援傳誡兄子書曰龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曺效之公孫述之刺客相待何輕馬援傳囂使援奉書洛陽引見於宣徳殿援曰臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是鳶泊啓行馬援傳援謂官屬曰當吾在浪泊西里間仰視飛鳶跕跕墮水中蠻溪請往馬援傳武威将軍劉尚擊武陵五溪蠻夷深入軍没援因復請行銅留鑄柱廣州記馬援討平交阯於嶠南立銅柱以表漢之極界革誓裹尸男兒已立邉功壯士猶羞病死馬援傳援謂孟冀曰男兒要當死於邉野以馬革裹尸還𦵏耳何能卧床上在兒女子手中邪冀曰諒為烈士當如此矣灕湘之滸祠宇依然水經注灕水與湘水出一山而分源也湘灕之間陸地廣百餘步謂之始安嶠節越城嶠也栁開湘灕二水説二水本一水也自海陽山西北流至縣東五里分水嶺上始分為南北二水葢昔人以二水相離故命之曰相曰離後人又加水云豈獨文宣之陵不生刺草水經注魯縣泗水南有夫子冢皇覽曰弟子各以四方竒木來植故多諸異樹不生棘木刺草更若武候之壠仍有深松蜀諸葛亮傳亮遺命𦵏漢中定軍山因山為墳冢足容棺景耀六年魏鎮西將軍鍾㑹征蜀至漢川令軍士不得於亮墓所左右芻牧樵採水經注沔陽故城南臨漢水對定軍山諸葛亮之死也遺令𦵏於其山因即地勢不起墳壟唯深松茂柏攢蔚川阜莫如墓塋所在向我來思停車展敬一樽有奠一作典誤五馬忘歸及申望嵗之祈又辱有秋之澤書若農服田力稽乃亦有秋雲興柱礎淮南子山雲蒸柱礎潤電繞牆藩見為李貽孫啓何煩玉女之投壺方聞天笑神異經束王公與玉女投壺梟而脱誤不接者天為之笑開口流光今電是也不待樵人之取箭已見風迴孔靈符㑹稽記射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞常採薪得一箭頃有神人至問何所欲曰常苦若耶溪載薪為難願旦南風暮北風後果然敢忘黍稷之馨用報京坁之賜屬以時非行縣不獲躬詣靈壇應璩書躬自暴露拜起靈壇詞託煙波意傳天壤既謝三時之澤兼論千載之交勿負至誠以孤𤣥契檄為濮陽公檄劉稹文集作書是足下前以肺肝布諸簡素仰承復命猶事枝辭易中心疑者其辭枝夫豈告者之不忠抑乃聴之而未審擇福莫若重擇禍莫若輕一去不迴者良時一失不復者機事噫嘻執事誰與為謀延首北風阮籍正欲賦佇延首以極視心焉如灼是以再陳禍福用釋危疑言不避煩理在易了丁寜懇欵至於再三者誠以某與先太師相國俱沐天光並為藩后陸機詩發跡翼藩后昔云與國今則親鄰而大年不登見代安平公表同盟未至見為尚書状飯貝纔畢禭衣莫陳並見表乃睠後生遽乖先訓遷延朝命宋玉登徒子好色賦因遷延而辭避迷失臣職不思先縠之忠左傳晉人討泌之敗與清之師歸罪於先縠而殺之盡滅其族按先縠違命喪師不可謂忠疑當作先軫左傳僖三十三年狄伐晉及箕先軫免胄入狄師死焉狄人歸其元面如生將覆欒書之族左傳晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋此僕𨽻之所共惜一作惋兒女之所同悲況某擁節臨戎援一作㧞非旗誓衆後漢隗囂傳論曰囂援旗糺族封疆甚邇音㫖猶存忍欲賣之以為己功間之以開戎役將祛未寤欲罷不能願思苦口之言漢張良傳良曰忠言逆耳利於行毒藥苦口利於病以定束身之計晉王坦之傳垣之以為悵束身自歸而法外加罪昔先太尉相公常蹈亂邦不從逆命翻身歸國全家受封居韓之西為國之屏棄代之際人情帖然北史尉元傳東南清晏逺近帖然召箋舊書劉悟傳憲宗下誅李師道師道遣悟拒戰悟諸將謀曰天子所誅者司空一人而已悟與公等皆為所驅廹何如轉危亡為富貴于是擒師道以獻擢拜悟義成軍節度使封彭城郡王卒贈太尉太師相公一作國以早副軍牙久從征斾事君之節巳著居喪之禮又彰故乃一作前奬其象賢見為懐州表仍以舊服箋悟遺表請以其子從誎繼纉戎事敬宗寳歴二年充昭義節度等使納職貢賦五十餘年於我唐為忠臣於劉氏為孝子人之, SBCK: 蟄蟄哉}
