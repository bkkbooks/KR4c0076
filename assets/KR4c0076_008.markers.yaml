  - {type: variant, offset: 11231, length: 343, content: 後漢彭寵傳寵發兵反建武五年春寵獨齎在便室蒼頭子密等斬寵詣闕封不義侯又計足下當恃太行九折之險部内數州之饒見為河南表兵士尚强倉儲且足謂得支久謀而使安危哉此心自棄何速昔李抱真相國用彼州之人破朱滔於燕國困田悦於魏郊連兵轉戰緜嵗經時而潞人夫死不敢哭子死不敢悲何者李相國奉討逆之命為勤王之師義著而誠順故也箋舊書李抱真傳徳宗即位兼潞州長史昭義軍節度度支營田澤潞磁邢洺觀察使建中三年田悦以魏博反抱真與河東節度使馬燧屢敗悦兵時悦窘蹙朱滔王武俊皆反連兵救悦抱真外抗羣賊内輯軍士時朱滔悉幽薊軍應泚抱真以大義説武俊合從擊滔大破滔於經城以功加檢校司空卒贈太保及盧從史釋喪就位賣降冀功將乘討伐之時欲肆凶邪之性計未就而人神已怒事未立而兵衆已離以萬夫之長困一卒之手驅檻北闕棄尸南荒而潞之人猶老者捫胷漢書注師古曰捫摸也音, SBCK: ''}
