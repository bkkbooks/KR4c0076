  - {type: variant, offset: 468, length: 3900, content: 不惟許國之為亦聊以固吾圉也春祈秋報詩序噫嘻春夏祈穀於上帝也豐年秋冬報也所以輔農功周語無有求利於官以干農功今露白電收蟲坏水涸禮記孟秋之月凉風至白露降仲秋之月雷始收聲蟄蟲坏戸殺氣浸盛陽氣日衰水始涸念時𤾉而時雨書曰肅時雨若曰乂時暘若将乃積而乃倉詩迺積迺倉敢以吉辰式陳常典神其保兹正直左傳内史過曰神聦明正直而壹者也歆彼馨香左傳季梁曰所謂馨香無讒慝也聿念前修勿虧明鑒昔房豹變樂陵之井味北史房豹字仲幹河清中遷樂陵太守郡瀕海水味多鹹苦豹命鑿一井遂得甘泉遐邇以為政化所致任延易九真之土風後漢循吏傳任延字長孫南陽宛人詔徴為九真太守初平帝時漢中錫光為交阯太守化聲侔于延嶺南華風始於二守焉豈獨人謀抑由㝠助今猶古也神實聴之為安平公兖州祭城隍文年月日致祭於城隍之神四民攸居是分都邑五兵未息周禮司兵掌五兵五盾漢吾丘夀王傳古者作五兵注謂矛㦸弓劍戈爰假金湯漢蒯通傳金城湯池不可攻也惟神受命上𤣥守職兹土擁長雲之壘鮑昭蕪城傳崪若㫁岸矗似長雲提却月之營魏志馬超攻冀城楊阜使弟岳於城上作偃月營南史帝遣白直隊主丁旿於河北為郤月陣主張威靈荘子孰主張是彈壓氛祲見為鹽州状某方宣朝㫖來總藩條帷一作帳中之列一作位既安幕内之籌敢失並見前神其守同石堡新書地理志鄯州鄯城縣南隔澗七里有天威軍軍故石堡城䕶等玉闗見代安平公表長令崒若㟁焉無使復于隍也易城復于隍為懷州李使君祭城隍神文年月日致祭於城隍之神某謬蒙朝奨叨領藩條熊軾初臨虎符適至並見表敢資靈於水土冀同固於金湯况彼潞人實逆天理因承平之地以作巢窠敺庸一作康樂之民周禮小行人職曰共康樂和親安平為一書以為蟊賊左傳晉侯使吕相絶秦曰帥我蟊賊以來揺蕩我邉疆一至於此其能久乎惟神廣扇威靈劃開聲勢俾犯境者望飛烏而自遁左傳叔向告晉候曰城上有烏齊帥其遁此滔天者書象恭滔天聴唳鶴以虛聲晉載記苻堅淝水之敗其走者聞風聲鶴唳皆以為晉兵崇墉載嚴巨塹無壅今來古往尸子徃古來今曰雷永無川竭之因周語伯陽甫曰山崩川竭亡國之徴也萬歳千秋阮籍詩千秋萬歳後莫有土崩之勢史記秦始皇紀土崩瓦解神其聴之無易我言為舍人絳郡公鄭州禱雨文年月日鄭州刺史李某謹請茅山道士馮角禱請於水府真官木華海賦水府之内極深之庭晉樂府神靈亦道同真官今來下伏以旱魃為虐詩旱魃為焚虐如惔如應龍不興山海經為應龍之状乃得大雨困杲日於詩人詩杲杲日出苦宻雲於易象易宻雲不雨生物斯瘁民食攸艱書暨稷播奏庶艱食鮮食某叨此分憂俯慙無政爰求真侣䖍禱隂靈減哺表勤魏武帝樂府周公吐哺天下歸心褰帷引咎見為滎陽公表伏乞下通滎播水經注左傳襄公十一年諸侯伐鄭西濟於濟禭京相璠曰鄭地言濟水滎澤中北流至垣雍西與出河之濟㑹南去新鄭百里斯蓋滎播河濟往復逕通矣上達天潢史記天官書西宫咸池曰天五潢合為膏澤之原用息藴隆之患詩藴隆蟲蟲其於效信或敢逡巡漢司馬相如傳逡巡避席㬥露託詞後漢獨行傳諒輔廣漢新都入仕郡為五官掾時夏大旱輔乃自暴庭中須臾澍雨世稱其至誠焦勞結慮見上表泉間侯氣見上文樹杪占風晉管輅傳輅曰今夕當大雨樹上已有少女㣲風若少女反風其應至矣惟望玉女之披衣㠪采安成記萍鄉西城津有玉女岡天當雨輒先漏五色氣於石間俗呼為玉女披衣敢駭商羊之鼔舞家語齊有一足之鳥飛集殿前舒翅而跳孔子曰此鳥名曰商羊且謡曰天将大雨商羊鼓舞果大霖雨竊希𤣥感晉吕光傳光曰吾聞李廣利精誠𤣥感聴察丹誠隋書觀徳王雄讓表云特鑒丹誠賽舜廟文太平寰宇記桂州臨桂縣虞山下有皇潭言舜南巡遊此因名今訛曰黄潭亦曰舜廟在焉桂林舊志虞山在臨桂縣東北五里一名舜山左臨灕水後臨黄潭其下有洞宋張栻名之曰韶音洞南有平原舜祠在焉明一統志舜山層巖臨江有舜祠唐韓雲卿為記刻于崕石宋張栻重修年月日昭賽虞舜之祠伏以帝狩南荒一作方禮記舜崩於蒼梧之野蓋三妃未之從也注南巡而崩史記舜踐帝位三十九年南巡狩崩於蒼梧之野𦵏於江南九疑是為零陵神留下土詩禹敷下土方翠華不返司馬相如上林賦建翠華之旗積怨望於他年大麓不迷書納于大麓烈風雷雨弗迷烜威靈於終古屈原九歌長無絶兮終古比憂嘉種詩誕降嘉種少冐愆陽左傳冬無愆陽夏無伏隂抗簡陳詞離騷跪敷袵以陳辭兮潔樽引咎左傳臧孫命北面重席新樽絜之果蒙慿離掣電跨㢲揚風易離為電㢲為風布沾渥於九臯詩既優既渥既沾既足又鶴鳴于九臯起焦枯於一瞬淮南子十日並出草木焦枯敢布瑶席屈原九歌瑶席兮王瑱輒事蘭羞九歌蕙肴蒸兮蘭藉帝其罷奏南琴見為滎陽公表停吹西琯舜時西王母獻白玉琯故謂之西琯詳見前使東皇太乙九歌東皇太乙注太乙神名祠在楚東以配東帝故云東皇兼預於靈遊漢郊祀歌九重開靈之斿俾山鬼江婓九歌山鬼注家語木石之怪䕫㒺兩豈謂此耶吴都賦江妃于是往來婓即妃字無藏於沴氣後漢五行志説云氣之相傷謂之沴庶将善政以奉明輝賽越王神文漢兩粤傳秦二世時南海尉任囂病且死召龍川令趙佗行南海尉事囂死佗即聚兵自守秦已滅佗即擊并桂林象郡自立為南粤武王年月日賽於越王之神惟靈輝一作耀焯殊姿抑揚竒表見端午啓秦魚既爛公羊傳梁亡自亡也魚爛而亡史記秦本紀魚爛不可復全則聊帝南荒漢兩粤傳髙后時南粤王趙佗自尊號為南武帝按尉佗稱帝在髙后時此以為秦漢之際小誤漢鹿有歸漢蒯通傳秦失其鹿天下共逐之則稱臣北闕漢髙帝紀七年蕭何治未央宫立東闕北闕十一年立南海尉它為南粤王使陸賈即授璽綬它稽首稱臣覽英雄之載籍史記伯夷傳夫學者載籍極博信王霸之朋遊言念遺祠猶存屬一作鹿誤邑尚興甘雨以救公田詩以祈甘雨又雨我公田敢陳沼澗之毛左傳澗谿沼沚之毛可薦於鬼神用報京坁之積詩曽孫之庾如坁如京神其永司兹土長庇吾人福佑柔良揚雄長揚賦受神人之福佑驅除疫一作疾癘史記適足以資賢者為驅除難耳馬融廣成頌召方相驅癘疫吳朱桓傳往遇疫癘榖食荒貴今來古往潘岳西征賦古徃今來邈矣悠哉常教威著越城元和郡縣志故越城在桂州全義縣西南五十里漢髙后時遣周竈擊南越趙佗踞險為城竈不能踰嶺即此按全義今為興安縣在桂林府東北一百五十里萬嵗千秋勿使魂歸真定漢兩粤傳南粤王趙佗真定人也文帝元年為佗親冡在真定置守邑嵗時奉祀神乎不昧來鑒斯言為中丞滎陽公桂州賽城隍神文惟大中元年嵗次丁卯六月甲午朔十四日丁未都防禦觀察處置等使桂州刺史兼御史中丞鄭某謹遣登仕郎守功曺參軍陸佚一作秩以庶羞之奠祭於城隍之神夫大邑聚人通都設屏將英集作比按此字當衍雄走集左傳險其走集注走集邉竟之壘辟辟音壁必假髙深不惟倚仗風雲兼用翕張神鬼某初蒙朝奬來佩藩符既禦冦於西原易不利為冦利禦冦亦觀風於南國禮記太史陳詩以觀民風始維畵鷁將下伏熊並見前屬楚雨蔽空湘雲塞望晦我中軍之鼓左傳殖綽郭最皆衿甲面縳坐于中軍之鼔下齊語有國子之鼓有髙子之鼓有中軍之鼓濕予下瀨之師漢武帝紀元鼎五年甲為下瀨将軍下蒼梧臣瓚曰瀨湍也吳越謂之瀨中國謂之磧伍子胥書有下瀨船遂以誠祈果䝉神應速如激矢見為張周封啓勢等却河見為滎陽公表及兹報薦之期敢怠馨香之禮神其干霄作峻蜀都賦干青霄而秀出習坎為防易習坎王公設險以守其國合𤇺櫓以保民漢賈誼傳注文頴曰邉方備胡冦作髙土櫓櫓上作桔臯桔臯頭兠零以薪草置其中有冦即火燃舉之以相告曰𤇺陸機洛陽記洛陽城周公所制城上百步有一樓櫓外有溝渠劉熈釋名櫓露也露上無覆屋也𨗳川塗而流惡周禮大川之上必有涂焉左傳韓獻子曰有汾澮以流其惡使言言堅壘一作壁詩崇墉言言侔地道以無疆易安貞之吉應地無疆活活深溝詩河水洋洋北流活活如井徳之不改易改邑不改井勿違丘禱見論語以作神羞書無作神羞尚享賽靈川縣城隍神文新書地理志桂州靈川縣龍朔二年析始安置在今桂林府北五十里年月日賽於靈川縣城隍之神髙壘深溝左傳臾駢曰秦不能支請深壘固軍以待之用資固䕶蕪城賦觀基扄之固䕶興雲渫雨張衡南都賦朝雲不興而潢潦獨臻魏都賦蓄為屯雲渫為行雨諒俟威靈惟神能感至誠將成大稔左傳不可以五稔注稔熟也逐清泠之耕父不使揚光東京賦囚耕父于清泠南都賦耕父揚光於清泠之淵注有神耕父處豐山常游清泠之淵見山海經廻沮澤之蟠龍皆令灑潤蜀都賦濳龍蟠於沮澤應鳴鼓而興雨式陳㣲報願鑒惟馨賽荔浦縣城隍神文新書地理志桂州有荔浦縣在今平樂府西七十五里年月日賽於荔浦縣城隍之神嗟我疲民每虞艱食寒耕熱耨始望於秋成爾雅秋為收成鑠石流金淮南子大熱鑠石流金火弗為益其烈㡬傷於嵗事禮記王制曰休老勞農成嵗事逺資靈顧式布層隂江淹詩日落長沙渚層隂萬里生無煩管輅之占不待欒巴之噀神仙傳欒巴為尚書正朝大㑹巴獨後到又飲酒西南噀之曰臣本縣成都市失火臣故因酒為雨以滅火詔即驛問果如巴言竊陳薄奠用答豐年神其據有髙深主張生植同功田祖詩田祖有神秉畀炎火比義一作議非雨師廣雅雨師屏醫無假怒於潛龍易潛龍勿用勿縱威於虐魃守兹縣邑富我京坁賽永福縣城隍神文新書地理志桂州永福縣武徳四年析始安置在今桂林府永寜州東南八十里年月日賽於永福縣城隍之神夫考室立家詩序斯干宣王考室也左傳師服曰天子建國諸侯立家先立戸竈禮記王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戸曰竈又庶士庶人立一祀或立户或立竈聚人開邑首起城池易何以聚人曰財固有明靈降而鑒治惟神克揚嘉霔廣育黎民聊為一作薦茨梁詩曽孫之稼如茨如梁少申肴醖神其節宣四氣扶佑三時勿使畢星但稱於好雨書星有好風星有好雨注好風者箕星好雨者畢星無令田祖獨擅於有神永歆蘋藻之誠長挾金湯之勢賽城隍神文年月日賽於城隍之神惟神據雉堞以為雄𨗳溝池而作潤果成飄注以救惔焚敢恡斯牲詩靡愛斯牲用報嘉種神其永通靈感長懋𤣥功晉劉𢎞等傳論曰輔相𤣥功𨗳楚子之餘波左傳晉公子對楚子曰其波及晉國者君之餘也霑晉國之膏雨左傳季武子曰小國之仰大國也如百穀之仰膏雨焉苟能不昧報亦隨之賽北源神文北源者湘灕二水之源也漢地理志零陵縣陽海山湘水所出北至酃入江水經注湘水出始安陽海山湘灕同源分為二水南為灕水北則湘川元和郡縣志湘水出全義縣東南八十里陽朔山下按陽朔即陽海也在今興安縣東南九十里全義直桂之北故號為北源年月日賽於北源之神惟神雖臨南服實號北源湘浦降神近驚於騷客九歌湘夫人帝子降兮北渚滮池浸稻逺協於詩人詩滮池北流浸彼稻田果能槖籥風頭老子, SBCK: ''}
