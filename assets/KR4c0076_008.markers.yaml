  - {type: variant, offset: 10069, length: 1101, content: 至王承元入朝明年王庭奏反傳六世有州四魏博傳五世至田𢎞正入朝十年復亂更四姓傳十世有州七欲以逡巡希恩顧望謀立耳夫事殊者趣異勢别者跡睽故度其始而議其終搴其華而尋其實願為足下一一而陳之趙魏二候於其先也親則父子於其人也職則副戎賞罰得以相參恩威得以相抗朝廷推而與之今足下之於太師也地則相近職非副戎賞罰未嘗相參恩威未嘗相抗秘喪則於義爽拒詔則於事乖比趙魏二候信事殊而勢别矣此施之於太師趙魏則為繼代象賢之美施之於足下足下則為自立擅命之尤得失之間其理甚白又計足下未必不恃太師之好賢下士重義輕財吳國之錢往往而有漢吳王濞傳吳有豫章郡銅山即招致天下亡命者盜鑄錢梁園之客比比而來漢梁孝王傳孝王築東苑方三百餘里廣睢陽城七十里招延四方豪傑自山東遊士莫不至將倚以為牆藩託以為羽翼使之謀取使以數求細而思之此又非計山髙則羝當作祈羊自至泉深則沈玉自來管子山髙而不崩則祈羊至矣淵深而不涸則沈玉極矣已立然後人歸身正然後士附語有之曰政亂則勇者不為鬭徳薄則賢者不為謀故呉濞有姦而鄒陽去漢鄒陽傳云陽與嚴忌枚乘俱事吳吳王隂有邪謀陽奏書諫吳王不納其言于是鄒陽枚乘嚴忌皆去之梁從孝王游燕惠無徳而樂生奔戰國䇿惠王即位用齊人反間疑樂毅而使騎劫代之將樂毅奔趙趙封以為望諸君晉寵大夫卒成分國之禍漢劉向傳昔晉有六卿世執朝柄終後六卿分晉衛多君子左傳吳公子札適衛曰衞多君子未有患也孰救渡河之烖左傳狄人伐衛衛懿公夜與國人出狄入衛遂從之又敗諸河此之前車得不深鏡晏子春秋諺曰前車覆後車戒代憲四祖文明繼興當時燕趙中山淮陽齊魯箋新書藩鎮傳論曰趙魏燕齊同日而起梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是連結者㡬姓南史魯悉逹傳王琳連結于齊旅拒者㡬候後漢馬援傳援曰㸃羌欲旅距咸逆天用人背惠忘徳據指掌之地後漢岑彭傳辛臣諫田戎曰洛陽地如掌耳謂可逃刑左傳有罪不逃刑倚親戚之私左傳親戚為戮謂能取信一旦地空家破首裂支分闇者不能為謀明者固以先去悔而莫及末如之何先太尉與李洧尚書箋舊書李納傳納從叔父洧以徐州歸順納以彭城險阨又怒洧背宗乃悉兵圍之旋加洧檢校戸部尚書納卒子師道逓相襲職詳上文齊之密戚齊謂李師道楊太保與蘇肇給事箋舊書吳元濟傳元濟少陽長子也先是少陽判官蘓兆楊元卿及其將侯惟清常同為少陽畫朝覲計及元濟自領軍素不便兆縊殺之朝廷贈蘇兆以右僕射楊元卿先奏事在京師得盡言經畧淮西事於宰相李吉甫楊元卿傳元卿每與少陽言詢以大義乃為凶黨所搆賴節度判官蘓肇保持故免元卿潜奉朝廷元濟繼立元卿即日離蔡元卿妻陳氏并四男並為元濟所殺同圬一射垜蘇肇以保持元卿亦同日遇害蔡之懿親蔡謂吳元濟並據要地方州領精甲鋭卒及其王師戾集作涖非止我武維揚則割地驅人以降送欵輸忠以入非不顧密戚非不念懿親非不思恩非不懷惠直以逆順是逼死生實難能與, SBCK: ''}
