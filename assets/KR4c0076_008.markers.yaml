  - {type: variant, offset: 13850, length: 5, content: 太倉箴注云, SBCK: 失字壊句不見本意者進不敢問退不􅀎觧黙黙巳已不復咨歎故自}
  - {type: variant, offset: 13859, length: 4, content: 十月險哉, SBCK: 後雖尚􅀿舉除凶書及人慿倩作牋啟銘表之外不復作文文尚不復作况復能學人行卷􅁘時獨令狐􅀘闕最相厚􅀊嵗為冩岀􅃇文納貢院既得引試㑹故人夏口主舉人髙鍇時素重令狐賢明一日見之于朝揖日八􅀰之友誰最善綯直進曰李啇􅀮者三道而退亦不爲薦託之辭故夏口與及第然此時實于文章􅈈退不復細意經营􅄒作乃命合爲夏口門人之一数耳爾後兩􅀿科目者又以􅀿舉時与一裴生者善復與其挽拽不得已而入耳前年乃爲吏部上之中書歸自驚笑又復懊恨周李二學士以大法加我夫􅀁謂博學宏詞者豈容易㢤天地之灾變盡觧矣人事之興廢盡究矣皇王之道盡識矣聖賢之文盡知矣而又下及䖝豸草木􅄦神精魅一物已上莫不開㑹此其可以當博學宏詞者邪恐猶未也設他日或朝廷或持權衡大臣宰相問一事詰一物小若毛甲而時脱有盡不􅀎知者則號博學宏詞者當其罪矣私自恐懼憂若囚械後幸有中書長者曰此人不堪抺去之乃大快樂曰此後不能知東西左右亦不畏矣去年入南埸作判比于江淮選人正得不憂長名放耳尋復啟與于曺主求尉于􅉑實以}
