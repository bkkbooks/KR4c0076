  - {type: variant, offset: 177, length: 290, content: 為神之姓名如鎮江慶元寜國太平華亭蕪湖等郡邑皆以為紀信隆興贑袁江吉建昌臨江南康皆以為灌嬰是也陸游云唐以來郡縣皆祭城隍令世尤謹守令謁見儀在他神祠上社稷雖尊特以令式從事至祈禳報賽獨城隍而巳維大中元年嵗次丁卯八月甲午朔二十七日庚申桂州管内都防禦觀察處置等使正議大夫使持節桂州諸軍事守桂州刺史兼御史中丞上柱國賜紫金魚袋鄭某舊書輿服志髙祖給四品五品隨身魚飾以銀天授初改作龜袋三品已上飾以金四品以銀五品以銅神龍初内外官五品已上依舊佩魚袋郡王嗣王特許佩金魚袋謹遣直官攝功曺參軍文林郎守陽朔縣令荘敬質謹以㫖酒庶羞之奠祭於城隍之神濬洫崇墉左思魏都賦崇墉濬洫嬰堞帶涘所以固吾圉左傳鄭荘公曰寡人之使吾子處, SBCK: 與物共}
