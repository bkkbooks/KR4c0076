  - {type: variant, offset: 12101, length: 138, content: 乖異集作異圖之説横議者屢興悖惡之歎人之多言亦可畏也誰為來者宜其弭之今足下背季父引進之恩失大朝文誥之令周語祭公謀父曰有文告之辭則是實先太師之浮議彰昭義軍之有謀為人姪則致叔父於不忠為人孫則敗乃祖於無後亦何以對燕趙之士見齊魯之人耶又計足下旬日之前造次為慮今兹追改懼有後艱此左右者不明, SBCK: 黙}
