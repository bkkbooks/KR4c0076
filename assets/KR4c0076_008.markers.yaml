  - {type: variant, offset: 12012, length: 0, content: '', SBCK: 枉直女笄上車夫人不知其貞汚此于親親不能無異􅀔也親者尚爾則不親者􅁖望其無隙㢤故近世交道㡬丧欲盡􅁕下與僕于天獨何禀當此丗生而不同此世每一㑹面一分散至于慨然相執手嚬然相慼决然相泣者豈于此丗有他事㢤惜此世之人率不􅀎如吾之􅀁楽而又甚懼吾之徒孑立寡䖏而與此世者蹄尾紛然蛆吾之白擯置􅏺誹襲不出意使後日有希吾者且懲吾困而不能堅其守乃舎吾而之他耳􅁕下知與此丗者居常紿于其黨何語㢤必曰吾􅁖市道嗚呼此軰眞手掻鼻皻而喉􅎪人之灼痕為􅋪者市道何肻如此軰邪今一大賈坐墆貨中人人往須之甲淂若干曰其贏若干丙曰吾索之乙得若干曰其贏若干戊曰吾索之既与之則欲其蕃不願其亡失口舌拜父母出妻子伏臈相見有贄男女嫁娶有問不幸丧死有致饋塟有臨送弔是何長者大人㢤他日甲乙俱入之不欺則又愈淂其􅀁欲矣回環岀入如此是終身欲其蕃不顧其亡失口舌拜父母益嚴出妻子益敬㐲臈相見贄益厚男女嫁娶問益豐不幸丧死饋贈臨送弔􅂘情益悲是又何長者大人者㢤唯是于信誓有大欺漫然後罵而絶之擊而逐之訖身而弗与通也故一市人率少于大賈而不信者此豈可與此丗交者等邪今日赤肝腦相憐明日衆相唾辱皆自其時之与􅀔耳時之不在􅀔之移去雖百仁義我百忠信我我尚不顧矣豈不顧巳而又唾之􅁕下果為市道何如哉今人娶婦入門母姑必祝之曰善相宜則祝曰蕃息後日生女子貯之幽房宻寝四隣不得識兄弟以時見欲其好不顧性命即一日可嫁去是宜擇何如男子属之邪今山東大姓家非􅀎違摘天性而不如此至于羔鶩在門有不問賢不肖健病而但論財貨恣求取是為事當其為女子時誰不恨及為母婦則亦然彼父子男女天性豈有大于此者耶今尚如此况他􅃕外人燕生越飬而相望相救抵死不相販賣㢤細而繹之真令人不愛此世而欲狂走逺颺耳果不知􅁕下與僕之守是邪非邪首陽之二百豈蘄盟津之八百吾又何悔焉千百年下生人之權不在富貴而在直筆者淂有此人􅁕下与僕當有所用意其他復何云云但當誓不羞市道而又不為忘其素恨之母婦耳啇􅀮􅂯拜與陶進士書去一月多故不常在故屡辱吾子之至皆不睹昨又垂示東岡記等数萹不惟其辞彩奥大不宜為冗慢無􅀔者􅀁窺見且又厚􅁓謹字如貢大諸侯卿士及前逹有文章積學者何其禮甚厚而所與之甚下􅁘始僕小時得劉氏六説讀之尝淂其語曰是非係于褒貶不係于賞罰禮樂係于有道不係于有司宻記之盖當以春秋法度聖人綱紀乆羡懐蔵不敢薄賤聨綴比次手書口詠非惟求以為巳而已亦}
