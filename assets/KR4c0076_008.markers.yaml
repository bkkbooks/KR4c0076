  - {type: variant, offset: 5, length: 7, content: 箋註巻八監察御, SBCK: 卷第四書序􅀓碑銘箴賦􅇎著上崔華州書中丞閣下愚生二十五年矣五年誦􅀴書七􅀊弄筆硯始聞故老言學道必求古為文必有師法常悒悒不快退自思曰夫所謂道豈古􅀁謂周公孔子者獨能邪盖愚與周孔同身之耳以是有行道不繋今古直揮筆為文不愛攘取經}
