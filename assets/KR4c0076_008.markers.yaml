  - {type: variant, offset: 6, length: 0, content: '', SBCK: 囿思託文林提􅂁于􅅸藝之塲班楊埽地鞠旅于无前之敵江鮑輿尸故矯枉則黄冶之賦興㳺道則知止之萹作詞窮體物律變登髙文星㽞伏于茟間綵鳯翺翔于夢􅂻此固談揚􅅸意倣效何階若某者徒用宗盟早塵清鍳而行藏遷貿岐路差池今􅀅抽寔吐誠推心叙欵緘猶未寫詞已失煩某爰自弱齡實標􅀌操寒郊映雪暑草捜萤雖有謝于天姿或無慙于力學􅁃持竒字陳􅁃持好爲竒字信未皆通敬禮小文頗常㽞意太和中敢楊微抱窃献短章方侯明誅忽䝉􅂧命荆州一紙河東百金叨延月旦之評長積竹林之戀竟以事􅀅願背蹇與身期離索每多交攀莫遂武􅁜􅀍病洛表求醫未及上言先䝉受代肩輿而至杜門以居蓬藋荒凉風霜迅厲今已稍痊美疢􅀗託休辰殷鈞體羸尚􅀎為郡馬卿疾罷猶可言文退無井臼之資進乏交朋之助是以徘􅆦軒幄託附緘封兾陳蔡之及門庶江黄之列㑹敢渝􅀌直仰累清光東浪􅀴年西颷結欷矢心佩賜畢命銜輝道阻且躋書不盡意金楹假䕃望同相賀之禽珠岸廽光庶及不枯之艸明懸肝膽唯􅀁爐錘干冐尊嚴伏用兢灼謹啟為舎人綘郡公上李相書某聞量力省躬典型之深㫖度材仕進聖哲之良規某雖甚愚頗嚮斯義属者謬圖仕進因藉時来伏值相公顧以外藩夙通矜契憫羊曇之未立早托謝家憐康伯之無歸常依王氏㧞于幽滯䖏以周行遂俾南憲中􅄗屡承闕乏内庭西掖比辱昇遷邁越時流塵汚中㫖恩渥非次性分難移徒當侍従之荣莫有論思之効竟使惧因福􅂈疾以􅁨成外雖全人中抱羙疢常􅂅青蒲􅅹懇􅂵殿披誠進退未聞􅂈累成積及正名綸閣収跡翰林尋願窃侯休旬拜伏䔥屏謝年昔之朝奨抒他日之私誠而機事且繁爕和少暇齋沭累至肝膓莫従旋属虜帳夷氛壺関伐叛綘􅄗北控有元戎大集之師鄭國東臨􅂈列鎮在行之衆任當調􅀤事属供須豈斯擇材皆在非㩀周旋三郡綿厯两霜頒宣條詔祗掦庙謨雖無咎悔亦乏殊尤今幸已四海無塵六州向化􅂕􅄗偃伯衢室歸尊是修明禮律之􅀄舉㧞俊賢之始而鄭之為地右臨梁苑左􅀝成臯比之列藩寔為劇郡山東望族㡬同屈景之強洛邑頑民常􅇎􅍉蒲之聚永言出牧豈易其人而又孔道􅀁因使車旁午迎送或闕則怨讟流詞舘餼稍求則聀司貽辱託之全器猶或難居矧在朽材寕宜乆䖏某伏思自随官牒遽忝恩荣位至圭符􅃂當金􅂵或筋骸無苦心志有餘即豈􅂅踞熊軾以告劳指隼旟而辭疾直以挕生寡妙舊恙無痊倘或形言惧塵清聴每朝昏改侯霧露潜威則或至問俗有違在公多廢坐為尸禄行有愧顔而又貪明盛之時有婚嫁之累未敢髙論止足直乞退休是以輙䟽情陳上干陶冶伏惟相公雲龍叶􅀿舟檝成功比屋可封期于屈􅃌一夫不􅀗固巳動心如䝉曲鍳􅀷情猥従志􅂅置之他所以遂其宜則吴楚列城江関别郡雖居隣佐亦委緝綏􅀗安病躬豈敢擇地猶希磨淬鉛鈍撫飬疲羸積以􅀊時少禆塵露伏惟試賜恩照圍减帶緩髪希弁傾窅然向風目極心往下情無任攀恋感激惶惧之至為綘郡公上李相國啟某少悲羈屑不承師友之親規晚學文章粗致郷曲之名譽謬汙官秩遂彯華纓握蘭清曺視草禁掖貪叨􅂈極憂責非寕早為寒退之侵頗染肺腸之疾自頃以􅂟雲結䕃宸極係心當就望以推誠于煎調而寡􅁉前􅀊伏䝉任使奉逺承明值朝廷興問罪之師原野有􅀫兵之餽綘城甚苦鄭邑非遥加之以降虜移鄊仍之以貴臣銜命飛挽之外􅀅迎實繁旁奉庙謀上尊詔㫖動繁調􅀤居劳撫安抱疾以臨為日斯乆伏幸奸兇克乂濡澤横流是大朝陟降之􅀄良冶埏鎔之始此郡路通四璄名冠六雄軒盖以来原野交錯萑蒲有聚武吏貽憂雖清時無杼軸之虞而常日有逋懸之賦必在假之賢守以属強材然後謡咏克興公私不廢豈可使某素兼疴恙夲乏良􅀎乆于是􅀖以主東道饋飱與薬甌並進假牒以公案相随含意不言貪荣是罪相公漢籌始運殷鼎􅀅調度材任官歸于至當存誠愛物决在無頗窃敢自託緘封逺干尊爼俯期恩意以保衰微且某運偶昌期年􅀄知命豈不􅂅臨劇郡稍兾荣途但以力有􅀁不任心有所不逮雖欲勉強寔􅁨敗傾彼吴椘偏鄊非舟車要路永言凋瘵亦藉緝綏倘特降􅄖容遥聞擬議則朽質有報恩之所羸軀収曠位之􅏺􅀫疢或痊理劇未晚伏惟試賜裁度向風披懇服義陳詞仰台曜以瞻輝望鴻鈞而竚惠干冐尊徳伏積兢惕謹啟為綘郡公上史舘李相公啟某啟伏以秉大鈞者以物得其􅀁為先執大化者以材適其任為急􅀅以致理在明命官使􅁿重合宜大小有􅁉然後人稱其聀聀無廢人此相公之所明知也某才術素寡聲光莫聞叨偶承平謬登華顕洎分符竹使􅅸藉金閨一授専城再易􅁅琯且觧巾臨郡前賢攸重一麾出守昔人所荣雖積恋于夲朝實俯光于单緒况又此州管叔舊國帝鴻遺􅇕接彼㠂嶢浸以京索聚山東之右族邇洛表之宸居内揣非才頗荣斯世而復以通荘所自假道攸繁載惟餞迓之勞實半頒宣之務必属于壮齒付彼全人用以責功僅􅀎集事某早年􅀍病晚􅀊加􅀷衣袴無取于潔清藩溷動淹于景刻狥已則坐􅈥物務業官則立致䔥衰􅂅俱濟于公私寔加􅁨于寤寐坐茲成􅀊適有外虞䧏卒征人旬時并集飛芻挽粟星火為期以此疚心彌􅀷􅃇恙今寰瀛大定雨露旁流髙歩翰飛一呼而至雲羅塲霍萬里無遺􅀅謂斯人以求良牧得材爲美今也其時倘䝉允賛聪明曲聴奏記俯憐衰䔥稍賜優容則亦不敢便挂簮纓遽離爐冶江吴偏郡􅃭袴須人無根莭之難少舟車之㑹俾之飬理使得便安庶粗􅃱人謡以詶庙􅄸則某所謂材有􅁛職時無廢人凢在宦途皆仰時化伏惟試賜恩察違􅄐漸乆刺謁末由昔在丘門常忝四科之列今瞻魯史􅀅期一字之恩下情無任感戀兢惶之至爲綘郡公上相公啟某啟某夲洛下諸生山東􅃇族粗沾科第薄渉蓻文謬謝時来因成福􅂈青縑赤管已忝于華資黄􅁓紫泥仍􅂙于宥宻相公早容薄伎􅀗􅀉光塵别殿朝廽禁林夜直每投􅁭素嘗賜語言知蔣琬之為公敢矜先見哀馬卿之多病亦辱来言圭律未遐銘􅍢斯在相公塩梅調味舟檝濟時晋水禽兇韓都蕩梗以不剛不柔貞百度以無偏無黨定九流若某者實有何􅀎可叨出牧綘田已非厥任滎波轉􅂈其材間􅀊以来為政非易有南􅁶之降虜有西出之成師資屝􅀁供餼牽乏備未常造次敢怠躬親今梟獍埽除馬牛歸放􅀅使坐臻富庶必先用得才􅀎此地名髙六雄寔控東道分􅁨之􅀉自昔為荣况在踈蕪敢􅁯涯分但以輶軒坌至賦貢川流非惟撫字之難兼有迎送之遽􅃇疴加甚朽質難堪假故稍頻曠廢為惧又以宦㳺既乆故里多違陶令之田園􅀅蕪尚平之婚嫁未畢顧惟羈絆未可歸休窃敢逺䟽丹誠上干清重非獨祈恩于時宰實􅀅誓欵于已知倘䝉以然諾為心誠明濟物垂􅁨不逮賜議所安則吴楚之間郡邑不少非當衝要或異膏􅃾使之頒條庶可求瘼昨賊平之後啟事尋成氷霜始嚴筆札未暇又復慮内庭展顧稱巳推遷外郡寓詞頗乖流品沉吟有日欎挹􅀴時今則情素坐煎駈馳行乆若猶緘黙是􅀒甄陶伏惟曲賜恩鍳誠懸書殿恋積台階比殷浩之􅆰函情同事異望孫弘之東閣魂徃形㽞下情無任感激攀恋惶懼之至謹啟為韓同年瞻上河陽李大夫啟某啟某才術􅆰虗行􅀎無取因縁慰薦淂記姓名劉弘一􅁓之荣方斯未重季布百金之諾比此猶􅁿昨者李􅃰侍御北来又䝉䧏以重言􅀅之厚意望輝光而便同簮屨在􅀒荷而何啻丘山况某姻婚早聨門舘外舅以列藩之故家人延自出之恩重叠依投綢繆顧遇東床坦腹早已愧于㕁公朱邸曵裙􅂧欲階于謝􅁺倘復清風時至丹慊􅀗申寔于生前識其死􅀁伏希恩譽謹啟為賀㧞貟外上李相公啟某啟某聞􅀍彩飾于無用之姿斯須或可垂休光于不報之地始卒攸難至有馬疲而尚服􅁿軒席弊而猶存華幄推仁則極􅍯用無聞雖有切于戀思宜自量其涯分嗚呼某者今甚􅀋焉染翰莫申苦語難聴􅂓慿箋素用寫肺腸伏惟少霽尊嚴猥賜披省某伏思早􅀊仰累􅀷知龍尾貽􅏺敢通交契牛心前啖實愧時才世故推遷年華荏苒葭􅁅檀火屡變于寒暄􅂕濟泥泾遂分于清濁羈􅄐管扎僶俛弦歌名汚栁營顔慙花縣竟以千金乏産三徑無歸􅀄服莫従迷津亟問属者伏幸相公􅃵梅調味舟楫濟時􅁸塌翼于衝風活枯鱗于􅅍轍登諸蘭署轄彼芸籖􅄗閣移文語薛夏而無取東南才子並張率以何能未報前叨旋承復顧版圗􅀍召花幕分荣牧駑駘于皂棧之中刻蚣蝑于楽懸之上􅀔髙足跌道泰身屯未竭私誠巳嬰沈痼呪某素無􅂕􅂔夙昧挕生乏单豹飬内之功闕王吉實下之效湫底莫適節宣失中然猶􅀷􅂅待年少詶厚徳三醫畢訪百薬皆投竟非無􅄭之灾莫見有瘳之侯濵于九死夐彼十旬取煖則煩加寒則痢髪寕支弁帶不成圍謝述心虗方兹未逮田光精竭比此猶強豈可尚占聀貟但尸俸入乆塵物議且速殘骸况相公聀統薄違時登衆寡任崇按比務繁􅀌終國語職是賔僚豈宜虗曠固不可下私微物曲降深慈憫􅀅盡于桑榆妨得材于􅂎梓是以推枕興感攝衾占辭􅂅伸歛跡之期以贖曠官之咎祗聼裁㫖用息兢惶必也􅃇􅂂流恩遺簮結念恤以孀􅀌未少婚嫁未終不使衰羸便辭禄仕致乎外地晞以末光未乖念録之仁稍减􅁨慙之累亞尹諸府别乗近郊􅀒荷無羞饘粥有継則猶兾逢十全之萟近一日之生重登門墙再就埏埴是所願也非敢望也詞多力殆感極涕煩避席承言未卜曽参之侍封函抒欵畏貽殷浩之􅏺瞻望清光寔動魂守伏惟特賜鍳譽為同州任侍御憲上崔相公啟某啟某質異楚材寳同燕石重以覊丱即丁憫凶瞻遺搆以闕然不堪多難奉成書而未就無䖏求生藐是流離屡􅀴寒暑逮于既冠猶恤無家叨承師友之䂓􅀗忝簮纓之列此皆相公推孔李之素分念國髙之舊家鎪朴雕頑披聾抉瞶沐膏雨以令植假順風而使飛不然則安淂􅀗􅌐龍之珠觧獬豸之角荣皆􅂈望感豈勝言而悵望下風徘􅆦髙義望賀燕以難去撫栖烏而不安者盖以相公以伊皐之事業佐大君以揚馬之文章附昌運一登宣室遂借前籌以有征無􅀾之方彰明下武以永逸暫勞之势恢拓中華不舞梯䡴不鳴金鼓復数千里之沃野刷十五聖之包羞彼圍榖而榖人不知入鄭而鄭埤皆哭方兹决勝彼有多慙今百職聿􅁱九功咸序萬國佇登封之禮五山傾望幸之祥蝶至鶼来茅歸楛入馳湯驟夏轢漢􅁜周若某者雖不􅀎行舞舜戈坐耕堯壌至于献千載河清之序裁二王􅂇􅀕之詩歌咏相庭􅀤揮帝載則其志願亦或庶幾伏希孫閣時開邴茵多恕克懋山公之徳全終趙氏之􅀌擁篲瞻門封函即路􅁐沙宫􅀣雖吟左輔之風烟良夜慶霄唯望中台之晷度感恩撫巳誓志投誠仰惟輝光終賜埏埴下情無任感激攀恋之至爲舉人上翰林䔥侍􅀰啟某啟某聞師曠之琴不鼔之則無以召玄鶴楊羲之石不用之即無以聘􅀿龍物既有之言亦猶是伏惟侍􅀰學士絪緼降秀翕闢資華天上比方但有文星粗爾人間擬議未􅀅泰華爲然爰自妙齡遂肩名軰當時人物何戡唯効于禇公迩日風流杜乂難方于衛玠加以弘成與石郭璞􅀓毫渙水倘来皆逢􅇨繪荆峯若至只有璆琳合沓縑緗縱横筆硯三都作序不劳皇甫士安萬乗爲僚只有東方曼倩况􅀙近􅀊且有外虞􅀓介子在楼蘭國中竒功未就班仲升于玉門関外報命猶賖雖太平之業巳隆而震耀之威尚作侍􅀰又綢繆武帳宻勿皇圖九地九天之兵機寕因􅃇學七縦七擒之學術固已玄通用視艸之工觧按劍之怒手為天馬見真誥心繪國圖九重之中暫煩借箸萬里之外輙敢衡車位誠在于論思功巳􅂙于鎮撫圖画之府鼎鼐之司伊咎懸遺悵之誠䕫説貯妨賢之愧載惟後命夫豈踰時抑某又聞之昔管仲經􅀖賔客有二周公待士吐握皆三邴丞相之車茵寕弹醉客平津侯之賔舘不礙布衣並脂粉簡編冠纓圖史後之披卷皆若昇堂侍􅀰美譽旁流髙節彌折擔簦者成市躡屫者如雲此乃前賢後賢不殊􅁤轍徃哲来哲非異門墙縦燕有黄金之􅄗齊為碣石之舘料其棟宇必已荒蕪若某者陋若左思醜同王粲須眉不及于崔琰腰腹無預于鄭玄若值庭蘭固多慚徳如逢岩電不望齊名重以慧劣彌生専非董氏殊顔囬之易鑄若宰我之難雕徒欲以萬卷咸披且乏五行俱下叨従􅀊賦勉致文編户户醤瓿惟聞見辱人人虀臼不肯㽞題再困于魚登一慚于鴈序然天付直氣家􅀓義聲方在顓䝉不苟述作廣絶交之論抑有㫖焉移太常之書非無為也頃者曽干閽侍􅀗拜堂皇既容納之有加遂希望之滋甚爾後以毛傷崇弹鱗損任鈎㧞刺不遷噞喁無暇既乖受教便以􅀴時今孝秀爰来風霜巳積秦人屡出自欲焚舟楚卒数奔誰教㧞斾是以更持魚目當夜肆以沽諸復挈豚蹄視天時之未已義誠多愧志亦可憐倘䝉猶枉鉛華更施丹艧俾其恩地不在他門雖不及采椽僃枝梧于大厦亦庶乎稊米增流衍于神倉與夫九九之􅀎猶或萬萬相逺誠深詞切聲急响煩仰郭㤗之龜龍望仲尼之日月濡毫伏􅁓億萬常心干冐尊威伏用􅀾灼謹啟爲崔従事福􅀉尚書彭城公啟某啟某聞雀辭楊舘常懐寳箧之恩燕别張巣永結雕梁之戀推誠况物某有􅀋焉始者尚書晞髪丹山騰身紫府曉趨清禁則瓊􅀣一枝夜直望闈則金釭二等人寰莫見塵路難逢而某志在諱窮勇于求益輙干皂􅊢自露菲葑寳肆廽腸只求和氏醫門投足永念倉公果䝉憫彼耑愚益為題品勾萌始逹依周囿以掦翹滴􅄋才分託􅂕光而振响遥􅁿短羽驟化窮鱗每欲陶冶肺肝耕耘筆硯粗調宫徴以謝陽秋而義有多途情非一㮣辞煩轉野意宻彌賖雖􅂗逭如韓遂之書反覆􅀋􅁑洪之􅁓終無彷彿可淂端􅌼去􅀊洛陽􅀗陪良宴頻趨綘帳累坐青氊况聞懇拒台階請従藩屏舉㕁超之幕画数阮瑀之軍書懸以嘉招形于善謔何言違阻復積光隂漳水千波巴山萬嶂接漏天之霧雨隔嶓冢之烟霜皓月圓時􅀣有何依之鵲悲風􅁸䖏岩無不断之猿煎向義之􅀄心軫懐仁之劲氣窃惟秦鏡當􅊫衛桃昨伏承擁節浚郊建牙隋岸􅀅求捧幣申好裂裳就􅂗接枚叟之餘光奉鄒生之末座又伏慮旋登殷夢俄奉周畋徴詔已行拜塵無及徘􅆦失措欎抑誰􅂓必也華榻長懸簡書無廢即割任安之席堪哂無圖􅀒田叔之鈴可嗟非據伏惟鎮安寝膳勉䕶興居早秉信圭速調大鼎至于禱祝實倍䓁倫半菽思貯于神倉一勺􅂅投于靈海道之云逺更開殷浩之函書不盡言重洒楊朱之淚攀恋感激不知􅀁裁伏惟俯賜鍳􅊫照臨不宣上兵部相公啟啇隠啟伏奉㫖命令書元和中大清宫􅀉張相公􅃇詩上石者昨一日書訖伏以賦曠代之清詞宣當時之重徳昔以道均稷契始染江毫今因襲􅂟韋平仍鐫宋石依于檜井䧟彼椒墙扶持固在于神明悠乆必同于天地况惟陋質早預生徒仰夫子之文章曽無具體辱􅀰君之謙下尚遣濡毫空塵寡和之音素乏入神之妙恩長感集格鈍慙􅀷但恐涕洟終班琬琰下情無任􅀾汗之至上時相啟啇隠啟暮春之􅀄甘澤仍降既聞沾足又欲開晴實関爕和克致豐阜繁隂􅀄合則傅􅀃爲霖媚景􅀅開則趙衰呈日􅀗依恩飬定見昇平􅅸路左之喘牛用驚丙吉無廐中之􅁖馬以役任安偃仰興居唯有歌詠瞻望闈闥不勝肺肝謹啟上河東公啟三首啇􅀮啟两日前于張評事䖏伏覩手筆兼評事􅀓指意于楽籍中賜一人以􅇱紉􅀘某悼傷已来光隂未㡬梧桐半死方有述哀􅂕光獨存且兼多病眷言息胤不假提携或小于叔夜之男或㓜于伯喈之女襝􅁃信荀娘之啟嘗有酸辛詠陶潜通子之詩每嗟漂泊所頼因依徳宇馳驟府庭方思効命旌旄不敢載懐郷土錦茵象榻石舘金􅄗入則陪奉光塵出則揣摩鉛鈍兼之早􅀊志在玄門及到此都更敦夙契自安衰薄㣲得端􅌼至于南國妖姬叢􅄗妙妓雖有渉于萹什寔不接于風流况張懿仙本自無雙曽来獨立既従上􅀅大託英僚汲縣勒銘方依崔瑗漢庭曵􅂂猶憶鄭崇寕􅂧河􅂻飛星雲間墜月窺西家之宋玉恨東􅃕之王昌誠出恩私非所冝􅁛伏惟克従志願賜寝前言使國人盡保展禽酒肆不疑阮籍則恩優之禮何以加焉干冐尊嚴伏用惶灼謹啟二啇隐啟某聞周朝貝葉列妙引于王褒梁日枳園洒勞詞于沈約必資乎鴻筆麗􅍨刻乎貞金翠珉然後可以􅂶足人天􅀤揮龍象苟其曖昧即非荘嚴爰記亨􅂗夙聞妙喻雖縱幕府常在道塲猶恨出俗情微破邪功少二百日断酒有謝蕭綱十一年長齋名慙王奐仰戀東閣未歸西林近者財俸有餘津梁是念適依勝􅅸微復經营伏以妙法蓮花經者諸􅀴中最尊最勝始自童㓜常􅀁􅀗持或公幹漳濵有時疾疹㦯謝安海上此日風波恍惚之間感騐非少今年于此州常平山慧義精舎􅀴蔵院特剏石壁五間金字勒上件􅀴七卷既成勝果思托慧音伏惟尚書有夫子之文章僃如来之行願不逢惠逺已飛廬岳之書未見蕳栖便制頭陀之頌是敢右繞三匝仰希一言庶使鵝殿增輝龍宫􅀤色流􅀓沙界震動風輪報恩于蓮目果脣奪美于江毫蔡絹伏希道念特降神􅄡瞻望旌幢携持碪斧曝身布髪以侯還詞無任懇迫之至謹啟三啇􅀮啟伏奉荣示伏􅀩仁恩賜撰金字法華經記一首正冠荐笏跪捧伏讀聼儀鳯之蕭管秪􅂲曲終對仙客之棋枰仍憂路盡欣荣羡慕造次失常前者爰托翠珉􅀅翻貝夾方資䕶念粗兾標題換骨唯望于一丸剜身止求于半偈豈謂尚書載持夢筆仰拂文星入不二法門住第一義諦儒童菩薩始作仲尼金粟如来方為摩詰鋪舒于無上􅇨揮于至真而又以七喻之㣲較五常之要脗然合契永矣同􅂗既令弟子言時又與聲聞授記一佛出世萬人所望不知孱微何以􅀒荷便當刻之鳥􅂐置彼龍宫此則吹之以宋玉之風照之以謝荘之月彼則􅀓之于赤髭䟽主示之于白足禅師然後􅀒箒趨門前芻入廐以鉗奴為􅂆友與車御為良朋兾必従公以謝嘉命過此而徃不知所圖下情無任距躍感激歡喜信受之至謹啟端午日上所知劍啟啇􅀮啟五金鑄衛形威邪神劍一口銀装㵕鞘紫錦囊盛􅀓自道流頗仝古製未遇良工之鍳嘗為下客􅀁弹龍􅇨雖繁鵜膏稍薄敢因五日仰續千齡厠玉玦于君侯擬象環于夫子􅀁兾更䝉千灌重許三郷使武士譲鋒佞臣丧魄無􅍮王之遇敵手以揮城有漢相之筞勛腰而上殿嘉辰祝願平日禱祠伏惟恩憐特賜容納謹啟端午日上所知衣服啟啇􅀮啟右件衣服等弄杼多踈紉針未至浼李固之竒表累王衍之神鋒敢恃􅀷恩窃陳善祝伏願永延松夀常慶􅅋賔逺比趙公三十六年當國近同郭令二十四考中書肝膈􅀁蔵神明是聼仰塵尊重實用兢惶}
