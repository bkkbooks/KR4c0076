  - {type: variant, offset: 11687, length: 322, content: 憂朝㫖未議起復屬王士真卒從史竊獻誅承宗計以希上意用是起授及詔下討賊隂與承宗通謀且誣奏諸軍與賊通上深患之䕶軍吐突承璀俟其來博幕下伏壯士縛之内車中馳以赴闕貶驩州司馬子繼宗等四人並貶嶺外二帥去就非因傳聞鳩杖之人後漢禮儀志八十九十禮有加賜玉杖端以鳩為飾鳩者不噎之鳥也欲老人不噎鮐背之叟詩黄耉台背箋台之言鮐也大老則背有駘文釋文台湯來反徐又音臺爾雅云夀也鮐易來反魚名一音夷䟽釋詁云鮐背耉老夀人也舍人曰老人氣衰皮膚消瘠背若鮐魚也知其本末尚能言之則太行之險固不為渤疑作悖者之守數州之衆固不為邪者之徒此又其不足恃也由此言之則以何名四字一作則何以敗名譽隳家聲司馬遷書李陵既生降頽其家聲何事捨君命何道求死士何計得一作固人心此僕者所以對案忘餐推枕不寢為足下惜為足下危而, SBCK: 翁}
