  - {type: variant, offset: 14603, length: 554, content: 爾尚一乃心力其克有勲倉中水外人馬勿食陶母反魚以之歎息世説陶公少時作魚梁吏常以坩䱹餉母母封䱹付使反書責侃曰汝為吏以官物見餉非惟不益乃増吾憂也豈無他粟豈無他芻薏苡似珠不可不虞後漢馬援傳初㧞在交阷常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大軍還載之一車後有上書譛之者以為前所載還皆明珠文犀倉中役夫左傳江芊怒曰呼役夫千逕萬塗桀黠為炭眭盱為鑪鵬鳥賦天地為鑪兮造化為工隂陽為炭兮萬物為銅西京賦睢盱跋扈魯靈光殿賦洪荒朴畧厥状㫿旴善曰字林睢仰目也盱張目也眭與睢通應事成象無有定一作成模縁私指使曲禮六十曰耆指使慎勿以呼賔朋姻婭詩𤨏𤨏姻婭則無膴仕或來讌話倉中酒醴慎勿以貰漢髙帝紀常從王媪武負貰酒師古曰貰賖也海翁無機鷗故不飛海翁易慮鷗乃飛去荘子海上有人好鷗鳥者旦而之海上從鷗鳥遊鷗鳥至者數百其父曰吾聞鷗從汝遊試取來吾從玩之曰諾明旦之海上鷗鳥舞而不下是以聖人從㣲至著漢董仲舒傳莫不以以晻至明積㣲至者不遺忠恕借借貸貸此門先塞須防蒼蠅變白作黒詩營營青蠅止于棘箋蠅之為蟲汙白使黒汙黒使白喻佞人變亂善惡也嗚呼孰慮孰圖詩旻天疾威弗慮弗圖昔在漢家倉令淳于致令少女上訴無辜䧟身至是不亦悲乎史記太倉公者齊太倉長臨菑人也姓淳于氏名意文帝四年意以刑罪當𫝊西之長安其少女緹縈隨父西上書願入身為官婢以贖父刑罪書聞上悲其意此嵗中亦除肉刑法敢告君子身可殺道不可渝, SBCK: 惘惘九月三日弘農尉}
