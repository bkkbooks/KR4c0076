  - {type: variant, offset: 14444, length: 1, content: 物, SBCK: 山而有三得始其卑者朝髙者復淂其掲然無附着而又得其近而􅀎逺思欲窮捜極討洒豁􅁭抱始以往来畨畨不遂其願間者得李生于華郵為我􅃌引岩谷列視生植僅得其半又淂謝生于雲臺􅀚暮留止􅀫旦相與去愈復記熟後又得吾子于邑中}
  - {type: variant, offset: 14446, length: 1, content: 精, SBCK: 其􅀁}
