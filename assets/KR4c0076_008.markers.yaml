  - {type: line-break, offset: 0, content: '', id: KR4c0076_WYG_008-1a01}
  - {type: variant, offset: 0, length: 1, content: 欽, SBCK: 爲李貽孫上李相公徳􅁉啟月日従姪某官某謹齊沐裁誠着于啟事跪捧僕者于献于司空徒相國叔父閣下某伏逺藩墙亟踰年籥抱徽音于故器雖賞逐時遷窃餘潤于奥雲亦情由􅁼至中阿弭莭末路増懐沈吟易失之時悵望難邀之㑹石崇著引徒􅂅思歸殷浩裁書其如慕義伏惟相公丹青元化冠盖中州群生􅃌南命代先覺語􅁎朝之舊族荘武慙顔叙漢代之名門韋平掩耀􅀊隣三紀克佐五君動著嘉猷行㽞故事陶冶于無形之外優㳺于不宰之中始者主上以代邸承基琅琊纉業明發不寐懐清朝之景􅂕日晏􅁯飡念蒼生之}
  - {type: page-break, offset: 0, content: '', id: KR4c0076_SBCK_003-18b}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 命爰徴元老􅁢在賔臣五載于兹六符斯炳頃单于故境獯鬻遺疆屡縁丧荒亟致携貳夙沙自縛其主冐頓忍射其親遂去北􅁁欲事南牧既赫斯而貽怒乃宻勿以陳謀管氏􅀅来屡􅀤新柴之井㽞􅀱每入便聞借箸之籌群帥受成中樞獨運前軍露板方事于羽馳清禁夀觴旋聞于月㨗仍其貴種慕我華風或辨姓冩誠推諸右校或釋兵服義列在周廬潞子離狄而春秋書徐夷朝周而大雅咏其餘􅍪驚鳥散風去雨還亘絶漠以銷魂委窮沙而丧胆胡琴公主巳出于襜襤毳幕天驕行遺其湩酪向若非薛公料敵先陳三榮充國為學常通}
  - {type: page-break, offset: 2, content: '', id: KR4c0076_SBCK_003-19a}
  - {type: variant, offset: 3, length: 1, content: 庫, SBCK: 夷則何以雪髙庙稱臣之羞}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 肅祖復京之好此庙􅀾之功一也惟彼􅂙伐参星也一作代代属大原實興皇家天漢美名方之尚陋㫪􅁜王氣比此非多而物衆蔵奸地寛長孽敢起在行之衆因興逐帥之謀遂使起義堂􅁁台臣夙駕晋陽宫下逆豎宵奔翻势􅀅兾于連雞勇閗尚同于困獸詎知長􅄸已出竒兵金僕􅂕鉟左􅀓金僕姑矢也􅂕姑鉟公旗也靡㽞于旬朔箯輿貫木已集于都街此庙􅀾之功二也潞冦不懲两􅆆之兇徒恃三軍之力干我王略擬其父封􅀽熈因累葉之資衛朔拒大君之詔人􅀅自弃􅄦淂而誅蛙覺井寛蟻言􅀣大招延􅁿險曽微吴國之錢蔵匿罪亡又乏江􅁜之粟􅀁謀者河朔遺事所恃者巖險偷生今則趙魏俱攻燕齊併入奉規于帷幄遵命于􅃌縦亞夫拒吴驚東南而備西北韓信擊魏艤臨晋而渡夏陽百道無飛走之虞一􅈁見傾危之􅀔計其反接當不踰時是則陳曲逆之六竒翻成屑屑諸􅁑武之八陣更􅁴區區此庙􅀾之功三也􅀌冦行盡萬方率同􅀅盪海騰區夷山拓宇髙待泥金之禮雄専􅄟玉之辭烟閣􅀓形革車就國盡人臣之極分煥今古之髙名况又奉以嘉聲諧兹國檢􅀓文賜糗逺箴醉飽之徒晏子朝衣横励􅁿肥之俗比周息慮􅀌介歸仁紹續勛家扶持舊俗㒺容私謝皆事公言景風至而慶賞先行仲吕叶而良賢必遂豈直杜伯山之令子大邑􅀓荣陶彭澤之􅀌孫西曺受署重以心㳺}
