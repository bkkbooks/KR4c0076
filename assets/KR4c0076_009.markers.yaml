  - {type: variant, offset: 960, length: 17306, content: 股肱之契書乃𢋫載歌曰元首明哉股肱良哉曰我將俾爾以大手筆晉謝珣傳珣夢人以大筆如椽與之既覺語人云此當有大手筆事居第一功見祭楊郎中文麒麟閣中霍光且圖於勲伐見為懷州状𤣥洲苑上魏收别議於文章北史魏收傳帝於華林别起𤣥洲苑備山水臺觀之麗詔於閣上畫收其見重如此光映前修允兼具美我意屬此爾無讓焉公拜稽首曰臣某何敢以當之在昔太宗有臣曰師古曰文本舊書顔籀字師古博覽羣書善屬文髙祖朝遷中書舍人專掌機宻于時軍國多務凡冇制誥皆成其手師古達于政理册奏之工時無及者太宗踐祚擢拜中書侍郎岑文本字景仁博考經史善屬文貞觀元年擢拜中書舍人漸䝉親顧初武徳中詔誥及軍國大事文皆出於顔師古至是文本所草詔誥或衆務繁湊即命書僮六七人隨口並寫須臾悉成亦殆盡其妙髙宗有臣曰嶠曰融舊書李嶠趙州贊皇人為兒童時夢有神人遺之雙筆自是漸有學業髙宗時為鳯閣舍人朝廷每有大手筆皆特令嶠為之崔融齊州全節人為文典麗當時罕有其比朝廷所須洛出寶國頌則天哀册文及諸大手筆並手敕付融𤣥宗有臣曰説曰壞舊書張説字道濟前後三秉大政掌文學之任凡三十年為文俊麗用思精密朝廷大手筆皆特承中㫖譔述天下詞人咸諷誦之按蘓瓌景雲中卒不及事𤣥宗瓌當作頲舊書瓌子頲少有俊才𤣥宗時與李乂對掌文誥上謂頲曰前朝冇李嶠蘓味道謂之蘓李今有卿及李乂亦不讓之卿所製文誥可録一本封進題云臣某撰朕要留中披覽其禮遇如此代宗有臣曰衮舊書常衮京兆人寳應二年選為翰林學士知制誥永泰元年遷中書舍人衮文章俊拔當時推重與楊炎同為舍人時稱為常楊按鄭亞改本云常楊繼美於代宗之世謂常衮楊炎也疑此脱曰炎二字至於憲祖則有臣禰廟曰忠公左傳楚子告大夫曰所以從先君於禰廟者舊書李吉甫字𢎞憲趙郡人父栖筠代宗朝為御史大夫名重於時吉甫少好學能屬文年二十七為太常博士該洽多聞尤精國朝故實沿革折衷時多稱之憲宗嗣位以考功郎中知制誥旋召入翰林為學士轉中書舍人二年擢吉甫為中書侍郎平章事九年卒贈司空諡曰忠並稟太白以傳精神舊書文藝傳李白字太白白之生母夢長庚星因以命之納非煙而敷藻思見為成魏州表才可以淺深魏邴潘岳西征賦懷夫蕭曺魏邴之相道可以升降伊皋而又富僧孺之新事南更王僧儒於書無所不觀其文麗逸多用新事人所未見者人重其富博識庾持之竒字見為李貽孫啓清風濯熱詩誰能執熱逝不以濯白雪生春見獻侍郎啓淮南王食時之工漢淮南王安傳文帝詔使為離騷賦自旦受詔日早食巳上愛而秘之裴子野昧爽之獻南史裴子野傳梁武帝敕為書喻魏相元乂其夜受㫖及五鼔敕催令速上子野徐起操筆昧爽便就及奏武帝深嘉焉疑王粲之夙構見為濮陽公状無禰衡之加㸃禰衡鸚鵡賦序衡因為賦筆不停綴文不加㸃然後可以𢎞宣王略輝潤天文豈伊乏賢可纂一作纘舊服帝又曰舜何人也回何人也朕思丕承書丕顯哉文王謨丕承哉武王烈汝勉善繼無忝乎爾之先公復拜稽首曰易曰中心願也詩曰何日忘之臣敢不夙夜在公以揚𢎞烈㑹一日上明發於法一作清宫之中詩明發不寐漢鼂錯傳處於法宫之中明堂之上念兆人之衆顧九州之廣永懷不待之痛家語子路曰樹欲靜而風不寜子欲養而親不待韓詩外傳曽子曰往而不可還者親也故子欲養而親不待式重如存之敬公伏奏曰惟先后懋守丕基允資内助魏后妃傳棧濳疏曰在昔帝王之治天下不惟外輔亦有内助秀南頓集作潁非嘉禾之瑞後漢光武紀南頓令欽生光武論曰是嵗縣界有嘉禾生一莖九穗因名光武曰秀開烈山神井之祥見祭吕商州文徳駕河洲詩序闗雎后妃之徳也其詩曰闗闗雎鳩在河之洲淑肩沙麓見為懷州状將顯降媯之配書釐降二女于媯汭嬪于虞水經注蒲坂縣南有歴山舜所耕處也有舜井媯汭二水出焉南曰媯水北曰汭水尚書所謂釐降二女于媯汭也孔安國曰居媯水之内焉季長曰水所出曰汭然則汭似非水名而今見有二水異源同歸西注於河嬀音居危反未𢎞褒紀之恩春秋桓公九年春紀季姜歸于京師漢外戚恩澤候表薄昭竇嬰上官衛霍之候以功受爵其餘后父據春秋褒紀之義帝舅縁大雅申伯之意寖廣博矣應劭曰春秋天子将納后於紀紀本子爵也故先褒為侯言王者不取於小國渝集作論誤美椒塗掩華蘭掖顔延之元皇后哀䇿蘭殿長隂椒塗弛衛縁山破芿夙聞齊主之悲芿本作艿説文艿草也如神切玉篇舊草不芟新草復生曰芿列子趙襄子狩于中山藉艿燔林扇赫百里樂苑南齊時朱碩仙善歌吳聲讀曲武帝出遊鍾山幸何美人墓碩仙歌曰一憶所歡時縁山破芿荏山神感儂意磐石鋭鋒動帝神色不悦曰小人不遜弄我時朱子尚亦善歌復為一曲曰曖曖日欲暝歡騎立踟蹰太陽猶尚可且願停須臾於是俱被賞賚採石傳形早降漢皇之慟拾遺記武帝思李夫人李少君曰闇海有濳英之石其色青刻之為神像神怪不異真人使此石像往則夫人至矣今繞極有慶帝王世紀黄帝母曰附寳見大電繞北斗樞星照郊野感而生黄帝於夀丘鳴社承輝藝文類聚春秋濳潭巴曰里社鳴此里有聖人其呴則百姓歸之宋均注云社里之君也鳴則教令行唯聖人能之呴鳴之怒也而懿號未彰貞魂莫祔後漢趙咨傳敕子𦙍曰亡者元氣去體貞魂流散左傳凡君薨卒哭而祔祔而作主特祀于主烝嘗禘于廟恐無以懋遵聖緒光慰孝思公於是承命有宣懿祔廟之制箋新書穆宗宣懿皇后韋氏失其先世穆宗為太后得侍生武宗長慶時册為妃武宗立妃巳亡追册為皇太后上尊謚有司奏太后陵宜别制號帝乃名所𦵏園曰福陵既又問宰相𦵏從光陵與但祔廟孰安奏言神道安于靜光陵因山為固且二十年不可更穿福陵崇築已有所當遂就臣等請奉主祔穆宗廟便由是奉后合食穆宗室初文宗皇帝思宗社之靈祧祖之重傳于夏啓既不克終箋文宗荘恪太子永太之和六年立開成三年廢是年暴薨帝悔之曰朕有天下反不能全一兒乎歸於與夷又集作亦未能立左傳宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘請子奉之以主社稷宋穆公卒殤公即位立箋陳王成美敬宗第五子也開成四年帝乃成美為皇太子典册未具而帝廟乃推帝堯敦敘九族之道書堯典克明俊徳以親九族𢎞魏文榮樂諸弟之志集作意魏文帝典論年夀有時而盡榮樂止乎其身按子桓為嗣之後猜忌諸弟攜隙日深故曺植求通親親表曰恩紀之違甚於路人隔閣之異殊于胡越而此云𢎞魏文榮樂諸弟之志真不可解豈謂南皮之游西園之宴少小追逐時與常曰潁邸吾寜忘邪箋舊書文宗紀開成二年五月壬申上幸十六宅與諸王宴樂决十六宅内官范文喜等三人以供諸王食物不精故也十月庚子慶成節上幸十六宅與諸王宴樂四年六月庚申上幸十六宅安王潁王院宴樂賜與頗厚及武宗讓踰三四漢文帝紀代王西鄉讓者三南鄉讓者再位當九五易九五飛龍在天利見大人又飛龍在天乃位乎天徳出濳離隠躍泉在天泉讀曰淵正箋舊書武宗紀開成五年月二日文宗暴疾宰相李珏知樞密劉𢎞逸奉密㫖以皇太子監國兩軍中尉仇士良魚𢎞志矯詔迎潁王于十六宅四日文宗崩宣遺詔皇太弟宜於柩前即位揚八彩於堯睂太平御覽春秋元命苞曰堯睂八彩是謂通明挺二肘於湯臂二當作四帝王世紀湯臂四肘初學記元命苞曰四肘是謂神肘故外則上公列辟書㣲子之命庸建爾于上公内則常侍貴人後漢宦者傳論曰漢興仍襲秦制置中常侍官至於孝武帝數宴後庭故濳游離館請奏機事多以宦人主之漢李廣傳上使中貴人從廣服䖍曰内臣之貴幸者咸願擬議形容易擬議以成其變化又擬諸其形容依稀彩飾公搢圭歸美晉傅咸傳咸致書曰至於論功當歸美於上吮墨摛詞詠曰月之光華知天者之事也吕氏春秋虞帝卿雲歌曰日月光華旦復旦兮贊乾坤之易簡作易者之事乎易乾以易知坤以簡能又易簡之善配至徳公於是有聖容之贊箋按鄭亞序云公乃範貞金模聖表當是鑄金為像也史無其事不可得而詳今本一品集有仁聖文武至神大孝皇帝真容贊序云於是圖輕素寫良金疑鑑形於止水若凝視於清鏡五彩既彰穆穆皇皇居列仙之館近𤣥祖之光葢以昭燕翼之謀顯丕承之徳矣觀此則又以繪素之後更鑄金也天寳季年物豐時泰骨骾者慕周偃武漢陳平傳平謂漢王曰彼項王骨骾之臣亞夫鍾離昧龍且周殷之屬不過數人耳鮑宣傳上書曰朝臣亡有大儒骨骾白首耆艾魁壘之士書乃偃武修文肉食者效晉清談左傳曺劌曰肉食者鄙未能逺謀晉王衍傳出補元城令終日清談而縣務亦理後為石勒所殺将死顧而言曰吾曺雖不如古人向若不祖尚浮虚戮力以匡天下猶可不至今日豕不豶牙易豶豕之牙吉程傳豕之有牙百方制之終不能使改惟􅀈其勢則性自調伏雖有牙亦不能為害韻㑹豶牡豬去勢也蠆因揺尾左傳鄭子産作丘賦國人謗之曰其父死于路已為蠆尾以令於國國將若之何氛興燕易謂安禄山叛范陽駕狩巴梁謂𤣥宗幸蜀九十年鑾輅不東西都賦大輅鳴鑾善曰白虎通天子大輅周禮巾車掌玉輅凡馭輅儀以鑾和為節新書儒學傳敬播謂人曰鑾與不復東矣三千里華戎遂隔西京賦隔䦑華戎日者上𤣥降鑒見為滎陽公表元聖恢竒書湯誥聿求元聖與之戮力枚乘七發馳騁恢竒論語國極論者恢竒彌出遂于首亂之邦先有納忠之帥復我疆理平我仇讎負羽䝉輪揚雄羽獵賦䝉楯負羽挾鏌邪而羅者以萬計左傳晉伐偪陽圍之狄虒彌建大車之輪而䝉之以甲以為櫓左執之右㧞㦸以成一隊孟獻子曰詩所謂有力如虎者也已聞於深入漢霍去病傳去病出北地遂深入赤茀邪幅茀當作芾詩赤芾在股邪幅在下將事於駿奔陳萬集作方賄以展儀並見前備四旂集作駟介而告㨗旂當作旗四旗謂四方之旗周禮考工記曰龍旂九斿以象大火也烏旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也左傳晉候獻楚俘于王駟介百乘徒兵千仍願於箕星之分見賀相國啓巫閭之旁周禮職方氏東北曰幽州其山鎮曰醫無閭追琢貞珉詩追琢其章頭陀寺碑貞石南刋彰灼來葉以文上請屬意宗臣漢蕭曺傳贊曰為一代之宗臣公乃更夢江毫見為山南啓重吞羅鳥見為舉人啓町疃集作畦是河濟詩町疃鹿塲呼嘯神祗宋玉招魂招具該備永嘯呼些述列聖之英猷答大維集作大藩之深懇既事包理亂思屬安危不惟嵩岳降神固亦文星助彩並見前螭蟠龜戴隋禮儀志五品以上立碑螭首龜趺蟲篆鳥章漢藝文志六體者古文竒字篆書隸書繆篆蟲書也師古曰蟲書謂為蟲鳥之形所以書幡信也許慎説文序黄帝之史倉頡見鳥獸蹏阬之迹初造書契衛恒四體書勢蟲跂跂以若動鳥似飛而未揚拾遺記蟲章鳥篆之書構思而君苗硯焚晉陸機傳弟雲與機書曰君苗見兄文欲焚筆硯灑翰而元常筆閣魏志鍾繇字元常書㫁梁武帝論書云鍾繇書如雲鵠游天羣鵝戲海南史劉孝綽三妹一適東海徐悱悱卒妻為祭文詞甚悽愴悱父勉欲為哀辭見之乃閣筆公於是有幽州紀聖功之碑箋薪書藩鎮傳張仲武范陽人㑹昌初為雄武軍使是時回鶻為黠戞斯所破烏介可汗託天徳塞上而仲武遣其屬吳仲舒入朝請以本軍討回鶻即拜仲武副大使㑹回鶻特勒那頡啜擁赤心部七千帳逼漁陽仲武使其弟仲至與别將游奉寰等率鋭兵三萬破之獲馬牛槖駝旗纛不勝計遣吏獻状由是不敢犯五原塞烏介失勢往依康居盡徙餘種寄黒車子部回鶻遂衰名王貴種相繼降捕㡬干人仲武表請立石以紀聖功帝詔徳裕為銘揭碑盧龍以告後世天街之北獯鬻攸居史記天官書自河山以南者中國中國於四海内則在東南為陽陽則日嵗星熒惑填星占於街南畢主之其西北則胡貉月氏諸衣旃裘引弓之民為隂隂則月太白辰星占於街北昴主之晉天文志昴為旄頭胡星也昴畢間為天街漢匈奴傳唐虞以上有山戎獫狁獯鬻居於北邉師古曰皆匈奴别號舊書回紇傳其先匈奴之裔也在後魏時號鐡勒部落臣屬突厥又謂之特勒後稱廻紇焉在薜延陁北境居娑陵水側去長安六千九百里結以閼氏降我皇女漢韓王信傳上乃使人厚遺閼氏師古曰閼氏匈奴單于之妻也閼音於連反氏音支奉春君婁敬常為逺使漢書婁敬傳賜姓劉號曰奉春君上使敬復往使匈奴還言匈奴不可擊上怒遂往至平城匈奴果出竒兵圍髙帝白登七日然後得解匈奴傳使劉敬奉宗室女翁主為單于閼氏下杜人楊望長作畫工漢匈奴傳元帝以後宫良家子王嬙字昭君賜單于西京雜記上按圖以昭君行及去召見貌為後宫第一乃窮按其事畫工有杜陵毛延夀安陵陳敞新豐劉白龔寛下杜人楊望亦善畫尤善布色樊育亦善布色同日棄市國公箋按舊書迴紇傳肅宗乾元元年始以幼女封為寜主出降廻紇可汗徳宗貞元四年復以咸安公主降十廻紇至穆宗長慶二年以憲宗嘗許其繼好因封第妹為太和公主出降唐與廻紇凡和親者三故有是語乘以無年遂忘舊好分偵邏于甌脱漢蘓武傳李陵復至海上語武區脱捕得雲中生口注區脱匈奴邉境為候望之室也區讀與甌同匈奴傳東胡與匈奴中間冇棄地莫居干餘里各居其邉為甌脱注甌脱作土室以伺也偵羅見為滎陽公表遣祭酹于蹛林漢匈奴傳秋馬肥大㑹蹛林課校人畜計服䖍曰蹛音帶匈奴秋社八月中㑹祭處也師古曰蹛者繞林木而祭也鮮卑之俗自古相傳秋天之祭無林木者尚豎栁枝衆騎馳遶三周迺止此其遺法計者人畜之數俾我刁斗晨驚見為濮陽公文兜零夜設見為中丞祝文公乃上資宸㫁旁耀一作耀非軍謀魏志王粲傳後遷軍謀祭酒心作靈臺見為裴懿文手為天馬見為舉人啓充國四夷之學此目方知薛公三䇿之徴他時未爽見為李貽孫啓既而鬼箝飛辨風俗通義鬼谷先生六國時從横家鬼谷子飛箝之辭可引而南可引而北邳石降籌漢張良傳良遊下邳圯上有一老父衣褐至良所出一編書曰讀是則為王者師十三年孺子見我濟北榖城山下黄石即我巳不使郭閎仍讒於段熲後漢段熲傳遷䕶羌校尉諸種𦍑其冦并凉二州熲将湟中義從討之凉州刺史郭閎貪共其功稽固熲軍使不得進義從役久戀鄉舊皆悉反叛郭閎歸罪於熲熲坐徴下獄輸作左校寧教李邑更毁於班超後漢班超傳李邑始到于闐而值龜兹攻䟽勒恐懼不敢前因上書盛毁超擁愛妻抱愛子樂外國無内顧心帝知超忠乃切責邑勢協聲同火熸水灌左傳聲子曰王夷師熸注吳楚之間謂火滅為熸熸子潛反水灌見檄文遂得朝還貴主暮遁名王後漢竇憲傳今貴主尚見枉奪何况小人哉漢匈奴傳虜名王貴人以百數師古曰名王謂有大名以别諸小王也轄柳塞之歸車山海經鴈門山鴈出其間在髙栁北漢地理忘代郡髙栁縣西部都尉治後漢盧芳傳芳復入居髙栁注縣名故城在今雲州定襄縣王融廻文詩枝大栁塞北白帖榆闗栁塞復梅妝而向闕宋書武帝女夀陽公主人日卧於含章簷下梅花落公主額上成五出之花拂之不去自後有梅花妝箋以上言敗烏介迎公主之事詳見為河南表及晉城赤狄漢匈奴傳晉文公攘戎翟居於西河圁洛之間號曰赤翟白翟師古曰春秋所書晉滅赤狄潞氏卻缺獲白狄子者喪帥歸珪白虎通諸侯薨使臣歸瑞珪于天子者何嗣子諒闇歸之者讓之義也有閼伯之弟兄左傳子産曰髙辛氏有二子伯曰閼伯李白實沈居於曠林不相能也曰尋干戈以相征討誕景升之兒子後漢劉表傳表字景升二子琦琮表病甚以琮為嗣㑹曺操軍至琦走江南琮舉州請降吳孫權傳注吳歴曰曺公出濡須權以水軍挑戰公見其軍伍整肅歎曰生子當如孫仲謀劉景升兒子若豚大耳朝箋劉從諌卒詔潞府令稹䕶從諌之喪歸洛陽稹拒㫖稹從諫之姪也將憑蜀閣欲恃呉錢姑務連雞並見啟靡集作不思縳虎見太倉箴既垂文誥見檄文尚有羣疑易遇雨之吉羣疑亡也公乃挺身而進曰重耳在喪不聞利父禮記晉獻公之喪秦穆公使人弔公子重耳且曰亡國恒於斯得國恒於斯舅犯曰父死之謂何又因以為利孺子其辭焉衛朔受貶祗以拒君見為白從事啓今天井雄藩見代僕射表金橋故地見為河南表跨揺河北脅倚山東見檄文豈可使明皇舊宫見為河南表坐為汙俗文宗外相徐陵為貞陽候重與王相屈太尉書外相内相終當行有匪人忠謀既陳上意旋定俄又埃昏晉水霧塞唐郊謂太原楊弁之亂殊懿公之東涉集作徙是渡河見檄文若紀侯之大去其國見為白從事啓稽於時議憚在宿兵見為絳郡公啓公又揚笏而言曰彼地則義師見為李貽孫啓帥惟宗室謂李石乃𤣥王勤商之邑詩商頌𤣥王桓發傳𤣥王契也水經注契始封商魯連子曰在太華之陽皇甫謚闞駰並以為上洛商縣也后稷造周之邦詩即有邰家室傳邰姜嫄之國也堯見天因邰而生后稷故國后稷於邰漢地理志右扶風漦縣周后稷所封師古曰讀與邰同音胎𤓰瓞具存詩緜緜𤓰瓞堂構斯在見為懷州表苟虧策畫不襲仇讎則是奬夙沙縛主之風長冐頓射親之俗見為李貽孫啓昔武安君用鉞坑卒四十一疑作五萬史記白起傳趙括軍敗卒四十萬降武安君乃挾詐而盡坑殺之前後斬首虜四十五萬人趙人大震齊桓公受胙立功一十二國左傳㑹于葵丘王使宰孔賜齊候胙曰天子有事於文武使孔賜伯舅胙史記譜十二諸候自共和訖孔子按年表所列周魯齊晉秦楚宋衛陳蔡曺鄭燕吳凡十四國而云十二諸候者尊周而内魯故其數止於十二也今真將軍為時而出見為濮陽公表賢諸候代不乏人况其俗産代地之名駒西京雜記文帝自代還有良馬九匹皆天下駿也初學記何承天纂文曰馬一嵗為馵二嵗為駒八嵗為􅦩富管涔之良璞水經注汾水出太原汾陽縣北管涔山劉曜嘗隠居于此夜中忽有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劍一口背有銘曰神劔服御除衆毒曜遂服之劍隨時變為五色王褒聖主得賢臣頌及至巧冶鑄千將之璞有抱樹辭榮之節水經注王肅䘮服記曰昔魯哀公祖載其父孔子曰寜設桂樹乎哀公曰不也桂樹者起於介子推子推晉人也文公有内難出國之狄子推隨其行割肉以續軍糧後文公復國忽忘子推子推奉唱而歌文公始悟當受爵禄子推奔介山抱木而燒死國人𦵏之恐其神魂貿於地故作桂樹焉吾父生於宫殿死於枕席何用桂樹為琴操介子綏作龍蛇之歌而隠文公求之不肯出乃燔左右木子綏抱木而死按子綏即子推也有漆身報徳之風邪戰國䇿豫讓刃其扞曰欲為智伯報讎漆身為厲㓕䰅去睂自刑以變其容為乞人而往乞史記刺客傳豫讓對趙襄子曰智伯國士遇我我故國士報之躡足以謀漢陳平傳淮隂候信破齊自立為假齊王漢王怒而罵平躡漢王漢王寤乃厚遇齊使孟康曰躡謂躡漢王足屈指而定見為滎陽公表謝安之圍碁尚刼見為李郎中文曺參之飲酒正酣見為張周封啓適有軍書樂府木􅗀詩軍書十二巻巻巻有爺名果聞戎㨗春秋荘公三十冇一年齊候來獻戎㨗邯午謝衆左傳晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯戰而置諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之於晉陽趙孟怒遂殺午㔻豹出奔左傳㔻鄭之如秦也言於秦伯曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣秦伯使冷至報問且召三子郤芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及七輿大夫皆里㔻之黨也㔻豹奔秦樂毅不歸見檄文鄒衍已去見為濮陽公狀砥磨周鉞書牧誓王左杖黄鉞右秉白旄以麾水淬鄭刀史記天官書火與水合為淬漢書王褒傳清水淬其鋒師古曰淬謂燒而内水中以堅之也周禮考工記曰鄭之刀萬里來袁尚之頭顱二冡𦵏蚩尤之肩髀龍魚河圖黄帝攝政蚩尤兄弟八十一人並獸身人語銅頭鐡額威振天下詳為滎陽公表何其纂立大效集作功樹建嘉績若是之速與箋以上言平劉稹楊弁之亂詳為河南表宗英可汗本黠戞斯之君長既畏王威遂聞請吏漢書卭笮之君長聞南夷與漢通請吏比南夷留犂徑路漢匈奴傳韓昌張猛與單于及大臣俱登匈奴諾水東山刑白馬單于以徑路刀金留犁撓酒以老上單于所破月氏王頭為飲器者共飲血盟應劭曰徑路匈奴寶刀今契金也留犂飯七也撓和也刻金著酒中撓攪飲之對潼酪以知羞見為李貽孫啓毳幕氈裘李陵答蘓武書韋韝毳幕以禦風雨氊肉酪漿以充飢渇漢司馬相如傳旃裘之君長咸震怖望衣冠而有慕終軍白麟竒木對殆將有解編髪削左袵襲冠帶要衣裳而蒙化者焉文畢伯士之𦙍當作大畢伯仕周禮穆王將征大戎祭公謀父諌曰今自大畢伯仕之終也犬戎氏以其職來王注大畢伯仕犬戎之二君按此喻堅昆呼韓單于之師今㑹昌一品序本作呼韓谷蠡之師漢匈奴傳匈奴共立稽候狦為呼韓邪單于發兵西擊握衍朐鞮單于單于敗走恚自殺呼韓邪鄲于歸庭乃收其兄呼屠吾斯在民間者立為左谷蠡王師古曰谷音鹿蠡音盧奚反按此喻回鶻上大畢伯仕二人此呼韓谷蠡亦二人後改谷蠡為單于妄也或執玉而朝靈囿囿當作臺後漢明帝紀永平二年宗祀尤武皇帝于明堂禮畢登靈臺使尚書令持節詔驃騎將軍三公曰烏桓濊貊咸來助祭單于侍子亦皆陪位按靈臺改曰靈囿避聲病故也然臺囿同在一處義亦無甚害或解辮而拜甘泉隋突厥傳大業三年詔曰襲冠解辮同彼臣民漢匈奴傳呼韓邪單于正月朝天子於甘泉宫漢寵以殊禮賜以冠帶衣裳並垂於册書光彼明命百王共貫三代同規漢武帝紀制曰帝王之道豈不同條共貫公於是奉命有討北狄之詔伐上黨之制諭回鶻之命五慰堅昆之書四箋新書黠戛斯傳古堅昆國也或曰結骨在伊吾之西焉耆之北白山之旁人赤髪緑瞳未始通中國真觀二十二年聞鐡勒入臣即遣使獻方物二月酋長入朝太宗勞饗之酒酣奏願特笏以其地為堅昆府隸燕然都䕶髙宗世再來朝景龍中獻方物𤣥宗世四朝乾元中為回紇所破其後回紇衰㑹昌中其酋長阿熱破殺回紇可汗焚其牙及金帳遂徙牙牢山之南使使者衛送太和公主還朝為烏介可汗邀取阿熱無以通於朝復遣注吾合素上書言狀行三嵗至京師而武宗大悦命太僕卿趙蕃持節臨慰其國詔宰相即鴻臚寺見使者使譯官考山川圖宰相徳裕上言貞觀時逺國皆來顔師古請如周官集四夷朝事為王㑹篇今黠戛斯大通中國宜為王㑹圖以示後世詔以鴻臚所得繢著之又詔阿熱著宗正屬籍按鄭亞改本於鳥介事下結云公於是冇討北狄之詔於劉稹揚弁事下結云公於是有伐上黨之制平晉陽之敕於宗英事下結云公於是有謝回鶻之命五慰堅昆之書四界限劃然殊勝此總結每牙管既拔芝泥將乾春秋運斗樞黃龍五彩負圖出置舜前圖以黄玉為匣白玉檢黄金繩芝為泥封兩端又曰天皇帝符璽詳前表上輙曰爾有獨㫁朕無疑謀固俟沃心可不假手左傳鄭伯曰鬼神實不逞於許君而假手於我寡人公亦分隂可就晉書陶侃曰大禹聖人惜寸隂至於凡人當惜分隂落簡如飛故每有急宣見為滎陽公表闗于宻畫内庭外制皆不與聞此又豈可與美洞簫而諷於後庭漢王褒傳元帝為太子嘉褒所為洞簫頌令後宫貴人左右皆誦讀之聞子虛而嗟不同世者漢司馬相如傳蜀人楊得意為狗監侍上上讀子虚賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦論功而校徳邪其有勢切疾雷晉載記苻堅親送王猛於霸東謂曰此㨗濟之機所謂疾雷不及掩耳機難於終日易介于石不終日屬宣室未召見為滎陽公表武帳不開見為與人啓公莫暇昌言具陳宻疏賈太傅之憂國固動集作洞非深誠見為絳郡公文山吏部之論兵詎因夙習世説時人以謂山濤不學孫吳而闇與之理㑹凡所奏御罕或依違及武宗下武重光詩序下武繼文也武王冇聖德復受天命能昭先人之功焉書背君文王武王宣重光崇名再易公又觀圖東序書天球河圖在東序按牒西崑漢禮樂志宫童效異披圖案諜穆天子傳天子西登崑崙至於羣玉之山先王之所謂册府率億兆歸心列公卿定議以一十四字垂百集作億千萬年箋武宗紀㑹昌五年正月已酉羣臣上尊號曰仁聖文武章天成功神徳明道大孝皇帝藻縟辭華鋪舒名實秦晉於玉檢瑶繩之内左傳懐嬴曰秦晉匹也白虎通封禪金泥銀繩漢書登封㤗山應劭曰刻石紀號有金泥玉檢之封平勃於緑疇䜛鼎之間魏略王朗與許文休書曰游談於平勃之間韓子齊伐魯索䜛鼎以其贋徃按緑疇未詳黄帝所受乃録圖非緑疇也或字之誤詳為滎陽公表方將命禮官召儒者見為京兆公表訪匡衡后土之議漢郊祀志匡衡以甘泉泰畤河東后土之祠宜可徙置長安願與羣吏定議採公玉明堂之圖漢郊祀志濟南人公玉帶上黄帝時明堂圖明堂中有一殿四而無壁以茅蓋通水水圜宫垣為復道上有樓從西南入名曰昆崙天子從之入以拜祠上帝考肆覲之禮於梁生書肆覲東后漢書儒林傳梁戴徳延君戴聖次君沛慶普孝公徳號大戴聖號小戴由是禮有大戴小戴慶氏之學藝文志禮十三家有古封禪羣祀三十二篇封禪議對十九篇漢封禪羣祀三十六篇取封禪之書於犬子漢司馬相如傳少時好讀書學擊劔名犬子既學慕藺相如之為人也更名相如後為郎病免家居茂陵天子使所忠往取其書而相如已死有遺札書言封禪事所忠奏焉天子異之遂禮中岳封于泰山至梁甫禪肅然盡皇王之盛事極臣子之殊功而軒鼎將成漢郊祀志黄帝采首山銅鑄鼎于荆山下鼎既成有龍垂胡􅐖下迎黄帝黄帝上騎羣臣後宫從上龍七十餘人後世因名其處曰鼎湖禹書就掩史記上㑹稽探禹穴張晏曰禹廵狩至㑹稽而崩因𦵏焉上有孔穴民間云禹入此穴孔靈符㑹稽記㑹稽山南有宛委山其上有石俗呼石匱壁立干雲昔禹治洪水厥功未就乃躋於此山發石匱得金簡玉字以知山河體勢於是疏導百川各盡其宜靈寶要略吳王闔閭遊包山見一人自言姓山名隠居入洞庭取素書一巻文不可識令人齎之問孔子孔子曰丘聞童謡云吳王出遊觀震湖龍威大人山隠居北上包山入靈墟乃入洞庭竊禹書然猶進先嘗之藥禮記君有疾飲藥臣先嘗之親有疾飲藥子先嘗之獻髙手之醫初學記司馬彪續漢書曰東平王蒼到國病詔遣太醫丞將髙手醫視病晉謝𤣥傳詔遣髙手醫一人令自消息藏周旦請代之書書序武王有疾周公作金縢詳賀相國啓追漢宣易名之義漢宣帝紀初名病已元康二年詔曰聞古天子之名難知而易諱也今百姓多上書觸諱以犯罪者朕甚憐之其更諱詢箋武宗紀本名瀍㑹昌六年三月壬寅上不豫制改御名炎一品集改名制㫖云漢宣帝柔服北夷𢎞宣祖業功徳之盛侔於周宣御歴十年乃從美稱朕逺惟大漢之事近稟聖祖之謀爰擇嘉名式遵令典敬承天意永保𢎞休宜改名為炎仍令所司擇日分命宰臣告天地宗朝其舊名中外表章不得更有迴避布告遐邇咸使聞知按易名似謚當云更名此亦義山偶失檢㸃處也作為大誥書序武王崩三監及淮夷叛周公相成王將黜殷作大誥祈於昊天書召誥曰惟恭奉幣用供王能祈天永命始終一朝紹續九徳書九徳咸事其功伐也既如彼其制作也又如此故合詔誥奏議碑贊等凡一帙一十五巻輒署曰㑹昌一品集云紀年追聖徳也書位旌官業也不言制集崇論道也惟公字文饒姓李氏趙郡人蓋大昴中丘漢地理志常山郡領中丘縣又趙地昴畢之分野晉載記趙攬曰昴者趙之分也有風雨翕張之氣見為懷州表藂臺髙邑地理志趙州領髙邑縣藂臺見上河東啓名集作有山河隠軫疑作轔之靈見為絳郡公文萃于直躬慶是全徳許靖廊廟之器蜀許靖傳注萬機論曰許文休者大較廊廟器也黄憲師表之姿後漢黄憲傳憲年十四荀淑竦然異之謂憲曰子吾之師表也何晏神仙初學記何晏别傳曰晏方年七八嵗慧心天悟形貌絶美出遊行觀者盈路咸謂神仙之類叔夜龍鳯晉書嵇康字叔夜美詞氣有風儀初學記嵇康别傳曰康長七尺八寸好容色雖土木形骸不自雕飾而龍章鳯姿天質自然宋玉閒麗宋玉登徒子好色賦序玉為人體貌閒麗口多㣲辭王衍白晳晉書王衍神情明秀風姿詳雅世説王夷甫恒捉白玉柄塵尾與手都無分别漢書霍光為人白晳馬援之睂宇盧植之音聲後漢書盧植字子幹音聲如鍾此其妙水鏡而為言䝉上音聲見為山南啓託丹青而為裕裕當作格䝉上睂宇即東觀漢記所謂馬援睂目如畫也至於好禮不倦用和為貴敬一人而取悦孝經敬一人而千萬人悦謙三位而無咎易謙九三曰勞謙君子有終言意以默識孔融薦禰衡表𢎞羊濳計安世默識初學記陳夀益部耆舊傳曰趙閎字温柔㓜時讀尚書默識其章句確乎寡辭易吉人之辭寡車匠胡奴罔迷于半面後漢應奉傳奉少聰明自為童兒及長凡所經履莫不暗記注謝承書曰奉少為上計吏許訓為計掾俱到京師訓自發鄉里在路晝頓暮宿所見長吏賓客亭長吏卒奴僕訓皆宻疏姓名欲試奉還郡出疏示奉奉云前食潁川綸氏都亭亭長胡奴名禄以飲漿來何不在疏坐中皆驚又云奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内開扇出半面視奉奉即委去後數十年於路見車匠識而呼之背碑覆局無俟於專心魏王粲傳粲與人共行讀道邉碑因使背而誦之不失一字觀人圍碁局壞粲為覆之不誤一道孟子今夫奕之為數小數也不專心致志則不得也聿成儉訓才有長物晉王恭傳恭曰吾平生無長物昔猶卑官端坐心齋見為栁珪啓江革分謝朓之舊𥜗便為臥具南史謝朓大雪中見江革敝絮單席耽學不倦乃脱𥜗并割氊與之周正得袁憲之談柄常在講筵南史袁憲字徳章憲父君正遣門客與憲候博士周𢎞正㑹𢎞正將升講坐延憲入室授以塵尾五車自娛三篋能識並見為安平公状麗則孔門之賦揚子法言詩人之賦麗以則詞人之賦麗以淫如孔氏之門用賦也則賈誼登堂相如入室矣清新鄴下之詩任昉薦士表辭賦清新屬言𤣥逺善曰陸機陸雲别傳云雲亦善屬文清新不及機而口辯持論過之鍾嶸詩品序降及建安曺公父子篤好斯文平原兄弟鬰為文棟劉植王粲為其羽翼次有攀龍託鳯自致于屬車者蓋将百計彬彬之盛大備於時矣重以多能見論語推於小學漢藝文志凡小學家四十五篇王子敬之隸法遒媚竇䝉述書賦注羊欣字敬元泰山人宋中散大夫與丘道䕶同受獻之筆法張懷瓘書㫁沈約云敬元尤長於隸書子敬之後可以獨步時人云買王得羊不失所望皇休明之草勢沈著宣和書譜皇象字休明廣陵人官至侍中工八分隸草世以書聖稱異代集作時是相逼當代罕儔不妄遇人集作不忌過人慎於取友與李杜齊名者少後漢黨銅傳范滂詣其母就與之訣母曰汝今得與李杜齊名死亦何恨願集作須僑札交貺者稀見為滎陽公状故能應是昌明媚于天子詩百辟卿士媚于天子憲章皇極燮理𤣥穹燭燿家聲粉飾國史並見前侔帝典之灝灝噩噩揚子法言虞夏之書渾渾爾商書灝灝爾周書噩噩爾尊王道之蕩蕩平平見為汝南公表而又不節怨嗟易不節若則嗟若知進憂亢易亢之為言也知進而不知退張良竟稱多病漢張良傳良從入闗性多疾即導引不食穀王充方務頤神後漢王充傳肅宗時詔公車徴病不行年漸七十造性書十六篇裁節嗜欲頤情自守無潁陽之善田潁當作頻史記王翦言不用因謝病歸老于頻陽李信敗王翦將兵六十萬人王翦行請美田宅園池甚衆大破荆軍乏好畤之巨産漢陸賈傳賈楚人也以好畤田地善往家焉師古曰好疇即今雍州好畤縣何曽之食既去晉何曽傳曽食日萬錢猶曰無下箸處虞悰之鮓方嘗南史虞悰傳上就悰求諸飲食方悰秘不出上醉後體不快悰乃獻醒酒鯖鮓一方而已憂其厚味周語單襄公曰厚味實腊毒嵇康養生論識厚味之害性故棄而弗顧有爽和氣肴䔩集作荻非無在集作任詩其肴維何包鼈鮮魚其䔩維何維筍及蒲琴鶴有餘伏知道為王寛與婦義安主書愁隨玉軫琴鶴恒驚成萬古之良相為集作作一代之髙士南史齊始興王鑑器服清素有髙士風繄爾來者景山仰之詩景山與京傳景山大山也某昔在左曺見為滎陽公表每集作實事先帝雖詭詞望利穀梁傳造辟而言詭辭而出注辟君也詭辭而出不以實告人也傅亮表造膝詭辭莫見其際不接於話言而深義約文庶窺於風采漢王莽傳欲有所為㣲見風采代天之言既集書皋陶謨曰天工人其代之代言見上文蟠地之樂難忘禮記及夫禮樂之極乎天而蟠乎地蓋屬才華用為序引北史崔瞻傳盧思道曰舉世重其風流所以才華見没以鄒衍之迂怪史記荀卿傳騶衍之術迂大而閭辯將潁嚴之淺近杜預春秋序末有潁子嚴者雖淺近亦復名家忽焉承命何所措辭五嶺幽遐八桂森爽並見表莫逢博約寜遇切磋處無價之場率然占玉尹文子魏田父得玉徑尺光射一室鄰人取獻魏王玉工曰此無價以當之五都之城僅可一觀登不枯之岸麤爾論珠見為李貽孫啓雖常有意焉亦不知量也某叩頭再拜上一本無此六字前題今一品集序用此乃鄭亞改定義山作也典嚴正大真燕許手筆較原作更為得體故附録之綸綍之興載籍之始先王發號施令明罰敕法蓋本於此也唐虞之盛二典存焉夏殷之隆厥有訓誥自𦙍征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代祀緜逺其代工掌制之名氏莫得而知至於成湯太甲則有仲虺伊尹為之訓誥髙宗得傅説則有説命之篇周公召公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曺之輩又乏儒墨之用每封功臣建子弟其辭多天子為之縱委於執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相器也厥後寖㣲寖長下於魏晉亦代有其人我髙祖革隋文物大備在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立於𤣥宗之朝新書蘓瓌傳瓌子頲襲父爵許國公後與張説以文章顯稱望略等故時號燕許大手筆按張説封燕國公常楊繼美於代宗之代新書楊炎字公南鳯翔天興人遷中書舍人與常衮同時知制誥衮長於除書而炎善徳音自開元後言制詔者稱常楊云洎憲宗皇帝英武啓運雄圖赫張中興之業髙映前古其時則先太師忠公翱翔内署有密勿贊佐之績平吳定蜀時惟其功及登樞衡作霖雨尊王室卑諸侯圖蔡料齊外定内理顯王言于典誥彰帝範于圖籍紀在徽冊播于無窮特進太子少保分司東都衛公長慶中事惠皇為翰林學士訓誥之業彰于前聞昭肅皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付𤣥機允壓神度每彤墀奏罷列承天睠帝亦講伊尹傅説之㫖定元首股肱之契以太平之制度上古之文教咸屬于公焉㑹先太后懿號未立帝明發有永懷之痛公述沙麓神井之瑞贊繞樞懷日之慶史記漢景帝王夫人姙娠夢日入懷以生武帝懋遵聖緒光慰孝思於是承命有宣懿祔廟之制及武宗郊昊天拜清廟文物胥備朝廷有禮華夷述職河朔修貢乃顯神休薦徽號奉揚一徳以示萬方於是撰仁聖文武至神大孝之冊㑹昌二年四月封域無虞天子翛然有求𤣥之思乃範貞金模聖表隆準日角漢書髙祖為人隆準而龍顔東觀漢記光武隆準日角燭於宫庭中外臣僚咸欲頌山河而褒日月也詩如山如河南史江祐傳帝胛上有赤誌晉夀太守王洪範罷任還上祖示之曰人皆謂此是日月相卿幸無泄之公於是有聖容之贊天街之北獯鬻攸居因饑憑陵怙衆强禦嚴之以刁斗而勃爾無懼申之以文告而腆然不率天子震怒旋命征之公獨運沈機上資宸㫁萬里勝負决于帷中雷霆既震犬羊遂潰疣贅披抉腥羶解離荘子外篇附贅縣疣出乎形哉而移於性舊書俞文俊上天后䟽人氣不和而疣贅生抱朴子誠欲逹彼腥膻而即此清淨也遁其名王復我貴主于是有討北狄之詔天寳末薊門為首亂之地瘡痏榛棘襲世未平至於漁陽帥仲武埽除妖孽臧獲仇讐方言荆淮海岱雜齊之間罵奴曰臧罵婢曰獲齊之北鄙燕之北郊几民男而聓婢謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也奉揚威神乃底康靖仍願勒石于盧龍之塞魏田疇傳豈可賣盧龍之基以易爵賞魏地形志北平郡新昌縣有盧龍山以敘聖功飛章上聞帝用允若公祗膺明命舒展格言呼嘯神祗吐納嵩華當晝而文星見不寐而白鳯來成諸候不朽之勲尊元后無私之化公於是有幽州紀聖功之碑潞帥劉從諌死其子因闗河之嶮恃甲兵之衆請爵爭地屢聞王庭中外疑迷互撓天聴帝將耀神武公累罄忠謀且言曰重耳在喪不聞利父雄渠受戮祗以抵君漢景帝紀吳王濞膠西王卬楚王戊趙王遂濟南王辟光菑川王賢膠東王雄渠皆舉兵反諸将破七國斬濞卬及雄渠皆自殺況明皇舊宫天井内地跨揺河北摇一作連脅倚山東豈可行有匪人坐為汙俗若可忍也孰不可容沃心無疑躡足乃定又曰上黨居天下之脊當河朔之喉今漳水雄兵常山勁卒是為脣齒實懼因依不若乘其未萌制其将動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以勸戒之魏候鎮候戮力從命絶壺闗之右臂收泜水之上游獲兹渠魁在此成算又轅門叛將横水餘兇竊上相之旌旗盜晉陽之管鑰帝怒斯赫人心愈疑咸以師老於郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又揚笏而言曰彼地則義師師分宗室是𤣥祖勤商之邑后稷造周之拜瓜瓞具存堂構斯在苟虧策畫不襲仇讎則是奬彌牟逐主之風彌牟疑作黔牟史記衛世家左右公子恕惠公之䜛殺前太子伋而代立乃作亂攻惠公立太子伋之弟黔牟為君惠公犇齊長冐頓射親之俗詩稱築室于道書謂疑謀勿成由是洞啓宸衷大破羣議運籌制勝舉無遺䇿防㣲慮逺必契神機授鉞之臣伏膺承命謝安之圍碁尚刼曺參之飲酒方酣果有軍書繼聞戎㨗砥磨周鉞水淬鄭刀萬里來袁尚之頭顱二冡𦵏蚩尤之肩髀歡聲雖震于朝市喜氣不見於形容何其纂立功勲鎮定風俗若是之重也公於是有伐上黨之制平晉陽之敕宗英可汗獻琛貢賮越自絶漠通於本朝文畢伯士之𦙍呼韓谷蠡之師或執玉而朝靈囿或解辮而拜甘泉並垂於冊書光彼明命公於是有諭回鶻之命五慰堅昆之書四文章等於訓傳機事出於神明固將偃仰邳石之符傲睨鬼箝之録聞之者可以祛聾瞶得之者可以弼邦國每牙管既拔芝泥將熟常於前席親授筆札公亦分隂可就落簡如飛時有急宣闗於密畫内庭外制皆不與聞或勢切疾雷機難終日宣室未召武帳莫開公則手疏封章達於旒扆當乙夜觀書之際未嘗不稱美再三此又豈可與傳洞簫而諷于後庭聞子虛而嗟不同世者論功校徳邪嵗在乙丑㑹昌五年也羣公常伯以天子之道貫於神祗一年而風雨攸序災沴不作二年殲醜虜興北伐之師四年誅狡童詠東征之歌詩序六月宣王北伐也東山周公東征也而又移摩尼之風圖覺經清凈摩尼寳珠映于五色隨方各現注惟照圓明也壞浮圖之俗後漢西域傳天竺國修浮圖道不殺伐遂以成俗偃兵返樸四海胥定思欲増鴻名光下武公乃觀東序之圖按西崑之牒鋪舒名實藻縟文采一作質類於上帝為唐神宗於是篹章天成功神徳明道之冊文㑹昌五年正月號位既畢華夷㑹同方將命禮官召儒者訪匡衡后土之議採公玉明堂之圖考肆覲之禮於梁生取封禪之文于犬子盡皇王之盛事極臣子之殊功而軒鼎将成禹書就掩然猶進先嘗之藥獻髙手之醫藏周旦請代之書追漢宣易名之美當作義作為大誥祈于昊天始終一朝紹續九徳其功伐也既如彼其制作也又如此故合武宗一朝冊命典誥奏議碑贊軍機羽檄凡兩帙二十巻輒署曰㑹昌一品制集紀年追聖徳也書位旌官業也嵗在丁卯大中元年也亞自左掖出為桂林九月公書至自洛以典誥制命示于幽鄙且使為序以集成書尋𤣥珠莫究其倪域荘子黄帝游乎赤水之北登於崑崙之丘遺其𤣥珠使智索之而弗得使離朱索之而弗得使喫詬索之而不得也乃使象罔象罔得之聴希聲莫窮於髙下老子大音希聲承恩震恐㡬移朝夕援筆而復止者三四伏念江陸盡盪一作修盪是辭讓不及因齋潔以序焉夫全功難恃大名難兼日赫于晝而乏清媚月皎于夜而無陽煦冬之為候也則雪霜飄暴凍入肌髮夏之為用也則金流石爍火走膚脈如陽春髙秋者稀焉南則毒虺之為厲也北則獯戎黠虜之為患也如洛邑咸秦者㡬焉鵰鷲不傅之以馳騁驊騮不授之以鶱翥如應龍者鮮焉仲尼聖賢之宗也位止於司冦老𥅆道徳之祖也官不過柱史如姬旦者㡬焉是以保衡傅説左右殷宗召公畢公寅亮周室咸著大訓克為元龜書契以來未之多有李斯以刻石紀號之文勝而不在休明之運又何足數哉周勃霍光雖有勲伐而不知儒術枚皐嚴忌善為文筆而不至巖廊自是已降其類實繁惟公藴開物致君之才居元弼上公之位建靖難平戎之業垂經天緯地之文萃於直躬慶是全徳蓋四序之陽春九州之咸雒品彚之應龍人倫之姬旦後之學者其景行之云爾容州經略使元結文集後序新書元結傳後魏常山王遵十五代孫少不羈十七乃折節向學事元徳秀擢進士第㑹天下亂浮沈人間代宗時拜道州刺史進授容管經畧使民樂其教立石頌徳次山有文編新書藝文志文編十巻有詩集有元子三書皆自為之序元結傳作自釋曰河南元氏望也結元子名也次山結字也少居商餘山著元子十篇故以元子為稱次山見譽於弱夫蘇氏始有名元結傳國子司業蘇源明見肅宗問天下士薦結可用文藝傳蘇源明京兆武功人初名預字弱夫見取於公浚楊當作湯公始得進士第元結傳天寳十二載舉進士禮部侍郎湯浚見其文曰一第慁子耳有司得子是賴果擢上第見憎於第五琦元載新書第五琦字禹珪京兆長安人乾元二年進同中書門下平章事元載字公輔鳯翔岐山人拜同中書門下平章事故其將兵不得授作官不至達母老不得盡其養母喪不得終其哀間二十年其文危苦激切悲憂酸傷於性命之際自占心經已下若干篇是原注句外曽孫遼東李惲宰相世系表有遼東李氏收得之聚為元文後編次山之作其緜逺長大以自然為祖老子人法地地法天天法道道法自然元氣為根揚雄解嘲大者含元氣老子𤣥牝之門是謂天地根變化移易之太虛無状荘子道不游太虚老子是謂無状之状大賁無色易賁无色也寒暑攸出鬼神有職南斗北斗史記天官書北斗七星所謂璇璣玉衡以齊七政又南斗為廟其北建星東龍西虎曲禮左青龍而右白虎方嚮物色列仙傳闗令尹喜内學老子西遊先見其氣知真人當過物色而遮之果得老子歘何從生啞鍾復鳴舊書張文瓘傳太樂有古鍾十二近代惟用其七餘有五俗號啞鍾莫能通者文瓘吹律調之聲皆響徹黄雉變雄舊書五行志髙宗文明後天下頻奏雌雉化為雄或半化未化兼以獻之則天臨朝之兆山相朝捧水信潮汐初學記海口有朝夕潮以逆河水韻府朝為潮夕為汐若大壓然不覺其興若大醉然不覺其醒其疾怒急擊快利勁果出行萬里不見其敵髙歌酣顔入飲於朝㫁章摘句如娠如生見為李郎中文狼子豽孫競於跳走左傳狼子野心豽本作貀説文漢律能捕豺貀購百錢異物志貀獸出朝鮮似狸蒼黒色無前兩足能捕鼠翦除斬殘程露血脈其詳緩柔潤壓抑趨儒如以一國買人一笑如以萬世換人一朝重屋深宫但見其脊牽繂長河不知其載死而更生夜而更明衣裳鍾石雅在宫藏其正聴嚴毅不滓不濁見祭楊郎中文如坐正人照彼佞者子從其翁婦從其姑豎麾為門懸木為牙張蓋乘車屹不敢入戰國䇿趙良説商君曰五羖大夫之相秦也勞不坐乘暑不張葢無名氏越謡歌君乘車我戴笠他日相逢下車揖将刑㫁死帝不得赦其碎細分擘西京賦擘肌分理切截纖顆如墜地碎若大咽叶上聲餘鋸取朽蠧櫟蟒出毒刺眼楚齒不見可視顧顛踣錯雜汙瀦傷損禮記汙其宫而瀦焉如在危處如在夢中其總㫖㑹源條綱正目若治大國若年大熟君若堯舜人人羲皇上之視下不知有一作其尊下之望上不知有一作其簒辮頭鑿齒淮南子南方有鑿齒民注吐一齒出口下長三尺詳上序扶服臣僕書我罔為臣僕詳上祭文融風彩露左傳昭公十八年夏五月火始昏見丙子風梓慎曰是謂融風火之始也吕氏春秋東北曰融風洞冥記東方朔語武帝曰吉雲之國雲氣著草木成五色露江淹雜體詩露彩方泛灩飄零委落耋老者在童齓者蕃見為白從事啓邪人佞夫指之觸之見為汝南公表薫薫熙熙不識其故吁不得盡其極也而論者徒曰次山不師孔氏為非嗚呼孔子於道徳仁義外有何物百千萬年聖賢相隨於塗中耳次山之書曰三皇用真而恥聖五帝用聖而恥明三王用明而恥察嗟嗟此書可以無乎孔氏固聖矣次山安在其必師之邪樊南甲集序箋舊書本傳商隠冇表状集四十巻新書藝文志李商隠樊南甲集二十巻乙集二十巻玉溪生詩三巻文賦一巻宋史藝文志李商隠文集八巻四六甲乙集四十巻别集二十巻詩集三巻今惟詩傳樊南生十六能著才一作十論聖論以古文出諸公間後聫為鄆相國令狐楚華太守崔戎所憐居門下時敕定奏記始通今體箋舊書本傳商隠能為古文不善偶對從事令狐楚幕楚能章奏遂以其道授商隠自是始為今體新書商隠初為文瑰邁竒古楚工章奏因授其學商隠儷偶長短而繁縟過之後又兩為秘省房中官恣展古集往往咽噱于任昉范雲徐陵庾信之間咽噱當作嗢噱魏志注鍾繇得書嗢噱庾元威論書曰許慎門徒居然嗢噱嵇康琴賦嗢噱終日注服䖍通俗篇樂不勝謂之嗢噱嗢鳥没切噱巨略切有請作文或時得好對切事聲勢物景衷一作哀上浮壮能感動人十年京師寒且餓人或目曰韓愈文杜甫詩彭陽令狐楚章檄樊南窮凍人或知之箋樊南之詩不師漢魏而師少陵其文不師班馬而師昌黎其四六不師徐庾而師彭陽平生述作於數語見之仲弟聖僕羲叟特善古文居㑹昌中進士為第一二常表一無表字以今體規我而未為一作焉能休大中元年被奏入嶺當去聲表記所為亦多冬如南郡新書地理志江陵府江陵郡本荆州南郡舟中忽復括其所藏火燹墨汙半有墜落因削筆衡山洗硯湘江以類相等色得四百三十三件作二十巻喚曰樊南四六四六之名六博格五四數六甲之取也四數未詳鮑宏博塞經各投六箸行六棊故曰六博漢吾丘夀王傳以善格五召待詔師古曰即今戲之簺也禮記内則九年教之數目注朔望與六甲也王應麟小學紺珠六甲甲子甲戊甲申甲午甲辰甲寅也漢志云日有六甲辰有五子未足矜十月十二日夜月明序樊南乙集序余為桂林從事日常使南郡舟中序所為四六作二十編明年正月自南郡歸二月府貶選為盩厔尉新書地理志鳯翔府扶風郡領盩厔縣與班縣令武公疑作功新書地理志京兆府京兆郡領武功縣劉官人同見尹日知録南人稱士人為官人昌黎集王適墓志銘一女憐之必嫁官人不以與凡子是唐時冇官者方得稱官人也杜子美逢唐興劉主簿詩云劍外官人冷尹即留假參軍事尃章奏本傳京兆尹盧𢎞正奏署掾曺令典章奏屬天子事邉康季榮首得七闗數月一作日李玭得秦州月餘朱叔明又得長樂州而益丞相亦尋取維州聫為章賀箋舊書宣宗紀大中三年六月康季榮奏收復原州石門驛藏水峽制勝六盤石峽等六闗訖邠寜張君緒奏今月十三日收復蕭闗御史臺奏改長樂為威州七月三州七闗軍人百姓皆河隴遺黎數千人見於闕下八月鳯翔節度使李玭奏收復秦州制曰仍待季榮叔明李玭君緒各廻戈到鎮當議甄酬三州七闗創置戍卒且要務靜九月辛亥西川節度使杜悰奏收復維州按詩集中偶成轉韻云平明赤帖使修表上賀嫖姚收賊州即此事也時同寮有京兆韋觀文河南房魯宰相世系表魯字詠歸樂安孫朴京兆韋嶠天水趙璜宰相世系表璜字祥牙長樂馮顓彭城劉允章新書劉允章字藴中咸通中為禮部侍郎後為東都留守是數輩者皆能文字每著一篇則取本去是嵗𦵏牛太尉新書牛僧孺字思黯宣宗立徒衡汝二州還為太子少師卒贈太尉天下設祭者百數他日尹言吾太尉之薨有杜司勲之誌新書杜牧字牧之歴黄池睦三州刺史入為司勲員外郎常兼史職人號為小杜以别杜甫云與子之奠文今不傳二事為不朽十月尚書范陽公盧𢎞正以徐戎凶悍節度闕判官奏入幕故事軍中移檄牒刺皆不闗決記室判官專掌之其闗記室者記室假故余亦參雜應用明年府薨選為博士在國子監太學始主事講經一作始復欲注書講經申誦古道教太學生一作教天下學生為文章七月尚書河東公柳仲郢守蜀東川奏為記室十月得見吳郡張黯見代改判上軍時公始陳兵新教作場一作新練兵作教場閱數軍實判官務撿舉條理不暇筆硯明年記室請如京師復攝其事自桂林至是所為已五六百篇其間可取者四百而巳三年已來喪失家道平居忽忽不樂始尅意事佛方願打鐘掃地為清凉山行者朱弁曲洧舊聞代州清凉山清凉寺始見于華嚴經蓋文殊示現之地也在五臺山之西五臺縣於文墨意緒闊略為置大牛集作太平篋塗逭破裂不復條貫十月𢎞農楊本勝宰相世系表籌字本勝監察御史始來軍中本勝賢而文尤樂收聚牋刺因懇索其素所有㑹前四六置京師不可取者乃强聨桂林至是所可取者以時以類亦為二十編名之曰三字一作為四六一此事非平生所尊尚應求備卒不足以為名直欲以塞本勝多愛我之意逐書其首是夕大中七年十一月十日夜火盡燈暗前無鬼鳥嶺表録異有鳥如鵂留名曰鬼車春夏之間稍遇晦則飛鳴而過嶺好酒多愛入人家鑠人魂氣或云九首曽為犬齧下一首常滴血也一如大中元年十集作十二月十二日夜時原注是序前四六之夕書罷永明不成寐集作書罷永歎際明而不成寐李義山文集箋註巻九, SBCK: ''}
