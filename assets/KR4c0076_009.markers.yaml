  - {type: line-break, offset: 0, content: '', id: KR4c0076_WYG_009-1a01}
  - {type: variant, offset: 0, length: 965, content: 欽定四庫全書李義山文集箋註巻九監察御史徐樹穀箋山東提學僉事徐烱註序太尉衛公㑹昌一品一有制字非集序原注代桂府滎陽公箋新書李徳裕傳澤潞平䇿功拜太尉進封趙國公徳裕固讓言唐興太尉凡七人尚父子儀乃不敢拜近王智興李戴義皆超拜保傳葢重惜此官裴度為司徒十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公母固辭徳裕又陳先臣封于趙冢孫寛中始生字曰三趙意將傳嫡不及支庶臣前益封已改中山臣先世皆嘗居汲願得封衛從之遂改衛國公唐葉十五帝謚昭肅始以太弟箋新書武宗紀武宗至道昭肅孝皇帝諱炎穆宗第五子也文宗疾大漸神䇿軍䕶軍中尉仇士良魚𢎞志矯詔廢皇太子成美復為陳王立穎王為皇太弟即皇帝位於柩前茂對天休易先王以茂對時育萬物左傳用能協於上下以承天休遂臨西宫入髙廟將以準則九土指麾三靈漢陳平傳天下指麾即定矣三靈見為成魏公表乃顧左右曰我祖宗並建豪英漢鼂錯傳今陛下講于大禹及髙皇帝之建豪英也範圍古昔易範圍天地之化而不過曲禮必則古昔稱先生史卜宵夢震嗟不寜史卜用文王事見為某先輩啓宵夢用武丁事見下文是用能文惟睿掌武當作常武見賀相國啓以永大業今朕奉承天命顯登乃辟庸不知帝賚朕者其誰氏子焉書夢帝賚予良弼其代予言楚語白公子張曰昔殷武丁能聳其徳至於神明以入於河自河祖亳於是乎三年默以思道又使以象旁求四方之賢得傳説以來升以為公而使朝夕規諫左右惕兢威靈迷撓章指周訥揚吃不能仰酬漢書周昌傳昌為人吃又盛怒曰臣口不能言然臣期期知其不可揚雄傳雄口吃不能劇談既三四日乃詔曰淮海伯父儀禮覲禮曰同姓大國則曰伯父小邦則曰叔父漢賈誼傳疏曰今自王候三公之貴天子之所改容而禮之也古天子之所謂伯父伯舅也注師古曰天子呼諸候長者同姓則曰伯父異姓則曰伯舅也伯長也按徳裕雖出趙郡而姓則周為李氏亦可稱伯父時為淮海軍節度使故曰淮海伯父也汝來輔予霞披霧銷六合怏望怏英華作快是或云當作觖望然觖望者謂不滿所望而怨也與上下文義不協恐非四月某日入覲是月某日登庸書疇咨若時登庸舊書開成五年九月以徳裕為吏部尚書同中書門下平章事淵角竒姿論語撰考讖顔囘有角額似月形山庭異表論語摘輔像子貢山庭斗繞為九流之華蓋西京賦注華蓋星覆北斗王者法而作葢作百度之司南左思吳都賦指南司方注指南車上冇木人手常指南故曰司方帝由是盡付𤣥機見為河南表允厭去聲神度詩神之格思不可度思左右者咸不知其夢邪卜邪金門朝罷見前状玉殿宴餘獨銜集作含日光靜與天語帝亦幽闡易㣲顯闡幽徴召誥説命之㫖定元, SBCK: ''}
