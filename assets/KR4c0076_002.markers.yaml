  - {type: variant, offset: 0, length: 20272, content: 欽定四庫全書李義山文集箋註巻二監察御史徐樹穀箋山東提學僉事徐炯註表下為滎當作濮陽公賀幽州破奚寇表箋此王茂元帥陳許時作也案鄭亞於宣宗大中元年二月以給事中出刺桂州英華作滎陽公誤新書㑹昌二年九月以張仲武為幽州盧龍軍節度使檢校工部尚書㑹囘鶻特敕那頡啜擁赤心部七十帳逼漁陽仲武使其弟仲至與别將游奉寰等率鋭兵三萬破之獲馬槖駝旗纛不勝計遣吏獻捷進檢校兵部尚書舊書奚國盖匈奴之别種也居鮮卑故地在京師東北四千餘里東接契丹西至突厥南拒白狼河北至霫國勝兵三萬餘人分為五部毎部置俟斤一人臣某言臣得本道進奏官某狀報某月日幽州節度使張仲武奏破奚北部落及諸山奚除舊奚王匿耶所管外殺戮首領丁壯老幼幷殺戮羊牛焚燒車帳器械等計二十萬刺史巳下面皮一百具史記刺客傳聶政因自皮面抉眼索隠皮面謂以刀剥其面皮欲令人不識晉朱伺傳馬雋妻子先在壘内或請皮其面以示之伺曰殺其妻子不能解圍但益其怒耳北史齊後主紀或殺人剥面皮而視之耳二百雙詩傳馘獲也不服者殺而獻其左耳曰馘奚車五百乘羊一萬口牛一千五百頭者天聲逺疊班固封燕然山銘振大漢之天聲廟略遐宣晉羊祜傳詔曰外揚王化内經廟略白虜獲於寧臺晉苻堅傳秦人呼鮮卑為白虜戰國策樂毅報燕昭王書曰齊器設於寧臺赤夷俘於燕路杜氏通典東夷九種有黄夷白夷赤夷𤣥夷孔融書士將髙翔逺引莫有北首燕路者矣臣某中賀臣竊窺舊史逖聽前朝司馬相如封禪文逖聴者風聲有天子憂邊清宵輟寐漢文帝紀詔曰間者累年匈奴並暴邊境多殺吏民今朕夙興夜寐勤勞天下憂苦萬民為之惻怛不安將軍出塞白首言歸後漢班超傳超妹昭上書請超曰超今且七十衰老被病頭髮無黒敢觸死匄超餘年書奏徴超還超在西域三十一年至洛陽病遂加卒至乃或勝或奔一彼一此左傳趙孟曰疆埸之事一彼一此何常之有竟困塞郊之柝那停絶漠之𤇺漠與幕同漢武帝紀衛青復將六將軍絶幕注臣瓚曰沙土曰幕直度曰絶師古曰幕者即今之突厥中磧耳李陵歌云經萬里兮度沙幕賈誼傳注師古曰晝則燔燧夜則舉𤇺詳見下為中丞賽神文猶欲敘烈旂常告功祧廟禮記王立七廟逺廟為祧用其暫勝謂曰難能况幽朔巨都書宅朔方曰幽都全燕重地晉石勒傳勒使徐光讓王浚曰跨全燕突騎之鄉薦臻奚寇猾亂華人田讓之䕶鮮卑莫能深入魏田豫傳豫字國讓漁陽雍奴人也文帝初使豫持節䕶烏桓校尉牽招解雋并䕶鮮卑為校尉九年其御夷狄恒摧抑兼并乖散强猾按唐初修前代之史凡犯廟諱者一名則稱其字劉淵曰劉元海石虎曰石季龍是也二名則去其一蕭淵明曰蕭明韓擒虎曰韓擒是也義山為文亦遵其式代宗諱豫故此表以田豫為田讓稱字之例也孝敬皇帝諱𢎞故會昌一品集序以周𢎞正為周正去一之例也苟非有為而然則古人之名固未可任意為翦截矣祭彤之軍遼水惟遣相攻後漢祭彤傳彤拜遼東太守以三虜連和卒為邊害乃招呼鮮卑其大都䕶偏何遣使奉獻彤曰審欲立功當歸擊匈奴其後嵗嵗相攻輒送首級受賞賜自是邊無寇警近嵗以來為患滋甚走單于偵邏之路見謝上表懷駒支漏泄之姦左傳晉将執戎子駒支范宣子親數諸朝曰來姜戎氏今諸侯之事我寡君不如昔者盖言語漏泄則職汝之由張仲武重感國恩習知邊事箋新書張仲武范陽人㑹昌初為雄武軍使遣其屬吳仲舒入朝請以本軍擊囘鶻李德裕因問北方事仲舒曰仲武通書習戎事乃擢兵馬留後而詔撫王領節度即拜副大使同三師而肄楚左傳吳子問於伍員曰伐楚如何對曰若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝侔五餌以間戎漢賈誼傳贊曰欲試屬國施五餌三表以係單于注師古曰賈誼書賜之盛服車乘以壊其目賜之盛食珍味以壊其口賜之音樂婦人以壊其耳賜之髙堂邃宇倉庫奴婢以壊其腹於來降者上以召幸之相娛樂親酌而手食之以壊其心此五餌也乘其嚻惰之時俄得翦除之便晉袁宏傳贊曰翦除荆棘燕犀密掛周禮考工記曰函人為甲犀甲七屬夀百年又曰燕之無函也非無函也夫人而能為函也徐陵與王僧辨書躍冀馬者千羣披燕犀者萬隊冀馬濳羈左傳冀之北土馬之所生後漢劉表傳贊曰雲屯冀馬超距投石者動過千羣史記秦王翦擊荆荆兵數挑戰終不出久之翦使人問軍中戲乎對曰方投石超距翦曰士卒可用矣㦸手科頭者略踰萬計張衡西京賦袒裼㦸手奎踽盤桓善曰左傳云㦸其手也史記張儀説韓王曰虎賁之士跿跔科頭貫頤奮㦸者至不可勝計集解科頭謂不著兜鍪入敵索隱兩手捧頤而直入敵又有執㦸者奮怒而趨入陣也徐陵九錫文他他籍籍萬計千羣坎三鼓而河流自却詩坎其擊鼓左傳曹劌曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我贏故克之淮南子武王渡孟津而陽侯之波逆流而擊疾風晦暝武王舉黄鉞麾之風去而浪息遂得渡聲六校而屋瓦皆飛漢陳湯傳即日引軍分行别為六校史記趙世家秦軍軍武安西鼓譟勒兵武安屋瓦盡振後漢光武紀莽兵大潰走者相騰踐㑹大雷風屋瓦皆飛自是鴞懼喪林詩翩彼飛鴞集于泮林兔忙迷穴戰國策馮煖曰狡兔有三窟僅得免其死耳無舟掬指左傳邲之戰中軍下軍爭舟舟中之指可掬也有地僵尸張衡西京賦尸僵路隅未驚紫陌之烏前軍巳蹙御覽引北史齊世辨性怯武平末為開封府帥入鄴令千餘騎登髙阜西望逺見羣烏飛起謂是兩京旗幟即馳還比至紫陌橋不敢反顧詳下啓不唳淮山之鶴後隊仍窮淮山謂八公山晉謝𤣥傳苻堅進屯壽陽列陣臨淝水𤣥以精鋭八千決戰淝水南堅中流矢臨陣斬苻融載記苻堅與苻融北望八公山上草木皆類人形寰宇記八公山一名淝陵山在夀州壽春縣詳見下文遂分袁尚之頭顱後漢書袁尚與操軍戰敗奔公孫康於遼東康曰卿頭顱方行萬里遂斬首送之仍裂蚩尤之肩髀史記集解皇覽曰蚩尤冢在東平郡壽張縣闞鄉城中髙七丈民常十月祀之有赤氣出如疋絳帛民名蚩尤旗肩髀冢在山陽郡鉅野縣重聚大小與闞冢等傳言黄帝與蚩尤戰於涿鹿之野黄帝殺之身體異處故别𦵏之穹廬落燼漢匈奴傳匈奴父子同穹廬卧同甲揚灰管子同甲十萬注同甲謂堅完齊等山積雲屯大收其車乘後漢劉盆子傳赤眉降積兵甲宜陽城西與熊耳山等角羸耳濕盡獲其牛羊易羝羊觸藩羸其角詩爾牛來思其耳濕濕栁水載澄栁水未詳案新書地理志營州栁城縣西北接奚北接契丹栁水疑當在縣界水經注水狼水又東北逕龍山西燕慕容晃以栁城之北龍山之南福地也桑河無事水經注濕水出鴈門隂館縣東北過代郡桑乾縣南又東北流左㑹桑乾水並受通稱又東過涿鹿縣北又東南出山過廣陽薊縣北又東至漁陽雍奴縣西入笥溝明一統志盧溝河在順天府西南本桑乾河俗呼渾河亦曰小黄河以流濁故也爰施吉語漢陳湯傳湯知烏孫瓦合不能久攻屈指計其日曰不出五日當有吉語聞居四日軍書到言巳解入解皇威潘岳西征賦兵舉而皇威暢此皆皇帝陛下功格上𤣥揚雄甘泉賦惟漢十世將郊上𤣥運膺下武詩下武惟周授兹成算隋栁彧傳表曰俱稟成算非専巳能於彼當仁見論語震肅九圍詩帝命式于九圍歡呼萬國昔艱難云始胡城首起於盧龍謂禄山之變魏田疇傳舊北平郡治在平岡道出盧龍達於栁城新書地理志平州治盧龍縣今直𨽻永平府治是也今開泰有期晉顧榮傳上牋曰羣生有賴開泰有期漢將先清於涿鹿史記黄帝與蚩尤戰於涿鹿之野注張晏曰涿鹿在上谷按漢志上谷郡有涿鹿縣應劭以為黄帝與蚩尤戰於此上谷今為直𨽻宣化府故宣府鎮地也人謀允若易人謀鬼謀書帝曰俞允若兹靈貺昭然後漢光武紀贊曰靈貺自甄固巳上慶祖宗下光編策錄圖洪範競三古之殊尤河圖挺佐輔黄帝至於翠媯之川魚汎白圖蘭葉朱文以授黄帝名曰録圖書天乃錫禹洪範九疇彛倫攸叙漢書藝文志世歴三古司馬相如封禪文未有殊尤絶跡可考於今者也玉檢金泥有百神之靈祐漢武帝紀登封泰山注孟庸曰刻石紀號有金策石函金泥玉檢之封焉後漢王霸傳霸謝曰此明公至徳神靈之祐也臣雖當防遏不介邊陲空増氣於懦夫實叨榮於下將日圍千里北堂書鈔春秋元命苞曰日徑千里徐整長歴曰日徑千里周圍三千里天蓋九重宋玉大言賦方地為車圓天為蓋楚辭天問曰圓則九重孰營度之奉一月之捷書惟知抃蹈詩一月三捷獻萬年之壽酒尚隔班行史記高祖紀九年大朝諸侯羣臣置酒未央前殿髙祖奉玉巵起為太上皇夀殿上羣臣皆呼萬嵗念風水於遐藩南史宋武帝紀因風水之勢晉四夷傳云視熊謂使者曰迎天子於西京以盡遐藩之節寄夢寐於宣室漢賈誼傳文帝思誼徴之及入見王方受釐坐宣室無任望闕結戀之至為河南盧尹賀上尊號表原注武宗五箋舊書武宗紀㑹昌年春正月巳酉朔宰臣李德裕杜悰李讓夷崔鉉太常卿孫簡等率文武百寮上徽號曰仁聖文武章天成功神徳明道皇帝新書明道下有大孝二字此表亦有之盖舊書傳冩者之遺脱耳京兆河南太原各置尹一員從三品臣某言臣得本道進奏院狀知宰臣某等奉上尊號以光洪休耀列聖之睿圖顔延之詩睿圖炳睟隋薛道衡傳髙祖文皇帝頌曰尚想叡圖表三宫之慈集作義訓晉后妃傳詔曰朕少遭憫凶慈訓無稟凡在生物孰不歡心臣某中賀臣聞善言天者必推功於廣覆善言日者必詠徳於大明然後物仰𤣥穹晉載紀胡義周作頌曰仁被蒼生徳格𤣥穹人知景曜後漢鄧后紀劉毅上書曰敷宣景曜勒勲金石皇王擬象今古同規伏惟仁聖文武章天成功神徳明道大孝皇帝陛下體天垂䕃法日流英華作輪輝𢎞上徳以纘戎老子上徳不徳是以有徳詩纘戎祖考啓下武而膺運頃從臨御旋致治平雨塊風條時推順適西京雜記董仲舒云太平之時雨不破塊風不揺條開甲破萌而巳苗螟葉􅀈坐致銷亡詩去其螟螣及其蟊賊傳食心曰螟食葉曰螣食根曰蟊食節曰賊陸氏釋文螣字亦作􅠀徒得反説文作􅀈是以銀甕石碑見下為汝南公表非烟浪井史記若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲瑞應圖王者清淨則浪井出神而吿瑞史不絶書左傳女叔侯曰史不絶書府無虚月且獯鬻為災漢匈奴傳唐虞以上有山戎獫允薰鬻居於北邊周秦乏策見為濮陽公表金行火運不絶於侵陵晉書董養曰白者金色國之行也漢髙帝紀注臣瓚曰漢承堯緒為火徳瀚海隂山㡬渝於約誓漢匈奴傳驃騎封於狼居胥山禪姑衍臨瀚海而還乂郎中侯應曰北遼塞至遼東外有隂山東西千餘里是其苑囿也而敢乘衰運來犯昌期陛下乃赫以天威詩王赫斯怒左傳天威不違顔咫尺授之宏略晉應詹傳疏曰頃者大事之後遐邇皆想宏略一伐而單于僅免三鼓而貴主來還滅大邦之仇讐詩蠢爾蠻荆大邦為仇攄累聖之忿憤班固封燕然山銘将上以攄髙文之宿憤箋舊書武宗紀㑹曷元年八月囘鶻烏介可汗遣使告難言本國為黠戛斯所攻故可汗死今部人推為可汗縁本國破散今奉太和公主南投大國時烏介至塞上大首領嗢沒思與赤心宰相相攻殺赤心率其部下數千帳遁西域天徳防禦使田牟以聞烏介又領其相頡于迦斯上表借天徳城以安公主仍乞糧儲牛羊供給金吾大将軍王㑹宗正少卿李師偃往其牙宣慰令放公主入朝賑粟二萬碩三年二月劉沔奏昨率諸道之師至大同軍遣石雄襲囘鶻牙帳雄大敗囘鶻于殺狐山烏介可汗被創而走巳迎得太和公主至雲州是日御宣政殿百寮稱賀及晉陽逐帥代馬新羈後漢班超傳疏曰代馬依風陛下又濬發宸襟委諸廟畫浹辰而前軍就路左傳浹辰之間注浹十二日也逾月而元惡膏碪碪本作椹史記范雎曰臣之胷不足以當椹質要不足以待斧鉞索隠椹音陟林反莝椹也按椹音斟俗從石作碪腰斬者以椹為籍以斧斫之如剉草然故陳餘遺章邯書云身伏鈇質質或作鑕靜豐沛之遺疆漢髙帝紀豐沛邑中陽里人也舉唐堯之故俗詩序此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉按晉陽本唐堯所封髙祖襲封唐國公由太原起義兵而有天下故云太箋舊書武宗紀會昌三年討劉稹十二月横水軍至原便催上路軍人以嵗将除欲候過嵗期既速軍情不悦都頭楊弁乗士卒流怨激之為亂四年春正月乙酉朔楊弁逐太原節度使李石壬子河東監軍使呂義忠收復太原生擒楊弁盡斬其亂卒百寮稱賀蕞爾潞子謂劉從諫左傳子産曰抑諺曰蕞爾國而三世執其政柄按潞州本春秋潞子國復生孽童謂劉稹脱縗冀恩上表請授節銊止柩拒詔拒㫖不䕶喪歸洛據九折之險漢地理志上黨壺闗縣有羊腸坂吕氏春秋九山有太行羊腸髙誘曰羊腸其山盤紆如羊腸在太原晉陽地焦氏易林羊腸九縈有五州之人舊書地理志昭義軍節度使治潞州領潞澤邢洺磁五州藪澤逋逃書為天下逋逃主萃淵藪糞土租税後漢袁紹傳輕榮財於糞土陛下又逺揚神斷深詔徂征書帝曰咨禹惟時有苗弗率汝徂征合鎮魏之强藩謂成徳王元逵魏博何𢎞敬出韓彭之鋭將謂劉沔王茂元等後漢謝該傳韓彭之將征討亂暴夷其巢窟晉謝𤣥傳疏曰巢窟宜除去彼根株漢趙廣漢傳郡中盜賊閭里輕俠其根株窟穴所在及吏受取請銖兩之奸皆知之戰國䇿張儀説秦王曰削株掘根無與禍鄰禍乃不存清明皇之舊宫舊書𤣥宗紀景龍二年兼潞州别駕開元十一年幸并州潞州五年别改其舊宅為飛龍宫復金橋之故地玉海地志金橋在上黨南二里常有童謡云聖人執節度金橋景龍三年十月二十五日𤣥宗經此橋之京師曽非曠嵗集此丕功箋舊書㑹昌三年四月昭義節度使劉從諌卒三軍以從諫姪稹為兵馬留後上表請節鉞尋遣使齎詔潞府令稹䕶從諫之喪歸洛陽稹拒朝㫖劉稹傳詔以成徳王元逵魏博何𢎞敬為招討使與河東劉沔河陽王茂元合兵討之四年七月大將郭誼斬稹傳首京師地理志成徳軍節度使治恒州領恒趙冀深四州魏博節度使治魏州管魏貝博相潭衛六州河東節度使治太原府管汾遼沁嵐石忻憲等州固巳至化潛融事光於玉版徐陵碑皇帝以陶唐啓國致玉版於河宗詳見下文𤣥機獨運晉慕容垂傳堅報曰𤣥機不弔理溢於瑶編况又志切希夷老子視之不見名之曰夷聴之不聞名之曰希道存沖漠楊子太𤣥沖漠無朕慕遺蹤於姑射載動堯心思順請於崆峒欲勞軒拜莊子堯見四子藐姑射之山汾水之陽窅然喪其天下又黄帝聞廣成子在於崆峒之上故往見之黄帝順下風膝行而進再拜稽首而問逺推集作揚聖祖再佇神孫新書天寳二年加號𤣥元皇帝曰大聖神享於𤣥元宫追號大聖祖父周上御大夫敬曰先天太皇咎繇曰徳明皇帝涼武昭王曰興聖皇帝改西京𤣥元宫曰太清宫東京曰太㣲宫俾異法皆祛多門就掩麟殿正𤣥元之座舊書文宗紀上降誕日僧徒道士講論於麟徳殿上謂宰臣曰降誕日設齋起自近逺朕緣相承巳乆未可便革按舊時釋居道上今武宗去釋氏故𤣥元得正其位鳳書招黄老之徒陸翽鄴中記石虎詔書以五色紙銜木鳳皇口中飛下端門舊書武宗紀㑹昌元年三月造靈符應聖院於龍首池六月以衡山道士劉元靖為銀青光禄大夫充崇元館學士賜號廣成先生令與道士趙歸真於禁中修法籙右箋舊書武宗紀㑹昌四年三月以道士趙歸真為左街道教授先生時帝志學神仙師歸真歸真乘寵每對排毁釋氏言非中國之教蠧耗生靈盡宜除去帝頗信之七月澤潞平五年春正月巳酉朔勅造望仙臺於南郊壇趙歸真遂與道士鄧元起劉𤣥靖排毁釋氏而拆寺之請行焉凡天下所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩税户折招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩税户十五萬人𨽻僧尼屬主客顯明外國之教勒大秦穆䕶祅二千餘人還俗不雜中華之風按祅虚焉切讀若軒胡神名也將以休有萬靈臨兹兆衆使咸踐夀昌之域俱游富庶之鄉巍乎煥乎盛矣美矣故得人祗協欲華夏均懷願加尊顯之稱説苑無以尊顯吾親以報財成之美易后以財成天地之道宰臣等果能陳大義允建一作進鴻名相如封禪文前聖所以永保鴻名而常為稱首伊尹暨湯咸有一德書惟尹躬暨湯咸有一徳咎繇謨禹克纘九功漢百官公卿表咎繇作士師古曰咎音臯繇音弋昭反書九功惟叙述盡善於王猷詩王猷允塞標具美於帝籙陸機漢高祖功臣頌沈跡中卿飛名帝籙南山稱夀詩如南山之夀不騫不崩漢武帝紀元封元年詔曰親登嵩髙咸聞呼萬嵗者三又太始元年登之罘浮大海山稱萬嵗北辰降光初學記荆州星占曰北辰之名天闗一名北極北極者紫宫天座也漢郊祀歌體招揺若永望星留俞塞隕光師古曰俞答也言衆星留神答我饗薦降其光耀四面充塞也永終一作於誤無極之年汲冢周書道天莫如無極長奉上清之號初學記上清天三君列紀經曰上清真人姓桓字芝乃中皇時人也臣幸丁昌運方守洛京空深戀闕之誠不在稱觴之列舉頭見日雖悲千里之遥側管窺天且慶百年之幸荘子以管窺天以錐指地東方朔答客難以管窺天以蠡測海無任徘徊望闕蹈舞踴躍之至代安平公華州賀聖躬痊復表原注文宗大箋舊書文宗紀和七年十二月幸望春宫聖體不康八年正月癸丑朔丁巳聖體痊平御太和殿見内臣甲子御紫宸殿見羣臣臣某言今月某日得本道進奉院報以聖躬痊和右僕射平章事臣涯王涯等箋舊書王涯字廣津太原人貞元八年進士擢第登宏詞科李訓事敗斬獨栁下奉見聖躬訖社稷殊祥生靈大慶臣忝分朝寄四奉國恩無任抃舞踴躍之至臣聞天普覆也應運而健若龍行易天行健日至明焉有時而氣如虹貫戰國䇿白虹貫日伏惟皇帝陛下道超普覆迹邁至明思社稷集作宗社之靈惟徳是輔書皇天無親惟徳是輔念蒸黎之廣以位為憂見為安平公表求衣未明漢鄒陽傳孝文皇帝據闗入立寒心銷志未明求衣觀書乙夜顔延之五君詠觀書鄙章句北堂書鈔引東觀漢紀兹者甲夜讀書乙夜講經箋通鑑唐文宗嘗謂左右曰若不甲夜視事乙夜觀書何以為人君夀域既臻於躋俗漢王吉傳䟽曰敺一世之民躋之仁夀之域大庭微闕於怡神漢嚴助傳南越王願伏北闕望大庭以報盛德後漢李膺傳荀爽書曰願怡神無事偃息衡行是以自北陸送寒左傳申豐曰古者日在北陸而藏氷蹔佇禹㑹見為汝南公表及東郊迎氣禮記立春之日天子親帥三公九卿諸侯大夫以迎春于東郊後漢章帝紀始行月令迎氣樂爰復堯咨書堯典帝曰咨汝羲暨和又曰咨四岳四海方來百辟咸在六幽雷動見為汝南公表萬夀山呼漢書武帝在嵩山聞呼萬嵗者三惟臣獨以一麾載離雙闕並見前犬馬之微誠徒切李宻陳情表臣不勝犬馬怖懼之情鴛鴻之舊列難階隋劉炫傳自為賛曰齊鑣驥騄比翼鵷鴻提郡印而通宵九驚對使符而一食三起後漢蘇不韋傳李嵩大驚懼乃以版藉地一夕九徙吕氏春秋禹一食而三起以禮有道之士今幸巳俗臻殷富年比順成禮記八蜡以記四方四方年不順成八蜡不通伏惟稍簡萬㡬書一日二日萬㡬以迎百福託調燮於彼相書惟兹三公論道經邦燮理隂陽責綏撫於列藩承九廟之降祥副兆人之允望某不勝慺慺慊慊之至謹差某奉表陳賀以聞為汝南公賀元日御正殿受朝賀表箋武宗㑹昌二年正月以彗星既滅復御正殿舉元㑹之禮時周墀在華州是表與前賀彗星不見表相繼而上也臣某言臣得本州進奏院狀報稱元日皇帝陛下御含元殿受朝賀者上正三辰謂星變滅除下臨萬國謂元正朝㑹事雖舉舊命則維新臣某中賀臣聞聖祖垂訓王者處域中之尊老子道大天大地大王亦大域中有四大而王居其一焉公羊紀時春者為一嵗之始公羊傳元年春王正月元年者何君之始年也正月者何嵗之始載稽故實抑有典章近嵗以來此禮多闕或事因惜費或時屬告休箋按舊書文宗紀太和五年以積隂浹旬罷元㑹六年以久雪罷開成五年上不康不受朝賀故云伏惟皇帝陛下道被無垠漢賈誼傳坱軋無垠政敷有截詩海外有截全取發生之德梁元帝纂要春曰青陽亦曰發生無非訢合之仁禮記天地訢合蒼昊降符爾雅春為蒼天夏為昊天黄輿告瑞易天𤣥而地黄又坤為大輿石碑既見文作太平石碑未詳按魏青龍三年張掖刪丹縣冇寳石負圖白畫成文晉泰始四年氐池縣大栁谷口有𤣥石一所白質成文又唐武徳三年郇州獻瑞石有文曰天子萬年事頗相類若呉孫皓時歴陵石印封發其文曰四世治太平始乃皓使者所偽作亡國之事恐非其引銀甕旋臻事成萬嵗孝經援神契銀甕不汲自随不盛自盈孫氏瑞應圖王者宴不及醉刑罰中則銀甕出而又憂勤不輟克責方深精誠旁達於八紘淮南子八紘之氣是出寒暑八紘之外乃有八極之雲是雨天下懇惻上通於九廟見前表仙厨撤味漢武内傳上元夫人老君弟子也元封元年七月七日夜西王母降命侍女郭密香邀夫人同宴俄而夫人至夫人設廚廚亦精珍獸舘休畋揚雄長楊賦序上將誇胡人以多禽獸載以檻車輸長楊射熊舘雄從至射熊舘還上長楊賦以諷遂使化妖宿為夀星漢書音義妖星曰孛星彗星長星亦曰攙搶爾雅云夀星角亢也變小饑為酺飲榖梁傳二榖不升謂之饑漢文帝紀酺五日師古曰酺之為言布也王德布于天下合而聚飲食為酺慶由聖感令屬神行爰在新正式修闕典彤庭列位西都賦玉除彤庭丹陛陳儀凝旈而天啓其門大戴禮古者冕而前旈所以蔽明也漢郊祀歌天門開詄蕩蕩服衮而日升于觀周禮享先王則衮冕注衮巻龍衣也日觀注見前巽風發越易隨風巽君子以申命行事解澤滂沱易雷雨作解君子以赦過宥罪詩月離于畢俾滂沱矣左右賢臣駿奔多士詩實左右商王又濟濟多士秉文之德對越在天駿奔走在廟國無諛佞擢靈草而不揺帝王世紀黄帝時有草生于庭佞人入則指之名曰屈軼朝絶姦邪儼神羊而莫動説文獬廌神竒之獸一名任法狀如羊古者決訟令之以觸不直後漢輿服志獬廌神羊也論衡獬廌一角羊也青色四足能知曲直獄疑者令羊觸之禮成而退物有其容左傳屠蒯曰事有其物物有其容足以光耀瑶圖徐陵檄周文主上恭膺寶歴嗣奉瑶圗丹青玉版王子年拾遺記堯聖徳光洽河洛之濱得玉版方尺圖天地之形耀前映後邁五登三見賀赦表臣竊訪碩儒吳志華覈傳皆名學碩儒乃任其職逺徴舊典帝堯華封之祝惟止匹夫神禹塗山之儀且非元㑹然猶堯有多憂之戒並見前禹存後至之誅家語孔子曰昔禹致諸侯于㑹稽之山防風氏後至禹殺僇之在和平而尚乖孰歡呼之可致豈與兹日而得同年臣方守河潼文選河潼注向曰河潼二水名正分符竹不獲躬承玉帛首率梯航顔延之序梯山航海踰沙軼漠之貢况又嘗以藝文叨居禁密雖逺離天上猶近闗西抃賀空深就望無所心馳紫闥曹植表注心皇極結情紫闥非夢寐而不通魂繞皇闈傅咸詩明明闢皇闈羨歸飛而莫及無任荷恩祝夀戀闕屏營之至為濮陽公論皇太子表箋此茂元鎮涇原時上也舊書文宗紀開成三年九月壬戌上以皇太子慢游敗度欲廢之移太子于少陽院殺太子宫人左右數十人冬十月庚子太子薨于少陽院文宗二子傳莊恪太子永文宗長子也母曰王徳妃太和四年封魯王六年冊為皇太子開成三年暴薨時傳云太子徳妃之出也晩年寵衰賢妃楊氏恩渥方深懼太子他日不利於巳故日加誣譖太子終不能自辨明也太子既薨上意追悔因㑹寧殿宴小兒縁橦有一夫在下憂其墮地若狂者上問之乃其父也上因感泣謂左右曰朕富有天下不能全一子遂召樂官劉楚材宫人張十十等責之曰陷吾太子皆爾曹也立命殺之臣某言今月某日得本道進奏院狀報今月六日宰臣鄭某等時鄭軍為首相率三省官屬新書職方志尚書省中書省門下省是為三省入論皇太子事者文宗二子傳開成三年上以皇太子宴遊敗度不可教導將議廢黜特開延英召宰臣及兩省御史臺五品已上南班四品巳上官對宰臣及衆官以為儲后年小可俟改過國本至重願寛宥御史中丞狄兼謩上前雪涕以諫詞理懇切翌日翰林學士六人洎神策六軍軍使十六人又進表陳論上意稍解其日一更太子歸少陽院中人張克巳等數十人連坐至死及剥色流竄禠魄疆場晉伏乞國仁傳論曰當禠魂沙漠馳魂輦轂曹植表入侍輦轂莫知本末伏用驚惶臣某中謝臣聞禮贊元良禮記一人元良萬邦以貞世子之謂也易標明兩易明兩作離大人以繼明照于四方是司匕鬯易不喪匕鬯以奉宗祧周禮小宗伯辨廟祧之昭穆左傳叔向曰寡君敢拜齊君之安我先君之宗祧也華夏式瞻邦家大本漢叔孫通傳通曰太子天下大本一揺天下震動自昔質文或異步驟雖殊後漢崔實傳步驟之差各有云設既立之以賢則輔之有道北宫養徳梁簡文帝答徐摛書山濤有言東宫養徳而巳東序承榮禮記文王世子曰始立學者既興器立幣然後釋菜乃退儐于東序務近正人漢賈誼傳太子乃生而見正事聞正言行正道左右前後皆正人也用光繼體榖梁傳承明繼體則守文之君也史記外戚世家自古繼體守成之君周則周公為太傅太公為太師漢賈誼傳昔者成王幼在襁抱之中召公為太保周公為太傅太公為太師漢則疏氏二賢漢書地節三年立皇太子疏廣為太傅兄子受為少傅其後乞骸骨歸道路觀者曰賢哉二大夫商山四老史記髙祖欲易太子及宴置酒太子侍東園公甪里先生綺里季夏黄公從太子年皆八十餘鬚眉皓白上大驚曰煩公等卒調䕶太子内揚孝道外盡忠規猶在去彼嫌猜辨其疑似不由微細輕致動揺乃得守三十代之丕圖左傳成王定鼎於郏鄏卜世三十卜年七百延四百年之景祚後漢書獻帝紀贊曰終我四百永作虞賓張衡傳衡謂崔瑗曰吾觀太𤣥方知子雲妙極道數漢家得天下二百嵗之書也復二百嵗殆將終乎所以作者之數必顯一世常然之符也漢四百嵗𤣥其興矣注子雲當哀帝時著太𤣥經自漢初至哀帝二百嵗自中興至獻帝一百八十九年也著於史册煥若丹青揚子法言聖人之言明若丹青也伏惟皇帝陛下道冠百王功髙三古事窺化本謀動機先皇太子自正位春坊新書百官志左春坊左庶子二人正四品傳輝望苑漢武五子傳戾太子據元狩五年立為皇太子及冠上乃為立博望苑使通賓客陛下旁延俊乂晉張華傳劉卞曰東宫俊乂如林以贊溫文禮記三王教世子必以禮樂是故其成也懌恭敬而温文並學探淵源班固典引與之斟酌道徳之淵源氣壓浮競晉賈充傳浮競之徒莫不盡禮事之箋文宗二子傳上以魯王年幼思得賢傅輔導之因以户部侍郎庾敬休守本官兼魯王傅太常卿鄭肅兼王府長史户部郎中李踐方兼王府司馬尋册為太子以王起陳夷行為侍讀嗜魚不進賈誼新書文王使太公望傅太子發嗜鮑魚公不與求玦莫從魏文帝與鍾大理書近日南陽宗恵叔稱君侯昔有美玦乃不忽遺嘉貺益腆敢不欽承有王褒之獻箴初學記周王褒太子箴曰庶僚司箴敢告閽寺無卞蘭之奏賦魏卞蘭讃太子賦竊見所作典論及諸賦頌奉讀無倦今縱麤乖睿㫖微嗛聖心嗛音銜説文嗛口有所銜也史記佞幸𫝊太后由此嗛嫣集解徐廣曰嗛與銜通當以猶屬妙齡未加元服儀禮月令吉辰始加元服或攜徒御詩徒御不驚時縱逸游欒野夏儲亦常觀舞山海經大欒之野夏后啓于此舞九代馬乘兩龍南皮魏副屢見飛觴魏文帝與吳質書每念昔日南皮之游誠不可忘善曰漢勃海郡有南皮縣陛下睿發慈仁殷勤指教晉宗室𫝊張方受其指教稍踰規戒即震威靈雖伐木析薪必循其理詩小弁之篇曰伐木掎矣析薪杝矣舍彼有罪予之佗矣傳伐木者掎其顛析薪者随其理箋掎其顛者不欲妄踣之随其理者不欲妄挫折之以言今王之遇太子不如伐木析薪也而逝梁發笱亦有可虞詩無逝我梁無發我笱箋逝之也之人梁發人笱此必有盜魚之罪以言褒姒淫色來嬖於王盜我太子母子之寵按此聯之意盖以宜臼喻太子褒姒比賢妃也抑臣又聞父之於子也有嚴訓而無責善君之于臣也有掩惡而復録功故得一作能各務日新並從夕改晉周處傳論曰終能克巳勵精朝聞夕改李善文選注曽子曰君子朝有過夕改則與之夕有過朝改則與之同寘于道不傷其慈儻犯在斯須便遺天性過當造次遽抵國章則以古以今孰為令子在朝在野誰曰全臣虚牽復之微言易牽復吉失不貳之深㫖見論語伏惟陛下侔覆育于天地霽赫怒于雷霆説文霽雨止也漢魏相傳相心善其言為霽威嚴注臣瓉曰霽止也復許省勵宫闈早謝師傅蹈殊休於列聖慰欽矚於兆人臣才則荒涼志惟朴騃漢息夫躬傳内實騃不曉事師古曰騃愚也因緣代業䝉被官榮竊諸侯之土田詩魯頌曰錫之山川土田附庸領大將之旗鼓左傳張侯曰師之耳目在吾旗鼔漢韓信傳信建大將旗鼔鼓行出井陘口當車折檻漢書薛廣徳傳上欲御樓船廣徳當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣徳曰陛下不聴臣臣自刎以血汙車輪朱雲傳雲曰臣願賜尚方斬馬劍斬佞臣一人以厲其餘上問誰也曰安昌侯張禹上大怒御史將雲下雲攀檻檻折御史將雲去合首他人瀝膽刺心隋李徳林傳天命論云披肝瀝膽李陵答蘇武書陵不難刺心以自明正當今日而名非朝籍三輔黄圗漢宫門各有禁非侍衛通籍之臣不敢妄入務切軍機庾信碑軍機警急道阻且脩佇立以泣語見詩龍樓獻直漢書孝成皇帝元帝太子也上常急召太子出龍樓門不敢絶馳道戴逵之詞翰莫一作蔑聞晉書戴逵字安道性髙潔累徴為散騎常侍不至太元二十年太子太傅㑹稽王道子少傅王雅詹事王珣上疏曰逵年在耆老清風彌劭東宫虚徳式延事外宜加旌命以參僚侍㑹病卒鳳闕拜章張儼之精誠未泯吳錄張儼字子節以博聞多識拜大鴻臚使晉李善文選註張儼請立太子師𫝊表曰陛下應期順乾作主干冒宸極晉傅咸傳億兆顒顒戴仰宸極無任隕涕祈恩之至謹遣某官某奉表陳論以聞代僕射濮陽公遺表箋新書王茂元自陳許節度徙河陽討劉稹也李徳裕以茂元兵寡詔王宰領陳許合義成兵援之以河隂所貯兵械内庫甲弓矢陌刀賜之㑹病以宰兼河陽行營攻討使卒贈司徒諡曰威舊書㑹昌中河北諸軍討劉稹茂元亦以本軍屯天井賊未平而卒臣某言臣聞螻蟻知雨雖感通於𤣥天東觀漢紀永平五年少雨上御雲臺自以易林占之其繇曰蟻封穴户大雨将至荘子鴻濛曰𤣥天弗成蒲栁望秋必凋華於厚夜晋顧悦之傳悦之與簡文同年而髮早白帝問其故對曰蒲栁常質望秋先零左傳楚子曰惟是春秋窀穸之事注窀厚也穸夜也厚夜長夜謂埋葬也況臣攝生寡要老子善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地將命無方寒暑頓侵精神坐竭竈乏傳薪之火莊子指窮以為薪火𫝊也不知其盡也餘焰㡬何隙無留影之駒莊子人生天地之間若白駒之過隙殘光即盡徐陵書殘光炯炯慮在昏明叩心戀闕後漢耿弇傳元元叩心更思莽朝江淹書昔者賤臣叩心飛霜擊于燕地曹植詩顧瞻戀城闕忍死集作命封章晋宣帝紀天子執帝手目齊王曰以後事相托死乃復可忍吾忍死待君叫白日而不囘楚辭去白日之昭昭襲長夜之悠悠望青天而永訣江淹别賦豈能摹蹔離之狀冩永訣之情者乎臣某中謝臣雖忝望族南史王僧辯傳時有安成望族劉敬躬者本實將家晋載記石𢎞字大雅勒之第二子也勒謂徐光曰大雅愔愔殊不似將家子自先臣出總郊圻遇任大國静無師旅被服元化翺翔盛時遂與季弟參元栁宗元賀王參元失火書僕自貞元十五年見足下之文章蓄之者盖六七年俱以詞場就貢久而不調因以上書自薦求通干時預試蜀來敏傳議論干時芸香作吏見為安平公表始筮仕於徳宗左傳畢萬筮仕于晉瑞節臨戎周語為摯幣瑞節以鎮之復分憂於陛下雖性分有限而忠誠不移一作磨固無韓彭為將之能見為河南表實慕趙竇散財之義魏書公令曰昔趙奢竇嬰之為將也受賜千金一朝散之故能濟成大功永世流聲兩踰嶺嶠四建牙旗東京賦牙旗繽紛薛綜曰牙旗者将軍之旌古者天子出建大牙旗竿上以象牙飾之按四建牙旗謂嶺南涇原陳許河陽也約巳潔身後漢書應奉傳曽祖父順為河南尹將作大匠公廉約已明達政事皇甫規傳李膺王暢孔翊潔身守禮絶甘分少司馬遷報任安書李陵素與士大夫絶甘分少能得人死力良田五頃南史王悦之傳上以其㢘介賜良田五頃以為侍中慮莫及于子孫厚禄萬鍾後漢酈炎傳作詩曰終居天下宰食此萬鍾禄惠頗霑于賓客恭承詔命以守藩條而掌事者徒以元和中吕元膺留守東都李師古當作道下同潛謀洛邑託以郡邸入之甲兵臣當時為元膺賓僚值師古竊發藍衫不脱竹簡仍持因為麾兵虜其元帥並見陳情表遂以將材相許戎統見期頡頏遐途詩頡之頏之纂修舊服書纉禹舊服光隂荏苒潘岳悼亡詩荏苒冬春謝梁簡文帝詩常惜光隂移遷授頻仍漢孝成帝紀詔曰大異重仍師古曰仍頻也昨者分領許昌兼臨河内當上黨阻兵之始左傳衆仲曰阻兵無衆是孽童拒詔之初箋舊書昭義節度等使劉從諫㑹昌三年卒大將郭歸誼等用其姪稹權領軍務宰相李徳裕奏請稹䕶喪洛稹竟叛臣方將奮勵疲駑司馬遷書僕雖疲駑亦常側聞長者之遺風矣指麾精鋭漢陳平傳天下指揮即定矣潘岳闗中詩爰整精鋭所冀解鞍赤狄謂潞州顔延之詩嚴駕越風寒解鞍犯霜露息駕晉城謂太原新書澤州髙平郡領晉城縣大攘蜂蠆之羣左傳臧文仲曰君無謂邾小蜂蠆有毒而況國乎以雪神人之憤晋虞悝傳王敦搆逆人神所忿疾自前月某日後軍聲大振賊勢少衰人一其心書爾尚一乃心力其克有勲士百其勇南史韋睿傳人百其勇鷰頷有相曽無定逺之期後漢班超傳相者指曰生燕頷虎頸飛而食肉此萬里侯相也馬革裹尸實負伏波之願見下祭文而精誠靡著素心集作志望見違援桴之意方堅桴通作枹左傳卻克左并轡右援抱而鼓馬逸不能止就木之期俄及左傳季隗曰吾二十五年矣又如是而嫁則就木焉忽自今月某日疾生腹臟弊及筋骸藥劑之攻擊愈深神祇之禱祠無益顔延之陶徴士誄藥劑弗嘗禱祠非益固已騰名鬼籙魏文帝書觀其姓名巳為鬼籙收氣人寰漢五行志聖人為之宗廟以收魂氣鮑昭舞鶴賦歸人寰之喧卑復然無望于死灰漢韓安國傳獄吏田甲辱安國安國曰死灰獨不復然乎更起難同於仆樹漢昭帝紀元鳯三年春上林有栁樹枯僵自起生然臣素窺長者曽慕達人左傳聖人有明徳者若不當世其後必有達人省知變化之端易知變化之道者其知神之所為乎麤識死生之理易原始反終故知死生之説豈其有貪富貴敢冀長延但以未報國恩未誅賊黨視胄長免左傳葉公免胄而進對弓莫彎孟子越人闗弓而射之闗與彎同思犬馬以自悲漢趙充國傳犬馬之齒七十六為明詔填溝壑死骨不朽悼鐘漏之先迫魏志田豫答司馬宣王曰年過七十而居位譬猶鐘鳴漏盡而夜行不休也志有所在傷如之何撫節而乏淚以流劉琨扶風歌淚下如流泉伏弢而無血可衉晉語鐡之戰趙簡子曰鄭人擊我吾伏弢衉血鼓音不衰注面汚血曰衉臣某中謝其行營三軍巳舉牒差某官某河陽留務差某官某懐州留務差某官某訖並皆授之方略漢趙充國傳願馳至金城圖上方略各有司存見論語至於集作竊計旬日晉書阮籍傳旬日而還必無逗撓漢書廷尉王恢逗撓當斬注逗曲行避敵也撓顧望也臣又伏思任司農大卿之日授忠武統帥之時紫殿承恩彤庭入對漢成帝紀永始四年春正月行幸甘泉郊泰畤祥光降集紫殿謝眺直中書省詩紫殿肅隂隂彤庭赫宏敞躬瞻堯日親沐舜風並見前獲睹陛下神武之姿易古之聰明睿智神武而不殺者夫獲聞陛下憂勤之㫖即北蕃小寇謂囘鶻東土微妖一作戎謂劉稹亦何足煩陛下之甲兵汙陛下之鈇鑕見為河南盧尹表伏願時推明略魏志武帝紀評曰惟其明略最優也光闡睿圖見為河南表内則收徳裕李徳裕見太尉衛公序讓夷李讓夷舊書李讓夷字達心隴西人徳裕秉政歴中書侍郎同平章事紳李紳舊書李紳字公垂潤州無錫人本山東著姓㑹昌元年守僕射平章事復出為淮南節度鉉崔鉉舊書崔元略博陵人子鉉字台碩畧遷户部侍郎承㫖㑹昌末以本官同平章事之嘉謨外則任彦佐李彦佐舊書武宗紀㑹昌三年九月以徐泗節度使李彦佐為澤潞西面招討使以陳許節度使王宰充澤潞南面招討使王茂元卒王宰代總萬善之師十二月王宰奏收天井闗四年八月王宰傳稹首露布獻於京師元逵王元逵舊書王元逵廷凑子也起復鎮州大都督府長史成徳軍節度使詳為河南表宰王宰新書王晏宰後去晏獨名智興次子也累擢邠寧慶節度使徙忠武軍宣宗初進少傳卒沔劉沔舊書劉沔許州牙將也移北京留守詳為河南表之威力廓清華夏昭薦祖宗然後瘞玉勒成桓譚新論修封泰山瘞玉岱宗東都賦封岱勒成儀炳乎世宗縷金垂烈劉峻廣絶交論聖賢鏤金版而鐫盤盂善曰太公金匱云屈一人之下申萬人之上武王曰請著金版臣雖百死後漢第五倫傳疏曰雖遭百死不敢擇地復何恨焉臣精爽巳虧左傳心之精爽是謂魂魄言辭失次晉王濬傳疏曰拜表流汗言不識次氣無復續䝉以纊而莫勝禮記喪大記曰屬纊候氣絶口不能言飯用貝而何益榖梁傳貝玉曰含春秋説題辭口實曰唅象生時食也天子以珠諸侯以玉大夫以璧士以貝故國一作園千里明君萬年永捐覆載之恩長入幽冥之路張衡思𤣥賦矧幽冥之可信後漢馮衍傳歎曰修道徳于幽冥之路殘魂不昧雖温序之思歸後漢書温序為䕶羌校尉行部至襄武遇賊死節主簿韓遵等持尸歸斂光武憐之賜葬洛陽城旁注長子夀為鄒平侯相夢序告之曰久客思鄉里夀上書乞骸骨歸葬帝許之乃返舊塋枯骨有知遇杜囘而必亢見下為王侍御表迴望昭一作聖代哀號不能無任荒惙攀戀之至謹奉表代辭以聞代彭陽公遺表箋舊書令狐楚傳楚字殻士自言國初十八學士徳棻之裔太和九年守尚書左僕射進封彭陽郡開國公開成元年檢校左僕射興元尹充山南西道節度使二年十一月卒於鎮年七十二冊贈司空諡曰文楚疾甚召從事李商隱曰吾氣魄巳殫情思俱盡然所懐未巳强欲自冩聞天恐辭語乖舛子當助我成之令狐徳棻傳徳棻宜州華原人隋鴻臚少卿熈之子也先居燉煌代為河西右族今按新書宰相世系表令狐氏世居太原漢建威將軍邁與翟義起兵討王莽兵敗死之三子伯友文公稱皆奔燉煌伯友入龜兹文公入疏勒稱為故吏所匿遂居效榖其後有周御正中大夫彭陽襄公賜姓宇文氏生熈隋吏部武康公熈曽孫元超撫寧令元超生濬上邽令濬生崇亮昌明令崇亮生承簡太原府功曹參軍承簡生楚相憲宗然則楚與徳棻雖同出於熈而各為一派舊書云楚自言徳棻之裔誤也漢地理志燉煌郡有效榖縣安定郡有彭陽縣匈奴傳單于入朝那蕭闗遂至彭陽師古曰即今彭原縣是其故城在今陜西平涼府鎮原縣東八十里也周封令狐熈之父於此唐無彭陽其封楚盖仍其先世之舊號耳臣某言臣聞達士格言以生為逆旅莊子悲夫世人直謂物逆旅耳古者垂訓謂死為歸人列子晏子曰古者謂死人為歸人茍得其終何怛於化莊子子來有病喘喘然將死其妻子環而泣之子犁往問之曰叱避無怛化臣永惟際㑹獲遇昇平漢梅福傳升平可致注張晏曰民有三年之儲曰升平昇與升通鐘鼎之勲莫彰庾信徴調曲功烈則鐘鼎俱銘風露之姿先盡雖無逃大數亦有負清朝後漢史弼傳使臣得于清朝明言其失今則舉纊陳詞對棺忍死白日無分𤣥夜何長並見前劉楨詩遺思在𤣥夜淚兼血垂説苑下蔡威公閉門而泣三日三夜泣盡而繼以血目與魂一作雲斷江淹恨賦一旦魂斷宫車晚出臣某中謝臣早緣儒學得厠人曹克紹家聲司馬遷書李陵既生降隤其家聲不虧士行詩士貳其行詞賦貢名於宗伯書檄應聘於諸侯東汎西浮謝眺箋東泛三江西浮七澤南登北走時推倚馬學林桓温南征鮮卑喚袁宏倚馬前作露布文手不輟筆人或薦雄漢揚雄傳自序云大司馬車騎將軍王音竒其文雅薦雄待詔長楊賦序孝成帝時客有薦雄文似相如者召雄待詔承明之庭善曰雄答劉歆書曰雄作成都城四隅銘蜀人有楊莊者為朗誦之於成帝以為似相如雄遂以此得見舊書令狐楚傳家世儒素兒童時已學屬文弱冠應進士貞元七年登第桂管觀察使王拱愛其才以禮辟召楚以父掾太原有庭闈之戀不應李説嚴綬鄭儋相繼鎮太原髙其行義皆辟為從事自掌書記至節度判官歴殿中侍御史楚才思俊麗徳宗好文毎太原奏至能辨楚之所為頗稱之鄭儋在鎮暴卒不及處分後事軍中喧嘩将有急變中夜十數騎持刀迫楚至軍門諸將環之令草遺表楚在白刃之中搦管即成讀示三軍無不感泣軍情乃安自是聲名益重西掖承榮謂徴拜右拾遺劉楨詩隔此西掖垣善曰洛陽故宫名云洛陽宫有東掖門西掖門得以言之無罪詩序言之者無罪聞之者足以戒曲臺備位謂改太常博士漢書翼鳯傳未央宫有曲臺殿漢官儀大射于曲臺漢藝文志曲臺后蒼九篇如淳曰行禮射于曲臺后蒼為記故名曰曲臺記麤明物有其容東京賦春日載陽合射辟雍設業設虡宫懸金鏞鼖鼓路鼗樹羽幢幢於是備物物有其容永謂才難見論語便叨郎選謂遷禮部員外郎振衣華省陸機詩振衣獨長想潘岳秋興賦獨展轉于華省歴履名曹髙步内庭光揚密命晉宗室傳仰豫宻命員箋新書令狐楚傳憲宗時累擢職方外郎知制誥其為文於牋奏制令尤善毎一篇成人皆傳諷憲宗皇帝以臣行多餘力見論語忠絶它腸漢衛綰傳上以為㢘忠實無它腸乃拜綰為河間王太傅進無所因静以有立過䝉顧問韓書外傳周公無所顧問深降褒稱乃於同列之中獨許非常之拜箋楚與皇甫鎛蕭俛同年登進士第元和九年鎛初以財賦得幸薦俛楚俱入翰林充學士遷職方郎中中書舍人皆居内職殊恩既浹當路相排漢京房傳為衆所排旅翮未髙謝眺箋渤海方春旅翮先謝孤根巳動晏子春秋魯昭公曰吾少之時内無拂而外無輔譬之猶秋蓬也孤其根而美枝葉秋風至根且拔矣河潼為郡盟津統師箋元和十三年四月出為華州刺史十月為河陽懐節度使溺以待援見孟子痿而念起漢韓王信傳僕之思歸如痿人不忘起盲者不忘視箋時方用兵淮西言事者以師久無功宜宥賊罷兵唯裴度與憲宗志在殄寇李逢吉與度不協與楚相善十二年夏楚革度淮西招撫使制不合度㫖度請改制内三數句憲宗方責度用兵乃罷逢吉相任亦罷楚内職守中書舍人十三年四月出為華州刺史十月皇甫鎛作相以楚為河陽懐節度使憲宗旁集作講求輔相既一作即記姓名果遣急徴漢鮑宣傳急徴故大司馬傅喜仍加大用漢魏相傳丙吉予相書曰朝廷巳深知弱翁治行方且大用矣楚箋元和十四年七月裴度出鎮太原皇甫鎛薦入朝拜同平章事戴君之力雖弱許國之誠在兹晉周勰傳司徒王導議札與臣等便以身許國實有微衷可俾𤣥化曹植責躬詩𤣥化旁流況初誅背叛謂平吳元濟務活疲羸後漢段熲傳屯結不散人畜疲羸方伏奏於鳳扆之前周禮掌次設皇邸注謂後板屏風染羽象鳳凰羽色以為之忽庀徒于鳥耘之次王屮頭佗寺碑庀徒揆日各有司存左傳官庀其司南庀具也帝王世紀禹崩于㑹稽因葬㑹稽山隂縣之今山上有禹塜井祠下有羣鳥耘田景箋新書穆宗即位方營陵詔楚為使小吏扺罪漢酷吏傳坐法抵罪邪臣結謀後漢彭寵傳㑹上谷太守耿況亦以功曹冦恂詣寵結謀指之有名嘿不得訴空甘罪戾仰托聖明粗得生還後漢班超傳妹昭上書匄超餘年一得生還㡬臨死所左傳狼瞫曰吾未獲死所兼箋元和十五年正月憲宗崩詔楚為山陵使撰哀冊文時皇甫鎛貶崖州物議以楚因鎛作相而逐裴度羣情共怒以蕭俛之故無敢措言其年六月山陵畢㑹有告楚親吏贓汙事發出為宣歙觀察使俄貶衡州刺史其後官移督䕶玉臺新詠有宋孝武帝丁督䕶歌四年不謁于承華初學記太子之門曰承華任改察廉即㢘察以聲病倒用非舉孝察廉之謂一日蹔留于分陜見為京兆公表欲舉而墜將安更危箋長慶元年四月量移郢州刺史遷太子賓客分司東都二年十一月授陜州大都督府長史兼御史大夫陜虢觀察使制下旬日諫官論奏言楚所犯非輕未合居㢘察之任上知之遽令追制時楚巳至陜州視事一日矣復授賓客歸東都故曰一日蹔留於分陜賴敬宗皇帝纉乃丕圖是思求舊書遲任有言曰人惟求舊振于洛宅謂尹河南召誥太保朝至于洛宅卜榮彼夷門謂鎮宣武史記信陵君傳太史公曰吾過大梁之墟求問其所謂夷門夷門者城之東門也自兹以來敢虚其遇周旋五經鎭守惟切分憂前後兩歸闕庭皆非久次漢孔光傳竊見國家故事尚書以久次轉遷非有踔絶之能不相踰越箋按五經鎮守宣武節度一東都留守二天平節度三河東節度四山南西道節度五也兩歸闕庭謂自宣武入為户部尚書自河東入為吏部尚書也未㡬即出故曰皆非久次拙直不同于衆讒毁每集其躬含意未宣古詩齊心同所願含意俱未申救過不暇漢酷史傳九卿奉職救過不給伏思自長慶厥後開成之前凡㡬忝遷昇㡬遭退斥若非不欺天地不負君親至于幾微尋合顛隕伏惟皇帝陛下道超覆載仁極照臨既委鹽鐡又分端揆晉陸華等傳論曰迭居端揆逮今控壓亦在重鎮箋新書楚以吏部尚書進拜左僕射㑹李訓亂草詔以王涯賈餗寃指其罪不切仇士良等怨之始帝許相楚乃不果更用李石而以楚為鹽鐡轉運使時政在宦䜿數上疏辭位拜山南西道節度使陛下之恩微臣何益微臣之節陛下方知興言及斯碎首殊晩漢杜鄴傳禽息憂國碎首不恨注應劭曰禽息秦大夫薦百里奚而不見納繆公出當車以頭擊闑腦乃播出繆公感悟而用百里奚秦以大治然臣從心之年已至致政之禮宜遵禮記大夫七十而致仕尋欲拜章以求歸老伏以諸道節制頻嵗更移後漢趙孝王良傳頻嵗來朝其於送迎例多積累漢王霸傳霸曰數易長吏送故迎新之費及姦吏緣絶簿書益財物公私費耗甚多臣在此雖無一毫侵損亦無纎介一作芥誅求後漢竇融傳皆以底裏上露長無纎介左傳介于大國誅求無時帑藏甚殷晉范寗傳帑藏空匱倉儲可羨特緣行李忍過秋冬而江山之氣候難常北史王頦傳氣候殊不佳蒲栁之蕭衰易見見代僕射表自夏則膝脛無力入冬則集作又腸胃不調對冠冕而始訝儻來荘子軒冕在身非性命也物之儻來寄也指墓墳而巳知息處列子晏子曰善哉古之有死也仁者息焉昨某日一作今月八日臣已召男國子博士緒緒歴随夀汝三郡刺史轉河南少尹加金紫左補闕綯緒弟綯字子直襲封彭陽男相宣宗輔政十年累官至吏部尚書右僕射進封涼國公後改封趙國公左武衛兵曹參軍綸等綸世系表作緘字識之示以致期戰國䇿譚拾子曰事之必致者死也遺之理命治命見為王侍御表使内則雍和私室外則竭盡公家兼約其送終務遵儉約集作所務遵儉南史到溉傳臨終勒子孫薄葬之禮曰凶事必遵儉約勿為從俗韓詩外傳從俗為善漢兩龔傳勝因敕以棺斂喪事衣周于身棺周于外勿隨俗動吾冢種柏作祠堂後漢鄭興傳興曰興從俗者也以致慮居禮記喪不慮居毀不危身喪不慮居為無廟也毀不危身為無後也至某一作至十二日夜有僕夫告臣云大星隕地雅當正室洞照一庭臣即端坐俟時正辭無撓箋楚卒前一日謂其子緒綯曰吾生無益于人勿請諡號葬日勿請鼓吹唯以布車一乘餘勿加飾銘誌但志宗門秉筆者無擇髙位當歿之夕有大星實于寝室之上其光燭庭楚端坐與家人告訣言已而終嗣子奉行遺㫖詔鹵簿宜停易名須凖舊例臣之年亦極矣臣之榮亦足矣以祖以父皆䝉褒寵有弟有子並列班行新書世系表楚弟從檢校膳部郎中舊書楚弟定字履常桂管觀察等使全腰領以從前人禮記文子曰是全要領以從先大夫于九京也歸體魄以事先帝禮記體魄則降此不自達誠為甚愚但以將掩泉扃庾信銘移燈泉扃不得重辭雲陛謝聎詩十載朝雲陛更一作重陳尸諌家語孔子曰古之列諌者死則巳矣未有如史魚死而尸諌猶進瞽言漢谷永傳瞽言觸忌諱雖叫呼而不能左傳衛侯夢于北宫見人登昆吾之觀被髮北面而譟曰余為渾良夫叫天無辜豈誠明之敢忘去聲伏惟皇帝陛下春秋鼎盛南史孔奐傳皇太子春秋鼎盛華夏鏡清文選東都賦百姓滌瑕蕩穢而鏡至清善曰淮南子鏡太清者視大明是修教化之初當復理安之始然自前年夏秋以來貶譴者至多誅僇者不少新書時以甘露事誅譴者衆伏望普加鴻造稍霽皇威歿者昭雪以雲雷存者沾濡以雨露揚雄長楊賦莫不沾濡使五稼嘉熟晉傅咸傳縱使五稼普收僅足相接兆人樂康屈原九歌君欣欣兮樂康用臣將盡之苦言史記商君傳苦言藥也甘言疾也慰臣永蟄之幽魄闗尹子明魂為神幽魄為鬼箋按楚既召商隠屬其助成遺表即秉筆自書曰云云此篇自以祖至幽魄全用其語臣某云云臣當道兵馬已差監軍使竇千乘勾當其節度留務差行軍司馬趙祝觀察留務差節度判官杜勝訖見為安平公表有舊規模無新革易悉集作必當輯睦左傳隨武子曰卒乗輯睦決無讙驚北史齊神武諸子傳渙聞宫中讙驚曰大兄必遭難矣臣心雖澄定曹植七啓澄神定靈氣巳危促辭多逾切鳴急更哀見論語升屋而三號豈來禮記喪大記曰復者朝服皆升自東榮中屋履危北面三號巻衣投于前赴壑而一去無返山海經海曰大壑古樂府詞百川東到海何時復西歸忠誠直道竟埋沒於外藩腐骨枯骸晉劉琨傳琨收葬枯骸空歸全於故國禮記樂正子春曰父母全而生之子全而歸之迴望昭代無任攀戀永訣之至謹奉表代辭以聞臣某誠號集作哀誠咽頓首頓首代安平公遺表箋舊書文宗紀太和八年五月丙申兖海觀察使崔戎卒詳見謝除表臣某言臣聞風葉露華榮落之姿何定夏朝冬日短長之數難移臣幸屬昌期謬登貴位集作仕左傳有大功而無貴位其人能靖者與有㡬行年五十五歴官二十三念犬馬之常期死亦非夭奈君親之厚施生以無酬是以時及含珠莊子儒以詩禮發冢小儒曰詩固有之生不布施死何含珠為命餘屬纊見代濮陽公表心存向闕手尚封章撫躬而氣息奄然後漢梁節王暢傳誠無氣以息戀主而方寸亂矣蜀志徐庶母為操所獲庶辭備指其心曰方寸亂矣臣某中謝臣少而羈紲魏志孫盛曰豈名器之所羈紲長乃遭逢常将直道而行實以明經入仕王畿作吏非州府之職徒勞後漢梁竦傳甞太息曰閒居可以養志詩書足以自娯州郡之職徒勞人耳侯國從知媿軍旅之事未學見論語憲宗皇帝謂臣剛決隋劉方傳性剛決有膽氣擢以憲司穆宗皇帝謂臣才能漢書淳于長以材能為九卿登之郎選漢王莽傳公孫戎位在充郎選忝霜威而無所摧拉歴星紀而有紊次躔旋屬皇帝陛下大明御宇至道承乾澄汰之初臣不居有過超擢之際漢金日磾傳鄄邯劾奏欽曰欽幸得以通經術超擢臣獨出倫常髙選掖垣箴規未效入居瑣闥論駁無聞自去年秋來典河闗兼臨甸服惟當静而阜俗清以繩姦晉劉毅傳疏曰官政無䋲姦之防麤致豐穰後漢鮑昱傳唯南陽豐穰幸逃逋責任昉表四海之議子何逃責豈意陛下謂臣奄有三縣未稱其能謂臣出以一麾未足為貴爰降綸綍禮記王言如絲其出如綸王言如綸其出如綍移之藩方錫以海隅與之岳鎮将吾君之驍果萬計晉謝𤣥傳何謙戴􅋟並驍果多權畧使得總齊韋孟諷諫詩總齊羣邦以翼大商聯吾君之牧伯三人書外有州牧侯伯以居巡屬時雖相羨臣實深憂既屬聖恩果遭鬼瞰揚雄解嘲髙明之家鬼瞰其室況臣素無微恙未及大年莊子小年不及大年方思髙掛饋魚後漢書羊續為南陽太守府丞侯儉貢鯉續受而懸之一嵗儉復致一枚續乃出所懸枯魚示之以杜其意不然官燭謝承後漢書巴祇為揚州刺史與客坐闈中不然官燭成陛下比屋可封之化後漢楊終傳堯舜之民可比屋而封分陛下一夫不獲之憂書一夫不獲則曰時予之辜志願未伸大期俄迫南史王彧傳詔曰若乃吉凶大期正應委之理運忽自某一作今月十日夜㬥染霍亂并兩肋氣注當時檢驗方書漢張蒼傳主柱下方書煎和藥物左傳盡心力以事君舍藥物可也百計療理一無痊除至於某日一作十一日辰時轉加困劇漸不支持想彼孤魂漢貢禹傳骸骨棄捐孤魂不歸已游岱岳劉楨詩常恐游岱宗不復見故人張華博物志泰山天帝孫也主召人魂念兹二䜿徒訪秦醫左傳晉侯疾秦伯使醫緩視之未至夢疾為二豎子曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也對印執符漢韓信傳漢王即其卧奪其印符碎心殞首李密陳情表臣生當隕首人之到此命也如何戀深而乏力以言泣盡而無血可繼臣某誠哀誠戀頓首頓首臣當道三軍將士準前使李文悦例差監軍使元順通勾當訖臣與順通近同王事備見公才晉虞􅔎傳孔愉有公才而無公望假之統臨必能和協左傳鄭伯曰寡人有弟不能和協其團練觀察兩使事差都團練巡官盧涇勾當訖臣亦授之方略示以規模伏惟聖明不致憂軫臣精神危促言詞失英華作爽錯行當窮塵埋骨鮑昭蕪城賦莫不埋魂幽石委骨窮塵枯木容身鄒陽書枯木朽株南史姚察傳遺命薄葬以松板薄棺纔可容身螻蟻卜鄰荘子在下為螻蟻食陸機輓歌詩豐肌饗螻蟻妍姿永夷泯左傳諺曰非宅是卜惟鄰是卜烏鳶食祭爾雅鳶烏醜其飛也翔史記田單傳乃令城中人食必祭其先祖于庭中飛鳥悉翔舞城中下食黄河兩曲謂西河南河長安㡬千梁元帝賦平原如此不知道路㡬千生入舊闗望絶班超之請後漢班超傳超久在絶域年老思歸乃上疏曰臣不敢望到九泉郡但願生入玉門闗力封遺奏痛深來歙之辭後漢來歙傳自書表曰臣夜入定後為何人所賊中臣要害投筆抽刀而絶迴望昭代不勝荒惙眷戀之至謹差某奉表代辭以聞為王侍御瓘謝宣弔并賻贈表箋舊書㑹昌三年河陽節度使王茂元㑹討劉稹以本軍屯天井賊未平而卒瓘其子也草土臣瓘言晉禮志詔曰每感念幽冥而不得終苴絰於草土今月某日某官吕述某官任疇等至奉將聖㫖以臣父某官某亡歿賜弔臣等並賻贈臣亡父布帛三百匹米粟三一作二百石者大夜銜輝庾信碑爰在盛年先從大夜窮泉漏澤潘岳哀永逝文襲窮泉兮朽壤以隕以越左傳齊侯對曰恐隕越于下以貽天子羞終哀且榮劉勰文心雕龍誄之為制盖選言録行傳體而頌文榮始而哀終臣某中謝臣先臣某託體元侯元侯謂棲曜後漢盧芳傳疏曰臣芳過託先帝遺體卒箋栖曜貞元初拜左龍武大將軍出為鄜坊節度使贈尚書僕射䇿名任子左傳䇿名委贄二乃辟也漢王吉傳吉言今使俗吏得任子弟率多驕驁不通方今宜明選求賢除任子之令象賢傳劍並見前餘力攻書歴七朝而在公七朝謂徳順憲穆敬文武也詩夙夜在公秉二道而非墜見論語謂初以詞場就貢後以将材相許也氛興赤狄兵聚晉城先臣受敵一作律臨戎後漢耿秉傳秉厲聲曰受降如受敵遂馳赴之忘家徇衆史記司馬穰苴傳将受命之日則忘其家士卒均食漢李廣傳廣歴七郡太守前後四十餘年得賞賜輒分其戲下飲食與士卒共之㒺愧於前修離騷蹇吾法乎前修廊廡散金漢竇嬰傳嬰為大将軍所賜金陳廊廡下軍士過輒令財取為用逺齊乎舊説上憑王略左傳侵敗王畧下振軍威隋庾質傳慮損軍威旬月之間慶捷相繼並親桴三鼔見為滎陽公表躬運九章管子一曰舉日章則晝行二曰舉月章則夜行三曰舉龍章則行水四曰舉虎章則行林五曰舉鳥章則行陂六曰舉蛇章則行澤七曰舉鵲章則行陸八曰舉狼章則行山九曰舉韓章則載食而駕如臣兄弟皆冒矢石左傳荀偃士匄率卒攻偪陽親受矢石滅之豈意竒功垂立大願莫從傳食失時漢韓信傳令其禆将傳食曰今日破趙㑹食注如淳曰小飯曰餐師古曰餐古飡字音千安反衉血成疾見遺表奄至凋落晉謝𤣥傳凋落相繼長違盛明此皆由臣等抱釁既深曹植表臣自抱釁歸藩刻肌刻骨就養無素禮記左右就養無方遂延家難詩未堪家多難仰惻宸襟止一作尚偷生于晷刻晷謂日景刻謂漏刻亦何顔於天地伏惟皇帝陛下悼深撫几晉書司隸劉毅卒武帝撫几驚曰失吾名臣不得生作三公悲軫聞鞞禮記聴鼓鼙之聲則思将帥之臣降憫惻于上公書微子之命庸建爾于上公左傳蔡墨曰五行之官實列受氏姓封為上公厚賻禮于遺體公羊傳車馬曰賵貨財曰賻衣被曰襚禮記身者父母之遺體可不敬乎昔魏優死事止分食邑之餘魏太祖紀建安七年令曰舉義兵以來将士絶無後者求其親戚以後之授土田官給耕牛置學師以教之為存者立廟使杞其先人漢養孤兒但有羽林之聚漢百官公卿表武帝取從軍死事之子孫養羽林官教以五兵號羽林孤兒方於今日惟媿推恩叫號失容詩或不知叫號戴履無所左傳晉大夫三拜稽首曰君履后土而戴皇天軍前結草必自于幽靈左傳魏武子有嬖妾武子疾命顆曰必嫁是及卒顆嫁之及輔氏之役顆見老人結草以亢杜囘囘躓而顛故獲之夜夢之曰余爾所嫁婦人之父也爾用先人之治命余是以報石上澆松敢忘於遺訓北堂書鈔烈士傳曰干将為晉君作劍三年而成劍有雌雄天下名器也以雌劍獻君留其雄者謂妻曰吾藏劍在南山之隂北山之陽松生石上劍在其中君若覺殺吾爾生男以告之及君覺殺干将妻後生男名赤鼻具以告之赤鼻斫南山之松得劍無任感恩荒殞之至為令狐博士緖補闕綯謝宣祭表箋舊書開成二年十一月山南西道節度使令狐楚卒於鎮緒綯皆其子也草土臣某言今月某日中使某至奉宣恩㫖致祭臣亡父贈司空臣某者存沒願終榮哀禮備荒迷觸地吕氏春秋黎丘丈人之子泣而觸地號叫曕天臣某中謝臣先臣某生遇昌期早司國柄説苑楚令尹子文曰執一國之柄沒留懿徳上惻宸襟特降王人春秋荘公六年王人子突枚衛注王人王之㣲官也迂臨私第南史齊宗室傳私第展哀陳其醆爵禮記明堂位曰爵夏后氏以琖殷以斝周以爵説文醆爵也一曰酒濁而微清也按醆與琖别説文混而為一後人遂承其誤潔之豆豋詩卭盛于豆于豆于豋𫝊木曰豆瓦曰豋招遺魄於幽隂旋歸莫覩視殘生於晷刻報効無期臣等無任戴恩荒殞之至謹附中使某奉表陳謝以聞李義山文集箋註巻二, SBCK: 􅀰}
