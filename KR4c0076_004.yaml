body:
  text: 李義山文集箋注卷四監察御史徐樹穀箋山東提學僉事徐炯注啓賀相國汝南公啓箋舊書宣宗紀大中三年三月已酉兵部侍郎判度支周墀本官平章事周墀傳大中初汝南男食邑三百户某啓日者慶屬中興漢宣帝紀贊曰功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣運推常武詩序常武召穆公美宣王也有常德以立武事因以為戒然仰窺金版太公金匱武王曰請著金版遐考瑤圖見為汝南公表順祖之孝思丹青曽閔楊子炳若丹青晉羊祐傳主上天縱至孝有曽閔之性箋史臣韓愈以順宗居儲位二十年天下隂受其賜憲皇之功烈一作武力刀機彭韋漢項籍傳今人方為刀俎吾為魚肉魏志文帝詔曰孫權如几上肉鄭語史伯曰彭姓彭祖豕韋諸稽則商滅之矣注彭祖大彭也豕韋諸稽其後别封也大彭豕韋為商伯其後世失道殷復興而滅之徐陵九錫文驅馭於韋彭除箋史臣蔣係曰憲宗果能翦削亂階誅除羣盜睿謀英斷近古罕儔唐室中興章武而已聖上初九潛泉泉讀曰淵易乾初九潛龍勿用登三佩契見賀赦表以后稷岐嶷為小慧詩克岐克嶷以就口食故人莫得知以漢皇雲物為下祥左傳凡分至啓閉必書雲物漢髙帝紀吕后曰季所居上常有雲氣故神無所豫箋舊書宣宗紀長慶三年封光王會昌六年三月一日武宗疾篤遺詔即帝位時年三十七帝幼時宫中以為不慧十餘歲時遇重疾沈綴忽有光輝燭身蹶然而興歷太和會昌朝愈事韜晦平居遊宴未嘗有言文宗武宗幸十六宅宴集強誘其言以為戲劇謂之光叔洎陟元后書帝曰來禹汝終陟元后洪惟長君左傳晉襄公卒靈公少晉人以難故欲立長君固必降非常之人漢武帝紀詔曰蓋有非常之功必待非常之人輔維新之政伏惟閣下昭回降彩詩倬彼雲漢昭回于天沆瀣融精楚辭逺遊曰餐六氣而飲沆瀣注沆瀣夜半氣也往執靈鉟左傳公卜使王黑以靈姑鉟率吉請斷三尺而用之注靈姑鉟公旗也正星辰之分野周禮保章氏以星土辨九州之地所封封域皆有分星以觀妖祥左傳伯瑕對晉侯曰日月之會是謂辰周語伶州鳩曰歲之所野在則我有周之分野也初學記周官天星皆有州國分角亢氐兖州房心豫州尾箕幽州斗牽牛婺女揚州虛危青州營室東壁并州奎婁胃徐州昂畢冀州觜􅏲參益州東井鬼雍州栁七星張三河翼軫荆州今調鏤鼎吳都賦鏤形於夏鼎王屮頭陀寺碑既鏤文於鐘鼎猶日月之得一作行天易日月得天而能久照昔軒后師臣帝王世紀黃帝以風后天老五聖為三公其餘知天規紀地典力牧常先封胡孔甲等或以為師或以為將後漢張衡傳注春秋內事曰黃帝師於風后漢紀陳元疏曰師臣者帝賔臣者王成一作商王畏相書自成湯咸至於帝乙成王畏相傳從湯至帝乙中間之王猶保成其王道畏敬輔相之臣不敢為非殷奉伊尹則謂之元聖書聿求元聖與之戮力周事吕尚則命為太公史記齊世家吕尚以漁釣干周西伯西伯出獵遇太公于渭之陽與語大悅曰自我先公太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望載與俱歸立為師此王者之所以尊賢傑而不以為疑也至於姬旦金縢不與燕召同列書王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功史乃册祝曰以旦代某之身乃納册於金縢之匱中王翼日乃瘳史記燕召公世家召公奭與周同姓姓姬氏周武王滅紂封召公於北燕仲尼麟史不令遊夏措辭史記魯哀公十四年春狩於大野獲麟孔子曰吾道不行矣乃因史記作春秋筆則筆削則削子夏之徒不能贊一辭甘盤尊舊學之名書台小子舊學於甘盤夷吾居仲父之位韓子齊桓公之時晉客至有司請禮桓公曰告仲父者三而優笑曰易哉為君一曰仲父二曰仲父此又賢傑之所以自負其道而不以為讓也上下交感人祇協從是我后夷姦秉哲之辰書在昔殷先哲王迪畏天顯小民經德秉哲實閣下宰物匡時之日南史劉湛弱年便有宰物情常自比管樂晉文六王傳齊王攸曰吾無匡時之用清廟係心一有矣字詩於穆清廟晉慕容廆傳係心京師蒼生延首一有矣字書帝光天之下至於海隅蒼生晉謝安傳安石不出如蒼生何曹植誄延首歎息允也無間樂哉惟時某早奉輝光易君子以剛健篤實輝光常蒙咳唾莊子孔子遊乎緇帷之林有漁父者下船而來孔子曰幸聞咳唾之音牛心致譽語林王右軍年十一周顗異之時絶重牛心灸坐客來未啖先割啖右軍乃知名麈尾交談世説補何次道往丞相許丞相以麈尾指坐呼何共坐曰來來此是君坐而契濶十年詩死生契濶流離萬里詩流離之子扶風歌則劉琨抱一作跪非膝劉琨扶風歌抱膝獨摧藏白頭吟則鮑昭撫膺鮑昭白頭吟古來共如此非君獨撫膺重至門闈班固答賔戲皆及時君之門闈空餘皮骨杜甫詩三年奔走空皮骨信有人間行路難方從初服見為栁州表無補大鈞漢賈誼傳大鈞播物穿履敝衣正同北郭北當作東史記東郭先生衣弊履不完行雪中履有上無下足盡踐地稿項黃馘乃一作仍類曹商莊子宋人有曹商者為宋王使秦反於宋見莊子曰稿項黃馘者商之所短也未知伏謁之期漢張耳傳李良道逢趙王姊從百餘騎良望見以為王伏謁道旁徒切太平之賀漢食貨志餘三年食進業曰登再登曰平三登曰泰平下情無任抃舞踴躍之至謹啓謝座主魏相公啓原注為弟作月箋舊書宣宗紀大中三年四魏扶同中書門下平章事六月卒新書世系表扶字相之本傳弟羲叟亦以進士及第纍為賔佐羲叟啓伏奉前月二十八日敕旨授祕書省校書郎知宗正表疏續奉今月五日敕改換一作授河南府參軍依前充職者小宗伯之取士周禮春官小宗伯中大夫二人早辱搜揚桓溫薦譙秀表訪諸故老搜揚潛逸大中正之薦賢魏志延康元年尚書陳羣以為天朝選用不盡人才乃立九品官人之法州郡皆置中正以定其選擇州郡之賢有識鑒者為之區别人物第其髙下又蒙抽擢未淹旬日並見前再授班資任重本枝詩本枝百世職齊載筆禮記史載筆方殊王逸惟注一有於字楚辭後漢文苑傳王逸字叔師順帝時為侍中著楚辭章句有異郝隆但攻一有於字蠻語世説郝隆為桓公南蠻參軍作詩一句云陬隅躍清池蠻名魚為陬隅公問何為作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語此皆相公事均卵翼左傳子西曰勝如卵豫翼而長之勢作風雲潘嶽誄跨騰風雲特於汩沒之中杜甫詩世儒多汨沒俯借扶搖之便見為安平公表孔龜效印未議於酬恩孔愈别傳愈字敬康初辟中宗參軍討華軼有功封餘不亭侯愈少時嘗得一龜放於餘不溪中龜中路左顧者數過及後鑄印而龜左顧更鑄猶如此印師以聞愈悟取佩焉楊雀銜環徒聞於報惠吳均續齊諧記楊寶年九歲至華隂見一黃雀為螻蟻所困寶取置巾箱中惟食黃花百餘日羽毛成乃飛去夜夢黃衣童子拜曰我西王母使者實感成濟以白環四枚與寶令君子孫潔白位登三事當如此環感忭之至罔知所裁謹啓謝宗卿啓原注為弟作羲叟啓伏奉一作蒙奏署知表疏官伏奉前月二十八日敕旨授祕書省校書郎續奉今月五日敕改授河南府參軍者某少實艱屯晉杜夷傳髙操之士有此艱屯長無才術集作運徒以與周同姓從魯諸儒漢叔孫通傳臣願徵魯諸生與臣弟子共起朝儀同姓見前託阮籍之竹林晉書阮籍嵇康山濤向秀劉伶王戎阮咸共為竹林之逰攀郤詵之桂樹晉書郤詵對武帝曰臣舉賢良對䇿為天下第一猶桂林之一枝若荆山之片玉曲蒙題目晉書山濤在典選甄拔人物各有題目時稱山公啓事猥被薦聞惟我大朝王粲詩晝日處大朝克崇宗祏左傳原繁對曰先君桓公命我先人典司宗祏敘文昭武穆之位左傳富辰曰管蔡郕霍魯衛毛聃郜雍曹膝畢原豐郇文之昭也邘晉應韓武之昭也敦紹堯纘禹之親書纘禹舊服班彪王命論唐據火德而漢紹之豈以斯文失於能者况一蒙旌録華歆表文皇帝旌録先賢再忝恩榮班資將厠於郤超晉郗超傳超字嘉賔桓溫辟為征西大將軍掾溫遷大司馬又轉為參軍府中語曰髯參軍短主簿能令公喜能令公怒超髯王珣短故也職業幾踰於孫楚晉孫楚傳楚字子荆爽邁不羣缺鄉曲之譽年四十餘始參鎮東軍事感結所至死生以之左傳苟利社稷死生以之即以今月某日發赴所職登門在近見為濮陽公狀縮地是思白帖費長房能縮地千里聚在目前惟動肺肝恨無毛羽即不能奮飛之意伏惟特賜恩察謹啓為同州張評事潛謝辟并聘錢啓二首舊書地理志同州上輔隋馮翊郡在京師東北二百二十五里同州防禦長春宫使同州刺使領之潛啓伏奉榮示伏蒙猥賜奏署今月某日敕旨授官承命恐惶一作懼不知所措某文乖綺繡陸機文賦藻思綺合清麗芊眠爛若縟繡悽若繁絃初學記范子計然曰今富者綺繡羅紈素綈氷錦學乏縑緗後漢宦者傳自古書契多編以竹簡其用縑帛者謂之為紙北堂書鈔晉中興書曰傅玄盛書有青縑帙説文緗帛淺黃色也蕭統文選序飛文染翰則卷盈乎緗帙負米東郊家語子路曰昔者由也為親百里負米止勤色飬荀氏家訓荀顗色飬蒸蒸以孝聞獻書北闕漢髙帝紀蕭何治未央宫立東闕北闕師古曰未央殿雖南嚮而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉未奉明恩撫京洛之塵素衣穿穴陸機詩京洛多風塵素衣化為緇訪江湖之路白髮徘徊潘嶽秋興賦序余春秋三十有三始見二毛又以太尉掾兼虎賁中郎將寓直於散騎之省髙閣重雲譬猶池魚籠鳥有江湖山藪之思大夫榮自山陽漢地理志河內郡有山陽縣來臨沙苑水經注洛水東徑沙阜北俗名沙苑元和郡縣志沙苑在同州馮州縣南十二里其處宜六畜置沙苑監固以室盈東箭門咽南金詩大賂南金晉薛兼傳兼丹陽人清素有器宇少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循齊名號為五雋初入洛司空見而竒之曰皆南金也顧衆虞潭傳衆吳郡人潭會稽人贊曰顧實南金虞惟東箭豈謂搜揚乃加孱眇府稱蓮沼南史王儉用庾杲之為衛將軍長史蕭勔與儉書曰庾景行泛緑水依芙蓉何其麗也時以儉府為蓮花池慚無倚馬之能見代彭陽公表地號雲門賈耽十道志會稽雲門有大鼓聲聞百里孫恩斫破有雙鶴飛出遂不鳴後以王獻之宅五色雲見改為五雲門宋之問詩雲門曽化鶴竊有化龍之勢辛氏三秦記河津一名龍門去長安九百里水懸絶龜魚之屬莫能上江海大魚薄集龍門下上則化為龍矣不得上曝鰓水次也便居帷幄漢書髙祖曰運籌帷幄之中決勝千里之外吾不如子房遽别蓬蒿三輔決録張仲蔚扶風人隱身不仕所居蓬蒿沒人袁生有望於樵蘇應璩與曹長思書幸有袁生時步玉趾樵蘇不㸑淆談而巳楚子永辭於籃縷左傳若敖蚡冒篳路籃縷以啓山林刻諸肌骨知所依歸書我先王亦永有依歸伏惟特賜鑒察謹啓二潛啓錢若干伏蒙仁恩賜備行李重非半兩漢書食貨志秦并天下銅錢質如周錢文曰半兩重如其文武帝紀建元五年罷三銖行半兩錢輕異五銖漢食貨志武帝時有司言三銖錢輕輕錢易作姦詐乃更請郡國鑄五銖錢周郭其質令不可得摩取鋊子母相權周語景王將鑄大錢單穆公曰古者天災降戾於是乎量資幣權輕重以振救民民患輕則為之作重幣以行之於是乎有母權子而行若不堪重則多作輕以行之亦不廢重於是乎有子權母而行飢寒頓解後漢書馮異傳光武謂諸將曰昨得公孫豆粥飢寒俱解西京雜記苦飢寒逐彈丸細看銅郭漢書武帝時民間鑄錢多輕公卿請令京師鑄官赤仄注赤銅為其郭也徐憶牙籌王隱晉書王戎好治生園田周遍天下翁嫗二人常以象牙籌晝夜算計家資雖云一作虞神有魯褒晉魯褒傳錢神論曰大哉錢之為體字曰孔方失之則貧弱得之則富昌便恐癖如和嶠語林杜預道王武子有馬癖和長輿有錢癖已有左傳癖辦裝無闕漢劉安傳特賜辦裝錢通刺有期世説禰正平自荆州北遊許都書一刺懷之漫滅而無所適感戴之誠吳朱桓傳除餘姚長士民感戴之不知所喻謹啓為山南薛從事傑遜謝辟啓箋案山南有東道西道東道理襄州西道理梁州表云從事梓潼經塗天漢初筵末席披霧覩天蓋西道也新書方鎮表建中元年升山南西道觀察使為節度使興元元年兼興元尹增領果閬二州宰相世系表薛保遜字遜之司農卿舊書薛廷老遷給事中開成三年卒子保遜登進士第位亦至給事中傑當作保無疑托言載薛保遜好為巨編號金剛杵閽媪以易脂燭嘗得倍價其人亦非俊物傑遜啓今月某日伏蒙辟奏節度掌書記敕下徒有長裾鄒陽上吳王書飾固陋之心則何王之門不可曵長裾乎曾無綵筆南史江淹常夢一丈夫自稱郭璞謂淹曰我有筆在卿處多年可見還淹乃探懷中得五色筆一以授之爾後為詩絶無妙句初疑誤聽久乃知歸感激慚惶不知所喻某受天和氣而鮮雄才後漢仲長統傳統謂髙幹曰君有雄志而無雄才幸承舊族之華遂竊名場之價南史張敷傳於是名價日重頃者湮淪孤賤黃香疏江淮孤賤綿隔音塵謝莊月賦美人邁兮音塵闕隔千里兮共明月其後從事梓潼元和郡縣志梓州射洪縣有梓潼水與涪江合流經塗天漢爾雅注箕斗之間天漢之津梁漢蕭何傳項羽立沛公為漢王何曰天漢其稱甚美初筵末席詩賔之初筵禮記鄉飲酒義曰於末席言是席之正非專為飲食也為行禮也披霧覩天王隱晉書樂廣為尚書郎尚書令衛瓘見而竒之曰此人人之水鏡見之瑩然若披雲霧而覩青天也徐幹中論文王略於渭水遇太公釣召而與之言載之而歸文王之識也灼然若驅雲而見白日霍然如開霧而覩青天野客叢書今用披霧覩青天事多指樂廣梁孝元詩還思逄樂廣能令雲霧褰駱賔王詩情披樂廣天是也不知此語巳先見徐幹中論晉人蓋引此語以贊美樂廣耳自爾以來懷恩莫極鄭玄之腰腹若挂丹青後漢書鄭玄身長八尺飲酒一斛秀眉明目容儀溫偉崔琰之鬚眉常存夢寐魏志崔琰聲資髙暢眉目疏朗鬚長四尺甚有威重朝士瞻望太祖亦敬重焉庾信碑差有崔琰之鬚眉非無鄭玄之腰帶方思捧持杖屨禮記侍坐於君子君子欠伸撰杖屨厠列生徒後漢書馬融為世通儒教飬諸生常坐髙堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者豈望便上仙舟後漢書郭泰字林宗遊於洛陽始見河南尹李膺膺大竒之由是名震京師後歸鄉里衣冠諸儒送至河上車數千輛林宗惟與李膺同舟而濟衆賔望之以為神仙遽塵蓮府見為同州啓尚書士林圭臬陳琳檄文士林憤痛陸倕石闕銘陳圭置臬善曰周禮土圭之法測土深正日影以求地中又匠人建國求地中置𣙗以懸視其影翰苑龜龍揚雄解嘲執蝘蜒而笑龜龍方殿大藩詩殿天子之邦將求記室是才子懸心之地晉涼武昭王傳表曰四海顒顒懸心象魏詞人效命之秋後漢袁紹傳上書曰此誠愚臣效命之一驗也豈伊疏蕪謝朓詩邑里向疏蕪堪此選擢漢師丹傳尚書郭咸欽幸得以儒官選擢思曽顔之供養禮記曽子曰參直養者也安能為孝乎後漢清河王慶傳矣慶垂涕曰生雖不獲供養得終奉祭祀私願足念陳阮之才華魏志太祖並以陳琳阮瑀為司空軍謀祭酒管記室軍國書檄多琳瑀所作也自公及私終榮且忝伏以家室憂繁初解山川跋涉未任左傳文公躬擐甲胄跋履山川詩大夫跋涉須至季秋方離上國左傳巫臣始通吳於上國撫躬泣下尚遙郭隗之門戰國策燕昭王將欲報讐往見郭隗對曰王誠博選國中之賢者而朝其門下天下之士必趨於燕矣今王誠欲致士先從隗始閉目夢遊巳入孔融之座張璠漢記孔融拜大中大夫每嘆曰座上客常滿尊中酒不空吾無憂矣下情無任攀戀銘鏤之至為川東崔從事福謝辟并聘錢啓二首舊書地理志劍南東川節度使治梓州管梓綿劍普榮遂合渝瀘等州新書世系表崔福字昌逺貟外郎福啓伏奉公牒伏蒙辟署觀察巡官某早辱梯媒獲沾科第吳公之薦賈誼未塞前叨漢賈誼傳河南守吳公聞其秀材召置門下文帝聞河南守吳公治平為天下第一徵以為廷尉廷尉乃言誼年少頗通諸家之書文帝召以為博士南史王微傳微嘆曰我兄無事而屏廢我何得而叨忝踰分齊髙帝諸子傳箋曰上蕃首僚於兹再忝河南雌伏自此重叨竇融之舉班彪仍當後忝後漢班彪傳彪避地河西大將軍竇融以為從事深敬待之接以師友之道及融徴還京師光武問曰所上章奏誰與參之融對曰皆從事班彪所為因召入見舉司𨽻茂才拜徐令仰觀蓮幕俯度桂科卵翼不自一有於字他門並見前頂踵實非一有其字已物見孟子但齎灰粉南史茹法亮傳灰盡粉滅匪朝伊夕逺逐旌􅓚雖有命以酬實無言可謝伏惟俯賜鑒諒二福啓錢若干伏蒙賜備行李竊以白馬從軍魏龎德傳德親與關帥交戰常乘白馬軍中謂之白馬將軍皆憚之青鳧受聘搜神記南方有蟲名曰青鳧以母塗錢以子塗貫用錢貨市旋則自還磨文難滅魏志文帝夢磨錢文欲令滅而更明周宣占之曰此陛下家事枝貫知多枝當作校史記平準書京師之錢纍百巨萬貫朽而不可校陸賈方驗於火花西京雜記陸賈對樊噲曰目瞤得酒食燈花得錢財郭况莫矜於金穴後漢書郭况為大鴻臚帝數幸其第賞賜甚多京師號况家為金穴感戴之至不任下情謹啓為河東公謝相國京兆公啓二首箋舊書栁公綽傳公綽字起之京兆華原人子仲郢字諭蒙元和十三年進士擢第咸通初以兵部尚書加金紫光祿大夫河東男食邑三百户俄出為興元尹山南西道節度使杜悰辟其子圭正在此時故曰謬接藩維久依繩墨杜悰傳悰京兆萬年人大中初出鎮西川俄復入相某啓今月某日得當道萬安驛狀報伏承遣兵馬使陳朗齎幣帛鞍馬辟召小男者未敢尋盟左傳諸侯討二則有尋盟遽兹聞喜漢武帝紀將幸緱氏至左邑桐鄉聞南越破以為聞喜縣遐瞻閽闥恨乏羽毛伏以自有縉紳漢書縉紳先生之徒誰無交結吳孫皈傳善於交結朋交不全素諾在古殊多父子同受深知當今罕一作未見豈期令德圖於所難男圭曾未成人箋舊書仲郢三子圭璧玼圭字鎮方大中五年登進士第纍辟使府尋卒才沾下第辨仲謀之菽麥雖則有餘吳志孫權字仲謀陳琳檄吳文孫權小子未辨菽麥善曰左傳周子有兄而無慧不能辨菽麥况安石之芝蘭竊將不可晉謝安傳安謂兄子玄曰子弟亦何豫人事而欲使其佳玄曰譬如芝蘭玉樹欲使其生於庭階耳忽依大府漢郅都傳旁十餘郡畏都如大府便厠英僚任昉表英俊下僚不可限以位貌東吳之咍恐自此始左思吳都賦東吳王孫辴然而咍善曰楚人謂相笑為咍西園之宴未知如何曹植公宴詩清夜遊西園飛蓋相追隨此皆相公以某謬接藩維謂興元與劍南接壤久依繩墨克降由衷之信左傳信不由中質無益也將酬事大之心不然則安得拔一作收童子於舞雩見論語禮諸生於白社晉書董京與隴西計吏俱至洛陽逍遙吟咏常宿白社中身枝雙慶禮記身也者親之枝也城府知歸後漢逸民傳龎公者南郡襄陽人也居峴山之南未嘗入城府感激恩光丁寧教誡永言銘鏤尚昧端倪莊子反覆終始不知端倪伏候簡書來至敝邑則專請張覿評事奉啓狀申陳慕義無窮鄒陽上梁王書行合於志而慕義無窮也措辭莫盡攀附惶戰集作戢不能究陳謹啓二某啓伏奉榮示伏蒙辟署某第二子前鄉貢進士圭充攝劍南西川安撫巡官并賜公牒舉者某去月得楊侍御一作郎書題微傳風旨漢嚴助傳令助諭意風旨於南越初如吉夢周禮春官占夢季冬聘王夢獻吉夢於王王拜而受之終謂戲談詩不敢戲談非不尋思傅亮表臣伏尋思莫得端緒漢宣元六王傳既開端緒願卒成之今乃竟詢仲胤果降嘉招潘嶽詩弱冠沗嘉招伸紙發緘吳質答東阿王書發函伸紙是何文采之巨麗而慰喻之綢繆乎悸魂流汗漢書田延年傳霍光舉手撫心曰使我至今病悸師古曰悸心動也楊敞傳敞驚懼不知所言汗出洽背何者某頃居班列蜀費詩傳論其班列巳奉陶甄口裏雌黃劉峻廣絶交論雌黃出其唇吻晉陽秋王衍能言於意有不安者輒更易之號口中雌黃屢加雕煥謝惠連詩丹青屢雕煥胸中雲夢相如子虛賦吞若雲夢者八九於其胸中曾不蒂芥過沭涵濡掀之以順風荀子吾嘗順風而呼聲非加疾而聞者彰君子生非異也善假於物也暖之以愛日左傳賈季曰趙衰冬日之日也趙盾夏日之日也注冬日可愛夏日可畏兹辰議報不在他門昨叨列土田左傳分之土田倍敦謬分旗蓋吳志陳紀曰舊記黃旗紫蓋運在東南適當東道見為滎陽公狀獲事西鄰易東鄰殺牛不如西鄰之禴祭豈望信在言前榮流意外坤維接畛張協詩大火流坤維何酬上相之知晉宣五王傳占曰不利上相坎卦成名遂報中男之喜易坎再索而得男故謂之中男且渠譽乖郤桂名愧謝蘭並見前未學周南召南才得一科一第縱解問絹晉陽秋胡質為荆州子威自荆州往省問之質賜威絹一匹威跪曰大人清髙於何得此質曰是我俸祿之餘故以為汝糧耳威受而去不能負薪禮記問庶人之子幼曰未能負薪也將何以與先生並行從大夫之後見論語仰承帷幄佇雜簪纓徐陵為貞陽侯書朝服簪纓况襟帶禺同李尤函谷山銘函谷險要襟帶咽喉漢地理志越嶲郡青蛉縣禺同山有金馬碧雞咽喉巴濮左傳巴濮楚鄧吾南土也求於安撫隋衛立傳詔立安撫關中必也機謀深慮異時莫副虛佇然竊尋史傳所載語父子之間雖石苞獨異石崇晉石崇傳父苞臨終分財物與諸子獨不與崇其母以為言苞曰此兒雖小後自能得而山濤不知山簡晉山簡傳簡性溫雅有父風年二十餘濤不之知也簡嘆曰吾年幾三十而不為家公所知亦豈敢一作安保其孱陋遽遣退藏易退藏於密但當授以一經漢韋賢傳遺子黃金滿籯不如教子一經訓之大杖帝王世紀舜能和諧大杖則避小杖則受庶將寡過以謝明恩染翰銜情謝惠連詩朋來當染翰封箋寫抱小人多事拜台席以猶賖童子何知左傳范文子曰國之存亡天也童子何知焉上賔階而在即瞻望閽闥死生以之伏惟深賜鑒信謹啓為栁圭謝京兆公啓三首某啓散兵馬使陳朗至伏奉榮示兼奉公牒伏蒙召署攝成都府參軍充安撫巡官者師襄鼓缶論語擊磬襄家語孔子學琴於師襄子襄子曰吾雖擊磬為官然能於琴易不鼓缶而歌或近玩人書玩人喪德和氏搜珉韓子楚人卞和得玉璞於荆山獻厲王王使玉人相之曰石也刖右足及武王即位獻之刖左足文王即位和乃抱其璞而哭於荆山王使玉人治之得寶玉名曰和氏之璧能無驚物箋師襄和氏以比杜悰言師襄善磬乃降而擊缶和氏辨玉乃混取珉以石喻辟巳非其人也淮南子云窮鄉之社扣甕鼓缶自為樂試為之擊建鼓撞巨鐘始知甕缶之足羞也珉石之美者似玉而非記曰君子貴玉而賤珉跪受髙命莫知所裁某藏豹不堅劉向列女傳陶答子妻曰妾聞南山有玄豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以逺害雕龍未巧史記談天衍雕龍奭徒承庭訓北史皇甫績傳績嘆曰我無庭訓養於外氏遂厠人曹比衛家之一兒世説衛洗馬天韻標令論者以為出王眉子平子武子之右時人為之語曰諸王三子不如衛家一兒天懸鵬鷃莊子鵬背若泰山翼若垂天之雲斥鷃笑之曰我翺翔蓬蒿之間此小大之辨也望鄴中之七子文選謝靈運有擬魏太子鄴中集詩八首魏文帝典論今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應瑒東平劉楨斯七子者於學無所遺於辭無所假風逸馬牛左傳齊侯伐楚楚子使與師言君處北海寡人處南海惟是風馬牛不相及也注牛馬風逸蓋末界之微事已忝決科揚雄法言或人啞爾笑曰須以發策決科敢思筮仕見代僕射表伏惟相公以仁義禮智信為基構用溫良恭儉讓為藩維堯時則業貫夔龍殷代則道符尹説入秉文教書三百里揆文教二百里奮武衛出曜兵權晉儒林傳論曰當塗草創深務兵權揮神鋒而劍合隂陽吳越春秋干將造劍二枚陽曰干將而作龜文隂曰莫邪而漫理述雅誥而筆開造化李賀詩筆補造化天無功況天有井絡河圖括地象岷山之精上為井絡帝以建昌神以會福地稱坤維見為河東公啓控三巴百濮之雄常璩華陽國志獻帝初平元年征東中郎將趙頴建議分巴為三郡頴欲得巴舊名故白益州牧劉璋以墊江以上為巴郡江南龎羲為太守治安漢以江州至臨江為永寧郡朐忍至魚復為固陵郡建安六年魚復蹇胤白璋爭巴名璋乃改永寧為巴郡以固陵為巴東郡徙羲為巴西太守是為三巴左思蜀都賦於東則左綿巴中百濮所充劉逵曰濮夷也傳云麇人率百濮今巴中七姓有濮也帶南詔西山之險新書南蠻傳夷語王為詔其先渠帥有六自號六詔曰蒙巂詔越析詔浪穹詔邆晱詔施浪詔蒙舍詔兵將不能相君蜀諸葛亮討定之蒙舍詔在諸部南故稱南詔髙適傳西山三城列戍民疲於役適上書論之案西山即雪山又名雪嶺在成都西正控吐蕃人稱奧府焦氏易林江河淮海天之奧府帝謂殊藩晉四夷傳論曰髙節不羣亦殊藩之秀也固巳一作以廣集英豪用資參佐晉王浚傳參佐皆內敘玳簪珠履史記春申君傳趙使欲夸楚為玳瑁簪春申君客皆躡珠履以見趙使緑水紅蓮見為同州啓成籍籍於淮山漢書劉屈氂傳上怒曰事籍籍如此何謂祕也王逸楚辭序漢淮南王安好士八公之徒分造詩賦或稱大山小山致憧憧於燕路易憧憧往來朋從爾思庾信碑樂毅羈旅猶思燕路若某者徒將慕藺漢司馬相如傳少時名犬子既學慕藺相如之為人也更名相如何足望回見論語又安敢一作可拂其塵埃漢王吉傳朝則冒霧露晝則披塵俟加以冠履漢匡衡傳衡免冠徒跣待罪天子使謁者詔衡冠履伏思相公直以大人頃居班列獲奉恩私後漢馮異傳上書曰充備行伍過蒙恩私羅照乘於驪淵史記梁惠王謂齊宣王曰寡人有徑寸之珠照車前後各十二乘者十枚莊子河上有家貧窮者其子沒淵得千金之珠其父曰夫珠必在驪龍頷下子得之必遭其睡也覬歸昌於鳳穴韓詩外傳鳳舉曰上翔集鳴曰歸昌張協七命采竒律於歸昌山海經丹穴之山有鳥名曰鳳凰未見其可處之不疑曾不見木朽石頑見論語韓愈詩我心安得如石頑雕鐫莫就魏都賦木無雕鎪史記龜策傳鐫石拌􅑕傳賣於市榆瞑豆重嵇康飬生論豆令人重榆令人瞑性分難移古人所以有以榮為憂晉羊祜傳讓表曰夙夜戰栗以榮為憂受恩如敵按左傳臾駢曰前志有之曰敵惠敵怨不有後嗣注敵猶對也語蓋本此斯言之作圭也有焉今月六日辰時輒奉辟書具聞晨省禮記凡為人子之禮冬溫而夏凊昏定而晨省仰承嚴旨南史袁昂傳循復嚴旨若臨萬仭便定行期而又內奮弟兄外誘交友傅翼類虎汲冡周書無虎傳翼將飛入宫擇人而食生角如麟漢郊祀志郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云事誠實於顯榮勢莫知其報效但須旬日方拜旌旄當洗心為齋莊子仲尼曰唯道集虛虛者心齋也延頸以望荀子小人莫不延頸舉踵持千尋之建木吕氏春秋北人之南建木之下日中無影蓋天地之中也想像瓌姿宋玉神女賦瓌姿偉能周萬頃之澄波後漢黃憲傳憲字叔度郭林宗曰叔度汪汪若千頃波澄之不清淆之不濁不可量也比量曠度夏侯湛東方朔畫贊逺心曠度戴恩揣已投一作授命依仁後漢臧洪傳書曰臧洪投命於君親論語依於仁集解依倚也仁者功施於人故可依神之聽之語見詩百生如一謹啓二某啓伏蒙榮示賜及前件衣服段及束絹等謹依處分捧受訖伏以大人自處通班徐陵讓表洪私過誤置以通班彌修儉德田園惟恐蕪沒陶潛歸去來辭歸去來兮田園將蕪胡不歸子弟不免飢寒南史蕭惠基傳子洽位南徐州中從事清身率職饋遺一無所受妻子不免飢寒去歲一作春成名易善不積不足以成名首春一作秋歸覲箋大中五年圭登進士第此云去歲成名首春歸覲則西川之辟乃六年事也雖才非張載未刋劍閣之銘晉書張載字孟陽父收蜀郡太守載博學有文章太康初至蜀省父經劍閣著銘以作誡益州刺史張敏見而竒之乃表上其文武帝遣鐫之於劍閣山焉明一統志大劍山在保寧府劍州北二十五里峭壁中斷兩崖相嶔如門之闢如劍之植故又名劍門山而志慕胡威敢問荆州之絹見為河東公啓豈意一作謂相公復以簡書召署筐篚加恩古者贖百里奚才持五羖見為滎陽公狀誚程不識猶惜一錢漢灌夫傳平生毁程不識不直一錢况某碌碌無竒史記平原君傳毛遂招十九人曰公相與歃此血於堂下公等碌碌所謂因人成事者也容容一作庸庸自守後漢左雄傳容容多厚福敢邀厚幣漢曹參傳聞膠西有蓋公善治黃老言使人厚幣請之來自雄藩品目難名珍纎可玩魏志常道鄉公詔曰方寶纎珍歡以效意仰李膺之德尚未登門見為濮陽公狀讀戴聖之書一作經已驚潤屋漢儒林傳后蒼説禮數萬言號曰后氏曲臺記授梁戴德戴聖慶普由是禮有大小戴慶氏之學隋經籍志戴德刪繁重合為八十五篇戴聖又刪為四十六篇禮記大學曰富潤屋下情無任戴荷悚懼之至謹啓三某啓伏奉榮示令將前件馬及行官延接者某將仕大藩苦無逺道得蒙恩禮曲賜優崇北史袁充傳賞賜優崇儕輩莫之比扶以武夫濟之良馬經過燕館謂碣石宮見為濮陽公狀將耀於鳴騶孔稚圭北山移文鳴騶入谷注言徴車也夢寐梁園西京雜記梁孝王好宫室苑囿之樂築兔園園有雁池池間有鶴洲鳬渚謝惠連雪賦梁王不恱遊於園乃置旨酒命賔友召諸生延枚叟相如末至居客之右只思於飛控控與鞚通馬勒也鮑昭擬古詩飛鞚越平陸感佩之至不任下情謹啓獻河東公啓二首箋舊書文苑傳商隱為徐州掌狐書記府罷入朝復以文章干令綯乃補太學博士會河南尹栁仲郢鎮東蜀辟為節度判官檢校工部郎中大中末仲郢坐專殺左遷商隱廢罷還鄭州未幾病卒商隱啓伏奉手筆猥賜奏署某少而孱懦一作繭長則艱屯有志為文無時一作資就學雖雜賦八首或庶於馬遷漢藝文志司馬遷賦八篇而讀書五車逺慚於惠子見為安平公狀契濶湖嶺淒涼路岐湖謂洞庭嶺謂五嶺也商隱佐鄭亞幕於桂州及亞坐李德裕黨貶循州刺史商隱仍隨亞在嶺表故云罕遇心知李陵答蘇武書人之相知貴相知心多逢皮相論衡延陵季子出遊路有遺金呼薪者曰取彼地金來薪者曰子皮相之士也昔魯人以仲尼為佞見論語淮隂以韓信為怯漢韓信傳衆辱信曰能死刺我不能出跨下信俯出跨下一市皆笑信以為怯聖哲且猶如此尋常安能免乎一作矣是以艮背却行易艮其背不獲其身行其庭不見其人冰心自處鮑昭樂府清如玉壺冰王昌齡詩一片冰心在玉壺羅含蘭菊晉羅含傳含致仕還家階庭忽蘭菊叢生以為德行之感仲蔚蓬蒿見為州同啓見芳草則怨王孫之不歸集作遊劉安招隱士王孫遊兮不歸春草生兮萋萋撫髙松則嘆大夫之虛位漢官儀秦始皇上封泰山風雨暴至休於松下因封其樹為五大夫漢書注五大夫秦第九爵名不可終否易物不可以終否屬於髙明伏惟尚書春日同和見前狀秋霜共烈孫楚書志厲秋霜叔子則九代清德晉羊祐傳祐字叔子奉山南城人世吏二千石至祐九世並以清德聞稚春則七葉素儒晉書汜育傳育字稚春濟北盧人也奕世素儒敦睦九族客居青州逮育七世時人號其家兒無常父衣無常主世箋舊書栁公綽理家甚嚴子弟克稟家訓言家法者稱栁氏仲郢有父風動修禮法牛僧儒嘆曰非積習名教安能及此君子立言永為周禮左傳韓宣子觀書於太史氏見易象與魯春秋曰周禮盡在魯矣正人得位長作歲星漢東方朔傳正諫似直東方朔别傳朔嘗言能知朔者惟太王公耳朔卒後武帝召太王公問之曰爾知東方朔乎曰不知公何所能曰頗善星歷帝問諸星具在否曰具在獨不見歲星十八年今復見爾帝嘆曰東方朔在朕旁十八年而不知是歲星哉慘然不樂今者初涉將壇始敷賔席射洪一作江奧壤潼水名都新書地理志劍南道梓州梓潼郡治射洪縣案東川節度治梓州兼領刺史明一統志梓潼水在潼川州鹽亭縣南源出劍州隂平縣竇圖山流經綿州入縣界下白馬河入涪江舊書地理志縷灘東六里有射江語訛為洪俗擅繁華西都賦窈窕繁華地多材雋晉慕容廆傳以文章才雋任居樞要指巴西則民皆譙秀桓溫薦譙元彥表巴西譙秀植操貞固抱德肥遁杜門絶迹不面偽庭善曰孫盛晉陽秋云譙秀字元彥巴西人譙周孫性清靜不交於俗李雄盜蜀安車徴秀秀不應躬耕山藪訪臨卭則客有相如漢書司馬相如素與臨卭令王吉相善吉曰長卿久宦遊不遂而困來過我於是相如往舍都亭臨卭令繆為恭敬富人卓王孫程鄭乃相謂曰令有貴客為具召之并召令舉纎繳以下冥鴻列子蒲且子之弋弱弓纎繳乘風振之連雙鶬於青雲之際史記楚世家云楚人有好以弱弓微繳加歸雁之上者冥鴻見前表執定鏡而求西子劉協新論鏡形如杯以照西施鏡縱則面長鏡橫則面廣非西施貌易所照變也惟所指命便為丹青若某者又安可炫露短才陸機豪士賦運短才而易聖哲所難叨塵記室鹽車欵段徒逢伯樂而鳴戰國策驥服鹽車而上大行負轅不能上伯樂遭之下車攀而哭之於是仰而鳴欣伯樂之知巳也後漢馬援傳乘下澤車御欵段馬注欵猶緩也言形段遲緩也土鼓迂疏恐致文侯之卧禮記禮運曰禮之初蕢桴而土鼓樂記魏文侯曰吾端冕而聽古樂則惟恐卧承命知忝撫懷自驚終無喻蜀之能集作心非漢司馬相如傳唐蒙使略通夜郎僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠率上聞之遣相如責唐蒙等因喻告巴蜀民以非上意但誓依劉之願見為鹽州狀未獲謁謝下情無任感激攀戀之至謹啓二某啓伏蒙示及賜錢三十五萬以備行李謹依榮示捧領訖伏以古來良材必有禮幣一束芻皆堪貺美詩生芻一束其人如玉五羖皮未曰輕齎見為滎陽公狀况某迹忝諸生名非前哲左傳賴前哲以免也尚遙玉帳抱朴子兵在太乙玉帳之中不可攻也漢藝文志兵家有玉帳經一卷巳賚金錢訪蜀郡之卜人懸之莫竭漢王貢兩龔傳蜀有嚴君平卜筮於成都市裁日閲數人得百錢足以自飬則閉肆下簾而授老子遇河間之姹女數且難窮見為安平公狀未草檄以愈風見為濮陽公表不執鞭而獲富見論語敢將潤屋且以騰􅑽並見前戴荷之誠寄喻無地上尚書范陽公啓三首箋舊書盧簡辭范陽人弟𢎞正大中三年檢校户部尚書出為徐州刺史武寧軍節度使徐泗濠觀察等使本傳𢎞正鎮徐州又從為掌書記某啓仰蒙仁恩俯賜手筆將虛右席以召下材漢儒林傳其不事學若下材及不能通一藝輒罷之承命恐懼一作惶不知所措某幸承舊族蚤預儒林鄴下詞人夙蒙推奬洛陽才子濫被交遊潘嶽西征賦賈生洛陽之才子而時亨命屯道泰身否成名踰於一紀旅宦過於十年箋開成二年丁已商隱登進士第至大中三年已巳應徐州辟凡十三歲恩舊雕零路岐悽愴阮籍詩悽愴傷我心薦禰衡之表空出人間孔融薦禰衡表使衡立朝必有可觀嘲揚子之書僅盈天下揚雄解嘲序人有嘲雄以玄之尚白而雄解之號曰解嘲去年逺從桂海謂桂州江淹雜體詩文軫薄桂海來返玉京靈寶本元經自玄都玉京以下有三十六天雲笈七籖三洞經曰玄都上有九曲崚􅜤鳳臺瓊房玉室處於九天之上玉京之陽李白詩手把芙蓉朝玉京儲光羲詩余亦翺翔歸玉京無文通半頃之田江淹與交友論隱書望在五畝之宅半頃之田鳥赴簷上水匝階下梁書淹字文通乏元亮數間之屋陶潛歸園田居詩方宅十餘亮畝草屋八九間晉書潛字元隘傭蝸舍魏志注臣松之案魏略云焦先及楊沛並作瓜牛廬止其中以為瓜當作蝸蝸牛螺蟲之有角者也俗或呼為黃犢先等作圜舍形如蝸牛蔽故謂之蝸牛廬莊子有國於蝸之左角者曰觸氏國於右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反謂此物也危託燕巢左傳吳公子札宿於戚聞鐘聲焉曰夫子之在此也猶燕之巢於幕上春畹將遊則蕙蘭絶徑離騷余既滋蘭之九畹兮又樹蕙之百畝秋庭欲掃則霜露沾衣漢伍被傳今臣亦將見宫中生荆棘露霑衣也謝莊月賦佳期可以還微霜霑人衣免調天官獲升甸壤謂京兆奏署掾曹歸惟却掃後漢馮衍傳衍字敬通京兆杜陵人為司𨽻從事西歸故郡閉門自保不敢復與親故通江淹恨賦敬通見抵罷歸田里閉關却掃塞門不仕出則卑趨仰燕路以長懷望梁園而結慮見為栁圭啓𢎞箋本傳大中三年入朝京兆尹盧𢎞正奏署掾曹令典箋奏明年令狐綯作相商隱屢啓陳情綯不之省尚書道光士範魏鄧艾傳讀故太丘長陳實碑文言文為世範行為士則艾遂自名範字士則德冠名宗見下文愷悌之化既流詩豈弟君子遐不作人鎮靜之功方懋晉劉毅傳疏曰欲敦風俗靜鎮百姓竊思上國投技一作刺東都及門惟交抵掌之談戰國策蘇秦與李兊抵掌而談説文抵側擊也遂辱知心之契載維浮泛頻一作頗涉光隂並見前豈期咫尺之書史記廣武君曰奉一介咫尺之書終訪蓬蒿之宅見為同州啓感義增氣袁宏三國名臣贊序懦夫增氣懷仁識歸禮記君子有禮故物無不懷仁便當焚遊趙之簦史記平原君傳虞卿躡蹻擔簦説趙孝成王毁入秦之屩戰國策蘇秦去秦而歸贏縢履蹻束書投筆仰副嘉招並見前謁謝未間下情無任感戀之至謹啓二某啓某猥以謏聞禮記足以謏聞不足以動衆謏思了反仰承嘉命後漢周燮傳閔仲叔恨曰始蒙嘉命且喜且懼處囊引喻未施下客之能見為鹽州狀在握稱珍遂忝上卿之列禮記儒有席上之珍以待聘循揣斯久兢惶不任况尚書學總百家淮南子百家異説各有所出術窮三略李康運命論張良受黃石之符誦三略之説文鋒筆力庾信詩四照起文鋒南史杜子偉傳徐勉嘗見其文重其有筆力抉揚馬之懸門左傳逼陽人啓門諸侯之士門焉縣門發聊人紇抉之以出門者縣與懸同文心雕龍陳思稱揚馬之作趣幽旨深劍氣弓聲任昉宣德皇后令劍氣凌雲而屈迹於萬夫之下隋長孫晟傳突厥大畏之聞其弓聲謂為霹靂割韓彭之右地漢胸奴傳郅支單于引其衆西欲攻定右地永言賔畫宜在民宗任昉王儉集序莫不北面人宗豈意非才旋蒙過聽末至居右既乏相如之譽見為栁圭啓後來在上終興汲黯之嗟漢汲黯傳見上言曰陛下用羣臣如積薪耳彼來者居上手足分榮後漢袁談傳王修曰兄弟者手足也里閭交慶行吟花幕即蓮幕見前啓卧想金臺寰宇記燕昭王金臺在易州易縣東南三十里未離紫陌之塵水經注漳水北徑祭陌西田融以為紫陌趙建武十一年造紫陌浮橋於水上即此處案紫陌謂長安之道路如賈至早朝亦曰銀燭朝天紫陌長蓋借用其事非必泥鄴中已夢清淮之月書海岱及淮惟徐州李頎詩清淮奉使千餘里依仁佩德白首知歸潘嶽金谷集詩投分寄石友白首同所歸伏惟俯賜恩察謹啓三某啓絹若干右特蒙仁恩賜備行李謹依數捧領訖嘉命猥臨厚賚仍及捉襟見肘免類於前哲莊子曾子居衛捉襟而肘見裂裳裹踵無取於昔人淮南子楚將攻宋墨子聞之自宋趨而往一日一夜足重繭而不休息裂裳裹之至郢見楚王感佩私恩不知所喻謹啓為白從事上陳許李尚書啓李尚書乃李執方某啓伏奉公牒辟署節度巡官兼伏奉榮示賜及匹帛等才異當仁事從非望漢息夫躬傳欲求非望拜受失度跪捧難勝魏略太子與鍾繇書曰寶玦初至捧匣跪發某符彩無竒見為安平公狀局量有限晉禇裒傳祖䂮有局量徒以杜林外氏學富文華後漢杜林傳林字伯山家既多書又外氏張竦父子喜文采林從竦受學時稱通儒謝朗舉宗皆親儒墨南史謝晦傳據子朗字長度位東陽太守論曰謝氏自晉以降雅道相傳可謂德門齠年有志大戴禮男八歲而齠女七歲而齔韓詩外傳男子八月生齒八歲而齠齒女子七月生齒七歲而齔齒釋名齔洗也毁洗故齒更生新也案毁齒男曰齠女曰齔然周禮云未齔者不為奴則齔亦男女可通齠音迢齔音襯壯嵗無名禮記三十曰壯有室瞻遺構以自驚見為懷州表奉成書而未遂漢司馬遷書父談且卒執遷手而泣曰余固周室之太史也汝復為太史則續我祖矣遷俯首流涕曰小子不敏請悉論先人所次舊聞弗敢缺庾信賦受成書之顧託重以零丁屬釁李密陳情表零丁孤苦息類非蕃決稚圭之甲一作射科漢匡衡傳衡字稚圭射策甲科以不應令除為太常掌故則行有違離之苦效敬通之却掃則坐無供飬之資徘徊盛時並見前鬱抑衷懇司馬遷書是以抑鬱而與誰語敢思聘召忽賜降臨尚書分戚天家後漢曹節傳車馬服玩擬於天家揚輝王國詩思皇多士生此王國攻文而丹青讓巧見為山南啓論兵而鉤觡慙能方言鉤宋楚陳魏之間謂之鹿觡或謂之鉤格自關而西謂之鉤案鉤謂曲兵也觡説文骨角之名唐末鄭傳守歙州設鹿角以禦黃巢是也頃者言自執金後漢百官志執金吾一人中二千石胡廣曰衛尉巡行宫中則金吾徼於外相為表裏以擒討姦猾雄推受賑左傳戎有受賑河橋三壘見為懷州表當弟子之輿尸易長子帥師弟子輿尸易水一城水經易水出涿郡故安縣閻鄉西山值將軍之下世鮑昭樂府將軍既下世部曲亦罕存箋新書大中三年四月幽州盧龍軍節度使張仲武卒其子直方自稱留後四年八月軍亂功深式遏道著綏和中間衛朔拒君邢洺起亂春秋莊公六年春王正月王人子突救衛夏六月衛侯朔入于衛左傳衛侯入放公子黔牟於周公羊傳衛侯朔何以名絶曷為絶之犯命也注犯天子命尤重案諸侯伐衛納朔而王使子突救之意即定黔牟不欲使朔得入而朔竟入衛逐黔牟是無王命也故曰拒君兼箋邢洺二州昭義節度使所領也此謂劉稹拒命作亂紀侯去國汾晉挺災左傳紀侯大去其國違齊難也太箋汾水晉水皆在太原界中此謂楊辨逐原節度使李石語其巢穴之間晉梁武昭王傳慿守巢穴在我封鄰之側而又潛調逺轡晉孫楚傳遺孫皓書曰長轡逺御密運良籌輕敵殘人後漢賈復傳光武大驚曰所以不令賈復别將者為其輕敵也則勇於不敢伐謀持重漢趙充國傳上兵伐謀其次伐交則令在必行今者趙北變風後漢公孫瓚傳前此有童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自以為易地當之遂徙鎮焉淮南受賜伏滔正淮論淮南者三代揚州之分也當春秋時吳楚陳蔡之輿地戰國之末楚全有之戎麾始至徐陵為貞陽侯書將恐戎麾便濟江表賔驛初開漢書鄭當時常置驛馬長安諸郊請謝賔客夜以繼日固合大選英髦以充僚屬豈期恩集作思慮遂及孱微賁帛豐盈寓圭重復慈親喜問孀姊號驚姓名遂列於羣英簪笏遽一作再光於單緒感深肌骨戴重丘山未伸投刺一作刺股之誠後漢童恢傳楊賜被劾當免椽屬悉投刺去已定糜軀之誓盧諶詩序意氣之間糜軀不悔注楚辭云子胥諫而糜軀伏以久將棲托世説謝公與王右軍書曰敬和棲托好佳兼議扶迎晉虞預傳雖無扶迎之勳更涉旬時方遂行李漆園之蝶濫入莊周之夢莊子昔莊周夢為蝴蝶栩栩然蝶也史記莊子者蒙人也名周常為蒙漆園吏竹林之虱永依中散之身晉書嵇康拜中散大夫與山巨源絶交書曰性復多蝨把搔無已蓮幕含誠金臺結想並見前瞻仰恩顧伏撓精魂郭璞江賦挺異人乎精魂謹奉啓陳謝謹啓為桂州盧副使戡謝聘錢啓戡啓錢若干伏蒙賜備行李謹依數捧領訖多若鑿山見為李貽孫啓山或作井風俗通魏郡龎儉因亂失父時儉三四歲母繦抱轉客廬中鑿井得錢十餘萬遂巨富積如别藏漢書張安世以父子封侯在位太盛乃避不受祿詔都內别藏張氏無名錢百萬之數兩一作丙是科擢第未全染於桂香漢書儒林傳平帝時歲課博士弟子甲科四十人為郎乙科三十人為太子舍人丙科四人補文學掌故匡衡傳數射䇿不中至九乃中丙科通典明經雖有甲乙丙丁四科自武德以來唯有丙丁第而巳盛府從知却自驚於銅臭後漢崔實傳實從子烈時因傳母入錢五百萬得為司徒問其子鈞何如曰論者嫌其銅臭禮於是重富而可求既不憂貧惟思報德見論語伏惟俯鑒微懇謹啓謝河東公和詩啓商隱啓某前因假一作暇日離騷聊假日以偷樂晉令急假者五日一急一歲中以六十日為限出次西溪既惜斜陽聊裁短什西溪在東川義山佐桞仲郢幕集中西溪詩頗多仲郢所和乃悵望西溪水六韻有引放翁筆記華州鄭縣之西溪亭者誤也蓋以徘徊勝境南史梁宗室傳映為吳興太守勝境名山多所尋履顧慕佳辰為芳草以怨王孫見獻啓借美人以喻君子離騷恐美人之遲慕張衡四愁詩序屈原以美人為君子思將玳瑁漢書注玳瑁如龜其甲相覆而生若甲然甲上有斑文為逸少裝書晉書王羲之字逸少善𨽻書為古今之冠願把珊瑚本草珊瑚似玉紅潤生海底磐石上一嵗黃三嵗赤海人先作鐵網沈水底貫中而生絞網出之過時不取則腐與徐陵架筆陳徐陵傳陵字孝穆世祖髙宗之世國家有大手筆皆陵草之斐然而作魏文帝書德璉常斐然有述作之意曾無足觀不知誰何仰達尊重文儷作覽果煩屬和宋玉對楚王問客有歌於郢中者其始曰下里巴人國中屬而和者數千人歌陽春白雪朝日魚離含商吐角絶節赴曲國中唱而和之者不過數人蓋其曲彌髙其和彌寡彌復兢一作驚惶某曽讀隋書見楊越公隋楊素傳素字處道𢎞農華隂人平陳封越國公地處親賢才兼文武每舒繡錦必播管絃當時與之握手言情披襟得侣者惟薛道衡一人而已隋書楊素傳素善屬文工草𨽻性疏而辨髙下在心朝臣之內頗推髙熲敬牛𢎞厚接薛道衡視蘇威蔑如也嘗以五言詩七百字贈道衡詞氣宏拔風韻秀上為一時盛作有集十卷薛道衡傳道衡字玄卿河東汾隂人每至構文必隱坐空齋踏壁而卧聞户外有人便怒其沈思如此髙熲楊素雅相推重聲名籍甚無兢一時及觀其唱和乃數百篇力鈞聲同德鄰義比彼若陳葛天氏之舞吕氏春秋葛天氏之樂三人操牛尾投足以歌八闋一曰載民二曰玄鳥三曰遂物四曰奮穀五曰敬天常六曰建帝功七曰依地德八曰總萬物之極是為廣樂司馬相如賦聽葛天氏之樂張揖曰葛天氏三皇時君號也此乃引穆天子之歌穆天子傳祭公飲天子酒乃歌問天之詩天子命歌南山有􅀢乃紹宴樂又北風雨雪有凍人天子作詩三章以哀民曰我徂黃竹云云彼若言太華三峰初學記華山記云頂上方七里有三峰直上晴霽可覩此必曰潯陽九派漢地理志廬江郡尋陽縣禹貢九江在南皆東合為九江應劭曰江自潯陽分為九郭璞江賦流九派乎潯陽神功古迹皆應物無疲隋劉曠傳每以誠恕應物地理人名亦爭承不闕左傳子産爭承後來酬唱罕繼聲塵南史劉峻傳自序云余聲塵寂寞世不知我常以斯風望於哲匠殷浩詩哲匠感蕭晨豈知今日屬在所天左傳針尹克黃曰君天也陸機表不敢上訴所天善曰何休墨守云君者臣之天也坐席行衣史記滑稽傳時坐席中酒酣襄陽記荀令君至人家三日坐席猶香分為七覆左傳邲之戰士季使鞏朔韓穿帥七覆於敖前故上軍不敗煙花魚鳥置作五衡未詳衡一作衝案通典太公對武王曰可為四衝陳太平御覽引諸葛亮軍令云連衝陳狹而厚是衝乃陳名也五衡疑即五陳左傳昭元年晉中行穆子禦狄於太原毁車崇卒為五陳以相離兩於前伍於後專為右角參為左角偏為前拒是謂五陳此聨蓋與七覆同用左傳事改陳為衝諧聲病耳有四衝則亦可言五衝也詎能狎晉之盟左傳楚人曰晉楚狎主諸侯之盟也久矣豈專在晉實見取鄫之易左傳取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取不以釁鼓左傳吳子使其弟蹶由犒師楚人執之將以釁鼓惠莫大焉恐懼交縈一作欣榮非投措無地來日専冀謁謝伏惟鑒察謹啓獻侍郎巨鹿公啓即魏扶也某啓今月某日舍弟新及第進士羲叟處伏見侍郎所制春闈於榜後寄呈在朝同年兼簡新及第諸先輩五言四韻詩一首李肇國史補互相推敬謂之先輩有司謂之座主夫玄黃備采一作綵者繡之用周禮考工記曰五色備謂之繡清越為樂者玉之竒禮記叩之其聲清越以長樂也固以慮合玄機見為河南表運清俗纍髙傳傳德威讃曰早祛俗纍陟降於四始之際詩序風小雅大雅頌是謂四始優遊於六藝一作義之中漢劉歆傳歆集六藝羣書種别為七略詩序詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌竊計前時承榮內署漢孔光傳徙光為帝太傅位四輔給事中領宿衛供養行內署門户省服御食物柏臺侍宴北堂書鈔漢武帝元封三年作柏梁臺詔羣臣能為七言詩者乃得上坐熊館從畋見為汝南公表式以風騷鍾嶸詩品取效風騷便可多得仰陪天籟莊子子遊曰敢問天籟子綦曰夫吹萬不同而使其自已也動沛中之舊宅一作老是漢髙帝紀上令兒皆和習之曰遊子悲故鄉吾雖都關中萬歲之後吾魂魄猶思樂沛駭汾水之佳人漢武帝秋風辭蘭有秀兮菊有芳懷佳人兮不能忘泛樓船兮濟汾河橫中流兮揚素波非首義於論思見前表實終篇於潤色見論語光傳樂録新書藝文志釋智匠古今樂録十三卷道煥詩家漢藝文志右歌詩二十八家況屬詞之工禮記比事屬辭言志為最書詩言志自魯毛兆軌漢書藝文志詩經二十八卷魯齊韓三家應劭曰申公作魯詩后蒼作濟詩韓嬰作韓詩儒林傳毛公趙人也治詩為河間獻王博士蘇李揚聲庾信趙國公集序蘇武李陵生於别離之世文選有蘇李贈答詩代有遺音禮記一唱而三嘆有遺音者矣時無絶響成公綏嘯賦曲既終而絶響雖古今異制而律吕同歸後漢律厯志聲有清濁協以律吕我朝以來此道尤盛皆陷於偏巧莊子巧言偏辭罕或兼材魏志崔琰等傳評曰自非兼才疇克備諸枕石潄流世説孫子荆年少時欲隱語王武子當枕石潄流誤曰潄石枕流王曰流可枕石可潄乎孫曰所以枕流欲洗其耳所以潄石欲礪其齒則尚於枯稿寂寥之句後漢黨錮傳論曰遂乃榮華丘壑甘足枯稿攀鱗附翼後漢書耿純進曰天下士大夫從大王於矢石之間者其計固望攀龍鱗附鳯翼以成其志耳則先於驕奢艷佚之篇魏志阮籍才藻艷逸推李杜則怨刺居多新書文藝傳杜甫少與李白齊名時號李杜效沈宋則綺靡為甚文藝傳及宋之問沈佺期又加靡麗陸機文賦詩緣情而綺靡至於秉無私之刀尺郭泰機詩衣工秉刀尺晉李含傳母令騰得妄弄刀尺立莫測之門牆楊子在夷貊則引之在門牆則麾之自非託於降神詩維嶽降神生甫及申安可定夫衆製伏惟閣下比其餘力廓此大中足使同僚詩我雖異事及爾同僚左傳同官為僚盡懷博我不知學者誰可起豫見論語某比興非工顓蒙有素漢揚雄傳天降生民倥侗顓蒙然早聞長者之論漢張釋之傳絳侯東陽侯稱為長者此兩人言事曽不能出口夙託詞人之末漢藝文志詩人之賦麗以則詞人之賦麗以淫辭與詞同淹翔下位欣託知音抃賀一作贄之誠翰墨無寄況乎仲氏實預諸生榮沾洙泗之風禮記曽子曰啇吾與汝事夫子於洙泗之間任昉行狀𢎞洙泗之風髙列偃商之風漢儒林傳包商偃之文學仰惟厚德願沐餘輝輒罄鄙詞上攀清唱謝靈運詩六引緩清唱聞郢中之白雪愧列千人見謝河東公啓比齊日之黃門慙非八米集作斗米非隋盧思道傳齊天保中以司空行參軍兼員外散騎侍郎直中書省文宣帝崩當朝文士共作挽歌十首擇其善者用之魏收等不過一二首思道獨有八篇故時人稱為八米盧郎初學記齊職儀曰黃門侍郎與散騎常侍並清華世謂之黃散西齋藂説關中歲以六米七米八米為上中下言在榖取八米取數之多也困學記聞八米盧郎或謂米當為采徐鍇云八米以稻喻之言十稻之中得八粒米也干冒尊重伏用兢惶其詩五言四首謹封如右一作别為舉人獻韓郎中琮啓某啓某少承嚴訓早學古文非聖之書未嘗關慮見為中丞狀論都之賦頗亦留神後漢杜篤傳光武欲建都洛邑篤以關中先帝舊京不宜改營洛邑作論都賦奏之徒以不授一作受綵毫見為山南啓未吞瑞鳥幽明録桂陽羅君章晝寢夢得一鳥五色雜耀不似人間物夢中因取吞之遂勤學讀九經以清才稱馳名江左陸機莫及於才多晉書陸機天才秀逸辭藻宏麗張華嘗謂之曰人之為文長恨才少而子更患其多擅譽鄴中王粲終聞於體弱魏文帝與吳質書仲宣獨自善於辭賦惜其體弱不足起其文至於所善古人無以逺過上下羣士差池纍年詩燕燕于飛差池其羽箋謂張舒其尾翼頃者輒露疏蕪不思狂簡見論語捧爝火以干日御動已光銷莊子堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎廣雅日御曰羲和抱布鼓以詣雷門忽然聲寢漢王尊傳尊曰毋持布鼓過雷門注師古曰會稽城門有大鼓越擊此鼓聲聞洛陽不謂郎中搜材路廣南史謝莊傳於時搜才路狹登客門寬望犬附書述異記陸機有犬曰黃耳機至洛中久無家問戲語犬曰汝能齎書取消息否因以筒盛書繫其頸犬南走達家得答馳還冀雞談易幽冥録兖州刺史宋處宗沛國人也常愛一長鳴雞為置窗間後雞作人語與處宗論極有玄旨終日不輟處宗由此學業大集案魏晉諸人以老易並稱皆謂之玄玄即易也特垂題目曲賜丹青並見前旋屬滎嶓從行書豫州滎波既豬本作滎播或作滎嶓即滎澤也神州視膳史記鄒衍傳中國名曰赤縣神州左傳太子朝夕視君膳同孟陽之覲蜀見為栁圭啓比孝若之歸齊晉書夏侯湛字孝若譙國譙人也祖威魏兖州刺史父莊淮南太守湛幼有盛才文章最富善構新詞案湛東方朔畫贊序朔平原厭次人建安中分厭次以為博陵郡故又為郡人大人來守此國僕自京都言歸定省覩先生之縣邑想先生之髙風注此國謂樂陵也歸父為樂陵太守史傳不載漢地理志平原郡屬青州故曰齊也雖佩恩私竟乖陳謝光隂荏苒見代僕射表誠抱勤拳今此秋期詩秋以為期遂有天幸漢霍去病傳軍亦有天幸更奉禰衡之刺見為同州啓敢無鬷蔑之言左傳昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷蔑也下執其手以上某在京多時自夏有疾失外郡薦名之限俯神臯試士之期西京賦實惟地之奧區神臯物情既集於宗師漢藝文志儒家者流宗師仲尼以重其言注宗尊也公選果歸於令季懷材者皆云道泰抱器者自謂時來以卞和為玉人無不收之瓊玖詩報之以瓊玖卞和見為栁圭啓得蹇修為媒氏無不嫁之娉婷離騷吾令豐隆乘雲兮求虙妃之所在解佩纕以結言兮吾令蹇修以為理注蹇修人名周禮媒氏掌萬民之判辛延年詩不意金吾子娉婷過吾廬杜甫詩喚人看腰裊不嫁惜娉婷是以願托一拳見中庸潛布百兩詩之子于歸百兩御之顧方流而有託顔延之詩玉水記方流璿源載圓折慮良會之猶賖古詩今日良宴會伏惟郎中與先輩賢弟價重兩劉晉書劉琨字越石兄輿字慶孫並名著當時京都為之語曰洛中奕奕慶孫越石劉峻辨命論迫世有沛國劉瓛瓛弟璡並一時秀士也譽髙二陸晉書陸雲少與兄機齊名雖文章不及機而持論過之號曰二陸比李膺則仙舟對棹方馬融則絳帳雙褰見為山南啓若某者雖陋若左思世説潘嶽有姿容少時挾彈出洛陽道婦人遇者莫不連手共縈之左太沖絶醜亦復效嶽遨遊於是羣嫗齊共亂唾之委頓而退瘦同沈約南史沈約有志台司梁武帝不用以書陳情於徐勉言已老病革帶常應移孔無庾信之腰腹周庾信傳身長八尺腰帶十圍容止頺然有過人者乏崔琰之鬚眉見為山南啓然至於感分識歸銜誠議報將酬楊寶則就雀求環欲答孔愈則從龜覓印見謝座主啓推其異類不後他人謹復袖一作陳新文重干清鑒馬卿室邇孔子墻髙遲面莫由隳肝無所漢蒯通傳臣願披心腹隳肝膽任重道逺見論語方懷驥坂之長鳴見獻河東公啓一日三秋詩一日不見如三秋兮空咏馬嵬之清什舊書肅宗紀楊國忠諷玄宗幸蜀至馬嵬頓六軍不進大將軍陳玄禮請誅楊氏於是誅國忠賜貴妃自盡陜西通志馬嵬坡在西安府興平縣西二十五里案義山有馬嵬詩二首或琮亦賦之也知深可恃謝靈運謝知深覺命輕言切成煩左傳嘖有煩言幽谷未見於鶯喬詩伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木曲沼空勤於鳬藻魏文帝紀注臣妾逺近莫不鳬藻仰瞻几閣漢刑法志文書盈於几間伏待簡書謹啓為某先輩獻集賢相公啓箋舊書魏謨傳謨字申之巨鹿人大中二年十月兼户部侍郎尋以本官同平章事兼集賢大學士謨乃徵之五世孫也某啓某竊觀一作覩貞觀朝書伏見文皇帝因夢吹塵方求風后帝王世紀黃帝夢大風吹天下之塵姤皆去又夢人執千鈞之弩驅羊萬羣帝寤而嘆曰天下豈有姓風名后姓力名牧者也依二占而求之得風后於海隅登以為相得力牧於大澤進以為將于畋問卜始載磻溪史記齊世家吕尚以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是西伯獵果遇太公於渭之陽載與俱歸立為師水經注渭水之右磻溪水注之溪中有泉謂之兹泉吕氏春秋所謂太公釣兹泉也事偉於王圖一作塗非道光於帝載書咨四嶽有能奮庸熙帝之載下惟敷袵離騷跪敷祍以陳辭兮上則虛襟晉涼後主傳汜稱疏曰虛襟下士廣招英雋纒綿圖緯之前任昉序圖緯著王佐之符窈窕天人之際董仲舒賢良䇿天人相與之際甚可畏也崇基立極沈約碑文崇基巖巖長瀾瀰瀰四足雖斷於神一作巨鼇三皇本紀女媧鍊五色石以補天斷鼇足以立四極聚蘆灰以止滔水開物成功易開物成務七竅仍沾於混沌莊子鯈與忽謀報混沌之德曰人皆有七竅此獨無有嘗試鑿之七日而混沌死禹羞乘輦史記夏本紀禹陸行乘車水行乘船泥行乘橇山行乘檋舜恥彈琴見為榮陽公表白烏巳見於將雛孫柔之瑞應圖白烏宗廟肅敬則至晉禮樂志吳歌雜曲一曰鳳將雛朱草仍聞於滯穗詩彼有遺秉此有滯穗朱草見為汝南公表共工蚩尤之輩司馬貞三皇紀女媧氏末年諸侯有共工氏任智刑以強霸蚩尤見下序與二負同拘山海經二負之臣曰危與二負殺窫窳帝乃梏之於疏屬之山桎其右足反縛兩手以髮繫之於山上磐石之下劉逵吳都賦注漢宣帝擊磻石於上郡陷得石室其中有反縳械人劉向曰此二負之臣也豕韋晉耳之徒左傳晉文公名重耳豕韋見前與七雄一作騅共御張衡東京賦七雄並爭薛綜曰韓魏燕趙齊楚秦也案自此以上謂太宗平亂魏徵佐命之事是以今上以貽謀負扆詩貽厥孫謀禮記天子負斧依南向而立相公以餘慶持衡易積善之家必有餘慶後漢郊祀志九世之帝方明聖持衡樞用十一德之資後漢楊彪傳大會公卿議曰髙祖都關中十有一世光武宫洛陽於今亦十一世矣贊七百年之祚見前表古猶今也仁豈逺乎伏惟相公日觀同光見為京兆公表天球並價書大玉夷玉天球河圖在東序揚鋒露鍔莊子天子之劔以燕溪石城為鋒齊岱為嶽則武庫常開史記樗里子傳至漢興武庫正直其墓晉杜預傳朝野稱美號曰杜武庫言其無所不有也散藻摛華班固答賔戲摛藻如春華則文星鎮見晉天文志文昌文星在北斗魁前一言悟主漢車千秋傳特以一言悟意旬月取宰相封侯世未嘗有也三接承恩易畫日三接季孟伊繇伊尹咎繇友朋蕭邴蕭何邴吉漢皇發論十萬常愧於淮隂漢韓信傳信曰陛下不過能將十萬如臣多多益辦耳齊后推誠一二皆歸於仲父吳張昭傳孫䇿笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗百度既已貞矣書百度惟貞九流又復諳焉郭璞爾雅序誠九流之津涉六藝之鈐鍵邢昺疏案漢書藝文志儒家者流出於司徒之官道家者流出於史官隂陽者流出於羲和之官法家者流出於理官名家者流出於禮官墨家者流出於清廟之官從橫家者流出於行人之官雜家者流出於議官農家者流出於農稷之官此九流之大旨也牆東竈北後漢書逸民傳王君公儈牛自隱時人語曰避世牆東王君公獨行傳向栩常於竈北坐板牀上如是積久板乃有膝踝足指之處隱淪者咸欲呈材桓談新論天下神人五一曰神仙二曰隱淪猿飲鳥言管子墜岸三仭人之所大難也而猿猱飲焉漢西域傳烏秅國山居田石間有白草纍石為室民接手飲師古曰自髙山下溪澗中飲水故接連其手如猿之為後漢度尚傳抗徐守宣城長椎髻鳥語之人置於縣下韓愈送區册文小吏百餘家皆鳥言夷面僻陋者皆思入貢左傳莒子曰僻陋在夷莊生獻臂莊子子輿曰浸假而化豫之左臂以為雞豫因以求時夜浸假而化豫之右臂以為彈豫因以求梟炙楊子拔毛列子禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟三百篇之詩更無諷刺詩序上以風化下下以風刺上詳見表二百年之史永絶譏嫌杜預春秋序附于二百四十二年行事王道之正人倫之紀備矣後漢馬嚴傳閉門自守猶復慮致譏嫌斯乃百代可知一言可一作以蔽見論語豈立錐側管莊子魏牟謂公孫龍曰規規而求之以察索之以辨是直用管窺天用錐指地不亦小乎可折齒尋環左傳鮑子曰女忘君之為孺子牛而折其齒乎而背之也晉羊祐傳祐年五歲時令乳母取所弄金環乳母曰汝先無此物祐即詣鄰人東垣桑樹間探得之巍乎焕乎盛矣美矣若某者剖一作刳心寡竅史記殷本紀紂怒曰吾聞聖人心有七竅剖比干觀其心對面多牆書不學牆面小比焦螟敢矜巢穴一作窟列子江浦之間生麼蟲名曰焦螟羣飛而集於蚊蝶微同觸氏寧務戰爭見上尚書啓徒以簪紱承家階庭受訓堂中得桂已有前叨幕下開蓮仍當後忝並見前所宜結囊無咎易括囊無咎無譽綵服為榮髙士傳老萊子年七十作嬰兒戲著五色斑斕衣取水上堂跌仆卧地為小兒啼絶方朔之上書漢東方朔傳武帝初即位四方士多上書言得失自衒鬻者以干數朔初來上書文辭不遜髙自稱譽上偉之令待詔公車罷禰衡之投刺見為同州啓直以措心賢路漢劉向傳更生使其外親上言進望之等以通賢者之路誓志昌時既慕義無窮並見前思有道則見伏惟相公霧能蔚豹見為栁圭啓雷一作燔非可燒龍卲氏聞見録魚躍龍門雷為燒尾乃化為龍為百氏之指南漢書敘傳總百氏贊篇章崔豹古今汢黃帝與蚩尤戰於涿鹿之野蚩尤作大霧軍士皆迷路帝作指南車蜀志許靖字文休南陽宋仲子與蜀郡太守書曰文休有當世之具足下當以為指南作九州之木鐸書每歲孟春遒人以木鐸徇于路論語儀封人曰天將以夫子為木鐸任安彥國已在於廏中史記田叔傳禇先生曰田仁故與任安相善俱為衛將軍舍人居門下家貧無錢用以事將軍家監家監使養惡齧馬兩人同牀卧仁竊言曰不知人哉家監也任安曰將軍尚不知人何乃家監也晉書胡母輔之傳輔之字彥國擅髙名有知人之鑒王尼傳初為護軍府軍士胡母輔之與王澄傳暢劉輿荀邃裴遐欲解之乃齎羊酒詣護軍門門吏疏名呈護軍護軍歎曰諸名士持羊酒來將有以也尼時以給府養馬輔之等入遂坐馬廏下與尼炙羊飲酒醉飽而去竟不見護軍護軍大驚即與尼長假因免為兵揚子馬卿並歸於門下漢書揚雄傳雄年四十餘自蜀來至遊京師大司馬車騎將軍王音竒其文雅召以為門下吏司馬相如傳字長卿事景帝為武騎常侍非其好也時梁孝王來朝從遊説之士鄒陽枚乘嚴忌夫子之徒相如見而説之因病免客遊梁而猶渴飢未副影響無寧請客者不解衾禱詩抱衾與禱當關者空存一作有皮骨東觀漢記汝郁載病公車臺遣兩當關扶入拜郎中此某所以淮山逺至見為柳圭啓漢棧斯來漢書張良説漢王燒絶棧道注路險不容行架木而度名曰棧道在漢中望姬旦之吐餐史記伯禽就封周公戒之曰我一沐三捉髮一飯三吐哺起以待士猶恐失天下之賢人冀張華之倒屣後漢書蔡雍聞王粲在門倒屣迎之曰此王公孫有異才吾不如也案晉書張華性好人物誘進不倦至於窮賤候門之士有一介之善者便咨嗟稱詠為之延譽又陸機與弟雲俱入洛造太常張華華素重其名如舊相識曰伐吳之役利獲二俊倒屣事未間以升堂客衆擁篲人多史記鄒衍如燕燕昭王擁篲先驅列弟子之坐受業馬苟無鬷蔑之言見為舉人啓難佐仲宣之陋魏王粲傳劉表以粲貌寢而體弱通侻不甚重也今輒以常所著文若干首上獻伏惟少回巖電世説裴令公目王安豐眼爛爛如巖下電微駐台星史記天官書魁下六星兩兩相比者名曰三能能音台晉天文志三公之位在天曰三台固無望於討論庶或觀於指趣晉徐邈傳開釋文義標明指趣儻蕭稂可刈詩冽彼下泉浸彼苞稂又冽彼下泉浸彼苞蕭菅蒯無遺左傳引詩曰雖有絲麻無棄菅蒯蒙文宣一字之褒通鑑開元二十七年追封孔子為文宣王穀梁傳一字之褒寵踰華衮片言之貶辱過斧鉞得玄晏三都之序晉書皇甫謐傳謐字士安自號玄晏先生文苑傳左思賦三都自以其作不謝班張恐以人廢言安定皇甫謐有髙譽思造而示之謐稱善為其賦序便若神巫去厲莊子鄭有神巫曰季咸説苑古者有災者謂之厲司命添年周禮太宗伯以槱燎祀司中司命莊子吾使司命復生子形史記天官書斗魁戴匡六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司祿晉天文志司命主夀御覽引隨巢子云司命益年而民不夭禱祝之誠造次於是門遙閶闔離騷吾今帝閽開關兮倚閶闔而望豫注閶闔天門也路隔瀛洲漢郊祀志蓬萊方丈瀛洲三神山者其傳在勃海中去人不逺蓋嘗有至者諸仙人及不死之藥皆在焉於人世存思雲笈七籖有老君存思圖空移氣序南史沈約傳約曰公自至京邑巳移氣序以塵中仰望未見端倪見為河東公啓希陪上士之流老子上士聞道勤而行之終預羣仙之末集仙録羣仙畢集位髙者乘鸞次乘麒麟次乘龍祈恩望德乃百斯生干冒威嚴下情無任惶懼感激之至謹啓獻相國京兆公啓某啓人稟五行之秀禮記人者五行之秀氣也備七情之動禮記何謂人情喜怒哀懼愛惡欲七者弗學而能必有詠歎詩序情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故咏歌之以通性靈鍾嶸詩評嗣宗詠懷之作可以陶性靈發幽思故隂慘陽舒西京賦夫人在陽時則舒在隂時則慘此牽乎天者其塗不一安樂哀思禮記治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困厥源數千遠則鄘邶齊曹詩疏邶鄘衛三國三監故地也紂都焉武王分朝歌而北謂之邶南謂之鄘東謂之衛以封諸侯衛後并得邶鄘之地邶鄘之詩皆為衛事而猶繫其故國之名者不與衛之滅國也曹者兖州陶邱之北地名武王以封弟振鐸其封域在雷夏菏澤之野昭公好奢而任小人曹之變風始作齊太師吕望封於齊都營邱通工商之業便魚鹽之利民多歸之後五世哀公政衰荒淫怠慢紀侯譖之於周懿王使烹焉齊人變風始作以揚領袖梁簡文帝與湘東王書文章未墜必有英絶領袖之者近則蘇李顔謝鍾嶸詩評序謝客為元嘉之雄顔延年為輔蘇李見前用極菁華竹書記年帝載歌曰鼚乎鼓之軒乎舞之菁華已竭蹇裳去之嘈囋而鐘鼓在懸陸機文賦務嘈囋而妖冶濟曰嘈囋浮艷聲煥爛而錦繡入玩見為同州啓刺時見志各有取焉某爰自弱齡側聞古義留連薄宦任昉表薄宦東朝謝病下邑感念離羣禮記子夏曰吾離羣而索居亦巳久矣東至泰山空吟梁父蜀志諸葛亮琅琊人父圭泰山郡丞亮早孤躬耕隴畝好為梁父吟自比管仲樂毅南遊郢澤徒和陽春見謝河東公啓遊於自得之場實竊德音之選禮記天下大定然後正六律和五聲弦歌詩頌此之謂德音伏惟相公既秉集作康大政復振斯文論風雨則秋枿一作卉芬華語霜霰則春條零落劉峻廣絶交論敘溫燠則寒谷成暄論嚴苦則春藂零葉發軔於風力風后力牧楚辭朝發軔兮天津詳為先輩啓解鞍於伊咎後漢班固傳奏記曰詳唐殷之舉察伊臯之薦宫商資正始之音詩序周南召南正始之道王化之基寒暑協中和之序漢地理志混同天下一之乎中和然後王教成也是故贄其纓拾禮記野外軍中無贄以纓拾矢可也俟彼斧斤神氣雖怯於大巫吳書張紘見陳琳作武庫賦歎之琳曰僕在河北少文人易為雄伯今足下子布在彼所謂小巫見大巫神氣殫矣名字願聞於下客列士傳孟嘗君上客食肉中客食魚下客食菜舊詩一百首謹封如别延之設問希鮑昭之一言南史顔延之傳延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼何遜著名繫沈約之三讀南史何遜傳沈約嘗謂遜曰吾每讀卿詩一日三復猶不能已干冒嚴重延望恩輝進退之間若據泉谷詩進退維谷伏惟俯賜容納謹啓為張周封上楊相公啓箋舊書開成三年正月楊嗣復同中書門下平章事某啓某聞不祥之金大冶所惡見為滎陽公狀自衒之士明時不容曹植表自衒自媒者士女之醜行也斯實格言潘嶽間居賦奉周任之格言善曰論語考比讖賜問曰格言成法亦可以次序也足為垂訓陸倕石闕銘作範垂訓然或顧逢伯樂但伏鹽車見獻河河公啓聽屬鍾期不調緑綺列子伯牙善鼓琴鍾子期善聽傅玄琴賦序蔡雍有緑綺琴臯壤搖落謝朓辭隨王箋臯壤搖落對之惆悵莊子山林與臯壤與使我欣欣然而樂樂未已也哀又繼之老大悲傷古樂府辭少年不努力老大徒傷悲同劉勝之寒蟬後漢黨錮傳劉勝隱情惜已自同寒蟬效子綦之枯木莊子南郭子綦隱几而坐顔成子遊曰何居形固可使如稿木而心固可使如死灰乎則亦迹歸棄世行闕揚名孝經揚名於後世某價乏琳琅爾雅崑崙之山有璆琳琅焉譽輕鄉曲司馬遷報任安書僕少負不羈之才長無鄉曲之譽粗沾科第薄涉藝文錐不穎於囊中見為鹽州狀水竟深於山上魏鄧艾傳初魏當伐蜀夢坐山上而有流水以問征虜護軍爰紹紹曰按易卦山上有有水曰蹇繇曰蹇利西南不利東北孔子曰蹇利西南往功也不利東北其道窮也往必克蜀殆不還乎淹留蓮幕一作侯國棲託一作祇事戎麾插羽佩鞬並見前從相公於關右王粲從軍詩相公征關右赫怒震天威善曰曹操為丞相故曰相公束書載筆隨校尉於河源漢張騫傳騫以枝尉從大將軍擊胸奴又漢使窮河源其山多玉石采來天子案古圖書名河所出山曰崑崙鮑昭樂府詩始隨張校尉占募到河源自北徂南一作東已秋復夏心驚於急絃徑矢陸機詩年往迅徑矢時來亮急絃目斷於高足要津古詩何不䇿髙足先據要路津而又永念敝廬空餘喬木山英華作月非中桂樹遠愧於幽人淮南招隱詩桂樹藂生兮山之幽日暮柴車莫追於傲吏後漢逸民傳韓康字伯休桓帝以安車聘之使者奉詔造康康辭安車自乘柴車冒晨先使者發至亭康因逃遁江淹雜體詩日暮巾柴車路暗光已夕郭璞詩漆園有傲吏捋鬚理鬢世説補王國寶構謝太傅於孝武帝召桓子野飲太傅亦在坐桓撫箏而歌曹子建怨詩太傅泣下捋其鬚曰使君於此處不几晉王恭傳自理鬚鬢神無懼容霜雪呈姿孔融薦禰衡表志懷霜雪弔影揚音曹植責躬表形影相弔五情愧赧煙霞絶想南史沈炯傳表曰瞻仰煙霞伏增悽戀徒以相公遠敦世故容在恩門存趙氏之孤史記屠岸賈誅趙氏朔之婦有遺腹生男程嬰公孫􅫉臼謀取他人嬰兒負之匿山中嬰出謬言趙氏孤處遂殺杵臼孤兒趙氏真孤反在受梁王之禮漢文三王傳梁孝王武招延四方豪傑自山東遊士莫不至齊人羊勝公孫詭鄒陽之屬竽將濫吹韓子齊宣王使人吹竽必三百人南郭先生不善竽而濫於三百之中食祿宣王死湣王立好一一聽之先生乃逃石有參瓊闞子宋愚人得燕石以為大寶藏以華匱十重緹巾十襲客掩口胡盧而笑咳唾隨風眄睞成飾任昉到大司馬記室表咳唾為恩眄睞成飾追維疇曩盧諶詩借曰如昨忽為疇曩曾是逢迎戰國策田光造燕太子跪而逢迎郤行為道蜀郡登文翁之堂漢循吏傳文翁為蜀郡守修起學官於成都市中招下縣子弟以為學官弟子至今巴蜀好文雅文翁之化也上國醉曹參之酒漢曹參傳參代何為相國日飲醇酒卿大夫以下吏及賔客見參不事事來者皆欲有言參輒飲以醇酒吹噓盡力一作力盡非後漢鄭泰傳孔公緒噓枯吹生撫愛形顔漢張安世傳安世瘦懼形於顔色蔡琰詩雖苟活兮無形顔雖以捧承莫能銜戴况許之髙選通典吳時餘曹通為高選而吏部特一時之俊光彼宦情晉書阮籍曰吾少無宦情以曲臺之任用猶輕憲署之發揮方盛並見表仍期官牒漢匡衡傳但以無階朝廷故隨牒在逺方師古曰隨牒謂隨選補之恆牒不被超擢者不越歲時今則節邁白藏梁元帝纂要秋曰白藏候臨玄律謝惠連雪賦玄律窮嚴氣升燕雖戀主見為崔從事啓馬亦嘶風見為濮陽公狀郭汲還州尚不欺於童子後漢郭伋傳汲前在并州始至行部到西河美稷有童兒數百各騎竹馬道次迎拜及事訖復送至郭外問使君何日當還汲與為期既還先期一日伋為違信於諸兒遂止於野亭須期乃入文侯校獵寧爽約於虞人韓子魏文侯與虞人期獵明日會天疾風文侯曰不可以風疾之故而失信遂往犯風而罷虞人苟四時之信是孚魏略曹植上書曰古者聖君與日月齊其明四時等其序亦一諾之恩斯及漢書楚人諺曰得黃金百不如得季布諾况自元和已後公侯冡嗣卿士子孫與之同時歷然可數莫不翔踰鳥道南中志交址郡治龍編自興古鳥道四百里泳出龍津見為同州啓或並命南臺或迭居青瑣並見表金朱照耀楊子法言或曰使我紆朱懷金其樂可量也軒蓋追隨見前啓某雖忝伊人詩所謂伊人亦惟一作共推華胄南史何昌宇謂坐客曰遙遙華胄比王謝之子弟世説王謝舊齊名誠有重輕在嵇呂之交朋顔延之五君詠交吕既鴻軒攀嵇亦鳯舉宿常連接魏文帝與吳質書行則連輿止則接席而獨分光鄰女戰國䇿甘茂亡秦旦之齊出關遇蘇子曰江上之處女有家貧而無燭者謂鄰女曰妾以無燭故常先至掃室布席何愛於餘明之在四壁者幸以賜妾貸潤監河莊子莊周家貧往貸粟於監河侯曰視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水活我哉野鶴天麟晉書嵇紹始入洛或謂王戎曰昨於稠人中見嵇紹昻昂然如野鶴之在雞羣陳徐陵傳陵年數歲志手摩其頂曰天上石麒麟也絶比倫於朝右盧諶詩謬共疲𨽻授之朝右髯參短簿見謝宗卿啓因擬議於軍前竊聽重言莊子有重言寓言巵言常興深嘆是以願馳蹇步誓奉光塵吳志陸遜與關侯書曰延慕光塵思稟良規倘或厠錯薪之斯翹詩翹翹錯薪言刈其楚咏歸荑之一作於自牧詩自牧歸荑洵美且異少窺上路試睨重霄擊水三千暫隨鵬運見為安平公表澄流十二免使魚勞澄當作墱水經注魏武王堨漳水回流東注號天井堰里中作十二墱墱相去三百步令互相灌注一源分為十二流皆懸水門故左思之賦魏都謂墱流十二同源異口也詩箋魚勞則尾赤猶能贊敘燮調見上時相啓謳歌鎔範王融䇿秀才文且有後命復兹鎔範庶無雅拜以纍於君公漢何武傳武字君公徙京兆尹二歲坐舉方正所舉者槃辟雅拜有司以為訛衆虛偽武坐左遷楚內史不使繁聲見憂於仲子後漢宋𢎞傳𢎞字仲子薦沛國桓談帝令鼓琴好其繁聲𢎞聞之不悅悔於薦舉心懷右席夢結邊城寓尺牘而畏達空函漢遊俠傳陳遵性善書與人尺牘主皆藏去以為榮晉書桓溫將以殷浩為尚書令浩欣然將答書慮有謬誤開閉者數十竟達空函大忤溫意由是遂絶寫丹誠而慙非健筆曹植表乃臣丹情之至願任昉表永昌之丹慊獲申又陛下察其丹欵善曰曹大家蟬賦云復丹欵之未足北史突厥傳君肅謂處羅曰今啓民入臣天子甚有丹誠者何也魏文帝與吳質書孔璋鵡章表殊健微為繁富杜甫詩聲華當健筆又健筆凌鸚又凌雲健筆意縱橫岑參詩雄詞健筆皆若飛仰望恩顧下情無任攀戀感激惶懼之至李義山文集箋注卷四
