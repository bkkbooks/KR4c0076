body:
  text: 李義山文集箋注卷一監察御史徐樹榖箋山東提學僉事徐炯注表上為汝南公華州賀赦表箋舊書周墀傳墀字德升汝南人長慶二年擢進士第開成四年拜中書舍人內職如故武宗即位出為華州刺史鎮國軍潼關防禦等使武宗紀會昌元年正月壬寅朔庚戌有事於郊廟禮畢御丹鳳樓大赦改元新書地理志華州領縣三鄭華隂下邽百官志下之達上其制有六一曰表二曰狀三曰箋四曰啓五曰辭六曰牒臣某言伏奉正月九日制書是月壬寅朔越九日為庚戌南郊禮畢改元為某大赦天下者王應麟玉海秦并諸侯曰大赦天下由漢以來或即位建儲改元立后皆有大赦遂為常制奉郊禋以定天位周禮大宗伯以禋祀祀吳天上帝周語精意以享曰禋漢郊祀志兆於南郊所以定天位也新厯象以授人時書厯象日月星辰敬授人時乾健離明震動兌悅見易彖傳跂行喙息漢胸奴傳跂行喙息蠕動之類師古曰跂行凡有足而行者喙息凡以口出氣者罔不慶幸臣某中賀臣聞欽一作禋非昊天而旅上帝者書欽若昊天周禮掌次大旅上帝注祭天於圜丘聖人集作王之重事覃殊休而發大號者易渙汗其大號哲后之𢎞猷故必致四圭以達誠周禮典瑞四圭有邸以祀天注夏正郊天也制六器而申敬周禮大宗伯以玉作六器以禮天地四方將崇嚴配孝經嚴父莫大于配天必在元旬元旬即元日禮記孟春之月天子乃以元日祈榖于上帝注謂以上辛郊祭天也晉郊祀歌歷元旬集首吉先之以蒼璧騂牲周禮大宗伯以蒼璧禮天禮記郊特牲曰牲用騂尚赤也用犢貴誠也重之以雲門大呂周禮大司樂乃奏黃鍾歌大呂舞雲門以祀天神乃後王猶有闕於薦敬禮記祭義曰其薦之也敬以欲爽彼告䖍魏志高堂隆疏曰所以昭事上帝告䖍報施也周官三代之文書序武王既代殷命滅淮夷還歸豐作周官絶而不續漢氏萬靈之位漢郊祀志黃帝接萬靈明庭明庭者甘泉也失而莫尋豈若皇帝陛下以大道遂羣生曹植詩苞育比羣生禮記大道之行也以至公臨寶祚隂符經天之至私用之至公北齊元會大饗歌寶祚眇無疆上包𤣥象周禮考工記天謂之𤣥易在天成象南史周𢎞正博物知𤣥象善占候下總皇祇顔延之序皇祇發生之始黜幽陟明書三考黜陟幽明興廢繼絶見中庸靈芝甘露鄙之而不告史官漢書武帝紀元封二年甘泉宮內中産芝九莖連葉作芝房之歌宣帝紀元康元年甘露降未央宮神爵二年鳳皇甘露降集京師赤鴈白麟陋之而不編瑞牒漢武帝紀太始三年二月行幸東海獲赤鴈作朱鴈之歌元符元年冬十月行幸雍祀五畤獲白麟作白麟之歌班固兩都賦序武帝之世衆庶說豫福應尤盛白麟赤鴈芝房寶鼎之歌薦於郊廟神爵五鳳草露黃龍之瑞以為年紀後漢光武紀羣臣奏言天下清寧靈物仍降宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不當故史官罕得紀焉然後因孟月一作春非周庾信祀五帝歌孟之月陽之夭卜上辛禮記郊之用辛也周之始郊日以至春秋榖梁傳以十二月下辛卜正月上辛祭漢禮樂志正月上辛用祀甘泉圜丘率於國南禮記兆於南郊就陽位也杜氏通典周制祈榖壇名泰壇在國南五十里式是嵗首後漢范升傳奏記曰方春嵗首而動發逺征且天以陛下為子故必饗明誠人以陛下為天故必流睿澤踰千越萬漢郊祀志黃帝萬諸侯而神靈之封君七千邁五登三漢司馬相如傳上咸五下登三何則取集作致直言之科漢武帝紀建元元年詔舉賢良方正直言極諫之士則聽輿論者不足算左傳聽輿人之誦楚語輿人誦注輿衆也設宥過之令書宥過無大刑故無小則除鄉議者未可儔左傳鄭人遊於鄉校以議執政然明謂子産毁鄉校如何子産曰何為夫人朝夕退而游焉以議執政之善否其所惡者吾則改之是吾師也若之何毁之延賞推恩書賞延於世漢諸侯王表武帝施主父之䇿下推恩之令用以勸禦災捍患之士禮記能禦大災則祀之能捍大患則祀之減租退責漢惠帝紀帝即位減田租復十五稅一退責即已責見為京兆公表將以矜火耕水耨之人漢武帝紀詔曰江南之地大耕水耨應劭曰燒草下水種稻草與稻並生髙七八寸因悉芟去復下水灌之草死獨稻長所謂火耕水耨養庶老頒淖糜暖帛之資禮記月令仲秋養衰老授几杖行糜粥飲食王制有虞氏養國老於上庠養庶老於下庠又七十非帛不暖漢文帝紀吏稟當受鬻者師古曰鬻淖糜也走羣望潔刳牲瘞幣之禮左傳韓宣子曰並走羣望注晉所望祀山川皆走往祈禱書望于山川周禮大宗伯以血祭祭五嶽以貍沈祭山林川澤又挍人將事四海山川飾黃駒案貍即瘞幣黃駒則其所沈之牡也肆師職云次祀用牲幣小祀用牲鄭康成以嶽瀆為次祀山川為小祀古不覩者復覩古不聞者復聞萬蟄蘇而六幽盡開禮記樂記曰蟄蟲昭蘇班固典引光被六幽注天地四方也五刃藏而九土咸闢齊語定三革隱五刃注定奠也隱藏也三革甲胄盾也五刃刀劍矛㦸矢也魯語共工氏子曰后土能平九土注九州之土也臣當時集軍州官吏等丁寧告示訖漢谷永傳以丁寧陛下師古曰丁寧謂再三告示也況臣嘗備論思獲叨侍從兩都賦序武宣之世言語侍從之臣若司馬相如虞丘夀王東方朔枚臯王褒劉向之屬朝夕論思日月獻納當時仙禁慙視草以無能漢淮南王傳武帝每為報書及賜常召司馬相如等視草乃遣案本傳墀能為古文有史才文宗重之歷集賢學士起居舍人知制誥充翰林學士拜中書舍人皆內職也故有此語此日泰壇望給薪而靡及禮記祭法燔柴於泰壇祭天也瘞埋於泰折祭地也月令季冬之月乃命四監收秩薪柴以共郊廟及百祀之薪燎周禮委人以式法共祭祀之薪蒸木材徘徊甸服局蹐關城史記呂産入未央宮殿門弗得入徘徊往來書五百里甸服詩謂天蓋髙不敢不局謂地蓋厚不敢不蹐陸機表局天蹐地若無所容案甸服關城皆謂華州關潼關也今華州華隂縣東一里為潼關衛衛東南四里有潼關故城古桃林之塞即此所謂關城也雖有慶於文明易見龍在田天下文明竟無階於奔走書邦甸侯衛駿奔走執豆籩司馬談闕陪盛禮沒齒難忘史記自序是嵗天子始建漢家之封而太史公留滯周南不得與從事故發憤且卒案此太史公者遷稱其父談也與贊首太史公不同蕭望之願立本朝馳魂莫及漢蕭望之傳望之為平原太守雅意在本朝逺為郡守內不自得無任忭舞結戀之至潘嶽藉田賦觀者莫不忭舞乎康衢為京兆公陜州賀南郊赦表箋篇首云伏奉正月九日制書郊禋禮畢改元大赦是即㑹昌元年正月庚戌之事也前為華州刺史作此為陜州刺史作耳京兆公不知何人據本集冇為河東公謝相國京兆公啓又有為栁圭謝京兆公啓又有獻相國京兆公啓所謂京兆公者杜悰也悰杜佑之孫唐書附見佑傳舊史公太和六年由司農卿轉京兆尹新史云太和初由灃州刺史召為京兆尹並不言為陜州刺史中間歷藩鎮開成初入為工部尚書三年改戶部兼判度支㑹昌初為淮南節度使踰年入相此上賀表者當亦是杜悰而史無出守陜州之事人或疑之余案自後魏太和中定四海望族譜牒始以郡表姓故唐人有某公某公之稱皆以郡望冠之所謂言劉必出彭城言李必出隴西者也義山集中稱汝南公者六皆周墀稱安平公者七皆崔戎稱滎陽公者十一皆鄭亞稱河東公者四皆栁仲郢稱濮陽公者八皆王茂元今稱京兆公者四其三的為杜悰而此京兆公獨為他人名稱無别恐不應䝉混至此竊意開成之末文宗晏駕其舊臣多被斥逐如宰相楊嗣復出為潭州刺史李珏為桂州刺史御史中丞裴夷直為杭州刺史而周墀亦以中書舍人出守華州諸臣紛紛去國悰於此時亦或由户部尚書出為陜州史傳於户部之後淮南之前偶失此一遷耳或謂悰嘗尹京兆而以其官稱之非也舊書地理志陜州屬河南道廣德元年車駕幸陜州以為大都督府領縣七陜峽石靈寶芮城平陸安邑夏臣某言臣伏奉正月九日制書郊禋禮畢改元為某大赦天下者既事虞郊書舜典肆類于上帝禮記祭法有虞氏禘黃帝而郊嚳復新堯厯書堯典厯象日月星辰天潢㵼潤史記天官書西宮咸池曰天五潢張衡思𤣥賦垂天潢之泛泛兮浮雲漢之湯湯日觀揚暉應劭漢官儀泰山東南巖名日觀日觀者雞一鳴時見日始欲出長三丈所普天率土見詩罔不慶幸臣某中賀臣聞君人之孝莫大於尊祖詩序生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉王者之敬孰踰於事天故必用因髙之儀禮記禮器曰為髙必因丘陵注謂冬至祭天於圜丘之上也隋牛𢎞郊祀歌辭因髙盡敬掃地推誠申嚴配之禮見上表百神集有攸字序萬靈昭集有蘇字乃可覃殊恩渙大號禮成而德備惠敷而慶𢎞然而秦尚武功戰國策魯仲連曰彼秦者棄禮義而尚首功之國也先祈禳之事漢郊祀志秦并天下令祠官各以嵗時奉祠唯雍四畤上帝為尊春以為嵗祠禱因泮凍秋涸凍冬賽祠案雍四畤謂鄜畤吳陽武畤好畤密畤皆在雍所以郊上帝也故柴燎蕭薌未必饗禮記祭義燔燎羶薌見以蕭光以報氣也郊特牲既奠然後焫蕭合羶薌詳見前漢稱文物左傳文物以紀之聲明以發之重神仙之道漢書武帝紀元鼎五年立泰畤于甘泉天子親郊見禮樂志武帝定郊祀之禮祠太一於甘泉就乾位也乃立樂府以正月上辛用事甘泉圜丘昏祠至明案甘泉太一祠壇武帝用方士公孫卿立之故曰重神仙之道故雲門太簇未必和周禮大司樂圜鍾為宫黃鍾為角太簇為徵姑洗為羽雲門之舞冬日至於地上之圜丘奏之既不講於禮官漢武帝紀元朔五年詔令禮官勸學講議洽聞舉遺興禮揚雄劇秦美新禮官博士卷其舌而不談終致譏於儒者漢郊祀志元帝好儒貢禹韋𤣥成匡衡等相繼為公卿成帝初即位衡奏言甘泉泰畤河東后土之祠宜徙置長安下羣臣議博士師丹等五十人以為甘泉河東之祠非神靈所饗宜徙就正陽大隂之處違俗復古循聖制定天位從之伏惟皇帝陛下與春生育班固答賓戲其君天下也養之如春並日照臨書惟我文考若日月之照臨究三代之質文酌百王之損益定午位庾信周祀員丘歌丙午封壇肅且圜卜上辛潔齊之誠易齊也者言萬物之潔齊也先掃除而遐達禮記至敬不壇掃地而祭孝思之志詩永言孝思協氣臭以升聞禮記至敬不饗味而貴達氣也書𤣥德升聞然後推作解之恩易雷雨作解君子以赦過宥罪降惟新之令書舊染汙俗咸與惟新設科以招諫諍新書選舉志制舉有賢良方正直言極諫科宥過以務哀矜書皇帝哀矜庶戮之不辜已責既恤於三農左傳晉悼公即位施舍已責注施恩惠舍勞役止逋責周禮三農生九榖録勳無遺於十代左傳范宣子囚叔向祁奚曰社稷之固也猶將十世宥之以勸能者頒粟帛而養耆老漢文帝紀有司請八十已上月賜米肉酒九十已上加帛絮長吏閲視丞若尉致走牲幣而遍山川見為汝南公表舉皇王之廢官盡古今之能事臣當時集軍州官吏丁寧告示訖況臣嘗奉恩光江淹雜體詩宵人重恩光叨居華顯當太史撰日之際周禮大史職曰大祭祀與執事卜日曹大家東征賦時孟春之吉日兮撰良辰而將行善曰鄭𤣥禮記注云撰猶擇也猶立漢庭漢陸賈傳賈以此游漢庭公卿間及宗伯相儀之時周禮大宗伯凡祀大神享大鬼祭大示詔相王之大禮已辭魏闕周禮縣治象之法于象魏注闕也莊子魏牟身在江海之上心居魏闕之下怊悵郡印漢朱買臣傳視其印㑹稽太守章也徘徊使車漢蕭育傳以三公使車載育入殿中受䇿徒深傾藿之誠曹植表若葵藿之傾葉太陽雖不為之回光終向之者誠也實積懸瓠之嘆詩匏有苦葉𫝊匏謂之瓠瓠葉苦不可食也疏陸璣云匏葉少時可為羮又可淹煮極美八月中堅强不可食故云苦葉瓠匏一也故云謂之瓠王粲登樓賦懼匏瓜之徒懸兮畏井泄之不食翰曰匏瓜為物繫而不食者也仲宣自喻召公邑內敢思棠樹以追蹤詩序甘棠美召公也箋召公聽男女之訟不重煩勞百姓止舍甘棠之下而聽斷焉國人思其人敬其樹春秋公羊傳自陜而東周公主之自陜而西召公主之注今𢎞農陜縣尹喜宅中惟望靈符之復出舊書天寶元年陳王府參軍田同秀上言𤣥元皇帝降見於丹鳳門之通衢告賜靈符在尹喜之故宅上遣使就函谷故關尹臺西發得之地理志靈寶本桃林縣以掘得寶符改名臣不勝慶幸踴躍之至為汝南公以妖星見賀德音表箋舊書武宗紀會昌元年十一月丁酉朔壬寅夜大星東北流其光燭地有聲如雷山崩石隕其彗起於室凡五十六日而滅新書武宗紀會昌元年十一月壬寅有彗星出於營室辛亥避正殿減膳理囚罷興作天文志十一月壬寅有彗星于北落師門在營室入紫宮徐堅初學記妖星曰孛星彗星玉海大赦者不以罪大小皆原其或某處有災或車駕行幸則曰赦某郡已下謂之曲赦復有遞減其罪謂之德音者比曲赦則恩及天下比大赦則罪不盡除案漢天文志天鼓有音如雷非雷音在地而下及地其所住者兵發其下天狗狀如大流星有聲其下止地類狗所墜及望之如火光炎炎中天千里破軍殺將舊書所謂大星東北流其光燭地有聲如雷者蓋即天狗之類臣某言臣伏奉某月日德音以妖星謫見思答天戒者臣當時集軍州官吏丁寧宣示訖仁深覆載恩極照臨究祖宗之令圖左傳女叔齊曰令圖天所贊也極皇王之盛事詩皇王維辟圓首方足大戴禮記曾子曰天之所生上首地之所生下首丄首之謂圖下首之謂方注人首員足方莊子圓臚方趾罔不欣慶臣某中賀臣聞覆載莫大於天地而升降之氣或不接禮記天氣上升地氣下降照臨莫大於日月而薄蝕之度或有差漢天文志彗孛飛流日月薄蝕此皆隂陽之精其本在地而上發於天者也豈惟休咎之徵書洪範曰休徵曰咎徵自是隂陽之事春秋僖公十六年隕石于宋五六鷁退飛過宋都左傳周內史叔興曰是隂陽之事非吉凶所生也旋觀彗孛載考䇿書雖欲為災曷嘗勝德史記殷本紀伊陟曰臣聞妖不勝德帝之政其有闕與帝其修德太戊從之而祥桑枯死伏惟皇帝陛下荆枝載茂吳均續齊諧記田廣田真田慶兄弟三人欲分財其夜庭前三荆便枯兄弟歎之却合樹還榮茂棣萼重輝詩常棣之華鄂不韡韡箋承華者曰鄂不當作柎柎鄂足也鄂足得華之光明則韡韡然喻弟以敬事兄兄以榮覆弟古聲不柎同柎方于反案武宗為文宗弟故云既居正以體元班固東都賦體元立制繼天而作春秋隱公元年春王正月注凡人君即位欲其體元以居正故不言一年一月也亦觀文而察變易觀乎天文以察時變仰觀星彩稍越天常左傳帥彼天常於是深軫皇情重回宸眷沈約碑皇情眷眷慮深求瘼省躬之懼洞感於幽明及物之恩畢霑於華夏戒田游則成集作殷湯祝網之意史記殷本紀湯出見野張網四面曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸釋寃滯乃大禹泣辜之慈劉向說苑禹出見罪人泣而問之罷去修營惜漢氏十家之産漢文帝紀嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宮室常恐羞之何以臺為勸課耘耔一作耕耔復周邦九嵗之儲禮記國無九年之蓄曰不足德已厚矣仁已極矣然猶避寢自責撤膳貽憂箋案舊書天文志開成二年三月文宗召司天監朱子容問天變之由子容曰彗主兵旱或破四夷古之占書也然天道𤣥逺惟陛下修政以抗之乃敕尚食今後每日御食料分為十日戊辰詔天下放繫囚撤樂減膳避正殿武宗蓋循其故事以此延休何休不至以兹備患何患能為足以髙步三王晉文苑傳論曰匪惟髙步當年故以騰華中古平窺百古鞭撻守成之主魏武帝紀陳夀評曰太祖運籌演謀鞭撻宇內秕糠中代之君莊子是其塵垢秕糠將猶陶鑄堯舜者也抑臣又聞之昔貞觀之理也太宗文皇帝吞蝗而災沴息通鑑太宗掇蝗吞之曰但當食朕無害百姓蝗果不為害泰岱之封也𤣥宗明皇帝露坐而風雨消舊書禮儀志𤣥宗開元十三年十一月幸泰山封禪登山日氣和煦至齊次日入後徑風偃人寒氣切骨𤣥宗因不入次前露立至夜半仰天稱某身有過請即降罰若萬人無福亦請某為當罪兵馬辛苦乞停風寒應時風止山氣溫暖炯戒猶存班固幽通賦乂申之以炯戒神靈未逺漢車千秋傳帝謂曰此髙廟神靈使公教我陛下永懷貽厥詩貽厥孫謀有切欽承書惟說式克欽承為其所不為至其所不至佇見地泉流醴尚書中候帝堯即位七十載醴泉出山東觀漢記中元二年醴泉出於京師飲者痼疾皆愈天酒凝甘東方朔神異經西北海外有長人日飲天酒五斗張華注云天酒甘露也孫柔之瑞應圖甘露者美露也其凝如脂其甘如飴一名膏露一名天酒盧思道賀甘露表神漿可挹流珠九户之前天酒自零凝照三階之下人知芝草之祥大戴禮記芝草日生一葉至十五日生十五葉十六日一葉落終而復始漢書制曰上古至治嘉禾興朱草生張衡東京賦豐朱草於中唐注抱朴子云朱草長三尺枝葉皆赤莖似珊瑚帝王世紀堯時朱草生於郊家識白麟之瑞見賀赦表又豈芒角足懼天官占太白者西方金之精角搖則兵起史記正義角芒角也隋五行志國皇星出而大其色黃白望之有芒角見則兵起國多變晷度可憂者哉晉書桓溫傳晷度自中霜露惟均江逌傳疏曰陛下今以晷度之失同之六沴案晷謂日景度謂周天之度臣素乏器能漢東方朔傳武帝既招英俊䄇其器能謬當任使見中庸東雍西嶽雍疑是華嶽當作嶽案華州畿內墀方守華故曰首化百城古雍縣在州西不得言東雍華嶽在州東不得言西嶽若云東華西嶽則太華在州東嶽山在州西於義頗協周禮豫州鎮曰華山雍州鎮曰嶽山鄭注云華山在華隂嶽吳嶽也漢郊祀志自華山以西名山七有華山嶽山舊書禮儀志肅宗至德二年春在鳳翔改汧陽縣吳山為西嶽杜甫詩憶昨踰隴坂髙秋視吳嶽東笑蓮花卑北知崆峒薄蓋吳山三峯霞舉疊秀雲天唐時特崇其號與太華同秩二嶽東西並峙故表舉以為言務諧聲病故不言西吳而言西嶽後人以華為太華嫌與下文之嶽重復遂改東華為東雍曽不知東西易位之為舛也雖首化於百城庾信碑百城解印日逺天髙日逺注見下表禮記天髙地下萬物散殊但心存於雙闕古詩雙闕百餘尺聽金石而慙殊舞獸書䕫曰於豫擊石拊石百獸率舞無羽翼而恨異冥鴻揚子法言鴻飛冥冥弋者何篡焉惟當䖍奉詔條頒宣德澤漢百官公卿表武帝元封五年初置部刺史掌奉詔條察州師古曰漢官典職儀云刺史班宣周行郡國省察治狀黜陟能否斷治寃獄以六條問事非條所問即不省成陛下無偏之道書無偏無黨王道蕩蕩無黨無偏王道平平畢微臣盡瘁之勤諸葛亮表臣鞠躬盡瘁死而後已所冀不置簡書詩豈不懷歸畏此簡書傳簡書戒命也疏古者無紙有事書之於簡謂之簡書免拘司敗左傳針尹遂歸復命而自拘於司敗如其禮樂非臣所能無任感恩戀闕懇悃屏營之至吳語申胥曰昔楚靈王親獨行屏營傍偟於山林之中注屏步丁切為汝南公賀彗星不見一有復正殿三字表箋會昌元年十一月丁酉朔越六日壬寅彗見舊書云凡五十六日而滅其日當為丁酉二年正月書丙申朔則彗滅於二日之夜而新書天文志云十一月壬寅有彗十二月辛卯不見訃止有五十日當為是月之二十五如前月小盡則二十六日也校舊書先六日未知孰是觀表末時及初正禮當元㑹等語意新書為得其實不然彗滅於明年之二日則正殿未復元會之禮不行亦何用揚厲其辭耶臣某言得本州進奏院狀報今月某日夜彗星不見宰臣某等奉表稱賀請御正殿復常膳者天道甚密南史劉勔傳勔曰天道密微聖心不遐詩毋金玉爾音而有遐心感極而災亦為祥誠至而妖寧勝德臣某中賀臣聞殷湯以六事責躬止七年之旱劉恕外紀湯之時大旱七年禱於桑林之野以六事自責曰政不節與民失職與宫室崇與女謁盛與苞苴行與讒夫昌與言未已而大雨案荀子呂覽說苑所言六事與此互異宋景以一言修德退三舍之星呂氏春秋宋景公有疾熒惑守心朝臣謂公曰可移於相公曰相股肱不可也曰可移於人公曰國無人何以為君可移於嵗公曰嵗不登何以畜人是時熒惑乃退三舍劉峻辨命論宋公一言法星三徙歷代以來咎徵常有苟君能克已則禍不移人左傳有雲如衆赤烏夾日以飛三日楚子使請諸周太史周太史曰具當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益遂弗禜伏惟皇帝陛下寅奉丕圖恭臨大寶易聖人之大寶曰位遵符列聖酌憲前王昨者天象之間星文稍一作稱誤異載深歸咎爰用覃恩倉箱畢復於九年詩乃求千斯倉乃求萬斯箱羅網並開其三面注見前去營繕絶蕩心之巧禮記毋或作為淫巧以蕩上心申寃結除滅耳之俘漢王莽傳不暇省獄訟寃結易何校滅耳凶而乂正殿不居大庖盡減詩大庖不盈精誠昭達班彪王命論精誠通於神明懇惻敷聞後漢蔡雍傳上封事曰前後制書推心懇惻芒焰遽銷晷度如舊況蕞爾戎羯沈約碑文加以戎羯窺窬正犯疆埸案左傳疆埸之事從易音亦後人訛為疆場從昜音長則義取戰場之場矣易古陽字箋舊書會昌元年八月回鶻烏介可汗寇天德軍載思星見之徵恐是滅亡之兆漢天文志妖星不出三年其下有軍及失地若國君喪太平御覽劉向洪範傳曰彗者去穢布新者也此天所以罰無道而建有德也鄭𤣥曰彗星主掃除伏惟稍寬聖慮以擁皇休遵九廟之降祥新書文宗紀太和元年賜九廟陪位者子孫二階書作善降之百祥箋王制天子七廟三昭三穆與太祖之廟而七鄭康成注云此周制七者太祖及文王武王二祧與親廟四也漢書韋𤣥成奏議曰周所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七鄭說本此然則文武二祧固在七廟之數也劉歆乃與為天子三昭三穆與太祖而七宗不在數中是即九廟之說所肇端矣其後王莽篡漢歆為佐命果造起九廟四昭四穆與黃帝太初祖廟而為七誕妄不經莫斯為甚其義實自歆發之光武中興悉復舊制由東漢以迄於隋卒無有立九廟者開元十年始詔宣帝復祔於正室諡獻祖并諡光皇帝為懿祖又以中宗還祔太廟於是太廟為九室寶應二年祧獻懿祔𤣥宗肅宗自是之後常為九室矣九廟之稱開元以前無之也副兆人之欽屬臣乂聞皇王之事天也雖至理之時不遺於憂畏真誥憂生則有畏雖至和之氣不忘於將迎莊子無有所將無有所迎是故神農焦勞軒帝憔悴堯既癯瘠舜集作禹亦胼胝列子黃帝即位十有五年燋然肌色皯黣淮南子神農憔悴堯瘦臞舜黴黑禹胼胝此四主側身於昔時說苑武丁恐駭側身修行陛下用心於今日千載符契陸倕新漏刻銘分似符契萬方懷柔詩懷柔百神臣常忝內朝鄭氏周禮注內朝朝之在路門者或謂之燕朝三禮義宗周禮天子諸侯皆有三朝一曰外朝二曰中朝三曰內朝其中朝之名或內或外若據外朝而言謂之內朝故鄭注文王世子諸侯外朝一內朝二是也三朝之最外為外朝者是决罪聽訟之朝也中朝者人君旦夕視政見卿大夫之朝也內朝者路寢也人君視政退而居於此待諸侯之復逆也今居近甸任昉為蕭侍中表藩維近甸拱辰不及空瞻北極之尊見論語就日無因大戴禮孔子曰放勳其仁如天其智如神就之如日望之如雲忽覺長安之逺初學記劉劭幼童傳云晉明帝諱紹元帝太子也帝問長安何如日逺答曰不聞人從日邊來只聞人從長安來明日集羣臣宴會復以此問又以為日近元帝動容問何故異昨日之言答曰舉頭見日不見長安惟知忭舞莫可奮飛詩心之憂矣不能奮飛況時及初正禮當元會玉燭寶典正月為端月其一日為元日曹植元㑹詩初嵗元祚吉日惟良乃為嘉㑹宴此髙堂華夷畢至玉帛皆陳左傳禹合諸侯於塗山執玉帛者萬國小國行人外藩下士英華作土皆得入趨鳳闕漢書建章宮其東則鳳闕髙二十餘丈西都賦設璧門之鳳闕上觚稜而棲金爵注三輔故事曰建章宫闕上有銅鳳皇金爵即銅鳳也仰望獸樽晉禮志江左元㑹設白獸樽於殿庭樽蓋上施白獸有能獻直言者則發此樽飲酒樽乃杜舉之遺式白獸蓋後代所為宋禮志白虎樽欲令言者猛如虎無所忌憚也案唐諱虎故以虎為獸白虎即騶虞也詩傳云騶虞義獸也白虎黑文不食生物有至信之德則應之司馬相如封禪頌般般之獸樂我君囿白質黑章其儀可喜師古曰謂騶虞也樽上所飾即此故唐李君房白獸樽賦云樽則雲飛而山峙獸乃白質而黑章也臣獨限關河史記蘇秦說秦惠王曰被山帶渭東有關河坐縈符竹漢文帝紀初與郡守為銅虎符竹使符案後漢杜詩疏曰舊制發兵皆以虎竹而晉書陸機傳云入侍帷幄出剖符竹易虎為符唐修史避廟諱也戀既深而詞懇慶已極而涕零無任感恩賀聖鬱戀屏營之至為滎陽公賀老人星見表原注宣宗元箋舊書宣宗紀大中年二月以給事中鄭亞為桂州刺史御史中丞桂管防禦觀察等使文苑傳鄭亞觀察桂州請商隱為觀察判官檢校水部員外郎百官志凡景星慶雲為十瑞其名物六十有四大瑞則百官詣闕奉賀餘瑞嵗終員外郎以聞有司告廟臣某言臣得本道進奏院狀報司天監李景亮奏八月六日寅時老人星見於南極其色黃明潤大者史記天官書直狼北地有大星曰南極老人老人見治安不見兵起常以秋分時候之南郊晉天文志老人星見則治平主夀昌唐㑹要開元間敕有司置夀星壇以千秋節日修祠祭老人星著之常式玉海開元七年八月老人星見色黃又二十四年八月庚戌老人星見太史奏孫氏瑞應園云王者承天則老人星見臨其國黃帝占云老人星一名夀星色黃明大則主夀昌天下多賢士陛下以千秋節日祀於星壇而祭期將臨美應先至請付史官聖惟合德神實效祥必垂有爛之文詩明星有爛以表無疆之祚書無疆惟休臣某中賀臣聞𤣥象示人見前表昊穹凝命易君子以正位凝命曜為經而宿為緯英華作紀此傳寫之誤當作宿為經而曜為緯榖梁傳列星為恆星亦曰經星禮記宿離不貸無失經紀注二十八宿為經七曜為紀案紀為緯西京賦五緯相汁以旅於東井薛綜注云五緯五星也則有常名斗挹酒而牛服箱詩維北有斗不可以挹酒漿又晥彼牽牛不以服箱或標虛號未若候時而出有道則彰居五福之先書五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命在三辰之列左傳三辰旗旗注三辰日月星也伏惟皇帝陛下昭明老契游泳莊寰晉阮籍等傳論曰馳騁莊門排登李室二語本此式是中秋呈兹上瑞況見於午位晉郭璞傳嵗涉午位金家所忌又屬寅時仰考𤣥符北史崔宏傳斯乃利見之𤣥符乃有深意自南曜彩將𢎞解愠之風家語舜彈五絃之琴造南風之詩曰南風之薰兮可以解我民之愠兮南風之時兮可以阜吾民之財兮近曉流光欲助無私之日禮記天無私覆地無私載日月無私照皇心載裕謝靈運詩皇心美陽澤靈鑒孔昭晉袁宏傳贊曰靈鑒洞照況居率土之濱語見詩皆慶後天之夀莊子後天地終而不為老藝文類聚韓終采藥詩曰暗河之桂實大如棗得而食之後天而老臣誤䝉重寄實逺清光漢朝錯傳對䇿曰然後能望陛下清光送𤣥燕於梁間禮記仲秋之月𤣥鳥歸注𤣥鳥燕也謂去蟄也傷時自切望集作數白榆於天上古樂府天上何所有歷歷種白榆案初學記引此句以白榆為星厥路無由賀聖戀恩無任蹈舞屏營之至為成魏州賀瑞雪慶雲日抱戴表新書地理志魏州大都督府領縣十四貴鄉元成魏館陶冠氏莘朝城昌樂臨河洹水成安內黃宗城永濟成魏州未詳臣某言臣聞𤣥德上升書𤣥德升聞三靈為之動色漢揚雄傳方將上獵三靈之流如淳曰三靈日月星垂象之應也聖功下濟易天道下濟而光明萬類所以傾誠臣州去秋之間時雨不足自陽風應律春秋考異郵冬至十一月陽之氣也陽立於五極於九五九四十五日變風子月經年庾信詩子月泉心動今月十二日晚降雪越至十四旦開霽絮飛千里晉書謝安因雪驟降欣然曰白雪紛紛何所似兄子胡兒曰散鹽空中差可擬兄女道藴曰未若栁絮因風起楚辭招魂曰曾氷峨峨飛雪千里花翻六出韓詩外傳凡草木花皆五出雪花飛六出六出者隂極之數糅初梅而委色英華作苞初梅猶早梅也梁簡文帝賦梅花特早偏能識春封宿麥而垂津漢食貨志董仲舒說上日幸詔大司農使閭中民益種宿麥注宿麥謂其苗經冬後漢明帝紀詔曰自春已來時雨不降宿麥傷旱其日晡時宋玉神女賦晡夕之後注晡日落時也淮南子日至于悲谷是謂晡時西南有慶雲見為樓為閣陸機浮雲賦若層臺髙觀重樓疊閣圖閶闔之九重楚辭君之門以九重張衡西京賦表嶢關於閶闔注閶闔天門也非錦非繡成公綏雲賦或繡文錦章依微要渺狀衣裳之五色書以五采彰施于五色作服其時又有日抱戴日晚澄廓天景淑清拖黃氣而重圍施紅光而四溢臣與司馬樊𤣥則并僚屬吏等三十餘人得所部貴鄉冠氏等縣申稱雪厚一尺以下并覩慶雲抱戴等瑞臣謹案詩云上天同雲雨雪氛氛毛萇云豐年之冬必有積雪英華多若烟二字汜勝之書云雪者五榖之精漢藝文志農家汜勝之十八篇成帝時為議郎師古曰劉向别録云使教田三輔有好田者師之徙為御史汜音凡又音敷劒反又案史記云慶雲一名卿雲若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲喜氣也瑞應圖曰景雲者太平之應也一曰慶雲非氣非烟五色氤氲謂之景雲援神契云天子孝則景雲出游又案援神契云王者德至於天則日抱戴在上曰戴在旁曰抱又云黃氣抱日輔臣納忠漢書曰宣重光李奇云太平之代日抱重光伏惟陛下受天寶命沖用情深豐食之要鑒寢憂勞雪為五穀之精麥為六田之首太平御覽汜勝之書曰凡田六道種麥為首由是天降瑞雪其意若曰太平其有年乎雲者運氣立名布恩成義陛下仁霈草木惠及蟲魚揚祖宗之烈光垂天地之正色由是天降雲瑞其意如一作若曰天子其大孝乎日者衆陽之宗人君之表劉向洪範傳日者羣陽之宗也後漢天文志日者太陽之精人君之象由是天降日瑞其意若曰天下其大明乎魏州大名一作明非之慶基左傳賜畢萬魏卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣光當作先封之舊國鄭𤣥詩譜魏國周以封同姓其地虞舜夏禹所都之域疏案魏世家及左氏傳云姬姓國也嘉祥備致靈貺綢繆見為滎陽公表豈徙然哉斯有由矣臣叨陪漢守肅奉堯親逢日月之貞明易日月之道貞明者也嘉烟雲之爛熳尚書大傳舜時卿雲見于時百工和歌舜歌曰卿雲爛兮糾縵縵兮手舞足蹈地雖限于外臺按牒披圖漢禮樂志宫童效異披圖按牒心已馳于雙闕不任感悅之至為栁州鄭郎中謝上表舊書地理志栁州隋始安郡之馬平縣武德四年平蕭銑置南昆州貞觀八年改為柳州以州界栁嶺為名屬嶺南道領縣五馬平龍城象洛曹洛容案栁州今屬廣西布政司仍治馬平縣凡除官到任謂之上上日修表謝恩謂之謝上韓文潮州刺史謝上表是也上時掌切臣某言臣伏奉某月日制書授臣某官者即以今月日到任上訖臣某中謝臣緒承舊族師事通儒漢貢禹傳通儒或非之萬里成功雖無壯志後漢班超傳超投筆而嘆左右皆笑之超曰小子安知壯士志哉行詣相者曰祭酒布衣諸生耳而當封侯萬里之外後果立功西域封定逺侯九夷不陋庶慕前蹤見論語後漢東夷傳夷有九種曰畎夷于夷方夷黃夷白夷赤夷𤣥夷風夷陽夷故孔子欲居九夷也二紀蠻陬左思魏都賦蠻州夷落譯道而通者鳥獸之氓也三提郡印見前表唯貞苦節易苦節不可貞以奉休辰牙管一雙未嘗關慮南史范岫傳在晉陵惟作牙管一雙猶以為費竹書兼兩何敢經懷後漢吳祐傳父恢為南海太守欲殺青簡以寫經書祐諫曰此書若成則載之兼兩嫌疑之間誠先賢所慎也渭水之隂桑欽水經渭水出隴西首陽縣渭谷亭南鳥鼠山敝廬斯託左傳張躍使謂太叔曰小人糞除先人之敝廬每還初服屈原離騷進不入以離尤兮退將復修吾初服常慊上農今者又即殊方漢西域傳贊曰殊方異物四面而至復臨雜俗漢地理志土廣俗雜固䝉聲教書聲教訖于四海終逺文明謹當宣舉詔書撫安縣道漢文帝紀有司請令縣道師古曰或縣或道皆用此制有蠻夷曰道媒官學舍吳薛綜傳錫光為交址任延為九真太守為設媒官始知聘娶建立學校導之經義後漢鮑永傳起黌舍注黌學也畢納於人倫畜蠱帶牛顧野工輿地志江南數郡有畜蠱者主人行之以殺人行飲食中人不覺也其家絶滅者則飛遊妄走中之則斃漢書龔遂為勃海太守民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢楊慎丹鉛録南中畜蠱之家蠱昏夜飛出飲水光如曳彗鮑昭苦熱行所謂吹蠱痛行暉是也案日南蠻方以五月五日聚百種蠱大者至蛇小者至蝨合置皿缶中餓使相啖其獨存者為蠱以其矢因食入人腹人輒死盡移於地利至於因遐弄法漢杜延年傳霍光以廷尉少府弄法輕重皆論棄市挾逺生情晉庾純傳賤者生情縱弄嚴科晉王濬傳嚴其科條必貽隂責山兼象郡江帶龍城隋地理志始安郡統縣十五有象縣龍城縣明一統志象山在象州西五里以形似名栁江在府城南門外一名潯水源出懷逺縣流經象州歷潯藤至廣州界入海栁宗元詩柳州栁刺史種柳柳江邊是也撫已局天敢忘𤣥造庾信表𤣥造竟微於滴助舉頭見日何處皇居顔延之詩皇居體環極憑宵夢以銜誠徐陵移文宵夢之言無欺幽壤託歸飛而結懇詩辨彼鸒斯歸飛提提陸機詩羡爾歸飛翼無任瞻天戀闕之至為安平公謝除兖海觀察使表箋舊書文宗紀太和八年三月丙子以右丞李固言為華州刺史代崔戎以戎為兖海觀察使地理志至德之後中原用兵刺史皆治軍戎遂有防禦團練制置之名要衝大郡皆有節度之類冦盜稍息則易以觀察之號治兖州管兖海沂密四州崔戎傳戎字可大髙伯祖𤣥暐神龍初有大功封博陵郡王戎舉兩經登科授太子校書調判入等授藍田主簿為藩鎮名公交辟入為殿中侍御史纍拜吏部郎中遷諫議大夫尋為劍南東西兩川宣慰使還拜給事中駮奏為當時所稱改華州刺史遷兖海沂密都團練觀察等使將行州人戀惜遮道至有解鞾斷鐙者理兖一年太和八年五月卒新書世系表戎出博陵安平房後漢長岑長崔駰少子實之後兖海觀察使封安平縣公案元暉博陵安平人唐制凡封爵皆以其郡縣名被之故𤣥暉封博陵郡王戎封安平縣公唐人所稱大率以郡望然亦有從封爵者安平公濮陽公之類是也臣某言今月某日中使王士岌至奉宣恩㫖改授臣某官并賜臣前件告身一通者寵命天臨恩光春煦兢惶無措抃蹈失容臣某中謝臣幸逢昭代本自諸生文以飾身左傳言身之文也學實為已寧韞玉而待賈見論語竊運甕以私勞甕當作甓晉陶侃傳侃在廣州朝輒運百甓於齊外夕運百甓於齊內曰吾方致力中原過爾優遊恐不堪事春闈英華作圍再中於明經新書選舉志開元二十四年考功員外郎李昂為舉人詆訶帝以郎官權輕遂移貢舉於禮部以侍郎主之禮部進士自此始明經之别有五經三經二經學究一經三禮三傳禮記春秋左氏傳為大經詩周禮儀禮為中經易尚書春秋公榖傳為小經先帖文然後口試經問大義十條答時務策三道亦為四等天官一升於判第選舉志文選吏部主之凡擇人之法有四一曰身二曰言三曰書四曰判四事可取則先德行行均以才才均以勞五品以上不試上名中書門下六品以下始集而試階級甚薄後漢邊韶傳階級名位亦宜超然際會則多後漢陳蕃王允傳論曰及遭際會協䇿竇武自謂萬世一時也藝閣讎書魚豢魏略藝香辟紙魚故藏書臺曰藝臺左思魏都賦讎校篆籀太平御覽劉向别傳曰讎校者一人持本一人讀之若讎家相對故曰仇也藍田集作山作吏新書地理志京兆府藍田為畿縣嵇康與山臣源書一行作吏此事便廢中間因依知已阮籍詠懷詩寒鳥相因依南史王僧達傳不能因依左右契闊從軍詩死生契闊傳契闊勤苦也其後超屬憲司南史蕭惠開傳詔曰今以蕭惠開為憲司冀當稱職驟登郎署漢武故事武帝輦過郎署埋輪而出髙懸八使之威後漢張綱傳漢安元年遣八使徇行風俗而綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸起草以居逺謝三臺之妙胡廣漢官儀尚書郎主作文書起草晝夜更直初學記謝靈運晉書曰漢官尚書為中臺御史為憲臺謁者為外臺是為三臺晉衛瓘傳瓘為尚書令與尚書郎索靖俱善草書時人號為一臺二妙每含香而自嘆漢官儀尚書郎懷香握蘭含雞舌奏事常襆被而待行一作命非晉書魏舒為尚書郎或有非其人論者欲沙汰之舒曰我即其人襆被徑出伏惟皇帝陛下鈞陶庶彚漢董仲舒傳猶泥之在鈞惟甄者之所為又陶冶而成之亭毒萬方老子亭之毒之蓋之覆之王弼曰亭謂品其形毒謂成其質憂位同堯漢董仲舒傳堯受命以天下為憂而未以位為樂也好諫若禹鬻子禹治天下以五聲聽門懸鼓鐘鐸磬而置鞀於􅀢簴曰教寡人以道者擊鼓教寡人以義者擊鐘教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄訟者揮鞀此之謂五聲東掖垣內封章何有於日聞新書百官志門下省給事中四人凡百官奏鈔侍中既審則駮正違失詔敕有不便者塗竄而奏還謂之塗歸蓋時以中書為西臺門下為東臺亦稱西掖東掖李頎寄房給事詩云長安城連東掖垣鳳凰池對青瑣門是也漢趙充國傳婁奏封章青瑣門前列位徒參於夕拜漢元后傳赤墀青瑣注孟康曰以青畫户邊鏤中天子制也師古曰青瑣者刻為連瑣文而以青塗之初學記衛宏漢舊儀曰黃門郎屬黃門令日暮對青瑣闈拜名曰夕郎擺波濤而鯤鱗才變莊子北溟有魚其名曰鯤化而為鳥其名為鵬怒而飛其翼若垂天之雲鵬之徙於南冥也水擊三千里摶扶搖而上者九萬里望烟霄而鸞翮初髙顔延之五君詠鸞翮有時鍛誓將竭誠非敢養望晉陶侃傳常語人曰何有亂頭養望自謂宏達耶然虛受難處忝據非安忽擁隼旟周禮司常鳥隼為旟竟辭龍闕後漢百官志注洛陽宫門名為蒼龍闕門猶賴雲日未逺關城不遙並見上文以箋舊書文宗紀太和七年閏七月戊戌給事中崔戎為華州刺史䖍奉國章南史梁武帝諸子傳元正六佾事為國章粗免官謗左傳敢辱髙位以速官謗豈意便升亞相之重集作班秩漢朱雲傳御史大夫宰相之副案白帖謂之亞相復委大藩之廉問漢髙祖紀廉問有不如吾詔者以重論之魚箋帝語張華博物志漢桓帝時桂陽人蔡倫始搗故魚網造紙案魚箋未詳疑即魚網紙也劉孝威謝賚宫紙啓云鄴下鳳銜漢朝魚網象軸神工象軸謂以象牙為卷軸隋書牛宏上表云劉裕平姚泓收其圖籍四千卷皆赤軸青紙文字古拙是古者書每卷為一軸也此則言告身之飾耳拜受而若捧千鈞伏讀而如聽九奏史記趙世家簡子夢遊於鈞天廣樂九奏萬舞誠雖深於負荷左傳其父析薪其子弗克負荷戀實切於違離盧諶贈劉琨詩序慰其違離之意況曲阜遺封禮記成王以周公為有勳勞於天下是以封周公於曲阜地方五百里革車千乘導河舊壤書兖州九河既道列九州之數書濟河惟兖州帶五嶽之雄謂泰山初學記五經通義曰泰山一曰岱宗宗長也言為羣嶽之長古為詩書俎豆之鄉史記孔子世家常陳俎豆設禮容又周室微而禮樂廢詩書缺孔子序書傳上紀唐虞之際下至秦繆編次其事古者詩三千餘篇及至孔子去其重取三百五篇今兼魚鹽兵革之地齊世家設輕重魚鹽之利訓整合資於武幹晉書諸葛長民傳有文武幹用桓沖傳最淹識有武幹撫循宜屬於柔良後漢魯恭傳詔書進柔良退貪殘豈伊孱微堪此委寄謹當氷霜勵志金石貫誠韓詩外傳熊渠子見其誠心金石為之開而況于人乎駑馬奮十駕之勤荀子驥一日而千里駑馬十駕則亦及之矣鉛刀淬一割之用韓詩外傳陳饒謂宋燕曰鉛刀畜之而干將用之班固答賔戲搦朽磨鈍鉛刀皆能一斷後漢班超傳上疏請兵曰況臣奉大漢之威而無鉛刀一割之用乎即以今月二日時太和七年雪泣西拜庾信詩雪泣悲去魯星馳東下晉陶侃傳二征奔走九州星馳帝城思入雖有類于陳咸漢陳咸傳起家復為南陽太守時王音輔政信用陳湯咸數豫湯書曰即䝉子公力得入帝城死不恨關外恥居安敢同於楊僕漢書元鼎三年徙函谷關於新安注應邵曰時樓船將軍楊僕數有大功恥為關外民上書乞徙關以家財給其用度武帝意亦好廣闊於是徙關於新安去𢎞農三百里無任瞻天戀闕之志謹附中使某奉表陳謝以聞為安平公兖州謝上表臣某言臣自承明詔移鎮東藩望闕而血涕以辭戒途而星奔不息劉琨詩匍匐星奔即以今月五日到任上訖當時集軍州官吏等宣布皇風魏志髙堂隆疏唐虞大禹之所以垂皇風闡揚𤣥造歡聲雷動嘉集作喜是氣雲髙臣某中謝臣本由儒業南史王承傳惟承獨好儒業獲厠朝榮曹植表使名挂史筆事列朝榮粵自烏臺漢朱博傳御史府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏職官分紀漢成帝時御史臺有烏集故謂之烏臺至於青瑣見前表纍更近地皆奉休期徐陵陳公九錫詔昔在休期早隆朝寄用盡心以書紳長憂福過書紳見論語庾亮表小人祿薄福過災生取知足而銘座敢傲時來老子知足不辱知止不殆後漢書崔瑗字子玉作座右銘漢蒯通傳時乎時不再來旋屬皇帝陛下垂意關城推心甸服俾之防遏兼使緝綏橫被天波未移星琯豈期非次忽致殊遷徐陵書修好徵兵彌留星琯案星謂大星琯謂律琯未移星琯言時未一周也崔戎以太和七年閏七月出守華州八年三月即遷兖海故云察俗雄藩舊書嚴綬傳前後統臨三鎮皆號雄藩分榮大憲地濵河濟周禮河東曰兖州其川河洓洓與濟同山奄龜䝉詩魯頌曰奄有龜䝉遂荒大東本孔里周封史記孔子世家弟子及魯人往從冡而家者百有餘室因命曰孔里水經注從征記曰洙泗二水交於魯城東北十七里闕里背洙泗牆南北一百二十步東西六十步四門各有石閫史記封周公旦於少昊之虛曲阜正義括地志云兖州曲阜縣外城即魯公伯禽所作也有堯祠舜澤漢地理志濟隂郡成陽縣有堯冡靈臺雷澤在西北水經注雷澤在大成陽縣故城西北十餘里即舜所漁也城西二里有堯陵陵南一里有堯母慶都陵皆立廟四周列水潭而不流前並列數碑案雷澤即禹貢之雷夏在今山東兖州府曹州東北六十里北接東昌府濮州界明一統志兖州府城東南七里有堯祠李白詩云角巾微服堯祠南即此南史羊侃傳云常於兖州堯廟踏壁直上至五尋橫行得七跡九州之名數甚古見前表三代之禮樂舊傳退省何人合安兹地撫躬而浹集作沾背汗下漢王陵傳勃汗出浹背愧不能對仰恩而溢眥一作面淚流說文眥目崖也列士傳朱亥眥裂血濺況所部驍雄虞溥江表傳許貢表曰孫䇿驍雄與項籍相似素兼節制漢刑法志齊桓晉文之兵可謂入其域而有節制矣為於當代便屬文臣畫武聚螢武讀曰虎後漢馬援傳畫虎不成反類狗晉車𦙍傳𦙍家貧不能得油囊螢照書昔惟久事筆硯後漢書班超為官傭書久勞苦投筆嘆曰大丈夫當立功異域安能久事筆硯乎佩鞬帶鶡帶當作戴左傳左執鞭弭右屬櫜鞬注櫜以受箭鞬以受弓漢官儀虎賁冠插鶡尾今寧能執干戈禮記魯人欲勿殤童汪踦問於仲尼仲尼曰能執干戈以衛社稷欲勿殤也不亦可乎幸臣前在華州日䖍奉詔條克宣戎律晉陸曄等傳論曰殷浩出總戎律檢下而羊無九牧魏志州牧縣宰割剝自私人不聊生而更員外置官古謂十羊九牧馭黠而犬用左牽禮記效犬者左牽之用令去任之時大有遮留之請魏略顔斐遷平原太守吏民遮道車不得行稽十日方得出北史唐永傳永為南幽州刺史夷人送故者莫不垂淚當路遮留隨數日始得出境盡三屬縣至萬餘人不放即途皆來卧轍後漢侯霸傳為臨淮太守被徵百姓攀轅卧轍不許去竟稽朝發江表傳泛舟舉帆朝發夕至遂致宵奔後漢孟嘗傳嘗為合浦太守被徵當還吏民攀車請之嘗既不得進乃載鄉民船夜遁去晉書鄧攸為吳郡太守稱疾去職百姓數千人牽留攸船不得進攸乃止停中夜發去戎箋新書崔戎傳時詔使尚在民泣詣使請白天子丐還使許諾戎夜單騎亡去民追不及乃止請於茲時亦因前政冀漸令蘇息後漢朱浮傳疏曰保宥生人使得蘇息長使謐寧晉周玘傳期年之間境內寧謐然後逺訪云亭漢郊祀志無懷氏封泰山禪云云黃帝封泰山禪亭亭注服䖍曰云云在梁父東山名也晉灼曰云云山在䝉隂縣故城東北地理志巨平有亭亭山案云云在今山東濟南府泰安州東南一百二十里亭亭在州南五十里皆泰山之攴峯也髙尋日觀見為京兆公表備萬乘登封之所漢武帝紀上登封泰山降坐明堂設諸侯朝宿之儀公羊傳許田者何魯朝宿之邑也諸侯時朝乎天子天子之郊朝諸侯皆有朝宿之邑焉盛禮獲窺微願斯畢過此以往不知所圖無任戴恩隕越之至謹差某官某奉表陳謝以聞為濮陽公陳許謝上表箋案舊書王栖曜傳栖曜濮州濮陽人纍官鄜坊丹延節度觀察使檢校禮部尚書兼御史大夫子茂元幼有勇略從父征伐知名元和中為右神䇿將軍太和中檢校工部尚書廣州刺史嶺南節度使招懷蠻落頗立政能南中多異貨茂元積聚家財巨萬計李訓之敗中官利其財掎托其事言茂元因王涯鄭注見用茂元懼罄家財以賂兩軍於是授忠武軍節度陳許觀察使故有是表也新書方鎮表貞元三年置陳許節度使治許州十年賜號忠武軍地理志許州領縣九長社長葛陽翟許昌鄢陵扶溝臨潁舞陽郾城陳州領縣六宛邱太康項城溵水南頓西華並屬河南道王栖曜傳茂元家積財交煽權貴鄭注用事遷涇原節度使注敗悉出家資餉兩軍得不誅封濮陽郡侯召為將作監領陳許節度使案茂元封濮陽郡侯故稱濮陽公此則以其爵也臣某言臣伏奉去月八日制書授臣前件官臣即以某月日到任上訖當時集軍州官吏僧道耆老等揄揚王集作𤣥化宣布睿慈連營咸鼓於巽風魏志劉備與孫權交戰樹柵連營七百餘里闔境均霑於兌澤臣某中謝臣材謝漢飛漢李廣傳胸奴號曰漢飛將軍義慙燕使集作客戰國䇿望諸君報燕王書曰臣乃口受令具符節南使臣於趙顧反命取兵隨而攻齊獻書求試新書茂元少好學德宗時上書自薦擢試校書郎改太子贊善大夫學劍邀勳漢項籍傳學書不成去學劍禦箋新書李元膺留守東都署茂元防判官大舸千艘杜篤論都賦大船萬艘轉運相過早竊樓船之任漢書元鼎五年遣樓船將軍楊僕出豫章下湞水勝兵萬數勝音升漢伍被傳勝兵可得二十萬晚兼車騎之名漢官儀漢興置車騎將軍金印紫綬位次二千石杜氏通典漢文帝元年始用薄昭為車騎將軍雖任在啓行詩元戎十乘以先啓行而時當柔逺書柔逺能邇珠崕銅柱漢書元鼎六年定越地為珠崖郡注應劭曰郡在大海中崕岸之邊出真珠故曰珠崕晉地理志日南郡象林縣今有銅柱漢立此為界貢金供稅新書南蠻傳環王本林邑其南大浦有五銅柱山形若倚蓋西重巗東涯海漢馬援所植也案漢珠崖儋耳二郡今為廣東瓊州府地祇務廉平史記倉公傳緹縈上書曰妾父為吏齊中稱其廉平麻壘艾亭初學記引秦州記曰枹罕城西有麻壘中可容萬衆漢地理志天水郡䝠道縣騎都尉治密艾亭魏地形志梁興郡梁興縣有艾亭丘莫能恢復東都賦恢復疆宇旋屬皇帝陛下荆枝協慶棣萼傳輝謂武宗茂元為陳許節度使蓋在㑹昌之初臣得先巾墨車周禮巾車職曰大夫乘墨車入拜丹陛隋薛道衡傳髙祖頌曰驅馳丹陛蘭臺假號漢官儀御史大夫之丞兼典蘭臺祕書棘署參榮周禮朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉奉漢后之園陵後漢光武紀詔修復西京園陵注園謂塋域陵謂山墳通典將作監掌修作宗廟路寢宫室陵園木土之功獲申送往掌周王之廩庾周禮廩人掌九榖之數以待國之匪頒賙賜稍食通典司農卿掌邦國倉儲之事案茂元遺表云伏思任司農大卿之日授忠武統帥之時紫殿承恩彤庭入對是由司農卿遷陳許節度史略之耳方切事居左傳送往事居耦俱無猜貞也案往謂文宗居謂武宗文宗晏駕茂元蓋嘗以將作監佐山林之役故曰奉漢后之園陵武宗即位除司農卿故曰掌周王之廩庾不謂遽董戎旃謝朓箋契闊戎旃從容宴語還持武節漢書元封元年詔曰躬秉武節通典晉制都督使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同唐分天下州郡制為諸道每道置使治於所部其邊方有寇戎之地則加以旌節謂之節度使蓋古之持節都督自至德以來天下多難諸道皆聚兵增節度使為二十餘道賜國既髙於七命周禮掌命職曰侯伯七命其國家宫室車旗衣服禮儀皆以七為節承家又慶於重侯易大君有命開國承家漢書許史三王丁傅之家皆重侯纍將窮極富貴維彼璧田春秋桓公元年三月鄭伯以璧假許田實聯鼎邑左傳武王克商遷九鼎於洛邑古之近甸今也雄藩想像汝南星聚而先賢未逺劉敬叔異苑汝南陳仲弓從諸子姪造潁川荀季和父子於時德星為之聚太史奏五百里內有賢人聚經過潁上水濁而强族皆除漢灌夫傳夫字仲儒潁隂人也宗族賔客為權利橫潁川潁川兒歌之曰潁水清灌氏寧潁水濁灌氏族況在昔年常鄰多壘禮記四郊多壘此卿大夫之辱也載瞻軍額舊書敬宗紀特置武昌軍額深見士心貴忠孝之兩全則忠可移孝孝經君子之事親孝故忠可移於君正文武之二道則武可輔文將謀將領之能南史王融傳奏曰近塞外微臣苦求將領必重英豪之選晉石謨傳謨曰若非上哲必由英豪豈虞拔擢揚雄劇秦美新數䝉渥惠拔擢倫比乃出孱微謹當阜俗而必致人和貞師而不為兒戲易師貞丈人吉漢書周亞夫軍細栁文帝勞軍至其營曰嗟乎此真將軍矣向者霸上棘門如兒戲耳使流庸自占漢昭帝紀詔曰比嵗不登民匱於食流庸未盡還師古曰流庸謂去其本鄉而行為人庸作驍悍知方吳陸遜傳雖云師老猶有驍悍任棠水薤之規臣當可復後漢龎參傳參為漢陽太守郡人任棠者隱居教授參到先候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒立於户下參良久曰水者欲吾清也拔大本薤者欲吾擊强宗也抱兒當户欲吾開門恤孤也黃霸米鹽之政臣亦不遺漢循吏傳黃霸為潁川太守米鹽靡密治為天下第一徵守京兆尹秩二千石粗勤報效之資用贖貪叨集作叨之責漢王莽傳馳傳天下考覆貪叨奉違軒鏡軒轅內傳帝㑹王母鑄鏡十二隨日用之宣和博古圖昔黃帝液金作神物為鑑凡十有五去古既逺不能盡考後世有得其一者其制度以四靈位四方以八卦定八極十二辰環其外二十四氣布其中故與日月合明鬼神通意幾落堯蓂帝王世紀堯時有異草夾階而生每一日生一葉至十五日生十五葉至十六日一葉落至三十日落盡若小月即一莢厭而不落謂之蓂莢比園葵以自傾晝惟向日文選有陸機園葵詩說文黃葵嘗傾葉向日不令照其根羡海槎之不繫秋則經天張華博物志舊說天河與海通近有居海者年年八月有浮槎來甚大往返不失期此人乃多賫糧乘槎去忽忽不覺晝夜奄至一處望室中見一女方織一丈夫牽牛渚處飲之人問為何處答曰君可詣蜀嚴君平此人還問君平君平曰某年某月有客星犯牽牛即此人到天河也感激而淚血沾衣兢憂而汗雨浹集作洽背並見前無任感恩戀闕兢惕屏營之至為濮陽公陳情表箋此王茂元為涇原節度求代表也案舊書文宗紀太和九年李訓鄭注用事是嵗冬十月癸未以前廣州節度使王茂元為涇原節度使踰月而甘露之變作中人掎擴之事當在此際而表云一去闕庭五罹寒暑蓋中人得其重賂故能久帥涇原其陳情當在開成四年之秋冬去文宗之升遐無幾矣臣某言臣聞事君以忠者所宜效死食君之祿者亦戒妨賢說苑虞丘子謂楚莊王曰臣為令尹處士不升妨羣賢路苟非內慊私誠外憂官謗則安肯固辭武節並見前强委信一作侯誤圭周禮侯執信圭拒七命賜國之榮周禮大宗伯以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯捨萬里封侯之䇿見為栁州表必知不可安敢無言臣某中謝臣因緣代業盧諶詩序因緣運會得䝉接事孔叢子仲尼大聖自兹以降世業不替也遭逢集作遇聖時竊常有志四方左傳姜氏謂公子曰子有四方之志不掃一室後漢書陳蕃曰大丈夫處世當掃除天下安事一室乎奉隨武之家事無愧陳辭左傳屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧纂鄧傅之門風不傷清議後漢鄧禹傳禹有子十三人各使守一藝修整閨門教養子孫皆可以為後世法顯宗即位拜為太傅晉山簡𫝊郭泰許劭之倫明清議於草野屬者每憂不試深恥因媒說苑孟嘗君曰縷因針而入不因針而急嫁女因媒而成不因媒而親自薦之書朝投象魏殊常之澤暮降藝香晉裟頠傳臣亦不敢聞殊常之詔餘並見前其後契闊星霜羇離戎旅從軍王粲徒感所知王粲從軍詩從軍有苦樂但問所從誰所從神且武焉得久勞師草檄陳琳亦常交辟典略陳琳字孔璋草檄文成以呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我疾魏志琳被太祖辟為丞相掾屬呂元膺東周保釐之日書王以成周之衆命畢公保釐東郊代箋舊書吕元膺字景文鄆州東平人元和中權德輿為東都留守李師古天平畔換之時漢書敘傳項氏畔換黜我巴蜀注强恣貌箋師古當作師道舊書李正已傳師道師古異母弟師古死其奴不發喪濳遣使迎師道於密而立之元和元年十月加檢校工部尚書充平盧軍及淄青節度副大使知節度事自正巳至師道竊有鄆曹等十二州六十年矣新書方鎮表元和十五年賜鄆曹濮節度使號天平軍濳入其徒盈於留邸漢季布傳至留邸臣此時尚持白簡晉書傅𤣥每有奏劾或值日暮捧白簡整簪帶坐而待旦猶著青袍古詩青抱似春草案遺表云藍衫不脫竹簡仍持與此同意藍衫即青袍杜氏通典貞觀四年令八品九品以上服青時茂元為元膺防禦判官判官例以御史充故青袍義山詩所為青袍御史是也偶成轉韻詩云歸來寂寞靈臺下著破藍衫出無馬亦其證矣白簡即竹簡唐會要武德四年詔五品以上執象笏六品以下執竹木笏初學記云笏手板也元膺知臣傳劍論兵漢司馬遷傳在趙者以傳劒論顯注服䖍曰世善劒也後漢馬援傳帝常言伏波論兵與我意合本於仁信孫子將者智信仁勇嚴也佩鞬插羽見為安平公表亦識孤虛漢藝文志五行家有風后孤虛二十卷後漢書方術傳孤虛之術注孤謂六甲之孤辰若甲子旬中戌亥無干是為孤也對孤為虛趙彥傳朝廷令宗資討泰山殘賊彥為資陳孤虛之法俾以發姦漢趙廣漢傳其發姦摘伏如神假之捕盜後漢劉𤣥傳注漢法十里一亭亭置一長捕賊掾専捕盜賊也幸無容刃一作忍非見下遺表以及焚巢易鳥焚其巢旅人先笑後號咷邸箋舊書呂元膺傳元和十年七月李師道留伏甲謀亂初師道於東都置邸院兵諜雜以往來吏不敢辨因吳元濟北犯郊畿多警防禦兵盡戍伊闕師道伏甲百餘於邸院將焚宫室而肆殺掠已烹牛饗衆明日將出㑹小將李再興告變元膺追兵伊闕圍之半月無敢進攻者防禦判官王茂元殺一人而後進或有毁其墉而入者賊衆突出濟伊水望山而去官兵進圍於谷中盡獲之旋帶銀章漢百官公卿表凡吏秩比二千石以上皆銀印青綬注漢舊儀云銀印背龜紐其文曰章俄分竹使漢文帝紀注應劭曰竹使符皆以竹五箭五枚長五寸鐫刻篆書第一至第隼旟楚峽出以分憂晉宣帝紀固辭天子曰此非以為樂乃分憂耳隼旟見前熊軾鄖城後漢輿服志三公列侯伏熊軾黑幡漢地理志江夏郡竟陵縣有鄖鄉楚鄖公邑忽然通貴南史蕭琛傳近於通貴陵箋楚峽謂峽州鄖城謂郢州唐峽州治夷陵縣有西峽郢州治長夀縣本竟陵也茂元蓋以功遷官厯峽郢二州刺史故曰隼旟楚峽熊軾鄖城史皆略而不書豈意復踰五嶺漢張耳傳南有五嶺之戍注裴氏廣州記云大庾始安臨賀桂陽揭陽是為五嶺更授再麾顔延之五君詠一麾乃出守夢溪筆談今之郡守謂之建旄蓋用顔延年詩誤延年謂一麾者乃指麾之麾如武王左秉白旄以麾之麾非旌麾之麾也延年阮始平詩云屢薦不入官一麾乃出守者謂山濤薦咸為吏部郎帝不用荀勗一擠遂出始平延年被擠以此自託耳自杜牧之有擬把一麾江海去之句始謬用一麾遂成故事野客藂書僕考唐人詩如杜子美栁子厚詐用晦獨孤及劉夢得陸龜䝉等皆用一麾事獨牧之謂把一麾為露圭角似失延年之意如張說詩湘濱用出麾如此用則何害筆談謂今人以守郡為建麾用顔詩事自牧之始亦未然觀三國志擁麾守郡文選建麾作牧此語在前久矣謂把一麾之誤自牧之始則可謂建麾之誤則不可中間叨相青宫神異經東方有宫青石為牆門有銀榜以青石碧鏤題曰天地長男之宫忝司緹騎環濟要略司隸出從緹騎通典漢執金吾緹騎二百人持㦸五百二十人輿服導從光生滿路唐為左右金吾衛置大將軍一人將軍二人副其事才通閨籍謝朓詩既通金閨籍又處藩條謂出帥嶺南越井朝臺太平御覽郡國志曰廣州越井岡一云越王井言趙他誤墜酒杯於井遂浮出石門故諺曰石門通越井也明一統志越秀山在廣州府城內上有越王臺故址昔尉他因山為之又有越王井一名趙他井南漢劉氏號為玉龍泉水經注尉他舊治處負山帶海博敞渺目他因岡作臺北面朝漢圓基千步直峭百尺頂上二畝復道回環朔望升拜名曰朝臺王象之輿地紀勝朝臺在廣州番禺縣西五里案李涉鷓鴣詞云越岡連越井越鳥更南飛即此越王井也備經艱險貪泉湞水晉書吳隱之為廣州石門有貪泉傳云飲者貪隱之酌而飲之為詩曰若使夷齊飲終當不易心漢書樓船將軍楊僕出豫章下湞水師古曰湞音丈庚反水經注溱水南徑湞陽縣西出湞陽峽左則湞水注之水出南海龍川縣西徑湞陽縣南右注湞水故應劭曰湞水西入溱也元和郡縣志石門水一名貪泉出廣州南海縣西三十里平地湞水在韶州曲江縣東一里太平寰宇記曲江漢舊縣以湞水屈曲為名益勵平生是甘馬革之言見下祭伏波神文常懼虎皮之誚楊子羊質而虎皮見草而悅見狼而戰也箋遺表云兩踰嶺嶠四建牙旗是茂元官嶺南者再自鄖城遷者似是郡守而下文云中間叨相青宫忝司緹騎則又自嶺南入為京職據舊書太和中為嶺南節度而先是元和中嘗為右神䇿將軍蓋即所謂忝司緹騎者新書云自校書郎改太子贊善大夫亦可謂叨相青宫但此在防禦判官之前殊不相合恐初解嶺南而還别授儲官史載之不詳耳及聖造逺流南極淮南子章亥自北極步至南極許拱北辰黃犢留官晉羊祜傳祜兄子篇為巨平侯奉祜嗣篇歷官清慎有私牛于官舍産犢及遷而留之胡牀掛柱魏略裴濳為兖州刺史常作一胡牀及其去也留以掛柱如生羽翼魏文帝詩身輕生羽異若出嬰羅郭璞江賦慜神使之嬰羅誓以歸彼冗員處之散地箋此言解嶺南節度而歸惟願為冗散也俄以朝那闕守漢地理志安定郡有朝那縣應邵曰故戎郡邑也案朝那故城在今陜西平凉府城東南唐涇州安定郡冶保定縣即今府治平凉縣古朝那地也昆壤須人楊惲報孫會宗書安定山谷之間昆夷舊壤新書方鎮表大厯三年置涇原節度使治涇州貞元六年涇原節度領四鎮北庭行軍節度使元和四年增領行渭州一去闕庭潘嶽西征賦竊託慕于闕庭五罹寒燠處京畿五百里之內控蕃寇數十州之多提鼓燒烽增埤濬洫埤與卑通漢劉向傳增埤為髙詳見祝文雖國家逺追集作敦上策不事交爭漢胸奴傳王莽欲窮追胸奴嚴尤諫曰胸奴為害未聞上世有必征之者也後世三家周秦漢征之然皆未有得上䇿者也周得中策漢得下䇿秦無䇿焉然蛇豕難防左傳申包胥曰吳為封豕長蛇以薦食上國犬羊易縱苟罷嚴徹警則負約渝盟箋自廣德元年涇原沒于吐蕃以後頻復頻陷臣自受命以來為日斯久未嘗一日不修戰格舊書張仁願為朔方總管築三受降城不修戰格未嘗一日不數軍儲左傳歸而飲至以數軍實使士有鬭心人無虛額使之偵候咸亦聞知晉桓𤣥傳𤣥偵候還云裕軍四塞不知多少尚未能率厲驍雄揣摩鋒鏑逺收麻壘直取艾亭見陳許謝上成大朝經武之威後漢杜篤傳辛氏秉義經武畢微臣報主之分可書竹帛後漢鄧禹傳禹曰但願垂功名於竹帛耳不辱旗常周禮日月為常交龍為旗禮記有功銘於太常蓋以久處炎荒備薰瘴毒番禺雜編嶺外二三月為青草瘴四五月為黃梅瘴六七月為新水瘴八九月為黃茅瘴內搖心力外耗筋骸雖馬援據鞍尚能矍鑠後漢馬援傳援據鞍顧盼以示可用帝笑曰矍鑠哉是翁也而班超攬鏡不覺蕭衰後漢班超傳超自以久在絶域年老思土上疏曰臣超犬馬齒殲常恐年衰奄忽僵仆超妹昭亦上書請超曰超年最長今且七十衰老被病頭髮無黑晉王衍傳在車中攬鏡自照恐無以早就大功久當重任自思已熟求退為宜後漢韋彪傳詔曰中被篤疾連上求退伏惟皇帝陛下道冠百王功髙三代照臨若日覆露如天晉語是先子覆露子也注露潤也淮南子帝者覆露昭導普施而無私況今國不乏人時稱多士有才略在臣之右齒髮少臣之年漢書髙后令大謁者張澤報冒頓書曰年老氣衰齒髮墮落俾代處是邦遞臨斯位以之責效誰曰不然俾前達後生皆無蔽滯由中及外得以交相成陛下適時之方晉王羲之傳遺謝安書曰豈非適時之宜耶減微臣固寵之責漢書韓增保身固寵不能有所建明臣不勝祈恩懇迫之至謹差某官奉表以聞為滎陽公桂州謝上表箋舊書宣宗紀太中元年二月以給事中鄭亞為桂州刺史御史中丞桂管防禦觀察等使三年二月責授桂管防禦觀察使循州刺史案地理志嶺南西道桂管經略觀察使治桂州管桂韶䝉富梧潯龔鬱林平琴賔澄繡象栁融等州循州屬嶺南東道節度使臣某言臣奉違禁掖祇役遐陬王勃廣州塔碑記相彼遐陬實惟荒裔雖懸就日之誠見為汝南公表懼曠宣風之寄漢王褒傳益州刺史王襄欲宣風化於衆庶使褒作中和樂職宣布詩選好事令依鳴鹿之聲習而歌之柔轡載揚于永路左傳襄公二十六年國子賦轡之柔矣輕舠利濟於大川詩誰謂河廣曽不容刀箋狹小船曰刀釋文刀如字字書作舠南史齊武帝諸子傳輕舠還闕即以今月九日到任上訖臣某中謝臣系承儒訓晉荀嵩傳參訓國子以𢎞儒訓生屬昌期南史王茂等傳論曰王茂等運接昌期初掛辨髦左傳豈如辨髦而因以敝之注童子垂髦始冠必三加冠成禮而棄其始冠疏士冠禮始冠緇布冠次加皮辨次加爵辨冠義云緇布之冠冠而敝之可也即親筐篋漢賈誼傳俗吏所務在于刀筆筐篋嘉樹無忘於封殖左傳韓宣子來聘公享之韓子賦角弓既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓青氊不落於寇偷世說王子敬夜齊中卧有羣盜入其室王徐曰偷兒青氊我家舊物可特置之再擢詞科一登冊府謂祕書省穆天子傳天子北征東還乃循黑水至于羣玉之山四轍中繩先王之所謂䇿府冊與策同徂遷嵗律浮泛軍裝揚雄甘泉賦振殷轔而軍裝忽彯華纓鮑昭詩仕子彯華纓俄列通籍極望郎於南省魏書孝文帝曰吏部郎必使才望兼允者陸游筆記唐人本以尚書省在大明宫之南故謂之南省備給事於左曹漢楊敞傳子惲名顯朝廷擢為左曹案左曹謂門下省沈佺期自考功員外郎拜給事中詩云南省推丹地東曹拜瑣闈東曹即左曹也中間帖掌臺綱通典御史為風霜之任舊制但聞風彈事提綱而已舊書狄兼謨傳文宗顧謂之曰御史臺朝廷綱紀臺綱正則朝廷理分修國史箋舊書武宗紀㑹昌元年李德裕奏改修憲宗實録所載吉甫不善之迹鄭亞希㫖削之三年十月宰相監修國史李紳兵部郎中史館修撰判館事鄭亞進重修憲宗實録四十卷頒賜有差旋值孽童拒詔集作召謂劉稹狂虜亂華謂回鶻副中憲以急宣木華海賦邊荒遽告王命急宣佐微臣而遙護督晉氏遷延之役左傳諸侯之大夫從晉侯伐秦至于棫林乃命大還晉人謂之遷延之役絶戎人偵邏之姦後漢書南胸奴傳南單于既居西湖亦列置諸部王助為捍戍皆領部衆為郡縣偵邏耳目北單于惶恐敢伐善以攘羭左傳晉獻公欲以驪姬為夫人卜之其繇曰専之渝攘公之羭注羭美也固盡誠以養梀梀通作棘孟子養其樲棘爾雅樲酸棗注樹小實酢小爾雅棘實謂之棗陸佃埤雅大者棗小者棘酸棗棘也伏惟皇帝陛下武惟時夏詩肆于時夏文號欽明書欽明文思方將䖍奉紫泥漢舊儀天子信璽六皆以武都紫泥封之西京雜記漢以武都紫泥為璽室加緑綈其上恭拜青瑣見為安平公表豈意遽分專席謂御史中丞初學記尚書令東漢與司隸校尉御史中丞皆専席坐京師號曰三獨坐叨賜再麾謂桂州刺史首南服以稱藩漢胸奴傳三世稱藩控西原而遏寇詩式遏寇虐西原與祝文之西原同一事見下狀褰帷廉部後漢賈琮傳舊典傳車驂駕垂赤帷裳琮為冀州刺史命褰之百城聞風自然竦震猶恐墜於斯文橫槊令軍南史宋桓榮祖曰昔曹公父子上馬橫槊下馬談咏實致憂於不武左傳荀瑩曰城小而固勝之不武雖期竭力終懼敗官左傳貪以敗官為墨況俗雜華夷地兼縣道見前表文身椎髻漸尉他南越之餘說苑諸發曰翦髮文身爛然成章以像龍子者將避水神也漢書陸賈傳賈至尉他魋結箕踞見賈南粵傳趙他真定人也秦已滅即擊并桂林象郡自立為南越武王叩鼓鳴鐘傳士燮交州之態吳士燮傳燮兄弟並為列郡雄長一州出入鳴鐘磬笳簫鼓吹車騎滿道網疏則魚漏漢酷吏傳號為網漏吞舟之魚繩急則麏驚說文􅍪麞也陸氏釋文􅍪亦作麏又作麇俱倫反草木疏云麏麞也青州人謂之麏黃氏韻㑹麞性善驚故從章章者慞惶也案麞膽甚怯飲水見影輒奔欲經緯以合宜左傳晉成鱄曰經緯天地曰文顧韋弦而匪易韓子西門豹性急佩韋以自緩董安于性緩佩弦以自急伏願陛下務修儉德書慎乃儉德惟懷永圖廣扇廉風沈約碑扇以廉風拾翠採珠曹植洛神賦或採明珠或拾翠羽漢書南粵王傳獻生翠四十雙王章傳妻子徙合浦采珠致産數百萬不勤異物書不貴異物賤用物民乃足驅犀逐象用示深仁見孟子始於問俗之時魏崔琰傳仁聲先路存問風俗便獲稱君之美禮記善則稱君過則稱已則民作忠東方朔非有先生論退不能揚君美以顯其功臣亦當求規水薤見為濮陽公表取戒脂膏後漢書孔奮為姑臧長力行清潔或以為身處脂膏不能自潤徒益苦辛耳冀少息於羣集作疲黎庶免拘於司敗見為汝南公表三梁路阻晏殊類要引尋陽記曰三梁山在北有三石梁長廣盈尺險不可度九嶠山集作封遙晏殊類要引吳録曰南野縣有大庾山九嶺嶠以通廣州浮江遇一作過楚澤之萍家語楚昭王渡江中有一物大如斗圓而赤直觸王舟舟人取之王使使問於孔子孔子曰此萍實也惟伯者能獲焉望國隔番禺之桂山海經桂林有八樹在番禺東遐思白鳥鎮揚音于周囿之中詩王在靈囿白鳥翯翯逺羡仙蓂永固本于堯階之上見為濮陽公表無任感恩望闕結戀屏營之至為懷州李中丞謝上表原注武宗領按地理志河北道懷州縣五河內武德獲嘉武陟修武充箋李中丞不知其名據表云過奬在朝承乏使將聖代懷柔之德率昆夷畏慕之心萬里以遙三時而復蓋嘗使吐蕃而還乃拜懷州之命者案舊書吐蕃傳會昌二年贊普卒十二月遣論贊熱來告哀詔以將作少監李璟弔祭之表云三時而還則還期當在三年之深秋時方命陳許節度使王宰討澤潞與潞潛逆孽許出全師之語適相符合李中丞蓋即其人也或以為李師偃余案武宗紀㑹昌元年八月回鶻烏介可汗至塞上上表借天德城以安公主仍乞糧儲詔金吾大將軍王㑹宗正少卿李師偃往其牙宣慰則近在天德何言萬里以遙昆夷乃西戎不得以此斥回鶻時劉從諫尚有澤潞亦未叛皆與表語抵牾李中丞之為李璟無疑矣臣某言臣伏奉某月日制書授臣某官者天㫖下臨星言東騖即以今月某日到任上訖臣某中謝臣聞漢分刺舉之條三河最重史記田仁傳禇先生曰田仁上書言天下郡太守多為姦利三河尤甚臣請先刺舉三河唐制郊圻之數二宅惟均書申畫郊圻舊書京畿採訪使理京師城內都畿採訪使理東都城內況蘇公舊田左傳王取鄢劉蒍䢴之田于鄭而與鄭人蘇忿生之田溫原絺樊隰郕攢茅向盟州陘隤懷注蘇忿生周武王司寇蘇公也凡十一邑皆蘇忿生之田懷侯故邑懷侯未詳酈元水經注引韓詩外傳曰武王伐紂到邢丘更名邢丘曰懷懷縣故城括地志云在武陟縣四十一里歷考傳記未有以此為懷國之邑者或引唐叔所分懷姓九宗以實之然懷是姓非國名也九宗在河東亦不在河內當闕疑太行㑹險括地志太行山在河內縣北五里吕氏春秋通乎德之情則孟門大行不為險矣劉歆遂初賦馳太行之險峻入天井之髙關元和郡縣志太行陘在懷州北羊腸所經實為險隘德水通津漢郊祀志秦文公獲黑龍以為此水德之瑞更名河曰德水案唐孟州治河陽縣今為孟縣屬河南懷慶府黃河在縣南二十里即古孟津也在申畫之時素為清地語翕張之勢號一作實曰要區老子將欲翕之必固張之自河上置軍以幕中分理地雖密邇左傳以陳蔡之密邇于楚事異躬親詩勿躬勿親庶民勿信伏惟神聖文武至仁大孝皇帝陛下此會昌二年所上尊號神以運機聖而制變將鎮頑梗更務恢張皇甫謐三都賦序並務恢張其文由是開三壘之新規復數朝之故事箋三壘即河陽三城按三壘初改為州故曰新規河陽本屬懷州顯慶二年割屬河南府今復屬懷州故曰故事新書地理志河北道孟州建中二年以河南府之河陽河清濟源溫租賦入河陽三城使又以汜水租賦益之㑹昌三年遂以五縣為州元和郡縣志建中二年置河陽節度使即河陽三城使㑹昌三年改置孟州治河陽通典北中府城後魏太和中築東魏元象元年又築南城及中灘城是為三城孟縣志三城記云河陽北城南臨大河長橋架水古稱設險南城三面臨河屹立水濱中灘城表裏二城南北相望黃河兩派貫於三城之間南北二城皆有濡足之患而中灘屹然如故齊壇將節漢韓信傳蕭何曰王必欲拜之擇日齊戒設壇場具禮乃可王許之諸將皆喜人人各自以為得大將重加廉郡之雄皂蓋朱幡漢景帝紀令長吏二千石車朱兩轓千石至六百石朱左轓應劭曰車耳反出所以為之藩屏翳塵泥也二千石雙朱其次乃偏其左䡊以簟為之或用革䡊與轓同音甫元反後漢輿服志中二千石二千石皆皂蓋朱兩轓各有為州之貴遙徵三紀書既歷三紀世變風移間有兩人陶某以吏理當材鄭某以名家正授陶鄭未詳清塵不逺盧諶贈劉琨詩序自奉清塵於今五稔餘烈猶存頒條之寄注見前繼組為難說文組綬屬詳見祭文若臣者品以勳升官由賞達徒慕益恭之美左傳正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘于是粥于是以糊余口其共也如是以承猶宥之恩見為京兆公表過奬在朝承乏充使左傳攝官承乏將聖代懷柔之德率昆夷畏慕之心詩昆夷駾矣箋昆夷西戎也萬里以遙三時而復副介不離於痼疾一作疾故劉楨詩余嬰沈痼疾竄身清漳濱自夏涉𤣥冬彌廣盈十旬故人一作人從是免嘆于凋零敢矜跋涉之勞詩鄘風大夫跋涉我心則憂自被生成之賜吳諸葛瑾傳䝉生成之福豈謂皇帝陛下謂能專對遽委牧人仍其柏署之雄見兖州謝上表賜以竹符之重見為汝南公表遂使霍氏固辭之第漢霍去病傳上為治第令視之對曰胸奴不滅無以家為也早建雙旌新書百官志節度使賜雙旌雙節行則建節樹六纛儲光羲詩今之太守古諸侯出入雙旌垂七旒案雙旌惟節度領刺史者有之諸州不與焉今則通用為太守之故事矣于公必大之門漢于定國傳始定國父于公其閭門壞父老方共治之于公謂曰少髙大門閭令容駟馬髙蓋車我治獄多隂德子孫必有興者至定國為丞相永為御史大夫封侯傳世云更屯五馬遁齊閒覽漢制太守駟馬其加秩中二千石乃右驂故以五馬為貴賢無所象書惟稽古崇德象賢分可自量漢張安世傳免冠頓首曰誠自量不足以居大位入祖廟而歘驚瞻父堂而益懼書若考作室既底法厥子乃弗肯堂矧肯構況潞濳逆孽許出全師舊書武宗紀㑹昌三年九月下制討劉稹以陳許節度使王宰充澤潞南面招討使繄集作較非此州兵橫制戎境兼聲勢之任有資扉之頒一作須左傳申侯曰師老矣若出于陳鄭之間共其資糧屝屨其可也謹當懋舉詔書聽求人瘼後漢循吏傳廣求民瘼思理行之第一誠愧昔賢漢張敞傳潁川太守黃霸以治行第一入守京兆尹奉忠孝於在三亦惟先訓晉語欒共子曰人生於三視之如一父生之師教之君食之茍愆素誓則有神明伏逺雲天已逾旬朔魏鍾㑹傳注王弻答荀融書隔踰旬朔獻封人富夀之祝未卜其時莊子堯觀乎華封人曰請祝聖人使聖人夀富多男子堯曰辭多男子則多懼富則多事夀則多辱懸子牟江海之思莫知其極見為京兆公表無任感恩攀戀闕庭之至李義山文集箋注卷一
