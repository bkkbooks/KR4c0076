body:
  text: 李義山文集箋注卷五監察御史徐樹榖箋山東提學僉事徐炯注啓下為李貽孫上李相公啓舊書李德裕傳開成五年正月武宗即位七月召德裕於淮南九月授門下侍郎同平章事初德裕父吉甫年五十一出鎮淮南五十四自淮南復相今德裕鎮淮南復入相一如父之年亦為異事案啓云五載於兹六符斯炳則貽孫上啓在會昌四年平澤潞之後也月日從姪某官某謹齋沐裁誠著於啓事跪授僕者上獻於司徒相國叔父閣下某伏逺牆藩揚雄甘泉賦電倐忽於牆藩亟踰年籥舊書音樂志云管三孔曰籥春之音萬物振躍而動也抱英華作挹非徽音於故器周禮典同掌六律六同之和以辨天地四方隂陽之聲以為樂器故新書禮樂志云聲無形而樂有器雖賞逐時遷晉桓沖傳疏曰事與時遷勢無常定竊餘潤於奧雲奧雲未詳疑是鬱字之誤謝莊宣貴妃誄髙唐泄雨巫山鬱雲亦情由類至中阿弭節顔延之秋胡詩弭節停中阿末路增懷漢鄒陽傳至其晚節末路沈吟易失之時魏武帝詩但為君故沈吟至今漢蒯通傳通説韓信曰時者難值而易失悵望難邀之會石崇著引徒願思歸石崇思歸引序注思歸引古曲名崇為太僕卿有思歸之意故有此作殷浩裁書其如慕義見為河東公啓伏惟相公丹青元化桓寬鹽鐡論公卿者四海之表儀神化之丹青也冠蓋中州西都賦英俊之域紱冕所興冠蓋如雲羣生指南見為先輩啓命代先覺代讀曰世魏志橋玄謂太祖曰天下將亂非命世之才不能濟也孟子伊尹曰豫天民之先覺者也語姬朝之舊族莊武慚顔左傳鄭武公莊公為平王卿士敘漢代之名門韋平掩耀漢平當傳漢興惟韋平父子至宰相師古曰韋謂韋賢也案當子宴以明經厯位太司徙賢子玄成以明經厯位至丞相嵗一作將鄰三紀書既厯三紀世變風移克佐五君左傳楚屈建問范會之德於趙武歸以語康王康王曰冝夫子之光輔五君以為諸侯主潞箋德裕自元和中纍辟諸府從事至會昌四年平澤厯事憲穆敬文武五朝凡三十餘嵗故曰將鄰三紀克佐五君動著嘉猷書君陳爾有嘉謀嘉猷則入告爾后于內行留故事後漢張純傳純在朝厯世明習故事陶冶於無形之外優遊於不宰之中老子為而不宰是謂玄德始者主上以代邸承基漢文帝紀髙帝中子立為代王諸吕既誅羣臣奉天子法駕迎代邸師古曰郡國朝宿之舍在京師者率名邸琅琊纘業晉元帝紀年十五嗣位琅琊王大興元年春三月愍帝崩問至百寮上尊號於是即皇帝位明發不寐詩明發不寐有懷二人懷清廟之景靈晉涼武昭王傳述志賦云承景靈之冥符清廟見前日晏忘餐書文王自朝至于日中昃不遑暇食念蒼生之定命見賀相國啓爰徴元老詩方叔元老允在賓臣見賀相國啓五載於兹六符斯炳漢東方朔傳願陳泰階六符以觀天變注孟康曰泰階三台也每台二星凡六星符六星之符驗也應劭曰黃帝泰階六符經云泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人三階平則隂陽和風雨時天下大安是為太平頃單于故境一作地獯鬻遺疆史記北逐葷鬻索隱曰胸奴别名也屢緣喪荒周禮小宰喪荒受其含禭幣玉之事亟致㩦二後漢公孫述傳發間使招攜二夙沙自縛其主劉恕外紀諸侯夙沙氏叛不用命神農退而修德夙沙之民自攻其君而來歸其地冒頓忍射其親漢胸奴傳單于有太子名冒頓從其父單于頭曼獵以鳴鏑射頭曼其左右皆隨鳴鏑而射殺頭曼冒音墨頓音毒遂去北邊漢武帝紀詔曰今中國一統而北邊未安欲事南牧賈誼過秦論胡人不敢南下而牧馬既赫斯而貽怒見為河南表乃密勿以陳謀漢劉向傳詩曰密勿從事不敢告勞師古曰密勿猶黽勉也李善文選注黽勉同心韓詩作密勿同心管氏將來屢發新柴之井管子桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴覆之取其潔敬也留侯每入便一作更聞借箸之籌見為濮陽公狀羣帥一作全師非受成中樞獨運漢書斗運中夾臨制四海春秋運斗樞北斗七星第一名天樞前軍露板北史齊明帝曰上馬能擊賊下馬作露布惟傅修期爾晉八王傳尚書始疑詔有詐郎師景露版奏請手詔李石續博物志露布捷書之别名以帛書揭之竿魏武奏事謂之露板方事於羽馳漢書髙祖曰吾以羽檄召天下兵清禁夀觴劉楨贈徐幹詩拘限清切禁漢書兒寬傳臣寬奉觴再拜上千萬嵗夀制曰敬舉君之觴旋聞於月捷見為滎陽公表仍其貴種漢胸奴傳其大臣皆世官呼衍氏蘭氏其後又有須卜氏此三姓其貴種也慕我華風晉劉曜傳論曰習以華風或辨姓寫誠左傳東郭偃曰男女辨姓蜀志諸葛亮傳遂解帶寫誠厚相結納推諸右校後漢劉盆子傳盆子與茂留軍中屬右校或釋兵伏一作服義史記漢武帝紀澤兵須如徐廣曰古釋字作澤列在周廬史記秦始皇本紀周廬設卒甚謹集解西京賦曰徼道外周千廬內傅薛綜曰士傅宫內外為廬舍晝則巡行非常夜則警備不虞潞子離狄而春秋書春秋宣公十有五年六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸徐夷朝周而大雅詠詩序常武召穆公美宣王也其詩曰四方既平徐方來庭徐方不回王曰還歸其餘麕驚鳥散麕與麏同沈約詩驚麏去不息善曰詩野有死麏今以江東人呼鹿曰麏漢李陵傳陵曰各鳥獸散猶有得脫歸報天子者風去雨還鮑昭舞鶴賦風去雨還不可談悉亘絶幕以銷魂揚雄羽獵賦蹙竦讋怖魂亡魄失張衡西京賦喪精亡魂失歸忘趣絶幕見為滎陽公表委窮沙而喪膽後漢吳漢等傳論曰戎羯喪其精膽胡琴公主已出於襜襤傅玄琵琶賦序故老云漢送鳥孫公主念其行道思慕使知音者於馬上作之舊書音樂志承天樂有大琵琶一大五絃琵琶一髙昌樂有琵琶二五絃琵琶二新書音樂志西涼伎有五絃天竺髙麗龜兹安國疏勒伎皆有之五絃如琵琶而小北國所出舊以木撥彈樂工襄神符初以手彈太宗悅甚後人習為搊琵琶案舜作五絃之琴而文王武王加二絃琵琶本四絃也北國益為五絃與琴同唐人所謂胡琴者蓋即五絃琵琶也然岑參白雪歌云中軍置酒飲歸客胡琴琵琶與羌笛則胡琴與琵琶又似二器豈以四絃者為琵琶五絃者為胡琴耶史記李牧傳大破殺胸奴十餘萬騎滅襜襤破東胡降林胡單于奔走集解襜都甘反襤路談反如淳曰胡名也在代地毳幕天驕行遺其湩酪英華作種酪李陵答蘇武書韋韝毳幕以禦風雨注毳幕氊帳也漢胸奴傳單于遣使與漢書云胡者天之驕子又中行説曰得漢食物皆去之以視不如重酪之便美也師古曰重乳汁也重音竹用反字本作湩其音則同説文湩乳汁也釋名酪澤也乳汁所作使人肥澤也向若非薛公料敵先陳三策漢英布傳反書聞汝隂侯膝公以問其客薛公言之上上乃見問薛公對曰使布出于上計山東非漢之有出于中計勝負之數未可知也出于下訃陛下安枕而卧矣充國為學盡一作常通四夷漢趙充國傳充國字翁孫學兵法通知四夷事則何以雪髙廟稱臣之羞舊書突厥傳髙祖起義太原遣大將軍府司馬劉文靜聘于始卑引以為援始畢遣其特勒康稍利等獻馬千匹會于絳郡又選二千騎助軍從平京城全肅祖復京之好舊書回紇傳回紇其先胸奴之裔也在後魏時號鐵勒部落近謂之特勒後稱回紇肅宗紀至德二載九月回紇葉護太子率兵四千助國討賊元帥廣平王統朔方安西回紇南蠻大食之衆二十萬收西京十月入東京乃封葉護為忠義王約每年送絹二萬匹此廟戰之功一也孫子夫未戰而廟勝得算之多者也其箋李德裕傳回紇宰相嗢沒斯殺赤心宰相以衆來降赤心部族又投幽州烏介勢孤而不與之米其衆食乏漸近振武保大柵杷頭峯突入朔州虜大縱掠卒無拒者上憂之與宰臣計事德裕曰今烏介所恃者公主如令勇將出奇奪得公主虜自敗矣上即令德裕草制以出奇形勢授劉沔沔令大將石雄擊可汗於殺胡山敗之迎公主還宫惟彼參伐一作代非案參星曰參伐屬大原分野左傳子産云遷實沈于大夏主參唐人是因故參為晉星實興皇家應禎詩越裳重譯充我皇家天漢美名方之尚陋見為山南啓舂陵王氣比此非多後漢光武紀望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱蔥蔥然而物衆藏姦地寬長孽敢起在行之衆左傳以寡君之在行後漢岑彭傳鄧奉親在行陳吳書關侯曰烏林之投左將軍身在行間因興逐帥之謀遂使起義堂邊舊書髙祖紀髙君雅請髙祖祈雨晉祠將為不利即斬以徇遂起義兵玄宗紀上親制起義堂頌及書刻石紀功于太原府之南街台臣夙駕晉陽宫下魏地形志晉陽縣武定初齊獻武王始置晉陽宫逆豎宵奔翻集作月非勢將冀於連雞戰國策秦惠王謂寒泉子曰諸侯之不可一猶連雞之不能俱止於棲也勇鬭尚同於困獸左傳晉侯曰困獸猶鬬況國相乎詎知長算晉庾亮等傳論曰闕安國之長算已出奇兵後漢公孫述傳潛遣奇兵出吳漢軍後金僕靈銔左傳魯莊公以金僕姑射南宫長萬注金僕姑矢名靈銔見賀相國啓靡留於旬朔見為懷州表箯輿貫木漢書廷尉以貫髙辭聞上使泄公持節問之箯輿前師古曰編竹木以為輿髙時搒笞刺爇委團故以箯輿處之也司馬遷傳其次關木索被箠楚受辱已集於都街晉石崇傳詔燒鴆於都街此廟戰之功二也箋舊書太原橫水戌兵因移戌榆社乃倒戈入太原城逐節度使李石推其部將楊辨為留後武宗以賊稹未殄又起太原之亂心頗憂之德裕奏即時請降令王逢起榆社軍又令王元逵兵自土門入會於太原河東監軍使吕義忠聞之即日召榆社本道兵收復太原生擒楊辨與其同惡五十四人來獻斬於狗脊嶺潞寇不懲兩豎之凶兩豎謂吳元濟李師道徒恃三軍之力干我王略據其父封袁熙因纍葉之資後漢袁紹傳纍世台司賓客所歸熙紹之中子也為公孫康所殺衛朔拒大君之詔見為白從事啓人將自棄左傳鄧侯曰人將不食吾餘鬼得而一作其誅莊子為不善乎幽間之中者鬼得而誅之蛙覺井寬後漢馬援傳謂隗囂曰子陽井底蛙耳而妄自尊大蟻言樹大異聞録淳于棼飲槐下醉歸卧夢二使曰槐安國王奉邀指古槐入穴中曰大槐安國王曰南柯郡不理屈卿為守纍日達郡尋古槐下穴明朗可容一榻有二大蟻乃王也一穴直上南枝即南柯郡也招延輕險曽微一作徴誤吳國之錢漢吳王濞傳吳有豫章郡銅山即招致天下亡命者盜鑄錢藏匿罪亡又乏江陵之粟漢武帝紀詔曰方下巴蜀之粟致之江陵所謀者河朔遺事箋舊書李德裕傳艱難已來列聖皆許三鎮嗣襲已成故事新書劉稹傳諸將乃詣監軍崔士康邀説請如河朔故事士康懦不敢拒乃至喪次扶稹出見三軍所恃者巖險偷生巖險謂羊腸天井今則趙魏俱攻燕齊一作秦併入宋綬唐大詔令其劉悟劉從諫贈官及所授官爵并劉稹在身官並宜削奪舊書劉稹傳令三鎮加兵討稹命徐許滑孟魏鎮幽并八鎮之師四面進攻劉沔傳武宗命忠武節度使王宰徐州節度李彥佐等充潞府西南面招撫使遂復授沔太原節度充潞府北面招討使詳為河南表奉規於帷幄見為同州啓遵命於指蹤漢蕭何傳上曰今諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也亞夫拒吳驚東南英華作西非而備西英華作南非北漢周亞夫傳吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入韓信擊魏艤臨晉而渡夏陽漢書韓信傳信擊魏陳船欲渡臨晉而伏兵從夏陽襲安邑遂虜魏王豹艤本作檥項籍傳烏江亭長檥船待如淳曰南方人謂整船向岸曰檥百道無飛走之虞晉張重華傳石季龍令麻秋攻枹罕圍塹數重雲梯電車地突百道皆通於內吳都賦窮飛走之棲宿一縷見傾危之勢枚乘諫吳王書夫以一縷之任係千鈞之重上懸之無極之髙下垂之不測之淵雖甚愚之人猶知哀其將絶也計其反接漢陳平傳未至軍為壇以節召樊噲噲受詔即反接師古曰反縛兩手也當不踰時魏志鄧艾傳詔曰兵不踰時戰不終日是則陳曲逆之六奇漢書陳平凡六出奇計封曲逆侯翻成屑屑左傳女叔齊對晉侯曰屑屑焉習儀以亟葛武侯之八陳晉書初諸葛亮造八陳圖於魚復平沙上壘石為八行相去二丈桓溫見之曰此常山蛇勢也更覺區區左傳子罕曰家國區區此廟戰之功三也箋舊書澤潞節度使劉從諫卒軍人以其姪稹擅總留後帝與宰臣議可否德裕曰澤潞國家內地不同河朔若不加討何以號令四方若因循授之則藩鎮相效威令去矣又曰劉稹所恃者河朔三鎮耳但得魏鎮不與稹同破之必矣上令御史中丞李回使三鎮論旨何𢎞敬王元逵承詔聳然從命孤一作三寇行靜萬方率同將蕩海騰區夷山拓宇後漢馮衍傳欲搖太山而蕩北海晉趙至傳與嵇蕃書云蕩海夷嶽顔延之郊祀歌宅中拓宇髙待泥金之禮白虎通封禪金泥銀繩雄專瘞玉之辭漢書武帝天漢三年泰山修封還過祠常山瘞玄玉煙閣傳形舊書太宗貞觀十七年圖功臣于凌煙閣革車就國漢周勃傳陳丞相平卒上復用勃為丞相十餘月上曰前日吾詔列侯就國或頗未能行丞相朕所重其為朕率列侯之國乃免相就國革車見為安平公表盡人臣之極分煥今古之髙明言德裕將削平海內封岱勒成而後奉身以退也況又奉以嘉聲魏志髙堂隆傳疏曰聞之四夷非嘉聲也諧兹國檢揚子法言天下有三檢衆人用家檢賢人用國檢聖人用天下檢晉庾峻傳疏曰此其出言合於國檢傅文賜糗逺針醉飽之徒傅文當作鬬文楚語鬬且語其弟曰昔鬬子文三舍令尹無一日之積恤民之故也成王聞子文之朝不及夕也於是乎每朝設脯一束糗一筐以羞子文至于今令尹秩之注糗寒粥也羞進也晏子朝一作浣衣橫勵輕肥之俗禮記晏平仲浣衣濯冠以朝君于以為隘矣比周息慮左傳帝鴻氏有不才子頑嚚不友是與比周孤介歸仁以上美德裕之節儉紹續勳家扶持舊族罔容私謝晉羊祜傳祜曰拜爵公朝謝恩私門吾所不取皆事公言漢文帝紀宋昌曰所言公公言之景風至而慶賞先行易通卦驗夏至景風至辨大將封有功淮南子景風至施爵祿賞有功仲吕協而賢良必遂禮記孟夏之月律中中吕命太尉贊桀俊遂賢良舉長大行爵出祿必當其位中吕之中音仲豈直杜伯山之令子大邑傳家後漢杜林傳林字伯山扶風茂陵人建武二十二年代朱浮為大司空明年薨帝親自臨喪送葬除子喬為郎詔曰公侯子孫必復其始賢者之後宜宰城邑其以喬為丹水長陶彭澤之孤孫西曹受署晉陶潛傳晉大司馬侃之曽孫也為彭澤令南史梁宗室傳安成康王秀為江州刺史及至州聞前刺史取徵士陶潛曽孫為里司嘆曰陶潛之德豈可不及後胤即日辟為西曹郎以上美德裕之録用勳舊重以心遊書囿一作圖上林賦翱翔乎書圃思託文林公孫乘月賦文林辨囿提英華作緹非枹於絶藝之場左傳郤克左并轡右援枹而鼓零陵先賢傳提枹鼓會軍門使百姓加勇班揚掃地班固揚雄南史王裕之等傳論曰曩時人物掃地盡矣鞠旅於無前之敵詩陳師鞠旅魏志吕布傳吕布壯士善戰無前江鮑輿尸江淹鮑昭輿尸見前故矯枉則黃冶之賦興英華作竹非漢郊祀志谷永説上曰黃冶變化注晉灼曰黃冶者鑄黃金也道家言治丹砂令變化可鑄作黃金也一品集黃冶賦序蜀道有青城峩睂山皆隱淪所託辛亥嵗有以鑄金術干余者竊歎劉向纍世懿德為漢儒宗其所述作振於聖道猶愛信鴻寶幾嬰時戮況流俗之士能無惑於此乎因作賦以正之遊道則知止之篇作老子知止不辱知足不殆一品集自序詩五嶽徑雖深遍逰心巳蕩苟能知止足所遇皆清曠七十難可期一邱乃微尚遙懷少室山常恐非吾望注非尚豫遍遊五嶽辭窮體物陸機文賦賦體物而瀏亮律變登髙漢藝文志登髙作賦可為大夫文星留伏於筆間見為先輩啓綵鳯翱翔於夢裏見為濮陽公狀此固談揚絶意倣效何階以上美德裕之文章讀箋舊書德裕特達不羣好著書為文雖位極台輔而書不輟吟詠終日在長安私第别構起草院院有精思亭每朝廷用兵詔令制置而獨處亭中凝然握管左右侍者無能預焉有文集二十卷若某者徒預宗盟左傳周之宗盟異姓為後早塵清鑒魏志王粲等傳評曰周洽劉廙以清鑒著而行藏遷貿岐路差池今將抽實吐誠推心敘欵緘猶未寫詞已失煩一作繁某爰自弱齡任昉䇿秀才文朕本是諸生弱齡有志實標一作抱孤操寒郊映雪藝文類聚宋齊語曰孫康家貧常映雪讀書暑草搜螢見為安平公表雖有謝於天姿漢淮南王傳大王所行不稱天資或無慚於力學庾英華作屢非持奇字陳庾持傳好為奇字信未皆通敬禮小文曹植與楊德祖書昔丁敬禮嘗作一文使僕潤色之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳惡我自得之後世誰相知定吾文者耶頗常留意太和中敢揚微抱竊獻短章顔延之五君詠頌酒雖短章深衷自此見方候明誅忽蒙復命荆州一紙晉陽秋劉𢎞為車騎大將軍開府荆州刺史每有興發手書郡國莫不感悅奔走咸曰得劉公一紙書賢於十部從事也河東百金見為張周封啓叨延月旦之評後漢書許劭字子將汝南平興人好共論鄉黨人物每月輒更其品題汝南俗有月旦評焉長積竹林之戀見謝宗卿啓按竹林七賢有阮咸籍兄子也貽孫以咸自北竟以事將願背蹇與身期離索每多交攀莫遂並見前武陵被病後漢馬援傳劉尚繫武陵五溪蠻夷軍沒援因請行進營壺頭士卒多疫死援亦中病洛表求醫書序畋于有洛之表後漢清河孝王慶傳復上言外祖母王年老遭憂病下土無醫藥願乞詣洛陽療疾於是詔宋氏悉歸京師未及上言先蒙受代肩輿而至晉書王羲之聞顧辟疆有名園乘平肩輿徑入杜門以居漢王陵傳謝病免杜門竟不朝請蓬藋荒涼庾信賦掩蓬藋之荒扉風霜迅厲庾信賦聊以避風霜今已稍痊美疢左傳臧孫曰美疢不如惡石獲託休辰殷鈞體羸尚能為郡南史殷鈞傳鈞為臨川內史體羸多疾閉閣卧理而百姓化其德劫盜皆奔出境馬卿疾罷猶可言文漢書司馬相如既病免家居茂陵天子曰相如病甚可往從悉取其書使所忠往而相如已死問其妻對曰長卿時時著書人又取去未死時為一卷書曰有使來求書奏之其遺札書言封禪事所忠奏焉退無井臼之資東觀漢記馮敬通廢於家娶北地任氏女為妻忌不得畜媵妾兒女常自操井臼南史庾域傳域為懷寧太守罷任還家妻子猶事井臼進乏交朋一作朋友之助是以徘徊軒幄託附緘封冀陳蔡之及門見論語庶江黃之列會春秋僖公三年齊侯宋公江人黃人會于陽榖敢渝孤直隋房彥謙傳彥謙謂煩曰清介孤直未必髙名仰纍清光東浪驚年並見表西飈結欷説文飈扶搖風也亦作飊矢英華作交非心佩賜畢命銜輝晉范汪傳疏曰抗表輒行畢命原野道阻且躋書不盡意金楹假蔭望同相賀之禽何晏景福殿賦金楹齊列淮南子大厦成而燕雀來賀珠岸回光庶及不枯之草大戴禮玉在山而木潤珠在淵而岸不枯明懸肝膽後漢竇融傳上書曰故遣劉鈞口陳肝膽唯所爐錘莊子意而子曰夫無莊之失其美據梁之失其力黃帝之亡其智皆在爐錘之間耳干冒尊嚴伏用兢灼謹啓為舍人絳郡公上李相公啓箋舍人名褎會昌中討劉稹為鄭州刺史本集有鄭州獻從叔舍人褒詩某聞量力省躬典刑之深旨度材任事聖哲之良規某雖甚愚頗嚮斯義屬者謬圖一作從仕進因藉時來伏值相公顧以外藩夙通襟契憫羊曇之未立早託謝家世説羊曇少為謝太傅所知太傅亡後羊徹樂彌年行不由西州路常因大醉唱樂至州門左右白曰此西州門羊慟哭而去詳見為李郎中文憐康伯之無歸常依王氏王當作殷晉殷浩傳浩甥韓伯字康伯浩素賞愛之時浩坐廢為庶人徙於東陽之信安縣伯隨至徙所拔於幽滯魯褒錢神論幽滯非錢不拔處以周行左傳詩云嗟我懷人置彼周行能官人也王及公侯伯子男甸采衛大夫各居其列所謂周行也遂俾一作得南憲中臺屢承闕乏並見表內庭西掖漢書注正殿門之旁有東西掖門如人臂腋故名比辱升遷邁越時流塵汙中旨為中書舍人知制誥故云塵汙中旨恩渥非次後漢和帝紀敕曰署用非次選舉乖宜性分難移徒當侍從之榮莫有論思之效竟使懼因福過並見表疾以憂成晉李重傳以憂逼成疾外雖全人吕氏春秋此之謂全人中抱美疢常願青蒲瀝懇紫殿披誠並見前進退未聞過纍仍積及正名綸閣見為濮陽公狀收迹翰林揚雄長楊賦問於翰林主人尋欲一作願竊候休旬初學記漢律吏五日得一下沐言休息以洗沐也伏拜一作拜伏蕭屏廣雅罘罳謂之屏又蕭牆也謝昔年之朝奬抒他日之私誠而機事且繁易幾事不密則害成燮和少暇任昉行狀燮和台曜齋沐纍至肝集作肺腸莫從北史周宗室傳遙奉顔色崩慟肝腸旋屬虜帳夷氛謂烏介壺關伐叛謂討劉稹漢地理志上黨郡有壺口關寰宇記壺關在潞州城東二十五里因山似壺故名絳臺業控後漢書馮衍傳顯志賦曰饁女齊於絳臺兮注絳晉國所都國語晉平公為九層之臺有元戎大集之師鄭國東臨過列鎮在行之衆並見前任當調發漢陳咸傳所居調發屬縣事屬供須晉桓沖傳嵗運米三十萬斛以供軍資須豈斯擇材皆在非據易非所據而據焉周旋三一作二郡綿厯兩霜隋觀德王雄傳册書曰爰司禁旅綿厯十載頒宣詔條漢百官表刺史班宣周行郡國省察治狀以六條問事祗愓英華作暢非廟畫雖無咎悔嵇康幽憤詩奉時恭默咎悔不生亦乏殊尤一作功見為滎陽公表今幸四海無塵六英華作九是州嚮化靈臺偃伯後漢馬融傳廣成頌曰命師於鞬櫜偃伯於靈臺注司馬法曰古者武軍三年不興則凱樂凱歌偃伯靈臺答人之勞告不興也偃休也伯謂師節也衢室歸尊管子堯有衢室之問者下聽於人也淮南子聖人之道若中衢而設尊過者斟酌各得其宜晉刑法志念室後刑衢樽先惠是修明禮律之初後漢章帝紀贊曰左右藝文斟酌律禮晉儒林傳論曰漢祖勃興粗修禮律舉拔俊賢之始而鄭之為地右臨梁苑謂汴州左倚成皋漢成皋縣唐為汜水縣在鄭州西一百十里比之列藩實為劇郡漢朱邑傳直敞逺守劇郡山東望族見祭處士文幾同屈景之強離騷序三閭之職掌王族三姓曰屈昭景三輔黃圖漢髙帝都長安徙齊諸田楚屈昭景及諸功臣於長陵洛邑頑民書畢命曰毖殷頑民常雜雈蒲之聚左傳鄭國多盜取人於雈蒲之澤永言出牧豈易其人而又孔道所因漢西域傳辟在西南不當孔道使車旁午漢霍光傳使者旁午注一縱一橫為旁午送迎或闕則怨讟流詞左傳隨武子曰民不罷勞君無怨讟館餼稍乖一作求誤周禮遺人凡賓客會同師役掌其道路之委積五十里有市市有候館候館有積左傳曹人致餼注熟曰饔生曰餼則職司貽英華作謗辱潘嶽詩恪居處職司託之全器猶或難居矧在朽材漢孔光傳臣以朽材前比厯位寧宜久處某伏思自隨宦一作官牒見為張周封啓遽忝恩榮位至圭符王融䇿秀才文頃汰圭符妙簡銅墨濟曰圭符謂刺史銅墨謂縣令寵當金紫陸機表懷金拖紫或筋骸無苦心志有餘即豈願踞熊軾以告勞指隼旟而辭疾直以攝生寡妙並見表舊恙無痊儻或形言王儉褚彥回碑文不以毁譽形言懼塵清聽後漢申屠蟠傳諫梁配曰況在清聽每朝昏改候霧露消威漢淮南厲王傳爰盎諫曰臣恐其逢霧露病死則或至問俗有違見為滎陽公表在公多廢詩夙夜在公坐為尸祿説苑虞丘子復於莊王曰尸祿素飧貪欲無厭臣之罪當稽於理行有愧顔南史東昏侯紀逞諸變態曽無愧顔而又貪明盛之時魏志王基傳疏曰當明盛之世不務以除患有昏嫁之纍後漢逸民傳向長字子平建武中男女嫁娶既畢逰五嶽名山竟不知所終未敢髙論止足潘嶽間居賦序覽止足之分庶浮雲之志直乞退休是以輒疏精誠上干陶冶伏惟相公雲龍協應易雲從龍風從虎舟楫成功書若濟巨川用汝作舟楫比屋可封期於屈指一夫不獲並見表固以動心如蒙曲鑒深情一作誠猥從志願置之他所以遂其愚一作冝則吳楚列城左傳晉侯許賂秦伯以河外列城五江關别郡一作部雖居鄰佐亦委緝綏獲安病躬豈敢擇地猶希磨淬鉛鈍班固答賓戲搦朽磨鈍鉛刀皆能一斷撫養疲羸積以嵗時一作日非少禆塵露晉元帝四王傳塵露之微有增山海伏惟試賜恩照圍減帶緩用沈約語見前啓古詩衣帶日以緩髮稀辨傾詩側辨之俄箋側傾也俄傾貌窅然向風目極心往楚辭目極千里兮傷春心晉涼武昭王傳述志賦曰心往形留下情無任攀戀感激惶懼之至為絳郡公上李相公啓某少悲羈紲見前表不承師友之親一無此字規晚學文章粗致鄉曲之名一無此字譽見前啓謬汙官秩遂彯華纓握蘭清曹視草禁掖並見表貪叨過極見為滎陽公狀憂責非寧魏武帝紀注公上書謝曰自託聖世永無憂責蚤為寒暑所一作之侵頗染一作有肺腸之疾自頃以慶雲結蔭竹書紀年舜在位十有四年於是八風循通慶雲藂聚宸極繫心晉傅咸傳億兆顒顒戴仰宸極當就望以推誠見為汝南公表於煎調而寡裕南史循史傳孫謙從子廉凡貴要每食廉必日進滋旨皆手自煎調案煎調謂湯藥之事前嵗伏蒙任使奉逺承明西都賦承明金馬著作之庭詳見為汝南公表值朝廷興問罪之師原野有宿兵之餽左傳凡師一宿為舍再宿為信過信為次舊書會昌三年春正月以宿師于野罷元會絳城甚苦鄭馹非完一作遙左傳楚子乘馹會師于臨品楊慎丹鉛録孟子置郵傳命古注置驛也郵馹也置緩郵速驛遲馹疾後世不達其義以馹為驛之省文永樂中刻春秋大全盡改左傳馹字為驛驛與馹溷而不分故解經皆謬加之以降虜移鄉謂鳥介也見為河南表仍之以貴臣銜命謂李回也見為李貽孫啓飛挽之外漢嚴安傳飛芻挽粟以隨其後將迎實繁見為汝南公表旁奉廟謀上遵詔旨動繁調發居勞撫安業史蠕蠕傳道武撫安之抱疾以臨為日斯久伏幸姦凶克乂濡澤橫流司馬相如封禪文沾濡浸潤協氣橫流是大朝陟降一作黜陟之初良冶埏鎔之始禮記良冶之子必學為裘良弓之子必學為箕此郡路通四境名冠六雄舊書蒲州與陜鄭汴懷魏為六雄新書地理志鄭州滎陽郡雄武德四年置治武牢城貞觀七年徙治管城軒蓋以來范雲詩軒蓋照虛落原野交錯萑蒲有聚武吏貽憂漢何並傳使文吏治三人獄武吏往捕之雖清時無杼軸之虞詩大東小東杼軸其空而常日有逋懸之賦漢成帝紀詔曰諸逋租賦所振貸勿收必在假之賢守屬以強材然後謡詠克興公私不廢豈可使某素兼痾恙本乏良能後漢循吏傳論曰亦一時之良能也久於是邦以主東道見為滎陽公狀饋餐將藥甌並進揚雄方言甂自關而西謂之甂其大者謂之甌假牒與公案相隨南史王球傳未可以文案貴也含意不言見代彭陽公表貪榮是罪晉陶侃傳表曰臣非貪榮於疇昔而虛讓於今日相公漢籌始運見為濮陽公狀殷鼎將調見為中丞狀度材任官歸於至當存誠愛物一作受決在無頗書人用側頗僻注頗不平也竊敢自託緘封逺干樽俎晏子春秋不出樽俎之間而折衝千里之外俯期恩意以保衰微且某運偶昌期年初知命豈不願臨劇郡稍冀榮途法苑珠林晉李恆問榮途貴賤但以力有所不任心有所不逮雖欲勉強實憂傾敗彼吳楚偏鄉非舟車要路永言凋瘵木華海賦天綱浡潏為凋為瘵翰曰凋傷也瘵病也亦藉緝綏儻特降優容遙聞擬議則朽質有報恩之所羸軀收曠位之譏宿疢或痊理劇未晚漢書尹賞有理劇之才遷滎陽令伏惟試賜裁度嚮風披懇楚辭長嚮風而舒情服義陳詞離騷就重華而陳辭仰台耀以瞻輝望洪鈞而佇惠王褒四子講德論鴻鈞之世何物不樂干冒尊德當作聽集作雄非伏積兢惕謹啓為絳郡公上史館李相公啓某啓伏以秉大鈞者以物得其所為先執大化者以材適於任為急將以致理在明命官使輕重合宜大小有裕然後人稱其職職無廢人此相公之所明知也某材術素寡聲光莫聞郤正釋義有聲有寂有光有翳偶叨承平崔實政論承平日久漸敝而不悟謬登華顯洎分符竹使絶籍金閨並見表一授專城古樂府四十專城居再易灰琯玉泉記立春之日取宜陽金門山竹為琯河內葮草為灰以候陽氣且解巾臨郡前賢攸重後漢韋豹傳豹子著拜東海相詔書逼切不得巳解巾之郡一麾出守昔人所榮見為濮陽公表雖積戀於本朝實俯光於單緒况又此州管叔舊國括地志鄭州管城縣今州外城即管國城是叔鮮所封也帝鴻遺墟左傳季文子使太史克對曰昔帝鴻氏有不才子史記軒轅黃帝一曰帝鴻水經注洧水東徑新鄭故城中帝王世紀云或言縣故有熊氏之墟黃帝之所都也鄭氏徙居之故曰新鄭接彼嶅嶢嶢當作鄗左傳晉師在敖鄗之間注敖鄗二山在滎陽縣西北浸以京索漢高帝紀與楚戰滎陽南京索間應邵曰京縣名今有大索小索亭案京索二水名也見水經注聚山東之右族邇洛表之宸居並見前內揣非才頗榮斯一作所任而復以通莊所自爾雅五達謂之康六達謂之莊假道攸繁左傳晉荀息假道於虞以伐虢載惟餞迓之勞毛萇詩傳祖而舍軷飲酒于其側曰餞公羊傳晉郤克與臧孫許同時而聘于齊齊人使跛者迓跛者以眇者迓眇者實半頒宣之務必屬於壯齒後漢杜詩傳疏曰及臣齒壯隋令狐熙傳表曰昔在壯齒猶不如人付彼全人用以責功曹植表舍罪責功明君之典也僅能集事左傳張侯曰此車一人殿之可以集事某早年被病晚歲加深衣袴無取於潔清漢周仁傳景帝初立拜仁為郎中令常衣弊補衣溺袴故為不潔清以是得幸藩溷動淹於景刻謂如厠不能速出正字通溷亂也濁也又厠也左思作賦門庭藩溷皆著紙筆徇已則坐墮物務晉裴頠傳王衍之徒不以物務自嬰業官則立致蕭衰欲一作願俱濟於公私實加憂於寤寐易其於人也為加憂矧一作生兹仍歲南史齊高帝諸子傳舊楚蕭條仍歲多故適有外虞晉王遜等傳論曰內難薦臻外虞不息降卒征人旬時併集飛芻挽粟星火為期李密陳情表州司臨門急如星火以此疚心彌深舊恙今寰瀛大定晉地理志寰瀛之內可得而言也雨露旁流高步翰飛後漢謝該傳孔融書曰今尚父鷹揚方叔翰飛一呼而至雲羅場藿江淹雜體詩雲羅更四陳詩皎皎白駒食我場藿萬里無遺將調斯人以求良牧晉姚興傳胡威謂興曰伏仗良牧惠化得才為美今也其時儻蒙允贊聰明曲聽奏記俯憐衰薾謝靈運詩疲薾慚貞堅稍賜優容則亦不敢便挂簮纓後漢逸民傳蓬萌即解冠挂東都城門歸將家屬浮海客於遼東遽離陶一作爐冶江湖偏郡襦袴須人見為滎陽公狀無根節之難後漢書虞詡為朝歌長故舊皆弔詡曰不遇盤根錯節何以别利器乎少舟車之會俾之養理使得便安漢薛宣傳思省吏職求其便安南史王勱傳勱為政清簡吏人便安之庶粗致人謡以酬廟算則某所謂材有稱職時無廢人凡在宦途皆仰時化伏惟試賜恩察違離漸久刺謁末由南史劉繪傳繪為南康相郡人有姓賴所居名穢里刺謁繪昔在丘門常忝四科之列今瞻魯史將期一字之恩見為某先輩啓下情無任感戀兢惶之至為綘郡公上崔相公啓箋舊書會昌三年五月崔鉉同中書門下平章事某啓某本洛下諸生世説人問顧長康何以不作洛生詠答曰何至作老婢聲注洛下諸生詠音重濁故云老婢聲東莞一作山東舊族粗霑科第薄涉藝文謬藉時來因成福過一作遇並見前青縑赤管漢官儀尚書郎起草更直給青縑帳初學記漢尚書令僕丞郎月給大管筆一雙通典丞郎月賜赤管大筆一雙已忝於華資一作清華北史楊休之傳典選稍久非其所好每謂人曰此官實自清華黃紙紫泥新書高宗上元詔曰詔敕施行既為永式比用白紙多有蟲蠧宜令今後皆用黃紙紫泥見為滎陽公表仍參於宥密詩夙夜基命宥密相公早容薄伎任昉王儉集序以薄伎效德獲寄光塵見為張周封啓别殿朝回謝莊誄離宫天邃别殿雲懸禁林夜直西都賦集禁林而屯聚每披襟素常賜話一作語言左傳君子曰古之王者並建聖哲樹之風聲著之話言知蔣琬之為公敢矜先見蜀蔣琬傳夜夢有一牛頭在門前流血滂沱呼問占夢趙直直曰君位必當至公後遷大將軍録尚書事封安陽亭侯哀馬卿之多病亦辱來言西京雜記相如素有消渴疾圭律未遐銘鏤斯在相公鹽梅調味書若作和羮爾惟鹽梅舟楫濟時晉水擒凶謂誅楊并韓都蕩梗謂平劉稹以不剛不柔貞百度詩不剛不柔敷政優優百度見前以無偏無黨定九流書無偏無黨王道蕩蕩九流見狀若某者實有何能可叨出牧絳田巳非厥任左傳晉人謀去故絳韓獻子曰不如新田滎波轉過其材見為舉人啓間歲以來為政非易漢食貨志間歲萬餘人師古曰間歲隔一歲有南遷之降虜謂烏介有西出之成師謂討劉稹左傳成師以出又何濟焉資屝所供左傳申侯見曰師老矣若出於陳鄭之間共其資糧屝屨其可也餼牽之備左傳皇武子辭曰吾子淹久於敝邑惟是脯資餼牽竭矣未嘗造次敢怠躬親今梟獍掃除漢郊祀志祠黃帝用一梟破鏡孟康曰梟鳥名食母破鏡獸名食父黃帝欲絶其類使百吏祠皆用之破鏡如貙而虎眼晉崔懿之傳謂靳凖曰汝心如梟獍必為國患案獍即破鏡古今字異耳馬牛歸放書歸馬于華山之陽放牛于桃林之野將使坐臻富庶必先用得才能此地名高六雄實控東道分憂之寄並見前自昔為榮况在疏蕪敢忘涯分隋史詳傳循涯揣分實為幸甚但以輶軒坌至風俗通周秦常以歲八月遣輶軒之使採異國方言孔融薦禰衡表溢氣坌湧周翰曰坌塵也音蒲悶切賦貢川流非惟撫字之難舊書陽城為道州刺史賦稅不登觀察使數加誚讓州上考功第城自署曰撫字心勞催科政拙考下下兼有送迎之遽晉虞預傳預上記曰自頃長吏輕多去來送故迎新交錯道路舊痾加甚潘嶽間居賦舊痾有痊朽質難堪假故稍頻晉陳羣傳參伍掾屬多設解故以避事任曠廢為懼晉謝玄傳玄又自陳既不堪攝職慮有曠廢又以宦遊既久故里多違陶令之田園將蕪尚平之婚嫁未畢並見前顧惟羈絆魏略植上書曰固當羈絆於世繩維繫於祿位未可歸休韓詩外傳田子方為相歸休得金百鎰竊敢逺疏丹誠晉劉喬傳劉𢎞與喬箋曰披露丹誠不敢不盡上干清重晉丁潭傳賀循曰郎中令職望清重實宜審授非獨祈恩於時宰南史劉瓛傳仲熊執經議論往往與時宰不合實將誓欵於已知張衡思玄賦恃已知而華子兮儻蒙以然諾為心漢張敖傳上賢貫高能自立然諾誠明濟物嵇康書是乃君子思濟物之意也垂憂不逮賜議所安則吳楚之間郡邑不一作非少非一作不當衝要謝靈運詩河兖當衝要或異膏腴漢賈誼傳高皇帝割膏腴之地以王諸公使之頒條庶可求瘼昨賊平之後啓事尋成見謝宗卿啓氷霜始嚴筆札未暇漢書樓護與谷永俱為五侯上客長安號曰谷子雲之筆札樓君卿之唇舌又伏慮內庭展一作曩顧稱已推遷謝靈運詩逐物遂推遷外郡寓詞頗乖流品沈吟有日鬱抑經時並見前今則情素坐煎鄒陽上梁王書披心腸見情素驅馳行久諸葛亮出師表遂許先帝以驅馳若猶緘默是負陶甄伏惟曲賜恩鑒誠懸書殿戀積台階比殷浩之空函見為張周封啓情同事異望孫𢎞之東閣漢公孫𢎞傳元朔中封丞相𢎞為平津侯於是起客館開東閣以延賢人與參謀議魂往形留陸雲答兄機詩神往同逝感形留悲參商下情無任感激攀戀一作感戀兢惶之至曹植表貴露下情謹啓為韓同年瞻上河陽李大夫啓箋韓瞻字畏之韓偓父也開成二年與義山同登進士第案李大夫疑即懷州李中丞某啓某材術空虛行能無取揚雄劇秦美新行能無異因緣慰薦晉李密傳有因有緣得一作蒙記姓名劉𢎞一紙之榮方斯未重見為李貽孫啓季布百金之諾比此猶輕見為張周封啓昨者李涿侍御北來全唐詩話河陽從事李承性好奇古與翊善坊保夀寺僧智增善庫中得畫訪於常侍栁公權方知張萱所畫石橋圖按新書公權開成中遷學士承旨涿殆以侍御而為河陽從事者也又蒙降以重言見為張周封啓將之厚意望輝光而便同簮履韓詩外傳孔子逰少原之野有野人哭夫子問焉曰蓍薪而忘簮是以哀非傷亡簮吾所悲者不忘故也賈誼新書楚昭王與吳人戰楚軍走而履決失之行三十步復旋取左右問曰何惜是一踦履乎王曰楚國雖貧豈愛一踦履哉思與偕出弗見與入也在負荷而何啻丘山况某姻婚早聨門館後漢邊韶傳章華賦曰夕回輦于門館外舅以列藩之故爾雅妻之父為外舅家人延自出之恩左傳子産對曰庸以元女大姬配胡公而封諸陳以備三恪則我周之自出重疊依投玉臺新詠西曲歌曰出入見依投綢繆顧遇後漢李固傳奏記梁商曰况受顧遇而容不盡乎北史李弼等傳論曰締構艱難綢繆顧遇東床坦腹早以愧於郗公晉書郗鑒使門生求壻於王導𨗳令就東廂遍觀子弟王氏諸少咸自矜持惟羲之在東床坦腹卧若不聞鑒曰正此佳壻耶遂以女妻之朱邸曳裾復欲階於謝掾謝朓拜中軍記室辭隋王箋朱邸方開效蓬心於秋實善曰諸候朱户故曰朱邸曳裾見為山南啓儻復清風時至丹慊獲申任昉表不任丹慊之至實於生前識其死所伏希恩察謹啓為賀拔員外上李相公啓某啓某聞被彩飾於無用之姿斯須或可垂休光於不報之地始卒攸難至有馬疲而尚服輕軒席敝而猶存華幄戰國䇿嬖色不敝席寵臣不敝軒鮑昭詩棄席思君幄疲馬戀君軒推仁則極備用無聞雖有切於戀思冝自量其涯分嗚呼某者今甚類焉翰柔莫申左思詩弱冠弄柔翰語苦難聽聊憑箋素用寫肺腸伏惟少霽尊嚴猥賜披省某伏思早嵗仰纍深知龍尾貽譏敢通交契魏略華歆邴原管寧三友號曰一龍歆為頭原為腹寧為尾牛心前啖實愧時才見賀相國啓世故推遷年華荏苒並見前葭灰檀火屢變於寒暄周禮烜氏冬取槐檀之火葮灰見前靈濟泥涇遂分於清濁漢溝洫志時人歌曰涇水一石其泥數斗案濟水伏見不常故謂之靈濟後魏文帝祭濟文曰惟瀆暢靈協輝隂辟羈離管札謂佐幕僶俯絃歌謂宰縣顔延之詩僶俯見榮枮名汙栁營漢書河內太守周亞夫為將軍次細柳顔慚花縣白帖晉潘嶽為河陽令遍樹桃李人號河陽一縣花竟以千金乏産漢書諺曰千金之子坐不垂堂三徑無歸三輔決録蔣詡字元卿隱於杜陵舍中三徑惟羊仲裘仲從之逰二仲皆挫廉逃名初服莫從見為栁州表迷津亟問屬者伏幸相公羮梅調味川楫濟時並見前起塌翼於衝風杜甫詩十年猶塌翼楚辭衝風起兮水揚波活枯鱗於涸轍見為張周封啓登諸蘭署轄彼藝籖並見表臺閣移文語薛夏而無取魏志薛夏字宣聲太和中以公事移蘭臺夏報之曰蘭臺為外臺祕書為內閣臺閣一也何不相移之有東南才子並張率以何能南史張率傳率字士簡梁天監中直文德待詔武帝别賜率詩曰東南有才子故能服官政余雖慚古昔得人今為盛未報前叨旋承後顧版圖被召花幕分榮並見前收駑駘於皂棧之中東方朔七諫却騏驥而弗乘兮䇿駑駘而取路莊子伯樂曰我善治馬編之以皂棧刻蚣蝑於樂懸之上説文䉛虡縣鐘鼓之器飾猛獸之象於其足春秋桓公五年秋螽注蚣蝑之屬為災故書案考工記梓人為箰虡天下之大獸五又有小蟲之屬以為雕琢蚣蝑者小蟲之屬也爾雅蟄螽蚣蝑郭璞曰王蜙蜼也俗呼㖺黍勢髙足跌道泰身屯未竭私誠已嬰沈痼況某素無靈氣郭璞詩燕昭無靈氣漢武非仙才夙昧攝生見代僕射表乏單豹養內之功莊子魯有單豹者行年七十而猶有嬰兒之色餓虎殺而食之有張毅者行年四十而有內熱之病以死豹養其內而虎食其外毅養其外而病攻其內闕王吉實下之效漢王吉傳疏曰休則俯仰詘信以利形進則步趨以實下吸新吐故以練臧專意積精以適神于以養生豈不長哉湫底莫適節宣失中左傳子産曰節宣其氣勿有所擁閉湫底以露其體然猶深願待年少酬厚德三醫畢訪列子楊朱之友季梁得疾七日大漸其子謁三醫一曰矯氏二曰盧氏三曰俞氏脈其所疾百藥皆投司馬貞三皇本紀神農嘗百草始有百藥竟非無妄之災易無妄之疾勿藥有喜莫見有瘳之候漢公孫𢎞傳𢎞病甚上書乞骸骨因賜告居數月有瘳視事濱於九死齊語桓公曰管夷吾射寡人中鈎是以濱於死楚辭雖九死其猶未悔敻彼十旬謝朓詩故鄉邈已敻濟曰敻逺也十旬見懷州表取暖則煩加寒必痢髮寧支辨帶不成圍並見前謝述心虛方兹未逮南史謝述字景先小字道兒有心虛疾性理時或乖謬田光精竭比此猶強史記刺客傳田光曰今太子聞光盛壯之時不知臣精已消亡矣豈有尚占職員但尸俸入久塵物議南史謝幾卿傳醉則執鐸挽歌不屑物議且速殘骸況相公職統薄違書圻父薄違時登衆寡周禮鄉大夫以歲時登其夫家之衆寡辨其可任者國中自七尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍任崇按比後漢江革傳每至歲時縣當案比注案驗以比之猶今見閲也務繫孤終周語仲山甫曰古者不料民而知其多少司民協孤終注無父曰孤終死也職是賓僚北史裴延儶傳廣平公贊盛選賓僚以伯茂為文學豈宜虛曠書無曠庶官王猛疏督任弗可虛曠固不可下私微物曲降深慈憫將盡於桑榆淮南子日夕垂景在樹端謂之桑榆妨得材於杞梓左傳聲子曰如杞梓皮革自楚往也惟楚有材晉實用之是以推枕興感攝衾占辭願申斂迹之期以贖曠官之咎祇聽裁旨用息兢惶必也舊履留恩遺簪結念見為韓同年啓恤以孀孤非少淮南子寡婦不孀禮記少而無父謂之孤婚嫁未終不使衰羸便辭祿仕詩序君子遭亂相招為祿仕箋祿仕者苟得祿而巳不求道行致乎外地晞以末光魏都賦彼桑榆之末光未乖念録之仁稍減憂慚之纍吳志諸葛恪傳與弟融書曰憂慚惶惶所慮萬端亞尹諸府别乘近郊亞尹即少尹别乘即别駕負荷無羞左傳古人有言曰其父析薪其子弗克負荷饘糊有繼見為懷州表則猶冀逢十全之藝周禮醫師職曰十全為上十失一次之十失四為下延一日之生重登門牆見獻侍郎啓再就埏埴老子埏埴以為器是所願也非所望也詞多力殆感極集作深涕繁避席承言未卜曽參之侍孝經仲尼居曽子侍子曰先王有至德要道以順天下民用和睦上下無怨汝知之乎曽子避席曰參不敏何足以知之封函抒款畏遺殷浩之書見為張周封啓瞻望清光實動魂守管輅别傳何宴之視候魂不守宅血不華色伏惟特賜鑒察為同州任侍御憲上崔相國啓箋考新書宰相世系表任憲字亞司髙宗相雅相來孫也崔鄲崔珙相文宗崔鉉相武宗崔龜從崔慎由相宣宗自開成以至大中作相者有五崔焉此崔相國者不知謂誰據啓云彰明下武恢拓中華不舞梯䡴不鳴金鼓復數千里之沃野刷十五聖之包羞則此崔相國謂龜從也舊書宣宗紀大中二年十一月以户部侍郎判度支崔龜從本官同平章事三年春正月涇原節度使康季榮奏吐蕃宰相論恐熱以秦原安樂三州及石門等七關之兵民歸國詔靈武邠寧各出本道兵馬應接其來七月三州七關軍人百姓皆河隴遺黎數千人見於闕下上御延喜門撫慰令其解辮賜之冠帶八月下制曰左衽輸款邊壘連降刷恥建功所謀必尅實樞衡妙算將帥雄稜副玄元不爭之文絶漢武逺征之悔與此啓所謂不舞梯䡴不鳴金鼓意正相合又唐與吐蕃和親自髙祖至武宗凡十五帝至宣宗而吐蕃始弱來歸故地會昌一品集序云唐葉十五帝諡昭肅昭肅者武宗也故曰刷十五聖之包羞其為龜從無疑矣舊書龜從傳云大中四年同平章事非也新書亦承其誤以此啓證之宣紀為是憲啓憲質異楚材見為賀拔員外啓寶同燕石見為張周封啓重以羈丱詩總角丱兮榖梁傳羈貫成童不就師傅父之罪也貫與丱通即丁憫凶瞻遺構以闕然不堪多難奉成書而未就並見前無處求生庾信賦傅燮之但悲身世無處求生藐是流離庾信賦藐是流離至于暮齒屢經寒暑詩載離寒暑逮於一作乎既冠禮記男子二十而冠猶恤無家見為鹽州狀叨承師友之規獲忝簪纓之列此皆相公推孔李之素分後漢書孔融字文舉年十歲隨父詣京師時河南尹李膺融造膺門語門者曰我是李君通家子弟門者言之膺請融問曰髙明祖父常與僕有恩舊乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君纍世通家衆坐莫不歎息念髙國之舊家左傳齊侯伐晉夷儀敝無存之父將室之辭以與其弟曰此役也不死反必娶於髙國鎪朴雕頑魏都賦木無雕鎪抉聾抉聵沐膏雨以令植詩芃芃黍苗陰雨膏之假順風而使飛見為河南表不然則安得獲驪龍之珠見為栁圭啓假獬豸之角新書法冠者御史大夫中丞御史之服也一名獬豸冠榮皆過望感豈勝言而猶悵望下風左傳晉大夫三拜稽首曰羣臣敢在下風徘徊髙義望賀燕以難去見為李貽孫啓撫棲烏而不安者魏武樂府月明星稀烏鵲南飛繞樹三匝何枝可依蓋以相公以伊皋之事業佐大君以揚馬之文章輔昌運一登宣室漢賈誼傳文帝思誼徴之及入見上方受釐坐宣室遂借前籌見為濮陽公狀以有征無戰之方蜀志詔曰王者之兵有征無戰彰明下武以永逸暫勞之勢揚雄諫不受單于朝書不一勞者不久佚不暫費者不永寧恢拓中華不舞梯䡴不鳴金鼓左傳金鼓以聲氣也梯䡴見檄文復數千里之沃野漢張良傳關中左殽函右隴蜀沃野千里刷十五聖之包羞易否六三包羞案吐蕃和親自貞觀始髙祖尚未與之通太宗至武宗實十四聖也彼圍疑作違穀而穀人不知左傳齊陳成子救鄭及留舒違穀七里穀人不知入鄭而鄭陴皆哭左傳宣公十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨於大宫且巷出車吉國人大臨守陴者皆哭方兹決勝彼有多慚今百職聿修九功一作五功非咸敘書九功惟敘萬國佇登封之禮五山傾望幸之祥史記封禪書天下名山八而三在蠻夷五在中國華山首山太室大山東萊此五山黃帝之所常遊與神會漢郊祀志郡國各除道繕治宫館名山神祠所以望幸矣五山謂五嶽也鰈至鶼來封禪書東海致比目之魚西海致比翼之鳥韋昭曰各有一目不比不行其名曰鰈各有一翼不比不飛其名曰鶼鶼茅歸楛入書荆州貢包匭菁茅魯語武王克商肅慎氏貢楛矢石砮馳湯驟夏轢漢陵周班固典引孕虞育夏甄殷陶周若某者雖不能行舞舜戈戈當作干書帝乃誕敷文德舞干羽于兩階七旬有苗格坐耕堯壤見為滎陽公狀至於獻千載河清之序拾遺記丹邱千年一燒黃河千年一清皆至聖之君以為大瑞初學記宋元嘉中河濟俱清鮑昭張暢俱作河清頌裁二王助祭之詩詩序振鷺二王之後來助祭也歌咏相庭發揮帝載則其志願亦或庶幾伏希孫閣時開見為絳郡公啓邴茵多恕漢丙吉傳馭吏耆酒常從吉出醉歐丞相車上西曹主吏白欲斥之吉曰此不過汙丞相車茵耳遂不去也克懋山公之德晉書嵇紹字延祖魏中散大夫康之子也十歲而孤事母孝謹以父得罪靖居私門山濤領選啓武帝詔徵之起家為祕書丞終全趙氏之孤見為張周封啓擁篲瞻門見為某先輩啓封函即路南史朱齡石傳為元帥伐蜀帝别有函封付齡石署曰至白帝乃開苑沙宫樹見為同州啓雖吟左輔之風煙漢地里志左馮翊髙陵縣左輔都尉治謝朓詩風煙四時犯良夜慶霄謝曕詩慶霄薄汾陽注即慶雲也唯望中台之晷度玉海事始曰黃帝以風后配上台天老配中台五聖配下台為三公也感恩撫已誓志投誠仰惟輝光終賜埏埴下情無任感激攀倚一作荷惶戀之至為舉人上翰林蕭侍郎啓箋按元和六年蕭俯充翰林學士二年罷穆宗時為門下侍郎計俯為翰林時義山甫十餘齡代人恐太早惟蕭浣有祭蕭侍郎文及哭遂州蕭侍郎詩然浣又未嘗為某啓某聞師曠之琴不鼓之則無以召玄鶴韓子師涓鼓新聲平公問師曠此何聲也曰清商公曰最悲乎師曠曰不如清徴援琴一奏有玄鶴二八道南方來集於郭門之扈再奏而列三奏延頸而鳴舒翼而舞音中宫商瑞應圖玄鶴王者知音樂之節則至白帖鶴滿三百六十歲則色純黑楊羲之石不用之即無以聘應龍薛瑩龍女傳震澤中洞庭山南有洞穴梁武帝召問杰公公曰此洞穴蓋東海龍王第七女掌龍王珠藏若遣使通信可得珠寶有甌越羅子春兄弟上書請通帝命杰公問曰汝家制龍石尚在否答曰在謹齎至都試取觀之公曰汝此石能制徴風召雨戎虜之龍不能制海王珠藏之龍昔桐柏真人教楊求羲許謐茅容乘龍各贈制龍石一片今亦應在帝敕命之於茅山華陽隱居陶𢎞景得石兩片公曰是矣山海經應龍處南極殺蚩尤與夸父不得復上應龍遂在地故下數旱旱而為應龍狀乃得大雨物既有之言亦猶是伏惟侍郎學士絪緼降秀翕闢資華易天地絪緼萬物化醇又夫坤其靜也翕其動也闢天上比方但有文星粗爾人間擬議未將泰華為然並見前爰自妙齡遂肩名輩當時人物漢書有古今人物表何戢惟效於褚公南史何戢傳戢字惠景美容儀動止與褚彥回相慕時人號為小褚公邇日風流南史王儉傳儉常謂人曰江左風流宰相惟有謝安蓋自況也杜乂難方於衛玠晉書衛玠字叔寶風神秀異或問杜乂可方衛洗馬否劉惔曰杜乂膚清叔寶神清世説注杜𢎞治面如凝脂眼如點漆粗可得方諸衛玠加以𢎞成與石西京雜記𢎞成子有人授以文石吞之遂為通儒後成子病吐出文石以授五鹿充宗又為碩學也郭璞傳豪見為山南啓渙水倘來皆逢藻繢陳琳為曹洪與魏文帝書遊睢渙者學藻繢之䌽善曰漢書灌嬰睢陽販繒者也陳留記襄邑渙水出其南睢水經其北傳云睢渙之間出文章故其黼黻絺繡日月華蟲以奉於宗廟御服焉荆峯若至只有璆琳莊子南方有鳥其名為鳳以璆琳琅玕為食合沓縑緗沈約詩合沓共隱天縱橫筆硯髙唐賦縱橫相追三都作序不勞皇甫士安見為某先輩啓萬乘為寮只有東方曼倩夏侯湛東方朔畫贊大夫諱朔字曼倩平原厭次人也戲萬乘若寮友況從近歲且有外虞傅介子在樓蘭國中竒功未就漢傅介子傳介子至樓蘭謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之刃交胸立死封介子為義陽侯班仲升於玉門關外報命猶賖見代安平公表雖太平之業已隆見賀相國啓而震耀之威尚作漢書敘傳天威震耀侍郎又綢繆武帳漢汲黯傳武帝嘗坐武帳中黯前奏事孟康曰今御武帳置兵闌五兵於帳中也密勿皇圖班固東都賦披皇圖稽帝文九天九地之兵寧因舊學北堂書鈔太公兵法云武王曰休息士衆皆有處乎太公曰休兵頓息如從九天之上向九地之下獨往獨來有莫見者書盤庚豫小子舊學于甘盤七縱七擒之術固已玄通北堂書鈔漢晉春秋曰諸葛亮征南中所在戰捷既得孟獲使觀於營陳之間問曰此軍何如獲對曰向者不知虛實故敗今蒙賜觀看營陳若祇如此即定易勝耳亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣蔡雍郭有道碑於休先生明德玄通用視草之工見為汝南公表解按劍之怒説苑秦王按劍而坐鮑照詩天子按劍怒使者遙相望手為天馬真誥手為天馬鼻為仙源心繪國圖梁書裴子野傳敕使撰方國使圖自要服至海表凡二十國九重之中見為成魏州表暫煩前箸見為濮陽公狀萬里之外輒敢衡車衡疑作衝春秋感精符作衝車厲武將魏明帝紀注郝昭守陳倉城諸葛亮起雲梯衝車以臨城位誠在於論思功已參於鎮撫左傳鄧曼曰夫固謂君訓衆而好鎮撫之箋舊書吐番冦涇原命中使以禁軍援之穆宗謂宰臣曰用兵有必勝之法乎俯對曰兵者凶器戰者危事聖王不得巳而用之如或縱肆小忿輕動干戈使敵人怨結師出無名非惟不勝乃自危之道也固宜深慎帝然之圖書之府鼎鼐之司伊咎懸遺悵一作為恨之誠夔説貯妨賢之愧説苑虞邱子謂楚莊王曰臣為令尹處士不升妨羣賢路載惟後命左傳齊侯將下拜孔曰且有後命夫豈踰時抑某又聞之昔管仲經邦賓客有二管子管仲會國用二在賓客其一在國周公待士吐握皆三見為某先輩啓邴丞相之車茵寧彈醉客見為同州啓平津侯之賓館不礙布衣見為絳郡公啓並脂粉簡編徐陵王勱碑網羅圖史脂粉藝文冠纓圖史北史崔浩傳國家積德著在圖史後之披卷南史王藻傳書拱袂而披卷皆若升堂侍郎美譽旁流晉王羲之傳羲之少有美譽髙節彌折漢田蚡傳非痛折節以禮屈之天下不肅擔簦者成市躡蹻者如雲並見前此乃前賢後賢不殊軌轍往哲來哲非異門牆縱燕有黃金之臺見上尚書啓齊為碣石之館見為濮陽公狀料其棟宇易上棟下宇以待風雨必已荒蕪魏都賦肴函荒蕪若某者陋若左思醜同王粲鬚眉不及於崔琰腰腹無預於鄭玄若值庭蘭並見前固多慚德書成湯放桀于南巢惟有慚德如逢巖電見為先輩啓不望齊名後漢黨錮傳范滂母曰汝今得與李杜齊名死亦何恨重以惠劣禰生惠與慧同後漢書禰衡字正平少有才辨嘗讀蔡雍所撰碑文一覽識之孔融薦禰衡表目所一見輒誦於口耳所暫聞不忘於心性與道合思若有神專非董氏漢董仲舒傳下帷講誦三年不窺園其精如此殊顔回之易鑄揚子或曰人可鑄與曰孔子鑄顔回矣若宰我之難雕見論語徒欲萬卷咸披博物志蔡雍有書近萬卷漢末年載數車與王粲且乏五行俱下後漢應奉傳奉字世叔讀書五行俱下叨從歲賦元稹酬白居易詩昔歲俱充賦勉致文編户户醬瓿唯聞見辱漢書揚雄著太玄劉歆曰恐後人用覆醬瓿也人人虀臼不肯留題世説魏武帝常過曹娥碑下楊修從碑背上見題作黃絹幼婦外孫虀臼八字修曰黃絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辭所謂絶妙好辭也再困於魚登見為同州啓一慚於雁序原注其長兄兩舉及第禮記兄之齒雁行然而天付直氣家傳義方左傳教之以義方弗納于邪雖在顓蒙不苟述作廣絶交之論抑有旨焉南史任昉諸子流離不能自振生平舊交莫有收恤西華冬月著葛披練裙道逢劉孝標泫然矜之乃著廣絶交論以譏其舊交曰古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絶有旨哉有旨哉到溉見論抵之於地終身恨之移太常之書非無一作敢為也漢書劉歆欲建立左氏春秋及毛詩逸禮古文尚書皆列于學官哀帝令歆與五經博士講論其義諸博士或不肯置對歆因移書太常博士責讓之頃者曽干閽侍獲拜堂皇漢胡建傳諸列校坐堂皇注無壁曰皇既容納之有加隋文四子傳詔曰容納不逞遂希望之滋甚南史梁宗室傳更收士衆希望非常爾後以毛傷崇一作榮彈南齊書垣榮祖善彈彈鳥毛盡而鳥不死海鵠羣翔榮祖登城西樓彈之無不折翅而下南史垣榮祖字華先崇祖從父兄也善彈登西樓見翔鵠雲中謂左右當生取之于是彈其兩翅毛脫盡墜地無傷養毛生後飛去其妙如此案二史所載則崇作榮為是然二名截去祖字而又不著其姓殊覺未安不如云垣彈為無弊也鱗損任鉤莊子任公子為大鈎投竿東海期年不得魚已而得大魚浙河以東蒼梧以北無不厭若魚者拔刺不遷謝靈運賦魚水深而拔刺韻會魚跳蹳刺蹳北末切刺郎達切噞喁無暇左思賦泝洄順流噞喁沈浮既乖受教便以經時古詩但感别經時今孝秀員一作爰來員與云同隋書詔曰四海之內豈無孝秀風霜巳積秦人屢出自欲焚舟左傳秦伯伐晉濟河焚舟取王宮及郊晉人不出遂自茅津濟封殽尸而還楚卒數奔誰教拔斾左傳晉人或以廣隊不能進楚人懸之脫扄少進馬還又惎之拔斾投衡乃出顧曰吾不如大國之數奔也是以更持魚目當夜肆以沽諸任昉到大司馬記室箋維此魚目唐突璵璠注魚目似珠張協雜詩魚目笑明月復挈豚蹄祝天時之未巳史記滑稽傳淳于髠曰有禳田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所持者挾而所欲者奢故笑之義誠多愧志亦可憐倘蒙猶枉鉛華洛神賦鉛華不御更施丹雘書若作梓材既勤撲斫惟其塗丹雘俾其恩地不在他門雖不及采椽韓子堯舜采椽不刮茅茨不翦備枝梧於大厦漢項籍傳莫敢枝梧如淳曰梧音吾枝梧猶枝扞也臣瓚曰小柱為枝邪柱為梧今屋梧邪柱是也文中子大厦之顛非一木所支亦庶乎秭米莊子計中國之在海內不似秭米之在太倉乎增流衍於神倉左思吳都賦觀海陵之倉則紅粟流衍禮記季秋之月藏帝籍之收於神倉與夫九九之能一作推管子虙戲作九九之數以合天道而天下化之韓詩外傳齊桓公設庭燎為便人欲造見者期年而士不至於是東野有以九九見者漢梅福傳上書曰齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算書若今九章五曹之輩猶或萬萬相逺木華海賦萬萬有餘誠深詞切聲急響煩仰郭泰之龜龍蔡雍郭有道碑先生諱泰字林宗望形表而影附聆嘉聲而響和者猶百川之歸巨海鱗介之宗龜龍也望仲尼之日月見論語濡毫伏紙晉劉琨傳臣俯尋聖旨伏紙飲淚億萬常心干冒尊嚴伏用戰灼晉王濬傳上書曰豈惟老臣獨懷戰灼謹啓為崔從事福寄尚書彭城公啓福啓福聞雀辭楊館常懷寶篋之恩見謝座主啓燕别張巢永結雕梁之戀燕别張巢未聞或引張建封妾關盼盼燕子樓事以當之然義山去建封時不逺恐未必遂據為故實也今按南史孝義傳張景仁下附衛敬瑜妻事云妻年十六而敬瑜亡父母舅姑咸欲嫁之女截耳置盤中為擔乃止所住户有燕巢常雙飛來去後忽孤飛女感其偏棲乃以縷繫腳為志後歲此燕果復來猶帶前縷女為詩曰昔年無偶去今春猶獨歸故人恩獨重不忍復雙飛此與永結雕梁之戀語意頗合啓曰張巢恐後人誤以為景仁之事而妄改未可知也推誠況物某有類焉始者尚書晞髮丹山屈原九歌晞汝髮兮陽之阿山海經丹穴之山有鳥名曰鳳皇騰身紫府雲笈七籖軒轅本紀東到青邱見紫府先生受三皇內文大字以劾召萬神曉趨清禁則瓊樹一枝李陵贈蘇武詩思得瓊樹枝以解長飢渴夜直皇闈則金釭二等何晏景福殿賦落帶金釭此焉二等漢書趙昭儀居昭陽舍壁帶往往為黃金釭注壁帶壁之橫木露出如帶者以金為釭若車釭之形釭音工人寰莫見塵路難逢而某志在諱窮莊子孔子曰我諱窮久矣而不免命也勇於求益見論語輒干皂隸左傳皂隸之事官司之守自露菲葑詩采葑采菲無以下體寶肆回腸雲笈七籖恍若晨景之曄寶肆司馬遷書腸一日而九回只期和氏見為栁圭啓醫門投足莊子醫門多疾張衡應問捷徑邪至吾不忍以投足永念倉公史記太倉公者齊太倉令姓淳于氏名意傳黃帝扁鵲之脈書五色疹病知人之死生果蒙愍彼顓愚溢為品目勾萌始達依周囿以揚一作陽翹陸機擬古詩譬彼向陽翹月令勾者畢出萌者盡達滴瀝才分託靈光而振響王延夀魯靈光殿賦動滴瀝以成響殷雷應其若驚善曰言簷垂滴瀝才成小響室內應之其聲似雷之驚也遙輕集作輕軒是短羽晉葛洪傳大塊稟我以尋常之短羽驟化窮鱗劉長卿詩滄海一窮鱗每欲陶冶肺肝耕耘筆硯華嶠後漢書班超投筆歎曰大丈夫安能久事筆耕乎粗調宫徵以謝陽秋孫盛著晉陽秋陽秋即春秋也避鄭太后諱故以春為陽而義有多塗情非一概辭煩轉野意密彌賖雖塗逭如韓遂之書魏武帝紀馬超與韓遂等叛超等屯渭南公與遂書多所點竄如遂改定者超等愈疑遂案塗逭猶塗竄也反覆若一作類葛洪之紙晉葛洪傳洪躬自伐薪以貿紙筆夜輒寫書習誦以儒學知名藝文類聚抱朴子曰洪家貧常乏紙每所寫皆反覆有字人少能讀終無髣佛可得端倪見為河東公啓去歲洛陽獲陪良宴頻趨絳帳見為山南啓纍坐青氊見為滎陽公表況聞懇拒台階請從藩屏舉郗超之幕畫世説桓宣武與郗超議芟夷朝臣條牒既定其夜同宿明晨起呼謝安王坦之入擲疏示之郗猶在帳內謝含笑曰郗生可謂入幕賓也數阮瑀之軍書魏志阮瑀字元瑜文帝與吳質書曰元瑜書記翩翩致足樂也漢息夫躬傳軍書交馳而輻輳懸以嘉招形於善謔詩善戲謔兮不為虐兮何言違阻復積光陰潼水千波並見前巴山萬嶂元和郡縣志巴嶺在南鄭縣南一百九里東濱漢江與三峽相接漢中舊志巴山綿亘深逺冬夏積雪不消中包孤雲兩角米倉諸山南接四川巴州之小巴山接漏天之霧雨寰宇記戎州宜賓縣二山四時霑霖俗謂小漏天大漏天洽聞記南廣水南二百里漏天窮年密雲不見日月晏殊類要大梨山小梨山在開邊縣界四時霖霔不絶俗人呼為大漏天小漏天其山自嘉州以來每峯相接髙低隱伏奔走三峽其狀難名隔嶓冡之煙霜書嶓冡導漾東流為漢唐六典山南道名山曰嶓冡元和郡縣志嶓冢山在興元府金牛縣東二十八里按金牛故城在今陜西漢中府寧羌州西北嶓冡山在州北九十里漢水出焉皓月圓時樹有何依之鵲見前啓悲風起處巖無不斷之猿李陵答蘇武書但聞悲風蕭條之聲格物論猿性急而腸斷哀鳴則腸俱斷而死煎向義之初心軫懷仁之徑氣竊惟秦鏡西京雜記髙祖初入咸陽宫有方鏡廣四尺髙五尺九寸表裏洞明直來照之影則倒見以手掩心即見腸胃五臟當察衛桃韓子彌子瑕有寵於衛君食桃而甘不盡以其半啖君君曰愛吾哉及色衰愛弛君曰是固嘗啖吾以餘桃昨伏承擁節浚郊詩孑孑干旄在浚之郊建牙隋岸見代僕射表將求捧幣申好裂裳就塗墨子公輸欲以楚攻宋墨子聞之自魯往裂裳裹足十日至郢接枚叟之餘光奉鄒生之末座見為栁圭啓又伏慮旋登殷夢見太尉序俄奉周畋見賀相國啓徴詔巳行拜塵無及晉潘嶽傳嶽與石崇等諂事賈謐每候其出與崇輒望塵而拜徘徊失措抑鬱誰聊並見前必也華榻長懸袁宏漢紀陳蕃在豫章為徐稚獨設一榻去則懸之簡書無廢即割任安之席堪哂無圖史記任安與田仁俱為衛將軍舍人衛將軍從此兩人過平陽主主家令兩人與騎奴同席而食此兩人拔刀割斷席别坐負田叔之鈐可嗟非據當作鉗史記田叔傳叔為趙王張敖郎中漢下詔捕趙王惟孟舒田叔等十餘人赭衣自髠鉗稱王家奴隨趙王敖之長安伏惟慎安寢膳勉護興居徐陵書願百年之老興居多福早秉信圭速調大鼎並見前至於禱祝實倍等倫半菽思貯於神倉漢書項羽曰歲飢人貧卒食半菽神倉見前一勺願投於靈海禮記今夫水一勺之多木華海賦於廓靈海長為委輸道之云逺更開殷浩之函書不盡言重灑楊朱之淚並見前攀戀感激不知所裁伏惟俯賜鑒照謹啓上兵部相公啓箋舊書大中四年十月翰林學士承旨兵部侍郎令狐綯守本官同中書門下平章事商隱啓伏奉指命令書元和中太清宫寄張相公舊詩上石者舊書天寶二年三月改西京玄元廟為太清宫東京為太微宫天下諸郡為紫極宫新書宰相表元和九年六月河中節度使張𢎞靖為刑部尚書同中書門下平章事昨一日書訖伏以賦曠代之清詞宣當時之重德昔以道均稷契始染江毫見為山南啓今幸慶襲韋平見為李貽孫啓仍鐫宋石見為張周封啓依於檜井括地志苦縣在亳州谷陽縣界有老子宅及廟廟中有九井尚存北史王劭傳陳留老子祠有枯柏爾雅柏葉松身曰檜陷彼椒牆謂刻詩於石陷置壁間也椒牆即椒壁按唐祖玄元故其廟飾一如宫禁文選注向曰椒房以椒塗壁后妃居之扶持固在於神明魯靈光殿賦序自西京未央建章之殿皆見隳壞而靈光巋然獨存豈非神明依憑支持以保漢室者也悠久必同於天地見中庸況惟陋質早預生徒仰夫子之文章夫子謂令狐楚曽無具體辱郎君之謙下郎君謂綯應璩與滿公琰書外慕郎君謙下之德內幸頑才見誠知巳銑曰滿炳父寵為太尉璩嘗事之故呼曰郎君尚遣濡翰劉楨詩敘意於濡翰空塵寡和之音謂綯詩見謝河東公啓素乏入神之妙謂巳書張懷歡書斷李斯小篆入神大篆入妙伯喈八分飛白入神大篆小篆隸書入妙恩長感集格鈍漸深但恐涕洟易齎咨涕洟終斑琬琰詩赤刀大訓𢎞璧琬琰在西序周禮考工記曰琬圭琰圭皆九寸下情無任戰汗之至上時相啓商隱啓暮春之初甘澤承降既聞霑足詩既霑既足生我百榖又欲開晴實關燮和克致豐阜繁隂初合則傅説為霖書説命若歲大旱用汝作霖雨媚景將開則趙衰呈日獲依恩養定見升平並見前絶路左之喘牛用驚邴吉見代安平公表無廏中之惡馬以役任安見為某先輩啓偃仰興居詩或棲遲偃仰惟有歌詠瞻仰一作望闈闥不勝肺肝謹啓上河東公啓三首商隱啓兩日前於張評事處伏覩手筆兼評事傳指意於樂籍中賜一人崔令欽教坊記西京右教坊在光宅坊左教坊在延政坊右多善歌左多工舞東京兩教坊俱在明義坊而右在南左在北也按凡妓女隸教坊籍以備紉補禮記內則曰衣裳綻裂紉針請補綴某悼傷巳來箋本傳王茂元鎮河陽愛其才表掌書記以子妻之本集有王十二兄與畏之員外相訪見招小飲時豫以悼亡日近不去因寄詩光陰未幾梧桐半死枚乘七發龍門之桐髙百尺而無枝其根半死半生方一作才有述哀江淹雜體詩有潘黃門嶽述哀良曰謂悼婦詩靈光獨存且兼多病眷言息胤不暇提攜禮記長者與之提攜或小於叔夜之男見為同州啓或幼於伯喈之女白帖蔡琰字文姬雍之女也雍夜鼓琴絃絶琰年六歲曰第二絃雍曰偶中耳檢庾信荀娘之啓庾信集有謝趙王賚息荀娘絲布啓常有酸辛杜甫詩鏤骨抱酸辛詠陶潛通子之詩陶潛責子詩通子年九齡但覓梨與栗每嗟漂泊許靖與曹公書漂薄風波薄泊同所賴因依德宇魏志王粲等傳評曰然其沖虛德宇未若徐幹之粹也馳驟府庭南史謝朓傳箋曰榮立府庭恩加顔色方思效命旌旄不敢載懷鄉土錦茵象榻潘嶽寡婦賦易錦茵以苫席戰國策孟嘗君之楚獻象牀其直千金石館金臺並見前入則陪奉光塵見為張周封啓出則揣摩鉛鈍史記蘇秦傳得周書陰符伏而讀之期年以出揣摩曰此可以説當世之君矣兼之早歲志在玄門漢陳湯傳湯曰是所謂玄門開及到此都更敦夙契徐陵為貞陽侯書親鄰之道夙契逾深自安衰薄禰衡鸚鵡賦嗟祿命之衰薄微得端倪至於南國妖姬古詩美人出南國灼灼芙蓉姿藂臺妙妓漢地里志藂臺在邯鄲趙武靈王築古詩燕趙多佳人美者顔如玉曹植七啓才人妙妓遺世絶俗雖有涉於篇什實不接於風流況張懿仙本自無雙古詩精妙世無雙曽來獨立漢李延年歌北方有佳人絶世而獨立既從上將又託英寮汲縣勒銘方依崔瑗見為安平公表漢庭曳履猶憶鄭崇漢書鄭崇字子遊擢尚書僕射數諫諍每見曳革履上曰我識鄭尚書履聲寧復河裏飛星陳留耆舊傳張寬從漢武帝祀甘泉至渭橋有女子浴于渭乳長七尺帝怪問之女曰帝後七車侍中知之時寬在第七車曰齋戒不潔女人星見雲間墮一作墜月謝靈運詩可憐誰家郎緣流乘素舸但問情若為月就雲中墮窺西家之宋玉宋玉登徒子好色賦臣東家之子嫣然一笑惑陽城迷下蔡然此女登牆窺臣三年至今未許也恨東舍之王昌襄陽耆舊傳王昌字公伯為東平相散騎常侍早卒婦任城王子文女也樂府人生富貴何所望恨不早嫁東家王誠出恩私非所宜稱伏惟克從至願賜寢前言使國人盡保展禽家語魯人有獨處室者鄰之婺婦室壞趨而託焉魯人閉户不納婦人曰子何不如栁下惠然嫗不逮門之女魯人曰栁下惠則可我固不可注以體覆之曰嫗酒肆不疑阮籍世説阮公鄰家婦有美色當壚沽酒阮與王安豐常從婦飲酒阮便醉眠其婦側夫始殊疑之伺察終無他意則恩優之理何以加焉干冒尊嚴伏用惶灼謹啓二商隱啓某聞周朝貝葉列妙引於王褒周王褒經藏願文盡天竺之書窮貝多之葉梁日枳園灑芳詞於沈約梁沈約枳園寺剎下石記晉故車騎將軍琅琊王劭於太祖文獻公清廟之北造枳園精舍必資乎鴻筆麗藻劉協文心雕龍鴻筆之徒莫不洞曉劉峻廣絶交論遒文麗藻方駕曹王刻乎貞金翠珉然後可以充足人天景德傳燈録佛年十九欲出家號人天師發揮龍象易六爻發揮旁通情也大智度論水行龍力大陸行象力大故負荷大法者比之龍象苟其曖昧何晏景福殿賦其奧祕則翳蔽曖昧即匪莊嚴得無姤女經何等為四一種種妙衣莊嚴法座爰託亨塗夙聞妙喻雖從幕府東觀漢記衛青大克胸奴武帝拜大將軍於幕中因號幕府常在道場惠忠禪師安心偈直心真實菩薩道場法苑珠林古德寺誥或名道場即無生廷也或名為寺即公廷也或名淨住舍或名法同舍或名出世間舍或名精舍或名清淨無極園或名金剛淨剎或名寂滅道場或名逺離惡處或名親近善處猶恨出俗情微破邪功少二百日斷酒有謝蕭綱梁簡文帝集答湘東王書曰吾自至都以來意志忽恍雖開口而笑不得真樂不復飲酒垂二十旬十一年長齋多慚王奐南齊書王奐為都督諸軍事雍州刺史上謂王晏曰奐於釋氏實自專至其在鎮或以此妨務後有罪被收奐聞兵入禮佛未及起軍人斬之按史但言奐奉佛而無十一年長齋之文蓋見他書仰戀東閣見為絳郡公啓未歸西林髙僧傳沙門慧永居在西林與慧逺同門遊好遂邀同止刺史桓伊以學徒日衆更為逺建東林寺近者財俸有餘津梁是念華嚴經贊苦海作津梁適依勝絶微復經營伏以妙法蓮華經者諸經中王妙法蓮華經如帝釋於三十三天中王此經亦復如是諸經中王最尊最勝瑞應經迦葉二弟問迦葉曰今乃捨梵志道學沙門法豈獨大其道勝乎迦葉答曰言佛道最勝因果經我於一切天人之中最尊最勝始自童幼常所護持法苑珠林先白衆僧曰佛法難值應共護持或公幹漳濱有時疾疢見為懷州表或謝安海上此日風波世説謝太傅盤桓東山時與孫興公諸人泛海戲風起浪涌孫王諸人色並遽便唱使還太傅神情方王吟嘯不言舟人以公貌間意説猶去不止既風轉急浪猛諸人皆喧動不坐公徐云如此將無歸衆人即承響而回恍惚之間老子道之為物惟恍惟惚感驗非少今年於此州常平山慧義精舍經藏院明一統志四川潼川州北有長平山岡長而平蓋即此所謂常平山也州本唐梓州為東川節度使治所釋迦譜息心所棲故曰精舍髙僧傳漢明帝於城外立精舍以處摩騰焉即白馬寺也文選有謝靈運石壁精舍還湖中詩謝靈運集有石壁立招提精舍詩特創石壁五間金字勒上件經七卷白帖梁武帝於元光殿坐師子座講金字經既成勝果思託妙音勝果見第三啓妙音見下文伏惟尚書有夫子之文章備如來之行願不逢慧逺已飛廬嶽之書髙僧傳慧逺屆潯陽見廬峯清淨更立房殿即東林寺是也司徒王謐護軍王默等並欽慕風德遙致師敬謐修書曰年始四十而衰同耳順逺法師廬山記山在江州潯陽郡左挾彭澤右傍通川有匡俗先生出自殷周之際遁世隱時潛居其下未見簡棲便制頭陀之頌姓氏英賢録王屮字簡栖琅邪臨沂人也有學業為頭陀寺碑文詞巧麗為世所重碑在鄂州題云齊國録事參軍琅邪王屮製屮音徹是故右繞三匝法華經右繞三匝合掌恭敬仰希一言庶使鵝殿增輝鵝殿即佛坐殿多種經中皆有此名佛遊天竺國記達嚫國有迦葉佛伽藍穿大石作之有五重最下為鴈形鴈堂毗舍離為佛作堂形如鴈字按爾雅云舒鴈鵝鵝亦鴈之屬也龍宫發色法華經智積菩薩問文殊師利仁往龍宫所化衆生其數幾何復庵和尚華嚴論贊龍樹菩薩發心入龍宫看藏流傳沙界金剛般若經諸恆河所有沙數佛世界如是寧為多否彌陀疏抄恆河在西域無熱河側沙至微細佛近彼河説法震動風輪法華經大通智勝佛得阿耨多羅三藐三菩提時十方各五百萬億諸佛世界六種震動楞嚴經故有風輪執持世界觀佛三昧經金翅鳥王從金剛直下從大水際至風輪際為風所吹報恩於蓮目果脣法華經妙音菩薩目如廣大青蓮華葉又曰如來甚希有以功德智慧故脣色赤好如頻婆果按佛氏有報恩經奪美於江毫蔡絹並見前伏希道念特降神鋒見端午啓瞻望旌幢攜持砧斧曝身晞髮以候還辭無任邈迫之至謹啓三商隱啓伏奉榮示伏蒙仁恩賜撰金字法華經記一首正冠薦笏跪捧伏讀聽儀鳳之簫管祇恐曲終書簫韶九成鳳凰來儀對仙客之棋枰仍憂路盡晉書王質入山斫木見二童圍碁坐視之及起斧柯巳爛矣世記嵩髙山北有大穴晉初常有一人誤墮穴中循穴而行計可十許日忽曠然見明又有草屋中有二人對坐圍棋棋局下有一杯白飲墜者飲之出問張華華曰此仙館大夫所飲者玉漿也説文棋局為枰欣榮羡慕造次失常前者爰託翠珉將翻貝莢酉陽雜俎貝多出摩伽陀國西土用以寫經長六七文經冬不凋方資護念法華經教菩薩法佛所護念粗冀標題南史宋宗室傳義康稠人廣坐每標題所憶以示聰明換骨惟望於一丸漢武內傳王母謂帝曰子但愛精握固閉氣吞液一年易氣二年易血三年易精四年易脈五年易髓六年易骨七年易筋八年易髮九年易形杜甫詩相哀骨可換亦遣馭清風魏文帝詩西山一何髙高高殊無極上有兩仙童不飢亦不食與我一丸藥光耀有五色服藥兩三日身輕生羽翼剜身止求於半偈知玄三昧懺轉輪聖王為求佛法有一婆羅門言若能就王身上剜作千瘡灌滿膏油安施燈炷然以供養者我當為汝解説佛法涅槃經佛言我念過去作婆羅門在雪山中修菩薩行時天帝釋即下試之自變其身作羅剎像住菩薩前口説半偈云諸行無常是生滅法菩薩即語羅剎但能具足説是偈竟我當以身奉施供養豈謂尚書載持夢筆仰拂文星並見前入不二法門維摩經文殊師利問維摩詰何等是菩薩入不二法門時維摩詰默然無言文殊歎曰善哉乃至無有文字語言是真入不二法門住第一義諦十輪經諸佛菩薩辟支及四沙門果是七種人名為第一義僧在家得勝果者亦名為第一義法苑珠林梁武帝問達摩如何是聖諦第一義答曰廓然無聖儒童菩薩始作仲尼造天地經寶厯菩薩下生世間號曰伏羲吉祥菩薩下生世間號曰女媧摩訶迦葉號曰老子儒童菩薩號曰仲尼金粟如來方為摩詰發迹經淨名大士是往古金粟如來維摩經毗邪離城中有長老名維摩詰鋪舒於無上金剛般若經無上甚深微妙法藻輝於至尊法苑珠林故經中來至佛所云南無無所著至真等正覺是名口業稱歎如來德也而又以七喻之微法華經七喻火宅窮子藥輩化城繫珠頂珠醫子載教乘法數較五常之要一作典列子楊朱曰人肖天地之類懷五常之性漢禮樂志合五氣之和導五常之行按佛書云一不殺配仁慈愛好生曰仁五行之木亦主于仁仁則不殺配仁也二不盜配智邪正明了曰智五行之水亦主于智智則不盜配智也三不邪淫配義制事合宜曰義五行之金亦主於義義則不邪淫故以不邪淫配義也四不妄語配信真實不欺曰信五行之土亦主于信信則不妄語故以不妄語配信也五不飲酒配禮處事有則曰禮五行之火亦主于禮禮則妨于過失故以不飲酒配禮也吻然合契莊子為其吻合永矣同塗既令弟子言詩隋經籍志釋迦在世教化四十九年謝世弟子大迦葉與阿難等五百人追共撰述綴以文字集載為十二部法喜録皈依佛法曰弟子又與聲聞受一作授記法華經我等今於佛前聞授聲聞阿耨多羅三藐三菩提心甚歡喜傳燈録因聲聞而悟者名聲聞果金剛經燃燈佛於我授記一佛出世隋經籍志佛經云末世巳後衆生愚鈍無復佛教而業行轉惡年壽漸短經數百千載間乃至朝生夕死然後有大水火大風之災一切除去之而更立生人又歸淳朴謂之小劫每一小劫則一佛出世萬人所望詩行歸于周萬民所望不知孱微何以負荷見前啓便當刻之鳥篆晉衛恆書勢黃帝之史沮誦蒼頡眺彼鳥迹始作書契置彼龍宫見前啓此則吹之以宋玉之風宋玉風賦此大王之雄風也照之以謝莊之月謝莊月賦委照而吳業昌彼則傳之於赤髭疏主事文類聚佛陀耶舍為人赤髭善解毗婆沙時人號曰赤髭毗耶沙示之以白足禪師法苑珠林魏太武時沙門曇始甚有神異足不躡履跣行泥穢中奮足便淨色白如面俗號白足阿練也然後負帚趨門見為濮陽公狀前騶入廏見為某先輩啓以鉗奴為歡友見為崔從事啓與車御為良朋晉胡母輔之傳常過河南門下飲河南騶王子博箕坐其傍輔之叱使取火子博曰我卒也惟不乏吾事則已安復為人使輔之因就與語薦之河南尹樂廣召為功曹南史謝幾卿傳詣道邊酒壚停車褰幔與車前三騶對飲冀必從公詩無小無大從公于邁以謝嘉命過此而往不知所圖下情無任距躍感激歡喜信愛之至左傳距躍三百曲踊三百注距躍超越也曲踊跳踊也謹啓端午日上所知劒啓商隱啓五金鑄衛形威邪神劒一口銀裝漆鞘紫錦囊盛西京雜記髙祖斬蛇劒開囊拔鞘輒有風氣射人傳自道流孔稚圭北山移文核玄玄於道流頗同古製未遇良工之鑒吳越春秋越王允常聘區治子作名劒五枚秦客薛燭善相劒王取純鈎示之薛燭矍然望之曰沈沈如芙蓉始生于湖又楚昭王得湛盧之劒召風胡子問之對曰區冶子巳死雖有傾城量金珠玉猶不可與況駿馬萬户之都乎常為下客所彈戰國策齊人有馮暖者使人屬孟嘗君願寄食門下倚柱彈其劒歌左右皆笑之龍藻雖繁左思魏都賦劒則龜文龍藻鵜膏稍薄郭璞爾雅注鸊鵜似鳬而小膏中瑩刀敢因五日仰續千齡見為滎陽公狀厠玉玦於君侯見為濮陽公表擬象環於夫子禮記孔子珮象環五寸所冀更蒙千灌張協七命乃鍛乃鑠萬辟千灌重許三卿一作鄉後漢韓稜傳肅宗常賜諸尚書劒惟此三人特以寶劒自手署其名曰韓稜楚龍淵郅壽蜀漢文陳寵濟南椎成張協七命價兼三鄉聲重兩都使武士讓鋒韓詩外傳君子避三端文士筆端勇士鋒端辨士舌端佞臣喪魄漢朱雲傳雲曰臣願賜上方斬馬劒斬佞臣一人頭以厲其餘無荆王之遇敵手以麾城越絶書楚王令風胡子之吳見干將之越見區冶子作劒三枚一曰龍淵二曰太阿三曰工布晉師圍楚三年不解王引太阿之劒登城而麾之三軍破敗流血千里有漢相之策勳腰而上殿漢蕭何傳列侯畢巳受封奏位次令何第一賜帶劒履上殿入朝不趨嘉辰祝願晉佛圖澄傳乃唱云衆僧祝願平日禱祠見代濮陽公表伏惟恩憐特賜容納謹啓端午日上所知衣服啓商隱啓右件衣服等弄杼多疏古詩纖纖出素手札札弄機杼紉針未至見上河東公啓凂李固之竒表後漢李固傳固狀貌有竒表鼎角匿犀足履龜文纍王衍之神鋒世説王平子目太尉阿兄形似道而神鋒太俊敢恃深恩竊陳善祝左傳晏子曰雖具善祝豈能勝億兆之詛伏願永延松壽漢王褒傳心有堯舜之志而體有喬松之壽常慶㽔賓見為滎陽公狀逺比趙公三十六一作四年當國舊書長孫無忌傳貞觀十一年改封趙國公按帝紀太宗即位遷吏部尚書又進尚書右僕射又進册司空知門下尚書省事又進位司徒又為太子太師同中書門下三品髙宗即位進太尉檢校中書令顯慶四年方黔州安置故云許敬宗曰為宰相三十年百姓畏其威亦約略之辭耳近同郭令二十四考中書舊書郭子儀華州鄭縣人史臣裴垍曰校中書令考二十有四全唐詩話義山謂溫庭筠近得一聨逺比趙公三十六年宰輔未得偶句溫曰何不云近同郭令二十四考中書肝膈所藏吳志周魴傳拳拳輸情陳露肝膈神明是聽詩神之聽之仰塵尊重實用兢惶謹啓李義山文集箋注卷五
