body:
  text: 李義山文集箋注卷三監察御史徐樹穀箋山東提學僉事徐炯注狀為侍郎汝南公華州謝加階狀新書百官志其辨貴賤敘勞能則有品有爵有勳有階以時考核而升降之所以任羣材治百事右臣伏奉今月某日制書加賜臣階朝散大夫者百官志朝請大夫從五品上朝散大夫從五品下榮從日下晉書陸雲與荀隱素未相識嘗會張華座雲抗手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字恩自天中臣聞周室設官實重大夫之號詩三事大夫漢臣異禮則加朝請一作散之名後漢二十八將論所加不過特進朝請而已若臣者辨乏談天史記荀卿傳齊人頌曰談天衍應劭曰著書所言多大事故齊人號談天鄒衍文非擲地世説孫興公作天台山賦成以示范榮期云卿試擲地要作金石聲貪叨華顯綿厯光隂當陛下御極之初分陛下憂人之寄金章紫綬已塵求瘼之榮崇級清階晉王愷傳愷愈並少踐清階更切升髙之望循揣斯久怔忪莫寧王褒四子講德論百姓怔忪惟當勤奉詔條所希粗贖官謗誠深感勵情切違離犬戀主而空深潘嶽西征賦猶犬馬之戀主竊托慕於闕鹿蚊負山而何力莊子狂接輿曰其於治天下也猶涉海鑿河而使蚊負山也無任感恩望闕結戀屏營之至為濮陽公謝罰俸狀右臣伏準御史臺牒奉恩旨以臣不先覺察妖賊賀蘭進興等宜罰兩月俸料者伏以霧市微妖後漢張霸傳霸子楷字公超隱居𢎞農山中學者隨之所居成市後華隂山南遂有公超市性好道術能作五里霧時關西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄潢池小寇漢循吏傳龔遂對曰海濵遐逺不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳有乖先覺上黷宸聰昔漢以捕一作逋盜不嚴猶加黜削漢酷吏傳作沈命法曰羣盜起不發覺發覺而弗捕滿品者二千石以下至小吏主者皆死晉以發姦無狀亦峻科條未詳漢丙吉傳召東曹案邉長吏瑣科條其人豈若皇帝陛下恩極好生書好生之德洽於民心德一作仁惟宥過與其漏網並見表止以罰金漢張釋之傳釋之奏當此人犯蹕當罰金臣與寮屬等無任戴恩宥罪屏營之至為滎陽公謝除盧副使等官狀新授某官盧戡新授某官任繕右臣得進奏官某狀報臣所奏盧某等二人新書宰相世系表盧斟陜西觀察使嶽第三子奉某月日敕旨賜授前件官充職者臣謬當廉印合啓幕庭撫魚罩以興懷詩序南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也其一章曰南有嘉魚蒸然罩罩懼羖皮之廢禮説苑秦穆公使賈人載鹽於虞諸賈人買百里奚以五羊皮穆公觀鹽怪其牛肥問其故對曰飲食以時使其不暴是以肥也公令有司沐浴衣冠之公孫支讓其卿位號曰五羖大夫盧戡與臣同年登第少日論交學富文雄氣孤志逸玉清越而為樂禮記君子比德於玉叩之其聲清越以長其終詘然樂也女舒脫一作退以求媒詩舒而脫脫兮箋貞女欲吉士以禮來脫脫然舒也任繕幼學孝悌潔靜精微禮記潔靜精微易教也得君子之時中友鄉人之善者匪因請託漢翟方進傳為相公潔請託不行郡國實自諳知北史唐雍傳精心勤事莫不諳知皇帝陛下俯照逺藩咸加命秩漢循吏傳二千石有治理效輒以璽書勉勵增秩賜金南臺貼職通典御史臺亦謂之蘭臺寺梁及後魏北齊或謂之南臺延閣分班漢藝文志孝武建藏書之䇿置寫書之官注如淳曰劉歆七略曰外則有太常太史博士之職內則有延閣廣內祕室之府使戡有紆朱之榮後漢書宦者傳論曰紆朱懷金者布滿宫闈繕無衣白之見日知録白衣者庶人之服然有以處士而稱之者史記儒林傳公孫𢎞以春秋白衣為天子三公後漢書孔融傳與白衣禰衡跌蕩放言晉書閻纘傳薦白衣南安朱沖可為太孫師傅是也清波雜志言前此仕族子弟未受官者皆衣白令非跨馬及弔慰不敢用已經聖鑒可謂國華魯語季文子曰吾聞以德榮為國華冀收規畫之功吳志胡綜傳規畫計較應見納受共奉澄清之寄後漢范滂傳滂登車攬轡慨然有澄清天下之志不勝感恩荷聖集作得賢之至為安平公謝端午賜物狀右今月某日中使某至奉宣恩旨賜臣手詔一通兼前件端午紫衣銀器百索并大將衣者周處風土記端午造百索繫臂一名長命縷一名續命縷一名辟兵繒一名五色縷一名五色絲一名朱索乾文昭融詩昭明有融睿賜稠疊恩生望外榮積懼中臣已當時宣布給散訖伏以正陽令月左傳惟正陽之月則然餘則否端午佳辰風土記仲夏五日曰端午端初也俗重之與夏至同渥澤合止於勳賢後漢朱祐等傳論曰猶能授受惟庸勳賢皆序錫賚宜先於戚屬後漢鄧禹傳時諸紹封者皆食故國半租康以皇太后戚屬獨三分食二臣逺臨東魯久去上京曹植與楊修書足下髙視於上京豈望仁時同躋夀域見代安平公表八行明詔後漢循吏傳其以手書賜方國者皆一札十行細書成文伏讀而不啻千鈞一襲輕衣漢叔孫通傳賜通帛二十匹衣一襲師古曰一襲上下皆具也今人呼為一副跪捧而若無三伏初學記按隂陽書曰從夏至後第三庚為初伏第四庚為中伏立秋後初庚為後伏謂之三伏曹植謂之三旬况又綵縷出仙蠶之繭列仙傳園客種五色香草有五色蛾上香草末生桑蠶有女與客俱蠶繭大如盆繅訖莫知所之貞金凝姹女之魂謂銀器後漢書桓帝時童謠云河間姹女能數錢持可戒盈魏志曹真傳詔曰可謂能持盈守位帶堪延算風俗通五月五日續命縷俗説以益人命豈微疑作惟臣獨忝在列校不遺華楚成行永願千春而奉聖梁簡文帝詩千春誰與樂惟有妾隨君綿長共保常期五日以霑恩臣與大將等無任感激懇悃之至為滎陽公端午謝賜物狀右中使某至奉宣恩旨賜臣端午紫衣一副百索一軸銀器二事大將衣三副并賜臣手詔一通者伏以五神定位祝融司長發之功禮記仲夏之月其神祝融六律鈞和説文十二律均布節氣故有六律六均㽔賔有酬酢之義禮記仲夏之月律中㽔賔周語伶州鳩曰㽔賔所以安靖神人獻酬交酢也故節推戴禮大戴禮夏小正云五月初昏大火中大火者心也心中種黍菽穈時也煮梅為豆實也蓄蘭為沐浴也日著漢儀後漢禮儀志五月五日朱索五色印為門户飾以難止惡氣彼艾人逺具於歲時荆楚嵗時記五月五日採艾為人懸門户上以禳毒氣角黍近標於風土風土記仲夏端午烹騖角黍進筒稯一名角黍一名稯亦作粽乃耆舊傳聞之末晉陳夀傳撰益部耆舊傳十篇公羊傳所見異辭所聞異辭所傳聞異辭亦一作是君親慶賜之原禮記孟夏之月慶賜遂行無不欣悅伏惟皇帝陛下克協樂章王子年拾遺記楚懷王常繞山遊宴各舉四仲之氣以為樂章允符時訓逸周書時訓解第五十二恩一作仁霑近戚惠浹元寮臣守介蠻圻程遙鳳闕敢希瘴嶠特降乾文輕縞染衣真金備器海綃掩麗博物志鮫人水居出人間賣綃臨去從主人索器泣而出珠與主人渠碗藏珍魏文帝車渠碗賦車渠玉屬也多纎理縟文生於西國其俗寶之廣雅車渠石次玉也玄中記車渠出天竺國廣志車梁出大秦國拜受若驚跪捧如失常衣國僑之紵左傳吳公子札聘於鄭見子産如舊相識與之縞帶子産獻紵衣馬被服多慚久攜顔氏之瓢見論語捧持未慣當晝而不假交扇世説補郗嘉賔三伏之月詣謝公雖復當風交扇猶沾汗流離向日而惟宜飲冰莊子朝受命而夕飲冰我其內熱與况又將以綵絲縈諸畫軸用禳故氣風俗通五月五日以五綵絲繫臂者辟兵及鬼令人不病溫兼續收齡見為安平公狀爰自微臣頗流諸校鞠躬被寵全踰錫帶之榮易或錫之鞶帶覩物傳輝實動請纓之思漢書南越與漢和親乃遣終軍使南越軍自請受長纓必羇南越王而致之闕下唯當仰成帝力列子擊壤歌曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉粗舉藩條見為濮陽公表誓相率於明時韋曜博奕論愛功惜力以佐明時庶同登於夀域見代安平公傳臣與大將等無任望闕感恩抃舞屏營之至為中丞滎陽公赴桂州長樂驛謝敕設狀右今月某日中使某奉宣進止就長樂驛薛調劉無雙傳京兆尹以王仙客為富平縣尹知長樂驛賜臣及將吏等設饌者將承藩寄尚忝朝恩絡驛八珍周禮凡王之饋珍用八物淳又食醫掌和王八珍之齊杜甫詩御廚絡驛送八珍芬芳九醖左思蜀都賦芬芳酷烈張衡南都賦酒則九醖甘醴十旬兼清醪敷徑寸浮蟻若䓑北堂書鈔魏武帝上九醖酒奏云臣故縣令南陽郭芝有九醖春酒苦難飲增為十釀差甘易飲今謹上獻又張華上巳篇云春醴踰九醖冬清過十旬成公綏七唱云香旗九醖淵清十旬臣階緣薄伎晉外戚傳論曰階緣外戚以致顯榮塵辱修塗陶潛詩目倦修塗異揚執戟之讀書雖無非聖漢揚雄傳非聖哲之書不好也解嘲位不過侍郎東方朔客難官不過侍郎位不過執戟董大中之對策何補清時漢董仲舒傳武帝即位舉賢良文學之士前後百數而仲舒以賢良對䇿三對既畢天子以仲舒為江都相中廢為中大夫李陵答蘇武書策名清時忽委廉車乍離閨籍見為濮陽公表誠欣列土實耿辭天然猶食指告祥左傳楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味朵頤有慶易舍爾靈龜觀我朵頤爰於近驛式降貴臣酒自堯樽孔子堯飲千鍾姚崇詩堯樽臨上席斗王維詩陌上堯樽傾北饌分殷鼎一作禹膳説苑湯時大旱使人持九足鼎祝山川而天大雨楚辭天問曰緣鵠飾玉注伊尹修飾玉鼎以事湯湯賢之以為相下霑將校旁耀路岐曹攄詩素絲與路岐况臣平生本實孤賤懷書奉役久無黔突之謀文子墨子無黔突入國展儀且懵殽蒸之禮左傳晉侯使士會平王室定王享之原襄公相禮殽蒸武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也疏切肉為殽乃升於俎故謂之殽蒸飽期滿腹莊子偃鼠飲河不過滿腹醉更憂心詩憂心如醉終虞負乘之災易負且乘致寇至無報雲天之施易雲上於天需君子以飲食宴樂臣與將吏等無任望闕感恩結戀屏營之至為滎陽公謝賜冬衣狀右中使某至奉宣恩旨賜臣冬衣一副大將衣四副兼賜臣手詔一通者八行帝語見為安平公狀窅降於重霄一襲天衣觀佛三昧經今釋迦樹最短若干天衣而布其上詳為安平公狀俯回於窮節顔延之詩徂生入窮節臣當時準詔給散訖臣叨蒙重寄適控遐陬地雖五鎮之衝新書地理志永徽後以廣桂容雍安南府皆𨽻廣府都督統攝謂之五府節度使名五管氣得四時之正每玄𡨕應律見賜物狀顓頊司辰禮記孟冬之月其帝顓頊當二日之鑿冰則殊豳野詩豳風二之日鑿冰沖沖及兩楹之飛雪無異朔山鮑昭詩胡風吹朔雪千里度龍山集君瑶臺上飛舞兩楹間范成大桂海虞衡志靈川興安之間有嚴關朔雪至此輒止大盛則度關至桂州城下不復南矣北城舊有樓曰雪觀所以夸南州也重以賨布少溫晉食貨志南蠻歲令輸布人一匹小口二丈謂之賨布蠻綿乏暖左思吳都賦鄉貢八蠶之綿善曰劉欣期交州記云一歲八蠶繭出日南也方求麗密王褒頌夫荷旃被毳者難與道純絲之密麗以禦嚴凝禮記天地嚴凝之氣始於西南而盛於西北豈望司服頒衣周禮春官有司服貴臣傳詔李陵答蘇武書徒失貴臣之意綾裁飛鵠晉曹志傳帝賜志鶴綾袍一領鵠鶴通絮一作素裛仙蠶見為安平公狀白分椒壁之光漢官儀以椒塗室取其溫暖晉石崇傳崇塗屋以椒初學記漢省中皆胡粉塗壁紫奪蘭牙之色鮑昭白紵歌桃含紅萼蘭紫牙巳均下將仍逮連營並見表晏子狐裘故弊何一作舊飾故彰於國儉禮記晏子一狐裘三十年曽子曰國奢則示之以儉國儉則示之以禮王恭鶴􅌁風流不自於君恩晉書王恭披鶴􅌁涉雪而行被服有輝負戴無力謹當上宣殊渥下拊多寒左傳申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊均大祒於琅琊漢書朱博遷琅琊太守齊俗舒緩敕功曹官屬多褎衣大祒不中節度自今掾吏衣皆去地三寸祒音紹袴也變無襦於蜀郡後漢書廉范字叔度建初中為蜀郡太守百姓歌之曰廉叔度來何暮不禁火民安作昔無襦今五袴粗令康泰以塞貪叨後漢梁冀傳皆貪叨凶淫臣與大將等無任望闕感恩抃舞屏營之至為濮陽公涇原謝冬衣狀舊書地理志涇原節度使治涇州管涇原渭武四川右某月日中使某至奉宣聖旨賜臣及大將兼諸鎮防秋兵馬等前件敕書手詔并冬衣者臣並巳準詔旨宣示給散訖恩極解衣漢韓信傳漢王解衣衣我推食食我榮加降璽戴山未重列子大壑中有五山天帝使巨鼇戴之負日非暄列子宋有田夫曝日於野美之不識廣厦綿纊之屬謂其妻曰吾負日之暄以獻吾君獲重賞臣謬領藩垣詩價人維藩大師維垣適當戎狄唯慿廟算孫楚書廟勝之算應變無窮粗振一作展軍威絶漠一作塞獵回幸無警息史記信陵君傳公子與魏王博而北境傳舉烽言趙冦至且入界公子止王曰趙王田獵耳非為息冦也復博如故曹植詩邉城多警髙烽火過但報平安唐六典凡烽候所置大率相去三十里其放烽有一炬二炬三炬四炬者隨賊多少而為差焉新書哥舒翰麾下來告急上不時召見及暮平安火不至上始懼案鎮戍每日初夜放煙一炬謂之平安火直以地勢多隂漢朝錯傳胡貉之地積隂之處也川形稍背三伏常聞於屏箑潘嶽秋興賦屏輕箑釋纎絺九秋尋訝於垂繒玉臺新詠傅玄有歷九秋篇謝惠連雪賦裸壤垂繒代馬暫嘶見為河南表隴山無葉漢地理志隴西郡注應劭曰隴底在其西也燕鴻未過李涉詩南隨越鳥北燕鴻涇水先冰三秦記涇水出开頭山至髙陵縣而入渭與渭水合流三百里清濁不相雜是以每降王臣仍迂御筆北史彭城王協傳帝令協為露布辭及就尤類帝文有人見者咸謂御筆緘封垂露法書要録漢曹喜工篆𨽻善懸針垂露之法寵錫禦冬詩我有旨蓄亦以禦冬非玉女裁成禮記國君取夫人之辭曰請君之玉女與寡人共有敝邑即仙人織出北史畢衆敬傳獻仙人文綾一百匹徒驚在笥書惟衣裳在笥莫匪集作覩因針見陳情表始顧孱微深懼不勝冠帶旋蒙被服便如能執干戈見前表遍逮軍前厯霑麾下漢陳餘傳張耳乃被其印收其麾下達喜氣而陳根復秀汜勝之引古語土長冒橛陳根可拔耕者急發動歡聲而蟄户潛開禮記仲秋之月蟄蟲壞户華楚成行曳婁塞路詩子有衣裳弗曳弗婁其山南宣歙三道大將等雖久居炎燠不慣嚴凝亦既更衣皆忘易地賈餘勇而例思盡敵左傳齊髙固入晉師曰欲勇者賈余餘勇又先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎感鴻私而咸願殺身漢宣元六王傳張博書願殺身報德各限征行不獲陳謝臣與大將等無任瞻天戀闕感恩屏營之至為中丞滎陽公謝借飛龍馬送至府界狀箋飛龍廄名也新書兵志尚乘掌天子之御左右六間一曰飛黃二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑總十二間為二廄一曰祥麟二曰鳳苑以繫飼之其後禁中又增置飛龍廄百官志以中官為內飛龍使右中使某奉宣恩旨以臣赴任時特借飛龍馬一一作兩匹并鞭轡等送至京兆府界者臣謬奉恩榮出叨廉問豈期蹇步謝瞻詩蹇步愧無良説文蹇跛也深軫皇慈特命內臣俾騰上駟史記田忌數與齊公子馳逐重射孫子見其馬足不甚相逺有上中下輩於是謂田忌曰今以君之下駟與彼上駟取君之上駟與彼中駟取君中駟與彼下駟既馳三輩而忌一不勝而再勝卒得千金梁懸蜀鐙初學記魏百官各有紫茸題髙橋鞍一具又劉義恭啓曰賜臣供御金梁橋鞍制作精巧宜副龍駟九州春秋劉備曰吾常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣案鐙馬鞍兩旁足所踏也几覆吳鞍公羊傳以鞍為几吳志孫權每田臘乘馬射虎虎嘗突前攀持馬鞍每多曵練之疑論衡孔子與顔淵俱登魯東山望吳閶門謂顔淵曰爾何見曰一匹練前有生藍子曰白馬廬芻也不假著鞭之力晉書劉琨聞祖逖被用曰枕戈待旦常恐祖生先我著鞭倐踰秦甸將復周間周禮校人掌王馬之政秉馬一師四圉天子十二間馬六種照地回光鮑昭詩鞍馬光照地瞻天送影崔豹古今注秦始皇有七名馬一曰躡景拾遺記周穆王馭八龍之駿一名越影洞冥記東方朔得神馬名曰步影長亭欲别未期東道而來庾信賦十里五里長亭短亭白帖十里一長亭五里一短亭漢書郊祀歌曰天馬來厯無草徑千里從東道雙闕尚嘶願附北風之思古詩胡馬依北風無任感恩戀闕雪涕屏營之至為大夫安平公華州進賀皇躬痊復物狀右臣聞藩方舊德臣子私懷將稱慶於天朝後漢朱穆傳天朝政事一更其手必展儀於土貢書序任土作貢伏惟皇帝陛下道苞乾象劉琨詩乾象棟傾坤儀舟覆德總坤靈西都賦據坤靈之正位肇自元正載康福履詩樂只君子福履綏之九廟不忘於繼志兩宫無闕於問安禮記文王之為世子朝於王季日三雞初鳴而衣服曰至於寢門外問內豎之御者曰今日安否何如內監安文王乃喜及日中又至亦如之及暮又至亦如之鼓舞萬靈波濤四國驗推測則咸知周卜聽祝辭而皆若華封臣坐擁伏熊行驅畫隼並見前表值一人之有慶書一人有慶兆民賴之當春日之載陽詩春日載陽心但葵傾見為濮陽公表迹猶匏繫伏蒲之覲謁未果漢書史丹直入卧內頓首伏青蒲上應劭曰以青規地曰青蒲自非皇后不得至此獻芹之誠懇空深列子昔有美芹莖萍子者對鄉豪稱之鄉豪嘗之哲於口慘於腹衆哂之況又地邇宸居俗薰儉德更無玉帛以率梯航並見表前件石器等石器未詳案爾雅西南之美者有華山之金石焉郭注云黃金瓀石之屬邢疏云瓀石石之次玉者此石器等蓋以瓀石為之故曰取諸地産皆勒工名瑞匪土硎家語魯有儉嗇者瓦鬲煮食食之自謂其美盛之土硎以進孔子珍慚甗磬左傳鞍之役齊侯使賔媚人賂以紀甗玉磬並取諸地産皆以勒工名茯苓茯神等本草經茯苓一名茯苓神廣志茯神松汁所作勝茯苓新書地理志華州土貢茯苓茯神唐本草茯苓第一出華山形極粗大雍州南山亦有不如華山本草注𢎞景曰茯苓白色者補通神而致靈上品仙藥也品載仙經博物志仙傳云松脂入地中千年化為茯苓葛洪神仙傳秀眉公餌茯苓得仙竒標藥録梁陶𢎞景集本草集有桐君採藥録説其花葉形色藥對四卷論其佐使相須通靈祛疾不惟色若凝脂詩膚如凝脂延夀安神豈是心如枯木莊子形固可使如稿木而心固可使如死灰乎干冒陳進無任兢惶云云為濮陽公陳許舉一作請人自代狀箋案方鎮表元和五年罷武昌軍節度使置鄂嶽都團練觀察使十三年增領申州寶厯二年省沔州是其所領實鄂嶽申三州也狀云沔水武昌明係鄂嶽秦韓戰伐之鄉周鄭交圻之地則陳許也時崔蠡方除鄂嶽觀察而王茂元為陳許節度以鄂嶽非當時重地而已所部陳許乃中原要害恐不勝任故舉崔以自代某官崔蠡箋舊書李聽傳詔聽兼領魏博節度使將兵北渡魏人不納其軍大敗殿中侍御史崔蠡彈之新書世系表崔蠡南祖崔氏胤第三子右臣伏準某年月日敕內外文武官上後三日舉一人自代者臣伏見前件官欒郤舊族左傳叔向曰欒郤胥原降在皂𨽻鄒魯名儒漢韋賢傳號稱鄒魯大儒徵為博士給事中鏡納無私集作疲世説袁羊曰何曽見明鏡疲于屢照清流憚於惠風山髙不讓李斯書太山不讓土壤故能成其大而又循牆戒切銘座規深並見表蘭省辭榮元稹詩並入紅蘭省注校書所也竹符出守漢悲來暮並見前晉有去思晉謝安傳除吳興太守在官無當時譽去後為人所思晦而轉明一作彰易明夷君子以涖衆用晦而明凂而尤白見論語既還綸閣晉王湛等傳論曰或任華綸閣密勿於王言閣初學記中書職掌綸誥前代詞人因謂之綸復掌禮闈任昉王文憲集出入禮闈人驚吞鳳之才西京雜記揚雄著太玄夢吐白鳳士切登龍之譽一作望後漢書李膺字元禮以名聲自髙士有被其容接者名為登龍門及司版籍以副地官蓋曽為户曹周禮秋官司民掌萬民之數自生齒以上皆書於版又地官大司徒北按西羌蓋曾使吐蕃孤忠靡失一作按比罔差初終靡失居然國器漢韓安國傳天子以為國器實映朝倫晉庾純傳詔曰宜加顯黜以肅朝倫今沔水無兵漢地理志注如淳曰北方人謂漢水謂沔水武昌非險新書地理志鄂州江夏郡治江夏縣案鄂州不治武昌以州本武昌軍節度使治故舉武昌以為言用為廉問尚鬱廟謀後漢光武紀贊曰明明廟謀﨣﨣雄斷臣所部乃秦韓戰伐之鄉周鄭郊圻之邑軍踰千乘地控三州謂陳許若以代臣必為名將敢希睿澤曲遂愚衷俾寬竊位之譏見論語冀受一作獲進賢之賞漢蕭何傳上曰吾聞進賢受上賞蕭何功最髙待鄂君乃得明於是因鄂千秋故所食關內侯邑二千戶封為安平侯干冒陳薦無任兢越謹録奏聞伏聽敕旨為懷州刺史舉人自代狀右臣伏準建中元年正月五日敕內外文武官到任三日舉一人自代者臣伏見前件官汾陽啓胄案世系表王氏出自姬姓周靈王太子晉以直諫廢為庶人其子宗敬為司徒時人號為王家因以為氏八世孫錯為魏將軍其六世孫翦為秦大將軍生賁賁生離離二子元威元避秦亂遷於琅琊後徙臨沂四世孫吉字子陽漢諫大夫始家臯虞後徙臨沂都鄉南仁里生駿字偉山御史大夫世所謂琅琊王氏者也錯仕魏為將軍故曰汾陽啓胄詩魏風云彼汾一曲是其國在汾水之陽也沙麓遺芳順宗莊憲皇后王氏琅琊人所舉者后族故有斯語漢元后傳昔春秋沙麓崩晉史卜之曰隂為陽雄土火相乘故有沙麓崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙正直其地日月當之元城郭東有五麓之虛即沙麓地也後八十年當有貴女興天下云佩觿之辰詩童子佩觹平居不戲後漢公沙穆傳自為兒童不好戲弄加冠已後禮記曲禮二十曰弱冠冠義三加彌尊加有成也出言成章魏陳思王植傳植跪曰言出為論下筆成章顧當面試奈何倩人本以詩書綽有機斷晉明帝紀帝聰明有機斷奉隂郭之良躅集作轍光武郭皇后光烈隂皇后御集作銜非馬鄧之明一作成規明德馬皇后和熹鄧皇后臣以一作與其祖禰以來蕃宣相接詩四國于蕃四方于宣雲臺髙議江淹上建平王書結綬金馬之庭髙議雲臺之上善曰南宫雲臺也同承鐘鼎之餘韓子先王之賦頌鐘鼎之銘皆畨吾之迹華山之博也文心雕龍魏顆景鐘孔悝衛鼎稱伐之類也麟閣舊圖漢書宣帝圖功臣霍光等十一人於麒麟閣昔著河山之誓漢髙惠功臣表封爵之誓曰使黃河如帶泰山若厲國以永存爰及苖裔箋案舊書外戚傳王子顔琅琊臨沂人莊憲皇后之父也祖思敬少從軍纍試太子賔客父難得有勇決善騎射天寶初為河源軍使斬吐蕃贊普王子郎支都傳首京師玄宗召見之賜以錦袍金帶纍拜金吾將軍從哥舒翰擊吐蕃收九曲加特進祿山之亂從肅宗幸靈武進收京城又從郭子儀攻安慶緒於相州纍封琅琊郡公英武軍使寶應二年卒贈潞州大都督子顔少從父征役纍官金紫光祿大夫檢校衛尉卿生后而卒順宗內禪以后生憲宗褒贈先代子顔二子重榮用重榮官至福王傅用官至太子賔客金吾將軍新書王難得傳用字師柔封太原郡公謹畏無過卒贈工部尚書懷州所舉蓋即用之後人今無可考交深志見年齊道均今河內名邦覃懷巨郡書覃懷底績傳覃懷近河地名疏地理志河內郡有懷縣在河之北蓋覃懷二字共為一地故云近河地名南蕃鳳闕平分晉鄭之交北控羊腸方有干戈之役並見前推讓雖循於故事書推賢讓能庶官乃和薦聞實切於私誠左傳左師曰小國習之大國用之敢不薦聞伏乞聖恩特允臣志無任感恩推賢之至謹録奏聞伏聽敕旨為尚書渤海公舉人自代狀箋世系表髙氏出自薑姓齊太公之後髙傒為齊上卿後漢有髙洪者為渤海太守因居渤海蓨縣故渤海為髙氏之郡望此渤海公不知何人據狀云風采章臺羽儀華囿內史故事尹正舊儀則其人蓋尚書尹京兆者或云計其時當是髙元裕某官周墀見為汝南公賀赦表右臣伏準某年月日敕內外文武官上後舉一人自代者伏以商邑為四方之極詩商邑翼翼四方之極咸京乃天下之樞戰國策范雎説秦昭王曰韓魏中國處而天下之樞也必命英髦以居尹正漢書注張晏曰地絶髙平曰京十萬曰兆尹正也通典開元初改雍州長史為京兆尹總理衆務凡前代帝王所都皆曰尹臣謬蒙抽擢南史王鎮惡傳因託風雲並蒙抽擢素乏材能漢車千秋傳千秋無他材能學術將何以風采章臺漢張敞傳敞為京兆時罷朝會過走馬章臺街注孟康曰在長安中羽儀華囿一作省詩鴻漸于陸其羽可用為儀案華囿即靈囿也况又分英華作方營涵英華作咸鄗當作鎬肇建園陵箋案舊書武宗紀開成五年八月十七日葬文宗於章陵此狀云肇建園陵則髙除京兆尹當在是年春也苟推擇之不先漢韓信傳家貧無行不得推擇為吏則顚覆而斯在前件官莊栗而裕簡嚴而寬玉無寒溫松有霜雪杜陽雜編日本有玉棋子冬溫夏冷謂之冷暖玉莊子霜雪既降是以知松柏之茂頃居內署實事文皇引裾而外朝莫知魏志辛毗字佐治帝欲徙冀州士家十萬户實河南毗與朝臣俱求見帝起入內毗隨而引其裾帝遂奮衣不還視草而中言罔漏晉書羊祐歷事二世典職機要凡謀議皆焚其草世莫得聞周墀久居內職故云洎分符近甸謂出守華州廉印雄藩謂改鄂嶽觀察使不徇物以沽名善推誠而立斷渾一作藹若全器宜乎在庭儻召以急宣被之眷渥必能明張條目漢劉向傳各有條目峻立隄防漢書董仲舒對䇿曰其隄防完也肅千里之封畿西都賦封畿之內厥土千里卓犖諸夏兼其所有總集作殷五都之貨殖西都賦七相五公與夫州郡之豪傑五都之貨殖三選七遷充奉陵邑善曰漢書王莽於五都立五均更名洛陽邯鄲臨淄宛成都五都市長皆為五均司市軒英華作燕非臺禹穴山海經西王母之山有軒轅臺射者不敢西向畏軒轅之臺漢書司馬遷南遊江淮上會稽探禹穴案軒臺禹穴喻陵寢也無虧充奉之儀漢書百官志太祝六人正九品上掌出納神主祭祀則跪讀祝文卿省牲則循牲告充以授大官奉禮郎二人從九品上掌君臣服位以奉朝會祭祀之禮又公卿巡行諸陵則主其威儀鼓吹而相其禮漢苑秦陵見為濮陽公表盡絶椎埋之黨史記攻剽椎埋掘冢皆為財用耳徐廣曰椎殺人而埋之或謂發冢也特乞俯回宸斷用授當仁免今日之叨恩冀他時之上賞見為濮陽公狀干冒陳薦兢越殊深某官崔龜從箋舊書崔龜從字玄告清河人元和十二年擢進士第又登賢良方正制科及書判拔萃二科釋褐拜右拾遺太和二年改太常博士龜從長於禮樂精厯代沿革問無不通纍轉考功郎中史館修撰九年轉司勳郎中知制誥十二月正拜中書舍人開成初出為華州刺史三年入為户部侍郎判本司事四年權判吏部尚書銓事大中四年同平章事兼吏部尚書六年罷相纍厯方鎮卒伏以內史故事例帶銀青通典武帝更名右內史為京兆尹左內史為左馮翊主爵都尉為右扶風是為三輔治長安城中銀章青綬尹正舊儀平揖令僕謂尚書令尚書左右僕射晉殷浩傳桓溫謂郗超曰浩有德有言向使作令僕足以儀刑百揆必資髦碩方備次遷漢田廣明傳功次遷河南都尉臣特以鮿儒漢書沛公曰鮿生説我距關猥丁昌運顔延之詩復與昌運并位崇八座晉書尚書夏侯駿曰官立八座正為此時乃獨為駁議晉百官名尚書令尚書僕射六尚書古為八座尚書官紹三王漢王吉傳先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王况駕有上仙莊子千歲厭世去而上仙乘彼白雲至於帝鄉車當晏出史記范雎傳曰宫車一日晏駕集解應劭曰天子當晨起早作如方崩殞故稱晏駕韋昭曰凡初崩為晏駕者臣子之心猶謂宫車當駕而晚出按江淹恨賦一旦魂斷宫車晚出從韋説也務煩廄置漢田橫傳至尸鄉廏置臣瓚曰案廏置謂置馬以傳驛者役重津途傅亮表伊洛榛蕪津途久廢儻讓爵之不思詩受爵不讓至于巳斯亡則敗官而斯疚見為滎陽公表前件官荆岑挺價王粲登樓賦蔽荆山之髙岑韓子楚人和氏得玉璞於荆山之中奉而獻之文王文王使玉人治其璞而得寶盧諶覽古詩趙氏有和璧天下無不傳秦人來求市厥價徒空言善曰史記云秦昭王願以十五城易璧赤堇揚鋒吳越春秋越王允常以純鈎示薛燭薛燭曰臣聞初造此劔赤堇之山破而出錫若耶之溪涸而出銅稟松筠四序之榮禮記如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉包金石一定之調沈約宋書調樂金石有一定之聲故造鐘磬者先律調之然後施之於箱懸由中及外自誠而明昨者故鄣利遷漢地理志丹陽郡領故鄣縣案縣本秦鄣郡治是曰故鄣唐為廣德縣屬宣州今江南廣德州是也易利用為依遷國朝臺受律朝臺見濮陽公陳情表晉書王渾等傳論曰二王屬當戎旅受律遄征隱之清節無愧於投香晉書吳隱之隆安中為廣州刺史歸自番禺其妻劉氏齎沉香一片隱之見之遂投於湖亭之水寰宇記取投石門內水中後人謂之沉香浦亦謂之投香浦江革歸資唯聞於單舸南史江革除會稽郡丞稱職乃除都官尚書將還惟乘臺所給一舸艚偏欹不得安卧乃於西陵岸取石十餘片以實之其清貧如此案狀語則崔自太和四年判銓之後嘗出守江東移鎮嶺南史略而不書耳舉代時正在嶺南也必能集同軌之會左傳天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至奉因山之儀漢文帝紀贊曰治霸陵皆瓦器不得以金銀銅錫為飾因其山不起墳使桴鼓稀鳴桴當作枹漢張敞傳敞守京兆尹長安市偷盜尤多百賈苦之敞捕得數百人盡行法罰由是枹鼓稀鳴市無偷盜建瓴流化漢髙帝紀田肯賀上曰陛下治秦中地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也注如淳曰瓴盛水瓶也居髙屋之上而播瓴水言其向下之勢易也伏乞特回鳳詔見為河東啓以命龜從成聖朝棫朴之詩詩序棫朴文王能官人也減微臣維鵜之刺詩維鵜在梁不濡其翼彼其之子不稱其服干黷旒扆並見表伏用兢惶為滎陽公舉王克明等充縣令主簿狀以前件狀如前伏以臣所部控聨溪洞北史史萬歲傳踰嶺越海攻陷溪洞不可勝數參錯蠻髦詩如蠻如髦箋蠻南蠻也傳髦西夷别名武王伐紂其等有八國從焉水接重湖巴陵舊志洞庭湖南連青草西吞赤沙橫亘七八百里因名三湖又謂之重湖重湖者一湖之內南名青草北名洞庭有沙洲間之也山當五嶺見為濮陽公表縱有天官注集作恣非擬通典光宅元年改吏部為天官神龍元年復舊多緣地理幽遐盧諶詩身經險阻足蹈幽遐或不出上京巳發徒勞之嘆見代安平公表或暫來屬邑即聞歸去之辭晉書陶著歸去來辭既經久而不謀亦柔良而曷寄見為安平公表臣謬膺亷部慮在曠官書無曠庶官儻旬朔以無言見為懷州表則賦輿而必闕左傳羣臣帥賦輿以為魯衛請前件官或膏粱遺胄顔氏家訓古人云膏粱難整以其為驕奢自足不能尅勵也南史王曇首傳帝曰並膏粱世德乃能屈志戎旅或英俊下寮左思詠史詩世胄躡髙位英俊沈下僚雖寓遐陬久從試吏假之銅墨漢書縣令長皆秦官秩六百石以上皆銅印墨綬有意於鳴琴吕氏春秋宓子賤為單父宰鳴琴而治委以簿書劉楨詩沈迷簿領書不羞其棲棘後漢書仇香為主簿人曰枳棘非鸞鳳所棲既聞績用書九載績用弗成後漢循吏傳論曰斯其績用之最章章者也合用甄升一則復逺俗之凋殘一則輕微臣之憂責漢酈食其等傳贊曰不受憂責苟事因請託迹涉貪殘將有負於斯人豈敢逃於舉主南史謝莊傳表曰若任得其才舉主延賞有不稱職宜及其坐伏希卑聽史記子韋謂宋景公曰天髙聽卑咸賜即真晉劉暾傳兼御史中丞朝庭嘉之遂即真干冒宸嚴無任兢越為滎陽公桂州舉人自代狀某官裴俅箋新書宰相世系表裴肅字中明浙東觀察使三子儔字次之江西觀察使休字公美相宣宗俅字冠儀諫議大夫右臣伏準某年某月日敕內外文武官上後舉一人自代者伏見前件官􅘌鄉茂族案世系表秦非子之支孫封􅘌鄉因以為氏今聞喜􅘌城是也六世孫陵當周僖王之時封為解邑君乃去邑從衣為裴一云晉平公封顓頊之孫針於周川之裴中號裴君疑不可辨陵裔孫後漢陽吉平侯茂三子潛徽輯輯之後號東眷休所出也􅘌音裴洛下名生世説謝安能作洛下書生詠處家國以必聞見論語善兄弟而無愈詩不令兄弟交相為愈弟箋舊書裴休傳休河內濟源人與兄儔俅並登進士第而又南翬輝彩詩如翬斯飛箋伊洛而南素質五色皆備成章曰翬東箭含筠爾雅東南之美者有會稽之竹箭焉注會稽山名今在山隂縣南竹箭篠也身先較藝之場班固答賔戲婆娑乎藝術之場首出觀光之籍易觀國之光利用賔於王從外府而允稱賢佐後漢竇武傳古之明君必須賢佐以成政道立中臺而克號清郎通典唐改尚書省曰中臺亦曰文昌臺北史袁聿修為尚書郎十年未曾受升酒之遺尚書邢劭嘗呼聿修為清郎洎時急昌言書禹拜昌言曰俞官登大諫管子臣不如東郭牙請立以為大諫之官楊阜常規於法服魏志楊阜嘗見明帝著帽被縹綾半褎問帝曰此於禮何法服也帝默然不答陳羣盡削其封章魏陳羣傳注魏書羣前後數密陳得失每上封章輒削其草實於不咈之朝書先王肇修人紀從諫弗咈能守勿欺之旨見論語臣所部俗分蠻徼漢書注東北謂之塞西南謂之徼地控越城水經注湘灕之間陸地廣百餘步謂之始安嶠即越城嶠也秦置五嶺之戍是其一焉元和郡縣志越城嶠在桂州全義縣北五嶺之最西嶺也藉威略以靖封隅晉桓溫傳論曰受寄干城用恢威略資簡惠而安疲瘵晉魏舒傳出為冀州刺史在州三年以簡惠稱魏略曹植上書曰疲瘵風靡願回殊渥以授當仁豈微敬仲之才管敬仲也管子鮑叔曰施伯之知夷吾之才必將致魯之政兼有伯遊之長左傳晉侯搜於綿上以治兵使士丐將中軍辭曰伯遊長昔臣習於知伯是以佐之非能賢也請從伯遊荀偃將中軍士丐佐之俯從牢讓漢師丹傳上書言復曾不能牢讓爵位克免曠官特冀宸嚴曲垂矜許干冒陳請惶越無任為鹽州刺史奏舉李孚判官狀新書地理志關內道鹽州五原郡都督府貞元三年沒吐蕃九年復城之縣二五原白池案鹽州廢城在今陜西寧夏衛花馬池所北某官李孚箋案狀云克生公族又云悲其絶籍又云亦既旋還又云得於諸宗蓋宗室之子以法謫逺州而遇赦得還者其事迹於史無可考右件官克生公族詩振振公族早履宦途器實幹時蜀志龎士元曰立功立事于時之幹辨能專對加之夙明韜略後漢書注太公書名六韜黃石公紀序黃石者神人也有上略中略下略北史孫騰等傳論曰戰將兵權暗同韜略久逐旌旃周禮司常掌九旗之物通帛為旃雜帛為物全羽為旞析羽為旌頃為知已晏子春秋越石父曰士者申乎知巳屈從吏議司馬遷書因為誣上卒從吏議許休文之流浪萬里非賖蜀志許靖字休文汝南平輿人董卓秉政會稽太守王朗與靖有舊往保焉孫䇿東渡江走交州以避其難與曹公書曰知足下西迎大駕巡省西嶽承此休問且悲且喜王仲宣之播遷三年未遇魏志王粲字仲宣山陽髙平人獻帝西遷粲從至長安以西京擾亂乃之荆州依劉表儉而不懟困且能通晉管寧傳太僕陶丘一等薦寧曰困而能通遭難必濟雖何恤於無家左傳諺曰心苟無瑕何恤乎無家良可悲其絶籍謂絶其宗室之屬籍去歲以維新之命大洽鴻私亦既旋還合從敘用開成五年十一月十三日吏曹巳注右威衛倉曹參軍授官未謝又蒙挾名除替初云牽復仍迫屢空京口劉生方思鵝炙晉劉毅傳江州刺史庾悅曾至京口毅就府東堂與親故出射悅至射者皆散惟毅留射如故既而悅食鵝毅求其餘悅又不答洛陽蘇子已弊貂裘史記蘇子字季子東周洛陽人説秦不用黑貂之裘弊方今崇唐集作帝堯敦厚之恩書堯典以親九族九族既睦推魏文榮樂一作光榮之旨魏志文帝紀延康元年秋七月甲午軍次於譙大饗六軍及譙父老百姓于邑東注魏書曰設伎樂百戲令曰先王皆樂其所生禮不忘其本霸王之邦真人本出其復譙租稅二年三老率民上夀日夕而罷豈令棄良材於散地化王孫為英華作於非旅人臣素乏器能叨膺任使控緑池之要地守清澤之堅城緑池清澤當在鹽州境案新書食貨志鹽州五原有烏池白池瓦池細項池史記正義云鹽州有烏池猶出三色鹽有井鹽畦鹽花鹽此所謂緑池清澤者疑即其類或云清當作青漢地理志朔方郡朔方縣有青鹽澤在南是也緑池蓋烏池之别名耳將已宣布威靈魏略王自手筆令曰吾前遣使宣布威靈彈壓氛祲淮南子彈壓山川楚語伍舉曰榭不過講軍實臺不過望氛祲周禮春官視祲掌十輝之法以觀妖祥辨吉凶一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰敘九曰隮十曰想注祲隂陽氣相侵也案氛祲喻邉塵左傳楚氛甚惡苟咨謀失所佐理非材豈惟失此軍聲兼且傷於朝寄晉宗室傳論曰仍荷朝寄臣深自計孚實當仁况又得於諸宗且兼通舊諸葛均有因依之分蜀志諸葛亮從父玄為袁術所署豫章太守玄將亮及亮弟均之官會漢朝更選朱皓代玄玄素與荆州牧劉表有舊往依之龎士元多鑒裁之恩蜀志龎統字士元性好人倫勤於長飬每所稱述多過其才是故輒黷宸階乞榮賔席使得盡其風力佐彼邉陲錐處平原之囊必將脫穎史記平原君謂毛遂曰賢士之處世也譬如錐處囊中其末立見遂曰臣今日始處囊中耳若使臣早處囊中則脫頴而出矣劔拭華隂之土粗雪幽沈晉書張華傳斗牛之間常有紫氣華即補雷煥豐城令到縣掘獄屋基得雙劔華以華隂土一片致煥煥以拭劔倍以精明請依資賜授一官充臣防禦判官干冒宸旒無任戰越為濮陽公陳許奏韓琮等四人充判官狀韓琮新書藝文志韓琮字成封大中中湖南觀察使右件官早中殊科榮推雅度晉劉曜傳論曰習以華風溫乎雅度弦柔以直濟伏而清並見祭文頃佐憲臺且丁家難並見表當喪而齒未嘗見禮記髙子臯之執親之喪也泣血三年未嘗見齒君子以為難既祥而琴不成聲禮記孔子既祥五日彈琴而不成聲十日而成笙歌逮此變除吳孫奮傳注謝慈撰喪服圖變除行於世未蒙抽擢臣頃居鎮守並見前琮巳列賔僚謀之既臧剛亦不吐並見詩願稽中選榮借外藩伏請依資賜授憲官充臣節度判官段環右件官言思無邪學就有道屢為從事常佐正人書惟厥正人既富方穀加以富有文辭左傳非文辭不為功精於草𨽻潘嶽楊荆州誄草𨽻兼善俊而且檢通亦不流晉嵇紹傳曠而有檢通而不雜臣所部稍逺京都每繁章奏敢兹上請乞以自隨伏請依資賜授憲官充臣節度掌書記裴􅕋右件官魯國名儒􅘌鄉右族松寒更翠並見前馬老不迷韓子管仲隰朋從于桓公而伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道臣昔忝鑿英華作監非門淮南子大將受命巳則設明衣翦指爪鑿凶門而出辟為記室屬辭而宿構無異禮記屬辭比事春秋教也魏志王粲善屬文舉筆立成無所改定時人常以為宿構論兵而故校多歸後漢隗嚻傳使王遵持節監大司馬吳漢留屯於長安遵知嚻必敗滅而與牛邯舊故知其有歸義意以書喻之邯乃謝士衆歸命洛陽委一作畫以前籌漢書酈食其謀撓楚權勸漢王立六國後張良曰陛下事去矣臣請借前箸以籌之見其餘地伏以前任大理評事巳三十三箇月比於流輩沈約彈文玷辱流輩莫斯為甚巳是滯淹左傳楚子使然丹舉淹滯伏請特授憲官充臣觀察支使夏侯曈右件官藏器於身易君子藏器於身待時而動為仁由已齊莊難犯徑挺不搖臣任切循良一作拊循漢韓信傳信曰且信非得素拊循士大夫務繁稽勾思留仙尉漢書梅福棄南昌尉入洪崖山學道九江人以為仙去以重賔階庾信碑下賔階而顧問伏請依資改授一官充臣節度巡官以前件狀如前臣四朝受任謂穆敬文武三鎮叨榮謂嶺南涇原陳許慕碣石之築宫史記鄒衍如燕燕王築碣石宫自親往師之廣延儒雅效西河之擁篲阮籍奏記子夏處西河上而文侯擁篲善曰吕氏春秋白圭曰魏文侯師子夏李竒漢書注擁篲為恭也如今卒持帚也樂得賢才韓琮等並無所因依不由請託久諳才地晉王藴傳藴輒連狀白之曰某人有地某人有才務存進達各隨其方南史王僧逹傳僧逹自負才地三年間便望宰相堪列幕庭伏希殊私盡允誠請謹録奏聞伏聽敕旨為安平公兖州奏杜勝等四人充判官狀杜勝箋舊書杜黃裳字遵素京兆杜陵人也同平章事封邠國公卒贈司徒次子勝登進士第大中朝位給事中右件官流慶相門班固典引發祥流慶史記孟嘗君傳將門有將相門有相榮名詞苑隋王貞傳儒墨泉海詞章苑囿當仁罕讓見義敢為符彩極髙曹植七啓符彩照爛涯涘難挹莊子出於涯涘臣前任已奏為判官臨事而每見公方後漢書第五種天性疾惡公方不曲與語而每相𢎞益任昉行狀風體所以𢎞益今臣寄分團結任切訓齊將奉廟謨實在賔彥伏請賜守本官充臣團練判官趙晳箋舊書王質傳質在宣城辟崔珦劉蕡裴夷直趙晳為從事皆一代名號右件官洛下名生山東舊族漢賈捐之傳石顯本山東名族仁實堪富天爵極髙妙選文場漢劉輔傳妙選有德之世晉羊祐杜預傳贊曰元凱文場稱為武庫亟仕侯國圭璋特逹禮記圭璋特達德也蘭杜芬馨今臣廉問大藩澄清列部藉其謨畫共讚朝經任昉表增一秩巳黷朝經伏請賜守本官充臣觀察判官李藩箋藩當作潘本集有彭陽公薨後贈杜二十七勝李十七潘二君詩宰相世系表李潘山南東道節度使承之子也右件官文囿馳聲蕭統文選序歷觀文囿泛覽辭林賔階擅美口含言瑞後漢宦者傳論曰手握王爵口含天憲身出禮門見孟子前任巳奏為判官馭下而和易不流臨事而貞方有執今臣移參國用禮記冡宰制國用務切軍需實假平均後漢宦者傳拜武威太守平均徭役以同計畫伏請賜守本官充臣觀察支使盧涇右件官博涉典經後漢鄧后紀晝修婦業暮誦典經晉儒林傳論曰擯闕里之典經該核流略後漢班固傳九流七略之言靡不窮究自魯壁所壞漢書藝文志古文尚書者出孔子壁中景十三王傳魯恭王壞孔子舊宅以廣其宫於其壁中得古文經傳孔安國尚書序濟南伏生年過九十失其本經以傳授裁二十餘篇以其上古之書謂之尚書汲冡之藏晉束晢傳大康二年汲郡人不準盜發魏襄王冡或言安釐王冡得竹書數十車三篋能知漢張安世傳上行幸河東嘗亡書三篋詔問莫能知惟安世識之五車盡究莊子惠子多方其書五車加之文采兼以器能前者為臣屬寮常在州推獄明斷而不容吏黠哀矜而莫有人寃後漢明帝紀詔曰人寃不能理吏黠不能禁今者團練之司稽巡是切每集作直思奬敕集作效非敢用情伏請依資賜授法官充臣部一作都團練巡官以前件狀如前伏以長人者必以吏分勞逸開幕者亦用士為重輕若不樹人史記十年之計樹之以木百年之計樹之以人何以報國况臣素無勳效謬竊寵榮至於賢才敢吝筐篚新序孫叔敖曰筐篚之橐簡書前件官並推賔彥堪贊藩條伏希殊私盡允誠請謹録奏聞伏聽敕旨為滎陽公進賀正銀狀伏以運當聖日節在王春杜甫詩王春度玉墀近則入金門而排玉堂揚雄解嘲歷金門上玉堂有日矣歡於上夀漢叔孫通傳置法酒諸侍坐殿上皆伏抑首以尊卑次起上夀逺則梯重山而浮漲海謝承後漢書交趾七郡土獻皆從漲海出入南史扶南國東界即大漲海韓愈潮州謝上表州南近界漲海連天務以獻琛詩憬彼淮夷來獻其琛臣受國恩深守藩地阻明珠大貝晉書華談傳談曰明珠文貝生於江鬱之濵書大貝鼗鼓在西房爾雅大貝曰蚢説文蚢大貝也南異於百蠻詩因時百蠻隋南蠻傳序南蠻雜類與華人錯居曰蜒曰獽曰俚曰獠曰色俱無君長隨山洞而居古先所謂百越是也翠羽犀皮周書湯四方獻令正南甌鄧桂國損子産里百濮九菌請令以珠璣玳瑁象齒文犀翠羽菌鶴短狗為獻孔朝注六者南蠻之别名北殊於三楚阮籍詠懷詩三楚多秀士善曰孟康漢書注舊名江陵為南楚吳為東楚彭城為西楚翰曰三楚謂楚文王都郢昭王都鄀考烈王都夀春前件銀出非大冶莊子大冶鑄金金踊躍曰我且必為鏌鋣大冶必以為不祥之物貨在中金漢食貨志金有三等黃金為上白金為中赤金為下孟康曰白金銀也赤金丹陽銅也敢以元正式陳方賄史記孔子世家使各以其方賄來貢望闕憶銀臺之峻尚隔一作阻仙寮後漢張衡傳思玄賦曰聘王母於銀臺兮羞玉芝以療飢注銀臺仙人所居也郭璞遊仙詩神仙排雲出但見金銀臺瞻天仰銀一作河漢之流莫階霄路白帖天河謂之銀漢亦曰銀河馳心獻祝因物達誠干冒宸嚴不任兢越為滎陽公赴桂州在道進賀端午銀狀右臣伏以一作聞握丕圖而御物必相見於離易離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也推小正以辨時見謝賜物狀則盛德在夏禮記先立夏三日太史謁之天子曰某日立夏盛德在火故著為令節稽以舊章通修任土之宜見前狀仰續後天之夀見賀老人星見表臣方乘傳置未至藩維前件銀巳及中塗實從前政拜章獻祝雖令尹以告新納賮展儀欲長府之仍舊謹以前觀察使楊漢公封印進上新書楊漢公字用乂虢州𢎞農人纍遷户部郎中史館修撰轉司封郎中坐虞卿下除舒州刺史徙湖亳蘇三州擢桂管浙東觀察使千春屬慶億載儲休繫以藩條闕覲丹墀之下漢書梅福上書曰願涉赤墀之塗漢官儀漢尚書郎含香握蘭奔趨丹墀徵諸貨志且愧白金為中見上文干冒宸嚴無任兢越為安平公赴兖海在道進賀端午馬狀右臣伏以浴蘭令節大戴禮五月五日蓄蘭為沐浴採艾嘉辰見為滎陽公狀百辟合祝於堯年沈約白紵春歌舜日堯年歡不極萬方宜修於禹貢臣方夙駕之部詩星言夙駕馳傳出關漢司馬相如傳馳四乘之傳欲獻琛而未識土儀願祝夀而巳悲日逺並見前前件馬伏櫪斯久魏武帝樂府老驥伏櫪志在千里烈士暮年壯心未已著鞭亦多見為中丞狀粗覺柔馴未嘗奔逸雖非龍孫驥子隋書吐谷渾青海中有小山其俗至冬輒放牝馬於其上言得龍種本集詩至今青海有龍孫桓談新論善相馬者曰薛公得馬惡貌而善走名驥子邈一舉以絶塵莊子顔淵曰夫子步亦步趨亦趨夫子奔軼絶塵而回瞪乎其若後矣又天下馬有成材若恤若失若喪其一若是超軼絶塵不知其所願陪月駟雲螭顔延之赭白馬賦稟靈月駟祖雲螭兮春秋考異郵地生月精為馬漢書漢中星為天駟郭璞遊仙詩雲螭非我駕慶千嘶於扈蹕崔豹古今注秦制出警入蹕謂出軍者皆警戒入國者皆蹕止也干冒宸扆無任兢惕之至為滎陽公進賀冬銀等等字一作鍾乳白身狀右臣伏以黃鍾應候禮記仲冬之月律中黃鍾白琯舒和大戴禮舜以天德嗣堯西王母米獻白琯後漢律歷志候氣之法殿中候用玉律十二惟二至乃候晉律歷志舜時西王母獻昭華之琯以玉為之及漢章帝時零陵文學奚景於泠道舜祠下得白玉琯度以為丈尺相傳謂之漢官尺近訪晉儀禮同元日晉禮儀志魏晉冬至日受方國及百僚前賀因小會其儀亞於獻嵗之日遐觀魯史事重朔朝左傳公既視朔遂登觀臺以望而書禮也伏惟皇帝陛下與天同休如日之盛將融漢道謝莊月賦淪精而漢道融善曰融明也兼舉周正臣方駕廉車闕稱夀酒心懸土炭空循一作思太史之書漢書冬夏至日懸土炭以定隂陽之氣孟康曰先至三日懸土炭於衡兩端輕重適均冬至日陽氣至則炭輕夏至日隂氣至則土重身逺江湖徒積子牟之戀見為汝南公表苟無納贐曷慶履長王燭寶典冬至日極南景極長隂陽日月萬物之始律當黃鍾其管最長故有履長之賀曹慶植冬至表亞嵗迎祥履長納前件銀等稟和於天地之爐賈誼鵩鳥賦天地為爐兮造化為工隂陽為炭兮萬物為銅擢粹於神仙之府後漢竇章傳注蓬萊海中神山為仙府幽經祕録並皆在焉案此為石鍾乳觀下文厠一丸之藥可知豈為方賄且自地征周禮大司徒制天下之地征案新書地理志嶺南諸州皆貢銀韶連二州貢鍾乳對三品之金書揚州厥貢惟金三品庶陪白璧史記蘇秦傳黃金千鎰白璧百雙厠一作搗非一丸之藥魏文帝遊仙詩與我一丸藥光曜有五色請映玄霜太平廣記裴航至藍橋驛見雲英航曰願納厚禮妻之可乎嫗乃使求玉杵臼杵刀圭藥百日以女妻之超為上仙詩曰玄霜搗盡見雲英玄霜藥名也私一作乳非白身等舊書敬宗紀寶歷二年詔朝官及方鎮人家不得買私白身王元逵傳段氏進食二千盤并御衣戰馬公主妝奩及私白身女口等新書宦者傳是時諸道嵗進閹兒號私白閩嶺最多雖長在遐鄉而生知望闕比從訓示堪備指呼冀因物以達誠竊先時而效祝七百年之卜願過成周見前表八千嵗為春敢徵蒙叟莊子上古有大椿者以八千嵗為春八千嵗為秋史記莊子者蒙人也嘗為蒙漆園吏干冒陳進兢越無任為滎陽公奏請不敘録將士狀使當道將士及管內昭賀等州新書方鎮表桂管開耀後置經略使領桂梧賀連栁富昭蒙嚴瑗融古思唐龔十四州治桂州軍士共二千一百二十六人準去年五月五日制敘勳階使司去今年四月二十五日具將士姓名及甲授年月日申省訖右臣當道將士等逺當戎寄式控遐陬見前狀乘解愠之和寧親矢石並見前表望拱辰之列見論語實隔煙波近者朝廷奄靖北方惟荒東道左傳燭之武見秦伯曰若舍鄭以為東道主行李之往來供其困乏當隂山之哭虜謂回鶻漢胸奴傳應侯曰冒頓單于依隂山治兵器後武帝奪其地胸奴過者未嘗不哭靡效纎埃魏都賦風無纎埃及天井之摧凶謂劉稹漢地理志上黨郡有天井關今在山西澤州東南不橫寸草漢終軍傳軍無橫草之功徒以皇帝陛下非煙結彩集作蔭見為成魏州表瀼露流光詩零露瀼瀼向明才及於鳳樓布澤逺霑於蠻徼並見前固合同成國慶共稟朝榮伏以當管近無豐年亦經小水海上有分屯之卒新書南蠻傳安南桃林人者居林西原七綰洞首領李由獨主之嵗嵗戍邉李琢之在安南也奏罷防冬兵六千人謂由獨可當一隊遏蠻之入雍南有未返之師新書地理志雍州朗寧郡屬嶺南道南蠻傳大中時李琢為安南經略使苛墨自私以斗鹽易一牛夷人不堪結南詔將段酋遷陷安南都護府號白衣沒命軍南詔發朱弩佉苴三千助守歉冗食於居人後漢劉瑜傳冗食空宫困裹糧於戎士左傳裹糧坐甲固敵是求臣初叨亷問方切拊循漢淮南王傳拊循百姓雖拾級升階禮記主人與客讓登主人先登客從之拾級聚足連步以上各思受寵而濡毫執簡左傳南史氏執簡以往無以為資仰慮後期敢忘積懼伏見比者諸道有物力未足者聖恩洪貸晉徐邈傳邈言于帝曰會稽王奉上純一宜加洪貸許且權未敘録晉劉聰傳或有勳舊功臣而弗見敘録竊緣往例隋書觀德王雄襄表曰臣實面牆敢緣往例冒此上陳伏冀天慈曲垂矜許晉書慕容翰傳天慈曲愍梁邵陵王啓伏願天慈曲垂矜許臣與將士等無任感激冒昧戰越之至為楊贊善奏請東都灑掃狀新書地理志東都隋置武德四年廢貞觀六年號洛陽宫顯慶二年曰東都光宅元年曰神都神龍元年復曰東都天寶元年曰東京上元二年罷京肅宗元年復為東都右臣先臣贈太保某塋在河南縣界地理志河南府治河南縣臣自終喪紀左傳齊孝公卒有齊怨不廢喪紀禮也便參朝倫三年贊道於宫庭千里違離於墳墓竊惟令式合許芟除舊書憲宗紀元和元年二月詔常參官寒食拜墓在畿南聽假日往還他州府奏取進止追逺興情敢希榮於陸煜晉陸煜傳蘇峻平加衛將軍以勳進爵為公咸和中求歸鄉里拜墳墓因以卒報恩未死寧自誓於羲之晉王羲之傳稱病去郡於父母墓前自誓朝廷以其誓苦亦不復徵之伏乞聖慈特從一作允丹懇為間廄使奏判官韓勵改名狀新書百官志聖歷中置間廄使以殿中丞監承恩遇者為之分領殿中太僕之事而專掌輿輦牛馬自是宴遊供奉殿中丞監皆不預聞右前件官名與再從叔故媯州參軍自勵向下一字同伏以韓自勵頃因宦遊殁於幽朔羈孤未返謝莊月賦親懿莫從羈孤遞進親黨莫知近始言歸因之合族禮記合族以食雖為子之道則愼更名於巳孤而諸父之一作具來固難俱諱於其側禮記卒哭乃諱大功小功不諱伏請改名融謹録奏聞伏聽敕旨李義山文集箋注卷三
